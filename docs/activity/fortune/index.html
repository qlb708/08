<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🔮 命运之地</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#1a56db;
  --purple:#A78BFA;
  --purple-dark:#7C3AED;
  --bg:#F2F0EC;--bg-desktop:#E8E6E2;
  --text:#0D0D0D;--soft:#6b7280;--muted:#9ca3af;
  --bd:rgba(0,0,0,.07);
  --font:-apple-system,"PingFang SC",sans-serif;
}
html,body{font-family:var(--font);background:var(--bg-desktop);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.shell{max-width:390px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;box-shadow:0 0 60px rgba(0,0,0,.15)}
@media(min-width:440px){.shell{border-radius:20px;min-height:calc(100vh - 40px);margin-top:20px;margin-bottom:20px}}

/* ===== 导航 ===== */
nav{height:52px;background:rgba(250,250,248,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;flex-shrink:0;position:sticky;top:0;z-index:200}
.nav-back{color:#555;text-decoration:none;font-size:13px;font-weight:500}
.nav-back:hover{text-decoration:none;color:#333}
.nav-title{font-size:14px;font-weight:700;letter-spacing:.02em;flex:1;text-align:center;margin-right:40px}

/* ===== 页面切换 ===== */
.page{display:none;animation:fadeUp .35s ease forwards}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ===== 首页 Banner ===== */
.home-banner{height:120px;background:linear-gradient(135deg,#F3E5F5,#E1BEE7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:relative;overflow:hidden}
.home-banner-emoji{font-size:40px;display:flex;gap:8px}
.home-banner-title{font-size:22px;font-weight:700;color:#1a1a1a}
.home-card{margin:24px 20px;background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.07);padding:28px 24px;text-align:center}
.home-card .home-desc{font-size:14px;color:var(--soft);line-height:1.8;margin-bottom:24px}
.home-card .home-desc b{color:var(--text)}
.home-card .home-icons{font-size:36px;margin-bottom:20px;letter-spacing:4px}

/* ===== 按钮 ===== */
.btn-primary{width:100%;padding:14px;border-radius:50px;background:var(--primary);color:#fff;border:none;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s}
.btn-primary:active{transform:scale(.97);opacity:.9}
.btn-secondary{width:100%;padding:13px;border-radius:50px;background:#fff;color:var(--primary);border:1.5px solid var(--primary);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s;margin-top:10px}
.btn-secondary:active{transform:scale(.97)}

/* ===== 答题页 ===== */
.qa-page{padding:0 20px 28px}
.prog-wrap{padding:20px 20px 0;display:flex;align-items:center;gap:12px}
.prog-track{flex:1;height:4px;background:#e8e6e2;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--purple);border-radius:2px;transition:width .35s ease;width:0}
.prog-label{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap}
.qa-card{background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.07);padding:24px 20px;margin-top:16px}
.qa-qnum{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;margin-bottom:8px}
.qa-qtext{font-size:18px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:20px}
.qa-opts{display:flex;flex-direction:column;gap:10px}
.qa-opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:50px;border:1.5px solid #e2e8f0;cursor:pointer;background:#fff;font-family:var(--font);text-align:left;width:100%;transition:all .15s;position:relative;overflow:hidden}
.qa-opt:hover{border-color:#c4c0c0;transform:translateX(2px)}
.qa-opt:hover .qa-opt-line{opacity:1}
.qa-opt:active{transform:scale(.97)}
.qa-opt.sel{border-color:var(--purple-dark);background:var(--purple-dark);animation:optPop .15s ease}
@keyframes optPop{0%{transform:scale(1)}50%{transform:scale(.97)}100%{transform:scale(1)}}
.qa-opt.sel .qa-opt-text{color:#fff}
.qa-opt.sel .qa-opt-line{display:none}
.qa-opt-line{position:absolute;left:0;top:10%;bottom:10%;width:3px;background:var(--purple);border-radius:2px;opacity:0;transition:opacity .15s}
.qa-opt-em{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.qa-opt-body{flex:1}
.qa-opt-text{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;transition:color .15s}
.qa-opt-sub{font-size:11px;color:var(--muted);margin-top:2px;transition:color .15s}

/* ===== 结果页 ===== */
.res-page{padding-bottom:28px}
.res-hero{text-align:center;padding:32px 20px 20px}
.res-emoji{font-size:48px;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.res-city{font-size:28px;font-weight:700;color:var(--text);margin-bottom:4px}
.res-subtitle{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.06em;margin-bottom:16px}

.res-fate{margin:0 20px 16px;background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.07);padding:20px;text-align:center}
.res-fate-text{font-size:15px;font-weight:600;color:var(--text);line-height:1.8;font-style:italic}
.res-fate-text::before{content:'「';color:var(--purple);font-weight:800}
.res-fate-text::after{content:'」';color:var(--purple);font-weight:800}

.res-tags{margin:0 20px 16px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.res-tag{font-size:12px;font-weight:600;padding:6px 14px;border-radius:50px;background:rgba(167,139,250,.1);color:var(--purple-dark);letter-spacing:.04em}

.res-stars{margin:0 20px 16px;background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.07);padding:18px 20px;text-align:center}
.res-stars-label{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.res-stars-row{font-size:24px;letter-spacing:3px}
.res-stars-val{font-size:12px;color:var(--soft);margin-top:4px}

.res-actions{padding:0 20px;display:flex;flex-direction:column;gap:10px}

.copy-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#0D0D0D;color:#fff;border-radius:20px;padding:8px 18px;font-size:12px;font-weight:600;z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
.copy-toast.show{opacity:1}
</style>
</head>
<body>
<div class="shell">
  <!-- 导航 -->
  <nav>
    <a href="/08/activity/" class="nav-back">← 返回</a>
    <span class="nav-title">命运之地</span>
  </nav>

  <!-- 首页 -->
  <div class="page active" id="pageHome">
    <div class="home-banner">
      <div class="home-banner-emoji">🔮✨</div>
      <div class="home-banner-title">命运之地</div>
    </div>
    <div class="home-card">
      <div class="home-desc">
        <div class="home-icons">🗼🏯🗽⛵🗼</div>
        5道玄学题，测出你和哪座城市早就注定相遇<br><br>
        <b>有些相遇，命中注定。</b>
      </div>
      <button class="btn-primary" onclick="startQuiz()">开始占卜</button>
    </div>
  </div>

  <!-- 答题页 -->
  <div class="page" id="pageQA">
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="qa-fill"></div></div>
      <div class="prog-label" id="qa-label">0 / 5</div>
    </div>
    <div class="qa-page">
      <div class="qa-card">
        <div class="qa-qnum" id="qa-qnum"></div>
        <div class="qa-qtext" id="qa-qtext"></div>
        <div class="qa-opts" id="qa-opts"></div>
      </div>
    </div>
  </div>

  <!-- 结果页 -->
  <div class="page" id="pageResult"></div>
</div>
<div class="copy-toast" id="copy-toast"></div>
<script>
/* ===== 题目数据 ===== */
var QS=[
  {q:'你更愿意在哪种天气出发？',opts:[
    {em:'☀️',t:'晴天',k:'A'},{em:'🌧️',t:'阴雨',k:'B'},{em:'🌅',t:'日落',k:'C'},{em:'🌙',t:'深夜',k:'D'},{em:'🌤️',t:'清晨',k:'E'}
  ]},
  {q:'你的旅行包里一定有？',opts:[
    {em:'📷',t:'相机',k:'A'},{em:'📖',t:'一本书',k:'B'},{em:'💄',t:'护肤品',k:'C'},{em:'🗺️',t:'地图',k:'D'},{em:'🍫',t:'零食',k:'E'}
  ]},
  {q:'遇到迷路你会？',opts:[
    {em:'🗣️',t:'问路人',k:'A'},{em:'📱',t:'看手机',k:'B'},{em:'🚶',t:'随便走',k:'C'},{em:'☕',t:'找咖啡厅',k:'D'},{em:'⏸️',t:'原地等待',k:'E'}
  ]},
  {q:'旅行中最重要的是？',opts:[
    {em:'🏔️',t:'风景',k:'A'},{em:'🍜',t:'美食',k:'B'},{em:'🏛️',t:'人文',k:'C'},{em:'🛍️',t:'购物',k:'D'},{em:'🎭',t:'体验',k:'E'}
  ]},
  {q:'你觉得旅行的意义是？',opts:[
    {em:'🕊️',t:'逃离',k:'A'},{em:'🌱',t:'成长',k:'B'},{em:'😌',t:'享受',k:'C'},{em:'📝',t:'纪念',k:'D'},{em:'🔭',t:'探索',k:'E'}
  ]}
];

/* ===== 城市结果数据 ===== */
var CITIES={
  A:{emoji:'🗼',city:'巴黎',fate:'你天生适合浪漫，巴黎早就为你留了位置',tags:['浪漫','艺术','时尚'],stars:5},
  B:{emoji:'🏯',city:'京都',fate:'你骨子里有一种安静的力量，和京都的气质惊人相似',tags:['禅意','古典','慢生活'],stars:5},
  C:{emoji:'🗽',city:'纽约',fate:'你的能量需要一座不睡觉的城市来匹配',tags:['活力','多元','国际化'],stars:4},
  D:{emoji:'⛵',city:'圣托里尼',fate:'你值得最纯粹的蓝白，和最彻底的放空',tags:['浪漫','治愈','慢旅行'],stars:5},
  E:{emoji:'🗼',city:'东京',fate:'你对秩序和惊喜的迷恋，在东京都能找到答案',tags:['现代','美食','探索'],stars:4}
};

/* ===== Hash取模分配结果 ===== */
function hashResult(answers){
  var hash=0;
  var str=answers.join('');
  for(var i=0;i<str.length;i++){
    hash=((hash<<5)-hash)+str.charCodeAt(i);
    hash|=0;
  }
  var keys=['A','B','C','D','E'];
  return keys[Math.abs(hash)%5];
}

/* ===== 逻辑 ===== */
var answers=[];

function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function startQuiz(){
  answers=[];
  document.getElementById('qa-fill').style.width='0%';
  showPage('pageQA');renderQ(0);
}

function renderQ(i){
  var q=QS[i];
  document.getElementById('qa-qnum').textContent='第'+(i+1)+'题 / 共5题';
  document.getElementById('qa-qtext').textContent=q.q;
  var html='';
  q.opts.forEach(function(o){
    var sel=answers[i]===o.k?' sel':'';
    html+='<button class="qa-opt'+sel+'" data-k="'+o.k+'" onclick="pickOpt('+i+',\''+o.k+'\')"><div class="qa-opt-line"></div><div class="qa-opt-em">'+o.em+'</div><div class="qa-opt-body"><div class="qa-opt-text">'+o.t+'</div></div></button>';
  });
  document.getElementById('qa-opts').innerHTML=html;
  document.getElementById('qa-fill').style.width=Math.round(i/QS.length*100)+'%';
  document.getElementById('qa-label').textContent='第'+(i+1)+'/5题';
}

function pickOpt(qi,key){
  answers[qi]=key;
  document.querySelectorAll('.qa-opt').forEach(function(el){el.classList.toggle('sel',el.dataset.k===key);});
  document.getElementById('qa-fill').style.width=Math.round((qi+1)/QS.length*100)+'%';
  document.getElementById('qa-label').textContent='第'+(qi+1)+'/5题';
  setTimeout(function(){
    if(qi+1<QS.length){renderQ(qi+1);}
    else{showResult();}
  },500);
}

function showResult(){
  var key=hashResult(answers);
  var c=CITIES[key];
  var starsHTML='';
  for(var i=0;i<5;i++){starsHTML+=i<c.stars?'⭐':'☆';}
  var tagsHTML=c.tags.map(function(t){return '<span class="res-tag">'+t+'</span>';}).join('');
  var html=
    '<div class="res-hero">'+
      '<span class="res-emoji">'+c.emoji+'</span>'+
      '<div class="res-city">'+c.city+'</div>'+
      '<div class="res-subtitle">✦ 你的命定之城 ✦</div>'+
    '</div>'+
    '<div class="res-fate">'+
      '<div class="res-fate-text">'+c.fate+'</div>'+
    '</div>'+
    '<div style="text-align:center;margin-bottom:12px"><span style="font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted)">城市性格</span></div>'+
    '<div class="res-tags">'+tagsHTML+'</div>'+
    '<div class="res-stars">'+
      '<div class="res-stars-label">你们的缘分</div>'+
      '<div class="res-stars-row">'+starsHTML+'</div>'+
      '<div class="res-stars-val">'+c.stars+' / 5 颗星</div>'+
    '</div>'+
    '<div class="res-actions">'+
      '<button class="btn-primary" onclick="retryQuiz()">🔮 再测一次</button>'+
      '<button class="btn-secondary" onclick="copyResult()">📋 分享结果</button>'+
    '</div>';
  document.getElementById('pageResult').innerHTML=html;
  showPage('pageResult');
}

function copyResult(){
  var el=document.getElementById('pageResult');
  var cityText=el.querySelector('.res-city').textContent;
  var emojiText=el.querySelector('.res-emoji').textContent;
  var fateText=el.querySelector('.res-fate-text').textContent;
  var text='🔮 我的命运之地：'+emojiText+' '+cityText+'\n\n「'+fateText+'」\n\n— 来自「命运之地」旅行占卜';
  try{navigator.clipboard.writeText(text);}catch(e){var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  var t=document.getElementById('copy-toast');t.textContent='✅ 已复制！';t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);
}

function retryQuiz(){
  answers=[];
  document.getElementById('pageResult').innerHTML='';
  document.getElementById('qa-fill').style.width='0%';
  showPage('pageHome');
}
</script>
</body>
</html>
