<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⚽ 球星人格匹配</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#1a56db;
  --bg:#F2F0EC;--bg-desktop:#E8E6E2;
  --text:#0D0D0D;--soft:#6b7280;--muted:#9ca3af;
  --bd:rgba(0,0,0,.07);
  --font:-apple-system,"PingFang SC",sans-serif;
}
html,body{font-family:var(--font);background:var(--bg-desktop);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.shell{max-width:390px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;box-shadow:0 0 60px rgba(0,0,0,.15)}
@media(min-width:440px){.shell{border-radius:20px;min-height:calc(100vh - 40px);margin-top:20px;margin-bottom:20px}}

/* ===== 导航 ===== */
nav{height:52px;background:rgba(250,250,248,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;flex-shrink:0;position:sticky;top:0;z-index:200}
.nav-back{color:#555;text-decoration:none;font-size:13px;font-weight:500}
.nav-back:hover{text-decoration:none;color:#333}
.nav-title{font-size:14px;font-weight:700;letter-spacing:.02em;flex:1;text-align:center;margin-right:40px}

/* ===== 页面切换 ===== */
.page{display:none;animation:fadeUp .35s ease forwards}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ===== 首页 Banner ===== */
.home-banner{height:120px;background:linear-gradient(135deg,#FFF3E0,#FFE0B2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;position:relative;overflow:hidden}
.home-banner-emoji{font-size:40px;display:flex;gap:8px}
.home-banner-title{font-size:22px;font-weight:700;color:#1a1a1a}
.home-card{margin:24px 20px;background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.07);padding:28px 24px;text-align:center}
.home-card .home-desc{font-size:14px;color:var(--soft);line-height:1.8;margin-bottom:24px}
.home-card .home-desc b{color:var(--text)}
.home-card .home-icons{font-size:36px;margin-bottom:20px;letter-spacing:4px}

/* ===== 按钮 ===== */
.btn-primary{width:100%;padding:14px;border-radius:50px;background:var(--primary);color:#fff;border:none;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s}
.btn-primary:active{transform:scale(.97);opacity:.9}
.btn-secondary{width:100%;padding:13px;border-radius:50px;background:#fff;color:var(--primary);border:1.5px solid var(--primary);font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .15s;margin-top:10px}
.btn-secondary:active{transform:scale(.97)}

/* ===== 答题页 ===== */
.qa-page{padding:0 20px 28px}
.prog-wrap{padding:20px 20px 0;display:flex;align-items:center;gap:12px}
.prog-track{flex:1;height:4px;background:#e8e6e2;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--primary);border-radius:2px;transition:width .35s ease;width:0}
.prog-label{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap}
.qa-card{background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.07);padding:24px 20px;margin-top:16px}
.qa-qnum{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;margin-bottom:8px}
.qa-qtext{font-size:18px;font-weight:700;color:var(--text);line-height:1.5;margin-bottom:20px}
.qa-opts{display:flex;flex-direction:column;gap:10px}
.qa-opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:50px;border:1.5px solid #e2e8f0;cursor:pointer;background:#fff;font-family:var(--font);text-align:left;width:100%;transition:all .15s;position:relative;overflow:hidden}
.qa-opt:hover{border-color:#c4c0c0;transform:translateX(2px)}
.qa-opt:active{transform:scale(.97)}
.qa-opt.sel{border-color:var(--primary);background:var(--primary);animation:optPop .15s ease}
@keyframes optPop{0%{transform:scale(1)}50%{transform:scale(.97)}100%{transform:scale(1)}}
.qa-opt.sel .qa-opt-text{color:#fff}
.qa-opt.sel .qa-opt-sub{color:rgba(255,255,255,.6)}
.qa-opt-em{font-size:20px;width:28px;text-align:center;flex-shrink:0}
.qa-opt-body{flex:1}
.qa-opt-text{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;transition:color .15s}
.qa-opt-sub{font-size:11px;color:var(--muted);margin-top:2px;transition:color .15s}

/* ===== 结果页 ===== */
.res-page{padding-bottom:28px}
.res-hero{height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative;overflow:hidden}
.res-hero-emoji{font-size:56px}
.res-hero-name{font-size:22px;font-weight:700;color:#1a1a1a}
.res-hero-en{font-size:12px;color:rgba(0,0,0,.55)}

.res-hero[data-star="A"]{background:linear-gradient(135deg,#FFF8E1,#FFD54F)}
.res-hero[data-star="A"] .res-hero-name{color:#5D4037}
.res-hero[data-star="A"] .res-hero-en{color:rgba(93,64,55,.55)}
.res-hero[data-star="B"]{background:linear-gradient(135deg,#FFEBEE,#EF9A9A)}
.res-hero[data-star="B"] .res-hero-name{color:#B71C1C}
.res-hero[data-star="B"] .res-hero-en{color:rgba(183,28,28,.55)}
.res-hero[data-star="C"]{background:linear-gradient(135deg,#E3F2FD,#90CAF9)}
.res-hero[data-star="C"] .res-hero-name{color:#1565C0}
.res-hero[data-star="C"] .res-hero-en{color:rgba(21,101,192,.55)}
.res-hero[data-star="D"]{background:linear-gradient(135deg,#FCE4EC,#F48FB1)}
.res-hero[data-star="D"] .res-hero-name{color:#AD1457}
.res-hero[data-star="D"] .res-hero-en{color:rgba(173,20,87,.55)}
.res-hero[data-star="E"]{background:linear-gradient(135deg,#E0F7FA,#80DEEA)}
.res-hero[data-star="E"] .res-hero-name{color:#00838F}
.res-hero[data-star="E"] .res-hero-en{color:rgba(0,131,143,.55)}

.res-match{text-align:center;padding:4px 20px}
.res-match-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.06em}
.res-match-name{font-size:16px;font-weight:700;color:var(--text);margin-top:2px}

.res-radar-card{margin:16px 20px;background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.07);padding:20px;display:flex;gap:16px;align-items:flex-start}
.res-radar{width:140px;height:140px;flex-shrink:0}
.res-quote{flex:1;display:flex;flex-direction:column;justify-content:center;gap:6px}
.res-quote-icon{font-size:20px;color:var(--muted)}
.res-quote-text{font-size:13px;font-weight:600;line-height:1.6;color:#444;font-style:italic}
.res-quote-text::before{content:'「';color:var(--muted)}
.res-quote-text::after{content:'」';color:var(--muted)}

.res-dest-card{margin:0 20px 16px;background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.07);padding:18px 20px}
.res-dest-label{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}
.res-dest{display:flex;align-items:center;gap:10px}
.res-dest-emoji{font-size:28px}
.res-dest-name{font-size:18px;font-weight:700;color:var(--text)}
.res-dest-sub{font-size:12px;color:var(--soft);margin-top:2px}

.res-actions{padding:0 20px;display:flex;flex-direction:column;gap:10px}

.copy-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#0D0D0D;color:#fff;border-radius:20px;padding:8px 18px;font-size:12px;font-weight:600;z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
.copy-toast.show{opacity:1}
</style>
</head>
<body>
<div class="shell">
  <!-- 导航 -->
  <nav>
    <a href="/08/activity/" class="nav-back">← 返回</a>
    <span class="nav-title">球星人格匹配</span>
  </nav>

  <!-- 首页 -->
  <div class="page active" id="pageHome">
    <div class="home-banner">
      <div class="home-banner-emoji">⚽🏆</div>
      <div class="home-banner-title">球星人格匹配</div>
    </div>
    <div class="home-card">
      <div class="home-desc">
        <div class="home-icons">🐐⚡💨👑🌊</div>
        6题测出你最像哪位球星，解锁专属旅行路线<br><br>
        <b>你的旅行风格，藏着你是谁。</b>
      </div>
      <button class="btn-primary" onclick="startQA()">开始测试</button>
    </div>
  </div>

  <!-- 答题页 -->
  <div class="page" id="pageQA">
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-fill" id="qa-fill"></div></div>
      <div class="prog-label" id="qa-label">0 / 6</div>
    </div>
    <div class="qa-page">
      <div class="qa-card">
        <div class="qa-qnum" id="qa-qnum"></div>
        <div class="qa-qtext" id="qa-qtext"></div>
        <div class="qa-opts" id="qa-opts"></div>
      </div>
    </div>
  </div>

  <!-- 结果页 -->
  <div class="page" id="pageResult"></div>
</div>
<div class="copy-toast" id="copy-toast"></div>
<script>
/* ===== 题目数据（原始不变） ===== */
var QS=[
  {q:'你在球场上的风格是？',opts:[
    {k:'A',em:'🐐',t:'优雅控球，用技术征服一切',s:'低调但致命'},
    {k:'B',em:'⚡',t:'极致爆发，每个瞬间都要最闪耀',s:'永远做最耀眼的那个'},
    {k:'C',em:'👑',t:'精准传球，掌控全场节奏',s:'每一个细节都要完美'},
    {k:'D',em:'💨',t:'闪电突破，速度就是我的武器',s:'快到你来不及反应'},
    {k:'E',em:'🌊',t:'随性发挥，灵感就是天赋',s:'不需要剧本，我即兴创造'}
  ]},
  {q:'旅行前，你的第一个冲动是...',opts:[
    {k:'A',em:'🗺️',t:'找那些鲜为人知的小街巷',s:'越隐秘越有味道'},
    {k:'B',em:'📸',t:'先看哪里最出片、最能拍大片',s:'每个地方都要留下完美画面'},
    {k:'C',em:'🚀',t:'订最快的交通，多城市连刷',s:'我想在最短时间去最多地方'},
    {k:'D',em:'📋',t:'做详细攻略，逐小时安排',s:'没有计划就没有完美旅途'},
    {k:'E',em:'🎲',t:'随便，到了再说',s:'最好的惊喜都是计划外的'}
  ]},
  {q:'在旅途中，你最享受的瞬间是...',opts:[
    {k:'A',em:'🔍',t:'发现一家只有当地人去的小馆子',s:'这才叫真正融入'},
    {k:'B',em:'✨',t:'每个景点都拍出了满意的照片',s:'回头看行程，张张都值得发'},
    {k:'C',em:'⚡',t:'24小时内跨越两个城市',s:'效率感让我兴奋'},
    {k:'D',em:'📌',t:'行程完全按计划推进，没有意外',s:'掌控感就是安全感'},
    {k:'E',em:'🌊',t:'在街头碰到意外的精彩',s:'剧本之外才是旅行本质'}
  ]},
  {q:'旅途碰到麻烦（堵车/景点关门），你会...',opts:[
    {k:'A',em:'🧘',t:'沉住气，慢慢找替代方案',s:'急有什么用，先观察再出手'},
    {k:'B',em:'🔄',t:'立刻找下一个同类打卡点',s:'不能浪费任何时间'},
    {k:'C',em:'💨',t:'立刻出发去下一个城市',s:'错过了就跳过，前方更精彩'},
    {k:'D',em:'📲',t:'对照备用计划B，调整时间表',s:'麻烦早在我的预案里'},
    {k:'E',em:'😂',t:'当成好玩的故事，随遇而安',s:'最难忘的经历往往来自意外'}
  ]},
  {q:'如果只能去一类地方，你会选...',opts:[
    {k:'A',em:'🏘️',t:'老城区、本地菜市场、历史小巷',s:'文化从来藏在细节里'},
    {k:'B',em:'🌅',t:'有绝美风景的网红地标',s:'视觉冲击才是旅行的意义'},
    {k:'C',em:'🌍',t:'跨越多个城市的连轴转路线',s:'数量带来的满足感无可替代'},
    {k:'D',em:'🎯',t:'提前做好功课的必去清单',s:'有准备才不会后悔'},
    {k:'E',em:'🎪',t:'路边随机碰到什么就去什么',s:'目的地是用来打破的'}
  ]},
  {q:'结束旅行，你会怎么记录？',opts:[
    {k:'A',em:'📓',t:'写一篇深度游记，记下每个细节',s:'那些小发现值得被记住'},
    {k:'B',em:'🖼️',t:'精修一组照片发社交媒体',s:'要让别人羡慕'},
    {k:'C',em:'✅',t:'把打卡地列个完成清单',s:'成就感来自数量'},
    {k:'D',em:'📊',t:'整理旅行总结，优化下次行程',s:'每次旅行都是数据积累'},
    {k:'E',em:'🤳',t:'发一条朋友圈，然后忘了',s:'活在当下，不留遗憾'}
  ]}
];

/* ===== 球员数据 ===== */
var PLAYERS={
  A:{emoji:'🐐',name:'梅西',en:'Lionel Messi',
    radar:{speed:75,tech:99,lead:95,create:98,burst:85},
    quote:'美丽的比赛不需要解释，就像最好的旅行不需要攻略',
    dest:'布宜诺斯艾利斯🇦🇷',destSub:'博卡青年 · 探戈之都'},
  B:{emoji:'⚡',name:'C罗',en:'Cristiano Ronaldo',
    radar:{speed:99,tech:92,lead:90,create:80,burst:99},
    quote:'成功不是偶然，每一个到达的地方都值得被记住',
    dest:'里斯本🇵🇹',destSub:'贝伦塔 · 航海荣光'},
  C:{emoji:'💨',name:'姆巴佩',en:'Kylian Mbappé',
    radar:{speed:99,tech:88,lead:72,create:88,burst:95},
    quote:'速度是一种态度，去巴黎，感受那种光速般的美',
    dest:'巴黎🇫🇷',destSub:'蒙马特 · 埃菲尔铁塔'},
  D:{emoji:'👑',name:'贝克汉姆',en:'David Beckham',
    radar:{speed:80,tech:88,lead:85,create:90,burst:75},
    quote:'风格就是你在任何地方都不会被忽视的那种存在',
    dest:'米兰🇮🇹',destSub:'时尚之都 · 斯卡拉歌剧院'},
  E:{emoji:'🌊',name:'马拉多纳',en:'Diego Maradona',
    radar:{speed:88,tech:99,lead:88,create:99,burst:90},
    quote:'热情是旅行最好的燃料，去那不勒斯，体验真正的热烈',
    dest:'那不勒斯🇮🇹',destSub:'圣保罗球场 · 地中海灵魂'}
};

/* 雷达图维度映射 */
var RADAR_DIMS=['speed','tech','lead','create','burst'];
var RADAR_LABELS=['速度','技术','领导力','创造力','爆发力'];

/* ===== 雷达图 SVG ===== */
function buildRadar(player){
  var cx=70,cy=70,maxR=52,n=5;
  var pts=[],labels=[];
  for(var i=0;i<n;i++){
    var angle=Math.PI*2*i/n-Math.PI/2;
    var v=player.radar[RADAR_DIMS[i]]/100;
    pts.push((cx+maxR*v*Math.cos(angle)).toFixed(1)+','+(cy+maxR*v*Math.sin(angle)).toFixed(1));
    labels.push({x:(cx+(maxR+12)*Math.cos(angle)).toFixed(1),y:(cy+(maxR+12)*Math.sin(angle)+4).toFixed(1),text:RADAR_LABELS[i]});
  }
  var g1=[],g2=[];
  for(var j=0;j<n;j++){var a=Math.PI*2*j/n-Math.PI/2;g1.push((cx+maxR*Math.cos(a)).toFixed(1)+','+(cy+maxR*Math.sin(a)).toFixed(1));g2.push((cx+maxR*.5*Math.cos(a)).toFixed(1)+','+(cy+maxR*.5*Math.sin(a)).toFixed(1));}
  var lines=[];
  for(var j=0;j<n;j++){var a=Math.PI*2*j/n-Math.PI/2;lines.push('<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+maxR*Math.cos(a)).toFixed(1)+'" y2="'+(cy+maxR*Math.sin(a)).toFixed(1)+'" stroke="#999" stroke-opacity=".15" stroke-width=".8"/>');}
  var labelHTML='';
  labels.forEach(function(l){labelHTML+='<text x="'+l.x+'" y="'+l.y+'" text-anchor="middle" font-size="8" fill="#666" font-weight="600">'+l.text+'</text>';});
  var colorMap={A:'#C67F00',B:'#C62828',C:'#1565C0',D:'#AD1457',E:'#00838F'};
  var fillMap={A:'rgba(255,213,79,.25)',B:'rgba(255,183,185,.25)',C:'rgba(187,222,251,.3)',D:'rgba(248,187,208,.3)',E:'rgba(178,235,242,.3)'};
  var key='';for(var k in PLAYERS){if(PLAYERS[k]===player){key=k;break;}}
  return '<svg class="res-radar" viewBox="0 0 140 140">'+
    '<polygon points="'+g1.join(' ')+'" fill="none" stroke="#ccc" stroke-opacity=".3" stroke-width=".8"/>'+
    '<polygon points="'+g2.join(' ')+'" fill="none" stroke="#ccc" stroke-opacity=".2" stroke-width=".6"/>'+
    lines.join('')+
    '<polygon points="'+pts.join(' ')+'" fill="'+fillMap[key]+'" stroke="'+colorMap[key]+'" stroke-width="1.8" stroke-linejoin="round"/>'+
    labelHTML+'</svg>';
}

/* ===== 逻辑 ===== */
var answers={},resultStar=null,qaIndex=0;

function showPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function startQA(){
  qaIndex=0;answers={};
  document.getElementById('qa-fill').style.width='0%';
  showPage('pageQA');renderQ(0);
}

function renderQ(i){
  var q=QS[i];qaIndex=i;
  document.getElementById('qa-qnum').textContent='第'+(i+1)+'题 / 共6题';
  document.getElementById('qa-qtext').textContent=q.q;
  var html='';
  q.opts.forEach(function(o){
    var sel=answers[i]===o.k?' sel':'';
    html+='<button class="qa-opt'+sel+'" data-k="'+o.k+'" onclick="pickOpt('+i+',\''+o.k+'\')"><div class="qa-opt-em">'+o.em+'</div><div class="qa-opt-body"><div class="qa-opt-text">'+o.t+'</div><div class="qa-opt-sub">'+o.s+'</div></div></button>';
  });
  document.getElementById('qa-opts').innerHTML=html;
  document.getElementById('qa-fill').style.width=Math.round(i/QS.length*100)+'%';
  document.getElementById('qa-label').textContent='第'+(i+1)+'/6题';
}

function pickOpt(qi,key){
  answers[qi]=key;
  document.querySelectorAll('.qa-opt').forEach(function(el){el.classList.toggle('sel',el.dataset.k===key);});
  document.getElementById('qa-fill').style.width=Math.round((qi+1)/QS.length*100)+'%';
  document.getElementById('qa-label').textContent='第'+(qi+1)+'/6题';
  setTimeout(function(){
    if(qi+1<QS.length){renderQ(qi+1);}
    else{showResult();}
  },500);
}

function showResult(){
  var cnt={A:0,B:0,C:0,D:0,E:0};
  Object.values(answers).forEach(function(k){cnt[k]=(cnt[k]||0)+1;});
  var best=Object.keys(cnt).reduce(function(a,b){return cnt[a]>=cnt[b]?a:b;});
  resultStar=best;
  var p=PLAYERS[best];
  var radarSVG=buildRadar(p);
  var html=
    '<div class="res-hero" data-star="'+best+'">'+
      '<div class="res-hero-emoji">'+p.emoji+'</div>'+
      '<div class="res-hero-name">'+p.name+'</div>'+
      '<div class="res-hero-en">'+p.en+'</div>'+
    '</div>'+
    '<div class="res-match">'+
      '<div class="res-match-label">你像</div>'+
      '<div class="res-match-name">'+p.emoji+' '+p.name+' 一样</div>'+
    '</div>'+
    '<div class="res-radar-card">'+radarSVG+
      '<div class="res-quote">'+
        '<div class="res-quote-icon">💬</div>'+
        '<div class="res-quote-text">'+p.quote+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="res-dest-card">'+
      '<div class="res-dest-label">✦ 专属旅行目的地 ✦</div>'+
      '<div class="res-dest">'+
        '<div class="res-dest-name">'+p.dest+'</div>'+
      '</div>'+
      '<div class="res-dest-sub">'+p.destSub+'</div>'+
    '</div>'+
    '<div class="res-actions">'+
      '<button class="btn-primary" onclick="retryQA()">🔄 再测一次</button>'+
      '<button class="btn-secondary" onclick="copyResult()">📋 分享结果</button>'+
    '</div>';
  document.getElementById('pageResult').innerHTML=html;
  showPage('pageResult');
}

function copyResult(){
  if(!resultStar)return;
  var p=PLAYERS[resultStar];
  var text='⚽ 我的球星人格匹配\n\n'+p.emoji+' 我最像：'+p.name+'\n\n「'+p.quote+'」\n\n🗺️ 专属目的地：'+p.dest;
  try{navigator.clipboard.writeText(text);}catch(e){var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  var t=document.getElementById('copy-toast');t.textContent='✅ 已复制！';t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);
}

function retryQA(){
  answers={};resultStar=null;qaIndex=0;
  document.getElementById('pageResult').innerHTML='';
  document.getElementById('qa-fill').style.width='0%';
  showPage('pageHome');
}
</script>
</body>
</html>
