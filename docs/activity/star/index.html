<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⚽ 你最像哪位球星？</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAFAF8;--bg2:#f0efed;
  --text:#0D0D0D;--soft:#6b7280;--muted:#9ca3af;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.14);
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  --gold:#c8920a;--goldbg:#fffbeb;
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.shell{max-width:390px;margin:0 auto;min-height:100vh;background:#FAFAF8;position:relative;display:flex;flex-direction:column}
@media(min-width:440px){.shell{border-radius:20px;min-height:92vh;margin-top:4vh;margin-bottom:4vh;background:#fff;box-shadow:0 0 0 1px rgba(0,0,0,.06),0 20px 60px rgba(0,0,0,.08)}}
nav{height:50px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;letter-spacing:-.02em}
.lm{width:24px;height:24px;background:#0D0D0D;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1}
.back{margin-left:auto;font-size:12px;color:var(--soft);display:flex;align-items:center;gap:3px;padding:4px 10px;border-radius:20px;border:1px solid var(--bd);text-decoration:none}
.back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.prog-bar{height:5px;background:var(--bg2);position:sticky;top:50px;z-index:99}
.prog-fill{height:100%;background:linear-gradient(90deg,#FF8C00,#FFD54F,#4CAF50,#2196F3);transition:width .4s cubic-bezier(.4,0,.2,1);width:0%;border-radius:0 3px 3px 0}
.hero{padding:36px 20px 28px;text-align:center;background:linear-gradient(135deg,#FFF3E0,#FFE0B2);color:var(--text);position:relative;overflow:hidden}
.hero::before{content:'⚽';position:absolute;font-size:160px;opacity:.06;right:-30px;top:-20px;transform:rotate(20deg);pointer-events:none}
.hero::after{content:'';position:absolute;left:0;right:0;bottom:0;height:24px;background:linear-gradient(transparent,var(--bg));pointer-events:none}
.hero-tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(0,0,0,.35);border:1px solid rgba(0,0,0,.1);border-radius:20px;padding:3px 10px;margin-bottom:14px;background:rgba(255,255,255,.5)}
.hero h2{font-size:26px;font-weight:900;letter-spacing:-.05em;line-height:1.1;margin-bottom:10px;color:#1a1a1a}
.hero h2 em{font-style:normal;color:#e65100}
.hero p{font-size:13px;color:rgba(0,0,0,.5);line-height:1.6}
.qa-prog{padding:12px 20px;border-bottom:1px solid var(--bd);background:#fff;display:flex;align-items:center;gap:10px}
.qa-prog-track{flex:1;height:5px;background:var(--bg2);border-radius:3px;overflow:hidden}
.qa-prog-fill{height:100%;background:linear-gradient(90deg,#FF8C00,#FFD54F,#4CAF50,#2196F3);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.qa-prog-label{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.qa-qwrap{padding:20px;background:var(--bg)}
.qa-card{background:#fff;border-radius:16px;padding:24px 20px;box-shadow:0 2px 12px rgba(0,0,0,.05),0 1px 3px rgba(0,0,0,.04)}
.qa-qnum{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.qa-qtext{font-size:17px;font-weight:800;letter-spacing:-.03em;line-height:1.4;margin-bottom:18px;color:#1a1a1a}
.qa-opts{display:flex;flex-direction:column;gap:8px}
.qa-opt{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:13px;border:1.5px solid var(--bd);cursor:pointer;background:#fff;font-family:var(--font);text-align:left;width:100%;transition:all .2s;position:relative;overflow:hidden}
.qa-opt::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0;opacity:0;transition:opacity .2s}
.qa-opt[data-k="A"]::before{background:linear-gradient(180deg,#FFD54F,#FF8F00)}
.qa-opt[data-k="B"]::before{background:linear-gradient(180deg,#FFCDD2,#EF5350)}
.qa-opt[data-k="C"]::before{background:linear-gradient(180deg,#BBDEFB,#1E88E5)}
.qa-opt[data-k="D"]::before{background:linear-gradient(180deg,#F8BBD0,#EC407A)}
.qa-opt[data-k="E"]::before{background:linear-gradient(180deg,#B2EBF2,#00ACC1)}
.qa-opt:hover{border-color:var(--bd2);transform:translateX(2px)}
.qa-opt:hover::before{opacity:1}
.qa-opt:active{transform:scale(.98) translateX(2px)}
.qa-opt.sel{border-color:#0D0D0D;background:#0D0D0D}
.qa-opt.sel::before{opacity:0}
.qa-opt.sel .qa-opt-text{color:#fff}
.qa-opt.sel .qa-opt-sub{color:rgba(255,255,255,.5)}
.qa-opt-em{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.qa-opt-body{flex:1}
.qa-opt-text{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.qa-opt-sub{font-size:11px;color:var(--muted);margin-top:2px}
.qa-result{display:none;animation:fadeUp .4s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ===== Result Card ===== */
.res-hero{padding:24px 20px 20px;text-align:center;position:relative;overflow:hidden}
.res-hero[data-star="A"]{background:linear-gradient(135deg,#FFF8E1,#FFD54F)}
.res-hero[data-star="B"]{background:linear-gradient(135deg,#FFEBEE,#FFCDD2)}
.res-hero[data-star="C"]{background:linear-gradient(135deg,#E3F2FD,#BBDEFB)}
.res-hero[data-star="D"]{background:linear-gradient(135deg,#FCE4EC,#F8BBD0)}
.res-hero[data-star="E"]{background:linear-gradient(135deg,#E0F7FA,#B2EBF2)}
.res-hero[data-star="A"] .res-hero-text{color:#5D4037}
.res-hero[data-star="B"] .res-hero-text{color:#B71C1C}
.res-hero[data-star="C"] .res-hero-text{color:#1565C0}
.res-hero[data-star="D"] .res-hero-text{color:#AD1457}
.res-hero[data-star="E"] .res-hero-text{color:#00838F}
.res-hero[data-star="A"] .res-hero-sub{color:rgba(93,64,55,.6)}
.res-hero[data-star="B"] .res-hero-sub{color:rgba(183,28,28,.6)}
.res-hero[data-star="C"] .res-hero-sub{color:rgba(21,101,192,.6)}
.res-hero[data-star="D"] .res-hero-sub{color:rgba(173,20,87,.6)}
.res-hero[data-star="E"] .res-hero-sub{color:rgba(0,131,143,.6)}

.res-avatar{font-size:56px;display:block;margin-bottom:8px;animation:pop .4s cubic-bezier(.34,1.56,.64,1) .1s both}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.res-match-label{font-size:10px;letter-spacing:.12em;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.res-star-name{font-size:28px;font-weight:900;letter-spacing:-.05em;margin-bottom:2px}
.res-star-en{font-size:12px;margin-bottom:14px}

.res-desc{font-size:13px;line-height:1.75;padding:0 4px}

.res-tags{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.res-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px}
.res-hero[data-star="A"] .res-tag{background:rgba(255,213,79,.35);color:#5D4037}
.res-hero[data-star="B"] .res-tag{background:rgba(255,183,185,.35);color:#B71C1C}
.res-hero[data-star="C"] .res-tag{background:rgba(187,222,251,.35);color:#1565C0}
.res-hero[data-star="D"] .res-tag{background:rgba(248,187,208,.35);color:#AD1457}
.res-hero[data-star="E"] .res-tag{background:rgba(178,235,242,.35);color:#00838F}

/* Radar / Quote Section */
.res-radar-quote{margin:0 20px 16px;background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;gap:16px;align-items:flex-start}
.res-radar{width:140px;height:140px;flex-shrink:0}
.res-quote{flex:1;display:flex;flex-direction:column;justify-content:center}
.res-quote-icon{font-size:18px;color:var(--muted);margin-bottom:6px}
.res-quote-text{font-size:13px;font-weight:600;line-height:1.6;color:#444;font-style:italic}
.res-quote-text::before{content:'「';color:var(--muted)}
.res-quote-text::after{content:'」';color:var(--muted)}

.res-body{padding:16px 20px}
.res-sec{margin-bottom:16px}
.res-sec-title{font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.route-strip{background:var(--bg2);border-radius:13px;padding:14px;display:flex;flex-direction:column;gap:0}
.rc-city{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--bd)}
.rc-city:last-child{border-bottom:none;padding-bottom:0}
.rc-city:first-child{padding-top:0}
.rc-dot{width:8px;height:8px;border-radius:50%;background:#0D0D0D;flex-shrink:0}
.rc-info{flex:1}
.rc-name{font-size:14px;font-weight:700}
.rc-note{font-size:11px;color:var(--soft);margin-top:1px}
.luck-card{background:var(--goldbg);border:1px solid rgba(200,146,10,.2);border-radius:13px;padding:14px;font-size:13px;line-height:1.75;color:#7a5800}
.trait-list{display:flex;flex-direction:column;gap:8px}
.trait-row{display:flex;align-items:center;gap:8px}
.trait-lbl{font-size:11px;font-weight:600;color:var(--soft);width:48px;flex-shrink:0}
.trait-track{flex:1;height:5px;background:var(--bg2);border-radius:3px;overflow:hidden}
.trait-bar{height:100%;background:#0D0D0D;border-radius:3px;width:0;transition:width .8s cubic-bezier(.4,0,.2,1)}
.trait-val{font-size:10px;font-weight:700;width:26px;text-align:right;flex-shrink:0}
.share-btn{width:100%;padding:14px;border-radius:13px;background:#0D0D0D;color:#fff;border:none;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;margin-bottom:8px}
.retry-btn{width:100%;padding:13px;border-radius:13px;border:1.5px solid var(--bd);background:#fff;font-size:13px;font-weight:700;font-family:var(--font);color:var(--text);cursor:pointer}
.copy-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#0D0D0D;color:#fff;border-radius:20px;padding:8px 18px;font-size:12px;font-weight:600;z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
.copy-toast.show{opacity:1}
</style>
</head>
<body>
<div class="shell">
<nav>
  <div class="logo"><div class="lm">⚽</div><span>球星匹配</span></div>
  <a href="/08/activity/" class="back"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>活动</a>
</nav>
<div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
<div class="hero">

</div>
<div id="qa-start" style="padding:28px 20px;text-align:center;background:var(--bg)">

  <button onclick="startQA()" style="width:100%;padding:15px;border-radius:13px;background:#0D0D0D;color:#fff;border:none;font-size:15px;font-weight:800;font-family:var(--font);cursor:pointer">⚡ 开始匹配</button>
</div>
<div class="qa-prog" id="qa-prog" style="display:none">

</div>
<div id="qa-qwrap" style="display:none" class="qa-qwrap">

  </div>
</div>
<div id="qa-result" class="qa-result"></div>
</div>
<div class="copy-toast" id="copy-toast"></div>
<script>
var QS=[
  {q:'旅行前，你的第一个冲动是...',opts:[{k:'A',em:'🗺️',t:'找那些鲜为人知的小街巷',s:'越隐秘越有味道'},{k:'B',em:'📸',t:'先看哪里最出片、最能拍大片',s:'每个地方都要留下完美画面'},{k:'C',em:'🚀',t:'订最快的交通，多城市连刷',s:'我想在最短时间去最多地方'},{k:'D',em:'📋',t:'做详细攻略，逐小时安排',s:'没有计划就没有完美旅途'},{k:'E',em:'🎲',t:'随便，到了再说',s:'最好的惊喜都是计划外的'}]},
  {q:'在旅途中，你最享受的瞬间是...',opts:[{k:'A',em:'🔍',t:'发现一家只有当地人去的小馆子',s:'这才叫真正融入'},{k:'B',em:'✨',t:'每个景点都拍出了满意的照片',s:'回头看行程，张张都值得发'},{k:'C',em:'⚡',t:'24小时内跨越两个城市',s:'效率感让我兴奋'},{k:'D',em:'📌',t:'行程完全按计划推进，没有意外',s:'掌控感就是安全感'},{k:'E',em:'🌊',t:'在街头碰到意外的精彩',s:'剧本之外才是旅行本质'}]},
  {q:'旅途碰到麻烦（堵车/景点关门），你会...',opts:[{k:'A',em:'🧘',t:'沉住气，慢慢找替代方案',s:'急有什么用，先观察再出手'},{k:'B',em:'🔄',t:'立刻找下一个同类打卡点',s:'不能浪费任何时间'},{k:'C',em:'💨',t:'立刻出发去下一个城市',s:'错过了就跳过，前方更精彩'},{k:'D',em:'📲',t:'对照备用计划B，调整时间表',s:'麻烦早在我的预案里'},{k:'E',em:'😂',t:'当成好玩的故事，随遇而安',s:'最难忘的经历往往来自意外'}]},
  {q:'如果只能去一类地方，你会选...',opts:[{k:'A',em:'🏘️',t:'老城区、本地菜市场、历史小巷',s:'文化从来藏在细节里'},{k:'B',em:'🌅',t:'有绝美风景的网红地标',s:'视觉冲击才是旅行的意义'},{k:'C',em:'🌍',t:'跨越多个城市的连轴转路线',s:'数量带来的满足感无可替代'},{k:'D',em:'🎯',t:'提前做好功课的必去清单',s:'有准备才不会后悔'},{k:'E',em:'🎪',t:'路边随机碰到什么就去什么',s:'目的地是用来打破的'}]},
  {q:'结束旅行，你会怎么记录？',opts:[{k:'A',em:'📓',t:'写一篇深度游记，记下每个细节',s:'那些小发现值得被记住'},{k:'B',em:'🖼️',t:'精修一组照片发社交媒体',s:'要让别人羡慕'},{k:'C',em:'✅',t:'把打卡地列个完成清单',s:'成就感来自数量'},{k:'D',em:'📊',t:'整理旅行总结，优化下次行程',s:'每次旅行都是数据积累'},{k:'E',em:'🤳',t:'发一条朋友圈，然后忘了',s:'活在当下，不留遗憾'}]},
  {q:'选队伍支持你会怎么选？',opts:[{k:'A',em:'🏰',t:'传统豪门，历史厚度最重要',s:'荣耀需要时间积累'},{k:'B',em:'💎',t:'阵容最华丽、最有颜值的球队',s:'好看就是生产力'},{k:'C',em:'🚄',t:'打法最快、进球最多的球队',s:'效率才是现代足球的核心'},{k:'D',em:'📐',t:'战术最成熟、赢球最有逻辑的',s:'统治力来自体系'},{k:'E',em:'🎭',t:'最有戏剧感、最会翻盘的',s:'没有冷门的比赛不好看'}]}
];
var STARS={
  A:{avatar:'🐐',name:'梅西',en:'Lionel Messi · El Pibe de Oro',desc:'你不需要大张旗鼓，却总能在关键时刻爆发。你喜欢把旅行做深，而不是做宽——找到一个城市的灵魂，比走完十个城市的表面更让你满足。',tags:['深度感','文化猎人','话少事多','爆发于细节'],route:[{city:'布宜诺斯艾利斯',note:'博卡青年主场 La Bombonera · 探索他出发的地方'},{city:'巴塞罗那',note:'哥特区老城 · 诺坎普球场 · 他最辉煌的20年'},{city:'里斯本',note:'阿尔法玛历史街区 · 只有当地人知道的好去处'},{city:'那不勒斯',note:'老城巷弄 · 世界最好的披萨 · 足球文化圣地'}],luck:'🔮 出发前默想一个目标，不说出口。在最普通的街角驻足三分钟——传奇从来藏在最不起眼的地方。幸运数字：10',traits:[{n:'深度感',v:98},{n:'爆发力',v:92},{n:'内敛度',v:85},{n:'文化力',v:96},{n:'规划性',v:55}]},

/* ===== Radar Chart Data ===== */
/* 5 dims: 速度 / 技术 / 领导力 / 创造力 / 爆发力 (values 0-100) */
var RADAR={
  A:{label:'梅西',values:[72,99,90,97,92],dims:['速度','技术','领导力','创造力','爆发力'],
    stroke:'#C67F00',fill:'rgba(255,213,79,.25)'},
  B:{label:'C罗',values:[94,88,92,70,98],dims:['速度','技术','领导力','创造力','爆发力'],
    stroke:'#C62828',fill:'rgba(255,183,185,.25)'},
  C:{label:'姆巴佩',values:[99,84,72,75,96],dims:['速度','技术','领导力','创造力','爆发力'],
    stroke:'#1565C0',fill:'rgba(187,222,251,.3)'},
  D:{label:'贝克汉姆',values:[70,90,85,92,72],dims:['速度','技术','领导力','创造力','爆发力'],
    stroke:'#AD1457',fill:'rgba(248,187,208,.3)'},
  E:{label:'马拉多纳',values:[82,98,96,95,94],dims:['速度','技术','领导力','创造力','爆发力'],
    stroke:'#00838F',fill:'rgba(178,235,242,.3)'}
};

/* ===== Player Quotes ===== */
var QUOTES={
  A:'把球交给能传的人，把旅行留给懂的人。',
  B:'每一天都值得被记住，每一秒都要全力以赴。',
  C:'世界很大，但我的脚步更快。',
  D:'优雅不是偶然，是一切尽在掌握的结果。',
  E:'传奇不需要脚本，只需要勇气。'
};

/* ===== Radar SVG Builder ===== */
function buildRadarSVG(key){
  var r=RADAR[key], cx=70, cy=70, maxR=52, n=5;
  var pts=[], labels=[];
  for(var i=0;i<n;i++){
    var angle=Math.PI*2*i/n - Math.PI/2;
    var v=r.values[i]/100;
    pts.push((cx+maxR*v*Math.cos(angle)).toFixed(1)+','+(cy+maxR*v*Math.sin(angle)).toFixed(1));
    labels.push({x:(cx+(maxR+12)*Math.cos(angle)).toFixed(1),y:(cy+(maxR+12)*Math.sin(angle)+4).toFixed(1),text:r.dims[i]});
  }
  var gridPts=[];
  for(var j=0;j<n;j++){var a=Math.PI*2*j/n-Math.PI/2;gridPts.push((cx+maxR*Math.cos(a)).toFixed(1)+','+(cy+maxR*Math.sin(a)).toFixed(1));}
  var g1=gridPts.join(' ');
  var gridPts2=[];
  for(var j=0;j<n;j++){var a=Math.PI*2*j/n-Math.PI/2;gridPts2.push((cx+maxR*0.5*Math.cos(a)).toFixed(1)+','+(cy+maxR*0.5*Math.sin(a)).toFixed(1));}
  var g2=gridPts2.join(' ');
  var lines=[];
  for(var j=0;j<n;j++){var a=Math.PI*2*j/n-Math.PI/2;lines.push('<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+maxR*Math.cos(a)).toFixed(1)+'" y2="'+(cy+maxR*Math.sin(a)).toFixed(1)+'" stroke="'+r.stroke+'" stroke-opacity=".15" stroke-width=".8"/>');}
  var labelHTML='';
  labels.forEach(function(l){labelHTML+='<text x="'+l.x+'" y="'+l.y+'" text-anchor="middle" font-size="8" fill="'+r.stroke+'" font-weight="600">'+l.text+'</text>';});
  return '<svg class="res-radar" viewBox="0 0 140 140">'+
    '<polygon points="'+g1+'" fill="none" stroke="'+r.stroke+'" stroke-opacity=".12" stroke-width=".8"/>'+
    '<polygon points="'+g2+'" fill="none" stroke="'+r.stroke+'" stroke-opacity=".1" stroke-width=".6"/>'+
    lines.join('')+
    '<polygon points="'+pts.join(' ')+'" fill="'+r.fill+'" stroke="'+r.stroke+'" stroke-width="1.8" stroke-linejoin="round"/>'+
    labelHTML+
    '</svg>';
}

var answers={},resultStar=null;
function startQA(){
  document.getElementById('qa-start').style.display='none';
  document.getElementById('qa-prog').style.display='flex';
  document.getElementById('qa-qwrap').style.display='block';
  renderQ(0);
}
function renderQ(i){
  var q=QS[i];
  document.getElementById('qa-qnum').textContent='Q'+(i+1)+' / '+QS.length;
  document.getElementById('qa-qtext').textContent=q.q;
  var html='';
  q.opts.forEach(function(o){html+='<button class="qa-opt" data-k="'+o.k+'" onclick="pickOpt('+i+',\''+o.k+'\')"><div class="qa-opt-em">'+o.em+'</div><div class="qa-opt-body"><div class="qa-opt-text">'+o.t+'</div><div class="qa-opt-sub">'+o.s+'</div></div></button>';});
  document.getElementById('qa-opts').innerHTML=html;
  document.getElementById('qa-fill').style.width=Math.round(i/QS.length*100)+'%';
  document.getElementById('qa-label').textContent=i+' / '+QS.length;
  document.getElementById('qa-qwrap').scrollIntoView({behavior:'smooth',block:'start'});
}
function pickOpt(qi,key){
  answers[qi]=key;
  document.querySelectorAll('.qa-opt').forEach(function(el){el.classList.toggle('sel',el.dataset.k===key);});
  document.getElementById('qa-fill').style.width=Math.round((qi+1)/QS.length*100)+'%';
  document.getElementById('qa-label').textContent=(qi+1)+' / '+QS.length;
  setTimeout(function(){if(qi+1<QS.length){renderQ(qi+1);}else{showResult();}},500);
}
function showResult(){
  var cnt={A:0,B:0,C:0,D:0,E:0};
  Object.values(answers).forEach(function(k){cnt[k]=(cnt[k]||0)+1;});
  var best=Object.keys(cnt).reduce(function(a,b){return cnt[a]>=cnt[b]?a:b;});
  resultStar=best;
  var s=STARS[best];
  document.getElementById('qa-prog').style.display='none';
  document.getElementById('qa-qwrap').style.display='none';
  var routeHTML=s.route.map(function(r){return '<div class="rc-city"><div class="rc-dot"></div><div class="rc-info"><div class="rc-name">'+r.city+'</div><div class="rc-note">'+r.note+'</div></div></div>';}).join('');
  var traitHTML=s.traits.map(function(t){return '<div class="trait-row"><div class="trait-lbl">'+t.n+'</div><div class="trait-track"><div class="trait-bar" data-v="'+t.v+'"></div></div><div class="trait-val">'+t.v+'</div></div>';}).join('');
  var tagsHTML=s.tags.map(function(t){return '<span class="res-tag">'+t+'</span>';}).join('');
  var radarSVG=buildRadarSVG(best);
  var quote=QUOTES[best]||'';
  var html='<div class="res-hero" data-star="'+best+'"><span class="res-avatar">'+s.avatar+'</span><div class="res-hero-text"><div class="res-match-label">⚡ 你最像</div><div class="res-star-name">'+s.name+'</div><div class="res-star-en">'+s.en+'</div></div><div class="res-hero-text"><div class="res-desc">'+s.desc+'</div><div class="res-tags">'+tagsHTML+'</div></div></div><div class="res-radar-quote">'+radarSVG+'<div class="res-quote"><div class="res-quote-icon">💬</div><div class="res-quote-text">'+quote+'</div></div></div><div class="res-body"><div class="res-sec"><div class="res-sec-title">🗺️ 专属朝圣路线</div><div class="route-strip">'+routeHTML+'</div></div><div class="res-sec"><div class="res-sec-title">🔮 玄学开运指引</div><div class="luck-card">'+s.luck+'</div></div><div class="res-sec"><div class="res-sec-title">📊 旅行气质</div><div class="trait-list">'+traitHTML+'</div></div><div class="res-sec"><button class="share-btn" onclick="copyResult()">📋 复制我的球星结果</button><button class="retry-btn" onclick="retryQA()">🔄 重新测一次</button></div></div>';
  var res=document.getElementById('qa-result');
  res.innerHTML=html;res.style.display='block';
  res.scrollIntoView({behavior:'smooth',block:'start'});
  setTimeout(function(){document.querySelectorAll('.trait-bar').forEach(function(el){el.style.width=el.dataset.v+'%';});},400);
}
function copyResult(){
  if(!resultStar)return;
  var s=STARS[resultStar];
  var text='⚽ 我的球星人格匹配\n\n'+s.avatar+' 我最像：'+s.name+'\n\n'+s.desc+'\n\n🗺️ 专属朝圣路线：'+s.route.map(function(r){return r.city;}).join(' → ')+'\n\n'+s.luck;
  try{navigator.clipboard.writeText(text);}catch(e){var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
  var t=document.getElementById('copy-toast');t.textContent='✅ 已复制！';t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);
}
function retryQA(){
  answers={};resultStar=null;
  document.getElementById('qa-result').style.display='none';
  document.getElementById('qa-result').innerHTML='';
  document.getElementById('qa-start').style.display='block';
  document.getElementById('qa-prog').style.display='none';
  document.getElementById('qa-qwrap').style.display='none';
  document.getElementById('progFill').style.width='0%';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
