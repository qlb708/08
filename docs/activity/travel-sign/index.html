<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FATE TRIP · 让命运为你选路</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#c9a84c;--gold2:#e8c87a;--gold3:#f5dfa0;
  --bg:#0d0a14;--card-bg:#1a1428;--white:#fff;
  --text:#f0ead8;--muted:#9b8fa8;--red:#8b1a1a;--red2:#c0392b;
  --card-r:20px;--sh:0 12px 40px rgba(0,0,0,.5);
}
html,body{height:100%;background:var(--bg);font-family:'PingFang SC','Hiragino Sans GB',sans-serif;overflow:hidden;color:var(--text)}

/* ===== 星空背景 ===== */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ===== 页面切换 ===== */
.page{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .5s,transform .5s;z-index:1}
.page.hidden{opacity:0;pointer-events:none;transform:translateY(20px)}

/* ===== 返回按钮 ===== */
.back-btn{position:fixed;top:16px;left:16px;z-index:999;
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.06);backdrop-filter:blur(10px);
  border:1px solid rgba(201,168,76,.2);border-radius:40px;
  padding:7px 14px 7px 10px;cursor:pointer;text-decoration:none;
  font-size:13px;color:var(--gold);font-weight:600;
  box-shadow:0 2px 10px rgba(0,0,0,.3);transition:background .15s}
.back-btn:hover{background:rgba(255,255,255,.1)}

/* ===== 屏1：输入页 ===== */
#p1{padding:32px 24px;gap:0;justify-content:center}
.logo-wrap{text-align:center;margin-bottom:36px}
.logo-en{font-size:42px;font-weight:900;letter-spacing:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold2),var(--gold3),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  font-family:Georgia,serif;line-height:1}
.logo-zh{font-size:12px;color:var(--muted);letter-spacing:4px;margin-top:10px}
.logo-deco{display:flex;align-items:center;gap:8px;justify-content:center;margin:12px 0}
.logo-deco::before,.logo-deco::after{content:'';width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold))}
.logo-deco span{color:var(--gold);font-size:10px;letter-spacing:3px}

.form-wrap{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px}
.inp-label{font-size:11px;color:var(--gold);margin-bottom:4px;letter-spacing:2px;text-transform:uppercase}
.inp{width:100%;border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:12px 16px;
  font-size:15px;background:rgba(255,255,255,.05);color:var(--text);outline:none;
  transition:border-color .2s;font-family:inherit;
  backdrop-filter:blur(10px)}
.inp:focus{border-color:var(--gold);background:rgba(255,255,255,.08)}
.inp::placeholder{color:rgba(155,143,168,.5)}
textarea.inp{resize:none;height:80px;line-height:1.6}

.seek-btn{width:100%;padding:15px;border:none;border-radius:14px;cursor:pointer;
  background:linear-gradient(135deg,#7c5a00,var(--gold),var(--gold2),var(--gold));
  font-size:16px;font-weight:800;color:#1a0f00;letter-spacing:4px;
  box-shadow:0 4px 24px rgba(201,168,76,.4),0 0 60px rgba(201,168,76,.1);
  transition:transform .15s,box-shadow .15s;margin-top:4px;
  font-family:Georgia,serif;position:relative;overflow:hidden}
.seek-btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.15) 50%,transparent 70%);
  transform:translateX(-100%);transition:transform .5s}
.seek-btn:active{transform:scale(.97)}
.seek-btn:hover::after{transform:translateX(100%)}

.count-sel{display:flex;align-items:center;gap:0;border:1px solid rgba(201,168,76,.2);border-radius:10px;overflow:hidden}
.count-sel label{flex:1;text-align:center;padding:9px 4px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .2s}
.count-sel input[type=radio]{display:none}
.count-sel input:checked+label{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#1a0f00;font-weight:700}

/* ===== 屏2：抽签页 ===== */
#p2{padding:20px;gap:0;justify-content:flex-start;padding-top:52px}
.sign-header{text-align:center;margin-bottom:24px;width:100%}
.sign-title{font-size:15px;color:var(--gold);letter-spacing:2px;font-family:Georgia,serif}
.sign-remain{font-size:12px;color:var(--muted);margin-top:5px;letter-spacing:1px}

/* 翻牌卡片 */
.flip-area{position:relative;flex-shrink:0;width:100%;display:flex;flex-direction:column;align-items:center}
.flip-card{width:230px;height:330px;perspective:1200px;cursor:pointer;position:relative}
.flip-inner{width:100%;height:100%;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.4,0,.2,1);position:relative}
.flip-inner.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:22px}

/* 卡背（未翻时可见）*/
.flip-front{
  background:linear-gradient(160deg,#3d0808 0%,#7a1515 35%,#c0392b 60%,#7a1515 85%,#3d0808 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:var(--sh),0 0 40px rgba(192,57,43,.3);position:relative;overflow:hidden;
}
.front-bg{position:absolute;inset:0;
  background-image:repeating-linear-gradient(45deg,rgba(232,200,122,.04) 0,rgba(232,200,122,.04) 1px,transparent 1px,transparent 8px),
                   repeating-linear-gradient(-45deg,rgba(232,200,122,.04) 0,rgba(232,200,122,.04) 1px,transparent 1px,transparent 8px);
}
.sign-char{font-size:96px;color:var(--gold2);font-family:Georgia,serif;line-height:1;
  text-shadow:0 0 30px rgba(232,200,122,.5),0 2px 6px rgba(0,0,0,.4);
  user-select:none;position:relative;z-index:1}
.card-frame{position:absolute;inset:10px;border:1.5px solid rgba(232,200,122,.25);border-radius:14px;pointer-events:none}
.card-corner{position:absolute;width:18px;height:18px;border-color:rgba(232,200,122,.6);border-style:solid}
.card-corner.tl{top:16px;left:16px;border-width:2px 0 0 2px}
.card-corner.tr{top:16px;right:16px;border-width:2px 2px 0 0}
.card-corner.bl{bottom:16px;left:16px;border-width:0 0 2px 2px}
.card-corner.br{bottom:16px;right:16px;border-width:0 2px 2px 0}
.front-hint{position:absolute;bottom:24px;font-size:11px;color:rgba(232,200,122,.5);letter-spacing:3px;z-index:1}

/* 卡正面（翻牌后可见）*/
.flip-back{
  transform:rotateY(180deg);
  background:linear-gradient(155deg,#1e1630,#2a1f40,#1a1228);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 18px;box-shadow:var(--sh);border:1px solid rgba(201,168,76,.15);
}
.poi-icon{font-size:52px;margin-bottom:6px;line-height:1;filter:drop-shadow(0 0 12px rgba(201,168,76,.3))}
.poi-name{font-size:20px;font-weight:900;color:var(--text);margin-bottom:6px;text-align:center}
.poi-type-badge{font-size:11px;color:#1a0f00;background:linear-gradient(135deg,var(--gold),var(--gold2));
  padding:3px 10px;border-radius:20px;letter-spacing:1px;font-weight:700}
.poi-divider{width:120px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.4),transparent);margin:14px 0}
.poi-phrase{font-size:13px;color:var(--gold3);text-align:center;line-height:1.8;letter-spacing:.5px;
  font-style:italic;font-family:Georgia,serif}
.poi-desc{font-size:11px;color:var(--muted);text-align:center;margin-top:8px;line-height:1.6}

/* 粒子 */
#particle-canvas{position:absolute;top:0;left:50%;transform:translateX(-50%);width:230px;height:330px;pointer-events:none;z-index:10}

/* 摇一摇提示 */
.shake-ring{width:56px;height:56px;border-radius:50%;border:1.5px solid rgba(201,168,76,.2);
  display:flex;align-items:center;justify-content:center;margin:16px auto 0;
  animation:pulse-ring 2s ease-in-out infinite}
@keyframes pulse-ring{0%,100%{border-color:rgba(201,168,76,.1);transform:scale(1)}50%{border-color:rgba(201,168,76,.4);transform:scale(1.08)}}
.shake-icon{font-size:24px;animation:shake-it 2s ease-in-out infinite}
@keyframes shake-it{0%,100%{transform:rotate(0)}20%{transform:rotate(-15deg)}40%{transform:rotate(12deg)}60%{transform:rotate(-8deg)}80%{transform:rotate(5deg)}}
.shake-label{font-size:11px;color:rgba(155,143,168,.6);letter-spacing:2px;text-align:center;margin-top:6px}

.next-btn{margin-top:12px;padding:12px 32px;border:none;border-radius:40px;cursor:pointer;
  font-size:14px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#1a0f00;letter-spacing:2px;
  box-shadow:0 4px 16px rgba(201,168,76,.3);transition:transform .15s;font-family:inherit;display:none}
.next-btn:active{transform:scale(.96)}

/* ===== 屏3：结果页 ===== */
#p3{padding:28px 20px;justify-content:flex-start;padding-top:40px;overflow-y:auto}
.result-hd{text-align:center;margin-bottom:16px;flex-shrink:0}
.result-en{font-size:11px;color:var(--gold);letter-spacing:4px;font-family:Georgia,serif;margin-bottom:4px}
.result-title{font-size:20px;font-weight:900;color:var(--text)}
.result-title span{color:var(--gold)}

/* 海报区 */
#poster{width:100%;max-width:340px;background:linear-gradient(155deg,#1a1030,#261840,#1a1030);
  border-radius:18px;border:1px solid rgba(201,168,76,.2);overflow:hidden;margin-bottom:12px;
  box-shadow:var(--sh)}
.poster-header{padding:16px 18px 12px;border-bottom:1px solid rgba(201,168,76,.1);
  display:flex;justify-content:space-between;align-items:center}
.poster-brand{font-size:13px;color:var(--gold);font-family:Georgia,serif;letter-spacing:2px}
.poster-dest{font-size:11px;color:var(--muted)}
.poster-pois{padding:12px 18px;display:flex;flex-direction:column;gap:10px}
.poster-poi{display:flex;align-items:center;gap:12px}
.poster-poi-icon{font-size:26px;flex-shrink:0}
.poster-poi-info{}
.poster-poi-name{font-size:14px;font-weight:700;color:var(--text)}
.poster-poi-phrase{font-size:11px;color:var(--gold3);font-style:italic;line-height:1.5;margin-top:2px}
.poster-footer{padding:10px 18px 14px;border-top:1px solid rgba(201,168,76,.1);
  display:flex;justify-content:space-between;align-items:center}
.fortune-mini{font-size:11px;color:var(--muted);flex:1;line-height:1.6;padding-right:10px}
.fate-badge{font-size:9px;color:var(--gold);border:1px solid rgba(201,168,76,.3);
  border-radius:6px;padding:4px 8px;letter-spacing:1px;white-space:nowrap}

/* 心动按钮 */
.heart-btn{width:100%;max-width:340px;padding:15px;border:none;border-radius:14px;cursor:pointer;
  background:linear-gradient(135deg,#8b2252,#c0396e,#e8527e);
  color:#fff;font-size:16px;font-weight:800;letter-spacing:2px;
  box-shadow:0 4px 20px rgba(192,57,110,.4);transition:transform .15s;
  margin-bottom:10px;font-family:inherit}
.heart-btn:active{transform:scale(.97)}
.heart-btn.sent{background:linear-gradient(135deg,#4a3060,#6b4890);
  box-shadow:0 4px 20px rgba(107,72,144,.3)}

.r-btns{display:flex;gap:8px;width:100%;max-width:340px}
.r-btn{flex:1;padding:12px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;
  letter-spacing:1px;transition:transform .15s;border:none;font-family:inherit}
.r-btn:active{transform:scale(.97)}
.r-btn-copy{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.25)}
.r-btn-restart{background:rgba(255,255,255,.06);color:var(--muted);border:1px solid rgba(255,255,255,.1)}
</style>
</head>

<script>
// ===== 星空 =====
(function(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight}
  resize(); window.addEventListener('resize',resize);
  const stars=[];
  for(let i=0;i<120;i++) stars.push({x:Math.random(),y:Math.random(),r:.3+Math.random()*1.2,a:Math.random(),da:.005+Math.random()*.01});
  function draw(){
    ctx.fillStyle='#0d0a14';ctx.fillRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a+=s.da; if(s.a>1||s.a<0) s.da*=-1;
      ctx.globalAlpha=s.a*.7;
      ctx.fillStyle=`hsl(${40+Math.random()*10},60%,85%)`;
      ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  draw();
})();

  '文化':['今日宜静心参拜，忌走马观花 🙏','历史不言语，却回答一切问题','你来这里，不是偶然'],
  '夜市':['今日宜放下计划，忌早睡 🍺','灯火最亮处，就是今晚的归宿','摊主的笑容，是城市送你的礼物'],
  '风景':['今日宜驻足凝望，忌赶行程 🌅','美景不等人，但为你留了一秒','站在这里，所有烦恼都变小了'],
  '美食':['今日宜大胆点餐，忌节食 🍜','这一口，是旅行最诚实的部分','吃饱了再说走，这是对城市的尊重'],
  '自然':['今日宜深呼吸，忌看手机 🌿','自然界的钟表没有分针','你选了它，它也选了你'],
  '散步':['今日宜无目的漫游，忌导航 🍁','没有目的地的路，往往通向最好的地方','今天的脚步，明天会感谢'],
  '景点':['今日宜认真感受，忌只拍照 ⛩️','打卡是手段，感受是目的','这里见过太多人，但只记得认真的那个'],
  '休闲':['今日宜发呆，忌赶行程 ☕','一杯的时间，刚好够想清楚','坐下来，城市会来跟你说话'],
};

const FORTUNES=[
  '命运落定。你不是随机选中这几个地方的，是它们在等你。',
  '签语已定，出发吧。旅行从来不需要完美计划，只需要此刻的勇气。',
  '这条路线，是你内心深处的渴望在说话。带着它上路，命运会补全剩下的。',
];

let dest='',pois=[],curIdx=0,flipped=false,signCount=3;

// ===== 工具函数 =====
function goPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
  setTimeout(()=>document.getElementById(id).classList.remove('hidden'),50);
}
function extractPOIs(d,txt){
  let pool=CITY_POIS['default'];
  Object.keys(CITY_POIS).forEach(k=>{if(d.includes(k)||txt.includes(k))pool=CITY_POIS[k];});
  return [...pool].sort(()=>Math.random()-.5).slice(0,signCount);
}
function getPhrase(type){
  const arr=SIGN_PHRASES[type]||['今日宜出发，忌犹豫 ✦'];
  return arr[Math.floor(Math.random()*arr.length)];
}

// ===== 开始 =====
function startSign(){
  dest=document.getElementById('destInp').value.trim()||'远方';
  const plan=document.getElementById('planInp').value.trim();
  signCount=parseInt(document.querySelector('input[name=cnt]:checked').value)||3;
  pois=extractPOIs(dest,plan);
  curIdx=0;flipped=false;
  document.getElementById('signTitle').textContent='✦ '+dest+' FATE TRIP ✦';
  updateRemain();resetCard();goPage('p2');setupShake();
}

function updateRemain(){
  const el=document.getElementById('signRemain');
  if(!flipped){
    el.textContent=`点击卡片 · 揭晓第 ${curIdx+1} 签`;
    document.getElementById('shakeRing').style.display='flex';
  } else {
    const left=pois.length-curIdx-1;
    el.textContent=left>0?`还剩 ${left} 签 · 继续拆`:'全部揭晓 · 查看命定路线';
    document.getElementById('shakeRing').style.display='none';
  }
}

function resetCard(){
  document.getElementById('flipInner').classList.remove('flipped');
  document.getElementById('flipCard').style.pointerEvents='auto';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('shakeRing').style.display='flex';
  flipped=false;
}

function loadPOI(idx){
  const p=pois[idx];
  document.getElementById('bIcon').textContent=p.icon;
  document.getElementById('bName').textContent=p.name;
  document.getElementById('bType').textContent=p.type;
  document.getElementById('bPhrase').textContent=getPhrase(p.type);
  document.getElementById('bDesc').textContent=p.desc;
}

// ===== 翻牌 =====
function flipSign(){
  if(flipped)return;
  flipped=true;
  loadPOI(curIdx);
  document.getElementById('flipInner').classList.add('flipped');
  document.getElementById('flipCard').style.pointerEvents='none';
  spawnParticles();
  setTimeout(()=>{
    updateRemain();
    const nb=document.getElementById('nextBtn');
    nb.style.display='block';
    nb.textContent=curIdx<pois.length-1?'再拆一签 →':'查看命定路线 ✦';
  },500);
}

function nextSign(){
  if(curIdx>=pois.length-1){showResult();return;}
  curIdx++;resetCard();updateRemain();
}

// ===== 粒子 =====
function spawnParticles(){
  const canvas=document.getElementById('particle-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=230;canvas.height=330;
  const particles=[];
  for(let i=0;i<40;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=1.5+Math.random()*3.5;
    particles.push({x:115,y:165,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed-1,
      r:1+Math.random()*2.5,alpha:1,
      color:`hsl(${38+Math.random()*15},${80+Math.random()*20}%,${55+Math.random()*20}%)`});
  }
  let frame=0;
  (function draw(){
    ctx.clearRect(0,0,230,330);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.alpha-=0.018;
      if(p.alpha<=0)return;
      ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    if(++frame<70)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,230,330);
  })();
}

// ===== 摇一摇 =====
function setupShake(){
  let last=0;
  window.addEventListener('devicemotion',function(e){
    if(flipped)return;
    const a=e.accelerationIncludingGravity;if(!a)return;
    const mag=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z);
    const now=Date.now();
    if(mag>13&&now-last>900){last=now;flipSign();}
  });
}

// ===== 结果页 =====
function showResult(){
  document.getElementById('posterDest').textContent=dest;
  const list=document.getElementById('posterPois');
  list.innerHTML='';
  pois.forEach(p=>{
    const d=document.createElement('div');
    d.className='poster-poi';
    d.innerHTML=`<div class="poster-poi-icon">${p.icon}</div><div class="poster-poi-info"><div class="poster-poi-name">${p.name}</div><div class="poster-poi-phrase">${getPhrase(p.type)}</div></div>`;
    list.appendChild(d);
  });
  document.getElementById('fortuneMini').textContent=FORTUNES[Math.floor(Math.random()*FORTUNES.length)];
  document.getElementById('heartBtn').className='heart-btn';
  document.getElementById('heartBtn').textContent='我也想去 💛';
  goPage('p3');
}

// ===== 心动反馈 =====
function sendHeart(){
  const btn=document.getElementById('heartBtn');
  btn.className='heart-btn sent';
  btn.textContent='✓ 已发送心动通知 · 对方会收到你的回应';
  // 真实场景：调后端接口，这里模拟
  setTimeout(()=>{btn.textContent='💜 心动已送达';},1200);
}

// ===== 复制 =====
function copyShare(){
  const text=`✦ 我的 ${dest} FATE TRIP ✦\n${pois.map(p=>p.icon+' '+p.name+' · '+getPhrase(p.type)).join('\n')}\n\n让命运为你选路 → https://qlb708.github.io/08/activity/travel-sign/`;
  const btn=event.target;
  navigator.clipboard.writeText(text).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  });
  btn.textContent='✅ 已复制';setTimeout(()=>btn.textContent='📋 复制分享',1500);
}

function restart(){
  document.getElementById('destInp').value='';
  document.getElementById('planInp').value='';
  goPage('p1');
}
</script>
