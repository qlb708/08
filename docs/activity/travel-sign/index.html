<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FATE TRIP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
  --bg:#07101f;
  --blue:#1a4a9e;--blue2:#2a6ad4;--blue3:#4a90d9;--blue4:#7ab8f5;
  --gold:#d4af5a;--gold2:#f0cc7a;
  --text:#e8f4ff;--muted:#5a80a8;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'PingFang SC','Hiragino Sans GB',sans-serif;color:var(--text)}

/* ─── 星空 ─── */
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.s{position:absolute;border-radius:50%;background:#fff;animation:tw ease-in-out infinite alternate}
@keyframes tw{from{opacity:.04}to{opacity:.55}}

/* ─── 页面容器 ─── */
.screen{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity .5s,transform .5s}
.screen.out{opacity:0;pointer-events:none;transform:scale(.96)}
.screen.in-up{opacity:0;pointer-events:none;transform:translateY(30px)}

/* ─── 返回 ─── */
.back{position:fixed;top:20px;left:18px;z-index:99;
  display:flex;align-items:center;gap:4px;
  font-size:13px;color:var(--muted);text-decoration:none;
  transition:color .2s;padding:6px}
.back:hover{color:var(--blue4)}
.back svg{opacity:.7}

/* ═══════════════════════════════
   屏1  封面
═══════════════════════════════ */
#s1{}
.s1-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:32px;width:100%}
.brand{font-family:Georgia,serif;font-size:52px;font-weight:900;letter-spacing:10px;line-height:1;
  background:linear-gradient(160deg,var(--blue4),var(--text),var(--blue3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center}
.brand-sub{font-size:11px;color:var(--muted);letter-spacing:4px;margin-top:10px;text-align:center}
.brand-rule{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--blue3),transparent);
  margin:16px auto}
.tagline{font-size:15px;color:rgba(184,217,255,.7);text-align:center;line-height:1.8;
  padding:0 40px}
.tagline strong{color:var(--blue4);font-weight:700}

.s1-bottom{width:100%;padding:0 28px 52px;display:flex;flex-direction:column;gap:14px}
.dest-wrap{position:relative}
.dest-input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(74,144,217,.2);
  border-radius:16px;padding:16px 20px;font-size:18px;color:var(--text);outline:none;
  font-family:inherit;text-align:center;letter-spacing:1px;
  transition:border-color .25s,background .25s}
.dest-input::placeholder{color:rgba(90,128,168,.6);font-size:16px}
.dest-input:focus{border-color:var(--blue3);background:rgba(255,255,255,.08)}

.start-btn{width:100%;padding:18px;border:none;border-radius:16px;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--blue2),var(--blue3));
  font-size:17px;font-weight:800;color:#fff;letter-spacing:4px;
  font-family:Georgia,serif;
  box-shadow:0 8px 32px rgba(42,106,212,.4),0 0 0 1px rgba(74,144,217,.15);
  transition:transform .15s,box-shadow .2s;position:relative;overflow:hidden}
.start-btn::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.1) 50%,transparent 70%);
  transform:translateX(-100%);transition:transform .6s}
.start-btn:hover::after{transform:translateX(100%)}
.start-btn:active{transform:scale(.97);box-shadow:0 4px 16px rgba(42,106,212,.3)}

/* ═══════════════════════════════
   屏2  翻牌  （全屏沉浸）
═══════════════════════════════ */
#s2{background:transparent}
.remain-badge{position:fixed;top:22px;right:20px;z-index:10;
  font-size:12px;color:var(--muted);letter-spacing:2px}
.dest-badge{position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:10;
  font-size:12px;color:var(--blue4);letter-spacing:2px;
  font-family:Georgia,serif;white-space:nowrap}

/* 全屏卡片舞台 */
.stage{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  position:relative}

/* 卡片 */
.card-wrap{width:min(76vw,300px);position:relative;cursor:pointer}
.card-ratio{width:100%;padding-top:145%;position:relative}/* 约 2:3 比例 */
.card-scene{position:absolute;inset:0}
/* perspective 单独给 scene */
.card-3d{width:100%;height:100%;transform-style:preserve-3d;
  transition:transform .7s cubic-bezier(.4,0,.15,1);position:relative}
.card-3d.flipped{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:24px;overflow:hidden}

/* 正面（背）—— 蓝色锦缎 */
.card-back-face{
  background:linear-gradient(155deg,#0b2050 0%,#1a4a9e 40%,#2a6ad4 65%,#1a4a9e 85%,#0b2050 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 24px 64px rgba(0,0,0,.6),0 0 0 1px rgba(74,144,217,.12),
    inset 0 1px 0 rgba(255,255,255,.06);
}
.card-texture{position:absolute;inset:0;opacity:1;
  background-image:
    repeating-linear-gradient(45deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 1px,transparent 1px,transparent 10px),
    repeating-linear-gradient(-45deg,rgba(255,255,255,.025) 0,rgba(255,255,255,.025) 1px,transparent 1px,transparent 10px)}
.card-glow{position:absolute;width:60%;height:60%;background:radial-gradient(var(--blue3),transparent 70%);
  opacity:.18;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);
  animation:glow 3s ease-in-out infinite alternate}
@keyframes glow{from{opacity:.12;transform:translate(-50%,-50%) scale(1)}to{opacity:.25;transform:translate(-50%,-50%) scale(1.15)}}
.sign-big{position:relative;z-index:1;font-family:Georgia,serif;font-size:clamp(80px,22vw,120px);
  color:transparent;-webkit-text-stroke:1.5px rgba(212,175,90,.65);line-height:1;
  text-shadow:0 0 40px rgba(212,175,90,.35),0 0 80px rgba(74,144,217,.25);
  animation:sign-glow 3s ease-in-out infinite alternate}
@keyframes sign-glow{
  from{text-shadow:0 0 30px rgba(212,175,90,.25),0 0 60px rgba(74,144,217,.15)}
  to{text-shadow:0 0 60px rgba(212,175,90,.55),0 0 120px rgba(74,144,217,.35)}}
.card-corner{position:absolute;width:20px;height:20px;border-color:rgba(212,175,90,.4);border-style:solid}
.cc-tl{top:18px;left:18px;border-width:1.5px 0 0 1.5px}
.cc-tr{top:18px;right:18px;border-width:1.5px 1.5px 0 0}
.cc-bl{bottom:18px;left:18px;border-width:0 0 1.5px 1.5px}
.cc-br{bottom:18px;right:18px;border-width:0 1.5px 1.5px 0}
.tap-label{position:absolute;bottom:22px;font-size:10px;letter-spacing:4px;
  color:rgba(212,175,90,.35);z-index:1}

/* 反面（正）—— POI */
.card-poi-face{
  transform:rotateY(180deg);
  background:linear-gradient(160deg,#0d1e3a,#152d5a,#0d1e3a);
  border:1px solid rgba(74,144,217,.18);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 22px;gap:0;
  box-shadow:0 24px 64px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04)}
.poi-em{font-size:clamp(48px,14vw,68px);line-height:1;
  filter:drop-shadow(0 0 20px rgba(74,144,217,.5));margin-bottom:14px}
.poi-nm{font-size:clamp(18px,5vw,22px);font-weight:900;color:var(--text);text-align:center;margin-bottom:10px}
.poi-tag{font-size:11px;padding:4px 14px;border-radius:20px;font-weight:700;letter-spacing:1px;
  background:linear-gradient(135deg,var(--blue),var(--blue3));color:#fff}
.poi-line{width:80px;height:1px;background:linear-gradient(90deg,transparent,rgba(74,144,217,.3),transparent);
  margin:16px 0}
.poi-sign{font-size:13px;color:var(--blue4);text-align:center;line-height:1.9;
  font-style:italic;letter-spacing:.5px}

/* 粒子层 */
#pcvs{position:fixed;inset:0;pointer-events:none;z-index:5}

/* 底部提示 */
.flip-bottom{position:fixed;bottom:40px;left:0;right:0;
  display:flex;flex-direction:column;align-items:center;gap:12px;z-index:10}
.shake-hint{display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.04);border:1px solid rgba(74,144,217,.12);
  border-radius:40px;padding:8px 18px}
.shake-ico{font-size:16px;animation:jiggle 2.5s ease-in-out infinite}
@keyframes jiggle{0%,100%{transform:rotate(0)}15%{transform:rotate(-20deg)}30%{transform:rotate(16deg)}45%{transform:rotate(-10deg)}60%{transform:rotate(7deg)}75%{transform:rotate(-3deg)}}
.shake-txt{font-size:11px;color:var(--muted);letter-spacing:1px}
.next-btn{display:none;padding:13px 40px;border:none;border-radius:40px;
  background:linear-gradient(135deg,var(--blue),var(--blue3));
  font-size:14px;font-weight:800;color:#fff;letter-spacing:3px;cursor:pointer;
  font-family:inherit;box-shadow:0 6px 24px rgba(74,144,217,.3);transition:transform .15s}
.next-btn:active{transform:scale(.96)}

/* ═══════════════════════════════
   屏3  结果
═══════════════════════════════ */
#s3{overflow:hidden}
.result-inner{width:100%;height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:flex;flex-direction:column;align-items:center;
  padding:80px 22px 48px}
.result-eyebrow{font-size:10px;letter-spacing:5px;color:var(--blue4);margin-bottom:8px}
.result-title{font-size:26px;font-weight:900;text-align:center;margin-bottom:28px}
.result-title em{color:var(--blue4);font-style:normal}

/* 签列表：飞入动画 */
.sign-list{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.sign-item{display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,.04);border:1px solid rgba(74,144,217,.12);
  border-radius:16px;padding:14px 16px;
  opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s}
.sign-item.show{opacity:1;transform:translateY(0)}
.si-icon{font-size:28px;flex-shrink:0}
.si-info{}
.si-name{font-size:15px;font-weight:700}
.si-phrase{font-size:12px;color:var(--blue4);font-style:italic;margin-top:3px;line-height:1.5}

/* 心动 */
.heart-btn{width:100%;max-width:340px;padding:18px;border:none;border-radius:16px;cursor:pointer;
  background:linear-gradient(135deg,#9b1d6e,#d4337a,#f06098);
  color:#fff;font-size:18px;font-weight:900;letter-spacing:2px;font-family:inherit;
  box-shadow:0 8px 28px rgba(212,51,122,.4);transition:transform .15s;
  opacity:0;transform:translateY(16px);transition:opacity .5s,transform .5s,box-shadow .2s;
  margin-bottom:12px}
.heart-btn.show{opacity:1;transform:translateY(0)}
.heart-btn:active{transform:scale(.97) translateY(0)}
.heart-btn.sent{background:linear-gradient(135deg,#2a1a50,#4a2880);
  box-shadow:0 8px 28px rgba(74,40,128,.3)}

.r-row{display:flex;gap:10px;width:100%;max-width:340px;
  opacity:0;transform:translateY(12px);transition:opacity .5s,transform .5s}
.r-row.show{opacity:1;transform:translateY(0)}
.r-btn{flex:1;padding:13px;border-radius:12px;font-size:13px;font-weight:700;
  cursor:pointer;border:none;font-family:inherit;transition:transform .15s}
.r-btn:active{transform:scale(.97)}
.r-copy{background:rgba(74,144,217,.1);color:var(--blue4);border:1px solid rgba(74,144,217,.2)}
.r-restart{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid rgba(255,255,255,.08)}
</style>
</head>
<body>

<div id="stars"></div>
<canvas id="pcvs"></canvas>

<a class="back" href="/08/works/#tools">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="#5a80a8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  AI 工具
</a>

<!-- ═══ 屏1 ═══ -->
<div class="screen" id="s1">
  <div class="s1-top">
    <div>
      <div class="brand">FATE<br>TRIP</div>
      <div class="brand-sub">让命运为你选路</div>
      <div class="brand-rule"></div>
      <div class="tagline">分享行程不只是发链接<br>让对方<strong>拆签</strong>，抽出属于他的路线</div>
    </div>
  </div>
  <div class="s1-bottom">
    <input class="dest-input" id="destInp" type="text" placeholder="目的地：曼谷、京都、大理…" maxlength="20">
    <button class="start-btn" onclick="startSign()">摇一摇，抽签</button>
  </div>
</div>

<!-- ═══ 屏2 ═══ -->
<div class="screen out" id="s2">
  <div class="dest-badge" id="destBadge">FATE TRIP</div>
  <div class="remain-badge" id="remainBadge">1 / 3</div>

  <div class="stage">
    <div class="card-wrap" id="cardWrap" onclick="flipSign()">
      <div class="card-ratio">
        <div class="card-scene" style="perspective:1000px">
          <div class="card-3d" id="card3d">
            <!-- 背面（初始可见）-->
            <div class="card-face card-back-face">
              <div class="card-texture"></div>
              <div class="card-glow"></div>
              <div class="sign-big">签</div>
              <div class="card-corner cc-tl"></div>
              <div class="card-corner cc-tr"></div>
              <div class="card-corner cc-bl"></div>
              <div class="card-corner cc-br"></div>
              <div class="tap-label">TAP · SHAKE</div>
            </div>
            <!-- 正面（翻后可见）-->
            <div class="card-face card-poi-face">
              <div class="poi-em" id="poiIcon">🌅</div>
              <div class="poi-nm" id="poiName">—</div>
              <div class="poi-tag" id="poiType">类型</div>
              <div class="poi-line"></div>
              <div class="poi-sign" id="poiPhrase">签语</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="flip-bottom">
    <div class="shake-hint" id="shakeHint">
      <span class="shake-ico">📱</span>
      <span class="shake-txt">轻摇手机也可揭签</span>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextSign()">再拆一签</button>
  </div>
</div>

<!-- ═══ 屏3 ═══ -->
<div class="screen out" id="s3">
  <div class="result-inner">
    <div class="result-eyebrow">HIDDEN ROUTE</div>
    <div class="result-title">你的<em>命定路线</em></div>
    <div class="sign-list" id="signList"></div>
    <button class="heart-btn" id="heartBtn" onclick="sendHeart()">我也想去 💛</button>
    <div class="r-row" id="rRow">
      <button class="r-btn r-copy" onclick="copyShare()">复制分享</button>
      <button class="r-btn r-restart" onclick="restart()">重新求签</button>
    </div>
  </div>
</div>

<script>
/* ─── 星空 ─── */
!function(){
  const c=document.getElementById('stars');
  for(let i=0;i<90;i++){
    const d=document.createElement('div'),s=.3+Math.random()*1.3;
    d.className='s';
    d.style.cssText=`width:${s}px;height:${s}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
    c.appendChild(d);
  }
}();

/* ─── POI库 ─── */
const POIS={
  '曼谷':[
    {name:'乍都乍市场',type:'市集',icon:'🛍️'},
    {name:'卧佛寺',type:'文化',icon:'🙏'},
    {name:'考山路',type:'夜市',icon:'🍺'},
    {name:'湄南河畔',type:'风景',icon:'🌅'},
    {name:'Or Tor Kor市场',type:'美食',icon:'🍜'},
  ],
  '京都':[
    {name:'岚山竹林',type:'自然',icon:'🎋'},
    {name:'祗园花见小路',type:'文化',icon:'🌸'},
    {name:'锦市场',type:'美食',icon:'🍱'},
    {name:'伏见稻荷',type:'景点',icon:'⛩️'},
    {name:'哲学之道',type:'散步',icon:'🍁'},
  ],
  '大理':[
    {name:'洱海骑行',type:'自然',icon:'🚴'},
    {name:'古城三塔',type:'文化',icon:'🏛️'},
    {name:'喜洲古镇',type:'散步',icon:'🪷'},
    {name:'双廊渔村',type:'风景',icon:'🌊'},
    {name:'人民路文艺街',type:'市集',icon:'☕'},
  ],
  '上海':[
    {name:'武康路梧桐道',type:'散步',icon:'🍂'},
    {name:'外滩夜景',type:'风景',icon:'🌆'},
    {name:'田子坊',type:'市集',icon:'🎨'},
    {name:'安福路',type:'休闲',icon:'☕'},
    {name:'豫园老街',type:'美食',icon:'🥟'},
  ],
  default:[
    {name:'老城漫步',type:'文化',icon:'🏛️'},
    {name:'当地早市',type:'市集',icon:'🛒'},
    {name:'江边日落',type:'风景',icon:'🌅'},
    {name:'街角咖啡馆',type:'休闲',icon:'☕'},
    {name:'夜市美食街',type:'美食',icon:'🍢'},
  ]
};
const PHRASES={
  '市集':['今日宜淘货，忌冲动消费','人声鼎沸处，有你想要的答案','缘分是什么？逛到第三圈还没走'],
  '文化':['今日宜静心参拜，忌走马观花','历史不言语，却回答一切','你来这里，不是偶然'],
  '夜市':['今日宜放下计划，忌早睡','灯火最亮处，就是今晚的归宿','摊主的笑容，是城市送你的礼物'],
  '风景':['今日宜驻足凝望，忌赶行程','美景不等人，但为你留了一秒','站在这里，所有烦恼都变小了'],
  '美食':['今日宜大胆点餐，忌节食','这一口，是旅行最诚实的部分','吃饱了再说走'],
  '自然':['今日宜深呼吸，忌看手机','自然界的钟表没有分针','你选了它，它也选了你'],
  '散步':['今日宜无目的漫游，忌导航','没有目的地的路，往往最好','今天的脚步，明天会感谢'],
  '景点':['今日宜认真感受，忌只拍照','打卡是手段，感受是目的','来了就要认真看一眼'],
  '休闲':['今日宜发呆，忌赶行程','一杯的时间，刚好够想清楚','坐下来，城市来跟你说话'],
};

/* ─── 状态 ─── */
let dest='', pois=[], cur=0, flipped=false, phraseMap={};

function getPhrase(type,i){
  if(phraseMap[i]) return phraseMap[i];
  const arr=PHRASES[type]||['今日宜出发，忌犹豫'];
  phraseMap[i]=arr[Math.floor(Math.random()*arr.length)];
  return phraseMap[i];
}
function pickPOIs(d){
  let pool=POIS.default;
  Object.keys(POIS).filter(k=>k!=='default').forEach(k=>{if(d.includes(k))pool=POIS[k];});
  return [...pool].sort(()=>Math.random()-.5).slice(0,3);
}

/* ─── 页面切换 ─── */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>{
    if(s.id===id){s.classList.remove('out','in-up');}
    else{s.classList.add('out');}
  });
}

/* ─── 开始 ─── */
function startSign(){
  dest=document.getElementById('destInp').value.trim()||'远方';
  pois=pickPOIs(dest); cur=0; flipped=false; phraseMap={};
  document.getElementById('destBadge').textContent=dest;
  updateBadge(); resetCard(); show('s2'); setupShake();
}

function updateBadge(){
  document.getElementById('remainBadge').textContent=`${cur+1} / ${pois.length}`;
}

function resetCard(){
  const c=document.getElementById('card3d');
  c.classList.remove('flipped');
  document.getElementById('cardWrap').style.pointerEvents='auto';
  document.getElementById('nextBtn').style.display='none';
  document.getElementById('shakeHint').style.display='flex';
  flipped=false;
}

function loadCard(i){
  const p=pois[i];
  document.getElementById('poiIcon').textContent=p.icon;
  document.getElementById('poiName').textContent=p.name;
  document.getElementById('poiType').textContent=p.type;
  document.getElementById('poiPhrase').textContent=getPhrase(p.type,i);
}

/* ─── 翻牌 ─── */
function flipSign(){
  if(flipped) return;
  flipped=true;
  loadCard(cur);
  document.getElementById('card3d').classList.add('flipped');
  document.getElementById('cardWrap').style.pointerEvents='none';
  burst();
  setTimeout(()=>{
    document.getElementById('shakeHint').style.display='none';
    const nb=document.getElementById('nextBtn');
    nb.style.display='block';
    nb.textContent=cur<pois.length-1?`再拆一签  ${cur+2}/${pois.length}`:'查看命定路线 ✦';
  },600);
}

function nextSign(){
  if(cur>=pois.length-1){showResult();return;}
  cur++; updateBadge(); resetCard();
}

/* ─── 粒子 ─── */
function burst(){
  const cv=document.getElementById('pcvs');
  cv.width=innerWidth; cv.height=innerHeight;
  const ctx=cv.getContext('2d');
  const cx=innerWidth/2, cy=innerHeight/2;
  const ps=[];
  for(let i=0;i<50;i++){
    const a=Math.random()*Math.PI*2, sp=2+Math.random()*5;
    ps.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,
      r:.6+Math.random()*2.2,alpha:1,h:190+Math.random()*50});
  }
  let f=0;
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.09;p.alpha-=.016;
      if(p.alpha<=0)return;
      ctx.globalAlpha=p.alpha;ctx.fillStyle=`hsl(${p.h},85%,72%)`;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;
    if(++f<75)requestAnimationFrame(draw);else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

/* ─── 摇一摇 ─── */
function setupShake(){
  let last=0;
  window.addEventListener('devicemotion',function(e){
    if(flipped)return;
    const a=e.accelerationIncludingGravity; if(!a)return;
    const m=Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z), now=Date.now();
    if(m>13&&now-last>900){last=now;flipSign();}
  });
}

/* ─── 结果 ─── */
function showResult(){
  const list=document.getElementById('signList');
  list.innerHTML='';
  pois.forEach((p,i)=>{
    const el=document.createElement('div'); el.className='sign-item';
    el.innerHTML=`<div class="si-icon">${p.icon}</div><div class="si-info"><div class="si-name">${p.name}</div><div class="si-phrase">${getPhrase(p.type,i)}</div></div>`;
    list.appendChild(el);
    setTimeout(()=>el.classList.add('show'), 200+i*150);
  });
  const hb=document.getElementById('heartBtn');
  hb.className='heart-btn'; hb.textContent='我也想去 💛';
  setTimeout(()=>hb.classList.add('show'), 200+pois.length*150+100);
  setTimeout(()=>document.getElementById('rRow').classList.add('show'), 200+pois.length*150+250);
  show('s3');
}

/* ─── 心动 ─── */
function sendHeart(){
  const btn=document.getElementById('heartBtn');
  btn.className='heart-btn sent show';
  btn.textContent='💙 心动通知已发送';
}

/* ─── 分享 ─── */
function copyShare(){
  const lines=pois.map((p,i)=>p.icon+' '+p.name+' — '+getPhrase(p.type,i)).join('\n');
  const txt=`摇一摇，抽你的${dest}旅行签 🎴\n\n${lines}\n\n让命运为你选路 → https://qlb708.github.io/08/activity/travel-sign/`;
  const btn=event.target;
  navigator.clipboard.writeText(txt).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  });
  btn.textContent='✅ 已复制';setTimeout(()=>btn.textContent='复制分享',1500);
}

function restart(){
  document.getElementById('destInp').value='';
  document.getElementById('signList').innerHTML='';
  document.getElementById('heartBtn').className='heart-btn';
  document.getElementById('rRow').className='r-row';
  show('s1');
}
</script>
