<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🧩 旅行拼图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;background:#F5F0E8;color:#333;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
/* ── nav ── */
.nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:center;height:56px;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,0,0,.06)}
.nav a.back{position:absolute;left:16px;font-size:15px;color:#666;text-decoration:none;display:flex;align-items:center;gap:4px}
.nav a.back:hover{color:#c9953c}
.nav .title{font-size:17px;font-weight:600}
/* ── shell ── */
.shell{max-width:390px;margin:0 auto;padding:16px;min-height:calc(100vh - 56px)}
/* ── screens ── */
.screen{display:none;flex-direction:column;align-items:center;gap:20px}
.screen.active{display:flex}
/* ── upload ── */
.dropzone{width:100%;aspect-ratio:4/3;border:2.5px dashed #c9a96e;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:background .2s,border-color .2s;background:#fff}
.dropzone:hover,.dropzone.dragover{background:#fdf8ee;border-color:#b8860b}
.dropzone svg{width:48px;height:48px;color:#c9a96e}
.dropzone .label{font-size:16px;font-weight:600;color:#555}
.dropzone .hint{font-size:13px;color:#999}
.example-label{font-size:13px;color:#999;margin-top:8px}
.examples{display:flex;gap:12px;width:100%}
.examples img{flex:1;aspect-ratio:1;border-radius:14px;object-fit:cover;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.examples img:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(0,0,0,.14)}
/* ── modal overlay ── */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;animation:fadeIn .2s}
.overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal{background:#fff;border-radius:24px;padding:32px 24px;width:90%;max-width:340px;display:flex;flex-direction:column;align-items:center;gap:20px;animation:slideUp .3s}
.modal h3{font-size:18px;font-weight:700}
.modal .diff-btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s,transform .12s;background:#f5f0e8;color:#555}
.modal .diff-btn:hover{background:#e8dfc8;transform:scale(1.02)}
.modal .diff-btn:active{transform:scale(.97)}
.modal .cancel{font-size:14px;color:#999;cursor:pointer;background:none;border:none;margin-top:4px}
/* ── game header ── */
.game-header{width:100%;display:flex;flex-direction:column;gap:10px}
.ref-row{display:flex;align-items:center;gap:12px}
.ref-img{width:60px;height:60px;border-radius:12px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.ref-info{flex:1}
.ref-info .steps{font-size:15px;font-weight:600;color:#555}
.ref-info .progress-bar{width:100%;height:6px;background:#e8e0d0;border-radius:3px;margin-top:6px;overflow:hidden}
.ref-info .progress-bar .fill{height:100%;background:linear-gradient(90deg,#c9a96e,#e8c547);border-radius:3px;transition:width .3s}
/* ── grid ── */
.grid-wrap{width:100%;display:flex;justify-content:center}
.grid{display:grid;gap:4px;background:#e0d8c8;padding:4px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.tile{background-color:#fff;background-repeat:no-repeat;cursor:pointer;border-radius:6px;transition:transform .2s,box-shadow .2s,border-color .15s;user-select:none;-webkit-user-select:none;box-shadow:3px 3px 8px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.4);position:relative}
.tile:hover{transform:scale(1.03) translateY(-2px);box-shadow:4px 6px 12px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.4)}
.tile.selected{border:3px solid #e8c547;box-shadow:0 0 12px rgba(232,197,71,.5),3px 3px 8px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.4)}
.tile.correct{border:2px solid rgba(180,200,140,.5)}
/* completed state */
.grid.done{gap:0}
.grid.done .tile{border-radius:0;box-shadow:none;border:none}
/* ── buttons row ── */
.btn-row{display:flex;gap:12px;width:100%}
.btn{flex:1;padding:13px;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;transition:transform .12s}
.btn:active{transform:scale(.96)}
.btn-primary{background:linear-gradient(135deg,#c9a96e,#e8c547);color:#fff}
.btn-secondary{background:#f0ebe3;color:#666}
/* ── celebration modal ── */
.celebration{text-align:center}
.celebration .emoji{font-size:56px;margin-bottom:8px}
.celebration h3{font-size:22px;margin-bottom:6px}
.celebration .sub{font-size:14px;color:#888;margin-bottom:20px}
/* ── util ── */
.hidden{display:none!important}
</style>
</head>
<body>

<!-- nav -->
<header class="nav">
  <a class="back" href="/08/activity/">← 返回</a>
  <span class="title">🧩 旅行拼图</span>
</header>

<main class="shell">

  <!-- ===== SCREEN: Upload ===== -->
  <section id="screen-upload" class="screen active">
    <div class="dropzone" id="dropzone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      <span class="label">上传你的旅行照片</span>
      <span class="hint">点击选择 或 拖拽到这里</span>
      <input type="file" id="fileInput" accept="image/*" hidden>
    </div>
    <p class="example-label">或选择示例图片</p>
    <div class="examples">
      <img src="https://images.unsplash.com/photo-1506929562872-bb421503ef21?w=400&q=80" alt="海滩" data-src="https://images.unsplash.com/photo-1506929562872-bb421503ef21?w=400&q=80">
      <img src="https://images.unsplash.com/photo-1527824404775-dce343118ebc?w=400&q=80" alt="京都" data-src="https://images.unsplash.com/photo-1527824404775-dce343118ebc?w=400&q=80">
      <img src="https://images.unsplash.com/photo-1499856871958-5b9627545d1a?w=400&q=80" alt="巴黎" data-src="https://images.unsplash.com/photo-1499856871958-5b9627545d1a?w=400&q=80">
    </div>
  </section>

  <!-- ===== SCREEN: Game ===== -->
  <section id="screen-game" class="screen">
    <div class="game-header">
      <div class="ref-row">
        <img class="ref-img" id="refImg" src="" alt="参考图">
        <div class="ref-info">
          <div class="steps" id="stepsLabel">步数：0</div>
          <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
        </div>
      </div>
    </div>
    <div class="grid-wrap">
      <div class="grid" id="grid"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="btnRestart">🔄 重新开始</button>
      <button class="btn btn-primary" id="btnNewPhoto">📷 换张照片</button>
    </div>
  </section>

</main>

<!-- ===== MODAL: Difficulty ===== -->
<div class="overlay" id="modalDiff">
  <div class="modal">
    <h3>选择难度</h3>
    <button class="diff-btn" data-grid="3">😊 简单 · 3×3</button>
    <button class="diff-btn" data-grid="4">😐 普通 · 4×4</button>
    <button class="diff-btn" data-grid="5">😈 困难 · 5×5</button>
    <button class="cancel" id="cancelDiff">取消</button>
  </div>
</div>

<!-- ===== MODAL: Celebration ===== -->
<div class="overlay" id="modalCelebrate">
  <div class="modal celebration">
    <div class="emoji">🎉</div>
    <h3>拼图完成！</h3>
    <p class="sub" id="celebrateMsg">共用 0 步</p>
    <div class="btn-row">
      <button class="btn btn-secondary" id="btnRetry">🔄 再来一张</button>
      <button class="btn btn-primary" id="btnChangeDiff">🎚️ 换难度</button>
    </div>
  </div>
</div>

<script>
(function(){
  /* ── state ── */
  let imageDataUrl = null;   // current photo dataURL
  let gridSize = 3;          // 3 / 4 / 5
  let tiles = [];            // array of tile objects {id, pos}
  let selectedTile = null;   // currently selected tile element
  let moves = 0;
  let totalTiles = 0;
  let correctTiles = 0;

  /* ── DOM refs ── */
  const screenUpload = document.getElementById('screen-upload');
  const screenGame   = document.getElementById('screen-game');
  const dropzone     = document.getElementById('dropzone');
  const fileInput    = document.getElementById('fileInput');
  const examples     = document.querySelectorAll('.examples img');
  const grid         = document.getElementById('grid');
  const refImg       = document.getElementById('refImg');
  const stepsLabel   = document.getElementById('stepsLabel');
  const progressFill = document.getElementById('progressFill');
  const modalDiff    = document.getElementById('modalDiff');
  const modalCelebrate = document.getElementById('modalCelebrate');
  const celebrateMsg = document.getElementById('celebrateMsg');

  /* ── screen switch ── */
  function showScreen(s){
    screenUpload.classList.toggle('active', s==='upload');
    screenGame.classList.toggle('active', s==='game');
  }

  /* ── upload handling ── */
  dropzone.addEventListener('click', ()=> fileInput.click());
  fileInput.addEventListener('change', e=>{
    const f = e.target.files[0];
    if(!f) return;
    readFile(f);
  });
  dropzone.addEventListener('dragover', e=>{ e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', ()=> dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', e=>{
    e.preventDefault();
    dropzone.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if(f && f.type.startsWith('image/')) readFile(f);
  });
  examples.forEach(img=>{
    img.addEventListener('click', ()=>{
      loadImageFromUrl(img.dataset.src);
    });
  });

  function readFile(file){
    const reader = new FileReader();
    reader.onload = e => imageDataUrl = e.target.result;
    reader.readAsDataURL(file);
    openDiffModal();
  }
  function loadImageFromUrl(url){
    // For unsplash images, load as dataURL via canvas to avoid CORS issues with background-image
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = ()=>{
      const c = document.createElement('canvas');
      c.width = img.naturalWidth; c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img,0,0);
      imageDataUrl = c.toDataURL('image/jpeg',0.9);
      openDiffModal();
    };
    img.onerror = ()=>{
      // fallback: use URL directly (may have CORS issues)
      imageDataUrl = url;
      openDiffModal();
    };
    img.src = url;
  }

  /* ── difficulty modal ── */
  function openDiffModal(){ modalDiff.classList.add('active'); }
  function closeDiffModal(){ modalDiff.classList.remove('active'); }
  document.getElementById('cancelDiff').addEventListener('click', closeDiffModal);
  modalDiff.querySelectorAll('.diff-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      gridSize = parseInt(btn.dataset.grid);
      closeDiffModal();
      startGame();
    });
  });

  /* ── game logic ── */
  function startGame(){
    showScreen('game');
    moves = 0;
    correctTiles = 0;
    selectedTile = null;
    totalTiles = gridSize * gridSize;
    updateHUD();
    buildGrid();
  }

  function buildGrid(){
    grid.innerHTML = '';
    grid.classList.remove('done');
    grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

    // responsive tile size
    const containerW = Math.min(358, window.innerWidth - 64);
    const tileSize = Math.floor((containerW - 8 - 4*(gridSize-1)) / gridSize);
    grid.style.width = (tileSize*gridSize + 8) + 'px';

    // create tiles
    const ids = [];
    for(let i=0;i<totalTiles;i++) ids.push(i);
    shuffle(ids);

    const bgSize = tileSize * gridSize;

    for(let i=0;i<totalTiles;i++){
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.style.width = tileSize + 'px';
      tile.style.height = tileSize + 'px';
      tile.style.backgroundImage = `url(${imageDataUrl})`;
      tile.style.backgroundSize = `${bgSize}px ${bgSize}px`;

      // this tile holds image piece of id `ids[i]`
      tile.dataset.id = ids[i];
      tile.dataset.pos = i; // current position

      const origRow = Math.floor(ids[i] / gridSize);
      const origCol = ids[i] % gridSize;
      tile.style.backgroundPosition = `${-origCol*tileSize}px ${-origRow*tileSize}px`;

      if(ids[i] === i) correctTiles++;
      tile.addEventListener('click', ()=> onTileClick(tile));
      grid.appendChild(tile);
    }

    refImg.src = imageDataUrl;
  }

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    // ensure not solved
    if(arr.every((v,idx)=>v===idx)){
      [arr[0],arr[1]] = [arr[1],arr[0]];
    }
  }

  function onTileClick(tile){
    if(grid.classList.contains('done')) return;
    if(!selectedTile){
      selectedTile = tile;
      tile.classList.add('selected');
    } else if(selectedTile === tile){
      selectedTile.classList.remove('selected');
      selectedTile = null;
    } else {
      // swap
      swapTiles(selectedTile, tile);
      selectedTile.classList.remove('selected');
      selectedTile = null;
      moves++;
      updateHUD();
      checkWin();
    }
  }

  function swapTiles(a,b){
    // swap dataset.id (image piece identity)
    const tmpId = a.dataset.id;
    a.dataset.id = b.dataset.id;
    b.dataset.id = tmpId;

    // swap background-position based on new id
    const tileSize = parseInt(a.style.width);
    const bgSize = tileSize * gridSize;

    [a,b].forEach(t=>{
      const id = parseInt(t.dataset.id);
      const r = Math.floor(id/gridSize);
      const c = id % gridSize;
      t.style.backgroundPosition = `${-c*tileSize}px ${-r*tileSize}px`;
    });
  }

  function checkWin(){
    const allTiles = grid.querySelectorAll('.tile');
    let allCorrect = true;
    correctTiles = 0;
    allTiles.forEach((t,i)=>{
      const isCorrect = parseInt(t.dataset.id) === i;
      t.classList.toggle('correct', isCorrect);
      if(isCorrect) correctTiles++; else allCorrect = false;
    });

    if(allCorrect){
      grid.classList.add('done');
      celebrateMsg.textContent = `共用 ${moves} 步`;
      setTimeout(()=> modalCelebrate.classList.add('active'), 400);
    }
  }

  function updateHUD(){
    stepsLabel.textContent = `步数：${moves}`;
    const pct = totalTiles ? Math.round(correctTiles/totalTiles*100) : 0;
    progressFill.style.width = pct + '%';
  }

  /* ── buttons ── */
  document.getElementById('btnRestart').addEventListener('click', startGame);
  document.getElementById('btnNewPhoto').addEventListener('click', ()=>{
    closeModals();
    showScreen('upload');
    imageDataUrl = null;
    fileInput.value = '';
  });
  document.getElementById('btnRetry').addEventListener('click', ()=>{
    closeModals();
    showScreen('upload');
    imageDataUrl = null;
    fileInput.value = '';
  });
  document.getElementById('btnChangeDiff').addEventListener('click', ()=>{
    closeModals();
    openDiffModal();
  });

  function closeModals(){
    modalDiff.classList.remove('active');
    modalCelebrate.classList.remove('active');
  }
})();
</script>
</body>
</html>
