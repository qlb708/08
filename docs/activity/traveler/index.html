<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧳 旅行达人鉴定</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:-apple-system,"PingFang SC",sans-serif;background:#E8E6E2;display:flex;justify-content:center;align-items:flex-start;padding:20px 0;min-height:100vh}
.app{width:100%;max-width:390px;min-height:680px;background:#F2F0EC;border-radius:0;box-shadow:0 0 60px rgba(0,0,0,0.15);overflow:hidden;position:relative}
@media(min-width:480px){body{padding:20px;align-items:center}.app{min-height:calc(100vh - 40px);border-radius:32px;max-height:844px}}

/* ===== Nav ===== */
.nav{position:sticky;top:0;z-index:100;height:52px;background:rgba(250,250,248,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,0.07);display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.nav-back{color:#555;text-decoration:none;font-size:15px;font-weight:500}
.nav-back:hover{color:#333}
.nav-title{font-size:16px;font-weight:600;color:#333}
.nav-spacer{width:60px}

/* ===== Screens ===== */
.screen{display:none;flex-direction:column;min-height:calc(100vh - 52px);overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen.active{display:flex}

/* ===== Home ===== */
.home-header{text-align:center;padding:40px 24px 20px}
.home-header .logo{font-size:72px;display:block;margin-bottom:12px;animation:bounce 2s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.home-header h1{font-size:26px;font-weight:700;color:#1D1D1F;letter-spacing:-0.5px}
.home-header p{font-size:14px;color:#888;margin-top:6px}
.home-card{background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,0.07);margin:0 20px 28px;padding:24px 20px;text-align:center}
.home-card .subtitle{font-size:14px;color:#888;margin-top:4px}
.player-circle-grid{display:flex;justify-content:center;gap:20px;margin:24px 0 28px}
.player-circle{width:64px;height:64px;border-radius:50%;border:2.5px solid #1a56db;background:#fff;color:#1a56db;font-size:22px;font-weight:700;cursor:pointer;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);display:flex;align-items:center;justify-content:center;font-family:inherit}
.player-circle:hover{transform:scale(1.1);box-shadow:0 4px 16px rgba(26,86,219,0.2)}
.player-circle:active{transform:scale(0.95)}
.player-circle.selected{background:#1a56db;color:#fff;border-color:#1a56db;transform:scale(1.08)}
.start-btn{display:block;width:calc(100% - 40px);margin:0 20px 40px;padding:16px;border:none;border-radius:100px;background:#1a56db;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit}
.start-btn:hover{background:#1547b8;transform:translateY(-1px)}
.start-btn:active{transform:scale(0.98)}
.start-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

/* ===== Transition ===== */
.transition-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px}
.transition-emoji{font-size:72px;margin-bottom:16px;animation:bounce 1.5s ease infinite}
.transition-title{font-size:22px;font-weight:700;color:#1D1D1F;margin-bottom:8px}
.transition-sub{font-size:14px;color:#888;margin-bottom:28px}
.next-btn{border:none;border-radius:100px;padding:16px 48px;background:#1a56db;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;box-shadow:0 6px 20px rgba(26,86,219,0.3)}
.next-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(26,86,219,0.35)}
.next-btn:active{transform:scale(0.97)}

/* ===== Quiz ===== */
.quiz-progress{position:sticky;top:0;z-index:10;background:rgba(242,240,236,0.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:16px 20px 12px;margin:0}
.progress-info{display:flex;justify-content:space-between;font-size:13px;color:#888;margin-bottom:8px;font-weight:500}
.progress-info .highlight{color:#1D1D1F;font-weight:700}
.progress-track{height:4px;background:#E8E6E2;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:#1a56db;transition:width 0.4s cubic-bezier(0.4,0,0.2,1)}

.question-container{flex:1;padding:20px;position:relative}
.question-card{animation:slideIn 0.35s cubic-bezier(0.4,0,0.2,1)}
.question-card.slide-left{animation:slideLeft 0.35s cubic-bezier(0.4,0,0.2,1)}
.question-card.slide-right{animation:slideRight 0.35s cubic-bezier(0.4,0,0.2,1)}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

.question-card-inner{background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,0.07);padding:24px 20px}
.player-badge{display:inline-flex;align-items:center;gap:6px;background:#F2F0EC;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:#888;margin-bottom:16px}
.player-badge .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.q-number{font-size:12px;color:#BBB;font-weight:700;margin-bottom:8px;letter-spacing:1px}
.q-title{font-size:20px;font-weight:600;color:#1D1D1F;line-height:1.4;margin-bottom:22px}

.options{display:flex;flex-direction:column;gap:10px}
.option-btn{border:1.5px solid #e2e8f0;border-radius:100px;padding:14px 20px;background:#fff;cursor:pointer;transition:all 0.2s;text-align:left;font-family:inherit;font-size:14px;color:#444;line-height:1.5;position:relative;overflow:hidden}
.option-btn::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:0;background:#1a56db;border-radius:2px;transition:height 0.2s}
.option-btn:hover{border-color:#1a56db;background:#f8faff}
.option-btn:hover::before{height:60%}
.option-btn:active{transform:scale(0.98)}
.option-btn.picked{border-color:#1a56db;background:#1a56db;color:#fff;transition:all 0.2s}
.option-btn.picked::before{display:none}

/* ===== Result ===== */
.result-screen{align-items:center;padding:24px 20px 40px}
.result-header{text-align:center;margin-bottom:24px}
.result-header .trophy{font-size:48px;display:block;margin-bottom:8px}
.result-header h2{font-size:22px;font-weight:700;color:#1D1D1F}
.result-header p{font-size:13px;color:#888;margin-top:4px}

/* Single result card */
.role-card{border-radius:16px;padding:28px 22px;text-align:center;color:#fff;position:relative;overflow:hidden;width:100%;margin-bottom:16px;animation:popUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes popUp{from{opacity:0;transform:scale(0.8) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
.role-card .role-emoji{font-size:48px;display:block;margin-bottom:8px}
.role-card .role-name{font-size:22px;font-weight:700;margin-bottom:4px}
.role-card .role-alias{font-size:14px;opacity:0.85;margin-bottom:14px}
.role-card .role-player-label{font-size:12px;opacity:0.7;margin-bottom:10px;letter-spacing:1px}
.role-card .role-details{background:rgba(255,255,255,0.18);border-radius:14px;padding:14px 16px;text-align:left;margin-top:8px}
.role-card .detail-item{font-size:13px;line-height:1.6;margin-bottom:6px}
.role-card .detail-item:last-child{margin-bottom:0}
.role-card .detail-label{font-weight:700;opacity:0.9}
.role-card .role-quote{margin-top:14px;font-size:16px;font-weight:700;font-style:italic;opacity:0.95}

/* Score bars */
.score-bars{margin-top:14px}
.score-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.score-bar-label{font-size:11px;color:rgba(255,255,255,0.85);min-width:44px;text-align:left;font-weight:600}
.score-bar-track{flex:1;height:6px;background:rgba(255,255,255,0.25);border-radius:3px;overflow:hidden}
.score-bar-val{height:100%;border-radius:3px;background:#fff;opacity:0.7;transition:width 0.6s cubic-bezier(0.4,0,0.2,1) 0.3s;width:0}

/* Multi-player mini cards */
.mini-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;margin-bottom:20px}
.mini-card{border-radius:16px;padding:20px 14px;text-align:center;color:#fff;animation:popUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both}
.mini-card .role-emoji{font-size:36px;display:block;margin-bottom:4px}
.mini-card .role-name{font-size:16px;font-weight:700}
.mini-card .role-player-label{font-size:11px;opacity:0.75;margin-top:4px}

/* Team analysis */
.team-analysis{background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,0.07);padding:20px;width:100%;margin-bottom:20px;animation:popUp 0.5s cubic-bezier(0.34,1.56,0.64,1) both}
.team-analysis h3{font-size:16px;font-weight:700;color:#1D1D1F;margin-bottom:12px;text-align:center}
.team-analysis .team-verdict{font-size:15px;color:#555;line-height:1.7;text-align:center;padding:14px;background:#F8F6F3;border-radius:12px;margin-bottom:12px}
.team-analysis .team-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.team-analysis .team-tag{background:#F2F0EC;border-radius:100px;padding:5px 14px;font-size:12px;color:#888;font-weight:600}

/* Action buttons */
.action-btns{display:flex;gap:10px;width:100%}
.action-btn{flex:1;border:1.5px solid #1a56db;border-radius:100px;padding:14px;background:#fff;cursor:pointer;transition:all 0.2s;font-family:inherit;font-size:14px;font-weight:600;color:#1a56db;text-align:center}
.action-btn:hover{background:#f0f4ff}
.action-btn:active{transform:scale(0.97)}
.action-btn.primary{background:#1a56db;border:1.5px solid #1a56db;color:#fff;box-shadow:0 6px 20px rgba(26,86,219,0.25)}
.action-btn.primary:hover{background:#1547b8;transform:translateY(-1px)}

/* Toast */
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;opacity:0;transition:all 0.3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="app">
  <!-- Nav -->
  <nav class="nav">
    <a href="/08/activity/" class="nav-back">← 返回</a>
    <span class="nav-title">旅行达人鉴定</span>
    <span class="nav-spacer"></span>
  </nav>

  <!-- Home -->
  <div class="screen active" id="screen-home">
    <div class="home-header">
      <span class="logo">🧳</span>
      <h1>测测你的旅行角色</h1>
      <p>最多4人，轮流答题</p>
    </div>
    <div class="home-card">
      <div style="font-size:14px;color:#666;margin-bottom:4px">回答 6 道趣味题，鉴定你的旅行人格 🌍</div>
      <div style="font-size:13px;color:#999">支持 1-4 人一起测</div>
    </div>
    <div style="text-align:center;font-size:14px;font-weight:600;color:#555;margin-bottom:4px">选择参与人数</div>
    <div class="player-circle-grid">
      <button class="player-circle" onclick="selectPlayers(1)">1</button>
      <button class="player-circle" onclick="selectPlayers(2)">2</button>
      <button class="player-circle" onclick="selectPlayers(3)">3</button>
      <button class="player-circle" onclick="selectPlayers(4)">4</button>
    </div>
    <button class="start-btn" id="startBtn" disabled onclick="beginGame()">开始测试</button>
  </div>

  <!-- Transition -->
  <div class="screen" id="screen-transition">
    <div class="transition-screen">
      <div class="transition-emoji" id="transition-emoji">🎯</div>
      <div class="transition-title" id="transition-title">轮到你了！</div>
      <div class="transition-sub" id="transition-sub">6道题测出你的旅行人格</div>
      <button class="next-btn" id="transition-btn" onclick="startQuiz()">开始测试 ✨</button>
    </div>
  </div>

  <!-- Quiz -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-progress">
      <div class="progress-info">
        <span id="progress-player">第1人</span>
        <span id="progress-q">1/6</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:16.6%"></div>
      </div>
    </div>
    <div class="question-container" id="question-container"></div>
  </div>

  <!-- Result -->
  <div class="screen" id="screen-result"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== Data =====
const QUESTIONS = [
  {

      { text: "立刻查备用方案，早就预想到了", emoji: "📱" },
      { text: "无所谓，去旁边逛逛", emoji: "😎" },
      { text: "赶紧算算时间，重新排期", emoji: "⏱️" },
      { text: "问问大家的意见再决定", emoji: "🤔" }
    ],
    scores: [{ 规划: 2 },{ 随性: 2 },{ 统筹: 2 },{ 随性: 1 }]

      { text: "找当地最火的餐厅，先吃饱", emoji: "🍜" },
      { text: "对照攻略，确认今天的路线", emoji: "📍" },
      { text: "记账，今天预算还剩多少", emoji: "💳" }
    ],
    scores: [{ 随性: 1 },{ 随性: 2 },{ 规划: 2 },{ 财务: 2 }]
  },
  {
    title: "旅途中遇到超出预算的体验，你会？",
    options: [
      { text: "果断放弃，守住预算", emoji: "💪" },
      { text: "咬咬牙去，值得！", emoji: "✨" },
      { text: "看情况，和大家商量", emoji: "🙋" },
      { text: "去！反正计划本来就不重要", emoji: "😄" }
    ],
    scores: [{ 财务: 2 },{ 随性: 2 },{ 统筹: 2 },{ 随性: 1 }]
  },
  {
    title: "旅行结束，你第一件事是？",
    options: [
      { text: "整理照片，写游记", emoji: "📝" },
      { text: "算算这次共花了多少钱", emoji: "🧾" },
      { text: "已经在查下一个目的地了", emoji: "🌍" },
      { text: "倒头就睡，体力耗尽", emoji: "💤" }
    ],
    scores: [{ 规划: 2 },{ 财务: 2 },{ 规划: 1 },{ 随性: 2 }]
  }
];

const ROLES = {
  规划: { emoji:"🗺️", name:"旅行老大", alias:"行程总指挥", trait:"出发前攻略已背熟，预案比正案还多", skill:"任何突发情况都难不倒，永远知道下一步去哪", weakness:"有时太死板，错过路边的惊喜", quote:"按计划来！", color:"#FF8C42", gradient:"linear-gradient(135deg,#FF8C42,#FF6B6B)" },
  随性: { emoji:"🎒", name:"随缘旅行家", alias:"随时待命的", trait:"收拾包5分钟，随时可以出发", skill:"适应力超强，哪里都能玩嗨", weakness:"容易迷路，全靠队友兜底", quote:"去哪儿都行！", color:"#4ECDC4", gradient:"linear-gradient(135deg,#4ECDC4,#44B0D6)" },
  统筹: { emoji:"🤝", name:"团队润滑剂", alias:"走哪儿跟哪儿的", trait:"永远在协调，让所有人都满意", skill:"化解分歧，把不同需求都安排进去", weakness:"有时自己的愿望被忽略了", quote:"大家开心最重要！", color:"#A78BFA", gradient:"linear-gradient(135deg,#A78BFA,#C084FC)" },
  财务: { emoji:"💰", name:"金钱管家", alias:"首席财务官", trait:"记账比拍照还勤快", skill:"让团队在预算内玩得最爽", weakness:"有时过于节省错过好体验", quote:"超预算了！", color:"#10B981", gradient:"linear-gradient(135deg,#10B981,#059669)" }
};

const ROLE_KEYS = ['规划','随性','统筹','财务'];

const TEAM_VERDICTS = [
  { roles:['规划','随性'], text:"完美搭档！🎉 互补型旅行组合，老大兜底，随性探索，这组合走哪都稳！" },

  { roles:['规划','规划'], text:"两个老大？😅 建议提前分工，不然攻略要打架了！" },
  { roles:['随性','随性'], text:"创意型团队 🎨 但请提前预订酒店！不然可能睡大街 😂" },
  { roles:['财务','财务'], text:"省钱二人组 💸 这个团队绝对不会超预算，但可能错过很多好吃的！" },
  { roles:['统筹','统筹'], text:"和平使者联盟 ☮️ 互相谦让的一天，谁来拍板呢？" },
  { roles:['规划','随性','财务'], text:"铁三角！⚡ 规划带队、随性活跃气氛、财务守住钱包，完美旅行团！" },
  { roles:['规划','随性','统筹'], text:"全能战队 🚀 有方向有灵活有协调，只差个管钱的了！" },
  { roles:['随性','统筹','财务'], text:"欢乐管家团 🎪 虽然没老大指路，但氛围感和后勤保障满分！" },
  { roles:['规划','统筹','财务'], text:"精英管理团队 💼 攻略+协调+预算，这配置堪比旅行社！" },
  { roles:['规划','随性','统筹','财务'], text:"全明星阵容 🌟 四种角色齐了！这趟旅行堪称教科书级别的完美！" },
  { roles:['随性','随性','随性'], text:"放飞自我三人组 🕊️ 快乐是快乐，但谁来看导航？谁来订酒店？！😂" },
  { roles:['财务','财务','财务'], text:"三个财神爷 💰 预算控制能力 Max，但可能为了省5块钱走3公里！" },
  { roles:['规划','规划','规划'], text:"三个诸葛亮 📋 攻略会写三遍，行程精确到秒，就是不知道听谁的…" },
];
const DEFAULT_VERDICTS = ["这组合有点意思！🤔 旅行中一定会有很多故事！","多元组合 🌈 每种角色都有，旅途一定精彩！","独特阵容 ✨ 你们的旅行风格自成一家！"];

// ===== State =====
let playerCount = 1;
let currentPlayer = 0;
let currentQ = 0;
let allScores = [];
let slideDir = 'right';
let selectedPlayers = 0;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== Home =====
function selectPlayers(n) {
  selectedPlayers = n;
  document.querySelectorAll('.player-circle').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.player-circle')[n - 1].classList.add('selected');
  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent = `${n} 人开始测试 →`;
}

function beginGame() {
  playerCount = selectedPlayers;
  allScores = Array.from({length: playerCount}, () => ({ 规划:0, 随性:0, 统筹:0, 财务:0 }));
  currentPlayer = 0;
  currentQ = 0;
  showTransition();
}

function showTransition() {
  const emoji = ['🎯','🌟','🔥','⚡'][currentPlayer % 4];
  const label = playerCount === 1 ? '准备好了吗？' : `轮到第 ${currentPlayer + 1} 位`;
  document.getElementById('transition-emoji').textContent = emoji;
  document.getElementById('transition-title').textContent = label;
  document.getElementById('transition-sub').textContent = playerCount === 1 ? '6道题测出你的旅行人格' : '6道题，看看你是哪种旅行角色';
  document.getElementById('transition-btn').textContent = playerCount === 1 ? '开始测试 ✨' : '开始答题 ✨';
  showScreen('screen-transition');
}

function startQuiz() {
  currentQ = 0;
  renderQuestion();
  showScreen('screen-quiz');
}

// ===== Quiz =====
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const container = document.getElementById('question-container');
  const playerName = playerCount === 1 ? '你' : `第 ${currentPlayer + 1} 位`;
  const totalQ = playerCount * 6;
  const done = currentPlayer * 6 + currentQ;
  const pct = ((done + 1) / totalQ * 100);
  const roleColor = getPredictedColor(currentPlayer);

  document.getElementById('progress-player').innerHTML = `第<span class="highlight">${currentPlayer + 1}</span>人`;
  document.getElementById('progress-q').textContent = `${currentQ + 1}/6`;
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.style.background = roleColor;

  const labels = ['A','B','C','D'];
  let html = `<div class="question-card ${slideDir === 'left' ? 'slide-left' : 'slide-right'}"><div class="question-card-inner">`;
  html += `<div class="player-badge"><span class="dot" style="background:${roleColor}"></span>${playerName} 的回合</div>`;
  html += `<div class="q-number">QUESTION ${currentQ + 1} / 6</div>`;
  html += `<div class="q-title">${q.title}</div>`;
  html += `<div class="options">`;
  q.options.forEach((opt, i) => {
    html += `<button class="option-btn" onclick="pickOption(${i})">${opt.emoji} ${opt.text}</button>`;
  });
  html += `</div></div></div>`;
  container.innerHTML = html;
}

function getPredictedColor(pi) { return ROLES[ROLE_KEYS[pi % 4]].color; }

function pickOption(idx) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => b.classList.remove('picked'));
  btns[idx].classList.add('picked');

  const q = QUESTIONS[currentQ];
  const scoreMap = q.scores[idx];
  for (const [role, pts] of Object.entries(scoreMap)) {
    allScores[currentPlayer][role] += pts;
  }

  setTimeout(() => {
    if (currentQ < 5) {
      currentQ++;
      slideDir = 'left';
      renderQuestion();
    } else if (currentPlayer < playerCount - 1) {
      currentPlayer++;
      currentQ = 0;
      slideDir = 'right';
      showTransition();
    } else {
      showResults();
    }
  }, 350);
}

// ===== Results =====
function getRole(scores) {
  let maxRole = ROLE_KEYS[0], maxScore = -1;
  for (const r of ROLE_KEYS) { if (scores[r] > maxScore) { maxScore = scores[r]; maxRole = r; } }
  return { role: maxRole, scores, ...ROLES[maxRole] };
}

function getTeamVerdict(results) {
  if (results.length === 1) return null;
  const roleSet = results.map(r => r.role);
  for (const v of TEAM_VERDICTS) {
    if (v.roles.length === roleSet.length && v.roles.every(r => roleSet.includes(r)) && roleSet.every(r => v.roles.includes(r))) {
      const sortedA = [...v.roles].sort().join(',');
      const sortedB = [...roleSet].sort().join(',');
      if (sortedA === sortedB) return v.text;
    }
  }
  const uniqueRoles = [...new Set(roleSet)].sort().join(',');
  for (const v of TEAM_VERDICTS) {
    if ([...v.roles].sort().join(',') === uniqueRoles) return v.text;
  }
  return DEFAULT_VERDICTS[Math.floor(Math.random() * DEFAULT_VERDICTS.length)];
}

function showResults() {
  const results = allScores.map((s, i) => getRole(s));
  const container = document.getElementById('screen-result');

  let html = `<div class="result-header"><span class="trophy">🏆</span><h2>鉴定结果揭晓！</h2><p>${playerCount === 1 ? '你的旅行人格是…' : playerCount + ' 位旅行达人的角色出炉'}</p></div>`;

  if (playerCount === 1) {
    const r = results[0];
    html += `<div class="role-card" style="background:${r.gradient}">`;
    html += `<span class="role-emoji">${r.emoji}</span>`;
    html += `<div class="role-name">${r.name}</div>`;
    html += `<div class="role-alias">「${r.alias}」</div>`;
    html += `<div class="role-details">`;
    html += `<div class="detail-item"><span class="detail-label">🎯 特征：</span>${r.trait}</div>`;
    html += `<div class="detail-item"><span class="detail-label">⚡ 技能：</span>${r.skill}</div>`;
    html += `<div class="detail-item"><span class="detail-label">😅 弱点：</span>${r.weakness}</div>`;
    html += `</div>`;
    html += `<div class="score-bars">`;
    for (const rk of ROLE_KEYS) {
      const maxPossible = 8;
      const pct = Math.min(100, (results[0].scores[rk] / maxPossible) * 100);
      const shortName = { 规划:'规划', 随性:'随性', 统筹:'统筹', 财务:'财务' }[rk];
      html += `<div class="score-bar-row"><span class="score-bar-label">${ROLES[rk].emoji} ${shortName}</span><div class="score-bar-track"><div class="score-bar-val" style="width:${pct}%;transition-delay:0.5s"></div></div></div>`;
    }
    html += `</div>`;
    html += `<div class="role-quote">"${r.quote}"</div></div>`;
  } else {
    html += `<div class="mini-cards">`;
    results.forEach((r, i) => {
      html += `<div class="mini-card" style="background:${r.gradient};animation-delay:${i * 150}ms">`;
      html += `<span class="role-emoji">${r.emoji}</span>`;
      html += `<div class="role-name">${r.name}</div>`;
      html += `<div class="role-player-label">第${i + 1}位 · 「${r.alias}」</div>`;
      html += `</div>`;
    });
    html += `</div>`;

    const verdict = getTeamVerdict(results);
    const delay = results.length * 150;
    html += `<div class="team-analysis" style="animation-delay:${delay}ms">`;
    html += `<h3>🔍 团队分析</h3>`;
    if (verdict) html += `<div class="team-verdict">${verdict}</div>`;
    const tags = [];
    const hasRole = r => results.some(x => x.role === r);
    if (hasRole('财务')) tags.push('💰 绝不超预算');
    if (hasRole('规划') && hasRole('随性')) tags.push('⚡ 互补搭档');
    if (results.filter(x => x.role === '随性').length >= 2) tags.push('🎨 放飞自我');
    if (results.filter(x => x.role === '规划').length >= 2) tags.push('📋 攻略狂魔');
    if (hasRole('统筹')) tags.push('🤝 团队润滑');
    if (results.every(x => x.role === results[0].role)) tags.push('🎭 灵魂一致');
    html += `<div class="team-tags">`;
    tags.forEach(t => { html += `<span class="team-tag">${t}</span>`; });
    html += `</div></div>`;
  }

  html += `<div class="action-btns">`;
  html += `<button class="action-btn" onclick="shareResult()">📤 分享结果</button>`;
  html += `<button class="action-btn primary" onclick="resetGame()">🔄 再测一次</button>`;
  html += `</div>`;

  container.innerHTML = html;
  showScreen('screen-result');
}

function shareResult() {
  const results = allScores.map((s, i) => getRole(s));
  let text = '🧳 旅行达人鉴定结果\n\n';
  results.forEach((r, i) => {
    const label = playerCount > 1 ? `第${i + 1}位` : '我';
    text += `${r.emoji} ${label}：${r.name}「${r.alias}」\n`;
  });
  if (playerCount > 1) text += '\n' + getTeamVerdict(results) + '\n';
  text += '\n来测测你的旅行人格吧！🌍';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制到剪贴板'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('✅ 已复制到剪贴板');
  }
}

function resetGame() {
  currentPlayer = 0; currentQ = 0;
  allScores = Array.from({length: playerCount}, () => ({ 规划:0, 随性:0, 统筹:0, 财务:0 }));
  slideDir = 'right'; selectedPlayers = 0;
  document.querySelectorAll('.player-circle').forEach(b => b.classList.remove('selected'));
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = '开始测试';
  showScreen('screen-home');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
