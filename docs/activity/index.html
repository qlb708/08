<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>活动 Demo · 圆周旅迹</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAFAF8;--card:#fff;--text:#1a1a2e;--soft:#5a6480;--muted:#9ba3b8;
  --line:#e8eaef;--accent:#1a56db;
  --font:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;
}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--font);background:#e0e0e0;min-height:100vh;display:flex;justify-content:center}
.shell{width:100%;max-width:390px;min-height:100vh;background:var(--bg);box-shadow:0 0 40px rgba(0,0,0,.18)}

nav{height:52px;background:rgba(250,250,248,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;
  padding:0 20px;gap:10px;position:sticky;top:0;z-index:100}
.logo{font-size:14px;font-weight:700;color:var(--text)}
.back{margin-left:auto;font-size:12px;color:var(--accent);text-decoration:none;
  padding:5px 12px;border-radius:16px;border:1px solid rgba(26,86,219,.2);transition:all .15s}
.back:hover{background:rgba(26,86,219,.05)}

.hero{padding:28px 20px 20px;text-align:center}
.hero-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;color:var(--soft);
  background:#f0f2f5;border-radius:20px;padding:4px 12px;margin-bottom:14px}
.hero h1{font-size:26px;font-weight:800;letter-spacing:-.03em;color:var(--text);margin-bottom:6px;line-height:1.2}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero p{font-size:12px;color:var(--soft);line-height:1.7}

.cards{padding:0 14px 48px;display:grid;grid-template-columns:1fr 1fr;gap:10px}

.demo-card{background:var(--card);border-radius:14px;overflow:hidden;text-decoration:none;
  display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s;
  border:1px solid var(--line)}
.demo-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.demo-card:active{transform:scale(.97)}

/* 占卜合并卡——满宽 */
.demo-card.full{grid-column:1/-1}
.demo-card.full .card-cover{height:110px;font-size:44px}

.card-cover{height:90px;display:flex;align-items:center;justify-content:center;font-size:34px}
.card-body{padding:11px 12px 13px;flex:1;display:flex;flex-direction:column}
.card-tag{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:2px 7px;border-radius:10px;margin-bottom:5px;width:fit-content;
  color:var(--accent);background:rgba(26,86,219,.08)}
.card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.25}
.card-desc{font-size:11px;color:var(--soft);line-height:1.55;flex:1}
.card-arrow{margin-top:9px;display:flex;align-items:center;justify-content:space-between}
.card-arrow-text{font-size:11px;font-weight:600;color:var(--accent)}
.card-arrow-icon{font-size:11px;color:var(--accent)}

.c-mystic .card-cover{background:linear-gradient(135deg,#1a1a2e,#2d1b69)}
.c-mystic .card-tag{color:#a78bfa;background:rgba(167,139,250,.12)}
.c-mystic .card-title{color:#1a1a2e}
.c-mystic .card-arrow-text,.c-mystic .card-arrow-icon{color:#7c3aed}

.c-traveler .card-cover{background:linear-gradient(135deg,#E8F5E9,#C8E6C9)}
.c-footprint .card-cover{background:linear-gradient(135deg,#FFF8E1,#FFECB3)}

.bottom-note{text-align:center;padding:0 20px 28px;font-size:11px;color:var(--muted);line-height:1.7}
</style>
</head>
<body>
<div class="shell">

<nav>
  <div class="logo">🎯 活动 Demo</div>
  <a href="/08/works/" class="back">← 工具集</a>
</nav>

<div class="hero">
  <div class="hero-tag">✦ Interactive Demo</div>
  <h1>互动<em>体验</em>演示</h1>
  <p>产品运营视角下的活动设计<br>每个 Demo 都是完整的交互原型</p>
</div>

<div class="cards">

  <!-- 占卜合并——满宽展示 -->
  <a class="demo-card c-mystic full" href="/08/activity/fortune/">
    <div class="card-cover">🔮✨🕯️</div>
    <div class="card-body">
      <div class="card-tag">玄学占卜 · 合并版</div>
      <div class="card-title">命运之地 × 问天机</div>
      <div class="card-desc">城市命运测定 + 三式仪式问卜，两套玄学体验合一入口，测出你的命定目的地</div>
      <div class="card-arrow"><span class="card-arrow-text">开始占卜</span><span class="card-arrow-icon">→</span></div>
    </div>
  </a>

  <a class="demo-card c-traveler" href="/08/activity/traveler/">
    <div class="card-cover">🎒🗺️</div>
    <div class="card-body">
      <div class="card-tag">角色鉴定</div>
      <div class="card-title">旅行达人鉴定</div>
      <div class="card-desc">最多4人测出旅行角色与团队默契</div>
      <div class="card-arrow"><span class="card-arrow-text">开始鉴定</span><span class="card-arrow-icon">→</span></div>
    </div>
  </a>

  <a class="demo-card c-footprint" href="/08/activity/footprint/">
    <div class="card-cover">🌍✈️</div>
    <div class="card-body">
      <div class="card-tag">UGC · 足迹</div>
      <div class="card-title">我的旅行足迹</div>
      <div class="card-desc">标记去过的城市，生成专属旅行卡片</div>
      <div class="card-arrow"><span class="card-arrow-text">开始打卡</span><span class="card-arrow-icon">→</span></div>
    </div>
  </a>

</div>

<div class="bottom-note">圆周旅迹 · 产品运营 × 互动体验</div>
</div>
</body>
</html>
