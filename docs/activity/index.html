<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>⚽ 球迷旅行 · 活动 Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f8f8f8;
  --text:#0D0D0D;--soft:#6b7280;--muted:#9ca3af;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.14);
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  --gold:#c8920a;--goldbg:#fffbeb;
}
html,body{font-family:var(--font);background:var(--bg2);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── 手机容器 ── */
.shell{max-width:390px;margin:0 auto;min-height:100vh;background:#fff;position:relative;display:flex;flex-direction:column}
@media(min-width:440px){.shell{box-shadow:0 0 0 1px rgba(0,0,0,.06),0 20px 60px rgba(0,0,0,.08);min-height:100vh}}

/* ── NAV ── */
nav{height:50px;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;letter-spacing:-.02em}
.lm{width:24px;height:24px;background:#0D0D0D;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;line-height:1}
.back{margin-left:auto;font-size:12px;color:var(--soft);display:flex;align-items:center;gap:3px;padding:4px 10px;border-radius:20px;border:1px solid var(--bd);text-decoration:none}
.back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* ── MODULE TABS ── */
.mod-tabs{display:flex;padding:12px 16px 0;gap:0;border-bottom:1px solid var(--bd);flex-shrink:0;background:#fff}
.mtab{flex:1;text-align:center;padding:8px 0 10px;font-size:13px;font-weight:700;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;position:relative}
.mtab.on{color:var(--text);border-bottom-color:#0D0D0D}
.mtab .badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;background:#ef4444;color:#fff;border-radius:50%;font-size:9px;font-weight:800;margin-left:4px;vertical-align:middle}

/* ── PAGE PANELS ── */
.panel{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.panel.show{display:block}

/* ════════════════════════════════════════════
   MODULE A：球星匹配
═══════════════════════════════════════════ */
/* HERO */
.qa-hero{padding:28px 20px 20px;text-align:center;background:#0D0D0D;color:#fff;position:relative;overflow:hidden}
.qa-hero::before{content:'⚽';position:absolute;font-size:160px;opacity:.05;right:-30px;top:-20px;transform:rotate(20deg);pointer-events:none}
.qa-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:3px 10px;margin-bottom:12px}
.qa-hero h2{font-size:26px;font-weight:900;letter-spacing:-.05em;line-height:1.1;margin-bottom:8px}
.qa-hero h2 em{font-style:normal;color:var(--gold)}
.qa-hero p{font-size:13px;color:rgba(255,255,255,.55);line-height:1.6}

/* PROGRESS */
.qa-prog{padding:12px 20px;border-bottom:1px solid var(--bd);background:#fff;display:flex;align-items:center;gap:10px}
.qa-prog-track{flex:1;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.qa-prog-fill{height:100%;background:#0D0D0D;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.qa-prog-label{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}

/* QUESTION */
.qa-qwrap{padding:20px}
.qa-qnum{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.qa-qtext{font-size:17px;font-weight:800;letter-spacing:-.03em;line-height:1.4;margin-bottom:16px}
.qa-opts{display:flex;flex-direction:column;gap:8px}
.qa-opt{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:13px;border:1.5px solid var(--bd);cursor:pointer;background:#fff;font-family:var(--font);text-align:left;width:100%;transition:all .15s}
.qa-opt:active{transform:scale(.98)}
.qa-opt.sel{border-color:#0D0D0D;background:#0D0D0D}
.qa-opt.sel .qa-opt-text{color:#fff}
.qa-opt.sel .qa-opt-sub{color:rgba(255,255,255,.5)}
.qa-opt-em{font-size:20px;width:32px;text-align:center;flex-shrink:0}
.qa-opt-body{flex:1}
.qa-opt-text{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.qa-opt-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* RESULT */
.qa-result{display:none;animation:fadeUp .4s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.res-top{background:#0D0D0D;color:#fff;padding:28px 20px 20px;text-align:center}
.res-star-avatar{font-size:56px;margin-bottom:10px;display:block;animation:pop .4s cubic-bezier(.34,1.56,.64,1) .1s both}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.res-match-label{font-size:10px;letter-spacing:.12em;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:4px}
.res-star-name{font-size:28px;font-weight:900;letter-spacing:-.05em;margin-bottom:3px}
.res-star-en{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:12px}
.res-desc{font-size:13px;line-height:1.75;color:rgba(255,255,255,.75);padding:0 4px}
.res-tags{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.res-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}

.res-body{padding:16px}
.res-sec{margin-bottom:16px}
.res-sec-title{font-size:10px;font-weight:700;letter-spacing:.09em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}

/* 路线卡 */
.route-strip{background:var(--bg2);border-radius:13px;padding:14px;display:flex;flex-direction:column;gap:0}
.rc-city{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--bd)}
.rc-city:last-child{border-bottom:none;padding-bottom:0}
.rc-city:first-child{padding-top:0}
.rc-dot{width:8px;height:8px;border-radius:50%;background:#0D0D0D;flex-shrink:0}
.rc-info{flex:1}
.rc-name{font-size:14px;font-weight:700}
.rc-note{font-size:11px;color:var(--soft);margin-top:1px}
.rc-go{font-size:11px;color:var(--muted);background:#fff;border:1px solid var(--bd);border-radius:20px;padding:3px 9px;white-space:nowrap;cursor:pointer;transition:all .15s}
.rc-go:active{background:#0D0D0D;color:#fff;border-color:#0D0D0D}

/* 玄学卡 */
.luck-card{background:var(--goldbg);border:1px solid rgba(200,146,10,.2);border-radius:13px;padding:14px;font-size:13px;line-height:1.75;color:#7a5800}

/* 特质条 */
.trait-list{display:flex;flex-direction:column;gap:8px}
.trait-row{display:flex;align-items:center;gap:8px}
.trait-lbl{font-size:11px;font-weight:600;color:var(--soft);width:48px;flex-shrink:0}
.trait-track{flex:1;height:5px;background:var(--bg2);border-radius:3px;overflow:hidden}
.trait-bar{height:100%;background:#0D0D0D;border-radius:3px;width:0;transition:width .8s cubic-bezier(.4,0,.2,1)}
.trait-val{font-size:10px;font-weight:700;width:26px;text-align:right;flex-shrink:0}

/* 去朝圣 */
.go-pilgrimage{display:flex;align-items:center;gap:12px;background:#0D0D0D;border-radius:13px;padding:14px;cursor:pointer;border:none;font-family:var(--font);width:100%}
.go-pilgrimage-icon{font-size:22px;width:36px;text-align:center;flex-shrink:0}
.go-pilgrimage-body{flex:1;text-align:left}
.go-pilgrimage-title{font-size:14px;font-weight:700;color:#fff}
.go-pilgrimage-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.go-pilgrimage-arr{color:rgba(255,255,255,.4);font-size:16px}

.retry-btn{width:100%;margin-top:8px;padding:13px;border-radius:13px;border:1.5px solid var(--bd);background:#fff;font-size:14px;font-weight:700;font-family:var(--font);color:var(--text);cursor:pointer}
.retry-btn:active{background:var(--bg2)}

/* ════════════════════════════════════════════
   MODULE B：打卡路线
═══════════════════════════════════════════ */
.pb-top{padding:20px 20px 12px;background:#fff;border-bottom:1px solid var(--bd)}
.pb-top h3{font-size:20px;font-weight:900;letter-spacing:-.04em;margin-bottom:4px}
.pb-top p{font-size:12px;color:var(--soft);line-height:1.5}

.route-tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:#fff;border-bottom:1px solid var(--bd)}
.route-tabs::-webkit-scrollbar{display:none}
.rtab{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;border:1.5px solid var(--bd);background:#fff;color:var(--soft);font-family:var(--font)}
.rtab.on{background:#0D0D0D;color:#fff;border-color:#0D0D0D}

.route-cards{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.rcard{background:#fff;border:1.5px solid var(--bd);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s}
.rcard.expanded{border-color:#0D0D0D}
.rcard-head{display:flex;align-items:center;gap:12px;padding:14px}
.rcard-num{width:32px;height:32px;border-radius:9px;background:#0D0D0D;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.rcard-info{flex:1}
.rcard-name{font-size:15px;font-weight:800;letter-spacing:-.02em}
.rcard-meta{font-size:11px;color:var(--soft);margin-top:2px}
.rcard-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.rcard-check.done{background:#0D0D0D;border-color:#0D0D0D}
.rcard-check.done::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.rcard-body{padding:0 14px 14px;display:none;border-top:1px solid var(--bd);margin-top:-1px}
.rcard.expanded .rcard-body{display:block;animation:fadeUp .25s ease forwards}
.rcard-spots{display:flex;flex-direction:column;gap:0;margin-bottom:12px}
.spot{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--bd)}
.spot:last-child{border-bottom:none}
.spot-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0;margin-top:1px}
.spot-body{flex:1}
.spot-name{font-size:13px;font-weight:700}
.spot-desc{font-size:11px;color:var(--soft);margin-top:2px;line-height:1.5}
.spot-tip{display:inline-block;font-size:10px;background:var(--goldbg);color:var(--gold);font-weight:700;padding:2px 7px;border-radius:20px;margin-top:4px}
.punch-btn{width:100%;padding:11px;border-radius:10px;background:#0D0D0D;color:#fff;border:none;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;transition:all .2s}
.punch-btn.punched{background:#f0fdf4;color:#16a34a;border:1.5px solid #bbf7d0}
.punch-btn:active{opacity:.85}

/* 成就栏 */
.achieve-bar{padding:12px 16px;background:var(--goldbg);border-bottom:1px solid rgba(200,146,10,.15);display:flex;align-items:center;gap:10px}
.achieve-icon{font-size:22px}
.achieve-body{flex:1}
.achieve-title{font-size:12px;font-weight:700;color:#7a5800}
.achieve-sub{font-size:10px;color:var(--gold);margin-top:1px}
.achieve-count{font-size:22px;font-weight:900;color:#0D0D0D}

/* 滚到结果时的浮层提示 */
.float-tip{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0D0D0D;color:#fff;border-radius:20px;padding:10px 20px;font-size:13px;font-weight:600;white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,.25);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s}
.float-tip.show{opacity:1}

/* copy toast */
.copy-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#0D0D0D;color:#fff;border-radius:20px;padding:8px 18px;font-size:12px;font-weight:600;z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
.copy-toast.show{opacity:1}
</style>
</head>
<body>
<div class="shell">

<!-- NAV -->
<nav>
  <div class="logo">
    <div class="lm">⚽</div>
    <span>球迷旅行 Demo</span>
  </div>
  <a href="/08/portfolio/" class="back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    返回
  </a>
</nav>

<!-- MODULE TABS -->
<div class="mod-tabs">
  <div class="mtab on" onclick="switchMod(0,this)">⚡ 我像哪个球星</div>
  <div class="mtab" onclick="switchMod(1,this)">🗺️ 朝圣路线打卡</div>
</div>

<!-- ════ PANEL A: 球星匹配 ════ -->
<div class="panel show" id="panelA">

  <div class="qa-hero">
    <div class="qa-badge">⚽ 2026 世界杯特别版</div>
    <h2>你最像哪位<em>球星</em>？</h2>
    <p>6 道题 · 自动匹配你的旅行人格<br>解锁专属朝圣路线</p>
  </div>

  <div class="qa-prog" id="qa-prog" style="display:none">
    <div class="qa-prog-track"><div class="qa-prog-fill" id="qa-fill"></div></div>
    <div class="qa-prog-label" id="qa-label">0 / 6</div>
  </div>

  <!-- 题目容器 -->
  <div id="qa-qwrap" style="display:none" class="qa-qwrap">
    <div class="qa-qnum" id="qa-qnum"></div>
    <div class="qa-qtext" id="qa-qtext"></div>
    <div class="qa-opts" id="qa-opts"></div>
  </div>

  <!-- 开始按钮 -->
  <div id="qa-start" style="padding:28px 20px;text-align:center">
    <div style="font-size:52px;margin-bottom:16px">🐐⚡💪🎩🔥</div>
    <div style="font-size:14px;color:var(--soft);line-height:1.7;margin-bottom:24px">梅西的沉默·C罗的极致<br>姆巴佩的速度·贝克汉姆的精准·马拉多纳的传奇<br><br><b style="color:var(--text)">你的旅行风格，藏着你是谁。</b></div>
    <button onclick="startQA()" style="width:100%;padding:15px;border-radius:13px;background:#0D0D0D;color:#fff;border:none;font-size:15px;font-weight:800;font-family:var(--font);cursor:pointer;letter-spacing:-.01em">⚡ 开始匹配</button>
  </div>

  <!-- 结果 -->
  <div id="qa-result" class="qa-result"></div>

</div><!-- /panelA -->

<!-- ════ PANEL B: 打卡路线 ════ -->
<div class="panel" id="panelB">

  <div class="pb-top">
    <h3>⚽ 经典朝圣路线</h3>
    <p>选一条路线 · 打卡你去过的地方 · 解锁专属球迷成就</p>
  </div>

  <div class="achieve-bar">
    <div class="achieve-icon">🏆</div>
    <div class="achieve-body">
      <div class="achieve-title">朝圣成就</div>
      <div class="achieve-sub">已打卡城市数</div>
    </div>
    <div class="achieve-count" id="ach-count">0</div>
  </div>

  <div class="route-tabs">
    <button class="rtab on" onclick="switchRoute(0,this)">⚽ 欧洲经典</button>
    <button class="rtab" onclick="switchRoute(1,this)">🏆 世界杯之旅</button>
    <button class="rtab" onclick="switchRoute(2,this)">🌟 球星足迹</button>
  </div>

  <div class="route-cards" id="route-cards"></div>

</div><!-- /panelB -->

</div><!-- /shell -->

<div class="copy-toast" id="copy-toast">✅ 已复制</div>

<script>
// ══════════════════════════════════════════
// MODULE A: 球星匹配
// ══════════════════════════════════════════
var QS = [
  {
    q:'旅行前，你的第一个冲动是...',
    opts:[
      {k:'A', em:'🗺️', t:'找那些鲜为人知的小街巷', s:'越隐秘越有味道'},
      {k:'B', em:'📸', t:'先看哪里最出片、最能拍大片', s:'每个地方都要留下完美画面'},
      {k:'C', em:'🚀', t:'订最快的交通，多城市连刷', s:'我想在最短时间去最多地方'},
      {k:'D', em:'📋', t:'做详细攻略，逐小时安排', s:'没有计划就没有完美旅途'},
      {k:'E', em:'🎲', t:'随便，到了再说', s:'最好的惊喜都是计划外的'},
    ]
  },
  {
    q:'在旅途中，你最享受的瞬间是...',
    opts:[
      {k:'A', em:'🔍', t:'发现一家只有当地人去的小馆子', s:'这才叫真正融入'},
      {k:'B', em:'✨', t:'每个景点都拍出了满意的照片', s:'回头看行程，张张都值得发'},
      {k:'C', em:'⚡', t:'24小时内跨越两个城市', s:'效率感让我兴奋'},
      {k:'D', em:'📌', t:'行程完全按计划推进，没有意外', s:'掌控感就是安全感'},
      {k:'E', em:'🌊', t:'在街头碰到意外的精彩', s:'剧本之外才是旅行本质'},
    ]
  },
  {
    q:'旅途碰到麻烦（堵车/景点关门），你会...',
    opts:[
      {k:'A', em:'🧘', t:'沉住气，慢慢找替代方案', s:'急有什么用，先观察再出手'},
      {k:'B', em:'🔄', t:'立刻找下一个同类打卡点', s:'不能浪费任何时间'},
      {k:'C', em:'💨', t:'立刻出发去下一个城市', s:'错过了就跳过，前方更精彩'},
      {k:'D', em:'📲', t:'对照备用计划B，调整时间表', s:'麻烦早在我的预案里'},
      {k:'E', em:'😂', t:'当成好玩的故事，随遇而安', s:'最难忘的经历往往来自意外'},
    ]
  },
  {
    q:'如果只能去一类地方，你会选...',
    opts:[
      {k:'A', em:'🏘️', t:'老城区、本地菜市场、历史小巷', s:'文化从来藏在细节里'},
      {k:'B', em:'🌅', t:'有绝美风景的网红地标', s:'视觉冲击才是旅行的意义'},
      {k:'C', em:'🌍', t:'跨越多个城市的连轴转路线', s:'数量带来的满足感无可替代'},
      {k:'D', em:'🎯', t:'提前做好功课的必去清单', s:'有准备才不会后悔'},
      {k:'E', em:'🎪', t:'路边随机碰到什么就去什么', s:'目的地是用来打破的'},
    ]
  },
  {
    q:'结束旅行，你会怎么记录？',
    opts:[
      {k:'A', em:'📓', t:'写一篇深度游记，记下每个细节', s:'那些小发现值得被记住'},
      {k:'B', em:'🖼️', t:'精修一组照片发社交媒体', s:'要让别人羡慕'},
      {k:'C', em:'✅', t:'把打卡地列个完成清单', s:'成就感来自数量'},
      {k:'D', em:'📊', t:'整理旅行总结，优化下次行程', s:'每次旅行都是数据积累'},
      {k:'E', em:'🤳', t:'发一条朋友圈，然后忘了', s:'活在当下，不留遗憾'},
    ]
  },
  {
    q:'选队伍支持你会怎么选？',
    opts:[
      {k:'A', em:'🏰', t:'传统豪门，历史厚度最重要', s:'荣耀需要时间积累'},

var answers={}, curQ=0, inQA=false, resultStar=null;

function startQA(){
  document.getElementById('qa-start').style.display='none';
  document.getElementById('qa-prog').style.display='flex';
  document.getElementById('qa-qwrap').style.display='block';
  inQA=true;
  renderQ(0);
}

function renderQ(i){
  var q=QS[i];
  document.getElementById('qa-qnum').textContent='Q'+(i+1)+' / '+QS.length;
  document.getElementById('qa-qtext').textContent=q.q;
  var html='';
  q.opts.forEach(function(o){
    html+='<button class="qa-opt" data-k="'+o.k+'" onclick="pickOpt('+i+',\''+o.k+'\')">'
      +'<div class="qa-opt-em">'+o.em+'</div>'
      +'<div class="qa-opt-body"><div class="qa-opt-text">'+o.t+'</div><div class="qa-opt-sub">'+o.s+'</div></div>'
      +'</button>';
  });
  document.getElementById('qa-opts').innerHTML=html;
  var pct=Math.round(i/QS.length*100);
  document.getElementById('qa-fill').style.width=pct+'%';
  document.getElementById('qa-label').textContent=i+' / '+QS.length;
  document.getElementById('qa-qwrap').scrollIntoView({behavior:'smooth',block:'start'});
}

function pickOpt(qi, key){
  answers[qi]=key;
  document.querySelectorAll('.qa-opt').forEach(function(el){
    el.classList.toggle('sel', el.dataset.k===key);
  });
  document.getElementById('qa-fill').style.width=Math.round((qi+1)/QS.length*100)+'%';
  document.getElementById('qa-label').textContent=(qi+1)+' / '+QS.length;
  setTimeout(function(){
    if(qi+1<QS.length){ renderQ(qi+1); }
    else { showResult(); }
  },500);
}

function showResult(){
  var cnt={A:0,B:0,C:0,D:0,E:0};
  Object.values(answers).forEach(function(k){ cnt[k]=(cnt[k]||0)+1; });
  var best=Object.keys(cnt).reduce(function(a,b){ return cnt[a]>=cnt[b]?a:b; });
  resultStar=best;
  var s=STARS[best];

  document.getElementById('qa-prog').style.display='none';
  document.getElementById('qa-qwrap').style.display='none';

  var routeHTML=s.route.map(function(r,i){
    return '<div class="rc-city">'
      +'<div class="rc-dot"></div>'
      +'<div class="rc-info"><div class="rc-name">'+r.city+'</div><div class="rc-note">'+r.note+'</div></div>'
      +'<div class="rc-go" onclick="goRoute(\''+r.city+'\')">打卡</div>'
      +'</div>';
  }).join('');

  var traitHTML=s.traits.map(function(t){
    return '<div class="trait-row">'
      +'<div class="trait-lbl">'+t.n+'</div>'
      +'<div class="trait-track"><div class="trait-bar" data-v="'+t.v+'"></div></div>'
      +'<div class="trait-val">'+t.v+'</div>'
      +'</div>';
  }).join('');

  var tagsHTML=s.tags.map(function(t){ return '<span class="res-tag">'+t+'</span>'; }).join('');

  var html='<div class="res-top">'
    +'<span class="res-star-avatar">'+s.avatar+'</span>'
    +'<div class="res-match-label">⚡ 你最像</div>'
    +'<div class="res-star-name">'+s.name+'</div>'
    +'<div class="res-star-en">'+s.en+'</div>'
    +'<div class="res-desc">'+s.desc+'</div>'
    +'<div class="res-tags">'+tagsHTML+'</div>'
    +'</div>'
    +'<div class="res-body">'
    +'<div class="res-sec"><div class="res-sec-title">🗺️ 你的专属朝圣路线</div>'
    +'<div class="route-strip">'+routeHTML+'</div>'
    +'<div style="font-size:11px;color:var(--muted);margin-top:8px;padding:0 2px">💡 '+s.tip+'</div>'
    +'</div>'
    +'<div class="res-sec"><div class="res-sec-title">🔮 玄学开运指引</div>'
    +'<div class="luck-card">'+s.luck+'</div>'
    +'</div>'
    +'<div class="res-sec"><div class="res-sec-title">📊 你的旅行气质</div>'
    +'<div class="trait-list">'+traitHTML+'</div>'
    +'</div>'
    +'<div class="res-sec">'
    +'<button class="go-pilgrimage" onclick="switchMod(1,document.querySelectorAll(\'.mtab\')[1])">'
    +'<div class="go-pilgrimage-icon">🗺️</div>'
    +'<div class="go-pilgrimage-body"><div class="go-pilgrimage-title">去打卡这条路线</div><div class="go-pilgrimage-sub">跳转到朝圣路线 · 开始打卡</div></div>'
    +'<div class="go-pilgrimage-arr">→</div>'
    +'</button>'
    +'<button class="retry-btn" onclick="retryQA()" style="margin-top:8px">🔄 重新测一次</button>'
    +'<div style="text-align:center;margin-top:12px">'
    +'<span onclick="copyResult()" style="font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline">复制我的球星结果 📋</span>'
    +'</div>'
    +'</div>'
    +'</div>';

  var res=document.getElementById('qa-result');
  res.innerHTML=html;
  res.style.display='block';
  res.scrollIntoView({behavior:'smooth',block:'start'});

  setTimeout(function(){
    document.querySelectorAll('.trait-bar').forEach(function(el){
      el.style.width=el.dataset.v+'%';
    });
  },400);
}

function copyResult(){
  if(!resultStar) return;
  var s=STARS[resultStar];
  var text='⚽ 我的球星人格匹配\n\n'+s.avatar+' 我最像：'+s.name+'\n\n'+s.desc+'\n\n'
    +'🗺️ 专属朝圣路线：'+s.route.map(function(r){return r.city;}).join(' → ')+'\n\n'+s.luck;
  try{ navigator.clipboard.writeText(text); } catch(e){
    var ta=document.createElement('textarea');ta.value=text;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  }
  showToast('✅ 已复制结果');
}

function goRoute(city){
  switchMod(1,document.querySelectorAll('.mtab')[1]);
  setTimeout(function(){ showToast('🗺️ 在打卡路线中找 '+city); },400);
}

function retryQA(){
  answers={}; curQ=0; resultStar=null;
  document.getElementById('qa-result').style.display='none';
  document.getElementById('qa-result').innerHTML='';
  document.getElementById('qa-start').style.display='block';
  document.getElementById('qa-prog').style.display='none';
  document.getElementById('qa-qwrap').style.display='none';
  document.getElementById('panelA').scrollTop=0;
}

      {em:'🍷',name:'贝伦区+葡式蛋挞原版',desc:'葡式蛋挞的发源地，贝伦修道院旁边的Pastéis de Belém。',tip:'排队40分钟是常态，值得'},
    ]},
    {name:'多特蒙德·黄墙传奇',meta:'德国 · 北莱茵-威斯特法伦',spots:[
      {em:'🏟️',name:'威斯特法伦球场·南看台',desc:'\"黄墙\"——全球最震撼的球迷看台，站票区8万人的黑黄海洋。',tip:'比赛日的站票体验是人生必须'},
      {em:'🍺',name:'德式啤酒馆文化',desc:'比赛前后，球迷聚集的啤酒馆才是真正的文化现场。',tip:'Hövels Hausbrauerei是老球迷最爱'},
      {em:'🏭',name:'鲁尔工业区遗址公园',desc:'从煤矿到文化园，独特的工业遗址体验，拍照绝佳。',tip:'Landschaftspark Duisburg-Nord'},
    ]},
  ]
];

var punched = JSON.parse(localStorage.getItem('pilgrimage_punched')||'{}');
var curRouteGroup = 0;

function savePunched(){ localStorage.setItem('pilgrimage_punched', JSON.stringify(punched)); }

function updateAchieve(){
  var cnt = Object.values(punched).filter(Boolean).length;
  document.getElementById('ach-count').textContent = cnt;
}

function switchRoute(idx, el){
  curRouteGroup = idx;
  document.querySelectorAll('.rtab').forEach(function(x){x.classList.remove('on');});
  el.classList.add('on');
  renderRoutes();
}

function renderRoutes(){
  var group = ROUTES[curRouteGroup];
  var html = '';
  group.forEach(function(route, ri){
    var punchKey = curRouteGroup+'_'+ri;
    var isPunched = punched[punchKey];
    html += '<div class="rcard'+(isPunched?' expanded':'')+'" id="rc_'+curRouteGroup+'_'+ri+'">';
    html += '<div class="rcard-head" onclick="toggleCard('+curRouteGroup+','+ri+')">';
    html += '<div class="rcard-num">'+(ri+1)+'</div>';
    html += '<div class="rcard-info"><div class="rcard-name">'+route.name+'</div><div class="rcard-meta">'+route.meta+'</div></div>';
    html += '<div class="rcard-check'+(isPunched?' done':'')+'"></div>';
    html += '</div>';
    html += '<div class="rcard-body">';
    html += '<div class="rcard-spots">';
    route.spots.forEach(function(s){
      html += '<div class="spot">'
        +'<div class="spot-icon">'+s.em+'</div>'
        +'<div class="spot-body">'
        +'<div class="spot-name">'+s.name+'</div>'
        +'<div class="spot-desc">'+s.desc+'</div>'
        +(s.tip?'<div class="spot-tip">💡 '+s.tip+'</div>':'')
        +'</div></div>';
    });
    html += '</div>';
    html += '<button class="punch-btn'+(isPunched?' punched':'')+'" onclick="punchRoute('+curRouteGroup+','+ri+',event)">'
      +(isPunched?'✅ 已打卡！':'📍 标记我去过这里')
      +'</button>';
    html += '</div></div>';
  });
  document.getElementById('route-cards').innerHTML = html;
  updateAchieve();
}

function toggleCard(g, ri){
  var el = document.getElementById('rc_'+g+'_'+ri);
  el.classList.toggle('expanded');
}

function punchRoute(g, ri, e){
  e.stopPropagation();
  var key = g+'_'+ri;
  punched[key] = !punched[key];
  savePunched();
  renderRoutes();
  if(punched[key]) showToast('🎉 打卡成功！');
}

// ══════════════════════════════════════════
// TABS
// ══════════════════════════════════════════
function switchMod(idx, el){
  document.querySelectorAll('.mtab').forEach(function(x){x.classList.remove('on');});
  el.classList.add('on');
  document.getElementById('panelA').classList.toggle('show', idx===0);
  document.getElementById('panelB').classList.toggle('show', idx===1);
  if(idx===1) renderRoutes();
}

// TOAST
function showToast(msg){
  var el=document.getElementById('copy-toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2000);
}

// INIT
renderRoutes();
updateAchieve();
</script>
</body>
</html>
