<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>你最像哪位球星？⚽</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f8f8f8;
  --text:#0D0D0D;--soft:#6b7280;--muted:#9ca3af;
  --bd:rgba(0,0,0,.08);
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
  --gold:#d4a017;--green:#1a6b3a;--red:#c0392b;
}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}

/* ── 手机宽度容器 ── */
.phone-wrap{max-width:390px;margin:0 auto;min-height:100vh;background:#fff;position:relative;overflow:hidden}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);height:50px;display:flex;align-items:center;padding:0 18px;gap:10px}
.logo{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:800;letter-spacing:-.02em}
.lm{width:24px;height:24px;background:#0D0D0D;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px}
.back{margin-left:auto;font-size:12px;color:var(--soft);display:flex;align-items:center;gap:3px;padding:4px 10px;border-radius:20px;border:1px solid var(--bd)}
.back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

/* ── PROGRESS BAR ── */
.prog-bar{height:3px;background:var(--bg2);position:sticky;top:50px;z-index:99}
.prog-fill{height:100%;background:#0D0D0D;transition:width .4s cubic-bezier(.4,0,.2,1);width:0%}

/* ── HERO ── */
.hero{padding:36px 24px 28px;text-align:center;position:relative;overflow:hidden}
.hero::before{
  content:'⚽';position:absolute;font-size:180px;opacity:.04;
  top:-30px;right:-40px;transform:rotate(15deg);pointer-events:none;
}
.hero::after{
  content:'🏆';position:absolute;font-size:120px;opacity:.04;
  bottom:-20px;left:-20px;transform:rotate(-10deg);pointer-events:none;
}
.hero-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);border:1px solid var(--bd);border-radius:20px;padding:4px 12px;margin-bottom:20px}
.hero h1{font-size:32px;font-weight:900;letter-spacing:-.05em;line-height:1.1;margin-bottom:10px}
.hero h1 em{font-style:normal;color:var(--gold)}
.hero p{font-size:14px;color:var(--soft);line-height:1.6;margin-bottom:24px}
.hero-cta{display:inline-flex;align-items:center;gap:7px;background:#0D0D0D;color:#fff;border:none;border-radius:14px;padding:13px 26px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.hero-cta:active{transform:scale(.97)}
.hero-cta svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}

/* ── STARS PREVIEW ── */
.stars-preview{display:flex;justify-content:center;gap:-8px;margin-top:24px;position:relative;z-index:1}
.star-avatar{width:48px;height:48px;border-radius:50%;border:2.5px solid #fff;overflow:hidden;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:22px;margin-left:-8px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.star-avatar:first-child{margin-left:0}
.stars-label{text-align:center;font-size:11px;color:var(--muted);margin-top:8px}

/* ── QUIZ SECTION ── */
#quiz-section{padding:0 0 40px;display:none}
.q-card{padding:20px 20px 0}
.q-num{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.q-text{font-size:17px;font-weight:800;letter-spacing:-.03em;line-height:1.4;margin-bottom:18px}
.options{display:flex;flex-direction:column;gap:9px;padding:0 20px 20px}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:13px;border:1.5px solid var(--bd);cursor:pointer;transition:all .18s;background:#fff;font-family:var(--font);text-align:left;width:100%}
.opt:active{transform:scale(.98)}
.opt.selected{border-color:#0D0D0D;background:#0D0D0D}
.opt.selected .opt-text{color:#fff}
.opt.selected .opt-em{color:rgba(255,255,255,.6)}
.opt-icon{font-size:20px;flex-shrink:0;width:32px;text-align:center}
.opt-body{flex:1}
.opt-text{font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
.opt-em{font-size:12px;color:var(--muted);margin-top:2px}
.opt-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s}
.opt.selected .opt-check{background:#fff;border-color:#fff}
.opt.selected .opt-check::after{content:'';width:8px;height:8px;background:#0D0D0D;border-radius:50%}

/* ── RESULT ── */
#result-section{display:none;padding:0 0 50px;animation:fadeUp .5s ease forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.result-hero{padding:28px 24px 20px;text-align:center;background:linear-gradient(160deg,#0D0D0D 0%,#1a1a1a 100%);color:#fff;margin-bottom:0}
.res-match{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:8px}
.res-avatar{font-size:64px;margin-bottom:12px;display:block;filter:drop-shadow(0 4px 20px rgba(0,0,0,.4))}
.res-name{font-size:24px;font-weight:900;letter-spacing:-.04em;margin-bottom:4px}
.res-sub{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:14px}
.res-desc{font-size:14px;line-height:1.7;color:rgba(255,255,255,.85);padding:0 4px}
.res-tags{display:flex;gap:6px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.res-tag{font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)}

.result-body{padding:20px}
.res-section{margin-bottom:18px}
.res-section-title{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
.route-card{background:var(--bg2);border-radius:14px;padding:14px 16px}
.route-city{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd)}
.route-city:last-child{border-bottom:none;padding-bottom:0}
.route-city:first-child{padding-top:0}
.city-dot{width:8px;height:8px;border-radius:50%;background:#0D0D0D;flex-shrink:0}
.city-name{font-size:14px;font-weight:700;flex:1}
.city-note{font-size:12px;color:var(--soft)}
.city-arrow{font-size:10px;color:var(--muted)}

.luck-card{background:linear-gradient(135deg,#fff8e8,#fff);border:1px solid rgba(212,160,23,.3);border-radius:14px;padding:14px 16px}
.luck-text{font-size:14px;line-height:1.7;color:#7a5800}

.star-link{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border-radius:14px;text-decoration:none;color:var(--text)}
.star-link-icon{width:40px;height:40px;background:#0D0D0D;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.star-link-body{flex:1}
.star-link-title{font-size:14px;font-weight:700}
.star-link-sub{font-size:12px;color:var(--soft);margin-top:2px}
.star-link-arr{color:var(--muted)}
.star-link-arr svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}

.share-area{display:flex;flex-direction:column;gap:9px;margin-top:0}
.share-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:13px;font-size:14px;font-weight:700;font-family:var(--font);cursor:pointer;border:none;transition:all .15s}
.share-btn:active{transform:scale(.97)}
.btn-copy{background:#0D0D0D;color:#fff}
.btn-retry{background:var(--bg2);color:var(--text);border:1px solid var(--bd)}
.btn-retry svg,.btn-copy svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.copied-tip{text-align:center;font-size:12px;color:#10b981;height:16px;transition:opacity .3s;opacity:0}
.copied-tip.show{opacity:1}

/* 维度条 */
.trait-bars{display:flex;flex-direction:column;gap:8px}
.trait-row{display:flex;align-items:center;gap:10px}
.trait-label{font-size:12px;font-weight:600;width:52px;flex-shrink:0;color:var(--soft)}
.trait-track{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.trait-fill{height:100%;border-radius:3px;background:#0D0D0D;transition:width .8s cubic-bezier(.4,0,.2,1)}
.trait-val{font-size:11px;font-weight:700;width:28px;text-align:right;flex-shrink:0}

@media(min-width:440px){
  .phone-wrap{border-left:1px solid var(--bd);border-right:1px solid var(--bd);box-shadow:0 0 40px rgba(0,0,0,.06)}
}
</style>
</head>

// ── 状态 ──────────────────────────────────────────────────
var answers = {};
var currentQ = 0;
var resultKey = '';

function startQuiz(){
  document.getElementById('hero-section').style.display = 'none';
  document.getElementById('quiz-section').style.display = 'block';
  renderQuestion(0);
  updateProgress(0);
}

function renderQuestion(idx){
  var q = QUESTIONS[idx];
  var html = '<div class="q-card"><div class="q-num">第 '+(idx+1)+' / '+QUESTIONS.length+' 题</div>'
    + '<div class="q-text">'+q.q+'</div></div>'
    + '<div class="options">';
  q.opts.forEach(function(o){
    html += '<button class="opt" onclick="selectOpt('+idx+',\''+o.k+'\')" data-k="'+o.k+'">'
      + '<div class="opt-icon">'+o.icon+'</div>'
      + '<div class="opt-body"><div class="opt-text">'+o.text+'</div><div class="opt-em">'+o.em+'</div></div>'
      + '<div class="opt-check"></div>'
      + '</button>';
  });
  html += '</div>';
  document.getElementById('questions-wrap').innerHTML = html;
  window.scrollTo({top:0,behavior:'smooth'});
}

function selectOpt(qIdx, key){
  answers[qIdx] = key;
  // 高亮选中
  document.querySelectorAll('.opt').forEach(function(el){
    el.classList.toggle('selected', el.dataset.k === key);
  });
  updateProgress(qIdx+1);
  // 延迟后进入下一题或显示结果
  setTimeout(function(){
    if(qIdx + 1 < QUESTIONS.length){
      renderQuestion(qIdx + 1);
    } else {
      showResult();
    }
  }, 480);
}

function updateProgress(done){
  var pct = Math.round(done / QUESTIONS.length * 100);
  document.getElementById('progFill').style.width = pct + '%';
}

function showResult(){
  // 统计
  var count = {A:0,B:0,C:0,D:0,E:0};
  Object.values(answers).forEach(function(k){ count[k] = (count[k]||0)+1; });
  var best = Object.keys(count).reduce(function(a,b){ return count[a]>=count[b]?a:b; });
  resultKey = best;
  var star = STARS[best];

  document.getElementById('quiz-section').style.display = 'none';
  var resEl = document.getElementById('result-section');
  resEl.style.display = 'block';
  updateProgress(QUESTIONS.length);

  document.getElementById('res-avatar').textContent = star.avatar;
  document.getElementById('res-name').textContent = star.name;
  document.getElementById('res-sub').textContent = star.sub;
  document.getElementById('res-desc').textContent = star.desc;
  document.getElementById('res-tags').innerHTML = star.tags.map(function(t){
    return '<span class="res-tag">'+t+'</span>';
  }).join('');

  // 路线
  document.getElementById('res-route').innerHTML = star.route.map(function(r,i){
    return '<div class="route-city">'
      +'<div class="city-dot"></div>'
      +'<div class="city-name">'+r.city+'</div>'
      +'<div class="city-note">'+r.note+'</div>'
      +'</div>';
  }).join('');

  document.getElementById('res-luck').textContent = star.luck;

  // 特质条
  document.getElementById('res-traits').innerHTML = star.traits.map(function(t){
    return '<div class="trait-row">'
      +'<div class="trait-label">'+t.name+'</div>'
      +'<div class="trait-track"><div class="trait-fill" style="width:0%" data-val="'+t.val+'"></div></div>'
      +'<div class="trait-val">'+t.val+'</div>'
      +'</div>';
  }).join('');

  document.getElementById('res-link-title').textContent = star.link;

  window.scrollTo({top:0,behavior:'smooth'});

  // 动画触发特质条
  setTimeout(function(){
    document.querySelectorAll('.trait-fill').forEach(function(el){
      el.style.width = el.dataset.val + '%';
    });
  }, 300);
}

function copyResult(){
  var star = STARS[resultKey];
  var text = '⚽ 我的球星匹配结果\n\n'
    + star.avatar + ' 我最像：' + star.name + '\n'
    + star.desc + '\n\n'
    + '🗺️ 专属路线：' + star.route.map(function(r){return r.city;}).join(' → ') + '\n\n'
    + star.luck + '\n\n'
    + '— 世界杯 × 欧洲朝圣 · 用圆周旅迹规划我的朝圣行程';

  if(navigator.clipboard){
    navigator.clipboard.writeText(text);
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
  var tip = document.getElementById('copied-tip');
  tip.classList.add('show');
  setTimeout(function(){ tip.classList.remove('show'); }, 2500);
}

function retryQuiz(){
  answers = {};
  currentQ = 0;
  resultKey = '';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('hero-section').style.display = 'block';
  updateProgress(0);
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
