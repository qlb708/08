<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>问天机</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAF8F5;--card:#fff;--purple:#2D1B69;--gold:#C9A840;
  --deep-red:#8B1A1A;--deep-brown:#3D2B1F;--land:#E8DDD0;
  --shadow:0 8px 40px rgba(45,27,105,.08);
  --radius:16px;
}
html{font-size:16px}
body{
  font-family:-apple-system,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--purple);min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;padding:20px 0;
  -webkit-font-smoothing:antialiased;
}
.phone{
  width:100%;max-width:390px;min-height:100vh;background:var(--card);
  box-shadow:var(--shadow);border-radius:var(--radius);overflow:hidden;
  position:relative;
}
@media(min-width:420px){
  .phone{margin-top:40px;min-height:auto;border-radius:24px}
  body{padding:40px 0}
}
.header{
  text-align:center;padding:36px 20px 20px;
  background:linear-gradient(180deg,rgba(45,27,105,.04) 0%,transparent 100%);
}
.header h1{
  font-size:28px;font-weight:700;letter-spacing:6px;
  background:linear-gradient(135deg,var(--purple) 30%,var(--gold) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.header p{font-size:12px;color:#998;margin-top:6px;letter-spacing:2px}
.divider{
  width:40px;height:1px;margin:12px auto 0;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.tabs{
  display:flex;justify-content:center;gap:6px;padding:16px 12px;
  border-bottom:1px solid rgba(45,27,105,.06);
}
.tab-btn{
  flex:1;max-width:120px;padding:8px 0;border:none;border-radius:20px;
  background:transparent;font-size:13px;color:#998;cursor:pointer;
  transition:all .3s;font-family:inherit;
}
.tab-btn.active{
  background:var(--purple);color:#fff;font-weight:600;
}
.tab-btn:hover:not(.active){color:var(--purple)}
.panels{position:relative}
.panel{display:none;padding:20px 16px 40px;min-height:420px}
.panel.active{display:block;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.crystal-ball{
  width:140px;height:140px;margin:0 auto 20px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(201,168,64,.15),rgba(45,27,105,.08) 70%);
  border:2px solid rgba(201,168,64,.3);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 30px rgba(201,168,64,.15),inset 0 0 20px rgba(201,168,64,.08);
}
.crystal-ball .inner{font-size:36px}
.slot-machine{
  display:flex;justify-content:center;gap:12px;margin-bottom:24px;
}
.reel{
  width:80px;height:120px;background:linear-gradient(180deg,#f8f6f3,#fff);
  border:1.5px solid rgba(45,27,105,.1);border-radius:12px;
  overflow:hidden;position:relative;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.04);
}
.reel::before,.reel::after{
  content:'';position:absolute;left:0;right:0;height:24px;z-index:2;pointer-events:none;
}
.reel::before{top:0;background:linear-gradient(180deg,#f8f6f3,transparent)}
.reel::after{bottom:0;background:linear-gradient(0deg,#f8f6f3,transparent)}
.reel-track{
  display:flex;flex-direction:column;align-items:center;
  transition:transform .1s linear;will-change:transform;
}
.reel-track .emoji{
  height:40px;display:flex;align-items:center;justify-content:center;
  font-size:28px;width:100%;
}
.reel.highlight{border-color:var(--gold);box-shadow:0 0 12px rgba(201,168,64,.3)}
.spin-btn{
  display:block;margin:0 auto 24px;padding:12px 40px;border:none;border-radius:24px;
  background:linear-gradient(135deg,var(--purple),#4a3090);color:#fff;
  font-size:15px;font-weight:600;letter-spacing:3px;cursor:pointer;
  font-family:inherit;transition:all .3s;
  box-shadow:0 4px 16px rgba(45,27,105,.25);
}
.spin-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(45,27,105,.35)}
.spin-btn:active{transform:translateY(0)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.result-card{
  background:linear-gradient(135deg,rgba(45,27,105,.03),rgba(201,168,64,.06));
  border:1px solid rgba(201,168,64,.2);border-radius:16px;
  padding:24px 20px;text-align:center;
  animation:fadeUp .5s ease;
}
.result-card .city{
  font-size:26px;font-weight:700;color:var(--purple);margin-bottom:10px;letter-spacing:2px;
}
.result-card .fortune{
  font-size:14px;color:#665;line-height:1.8;
}
.result-card .fortune::before,.result-card .fortune::after{content:'✦';margin:0 6px;color:var(--gold);font-size:10px}
.talisman-wrap{
  display:flex;flex-direction:column;align-items:center;padding:10px 0;
}
.talisman{
  width:200px;height:320px;position:relative;
  background:linear-gradient(180deg,#f5f0e6 0%,#f0e9d8 50%,#ede6d5 100%);
  border-radius:4px;
  box-shadow:2px 4px 16px rgba(0,0,0,.1),0 0 0 1px rgba(139,26,26,.08);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;padding:30px 20px;
}
.talisman::before{
  content:'';position:absolute;top:6px;left:6px;right:6px;bottom:6px;
  border:1.5px dashed rgba(139,26,26,.2);border-radius:2px;
  pointer-events:none;
}
.talisman::after{
  content:'';position:absolute;top:12px;left:12px;right:12px;bottom:12px;
  border:1px solid rgba(139,26,26,.1);border-radius:2px;
  pointer-events:none;
}
.talisman .corner{
  position:absolute;width:20px;height:20px;border-color:rgba(139,26,26,.25);border-style:solid;
}
.talisman .corner.tl{top:14px;left:14px;border-width:2px 0 0 2px}
.talisman .corner.tr{top:14px;right:14px;border-width:2px 2px 0 0}
.talisman .corner.bl{bottom:14px;left:14px;border-width:0 0 2px 2px}
.talisman .corner.br{bottom:14px;right:14px;border-width:0 2px 2px 0}
.talisman .symbol{
  font-size:20px;color:var(--deep-red);opacity:.3;margin-bottom:10px;
  font-family:"STKaiti","KaiTi",serif;
}
.talisman .city-display{transition:filter 1.5s ease;text-align:center}
.talisman .city-display.blur{filter:blur(20px)}
.talisman .city-display.clear{filter:blur(0)}
.talisman .city-display.cn{
  writing-mode:vertical-rl;
  font-family:"STKaiti","KaiTi","PingFang SC",serif;
  color:var(--deep-red);font-size:30px;letter-spacing:8px;line-height:1.6;
}
.talisman .city-display.en{
  font-family:Georgia,"Times New Roman",serif;
  color:var(--deep-brown);font-size:22px;font-weight:700;letter-spacing:4px;
}
.talisman .bottom-line{
  margin-top:16px;width:30px;height:1px;background:rgba(139,26,26,.2);
}
.qi-btn{
  margin-top:24px;padding:12px 36px;border:1.5px solid var(--deep-red);
  border-radius:24px;background:transparent;color:var(--deep-red);
  font-size:14px;font-weight:600;letter-spacing:4px;cursor:pointer;
  font-family:inherit;transition:all .3s;
}
.qi-btn:hover{background:var(--deep-red);color:#fff}
.qi-btn:active{transform:scale(.97)}
.qi-btn:disabled{opacity:.4;cursor:not-allowed}
.map-container{
  width:100%;aspect-ratio:2/1;background:#f5f2ed;
  border-radius:12px;border:1px solid rgba(45,27,105,.08);
  overflow:hidden;position:relative;margin-bottom:20px;
}
.map-container canvas{width:100%;height:100%;display:block}
.burn-btn{
  display:block;margin:0 auto 24px;padding:12px 40px;border:none;border-radius:24px;
  background:linear-gradient(135deg,#c2590a,#e87820);color:#fff;
  font-size:15px;font-weight:600;letter-spacing:3px;cursor:pointer;
  font-family:inherit;transition:all .3s;
  box-shadow:0 4px 16px rgba(194,89,10,.25);
}
.burn-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(194,89,10,.35)}
.burn-btn:active{transform:translateY(0)}
.burn-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.map-result{
  position:absolute;bottom:8px;left:8px;right:8px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  border-radius:12px;padding:14px 16px;
  border:1px solid rgba(201,168,64,.25);
  opacity:0;transform:translateY(10px);transition:all .5s ease;
  pointer-events:none;
}
.map-result.show{opacity:1;transform:none;pointer-events:auto}
.map-result .city{font-size:18px;font-weight:700;color:var(--purple);margin-bottom:6px}
.map-result .fortune{font-size:12px;color:#665;line-height:1.7}
.footer{
  text-align:center;padding:16px 0 24px;font-size:10px;color:#bbb;letter-spacing:1px;
}
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <h1>问 天 机</h1>
    <p>你的下一站，天意说了算</p>
    <div class="divider"></div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="0">🔮 水晶球</button>
    <button class="tab-btn" data-tab="1">📜 符纸显字</button>
    <button class="tab-btn" data-tab="2">🗺️ 地图烧蚀</button>
  </div>
  <div class="panels">
    <div class="panel active" id="panel-0">
      <div class="crystal-ball"><span class="inner">🔮</span></div>
      <div class="slot-machine">
        <div class="reel" id="reel-0"><div class="reel-track"></div></div>
        <div class="reel" id="reel-1"><div class="reel-track"></div></div>
        <div class="reel" id="reel-2"><div class="reel-track"></div></div>
      </div>
      <button class="spin-btn" id="spinBtn">摇 一 摇</button>
      <div id="slotResult" class="result-card hidden" style="display:none">
        <div class="city" id="slotCity"></div>
        <div class="fortune" id="slotFortune"></div>
      </div>
    </div>
    <div class="panel" id="panel-1">
      <div class="talisman-wrap">
        <div class="talisman">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <div class="symbol">天 机 符</div>
          <div class="city-display blur" id="talismanCity"></div>
          <div class="bottom-line"></div>
        </div>
        <button class="qi-btn" id="qiBtn">请 气</button>
        <div id="talismanResult" class="result-card hidden" style="margin-top:20px;display:none">
          <div class="city" id="talismanCityName"></div>
          <div class="fortune" id="talismanFortune"></div>
        </div>
      </div>
    </div>
    <div class="panel" id="panel-2">
      <div class="map-container">
        <canvas id="mapCanvas"></canvas>
        <div class="map-result" id="mapResult">
          <div class="city" id="mapCity"></div>
          <div class="fortune" id="mapFortune"></div>
        </div>
      </div>
      <button class="burn-btn" id="burnBtn">燃 烧 指 引</button>
    </div>
  </div>
  <div class="footer">— 问天机 · 天命之旅 —</div>
</div>
<script>
(function(){
  'use strict';

  var CITIES=[
    {name:'京都',fortune:'枯山水会告诉你答案，去之前先学会沉默',cn:true,lat:35.0,lon:135.7},
    {name:'那不勒斯',fortune:'最混乱的地方，藏着最真实的自己',cn:true,lat:40.85,lon:14.25},
    {name:'PARIS',fortune:'你不需要理由去巴黎，巴黎本身就是理由',cn:false,lat:48.85,lon:2.35},
    {name:'布达佩斯',fortune:'多瑙河的倒影里，藏着你还没想清楚的那件事',cn:true,lat:47.5,lon:19.0},
    {name:'里斯本',fortune:'站在山顶看日落，你会突然觉得一切都值得',cn:true,lat:38.7,lon:-9.15},
    {name:'首尔',fortune:'快节奏里有慢时光，找到属于你的那条胡同',cn:true,lat:37.56,lon:127.0},
    {name:'圣托里尼',fortune:'蓝色和白色之间，是你需要的那种平静',cn:true,lat:36.4,lon:25.4},
    {name:'REYKJAVIK',fortune:'去最远的地方，才能看到最近的自己',cn:false,lat:64.15,lon:-21.9},
    {name:'TOKYO',fortune:'秩序里有自由，你会在这里找到那个平衡点',cn:false,lat:35.68,lon:139.69},
    {name:'ROME',fortune:'每块石头都有故事，慢下来，听一听',cn:false,lat:41.9,lon:12.5}
  ];

  /* ---- Tabs ---- */
  var tabs=document.querySelectorAll('.tab-btn');
  var panels=document.querySelectorAll('.panel');
  tabs.forEach(function(btn){
    btn.addEventListener('click',function(){
      tabs.forEach(function(t){t.classList.remove('active')});
      panels.forEach(function(p){p.classList.remove('active')});
      btn.classList.add('active');
      document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
      if(btn.dataset.tab==='2') setTimeout(drawMap,50);
    });
  });

  /* ---- Ritual 1: Slot Machine ---- */
  var EMOJIS=['✈️','🗺️','🏔️','🌊','🏯'];
  var REEL_DURATIONS=[800,1000,1200];
  var EMOJI_H=40;
  function comboToCity(a,b,c){return CITIES[(a*25+b*5+c)%CITIES.length]}

  var reelTracks=[
    document.querySelector('#reel-0 .reel-track'),
    document.querySelector('#reel-1 .reel-track'),
    document.querySelector('#reel-2 .reel-track')
  ];
  var reelContainers=[
    document.getElementById('reel-0'),
    document.getElementById('reel-1'),
    document.getElementById('reel-2')
  ];

  function buildReels(){
    reelTracks.forEach(function(track){
      track.innerHTML='';
      for(var r=0;r<30;r++){
        EMOJIS.forEach(function(e){
          var d=document.createElement('div');
          d.className='emoji';d.textContent=e;
          track.appendChild(d);
        });
      }
    });
  }
  buildReels();

  var spinning=false;
  var spinBtn=document.getElementById('spinBtn');
  var _finalIndices=[0,0,0];

  spinBtn.addEventListener('click',function(){
    if(spinning)return;
    spinning=true;spinBtn.disabled=true;
    document.getElementById('slotResult').style.display='none';
    reelContainers.forEach(function(r){r.classList.remove('highlight')});
    _finalIndices=[
      Math.floor(Math.random()*5),
      Math.floor(Math.random()*5),
      Math.floor(Math.random()*5)
    ];
    reelTracks.forEach(function(track,i){
      var totalRows=EMOJIS.length*30;
      var targetRow=20+_finalIndices[i];
      var targetY=-(targetRow*EMOJI_H);
      var startTime=performance.now();
      var duration=REEL_DURATIONS[i];
      function animate(now){
        var elapsed=now-startTime;
        var progress=Math.min(elapsed/duration,1);
        var eased=1-Math.pow(1-progress,3);
        var currentY=eased*targetY;
        currentY=Math.max(currentY,-(totalRows-5)*EMOJI_H);
        track.style.transform='translateY('+currentY+'px)';
        if(progress<1){requestAnimationFrame(animate)}
        else{
          track.style.transform='translateY('+targetY+'px)';
          reelContainers[i].classList.add('highlight');
          if(i===2) setTimeout(showSlotResult,300);
        }
      }
      requestAnimationFrame(animate);
    });
  });

  function showSlotResult(){
    var city=comboToCity(_finalIndices[0],_finalIndices[1],_finalIndices[2]);
    document.getElementById('slotCity').textContent=city.name;
    document.getElementById('slotFortune').textContent=city.fortune;
    var el=document.getElementById('slotResult');
    el.style.display='';el.classList.remove('hidden');
    spinning=false;spinBtn.disabled=false;
  }

  /* ---- Ritual 2: Talisman ---- */
  var qiBtn=document.getElementById('qiBtn');
  var talismanCity=document.getElementById('talismanCity');
  var talismanResultEl=document.getElementById('talismanResult');
  var talismanCityName=document.getElementById('talismanCityName');
  var talismanFortune=document.getElementById('talismanFortune');
  var qiSpinning=false;

  qiBtn.addEventListener('click',function(){
    if(qiSpinning)return;
    qiSpinning=true;qiBtn.disabled=true;
    talismanResultEl.style.display='none';talismanResultEl.classList.add('hidden');
    var city=CITIES[Math.floor(Math.random()*CITIES.length)];
    talismanCity.classList.remove('clear');
    talismanCity.classList.add('blur');
    if(city.cn){
      talismanCity.className='city-display blur cn';
      talismanCity.textContent=city.name;
    }else{
      talismanCity.className='city-display blur en';
      talismanCity.textContent=city.name;
    }
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        talismanCity.classList.remove('blur');
        talismanCity.classList.add('clear');
      });
    });
    setTimeout(function(){
      talismanCityName.textContent=city.name;
      talismanFortune.textContent=city.fortune;
      var el=talismanResultEl;
      el.style.display='';el.classList.remove('hidden');
      qiSpinning=false;qiBtn.disabled=false;
    },1800);
  });

  /* ---- Ritual 3: Map ---- */
  var canvas=document.getElementById('mapCanvas');
  var ctx=canvas.getContext('2d');
  var mapResultEl=document.getElementById('mapResult');
  var mapCityEl=document.getElementById('mapCity');
  var mapFortuneEl=document.getElementById('mapFortune');
  var burnBtn=document.getElementById('burnBtn');
  var burnSpinning=false;

  var continents=[
    [[0.12,0.18],[0.08,0.25],[0.06,0.35],[0.10,0.42],[0.15,0.45],[0.20,0.42],[0.25,0.38],[0.28,0.32],[0.26,0.25],[0.22,0.20],[0.18,0.18],[0.12,0.18]],
    [[0.22,0.52],[0.20,0.58],[0.22,0.68],[0.25,0.78],[0.28,0.82],[0.30,0.78],[0.32,0.68],[0.30,0.58],[0.28,0.52],[0.22,0.52]],
    [[0.45,0.20],[0.42,0.25],[0.44,0.32],[0.48,0.35],[0.52,0.32],[0.55,0.28],[0.54,0.22],[0.50,0.18],[0.45,0.20]],
    [[0.44,0.38],[0.42,0.45],[0.44,0.55],[0.48,0.65],[0.52,0.70],[0.55,0.62],[0.56,0.52],[0.54,0.42],[0.50,0.38],[0.44,0.38]],
    [[0.55,0.15],[0.52,0.22],[0.55,0.30],[0.60,0.35],[0.68,0.38],[0.75,0.35],[0.80,0.30],[0.82,0.25],[0.78,0.18],[0.72,0.15],[0.65,0.14],[0.55,0.15]],
    [[0.78,0.58],[0.75,0.65],[0.78,0.72],[0.84,0.74],[0.88,0.70],[0.88,0.62],[0.84,0.58],[0.78,0.58]]
  ];

  function lonLatToXY(lon,lat,w,h){
    return[((lon+180)/360)*w,((90-lat)/180)*h];
  }

  function drawMap(){
    var parent=canvas.parentElement;
    var rect=parent.getBoundingClientRect();
    var dpr=window.devicePixelRatio||1;
    canvas.width=rect.width*dpr;
    canvas.height=rect.height*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    var w=rect.width,h=rect.height;
    ctx.fillStyle='#f5f2ed';
    ctx.fillRect(0,0,w,h);
    ctx.strokeStyle='rgba(45,27,105,.04)';
    ctx.lineWidth=0.5;
    for(var i=0;i<=12;i++){
      var gx=(w/12)*i;
      ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,h);ctx.stroke();
    }
    for(var j=0;j<=6;j++){
      var gy=(h/6)*j;
      ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(w,gy);ctx.stroke();
    }
    ctx.fillStyle='#E8DDD0';
    continents.forEach(function(pts){
      ctx.beginPath();
      pts.forEach(function(p,pi){
        var x=p[0]*w,y=p[1]*h;
        if(pi===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      });
      ctx.closePath();ctx.fill();
    });
  }
  setTimeout(drawMap,100);
  window.addEventListener('resize',drawMap);

  burnBtn.addEventListener('click',function(){
    if(burnSpinning)return;
    burnSpinning=true;burnBtn.disabled=true;
    mapResultEl.classList.remove('show');
    var city=CITIES[Math.floor(Math.random()*CITIES.length)];
    var parent=canvas.parentElement;
    var rect=parent.getBoundingClientRect();
    var w=rect.width,h=rect.height;
    var pos=lonLatToXY(city.lon,city.lat,w,h);
    drawMap();

    var t0=performance.now();
    function animateBurn(now){
      var elapsed=now-t0;
      if(elapsed<500){
        ctx.save();
        ctx.beginPath();ctx.arc(pos[0],pos[1],6,0,Math.PI*2);
        ctx.fillStyle='#4285f4';ctx.fill();
        ctx.restore();
        requestAnimationFrame(animateBurn);
        return;
      }
      if(elapsed<2000){
        var progress=(elapsed-500)/1500;
        var maxR=80*progress;
        ctx.save();
        ctx.beginPath();ctx.arc(pos[0],pos[1],6,0,Math.PI*2);
        ctx.fillStyle='#4285f4';ctx.fill();
        for(var r=maxR;r>0;r-=2){
          var alpha=(1-r/maxR)*0.3*(1-progress*0.5);
          ctx.beginPath();ctx.arc(pos[0],pos[1],r,0,Math.PI*2);
          ctx.strokeStyle='rgba(232,120,32,'+alpha+')';
          ctx.lineWidth=2;ctx.stroke();
        }
        var gradient=ctx.createRadialGradient(pos[0],pos[1],0,pos[0],pos[1],maxR);
        gradient.addColorStop(0,'rgba(232,120,32,0.15)');
        gradient.addColorStop(1,'rgba(232,120,32,0)');
        ctx.fillStyle=gradient;
        ctx.beginPath();ctx.arc(pos[0],pos[1],maxR,0,Math.PI*2);ctx.fill();
        ctx.restore();
        if(progress>0.5){
          ctx.save();
          ctx.font='600 11px -apple-system,"PingFang SC",sans-serif';
          ctx.fillStyle='#2D1B69';ctx.textAlign='center';
          ctx.fillText(city.name,pos[0],pos[1]-14);
          ctx.restore();
        }
        requestAnimationFrame(animateBurn);
        return;
      }
      mapCityEl.textContent=city.name;
      mapFortuneEl.textContent=city.fortune;
      mapResultEl.classList.add('show');
      burnSpinning=false;burnBtn.disabled=false;
    }
    requestAnimationFrame(animateBurn);
  });

})();
</script>
