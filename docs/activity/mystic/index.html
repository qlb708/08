<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>问天机</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:#E8E6E2;
  font-family:-apple-system,"PingFang SC",sans-serif;
  display:flex;
  justify-content:center;
  min-height:100%;
}
.phone{
  width:100%;
  max-width:390px;
  min-height:100vh;
  background:#F2F0EC;
  position:relative;
  box-shadow:0 0 60px rgba(0,0,0,0.15);
}

/* ===== 导航 ===== */
.nav{
  height:52px;
  position:sticky;top:0;z-index:100;
  background:rgba(250,250,248,0.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,0,0,0.07);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}
.nav-back{font-size:14px;color:#555;text-decoration:none;}
.nav-title{font-size:15px;font-weight:600;color:#1a1a2e;}
.nav-placeholder{width:60px;}

/* ===== Tab 切换 ===== */
.tabs{
  display:flex;
  justify-content:center;
  gap:8px;
  padding:16px 16px 0;
}
.tab-pill{
  padding:8px 20px;
  border-radius:20px;
  border:1px solid rgba(0,0,0,0.1);
  background:#fff;
  font-size:13px;
  font-weight:500;
  color:#666;
  cursor:pointer;
  transition:all .25s ease;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.tab-pill.active{
  background:#1a56db;
  color:#fff;
  border-color:#1a56db;
  box-shadow:0 2px 12px rgba(26,86,219,0.3);
}

/* ===== 面板 ===== */
.panels{position:relative;overflow:hidden;}
.panel{
  display:none;
  padding:20px 16px 40px;
  animation:fadeIn .35s ease;
}
.panel.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ===== 卡片 ===== */
.card{
  background:#fff;
  border-radius:16px;
  box-shadow:0 2px 16px rgba(0,0,0,0.07);
  padding:20px;
  margin-bottom:16px;
}

/* ===== 按钮 ===== */
.btn-primary{
  width:100%;
  padding:14px 0;
  border-radius:25px;
  border:none;
  background:#1a56db;
  color:#fff;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s ease;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 16px rgba(26,86,219,0.3);
}
.btn-primary:active{transform:scale(0.97);opacity:.85;}

/* ======================================== */
/*  仪式一：水晶球老虎机                    */
/* ======================================== */
.slot-container{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:16px;
}
.slot-reel{
  width:80px;
  height:120px;
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  position:relative;
  box-shadow:0 2px 16px rgba(0,0,0,0.07);
}
.slot-reel::before,.slot-reel::after{
  content:'';position:absolute;left:0;right:0;z-index:2;pointer-events:none;
}
.slot-reel::before{top:0;height:36px;background:linear-gradient(to bottom,#fff,transparent);}
.slot-reel::after{bottom:0;height:36px;background:linear-gradient(to top,#fff,transparent);}
.slot-strip{
  display:flex;flex-direction:column;align-items:center;
  transition:transform .1s linear;
}
.slot-strip.spinning{
  animation:spinScroll .15s linear infinite;
}
.slot-strip.stopped{
  transition:transform .5s cubic-bezier(.22,.61,.36,1);
}
@keyframes spinScroll{
  0%{transform:translateY(0);}
  100%{transform:translateY(-240px);}
}
.emoji-item{
  width:80px;height:80px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  flex-shrink:0;
}
.result-card{
  background:#fff;
  border-radius:16px;
  box-shadow:0 2px 16px rgba(0,0,0,0.07);
  padding:24px 20px;
  text-align:center;
  display:none;
  animation:slideUp .4s ease;
}
.result-card.show{display:block;}
@keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.result-city{font-size:28px;font-weight:800;color:#1a1a2e;margin-bottom:8px;}
.result-fortune{font-size:14px;color:#666;line-height:1.6;}

/* ======================================== */
/*  仪式二：符纸显字                        */
/* ======================================== */
.talisman-wrap{
  display:flex;flex-direction:column;align-items:center;
}
.talisman{
  width:180px;height:320px;
  background:linear-gradient(160deg,#F4E4BC,#E8D49A 40%,#F0E0AA 70%,#E4D090);
  box-shadow:inset 0 0 40px rgba(100,70,20,0.2),0 12px 40px rgba(0,0,0,0.25),0 4px 12px rgba(0,0,0,0.15);
  border-radius:3px;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;
}
.talisman::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent 0px,transparent 3px,rgba(120,80,20,0.05) 3px,rgba(120,80,20,0.05) 4px);
  pointer-events:none;z-index:1;
}
/* 四角折角 */
.corner{position:absolute;z-index:3;width:0;height:0;}
.corner-tl{top:0;left:0;border-top:14px solid #C4A35A;border-right:14px solid transparent;}
.corner-tr{top:0;right:0;border-top:14px solid #C4A35A;border-left:14px solid transparent;}
.corner-bl{bottom:0;left:0;border-bottom:14px solid #C4A35A;border-right:14px solid transparent;}
.corner-br{bottom:0;right:0;border-bottom:14px solid #C4A35A;border-left:14px solid transparent;}

.talisman .chi-ling{
  font-size:13px;color:#8B1A1A;letter-spacing:1em;margin-top:16px;position:relative;z-index:2;
}
.talisman .red-line{height:1.5px;background:#B22222;margin:8px 16px;position:relative;z-index:2;}

.talisman-runer{
  position:relative;z-index:2;
  display:flex;gap:6px;
  margin-top:8px;
  transition:opacity .6s ease;
}
.talisman-runer.hidden{opacity:0;pointer-events:none;}
.runer-col{
  writing-mode:vertical-rl;
  font-size:20px;color:#C4A35A;opacity:.7;
  letter-spacing:8px;
}

/* 激活后城市名 */
.city-reveal{
  position:absolute;z-index:4;
  left:50%;top:50%;transform:translate(-50%,-50%);
  text-align:center;
  opacity:0;
  filter:blur(30px);
  transition:opacity 1.8s ease,filter 1.8s ease;
  pointer-events:none;
}
.city-reveal.show{opacity:1;filter:blur(0);}
.city-reveal .cn-name{
  writing-mode:vertical-rl;font-size:56px;font-weight:900;color:#8B1A1A;
  text-shadow:2px 2px 8px rgba(139,26,26,0.4);letter-spacing:.1em;
}
.city-reveal .en-name{
  font-family:Georgia,serif;font-size:32px;font-weight:700;color:#3D2B1F;
  letter-spacing:.12em;text-shadow:1px 2px 4px rgba(61,43,31,0.3);
  margin-top:4px;
}

.talisman-fortune{
  position:absolute;bottom:0;left:0;right:0;z-index:2;
  font-size:11px;color:#6B4F2A;padding:8px 12px;text-align:center;
  line-height:1.4;
  opacity:0;transition:opacity 1s ease .6s;
}
.talisman-fortune.show{opacity:1;}

.qi-btn{
  width:56px;height:56px;border-radius:50%;border:none;
  background:radial-gradient(circle at 40% 35%,#D4B84A,#8B6914);
  color:#fff;font-size:16px;font-weight:600;
  box-shadow:0 6px 20px rgba(139,105,20,0.5);
  cursor:pointer;margin-top:20px;
  transition:transform .2s ease;
  -webkit-tap-highlight-color:transparent;
}
.qi-btn:active{transform:scale(.92);}

/* ======================================== */
/*  仪式三：地图烧蚀                        */
/* ======================================== */
.map-wrap{
  display:flex;justify-content:center;margin-bottom:16px;
}
.map-svg{
  width:350px;height:200px;
}
.map-svg .continent{fill:#C8BEAE;stroke:#A09590;stroke-width:.5;}
.map-label{
  font-size:7px;fill:#fff;
  font-family:-apple-system,"PingFang SC",sans-serif;
}
.ripple-ring{
  fill:none;stroke:#FF6B35;stroke-width:2;
  opacity:0;
  animation:rippleOut 1.5s ease-out forwards;
}
@keyframes rippleOut{
  0%{r:5;opacity:1;}
  100%{r:50;opacity:0;}
}
.map-city-dot{
  fill:#1a56db;
  filter:drop-shadow(0 0 6px #1a56db);
}
.map-label-card{
  opacity:0;
  animation:labelPop .5s ease .6s forwards;
}
@keyframes labelPop{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.map-result-card{
  background:#fff;border-radius:16px;
  box-shadow:0 2px 16px rgba(0,0,0,0.07);
  padding:20px;text-align:center;
  margin-top:16px;
  opacity:0;transform:translateY(20px);
  transition:opacity .5s ease,transform .5s ease;
}
.map-result-card.show{opacity:1;transform:translateY(0);}
.map-result-card .city-name{font-size:24px;font-weight:800;color:#1a1a2e;margin-bottom:6px;}
.map-result-card .city-fortune{font-size:14px;color:#666;line-height:1.6;}
</style>
</head>
<body>
<div class="phone">

  <!-- 导航 -->
  <nav class="nav">
    <a href="/08/activity/" class="nav-back">← 返回</a>
    <span class="nav-title">问天机</span>
    <span class="nav-placeholder"></span>
  </nav>

  <!-- Tab -->
  <div class="tabs">
    <div class="tab-pill active" data-tab="0">🔮 水晶球</div>
    <div class="tab-pill" data-tab="1">📜 符纸</div>
    <div class="tab-pill" data-tab="2">🗺️ 地图</div>
  </div>

  <div class="panels">

    <!-- ======================== 面板0：水晶球老虎机 ======================== -->
    <div class="panel active" id="panel0">
      <div class="slot-container" id="slotContainer">
        <div class="slot-reel"><div class="slot-strip" id="reel0"></div></div>
        <div class="slot-reel"><div class="slot-strip" id="reel1"></div></div>
        <div class="slot-reel"><div class="slot-strip" id="reel2"></div></div>
      </div>
      <button class="btn-primary" id="shakeBtn">摇一摇</button>
      <div class="result-card" id="slotResult">
        <div class="result-city" id="slotCity"></div>
        <div class="result-fortune" id="slotFortune"></div>
      </div>
    </div>

    <!-- ======================== 面板1：符纸显字 ======================== -->
    <div class="panel" id="panel1">
      <div class="talisman-wrap">
        <div class="talisman" id="talisman">
          <div class="corner corner-tl"></div>
          <div class="corner corner-tr"></div>
          <div class="corner corner-bl"></div>
          <div class="corner corner-br"></div>
          <div class="chi-ling">敕 令</div>
          <div class="red-line"></div>
          <div class="talisman-runer" id="talismRunes">
            <div class="runer-col">元 亨 利 貞</div>
            <div class="runer-col">乾 坤 坎 離</div>
          </div>
          <div class="red-line"></div>
          <div class="city-reveal" id="cityReveal">
            <div class="cn-name" id="talCnName"></div>
            <div class="en-name" id="talEnName"></div>
          </div>
          <div class="talisman-fortune" id="talFortune"></div>
        </div>
        <button class="qi-btn" id="qiBtn">请气</button>
      </div>
    </div>

    <!-- ======================== 面板2：地图烧蚀 ======================== -->
    <div class="panel" id="panel2">
      <div class="map-wrap">
        <svg class="map-svg" viewBox="0 0 360 180" id="mapSvg">
          <!-- 大陆 -->
          <path class="continent" d="M 180 20 L 230 15 L 280 20 L 300 35 L 290 60 L 260 70 L 240 90 L 210 85 L 190 70 L 175 50 Z"/>
          <path class="continent" d="M 155 20 L 180 18 L 185 35 L 175 45 L 155 42 L 148 30 Z"/>
          <path class="continent" d="M 155 50 L 175 48 L 185 65 L 180 100 L 160 115 L 145 95 L 140 70 L 148 55 Z"/>
          <path class="continent" d="M 30 15 L 80 12 L 95 30 L 90 55 L 70 70 L 45 65 L 25 45 Z"/>
          <path class="continent" d="M 60 75 L 80 70 L 90 90 L 85 125 L 70 135 L 55 115 L 50 90 Z"/>
          <path class="continent" d="M 255 100 L 290 95 L 300 115 L 280 125 L 260 118 Z"/>
          <g id="mapEffects"></g>
        </svg>
      </div>
      <button class="btn-primary" id="burnBtn">燃烧指引</button>
      <div class="map-result-card" id="mapResult">
        <div class="city-name" id="mapCity"></div>
        <div class="city-fortune" id="mapFortune"></div>
      </div>
    </div>

  </div>
</div>

<script>
var CITIES=[
  {name:'京都',cn:true,fortune:'枯山水会告诉你答案，去之前先学会沉默'},
  {name:'那不勒斯',cn:true,fortune:'最混乱的地方，藏着最真实的自己'},
  {name:'PARIS',cn:false,fortune:'你不需要理由去巴黎，巴黎本身就是理由'},
  {name:'布达佩斯',cn:true,fortune:'多瑙河的倒影里，藏着你还没想清楚的那件事'},
  {name:'里斯本',cn:true,fortune:'站在山顶看日落，你会突然觉得一切都值得'},
  {name:'首尔',cn:true,fortune:'快节奏里有慢时光，找到属于你的那条胡同'},
  {name:'圣托里尼',cn:true,fortune:'蓝色和白色之间，是你需要的那种平静'},
  {name:'REYKJAVIK',cn:false,fortune:'去最远的地方，才能看到最近的自己'},
  {name:'TOKYO',cn:false,fortune:'秩序里有自由，你会在这里找到那个平衡点'},
  {name:'ROME',cn:false,fortune:'每块石头都有故事，慢下来，听一听'}
];

var COORDS=[
  {name:'京都',x:315,y:37},{name:'那不勒斯',x:167,y:56},
  {name:'PARIS',x:161,y:45},{name:'布达佩斯',x:170,y:47},
  {name:'里斯本',x:151,y:54},{name:'首尔',x:308,y:40},
  {name:'圣托里尼',x:171,y:58},{name:'REYKJAVIK',x:142,y:30},
  {name:'TOKYO',x:319,y:38},{name:'ROME',x:165,y:55}
];

/* ========== Tab 切换 ========== */
var pills=document.querySelectorAll('.tab-pill');
var panels=document.querySelectorAll('.panel');
pills.forEach(function(p,i){
  p.addEventListener('click',function(){
    pills.forEach(function(pp){pp.classList.remove('active');});
    panels.forEach(function(pp){pp.classList.remove('active');});
    p.classList.add('active');
    panels[i].classList.add('active');
  });
});

/* ========== 仪式一：水晶球老虎机 ========== */
var EMOJIS=['✈️','🗺️','🏔️','🌊','🏯','🌸','🏙️','🌋','🗽','🎭'];
var reels=[
  document.getElementById('reel0'),
  document.getElementById('reel1'),
  document.getElementById('reel2')
];

function buildReel(el){
  el.innerHTML='';
  var items=EMOJIS.concat(EMOJIS,EMOJIS);
  items.forEach(function(e){
    var d=document.createElement('div');
    d.className='emoji-item';
    d.textContent=e;
    el.appendChild(d);
  });
}
reels.forEach(buildReel);

var spinning=false;
document.getElementById('shakeBtn').addEventListener('click',function(){
  if(spinning)return;
  spinning=true;
  document.getElementById('slotResult').classList.remove('show');

  var stops=[0.8,1.0,1.2];
  var results=[];
  reels.forEach(function(reel,i){
    reel.classList.add('spinning');
    reel.classList.remove('stopped');
    results.push(CITIES[Math.floor(Math.random()*CITIES.length)]);
    setTimeout(function(){
      reel.classList.remove('spinning');
      reel.classList.add('stopped');
      var idx=Math.floor(Math.random()*EMOJIS.length);
      reel.style.transform='translateY('+(-idx*80)+'px)';
      if(i===2){
        setTimeout(function(){
          document.getElementById('slotCity').textContent=results[0].name;
          document.getElementById('slotFortune').textContent=results[0].fortune;
          document.getElementById('slotResult').classList.add('show');
          spinning=false;
        },600);
      }
    },stops[i]*1000);
  });
});

/* ========== 仪式二：符纸显字 ========== */
var qiActive=false;
document.getElementById('qiBtn').addEventListener('click',function(){
  if(qiActive)return;
  qiActive=true;
  var city=CITIES[Math.floor(Math.random()*CITIES.length)];

  var runes=document.getElementById('talismRunes');
  runes.classList.add('hidden');

  setTimeout(function(){
    var cr=document.getElementById('cityReveal');
    var cn=document.getElementById('talCnName');
    var en=document.getElementById('talEnName');
    var ft=document.getElementById('talFortune');

    if(city.cn){
      cn.textContent=city.name;
      cn.style.display='block';
      en.style.display='none';
    }else{
      en.textContent=city.name;
      en.style.display='block';
      cn.style.display='none';
    }
    cr.classList.add('show');
    ft.textContent=city.fortune;
    ft.classList.add('show');

    setTimeout(function(){qiActive=false;},2200);
  },700);
});

/* ========== 仪式三：地图烧蚀 ========== */
document.getElementById('burnBtn').addEventListener('click',function(){
  var idx=Math.floor(Math.random()*CITIES.length);
  var city=CITIES[idx];
  var coord=COORDS[idx];
  var effects=document.getElementById('mapEffects');
  effects.innerHTML='';

  // 蓝色光点
  var dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('cx',coord.x);
  dot.setAttribute('cy',coord.y);
  dot.setAttribute('r','5');
  dot.setAttribute('class','map-city-dot');
  effects.appendChild(dot);

  // 橙红圆环扩散
  var ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('cx',coord.x);
  ring.setAttribute('cy',coord.y);
  ring.setAttribute('r','5');
  ring.setAttribute('class','ripple-ring');
  effects.appendChild(ring);

  // 城市名label
  var g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','map-label-card');
  var labelX=coord.x+8;
  var labelY=coord.y-8;
  if(labelX+60>360)labelX=coord.x-65;
  var rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',labelX);rect.setAttribute('y',labelY-8);
  rect.setAttribute('width',city.name.length*10+12);rect.setAttribute('height',18);
  rect.setAttribute('rx','4');rect.setAttribute('fill','rgba(26,86,219,0.85)');
  g.appendChild(rect);
  var txt=document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x',labelX+6);txt.setAttribute('y',labelY+5);
  txt.setAttribute('class','map-label');
  txt.textContent=city.name;
  g.appendChild(txt);
  effects.appendChild(g);

  // 底部结果卡
  var mr=document.getElementById('mapResult');
  mr.classList.remove('show');
  setTimeout(function(){
    document.getElementById('mapCity').textContent=city.name;
    document.getElementById('mapFortune').textContent=city.fortune;
    mr.classList.add('show');
  },1500);
});
</script>
</body>
</html>
