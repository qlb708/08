<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔮 问天机</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{overflow-x:hidden;}
body{
  background:#050510;
  color:#fff;
  font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  overflow-x:hidden;
}

/* ===== PHONE FRAME ===== */
.phone-frame{
  width:100%;
  max-width:390px;
  min-height:100vh;
  position:relative;
  background:#0a0a1a;
  overflow-x:hidden;
}
@media(min-width:420px){
  .phone-frame{
    box-shadow:
      -20px 0 60px rgba(0,0,0,.8),
       20px 0 60px rgba(0,0,0,.8),
       0 0 80px rgba(80,40,120,.15);
    border-left:1px solid rgba(255,255,255,.04);
    border-right:1px solid rgba(255,255,255,.04);
  }
}

/* ===== HEADER ===== */
.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 20px 12px;
  position:sticky;top:0;z-index:100;
  background:linear-gradient(180deg,rgba(10,10,26,.97) 60%,transparent);
}
.header-title{
  font-size:20px;
  letter-spacing:2px;
  background:linear-gradient(135deg,#c9a0ff,#7eb4ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header-back{
  color:rgba(255,255,255,.55);
  text-decoration:none;
  font-size:14px;
  transition:color .3s;
}
.header-back:hover{color:#fff;}

/* ===== TABS ===== */
.tabs{
  display:flex;
  justify-content:center;
  gap:6px;
  padding:8px 20px 16px;
  position:sticky;top:54px;z-index:99;
  background:linear-gradient(180deg,rgba(10,10,26,.95) 70%,transparent);
}
.tab-btn{
  flex:1;
  padding:10px 0;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.5);
  font-size:14px;
  cursor:pointer;
  transition:all .35s;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}
.tab-btn.active{
  background:linear-gradient(135deg,rgba(130,70,200,.35),rgba(70,120,220,.35));
  color:#fff;
  box-shadow:0 0 20px rgba(130,70,200,.25);
}

/* ===== PANELS ===== */
.panel{display:none;position:relative;min-height:calc(100vh - 120px);overflow:hidden;}
.panel.active{display:flex;flex-direction:column;align-items:center;}

/* =========================== */
/*  RITUAL 1: CRYSTAL BALL    */
/* =========================== */
#panel-ball{
  background:#0a0a1a;
  padding-top:30px;
}

/* Nebulae */
.nebula{
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:.18;
  pointer-events:none;
}
.nebula-1{
  width:260px;height:200px;
  background:radial-gradient(ellipse,#7b2fbe,transparent 70%);
  top:10%;left:-20%;
  animation:nebDrift1 20s ease-in-out infinite alternate;
}
.nebula-2{
  width:220px;height:180px;
  background:radial-gradient(ellipse,#1e50a0,transparent 70%);
  top:50%;right:-15%;
  animation:nebDrift2 18s ease-in-out infinite alternate;
}
@keyframes nebDrift1{0%{transform:translate(0,0)}100%{transform:translate(40px,30px)}}
@keyframes nebDrift2{0%{transform:translate(0,0)}100%{transform:translate(-35px,-25px)}}

/* Stars */
.star{
  position:absolute;
  width:2px;height:2px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
}

/* Crystal ball */
.ball-wrapper{
  position:relative;
  margin-top:30px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* Orbit ring */
.orbit-ring{
  position:absolute;
  width:200px;height:200px;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
}
.orbit-dot{
  position:absolute;
  width:4px;height:4px;
  background:rgba(200,160,255,.7);
  border-radius:50%;
  animation:orbitSpin var(--dur) linear infinite;
  transform-origin:100px 100px;
}
@keyframes orbitSpin{from{transform:rotate(var(--start)) translateX(96px)}to{transform:rotate(calc(var(--start) + 360deg)) translateX(96px)}}

.ball-display{
  width:160px;height:160px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  position:relative;
  background:radial-gradient(circle at 40% 35%,rgba(140,80,220,.25),rgba(10,10,26,.9));
  border:2px solid rgba(160,100,255,.25);
  box-shadow:
    0 0 30px rgba(130,70,200,.3),
    inset 0 0 30px rgba(100,50,180,.15);
  transition:border-color .5s,box-shadow .5s;
  overflow:hidden;
}
.ball-display.golden{
  border-color:rgba(255,210,100,.5);
  box-shadow:
    0 0 40px rgba(255,200,60,.35),
    inset 0 0 30px rgba(255,200,60,.1);
  animation:goldenPulse 1.5s ease-in-out infinite;
}
@keyframes goldenPulse{
  0%,100%{box-shadow:0 0 30px rgba(255,200,60,.25),inset 0 0 25px rgba(255,200,60,.08)}
  50%{box-shadow:0 0 50px rgba(255,200,60,.45),inset 0 0 35px rgba(255,200,60,.18)}
}

.ball-emoji{
  font-size:48px;
  line-height:1;
  transition:filter .1s;
}
.ball-emoji.rolling{filter:blur(1.2px);}

.ball-city-label{
  font-size:12px;
  color:rgba(255,255,255,.5);
  margin-top:4px;
  transition:opacity .1s;
}

/* Result display */
.ball-result{
  text-align:center;
  margin-top:24px;
  opacity:0;
  transform:scale(.7);
  transition:all .6s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
}
.ball-result.visible{
  opacity:1;
  transform:scale(1);
  pointer-events:auto;
}

.result-city-name{
  font-size:40px;
  font-family:'Georgia',serif;
  color:#fff;
  letter-spacing:4px;
  text-shadow:0 0 20px rgba(255,255,255,.2);
}
.result-desc{
  font-size:14px;
  color:rgba(255,255,255,.6);
  margin-top:10px;
  line-height:1.7;
  opacity:0;
  transition:opacity .8s .3s;
  padding:0 30px;
}
.ball-result.visible .result-desc{opacity:1;}

.result-link{
  display:inline-block;
  margin-top:16px;
  color:rgba(200,160,255,.8);
  font-size:13px;
  cursor:pointer;
  text-decoration:underline;
  text-underline-offset:3px;
  opacity:0;
  transition:opacity .8s .6s;
}
.ball-result.visible .result-link{opacity:1;}

.btn-again{
  margin-top:24px;
  padding:12px 32px;
  border:1px solid rgba(160,100,255,.4);
  border-radius:30px;
  background:rgba(130,70,200,.15);
  color:rgba(255,255,255,.8);
  font-size:15px;
  cursor:pointer;
  transition:all .3s;
  opacity:0;
  transition:opacity .8s .8s,background .3s,border-color .3s;
}
.ball-result.visible ~ .btn-again{opacity:1;}
.btn-again:hover{
  background:rgba(130,70,200,.3);
  border-color:rgba(160,100,255,.7);
}

.btn-ask{
  margin-top:40px;
  padding:14px 40px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,rgba(130,70,200,.45),rgba(70,120,220,.45));
  color:#fff;
  font-size:18px;
  letter-spacing:2px;
  cursor:pointer;
  transition:all .3s;
  box-shadow:0 0 30px rgba(130,70,200,.3);
}
.btn-ask:hover{
  transform:scale(1.04);
  box-shadow:0 0 40px rgba(130,70,200,.45);
}

/* Gold particles */
.gold-particle{
  position:absolute;
  width:4px;height:4px;
  background:radial-gradient(circle,#ffd700,transparent);
  border-radius:50%;
  pointer-events:none;
  animation:goldBurst .8s ease-out forwards;
}
@keyframes goldBurst{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
}

/* Shake hint */
.shake-hint{
  position:absolute;
  bottom:80px;
  width:100%;
  text-align:center;
  color:rgba(255,255,255,.3);
  font-size:12px;
}
.shake-hint a{color:rgba(200,160,255,.6);cursor:pointer;text-decoration:underline;}

/* =========================== */
/*  RITUAL 2: FU PAPER        */
/* =========================== */
#panel-talisman{
  background:#0d0800;
  background-image:
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,.008) 2px,
      rgba(255,255,255,.008) 3px
    );
  padding-top:40px;
  align-items:center;
}

.fu-paper{
  width:220px;
  height:374px;
  background:linear-gradient(160deg,#f5e6c8,#e8d5a8);
  border-radius:6px;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  box-shadow:
    inset 0 0 30px rgba(0,0,0,.12),
    inset 0 0 60px rgba(0,0,0,.05),
    0 4px 20px rgba(0,0,0,.5);
  cursor:pointer;
  transition:box-shadow .3s;
  margin-top:20px;
  overflow:hidden;
}
.fu-paper:hover{
  box-shadow:
    inset 0 0 30px rgba(0,0,0,.12),
    inset 0 0 60px rgba(0,0,0,.05),
    0 4px 30px rgba(200,170,100,.15);
}

/* Gold rune pattern */
.fu-runes{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:opacity .6s;
}
.fu-runes.hidden{opacity:0;pointer-events:none;}

.rune-svg{
  width:120px;
  opacity:.35;
}

/* City name reveal */
.fu-city-name{
  font-family:'Ma Shan Zheng',cursive;
  font-size:60px;
  color:#1a0a00;
  opacity:0;
  filter:blur(10px);
  transition:opacity 2s,filter 2s;
  position:relative;
  z-index:2;
}
.fu-city-name.revealed{
  opacity:1;
  filter:blur(0);
}

.fu-subtitle{
  font-size:13px;
  color:#b8942e;
  margin-top:8px;
  opacity:0;
  transition:opacity 1s 1.5s;
  letter-spacing:3px;
}
.fu-subtitle.revealed{opacity:1;}

.fu-desc{
  font-size:12px;
  color:rgba(80,50,20,.6);
  margin-top:10px;
  opacity:0;
  transition:opacity 1s 2s;
  padding:0 20px;
  text-align:center;
  line-height:1.6;
}
.fu-desc.revealed{opacity:1;}

/* Red seal */
.fu-seal{
  position:absolute;
  bottom:20px;right:18px;
  width:36px;height:36px;
  border:2px solid #c0392b;
  border-radius:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Ma Shan Zheng',cursive;
  font-size:14px;
  color:#c0392b;
  opacity:0;
  transition:opacity .8s 1.5s;
  line-height:1;
  padding:2px;
}
.fu-seal.revealed{opacity:1;}

/* Fu buttons */
.fu-buttons{
  display:flex;
  gap:12px;
  margin-top:30px;
}
.fu-btn{
  padding:10px 24px;
  border:1px solid rgba(200,170,100,.3);
  border-radius:20px;
  background:rgba(200,170,100,.08);
  color:rgba(255,255,255,.7);
  font-size:14px;
  cursor:pointer;
  transition:all .3s;
}
.fu-btn:hover{
  background:rgba(200,170,100,.18);
  border-color:rgba(200,170,100,.6);
}

/* =========================== */
/*  RITUAL 3: MAP             */
/* =========================== */
#panel-map{
  background:#06060f;
  padding-top:20px;
  overflow:hidden;
}

.map-container{
  width:100%;
  aspect-ratio:2/1;
  position:relative;
  overflow:hidden;
  border-radius:8px;
  margin:10px 0;
}

.map-svg{
  width:100%;height:100%;
  transition:transform 2.5s cubic-bezier(.2,0,.1,1);
  transform-origin:center center;
}
.map-svg.zoomed{
  /* transform set via JS */
}

/* Continent fill */
.continent{
  fill:#1a1a2e;
  stroke:rgba(255,255,255,.18);
  stroke-width:1.5;
  stroke-linejoin:round;
}

/* City dots */
.city-dot{
  position:absolute;
  width:8px;height:8px;
  border-radius:50%;
  background:rgba(200,160,255,.8);
  box-shadow:0 0 8px rgba(200,160,255,.4);
  transform:translate(-50%,-50%);
  transition:opacity .5s;
  cursor:pointer;
}
.city-dot.hidden{opacity:0;pointer-events:none;}

.city-dot-label{
  position:absolute;
  font-size:8px;
  color:rgba(255,255,255,.4);
  white-space:nowrap;
  transform:translate(-50%,10px);
  pointer-events:none;
  transition:opacity .5s;
}
.city-dot.hidden + .city-dot-label,
.city-dot-label.hidden{opacity:0;}

/* Pulse dot after zoom */
.pulse-dot{
  position:absolute;
  width:14px;height:14px;
  border-radius:50%;
  background:rgba(255,200,60,.8);
  transform:translate(-50%,-50%);
  opacity:0;
  pointer-events:none;
}
.pulse-dot.visible{
  opacity:1;
  animation:pulseRing 1.5s ease-out infinite;
}
@keyframes pulseRing{
  0%{box-shadow:0 0 0 0 rgba(255,200,60,.6)}
  100%{box-shadow:0 0 0 20px rgba(255,200,60,0)}
}

/* Map result name */
.map-result-name{
  position:absolute;
  font-size:32px;
  font-family:'Georgia',serif;
  color:#fff;
  letter-spacing:3px;
  opacity:0;
  transform:translateY(20px);
  transition:opacity .8s .5s,transform .8s .5s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
  text-shadow:0 0 20px rgba(255,255,255,.15);
  z-index:5;
  white-space:nowrap;
}
.map-result-name.visible{
  opacity:1;
  transform:translateY(0);
  pointer-events:auto;
  cursor:pointer;
}

.map-result-desc{
  position:absolute;
  font-size:12px;
  color:rgba(255,255,255,.5);
  opacity:0;
  transition:opacity .8s 1s;
  text-align:center;
  padding:0 20px;
  line-height:1.6;
  z-index:5;
  white-space:nowrap;
}
.map-result-desc.visible{opacity:1;}

.btn-map-fire{
  padding:14px 36px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,rgba(200,80,40,.4),rgba(255,160,40,.3));
  color:#fff;
  font-size:17px;
  letter-spacing:2px;
  cursor:pointer;
  margin-top:20px;
  transition:all .3s;
  box-shadow:0 0 25px rgba(200,80,40,.25);
}
.btn-map-fire:hover{
  transform:scale(1.04);
  box-shadow:0 0 35px rgba(200,80,40,.4);
}

.map-hint{
  color:rgba(255,255,255,.3);
  font-size:12px;
  margin-top:12px;
}

/* =========================== */
/*  DETAIL MODAL (all rituals) */
/* =========================== */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  z-index:500;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s;
}
.modal-overlay.open{opacity:1;pointer-events:auto;}

.modal-sheet{
  position:fixed;
  bottom:0;left:50%;
  transform:translateX(-50%) translateY(100%);
  width:100%;
  max-width:390px;
  background:linear-gradient(180deg,#1a1a2e,#0a0a1a);
  border-radius:20px 20px 0 0;
  padding:30px 24px 40px;
  z-index:501;
  transition:transform .4s cubic-bezier(.22,1,.36,1);
  max-height:85vh;
  overflow-y:auto;
}
.modal-sheet.open{transform:translateX(-50%) translateY(0);}

.modal-emoji{font-size:48px;text-align:center;}
.modal-city{
  text-align:center;
  font-size:26px;
  font-family:'Georgia',serif;
  margin-top:6px;
  letter-spacing:2px;
}
.modal-desc{
  text-align:center;
  font-size:14px;
  color:rgba(255,255,255,.6);
  margin-top:12px;
  line-height:1.8;
}
.modal-season{
  text-align:center;
  font-size:13px;
  color:rgba(200,160,255,.7);
  margin-top:14px;
}
.modal-season span{
  display:inline-block;
  background:rgba(130,70,200,.15);
  padding:4px 12px;
  border-radius:10px;
  border:1px solid rgba(130,70,200,.2);
}
.modal-tags{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
  margin-top:16px;
}
.modal-tag{
  font-size:12px;
  padding:5px 14px;
  border-radius:20px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.6);
}
.modal-close{
  display:block;
  margin:24px auto 0;
  padding:10px 36px;
  border:1px solid rgba(255,255,255,.2);
  border-radius:20px;
  background:transparent;
  color:rgba(255,255,255,.6);
  font-size:14px;
  cursor:pointer;
  transition:all .3s;
}
.modal-close:hover{
  border-color:rgba(255,255,255,.5);
  color:#fff;
}

/* ===== LOADING / EMPTY ===== */
.ritual-empty{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  flex:1;
  color:rgba(255,255,255,.3);
  font-size:14px;
  gap:12px;
}
.ritual-empty .big{font-size:40px;}

</style>
</head>
<body>
<div class="phone-frame">

  <!-- HEADER -->
  <header class="header">
    <span class="header-title">🔮 问天机</span>
    <a href="/08/activity/" class="header-back">← 活动</a>
  </header>

  <!-- TABS -->
  <nav class="tabs">
    <button class="tab-btn active" data-tab="ball">🔮 水晶球</button>
    <button class="tab-btn" data-tab="talisman">📜 符纸</button>
    <button class="tab-btn" data-tab="map">🗺️ 地图</button>
  </nav>

  <!-- ============================ -->
  <!-- PANEL 1: CRYSTAL BALL        -->
  <!-- ============================ -->
  <div id="panel-ball" class="panel active">
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div id="stars-container"></div>

    <div class="ball-wrapper">
      <div class="orbit-ring" id="orbit-ring"></div>
      <div class="ball-display" id="ball-display">
        <span class="ball-emoji" id="ball-emoji">🔮</span>
        <span class="ball-city-label" id="ball-city-label">· · ·</span>
      </div>
    </div>

    <div class="ball-result" id="ball-result">
      <div class="result-city-name" id="result-city-name"></div>
      <div class="result-desc" id="result-desc"></div>
      <span class="result-link" id="result-link">点击查看城市详情 →</span>
    </div>

    <button class="btn-again" id="btn-again" style="display:none">再问一次 🎲</button>
    <button class="btn-ask" id="btn-ask">✨ 问天机</button>

    <div class="shake-hint" id="shake-hint">
      摇一摇手机，或点击上方按钮<br>
      <a id="shake-permission">📱 允许摇动</a>
    </div>
  </div>

  <!-- ============================ -->
  <!-- PANEL 2: TALISMAN            -->
  <!-- ============================ -->
  <div id="panel-talisman" class="panel">
    <div class="fu-paper" id="fu-paper">
      <!-- Gold runes -->
      <div class="fu-runes" id="fu-runes">
        <svg class="rune-svg" viewBox="0 0 120 120" fill="none" stroke="rgba(184,148,46,.5)" stroke-width="1.2">
          <circle cx="60" cy="60" r="45"/>
          <circle cx="60" cy="60" r="25"/>
          <line x1="60" y1="10" x2="60" y2="110"/>
          <line x1="15" y1="60" x2="105" y2="60"/>
          <line x1="28" y1="28" x2="92" y2="92"/>
          <line x1="92" y1="28" x2="28" y2="92"/>
          <polygon points="60,15 105,82 15,82"/>
          <polygon points="60,105 15,38 105,38"/>
        </svg>
      </div>

      <!-- City name (hidden initially) -->
      <div class="fu-city-name" id="fu-city-name"></div>
      <div class="fu-subtitle" id="fu-subtitle">✦ 此地与君有缘 ✦</div>
      <div class="fu-desc" id="fu-desc"></div>

      <!-- Seal -->
      <div class="fu-seal" id="fu-seal">天机</div>
    </div>

    <div class="fu-buttons">
      <button class="fu-btn" id="btn-fu-redo">重新请符</button>
      <button class="fu-btn" id="btn-fu-detail">城市详情</button>
    </div>
  </div>

  <!-- ============================ -->
  <!-- PANEL 3: MAP                 -->
  <!-- ============================ -->
  <div id="panel-map" class="panel">
    <div class="map-container" id="map-container">
      <svg class="map-svg" id="map-svg" viewBox="0 0 1000 500">
        <!-- Continents -->
        <polygon class="continent" points="290,140 350,130 380,150 360,180 310,190 280,170"/>
        <polygon class="continent" points="330,200 380,195 400,280 370,350 320,340 300,270"/>
        <polygon class="continent" points="420,100 600,90 650,150 620,200 550,220 480,200 430,160"/>
        <polygon class="continent" points="100,100 200,90 220,160 180,220 120,200 80,150"/>
        <polygon class="continent" points="160,230 220,220 240,310 200,380 150,360 130,280"/>
        <polygon class="continent" points="620,280 700,270 720,330 670,350 620,330"/>
        <!-- Ocean dots for ambiance -->
      </svg>
      <!-- City dots will be positioned absolutely in JS -->
      <div id="map-dots"></div>
      <div class="pulse-dot" id="pulse-dot"></div>
      <div class="map-result-name" id="map-result-name"></div>
      <div class="map-result-desc" id="map-result-desc"></div>
    </div>

    <button class="btn-map-fire" id="btn-map-fire">🔥 燃烧指引</button>
    <div class="map-hint" id="map-hint">点击火焰，让地图为你指明方向</div>
  </div>

</div><!-- /phone-frame -->

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay"></div>
<div class="modal-sheet" id="modal-sheet">
  <div class="modal-emoji" id="modal-emoji"></div>
  <div class="modal-city" id="modal-city"></div>
  <div class="modal-desc" id="modal-desc"></div>
  <div class="modal-season" id="modal-season"></div>
  <div class="modal-tags" id="modal-tags"></div>
  <button class="modal-close" id="modal-close">关闭</button>
</div>

<script>
// ===== CITIES DATA =====
const CITIES = [
  { name:'京都', emoji:'⛩️', desc:'古寺钟声会在某个傍晚击中你，那一刻你会明白自己来这里的原因。', season:'3-4月（樱花）/ 11月（红叶）', tags:['岚山竹林','伏见稻荷','祇园艺伎','清水寺'] },
  { name:'里斯本', emoji:'🚃', desc:'法多音乐在小巷回响，你将在那里遇见一个版本的自己。', season:'5-6月 / 9-10月', tags:['阿尔法玛老城','贝伦塔','电车28路','葡式蛋挞'] },
  { name:'那不勒斯', emoji:'🍕', desc:'混乱即秩序，在这座城市你将学会放手。', season:'4-6月 / 9-10月', tags:['马拉多纳球场','世界第一披萨','古城巷弄','卡普里岛'] },
  { name:'布达佩斯', emoji:'🏰', desc:'多瑙河的夜晚会给你一个答案，你已经等待很久了。', season:'4-6月 / 9-10月', tags:['渔夫堡夜景','温泉浴场','国会大厦','废墟酒吧'] },
  { name:'雷克雅未克', emoji:'🌌', desc:'极光之下，所有困扰都变得渺小。你需要的是广阔。', season:'9-3月（极光）/ 6-8月（极昼）', tags:['北极光追逐','黄金圈一日游','冰川徒步','地热温泉'] },
  { name:'巴塞罗那', emoji:'🏖️', desc:'高迪的建筑告诉你：美从不走直线，你的人生也是。', season:'5-6月 / 9-10月', tags:['圣家堂','诺坎普球场','兰布拉大道','海滩'] },
  { name:'东京', emoji:'🗼', desc:'在这座城市迷路，是找到自己的开始。', season:'3-4月（樱花）/ 11-12月（冬季彩灯）', tags:['浅草寺','涩谷十字路口','筑地市场','富士山'] },
  { name:'伊斯坦布尔', emoji:'🕌', desc:'欧亚交界处，你将在此找到属于你的那条路。', season:'4-6月 / 9-11月', tags:['蓝色清真寺','大巴扎','博斯普鲁斯游船','土耳其浴场'] }
];

const CITY_COORDS = {
  '京都':      {cx:82, cy:37},
  '里斯本':    {cx:27, cy:43},
  '那不勒斯':  {cx:44, cy:41},
  '布达佩斯':  {cx:46, cy:37},
  '雷克雅未克': {cx:29, cy:22},
  '巴塞罗那':  {cx:36, cy:43},
  '东京':      {cx:83, cy:36},
  '伊斯坦布尔': {cx:52, cy:40}
};

let currentCity = null;

// ===== TAB SWITCHING =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

// ===== MODAL =====
function openModal(city) {
  currentCity = city;
  document.getElementById('modal-emoji').textContent = city.emoji;
  document.getElementById('modal-city').textContent = city.name;
  document.getElementById('modal-desc').textContent = city.desc;
  document.getElementById('modal-season').innerHTML = '<span>🕐 ' + city.season + '</span>';
  const tagsEl = document.getElementById('modal-tags');
  tagsEl.innerHTML = city.tags.map(t => '<span class="modal-tag">' + t + '</span>').join('');
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('modal-sheet').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('modal-sheet').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', closeModal);
document.getElementById('modal-close').addEventListener('click', closeModal);

// ===== STARS =====
(function createStars() {
  const c = document.getElementById('stars-container');
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*100 + '%';
    s.style.animationDuration = (2 + Math.random()*3) + 's';
    s.style.animationDelay = Math.random()*3 + 's';
    s.style.animation = 'starTwinkle ' + (2 + Math.random()*3) + 's ' + Math.random()*3 + 's ease-in-out infinite';
    c.appendChild(s);
  }
  const style = document.createElement('style');
  style.textContent = '@keyframes starTwinkle{0%,100%{opacity:.2}50%{opacity:.9}}';
  document.head.appendChild(style);
})();

// ===== ORBIT RING =====
(function createOrbits() {
  const ring = document.getElementById('orbit-ring');
  for (let i = 0; i < 8; i++) {
    const d = document.createElement('div');
    d.className = 'orbit-dot';
    d.style.setProperty('--start', (i * 45) + 'deg');
    d.style.setProperty('--dur', (4 + Math.random()*2) + 's');
    ring.appendChild(d);
  }
})();

// ===== RITUAL 1: CRYSTAL BALL =====
let ballRolling = false;
const ballEmoji = document.getElementById('ball-emoji');
const ballLabel = document.getElementById('ball-city-label');
const ballDisplay = document.getElementById('ball-display');
const ballResult = document.getElementById('ball-result');
const resultName = document.getElementById('result-city-name');
const resultDesc = document.getElementById('result-desc');
const resultLink = document.getElementById('result-link');
const btnAgain = document.getElementById('btn-again');
const btnAsk = document.getElementById('btn-ask');

function rollBall() {
  if (ballRolling) return;
  ballRolling = true;

  // Reset
  ballDisplay.classList.remove('golden');
  ballResult.classList.remove('visible');
  btnAgain.style.display = 'none';
  btnAsk.style.display = 'none';

  // Create gold particles burst (for result later)
  const phase = {step:0, idx:0};
  const totalSteps = 40 + Math.floor(Math.random()*8);

  function nextStep() {
    const ci = Math.floor(Math.random() * CITIES.length);
    const city = CITIES[ci];
    ballEmoji.textContent = city.emoji;
    ballLabel.textContent = city.name;
    ballEmoji.classList.add('rolling');
    phase.idx++;

    if (phase.idx < 40) {
      setTimeout(nextStep, 50);
    } else if (phase.idx < 46) {
      setTimeout(nextStep, 200);
    } else if (phase.idx < 50) {
      setTimeout(nextStep, 500);
    } else {
      // Final city
      const finalIdx = Math.floor(Math.random() * CITIES.length);
      const finalCity = CITIES[finalIdx];
      ballEmoji.textContent = finalCity.emoji;
      ballLabel.textContent = finalCity.name;
      ballEmoji.classList.remove('rolling');

      // Golden glow
      ballDisplay.classList.add('golden');

      // Gold particles
      spawnGoldParticles();

      // Show result
      setTimeout(() => {
        resultName.textContent = finalCity.emoji + ' ' + finalCity.name;
        resultDesc.textContent = finalCity.desc;
        ballResult.classList.add('visible');
        btnAgain.style.display = 'block';
        btnAsk.style.display = 'none';

        resultLink.onclick = () => openModal(finalCity);
        resultName.onclick = () => openModal(finalCity);

        ballRolling = false;
      }, 400);
    }
  }
  nextStep();
}

function spawnGoldParticles() {
  const wrapper = document.querySelector('.ball-wrapper');
  const rect = ballDisplay.getBoundingClientRect();
  const wr = wrapper.getBoundingClientRect();
  const cx = rect.left - wr.left + rect.width/2;
  const cy = rect.top - wr.top + rect.height/2;

  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'gold-particle';
    const angle = (Math.PI*2/14)*i;
    const dist = 60 + Math.random()*80;
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    p.style.setProperty('--tx', Math.cos(angle)*dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle)*dist + 'px');
    wrapper.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}

btnAsk.addEventListener('click', rollBall);
btnAgain.addEventListener('click', () => {
  btnAgain.style.display = 'none';
  rollBall();
});

// Shake detection
let shakePermGranted = false;
document.getElementById('shake-permission').addEventListener('click', async () => {
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceMotionEvent.requestPermission();
      if (perm === 'granted') {
        shakePermGranted = true;
        document.getElementById('shake-hint').innerHTML = '📱 已启用摇一摇，开始问天机吧！';
        return;
      }
    } catch(e) {}
  }
  shakePermGranted = true; // fallback for non-iOS
  document.getElementById('shake-hint').innerHTML = '📱 已启用摇一摇';
});

let lastShake = 0;
window.addEventListener('devicemotion', (e) => {
  if (!shakePermGranted) return;
  const acc = e.accelerationIncludingGravity;
  if (!acc) return;
  const mag = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
  if (mag > 12) {
    const now = Date.now();
    if (now - lastShake > 4000) {
      lastShake = now;
      if (!ballRolling) rollBall();
    }
  }
});

// ===== RITUAL 2: TALISMAN =====
const fuPaper = document.getElementById('fu-paper');
const fuRunes = document.getElementById('fu-runes');
const fuCityName = document.getElementById('fu-city-name');
const fuSubtitle = document.getElementById('fu-subtitle');
const fuDesc = document.getElementById('fu-desc');
const fuSeal = document.getElementById('fu-seal');
let fuRevealed = false;

function resetFu() {
  fuRevealed = false;
  fuRunes.classList.remove('hidden');
  fuCityName.classList.remove('revealed');
  fuCityName.textContent = '';
  fuSubtitle.classList.remove('revealed');
  fuDesc.classList.remove('revealed');
  fuDesc.textContent = '';
  fuSeal.classList.remove('revealed');
}

function revealFu() {
  if (fuRevealed) return;
  fuRevealed = true;

  const city = CITIES[Math.floor(Math.random()*CITIES.length)];
  fuRunes.classList.add('hidden');

  setTimeout(() => {
    fuCityName.textContent = city.emoji + ' ' + city.name;
    fuCityName.classList.add('revealed');
    fuSubtitle.classList.add('revealed');
    fuDesc.textContent = city.desc;
    fuDesc.classList.add('revealed');
    fuSeal.classList.add('revealed');

    // Store for detail button
    fuCityName.dataset.cityIdx = CITIES.indexOf(city);
    fuCityName._city = city;
  }, 600);
}

fuPaper.addEventListener('click', () => {
  if (!fuRevealed) revealFu();
});

document.getElementById('btn-fu-redo').addEventListener('click', () => {
  resetFu();
  setTimeout(revealFu, 300);
});

document.getElementById('btn-fu-detail').addEventListener('click', () => {
  if (fuCityName._city) openModal(fuCityName._city);
});

// ===== RITUAL 3: MAP =====
const mapContainer = document.getElementById('map-container');
const mapSvg = document.getElementById('map-svg');
const mapDotsEl = document.getElementById('map-dots');
const pulseDot = document.getElementById('pulse-dot');
const mapResultName = document.getElementById('map-result-name');
const mapResultDesc = document.getElementById('map-result-desc');
const btnMapFire = document.getElementById('btn-map-fire');
const mapHint = document.getElementById('map-hint');
let mapZoomed = false;

// Create city dots
CITIES.forEach(city => {
  const coord = CITY_COORDS[city.name];
  const dot = document.createElement('div');
  dot.className = 'city-dot';
  dot.style.left = coord.cx + '%';
  dot.style.top = coord.cy + '%';
  dot.dataset.name = city.name;

  const label = document.createElement('div');
  label.className = 'city-dot-label';
  label.textContent = city.name;
  label.style.left = coord.cx + '%';
  label.style.top = coord.cy + '%';

  mapDotsEl.appendChild(dot);
  mapDotsEl.appendChild(label);

  // Click dot to see detail
  dot.addEventListener('click', (e) => {
    e.stopPropagation();
    openModal(city);
  });
  label.addEventListener('click', (e) => {
    e.stopPropagation();
    openModal(city);
  });
});

btnMapFire.addEventListener('click', () => {
  if (mapZoomed) {
    // Reset
    mapSvg.style.transform = 'scale(1) translate(0,0)';
    mapZoomed = false;
    document.querySelectorAll('.city-dot').forEach(d => d.classList.remove('hidden'));
    document.querySelectorAll('.city-dot-label').forEach(l => l.classList.remove('hidden'));
    pulseDot.classList.remove('visible');
    mapResultName.classList.remove('visible');
    mapResultDesc.classList.remove('visible');
    btnMapFire.textContent = '🔥 燃烧指引';
    mapHint.textContent = '点击火焰，让地图为你指明方向';
    return;
  }

  mapZoomed = true;
  btnMapFire.textContent = '↩ 重置地图';
  mapHint.textContent = '';

  // Hide all dots
  document.querySelectorAll('.city-dot').forEach(d => d.classList.add('hidden'));
  document.querySelectorAll('.city-dot-label').forEach(l => l.classList.add('hidden'));

  // Pick random city
  const city = CITIES[Math.floor(Math.random()*CITIES.length)];
  const coord = CITY_COORDS[city.name];

  // Calculate transform to center this point
  // SVG viewBox: 1000x500, container fills width
  const svgW = mapContainer.offsetWidth;
  const svgH = mapContainer.offsetWidth * 0.5;
  const targetX = coord.cx / 100 * svgW;
  const targetY = coord.cy / 100 * svgH;
  const scale = 4;
  const tx = -(targetX * scale - svgW/2);
  const ty = -(targetY * scale - svgH/2);

  setTimeout(() => {
    mapSvg.style.transform = 'scale(' + scale + ') translate(' + (tx/scale) + 'px, ' + (ty/scale) + 'px)';
  }, 100);

  // After zoom completes, show pulse and name
  setTimeout(() => {
    pulseDot.style.left = coord.cx + '%';
    pulseDot.style.top = coord.cy + '%';
    pulseDot.classList.add('visible');

    mapResultName.textContent = city.emoji + ' ' + city.name;
    mapResultName.style.left = '50%';
    mapResultName.style.top = '55%';
    mapResultName.style.transform = 'translate(-50%, -50%)';
    mapResultName.classList.add('visible');
    mapResultName.onclick = () => openModal(city);

    mapResultDesc.textContent = city.desc;
    mapResultDesc.style.left = '50%';
    mapResultDesc.style.top = 'calc(55% + 36px)';
    mapResultDesc.style.transform = 'translateX(-50%)';
    mapResultDesc.classList.add('visible');
  }, 2700);
});

// Click map result name for detail
mapResultName.addEventListener('click', () => {
  // find city from text
  const text = mapResultName.textContent;
  const city = CITIES.find(c => text.includes(c.name));
  if (city) openModal(city);
});

</script>
