<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>成长复盘 · 08's Tools</title>
<style>
:root{
  --bg:#eef2f9;
  --glass:rgba(255,255,255,.88);
  --border:rgba(255,255,255,.98);
  --border2:rgba(210,222,245,.55);
  --shadow:0 4px 24px rgba(74,124,247,.07),0 1px 3px rgba(74,124,247,.04);
  --shadow-h:0 8px 32px rgba(74,124,247,.12),0 2px 6px rgba(74,124,247,.06);
  --blue:#4a7cf7;--blue-s:#dce8ff;--blue-m:#b8d0ff;
  --purple:#7c5cf7;--purple-s:#e8dcff;--purple-m:#c4b0ff;
  --orange:#f97316;--orange-s:#ffedd5;
  --green:#22c55e;--green-s:#dcfce7;
  --red:#ef4444;
  --text:#1a2540;--text2:#3d5280;--muted:#8a9fc0;
  --r:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;
  color:var(--text);background:var(--bg);
  background-image:
    radial-gradient(ellipse at 8% 15%,rgba(150,185,255,.28) 0%,transparent 48%),
    radial-gradient(ellipse at 92% 85%,rgba(180,150,255,.18) 0%,transparent 45%);
  display:flex;flex-direction:column;
}

/* topbar */
.topbar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:11px 36px;background:rgba(255,255,255,.82);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid rgba(210,222,245,.38);z-index:10}
.back{display:flex;align-items:center;gap:5px;font-size:14px;font-weight:600;color:var(--text2);background:rgba(255,255,255,.95);border:1px solid var(--border2);border-radius:99px;padding:6px 14px 6px 10px;text-decoration:none;box-shadow:0 1px 6px rgba(74,124,247,.08);transition:all .2s}
.back:hover{color:var(--blue);transform:translateX(-2px)}
.div-line{width:1px;height:16px;background:var(--border2)}
.mswitch{display:flex;gap:3px;background:rgba(230,238,255,.5);border:1px solid rgba(180,200,240,.4);border-radius:10px;padding:3px}
.mbtn{padding:6px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:transparent;color:var(--muted);transition:all .2s}
.mbtn.on-i{background:white;color:var(--blue);box-shadow:0 1px 6px rgba(74,124,247,.18)}
.mbtn.on-r{background:white;color:var(--purple);box-shadow:0 1px 6px rgba(124,92,247,.18)}
.streak{margin-left:auto;display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--blue-s),rgba(220,232,255,.6));border:1px solid var(--blue-m);border-radius:99px;padding:6px 16px;font-size:13.5px;font-weight:700;color:var(--blue)}
.ddl-pill{display:flex;align-items:center;gap:5px;font-size:13.5px;font-weight:600;color:var(--orange);background:var(--orange-s);border:1px solid rgba(249,115,22,.22);border-radius:99px;padding:6px 14px;cursor:pointer;transition:all .2s;user-select:none}
.ddl-pill:hover{background:rgba(255,237,213,.85)}

/* main */
.main{flex:1;min-height:0;display:flex;padding:20px 36px;gap:16px;overflow:hidden}

/* card */
.card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow-h)}
.card.grow{flex:1;min-height:0;overflow:hidden}
.cp{padding:22px 24px;gap:14px}
.cps{padding:16px 18px;gap:11px}
.lbl{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:5px;flex-shrink:0}

/* form */
.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:12.5px;font-weight:600;color:var(--muted)}
textarea,input[type=text],input[type=date],select{width:100%;border:1.5px solid rgba(180,200,240,.22);border-radius:10px;padding:8px 11px;font-size:14px;color:var(--text);background:rgba(255,255,255,.8);font-family:inherit;line-height:1.55;resize:none;transition:border-color .2s,box-shadow .2s,background .2s}
textarea:focus,input:focus,select:focus{outline:none;border-color:rgba(74,124,247,.45);background:rgba(255,255,255,.98);box-shadow:0 0 0 3px rgba(74,124,247,.08)}
textarea{height:64px}
textarea.sm{height:52px}
input[type=date],select{height:34px;cursor:pointer}
.elbl{font-size:13px;color:var(--muted);white-space:nowrap}
.edots{display:flex;gap:5px}
.edot{width:32px;height:32px;border-radius:50%;border:1.5px solid rgba(180,200,240,.28);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.7);transition:transform .15s,border-color .15s,background .15s}
.edot:hover{transform:scale(1.18)}
.edot.on{border-color:var(--blue);background:var(--blue-s)}
.btn{width:100%;padding:11px;border:none;border-radius:12px;font-size:14.5px;font-weight:700;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .15s;flex-shrink:0}
.btn:hover{transform:translateY(-1.5px)}
.btn.blue{background:linear-gradient(135deg,#5b8fff,var(--blue),#3a6cf0);box-shadow:0 4px 14px rgba(74,124,247,.32)}
.btn.purple{background:linear-gradient(135deg,#9470ff,var(--purple),#6a48f0);box-shadow:0 4px 14px rgba(124,92,247,.32)}
.btn.loading{opacity:.65;cursor:not-allowed;pointer-events:none}

/* left col */
.col-left{width:310px;flex-shrink:0;display:flex;flex-direction:column;gap:0;overflow:hidden}

/* mid col */
.col-mid{flex:1;min-width:0;display:flex;flex-direction:column;gap:14px;overflow:hidden}
.notebox{background:linear-gradient(135deg,rgba(74,124,247,.04),rgba(124,92,247,.025));border:1.5px solid rgba(74,124,247,.10);border-radius:12px;padding:14px 16px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(100,130,200,.18) transparent;flex:1;min-height:0}
.notebox.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted)}
.nph{font-size:26px;opacity:.2}
.npht{font-size:12px;opacity:.5;font-weight:500}
.ncontent{font-size:14px;line-height:1.9;color:var(--text);white-space:pre-wrap}
.nmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:9px;border-top:1px solid rgba(180,200,240,.2)}
.ntag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px}
.ntag.i{background:var(--blue-s);color:var(--blue);border:1px solid var(--blue-m)}
.ntag.r{background:var(--purple-s);color:var(--purple);border:1px solid var(--purple-m)}
.cpbtn{margin-left:auto;font-size:11px;padding:3px 10px;border-radius:7px;border:1px solid rgba(74,124,247,.18);background:white;color:var(--blue);cursor:pointer;font-weight:600;transition:all .18s}
.cpbtn:hover{background:var(--blue-s)}

/* right col */
.col-right{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:14px;overflow:hidden}
.calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.caltitle{font-size:13px;font-weight:700;color:var(--text2)}
.calnav button{width:19px;height:19px;border:1px solid var(--border2);background:rgba(255,255,255,.8);border-radius:5px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;display:flex;align-items:center;justify-content:center}
.calnav button:hover{background:var(--blue-s);color:var(--blue)}
.calnav{display:flex;gap:2px}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cw{font-size:10px;font-weight:700;color:rgba(138,159,192,.65);text-align:center;padding:1px 0}
.cd{height:25px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11.5px;cursor:pointer;position:relative;transition:all .13s;color:var(--text2)}
.cd:hover{background:var(--blue-s);color:var(--blue)}
.cd.om{color:rgba(138,159,192,.22);cursor:default}.cd.om:hover{background:transparent;color:rgba(138,159,192,.22)}
.cd.today{background:var(--blue);color:#fff;font-weight:700;box-shadow:0 2px 7px rgba(74,124,247,.3)}.cd.today:hover{background:var(--blue)}
.cd.sel{outline:2px solid rgba(74,124,247,.5);outline-offset:1px}
.cd::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;display:none}
.cd.has-r::after{display:block;background:var(--green)}
.cd.today::after{background:rgba(255,255,255,.7)}

/* ── BOOKSHELF ── */
.shelf-row{display:flex;flex-direction:column;gap:4px}
.shelf-label{font-size:10.5px;font-weight:800;color:var(--muted);letter-spacing:.10em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.shelf-label::after{content:'';flex:1;height:1.5px;background:var(--border2);border-radius:1px}
.shelf-books{display:flex;gap:12px;padding:6px 2px 10px;align-items:flex-start;flex-wrap:nowrap}

/* book card - flat gradient style like p2 */
.book{
  position:relative;
  width:110px;
  height:148px;
  border-radius:18px;
  cursor:pointer;
  flex-shrink:0;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.65);
  transition:transform .26s cubic-bezier(.34,1.48,.64,1),box-shadow .26s;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:13px 12px 12px;
}
.book:hover{transform:translateY(-8px) rotate(-1deg) scale(1.03);box-shadow:0 20px 48px rgba(0,0,0,.18)!important}
/* glossy highlight */
.book::before{content:'';position:absolute;inset:0;background:linear-gradient(145deg,rgba(255,255,255,.38) 0%,rgba(255,255,255,.08) 40%,transparent 65%);z-index:1;pointer-events:none}
/* noise grain for depth */
.book::after{content:'';position:absolute;inset:0;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:2;pointer-events:none}
.book-icon{font-size:22px;position:relative;z-index:3;display:block;margin-bottom:auto;line-height:1}
.book-info{position:relative;z-index:3;display:flex;flex-direction:column;gap:2px}
.book-spine{font-size:12.5px;font-weight:800;letter-spacing:.01em;color:var(--tc,rgba(40,50,70,.85))}
.book-count{font-size:9.5px;font-weight:600;letter-spacing:.01em;color:var(--tc,rgba(40,50,70,.55))}
.book-dot{display:none}
.book-shadow{display:none}

/* book open panel */
.book-panel{flex:1;min-height:0;display:none;flex-direction:column;gap:10px;overflow:hidden;animation:bkIn .2s ease}
@keyframes bkIn{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}
.bk-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;flex-shrink:0}
.bk-title{font-size:15px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.2)}
.bk-sub{font-size:11px;color:rgba(255,255,255,.72);margin-top:2px}
.bk-back{margin-left:auto;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;transition:background .15s}
.bk-back:hover{background:rgba(255,255,255,.35)}
.bk-entries{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:rgba(100,130,200,.18) transparent}
.bk-empty{display:flex;flex-direction:column;align-items:center;gap:6px;padding:28px 0;color:var(--muted);font-size:13px}
.bk-entry{background:rgba(255,255,255,.82);border:1px solid rgba(210,222,245,.5);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .18s;flex-shrink:0}
.bk-entry:hover{box-shadow:0 3px 14px rgba(74,124,247,.09);transform:translateX(2px)}
.bke-head{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.bke-date{font-size:11px;font-weight:600;color:var(--muted)}
.bke-eng{font-size:13px}
.bke-del{margin-left:auto;font-size:11px;border:none;background:none;cursor:pointer;color:rgba(138,159,192,.5);padding:1px 5px;border-radius:5px;transition:all .15s}
.bke-del:hover{background:#fee2e2;color:var(--red)}
.bke-pre{font-size:13px;color:var(--text2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bke-full{display:none;font-size:13px;color:var(--text);line-height:1.8;white-space:pre-wrap;margin-top:6px;padding-top:6px;border-top:1px solid rgba(180,200,240,.22)}

/* DDL overlay */
.ddl-overlay{position:fixed;inset:0;z-index:100;display:none;align-items:flex-start;justify-content:flex-end;padding:58px 36px 0;pointer-events:none}
.ddl-overlay.open{display:flex}
.ddl-box{width:360px;max-height:calc(100vh-80px);background:var(--glass);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 12px 48px rgba(74,124,247,.16);backdrop-filter:blur(24px);display:flex;flex-direction:column;overflow:hidden;pointer-events:all;animation:slideIn .22s cubic-bezier(.32,0,.18,1)}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px) scale(.97)}to{opacity:1;transform:none}}
.ddl-head{display:flex;align-items:center;gap:8px;padding:14px 18px 12px;border-bottom:1px solid var(--border2);flex-shrink:0}
.ddl-close{margin-left:auto;width:24px;height:24px;border:none;background:rgba(180,200,240,.2);border-radius:7px;cursor:pointer;font-size:14px;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all .15s}
.ddl-close:hover{background:#fee2e2;color:var(--red)}
.ddl-body{overflow-y:auto;flex:1;padding:14px 18px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin;scrollbar-color:rgba(100,130,200,.18) transparent}
.twrap{display:flex;flex-direction:column;gap:5px}
.ti{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;border-radius:9px;background:rgba(255,255,255,.72);border:1px solid rgba(210,222,245,.4);transition:opacity .2s}
.ti.done{opacity:.45}
.tck{width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(180,200,240,.4);flex-shrink:0;cursor:pointer;margin-top:1px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.9);transition:all .2s}
.tck.on{background:var(--green);border-color:var(--green)}
.tck.on::after{content:'✓';font-size:8px;color:white;font-weight:800}
.tb{flex:1;min-width:0}
.tgtag{font-size:9px;font-weight:700;color:var(--orange);margin-bottom:2px}
.ttxt{font-size:12px;line-height:1.45;color:var(--text2)}
.ttxt.stk{text-decoration:line-through;color:var(--muted)}
.tdly{font-size:10px;border:none;background:none;cursor:pointer;color:var(--muted);padding:1px 5px;border-radius:5px;flex-shrink:0;transition:all .15s}
.tdly:hover{background:var(--orange-s);color:var(--orange)}
.notask{text-align:center;padding:14px 0;font-size:12px;color:var(--muted)}
.gc{background:rgba(255,255,255,.75);border:1px solid var(--border2);border-radius:11px;padding:11px 13px;flex-shrink:0}
.gcname{font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.gcmeta{font-size:10px;color:var(--muted);margin-bottom:6px}
.gcdel{font-size:11px;border:none;background:none;cursor:pointer;color:rgba(138,159,192,.5);padding:0 4px;border-radius:4px;transition:all .15s}
.gcdel:hover{background:#fee2e2;color:var(--red)}
.pbar{height:4px;background:rgba(180,200,240,.18);border-radius:99px;overflow:hidden}
.pbarf{height:100%;border-radius:99px;background:linear-gradient(90deg,#6a9fff,var(--blue));transition:width .4s}
.plbl{font-size:9.5px;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between}
.new-goal{display:flex;flex-direction:column;gap:8px}
.sbtns{display:flex;gap:6px;margin-top:2px}
.smbtn{flex:1;padding:7px 0;border:1.5px solid var(--border2);background:rgba(255,255,255,.9);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s}
.smbtn:hover{background:var(--blue-s);border-color:var(--blue-m);color:var(--blue)}
.spre{background:rgba(249,115,22,.04);border:1.5px solid rgba(249,115,22,.17);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:5px}
.spt{font-size:9px;font-weight:800;color:var(--orange);letter-spacing:.08em;text-transform:uppercase}
.sd{display:flex;gap:6px;font-size:11.5px}
.sdl{flex-shrink:0;color:var(--muted);min-width:38px;font-weight:500}
.sdt{color:var(--text2);line-height:1.4}

@keyframes sp{to{transform:rotate(360deg)}}
.sp{width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
</style>
</head>
<body>

<div class="topbar">
  <a href="/08/works/#tools" class="back">
    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    主页
  </a>
  <div class="div-line"></div>
  <div class="mswitch">
    <button class="mbtn on-i" data-m="intern" onclick="switchMode('intern')">🏢 实习</button>
    <button class="mbtn" data-m="research" onclick="switchMode('research')">🔬 科研</button>
  </div>
  <div class="streak">🔥 <span id="sNum">0</span> 天连续记录</div>
  <div class="ddl-pill" onclick="toggleDDL()">🎯 DDL <span id="ddlStat" style="display:none"></span> <span id="ddlArrow">▾</span></div>
</div>

<div class="main">

  <!-- 左：填写 -->
  <div class="col-left">
    <div class="card cp grow" style="overflow-y:auto">
      <div class="lbl" id="ftitle">✍️ 今天的实习复盘</div>
      <div id="fi" style="display:flex;flex-direction:column;gap:10px;flex:1;min-height:0">
        <div class="fg" style="flex:1;min-height:0;display:flex;flex-direction:column"><label class="fl">💼 今天做了什么</label><textarea id="i-did" placeholder="跟导师做了用户访谈…" style="flex:1;min-height:60px;height:auto"></textarea></div>
        <div class="fg" style="flex:1;min-height:0;display:flex;flex-direction:column"><label class="fl">💡 学到 / 观察到什么</label><textarea id="i-learned" placeholder="发现用户最在意流程顺不顺…" style="flex:1;min-height:60px;height:auto"></textarea></div>
        <div class="fg"><label class="fl">🪨 遇到的卡点</label><textarea class="sm" id="i-block" placeholder="数据权限还没申请到…"></textarea></div>
        <div class="fg"><label class="fl">🎯 明天要做</label><textarea class="sm" id="i-next" placeholder="整理成结构化需求文档…"></textarea></div>
        <div style="display:flex;align-items:center;gap:8px"><span class="elbl">今日状态</span>
          <div class="edots" id="ei">
            <button class="edot" data-v="1" onclick="setE('i',1)">😩</button>
            <button class="edot" data-v="2" onclick="setE('i',2)">😐</button>
            <button class="edot" data-v="3" onclick="setE('i',3)">🙂</button>
            <button class="edot" data-v="4" onclick="setE('i',4)">😄</button>
            <button class="edot" data-v="5" onclick="setE('i',5)">🚀</button>
          </div>
        </div>
      </div>
      <div id="fr" style="display:none;flex-direction:column;gap:10px;flex:1;min-height:0">
        <div class="fg" style="flex:1;min-height:0;display:flex;flex-direction:column"><label class="fl">🧪 今天推进了什么</label><textarea id="r-did" placeholder="跑完了第一组对照实验…" style="flex:1;min-height:60px;height:auto"></textarea></div>
        <div class="fg" style="flex:1;min-height:0;display:flex;flex-direction:column"><label class="fl">🔍 新发现 / 新想法</label><textarea id="r-learned" placeholder="发现baseline在长文本退化…" style="flex:1;min-height:60px;height:auto"></textarea></div>
        <div class="fg"><label class="fl">🌀 还没搞清楚的</label><textarea class="sm" id="r-block" placeholder="为什么epoch增加loss震荡…"></textarea></div>
        <div class="fg"><label class="fl">📌 下一步验证方向</label><textarea class="sm" id="r-next" placeholder="试试降低learning rate…"></textarea></div>
        <div style="display:flex;align-items:center;gap:8px"><span class="elbl">今日状态</span>
          <div class="edots" id="er">
            <button class="edot" data-v="1" onclick="setE('r',1)">😩</button>
            <button class="edot" data-v="2" onclick="setE('r',2)">😐</button>
            <button class="edot" data-v="3" onclick="setE('r',3)">🙂</button>
            <button class="edot" data-v="4" onclick="setE('r',4)">😄</button>
            <button class="edot" data-v="5" onclick="setE('r',5)">🚀</button>
          </div>
        </div>
      </div>
      <button class="btn blue" id="gBtn" onclick="gen()"><span>✨</span> AI 提炼今日成长笔记</button>
    </div>
  </div>

  <!-- 中：笔记 + 书架 -->
  <div class="col-mid">
    <div class="card cp" style="flex:0 0 auto;min-height:150px;display:flex;flex-direction:column;gap:10px">
      <div class="lbl">📝 今日笔记
        <span id="saveTip" style="display:none;margin-left:auto;font-size:10.5px;color:var(--green);font-weight:600;background:var(--green-s);padding:2px 9px;border-radius:99px;border:1px solid rgba(34,197,94,.2)">已存入笔记本 ✓</span>
      </div>
      <div class="notebox empty" id="noteBox" style="flex:1">
        <div class="nph">🌱</div>
        <div class="npht">填写左侧，AI 帮你提炼成长笔记</div>
      </div>
    </div>

    <!-- 书架 / 笔记本内页 -->
    <div class="card cp grow" style="overflow:hidden">
      <div class="lbl" id="shelfLbl">📚 笔记本书架</div>

      <!-- 书架视图 -->
      <div id="shelfView" style="flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:rgba(100,130,200,.18) transparent">
        <div class="shelf-row">
          <div class="shelf-label">实习</div>
          <div class="shelf-books" id="shelf-intern"></div>
        </div>
        <div class="shelf-row">
          <div class="shelf-label">科研</div>
          <div class="shelf-books" id="shelf-research"></div>
        </div>
      </div>

      <!-- 笔记本内页 -->
      <div id="bookView" class="book-panel">
        <div class="bk-header" id="bkHeader">
          <div>
            <div class="bk-title" id="bkTitle"></div>

          </div>
          <button class="bk-back" onclick="closeBook()">← 书架</button>

        <div class="bk-entries" id="bkEntries"></div>
      </div>
    </div>
  </div>

  <!-- 右：日历 + 背景 -->
  <div class="col-right">
    <div class="card cps" style="flex-shrink:0;display:flex;flex-direction:column;gap:0">
      <div class="calhead">
        <div class="caltitle" id="rcalT"></div>
        <div class="calnav">
          <button onclick="rcalMove(-1)">‹</button>
          <button onclick="rcalMove(1)">›</button>
        </div>
      </div>
      <div class="cg" id="rcalG"></div>
    </div>
    <div class="card cps grow" style="display:flex;flex-direction:column;gap:8px">
      <div class="lbl">🗒 背景信息</div>
      <textarea id="bgInfo" placeholder="实习公司、岗位、科研课题、导师方向…" oninput="saveBg()" style="flex:1;min-height:0;height:auto;resize:none;font-size:13px;background:rgba(255,255,255,.75)!important"></textarea>
    </div>
  </div>

</div>

<!-- DDL 浮层 -->
<div class="ddl-overlay" id="ddlOverlay" onclick="onOvClick(event)">
  <div class="ddl-box">
    <div class="ddl-head">
      <span style="font-size:16px">🎯</span>
      <span style="font-size:13.5px;font-weight:700;color:var(--text)">DDL Master</span>
      <button class="ddl-close" onclick="toggleDDL()">✕</button>
    </div>
    <div class="ddl-body">
      <div>
        <div class="lbl" style="margin-bottom:8px">📋 今日任务</div>
        <div class="twrap" id="tWrap"><div class="notask" id="noTask">今天还没有任务</div></div>
      </div>
      <div>
        <div class="lbl" style="margin-bottom:8px">🏃 进行中</div>
        <div style="display:flex;flex-direction:column;gap:7px" id="gList"><div style="font-size:12px;color:var(--muted);text-align:center;padding:8px 0">还没有目标</div></div>
      </div>
      <div>
        <div class="lbl" style="margin-bottom:8px">➕ 新建目标</div>
        <div class="new-goal">
          <input type="text" id="dn" placeholder="目标名称" style="height:34px">
          <textarea id="dd" placeholder="内容描述（AI 拆解）" style="height:52px"></textarea>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div class="fg"><label class="fl" style="font-size:12px">截止日期</label><input type="date" id="dl" style="font-size:11.5px"></div>
            <div class="fg"><label class="fl" style="font-size:12px">周期</label><select id="ds" style="font-size:11.5px"><option value="auto">按截止日</option><option value="7">7天</option><option value="14">14天</option><option value="30">30天</option></select></div>
          </div>
          <button class="btn" id="ddlBtn" onclick="createGoal()" style="background:linear-gradient(135deg,#ff8534,var(--orange),#e8530a);box-shadow:0 3px 12px rgba(249,115,22,.30);border-radius:10px;padding:9px;font-size:13px"><span>🤖</span> AI 拆分任务</button>
          <div class="spre" id="sPreview" style="display:none">
            <div class="spt">任务预览</div>
            <div id="sDays" style="display:flex;flex-direction:column;gap:4px"></div>
            <div class="sbtns"><button class="smbtn" onclick="confirmGoal()">✅ 确认</button><button class="smbtn" onclick="document.getElementById('sPreview').style.display='none'">取消</button></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── BOOKS CONFIG ──
const BOOKS = {
  intern: [
    {id:'xiaohongshu', name:'小红书', icon:'🌸',
     bg:'linear-gradient(145deg,#f2c4ce 0%,#c9a0c0 40%,#a0b8d8 100%)',
     shadow:'rgba(200,150,180,.35)', textColor:'rgba(80,40,60,.85)'},
    {id:'transsion',   name:'传音',   icon:'🎵',
     bg:'linear-gradient(145deg,#b8c8e8 0%,#8fa8d0 40%,#c8d8f0 100%)',
     shadow:'rgba(120,150,200,.35)', textColor:'rgba(40,60,100,.85)'},
    {id:'benq',        name:'明基',   icon:'🖥️',
     bg:'linear-gradient(145deg,#b8d4c0 0%,#90b8a0 40%,#c8e0c8 100%)',
     shadow:'rgba(100,160,120,.35)', textColor:'rgba(30,70,50,.85)'},
  ],
  research: [
    {id:'kg',          name:'图谱',   icon:'🕸️',
     bg:'linear-gradient(145deg,#ccc0e0 0%,#a898c8 40%,#d8c8e8 100%)',
     shadow:'rgba(150,120,190,.35)', textColor:'rgba(60,30,90,.85)'},
    {id:'devtraj',     name:'发育轨迹', icon:'🧬',
     bg:'linear-gradient(145deg,#e0d0b8 0%,#c8b090 40%,#e8d8c0 100%)',
     shadow:'rgba(180,140,90,.35)', textColor:'rgba(80,55,20,.85)'},
  ]
};

const TODAY=new Date().toISOString().slice(0,10);
const EE=['','😩','😐','🙂','😄','🚀'];
const EW=['','有点累','状态一般','还不错','状态很好','超级在状态'];
const ds=d=>d instanceof Date?d.toISOString().slice(0,10):d;
const addD=(s,n)=>{const d=new Date(s+' 00:00:00');d.setDate(d.getDate()+n);return ds(d)};
const diffD=(a,b)=>Math.round((new Date(b+' 00:00:00')-new Date(a+' 00:00:00'))/86400000);

// mode
let curMode='intern',curBook=null;
const energy={i:0,r:0};
function switchMode(m){
  curMode=m;
  document.querySelectorAll('.mbtn').forEach(b=>{b.className='mbtn';if(b.dataset.m===m)b.classList.add('on-'+m[0])});
  const isI=m==='intern';
  document.getElementById('fi').style.display=isI?'flex':'none';
  document.getElementById('fr').style.display=isI?'none':'flex';
  document.getElementById('ftitle').textContent=isI?'✍️ 今天的实习复盘':'🔬 今天的科研复盘';
  document.getElementById('gBtn').className='btn '+(isI?'blue':'purple');
}
function setE(k,v){energy[k]=v;document.querySelectorAll('#e'+k+' .edot').forEach(d=>d.classList.toggle('on',+d.dataset.v===v))}

// DDL
let ddlOpen=false;
function toggleDDL(){ddlOpen=!ddlOpen;document.getElementById('ddlOverlay').classList.toggle('open',ddlOpen);document.getElementById('ddlArrow').textContent=ddlOpen?'▴':'▾'}
function onOvClick(e){if(e.target===document.getElementById('ddlOverlay'))toggleDDL()}

// data - records per book
const getRec=(bid)=>{try{return JSON.parse(localStorage.getItem('bk_'+bid)||'[]')}catch{return[]}};
const saveRec=(bid,arr)=>localStorage.setItem('bk_'+bid,JSON.stringify(arr));
const allRecs=()=>Object.values(BOOKS).flat().flatMap(b=>getRec(b.id).map(r=>({...r,bid:b.id})));

// streak - count days with any record
function calcStreak(){
  const dates=[...new Set(allRecs().map(r=>r.date))].sort().reverse();
  if(!dates.length)return 0;
  let s=0;const now=new Date();
  for(let i=0;i<dates.length;i++){const diff=Math.round((now-new Date(dates[i]+' 00:00:00'))/86400000);if(diff===i||diff===i+1)s++;else break}
  return s;
}
const upStreak=()=>document.getElementById('sNum').textContent=calcStreak();

// find which book to save to based on curMode
function pickBook(){
  const cat=curMode==='intern'?'intern':'research';
  const books=BOOKS[cat];
  // pick the one matching the switch, or first
  return books[0];
}

// gen
function gen(){
  const btn=document.getElementById('gBtn');
  const isI=curMode==='intern';
  const did=document.getElementById(isI?'i-did':'r-did').value.trim();
  const learned=document.getElementById(isI?'i-learned':'r-learned').value.trim();
  const block=document.getElementById(isI?'i-block':'r-block').value.trim();
  const next=document.getElementById(isI?'i-next':'r-next').value.trim();
  const eng=energy[isI?'i':'r'];
  if(!did&&!learned){shake(btn);return}
  btn.classList.add('loading');btn.innerHTML='<div class="sp"></div> 提炼中…';
  setTimeout(()=>{
    const note=mkNote({isI,did,learned,block,next,eng});
    showNote(note);
    // save to the currently open book, or first book in category
    const target=curBook||(isI?BOOKS.intern[0]:BOOKS.research[0]);
    const arr=getRec(target.id);
    arr.unshift({date:TODAY,note,energy:eng,mode:curMode});
    saveRec(target.id,arr);
    renderShelves();
    if(curBook&&curBook.id===target.id)openBook(curBook,true);
    showSaveTip(target.name);
    upStreak();renderRcal();
    btn.classList.remove('loading');btn.innerHTML='<span>✨</span> AI 提炼今日成长笔记';
  },900);
}
function showSaveTip(name){
  const t=document.getElementById('saveTip');
  t.textContent='已存入「'+name+'」✓';t.style.display='';
  setTimeout(()=>t.style.display='none',2500);
}
function mkNote({isI,did,learned,block,next,eng}){
  const today=new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'long'});
  const L=[`📅 ${today}${eng?'  ·  '+EE[eng]+' '+EW[eng]:''}`,``];
  if(did)L.push(isI?'【今天做了】':'【今天推进】',did,'');
  if(learned)L.push(isI?'【学到/观察到】':'【新发现】',learned,'');
  if(block)L.push(isI?'【卡点】':'【没搞清楚的】',block,'');
  if(next)L.push(isI?'【明天要做】':'【下一步】',next,'');
  L.push('💬 今日小结',mkInsight({isI,did,learned,block,next}));
  return L.join('\n');
}
function mkInsight({isI,did,learned,block,next}){
  const s=t=>t?(t.replace(/\n/g,' ').slice(0,24)+(t.length>24?'…':'')):''
  const pool=isI?[
    learned?`今天最大的收获是发现：${s(learned)}。`:null,
    block?`"${s(block)}"这件事卡住了，卡点往往是成长的入口。`:null,
    next?`明天要搞定${s(next)}，目标清晰了执行就不慌。`:null,
    '扎实推进了今天的工作，每一步都是在为后面的自己铺路。',
  ]:[
    learned?`今天的新发现是：${s(learned)}。科研就是在不确定里找到确定性。`:null,
    block?`"${s(block)}"还没想清楚，也许明天一杯咖啡就想通了。`:null,
    next?`下一步要验证${s(next)}，带着具体问题做实验才不会白跑。`:null,
    '实验又推进了一步，研究本来就是螺旋上升的过程。',
  ];
  const v=pool.filter(Boolean);return v[Math.floor(Math.random()*v.length)];
}
function showNote(note){
  const box=document.getElementById('noteBox');
  box.className='notebox';
  box.innerHTML=`<div class="ncontent">${note.replace(/</g,'&lt;')}</div>
    <div class="nmeta">
      <span class="ntag ${curMode==='intern'?'i':'r'}">${curMode==='intern'?'🏢 实习':'🔬 科研'}</span>
      <button class="cpbtn" onclick="cpNote()">复制</button>
    </div>`;
}
function cpNote(){const t=document.querySelector('.ncontent');if(!t)return;navigator.clipboard.writeText(t.textContent).then(()=>{const b=document.querySelector('.cpbtn');b.textContent='已复制 ✓';setTimeout(()=>b.textContent='复制',1500)})}
function shake(el){el.style.transform='translateX(-4px)';setTimeout(()=>el.style.transform='translateX(4px)',80);setTimeout(()=>el.style.transform='',200)}
const saveBg=()=>localStorage.setItem('bgInfo',document.getElementById('bgInfo').value);
const loadBg=()=>{const el=document.getElementById('bgInfo');if(el)el.value=localStorage.getItem('bgInfo')||''};

// ── BOOKSHELF ──
function renderShelves(){
  ['intern','research'].forEach(cat=>{
    const el=document.getElementById('shelf-'+cat);
    el.innerHTML='';
    BOOKS[cat].forEach(b=>{
      const arr=getRec(b.id);
      const div=document.createElement('div');
      div.className='book';
      div.style.cssText=`background:${b.bg};box-shadow:0 8px 28px ${b.shadow},0 2px 8px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.55);--tc:${b.textColor}`;
      div.innerHTML=`
        <div class="book-icon">${b.icon||'📓'}</div>
        <div class="book-info">
          <div class="book-spine">${b.name}</div>
          <div class="book-count">${arr.length} 篇笔记</div>
        </div>`;
      div.onclick=()=>openBook(b);
      el.appendChild(div);
    });
  });
}

function openBook(b,keepScroll){
  curBook=b;
  // switch views
  document.getElementById('shelfView').style.display='none';
  const bv=document.getElementById('bookView');
  bv.style.display='flex';
  // header color
  const hdr=document.getElementById('bkHeader');
  hdr.style.background=`linear-gradient(135deg,${b.color}dd,${b.shadow}bb)`;
  document.getElementById('bkTitle').textContent=b.name;
  document.getElementById('shelfLbl').textContent='📖 '+b.name;
  // entries
  const entries=document.getElementById('bkEntries');
  if(!keepScroll)entries.scrollTop=0;
  entries.innerHTML='';
  const arr=getRec(b.id);
  if(!arr.length){
    entries.innerHTML='<div class="bk-empty"><span style="font-size:26px">📝</span>还没有笔记，去填写并提炼吧</div>';
    return;
  }
  arr.forEach((r,i)=>{
    const div=document.createElement('div');div.className='bk-entry';
    div.innerHTML=`<div class="bke-head">
        <span class="bke-date">${r.date}</span>
        <span class="bke-eng">${EE[r.energy]||''}</span>
        <button class="bke-del" onclick="delEntry('${b.id}',${i},event)">✕</button>
      </div>
      <div class="bke-pre">${r.note.replace(/</g,'&lt;')}</div>
      <div class="bke-full" id="bkef-${i}">${r.note.replace(/</g,'&lt;')}</div>`;
    div.onclick=()=>toggleEntry(i,div);
    entries.appendChild(div);
  });
}
function toggleEntry(i,div){
  const full=div.querySelector('.bke-full');
  const pre=div.querySelector('.bke-pre');
  const open=full.style.display==='block';
  full.style.display=open?'none':'block';
  pre.style.display=open?'':'none';
}
function delEntry(bid,i,e){
  e.stopPropagation();
  const arr=getRec(bid);arr.splice(i,1);saveRec(bid,arr);
  openBook(curBook,true);renderShelves();upStreak();renderRcal();
}
function closeBook(){
  curBook=null;
  document.getElementById('bookView').style.display='none';
  document.getElementById('shelfView').style.display='flex';
  document.getElementById('shelfLbl').textContent='📚 笔记本书架';
}

// cal
let rcY=new Date().getFullYear(),rcM=new Date().getMonth(),rcSel=TODAY;
function rcalMove(d){rcM+=d;if(rcM<0){rcM=11;rcY--}if(rcM>11){rcM=0;rcY++}renderRcal()}
function renderRcal(){
  const grid=document.getElementById('rcalG');
  document.getElementById('rcalT').textContent=rcY+'年'+(rcM+1)+'月';
  grid.innerHTML='';
  ['日','一','二','三','四','五','六'].forEach(w=>{const d=document.createElement('div');d.className='cw';d.textContent=w;grid.appendChild(d)});
  const first=new Date(rcY,rcM,1).getDay();
  const dim=new Date(rcY,rcM+1,0).getDate();
  const dprev=new Date(rcY,rcM,0).getDate();
  const recD=new Set(allRecs().map(r=>r.date));
  for(let i=0;i<first;i++){const d=document.createElement('div');d.className='cd om';d.textContent=dprev-first+1+i;grid.appendChild(d)}
  for(let day=1;day<=dim;day++){
    const s=rcY+'-'+String(rcM+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const d=document.createElement('div');d.className='cd';
    if(s===TODAY)d.classList.add('today');
    if(s===rcSel)d.classList.add('sel');
    if(recD.has(s))d.classList.add('has-r');
    d.textContent=day;
    d.onclick=(ss=>()=>{rcSel=ss;renderRcal()})(s);
    grid.appendChild(d);
  }
  const rem=(first+dim)%7===0?0:7-(first+dim)%7;
  for(let i=1;i<=rem;i++){const d=document.createElement('div');d.className='cd om';d.textContent=i;grid.appendChild(d)}
}

// DDL data
const getGoals=()=>{try{return JSON.parse(localStorage.getItem('dg')||'[]')}catch{return[]}};
const saveGoals=g=>localStorage.setItem('dg',JSON.stringify(g));
const getTD=(gid,i)=>localStorage.getItem('td_'+gid+'_'+i)==='1';
const setTD=(gid,i,v)=>localStorage.setItem('td_'+gid+'_'+i,v?'1':'0');
const getTL=(gid,i)=>localStorage.getItem('tl_'+gid+'_'+i)||null;
const setTL=(gid,i,d)=>localStorage.setItem('tl_'+gid+'_'+i,d);

let pending=null;
function createGoal(){
  const name=document.getElementById('dn').value.trim();
  const desc=document.getElementById('dd').value.trim();
  const deadline=document.getElementById('dl').value;
  const span=document.getElementById('ds').value;
  if(!name||!deadline){shake(document.getElementById('ddlBtn'));return}
  const btn=document.getElementById('ddlBtn');
  btn.classList.add('loading');btn.innerHTML='<div class="sp"></div> 拆分中…';
  setTimeout(()=>{
    const days=span==='auto'?Math.max(1,Math.min(30,diffD(TODAY,deadline))):parseInt(span);
    const tasks=splitTasks(desc||name,days);
    pending={name,desc,deadline,tasks,createdAt:TODAY,id:'g'+Date.now()};
    const de=document.getElementById('sDays');de.innerHTML='';
    tasks.slice(0,5).forEach((t,i)=>{const div=document.createElement('div');div.className='sd';div.innerHTML=`<span class="sdl">Day${i+1}</span><span class="sdt">${t}</span>`;de.appendChild(div)});
    if(tasks.length>5){const m=document.createElement('div');m.style.cssText='font-size:10px;color:var(--muted);margin-top:2px';m.textContent=`…还有${tasks.length-5}天`;de.appendChild(m)}
    document.getElementById('sPreview').style.display='';
    btn.classList.remove('loading');btn.innerHTML='<span>🤖</span> AI 拆分任务';
  },700);
}
function splitTasks(desc,days){
  const kws=desc.split(/[，,、。\n]+/).filter(k=>k.trim()).map(k=>k.trim());
  if(!kws.length)kws.push(desc||'完成目标');
  return Array.from({length:days},(_,i)=>{const r=i/days;return(r<.2?'启动·':r<.5?'推进·':r<.8?'深化·':'收尾·')+kws[i%kws.length]});
}
function confirmGoal(){
  if(!pending)return;
  const goals=getGoals();goals.push(pending);saveGoals(goals);pending=null;
  document.getElementById('sPreview').style.display='none';
  document.getElementById('dn').value='';document.getElementById('dd').value='';
  renderGoals();renderTodayTasks();upDDLStat();
}
function delGoal(id){saveGoals(getGoals().filter(g=>g.id!==id));renderGoals();renderTodayTasks();upDDLStat()}
function renderGoals(){
  const list=document.getElementById('gList');list.innerHTML='';
  const goals=getGoals();
  if(!goals.length){list.innerHTML='<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px 0">还没有目标</div>';return}
  goals.forEach(g=>{
    const total=g.tasks.length,done=g.tasks.filter((_,i)=>getTD(g.id,i)).length,pct=total?Math.round(done/total*100):0;
    const left=Math.max(0,diffD(TODAY,g.deadline));
    const c=document.createElement('div');c.className='gc';
    c.innerHTML=`<div class="gcname"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:240px">🎯 ${g.name}</span>
      <button class="gcdel" onclick="delGoal('${g.id}')">✕</button></div>
      <div class="gcmeta">截止 ${g.deadline} · 剩${left}天</div>
      <div class="pbar"><div class="pbarf" style="width:${pct}%"></div></div>
      <div class="plbl"><span>${done}/${total}</span><span>${pct}%</span></div>`;
    list.appendChild(c);
  });
}
function renderTodayTasks(){
  const wrap=document.getElementById('tWrap');
  wrap.querySelectorAll('.ti').forEach(el=>el.remove());
  const all=[];
  getGoals().forEach(g=>g.tasks.forEach((text,i)=>{
    const date=getTL(g.id,i)||addD(g.createdAt,i);
    if(date===TODAY)all.push({gid:g.id,gname:g.name,idx:i,text,done:getTD(g.id,i)});
  }));
  document.getElementById('noTask').style.display=all.length?'none':'';
  all.forEach(t=>{
    const div=document.createElement('div');div.className='ti'+(t.done?' done':'');
    div.innerHTML=`<div class="tck${t.done?' on':''}" onclick="toggleT('${t.gid}',${t.idx},${t.done})"></div>
      <div class="tb"><div class="tgtag">${t.gname}</div>
      <div class="ttxt${t.done?' stk':''}">${t.text}</div></div>
      ${!t.done?`<button class="tdly" onclick="reschedule('${t.gid}')">↺</button>`:''}`;
    wrap.appendChild(div);
  });
  upDDLStat();
}
function upDDLStat(){
  const all=[];
  getGoals().forEach(g=>g.tasks.forEach((_,i)=>{if((getTL(g.id,i)||addD(g.createdAt,i))===TODAY)all.push(getTD(g.id,i))}));
  const stat=document.getElementById('ddlStat');
  if(all.length){const done=all.filter(Boolean).length;stat.textContent=done+'/'+all.length;stat.style.display='';}else stat.style.display='none';
}
function toggleT(gid,idx,was){setTD(gid,idx,!was);renderGoals();renderTodayTasks()}
function reschedule(gid){
  const g=getGoals().find(x=>x.id===gid);if(!g)return;
  const undone=g.tasks.map((_,i)=>i).filter(i=>!getTD(gid,i));
  const remain=Math.max(1,diffD(TODAY,g.deadline));
  const step=remain/undone.length;
  undone.forEach((idx,n)=>setTL(gid,idx,addD(TODAY,Math.floor(n*step))));
  renderGoals();renderTodayTasks();
}

// init
renderShelves();upStreak();renderGoals();renderRcal();renderTodayTasks();loadBg();
const dd2=new Date();dd2.setDate(dd2.getDate()+7);document.getElementById('dl').value=ds(dd2);
</script>
