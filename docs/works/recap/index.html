<!-- recap_v2 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>成长复盘 · 08's Tools</title>
<style>
:root{
  --bg:#eef2f9;
  --glass:rgba(255,255,255,.88);
  --border:rgba(255,255,255,.98);
  --border2:rgba(210,222,245,.55);
  --shadow:0 4px 24px rgba(74,124,247,.08),0 1px 3px rgba(74,124,247,.04);
  --shadow-h:0 8px 32px rgba(74,124,247,.13),0 2px 6px rgba(74,124,247,.07);
  --blue:#4a7cf7;--blue-s:#dce8ff;--blue-m:#b8d0ff;
  --purple:#7c5cf7;--purple-s:#e8dcff;--purple-m:#c4b0ff;
  --orange:#f97316;--orange-s:#ffedd5;
  --green:#22c55e;--green-s:#dcfce7;
  --red:#ef4444;
  --text:#1a2540;--text2:#3d5280;--muted:#8a9fc0;
  --r:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;
  color:var(--text);background:var(--bg);
  background-image:
    radial-gradient(ellipse at 8% 15%,rgba(150,185,255,.30) 0%,transparent 48%),
    radial-gradient(ellipse at 92% 85%,rgba(180,150,255,.20) 0%,transparent 45%),
    radial-gradient(ellipse at 55% 10%,rgba(200,220,255,.14) 0%,transparent 40%);
  display:flex;flex-direction:column;
}

/* topbar */
.topbar{
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:9px 22px;
  background:rgba(255,255,255,.80);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(210,222,245,.38);
}
.back{
  display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;
  color:var(--text2);background:rgba(255,255,255,.95);
  border:1px solid var(--border2);border-radius:99px;
  padding:5px 13px 5px 9px;text-decoration:none;
  box-shadow:0 1px 6px rgba(74,124,247,.08);transition:all .2s;
}
.back:hover{color:var(--blue);transform:translateX(-2px)}
.divider{width:1px;height:16px;background:var(--border2)}
.mswitch{
  display:flex;gap:3px;
  background:rgba(230,238,255,.5);
  border:1px solid rgba(180,200,240,.4);
  border-radius:10px;padding:3px;
}
.mbtn{
  padding:5px 18px;border:none;border-radius:7px;font-size:13px;
  font-weight:600;cursor:pointer;background:transparent;color:var(--muted);transition:all .2s;
}
.mbtn.on-i{background:white;color:var(--blue);box-shadow:0 1px 6px rgba(74,124,247,.18)}
.mbtn.on-r{background:white;color:var(--purple);box-shadow:0 1px 6px rgba(124,92,247,.18)}
.streak{
  margin-left:auto;display:flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,var(--blue-s),rgba(220,232,255,.6));
  border:1px solid var(--blue-m);border-radius:99px;
  padding:5px 13px;font-size:12px;font-weight:700;color:var(--blue);
}
.ddl-toggle{
  display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
  color:var(--orange);background:var(--orange-s);border:1px solid rgba(249,115,22,.22);
  border-radius:99px;padding:5px 13px;cursor:pointer;transition:all .2s;
}
.ddl-toggle:hover{background:rgba(255,237,213,.8)}

/* main layout */
.main{flex:1;min-height:0;display:flex;gap:14px;padding:16px 22px;overflow:hidden}

/* card */
.card{
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  padding:16px 18px;display:flex;flex-direction:column;gap:10px;
  transition:box-shadow .2s;
}
.card:hover{box-shadow:var(--shadow-h)}
.card.grow{flex:1;min-height:0;overflow:hidden}
.lbl{font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.10em;display:flex;align-items:center;gap:5px}

/* ── 左列：填写 ── */
.col-left{width:300px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;overflow:hidden}

.fg{display:flex;flex-direction:column;gap:3px}
.fl{font-size:11px;font-weight:600;color:var(--muted)}
textarea,input[type=text],input[type=date],select{
  width:100%;border:1.5px solid rgba(180,200,240,.25);border-radius:10px;
  padding:8px 11px;font-size:12.5px;color:var(--text);
  background:rgba(255,255,255,.82);font-family:inherit;line-height:1.55;resize:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
textarea:focus,input:focus,select:focus{
  outline:none;border-color:rgba(74,124,247,.45);
  background:rgba(255,255,255,.98);box-shadow:0 0 0 3px rgba(74,124,247,.08);
}
textarea{height:58px}
textarea.sm{height:44px}
input[type=date],select{height:34px;cursor:pointer}

.erow{display:flex;align-items:center;gap:8px}
.elbl{font-size:11px;color:var(--muted);white-space:nowrap}
.edots{display:flex;gap:4px}
.edot{
  width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(180,200,240,.3);
  cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.7);transition:transform .15s,border-color .15s,background .15s;
}
.edot:hover{transform:scale(1.18);background:rgba(255,255,255,.95)}
.edot.on{border-color:var(--blue);background:var(--blue-s);box-shadow:0 2px 7px rgba(74,124,247,.2)}

.btn{
  width:100%;padding:10px;border:none;border-radius:11px;font-size:13px;
  font-weight:700;cursor:pointer;color:#fff;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .15s,box-shadow .15s;
}
.btn:hover{transform:translateY(-1.5px)}
.btn:active{transform:translateY(0)}
.btn.blue{background:linear-gradient(135deg,#5b8fff,var(--blue),#3a6cf0);box-shadow:0 4px 14px rgba(74,124,247,.34)}
.btn.purple{background:linear-gradient(135deg,#9470ff,var(--purple),#6a48f0);box-shadow:0 4px 14px rgba(124,92,247,.34)}
.btn.loading{opacity:.65;cursor:not-allowed;pointer-events:none}

/* ── 中列：笔记 + 历史 ── */
.col-mid{flex:1;min-width:0;display:flex;flex-direction:column;gap:12px;overflow:hidden}

.notebox{
  background:linear-gradient(135deg,rgba(74,124,247,.04),rgba(124,92,247,.025));
  border:1.5px solid rgba(74,124,247,.10);border-radius:12px;
  padding:13px 15px;overflow-y:auto;scrollbar-width:thin;
  scrollbar-color:rgba(100,130,200,.18) transparent;min-height:0;flex:1;
}
.notebox.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;color:var(--muted)}
.nph{font-size:24px;opacity:.2}
.npht{font-size:12px;opacity:.5;font-weight:500}
.ncontent{font-size:13px;line-height:1.9;color:var(--text);white-space:pre-wrap}
.nmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:10px;padding-top:9px;border-top:1px solid rgba(180,200,240,.2)}
.ntag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px}
.ntag.i{background:var(--blue-s);color:var(--blue);border:1px solid var(--blue-m)}
.ntag.r{background:var(--purple-s);color:var(--purple);border:1px solid var(--purple-m)}
.cpbtn{margin-left:auto;font-size:11px;padding:3px 10px;border-radius:7px;border:1px solid rgba(74,124,247,.18);background:white;color:var(--blue);cursor:pointer;font-weight:600;transition:all .18s}
.cpbtn:hover{background:var(--blue-s)}

.hwrap{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin;scrollbar-color:rgba(100,130,200,.18) transparent}
.hempty{display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--muted);font-size:12px;padding:18px 0}
.hi{background:rgba(255,255,255,.7);border:1px solid rgba(210,222,245,.48);border-radius:10px;padding:9px 13px;flex-shrink:0;transition:all .18s;cursor:default}
.hi:hover{box-shadow:0 2px 12px rgba(74,124,247,.08);transform:translateX(2px);background:rgba(255,255,255,.9)}
.hihead{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.hdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.hdot.i{background:var(--blue)}.hdot.r{background:var(--purple)}
.hdate{font-size:10px;color:var(--muted);font-weight:500}
.hdel{margin-left:auto;font-size:11px;border:none;background:none;cursor:pointer;color:rgba(138,159,192,.55);padding:1px 5px;border-radius:5px;transition:all .15s}
.hdel:hover{background:#fee2e2;color:var(--red)}
.hpre{font-size:11.5px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── 右列：日历 + DDL ── */
.col-right{width:230px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;overflow:hidden}

/* mini cal */
.calhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.caltitle{font-size:11.5px;font-weight:700;color:var(--text2)}
.calnav{display:flex;gap:2px}
.calnav button{width:19px;height:19px;border:1px solid var(--border2);background:rgba(255,255,255,.8);border-radius:5px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;display:flex;align-items:center;justify-content:center;line-height:1}
.calnav button:hover{background:var(--blue-s);color:var(--blue)}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cw{font-size:8.5px;font-weight:700;color:rgba(138,159,192,.65);text-align:center;padding:2px 0}
.cd{height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10.5px;cursor:pointer;position:relative;transition:all .13s;color:var(--text2)}
.cd:hover{background:var(--blue-s);color:var(--blue)}
.cd.om{color:rgba(138,159,192,.25);cursor:default}
.cd.om:hover{background:transparent;color:rgba(138,159,192,.25)}
.cd.today{background:var(--blue);color:#fff;font-weight:700;box-shadow:0 2px 7px rgba(74,124,247,.35)}
.cd.today:hover{background:var(--blue)}
.cd.sel{outline:2px solid rgba(74,124,247,.55);outline-offset:1px}
.cd::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;display:none}
.cd.has-t::after{display:block;background:var(--orange)}
.cd.has-r::after{display:block;background:var(--green)}
.cd.has-b::after{display:block;background:linear-gradient(90deg,var(--orange),var(--green))}
.cd.today::after{background:rgba(255,255,255,.7)}

/* bg info */
.bgta{flex:1;min-height:40px;font-size:12px;resize:none;background:rgba(255,255,255,.72)!important;border-radius:9px!important}

/* DDL compact */
.ddl-panel{display:flex;flex-direction:column;gap:10px;overflow:hidden}
.ddl-today{flex-shrink:0}
.dthead{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.dt-date{font-size:11px;color:var(--muted);font-weight:500}
.twrap{display:flex;flex-direction:column;gap:5px;max-height:130px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(100,130,200,.18) transparent}
.ti{display:flex;align-items:flex-start;gap:7px;padding:8px 10px;border-radius:9px;background:rgba(255,255,255,.7);border:1px solid rgba(210,222,245,.38);flex-shrink:0;transition:opacity .2s}
.ti.done{opacity:.45}
.tck{width:15px;height:15px;border-radius:50%;border:1.5px solid rgba(180,200,240,.4);flex-shrink:0;cursor:pointer;margin-top:1px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.9);transition:all .2s}
.tck.on{background:var(--green);border-color:var(--green);box-shadow:0 1px 5px rgba(34,197,94,.28)}
.tck.on::after{content:'✓';font-size:8px;color:white;font-weight:800}
.tb{flex:1;min-width:0}
.tgtag{font-size:9px;font-weight:700;color:var(--orange);margin-bottom:1px}
.ttxt{font-size:11.5px;line-height:1.45;color:var(--text2)}
.ttxt.stk{text-decoration:line-through;color:var(--muted)}
.tdly{font-size:10px;border:none;background:none;cursor:pointer;color:var(--muted);padding:1px 5px;border-radius:5px;flex-shrink:0;transition:all .15s;white-space:nowrap}
.tdly:hover{background:var(--orange-s);color:var(--orange)}
.notask{display:flex;flex-direction:column;align-items:center;gap:4px;padding:16px;color:var(--muted);font-size:11.5px}

/* DDL expand */
.ddl-expand{display:none;flex-direction:column;gap:9px}
.ddl-expand.open{display:flex}
.glist{max-height:80px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin;scrollbar-color:rgba(100,130,200,.18) transparent}
.gc{background:rgba(255,255,255,.75);border:1px solid var(--border2);border-radius:10px;padding:9px 11px;flex-shrink:0}
.gcname{font-size:11.5px;font-weight:700;color:var(--text);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between}
.gcdel{font-size:11px;border:none;background:none;cursor:pointer;color:rgba(138,159,192,.55);padding:0 4px;border-radius:4px;transition:all .15s}
.gcdel:hover{background:#fee2e2;color:var(--red)}
.gcmeta{font-size:10px;color:var(--muted);margin-bottom:5px}
.pbar{height:4px;background:rgba(180,200,240,.18);border-radius:99px;overflow:hidden}
.pbarf{height:100%;border-radius:99px;background:linear-gradient(90deg,#6a9fff,var(--blue));transition:width .4s}
.plbl{font-size:9.5px;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between}

.new-goal{display:flex;flex-direction:column;gap:7px}
.sbtns{display:flex;gap:6px}
.smbtn{flex:1;padding:6px 0;border:1.5px solid var(--border2);background:rgba(255,255,255,.9);border-radius:8px;font-size:11.5px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s}
.smbtn:hover{background:var(--blue-s);border-color:var(--blue-m);color:var(--blue)}
.spre{background:rgba(249,115,22,.04);border:1.5px solid rgba(249,115,22,.17);border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:5px}
.spt{font-size:9px;font-weight:800;color:var(--orange);letter-spacing:.08em;text-transform:uppercase}
.sd{display:flex;gap:6px;font-size:11px}
.sdl{flex-shrink:0;color:var(--muted);min-width:36px;font-weight:500}
.sdt{color:var(--text2);line-height:1.4}

/* filter bar */
.fbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.fbar input[type=date]{height:27px;font-size:11px;border-radius:8px;padding:0 8px;width:112px;background:rgba(255,255,255,.85)}
.fbar button{font-size:11px;padding:3px 9px;border-radius:7px;border:1px solid var(--border2);background:white;color:var(--muted);cursor:pointer;transition:all .15s}
.fbar button:hover{color:var(--red);border-color:rgba(239,68,68,.25)}

/* spinner */
@keyframes sp{to{transform:rotate(360deg)}}
.sp{width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
</style>
</head>
<body>

<!-- topbar: 返回 | 实习/科研切换 | 连续记录 | DDL开关 -->
<div class="topbar">
  <a href="/08/works/#tools" class="back">
    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    主页
  </a>
  <div class="divider"></div>
  <div class="mswitch">
    <button class="mbtn on-i" data-m="intern" onclick="switchMode('intern')">🏢 实习</button>
    <button class="mbtn" data-m="research" onclick="switchMode('research')">🔬 科研</button>
  </div>
  <div class="streak">🔥 <span id="sNum">0</span> 天连续记录</div>
  <div class="ddl-toggle" onclick="toggleDDL()">🎯 <span id="ddlTxt">DDL</span></div>
</div>

<!-- main 3-col -->
<div class="main">

  <!-- ── 左列：填写表单 ── -->
  <div class="col-left">
    <div class="card grow" style="overflow-y:auto">
      <div class="lbl" id="ftitle">✍️ 今天的实习复盘</div>

      <!-- intern form -->
      <div id="fi" style="display:flex;flex-direction:column;gap:9px">
        <div class="fg"><label class="fl">💼 今天做了什么</label><textarea id="i-did" placeholder="跟着导师做了用户访谈，整理了5份反馈…"></textarea></div>
        <div class="fg"><label class="fl">💡 学到 / 观察到什么</label><textarea id="i-learned" placeholder="发现用户最在意的不是功能多，而是流程顺…"></textarea></div>
        <div class="fg"><label class="fl">🪨 遇到的卡点</label><textarea class="sm" id="i-block" placeholder="数据权限还没申请到…"></textarea></div>
        <div class="fg"><label class="fl">🎯 明天要做</label><textarea class="sm" id="i-next" placeholder="把访谈整理成结构化需求文档…"></textarea></div>
        <div class="erow"><span class="elbl">今日状态</span>
          <div class="edots" id="ei">
            <button class="edot" data-v="1" onclick="setE('i',1)">😩</button>
            <button class="edot" data-v="2" onclick="setE('i',2)">😐</button>
            <button class="edot" data-v="3" onclick="setE('i',3)">🙂</button>
            <button class="edot" data-v="4" onclick="setE('i',4)">😄</button>
            <button class="edot" data-v="5" onclick="setE('i',5)">🚀</button>
          </div>
        </div>
      </div>

      <!-- research form -->
      <div id="fr" style="display:none;flex-direction:column;gap:9px">
        <div class="fg"><label class="fl">🧪 今天推进了什么</label><textarea id="r-did" placeholder="跑完了第一组对照实验…"></textarea></div>
        <div class="fg"><label class="fl">🔍 新发现 / 新想法</label><textarea id="r-learned" placeholder="发现baseline在长文本上有明显退化…"></textarea></div>
        <div class="fg"><label class="fl">🌀 还没搞清楚的</label><textarea class="sm" id="r-block" placeholder="为什么epoch增加loss反而震荡…"></textarea></div>
        <div class="fg"><label class="fl">📌 下一步验证方向</label><textarea class="sm" id="r-next" placeholder="试试降低learning rate…"></textarea></div>
        <div class="erow"><span class="elbl">今日状态</span>
          <div class="edots" id="er">
            <button class="edot" data-v="1" onclick="setE('r',1)">😩</button>
            <button class="edot" data-v="2" onclick="setE('r',2)">😐</button>
            <button class="edot" data-v="3" onclick="setE('r',3)">🙂</button>
            <button class="edot" data-v="4" onclick="setE('r',4)">😄</button>
            <button class="edot" data-v="5" onclick="setE('r',5)">🚀</button>
          </div>
        </div>
      </div>

      <button class="btn blue" id="gBtn" onclick="gen()"><span>✨</span> AI 提炼今日成长笔记</button>
    </div>
  </div>

  <!-- ── 中列：笔记 + 历史 ── -->
  <div class="col-mid">
    <!-- 今日笔记 -->
    <div class="card" style="flex:0 0 auto;min-height:160px;display:flex;flex-direction:column;gap:9px">
      <div class="lbl">📝 今日笔记</div>
      <div class="notebox empty" id="noteBox" style="flex:1">
        <div class="nph">🌱</div>
        <div class="npht">填写左侧，AI 帮你提炼成长笔记</div>
      </div>
    </div>
    <!-- 历史复盘 -->
    <div class="card grow">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0">
        <div class="lbl">📅 历史复盘</div>
        <div class="fbar" style="margin-left:auto">
          <input type="date" id="fFrom" onchange="renderHist()">
          <span style="font-size:11px;color:var(--muted)">—</span>
          <input type="date" id="fTo" onchange="renderHist()">
          <button onclick="clearF()">清除</button>
        </div>
      </div>
      <div class="hwrap" id="histWrap">
        <div class="hempty" id="histEmpty"><span style="font-size:20px">🗂</span>还没有记录</div>
      </div>
    </div>
  </div>

  <!-- ── 右列：日历 + 背景 + DDL ── -->
  <div class="col-right">
    <!-- 小日历 -->
    <div class="card" style="flex-shrink:0;padding:13px 14px;gap:0">
      <div class="calhead">
        <div class="caltitle" id="rcalT"></div>
        <div class="calnav">
          <button onclick="rcalMove(-1)">‹</button>
          <button onclick="rcalMove(1)">›</button>
        </div>
      </div>
      <div class="cg" id="rcalG"></div>
    </div>

    <!-- 背景信息 -->
    <div class="card" style="flex-shrink:0;gap:7px;padding:13px 14px">
      <div class="lbl">🗒 背景信息</div>
      <textarea class="bgta" id="bgInfo" placeholder="实习公司、岗位、科研课题、导师方向…" style="height:68px;resize:none" oninput="saveBg()"></textarea>
    </div>

    <!-- DDL 区域（可折叠） -->
    <div class="card grow" id="ddlCard" style="padding:13px 14px;gap:10px">
      <div class="lbl">🎯 DDL · 今日任务
        <span id="ddlStat" style="margin-left:auto;font-size:10px;color:var(--orange);font-weight:700"></span>
      </div>

      <!-- 今日任务列表 -->
      <div class="twrap" id="tWrap">
        <div class="notask" id="noTask"><span style="font-size:18px">✨</span>今天还没有任务</div>
      </div>

      <!-- 展开：新建 + 进行中 -->
      <div class="ddl-expand" id="ddlExpand">
        <div style="height:1px;background:var(--border2);margin:0 -2px"></div>
        <div class="lbl">进行中目标</div>
        <div class="glist" id="gList">
          <div style="font-size:11.5px;color:var(--muted);text-align:center;padding:10px 0">还没有目标</div>
        </div>
        <div style="height:1px;background:var(--border2);margin:0 -2px"></div>
        <div class="lbl">新建目标</div>
        <div class="new-goal">
          <input type="text" id="dn" placeholder="目标名称" style="height:33px">
          <textarea id="dd" placeholder="内容描述（AI拆解用）" style="height:46px"></textarea>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
            <div class="fg"><label class="fl">截止日期</label><input type="date" id="dl" style="font-size:11px"></div>
            <div class="fg"><label class="fl">周期</label>
              <select id="ds" style="font-size:11px">
                <option value="auto">按截止日</option>
                <option value="7">7天</option>
                <option value="14">14天</option>
                <option value="30">30天</option>
              </select>
            </div>
          </div>
          <button class="btn" id="ddlBtn" onclick="createGoal()" style="background:linear-gradient(135deg,#ff8534,var(--orange),#e8530a);box-shadow:0 3px 12px rgba(249,115,22,.32);border-radius:10px;padding:9px;font-size:12.5px"><span>🤖</span> AI 拆分任务</button>
          <div class="spre" id="sPreview" style="display:none">
            <div class="spt">任务预览</div>
            <div id="sDays"></div>
            <div class="sbtns" style="margin-top:3px">
              <button class="smbtn" onclick="confirmGoal()">✅ 确认</button>
              <button class="smbtn" onclick="document.getElementById('sPreview').style.display='none'">取消</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const TODAY=new Date().toISOString().slice(0,10);
const EE=['','😩','😐','🙂','😄','🚀'];
const EW=['','有点累','状态一般','还不错','状态很好','超级在状态'];
const ds=d=>d instanceof Date?d.toISOString().slice(0,10):d;
const addD=(s,n)=>{const d=new Date(s+' 00:00:00');d.setDate(d.getDate()+n);return ds(d)};
const diffD=(a,b)=>Math.round((new Date(b+' 00:00:00')-new Date(a+' 00:00:00'))/86400000);
const fmtD=s=>new Date(s+' 00:00:00').toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});

// mode
let curMode='intern';
const energy={i:0,r:0};
function switchMode(m){
  curMode=m;
  document.querySelectorAll('.mbtn').forEach(b=>{b.className='mbtn';if(b.dataset.m===m)b.classList.add('on-'+m[0])});
  const isI=m==='intern';
  document.getElementById('fi').style.display=isI?'flex':'none';
  document.getElementById('fr').style.display=isI?'none':'flex';
  document.getElementById('ftitle').textContent=(isI?'✍️ 今天的实习复盘':'🔬 今天的科研复盘');
  document.getElementById('gBtn').className='btn '+(isI?'blue':'purple');
}
function setE(k,v){energy[k]=v;document.querySelectorAll(`#e${k} .edot`).forEach(d=>d.classList.toggle('on',+d.dataset.v===v))}

// DDL toggle
let ddlOpen=false;
function toggleDDL(){
  ddlOpen=!ddlOpen;
  document.getElementById('ddlExpand').classList.toggle('open',ddlOpen);
  document.getElementById('ddlTxt').textContent=ddlOpen?'DDL ▴':'DDL ▾';
}

// data
const getRec=()=>{try{return JSON.parse(localStorage.getItem('rc')||'[]')}catch{return[]}};
const saveRec=r=>{const a=getRec();a.unshift(r);localStorage.setItem('rc',JSON.stringify(a.slice(0,90)))};
const delRec=i=>{const a=getRec();a.splice(i,1);localStorage.setItem('rc',JSON.stringify(a));renderHist();upStreak();renderRcal()};
const getGoals=()=>{try{return JSON.parse(localStorage.getItem('dg')||'[]')}catch{return[]}};
const saveGoals=g=>localStorage.setItem('dg',JSON.stringify(g));
const getTD=(gid,i)=>localStorage.getItem(`td_${gid}_${i}`)==='1';
const setTD=(gid,i,v)=>localStorage.setItem(`td_${gid}_${i}`,v?'1':'0');
const getTL=(gid,i)=>localStorage.getItem(`tl_${gid}_${i}`)||null;
const setTL=(gid,i,d)=>localStorage.setItem(`tl_${gid}_${i}`,d);

function calcStreak(){
  const recs=getRec();if(!recs.length)return 0;
  const dates=[...new Set(recs.map(r=>r.date))].sort().reverse();
  let s=0;const now=new Date();
  for(let i=0;i<dates.length;i++){const diff=Math.round((now-new Date(dates[i]+' 00:00:00'))/86400000);if(diff===i||diff===i+1)s++;else break}
  return s;
}
const upStreak=()=>document.getElementById('sNum').textContent=calcStreak();

// gen
function gen(){
  const btn=document.getElementById('gBtn');
  const isI=curMode==='intern';
  const did=document.getElementById(isI?'i-did':'r-did').value.trim();
  const learned=document.getElementById(isI?'i-learned':'r-learned').value.trim();
  const block=document.getElementById(isI?'i-block':'r-block').value.trim();
  const next=document.getElementById(isI?'i-next':'r-next').value.trim();
  const eng=energy[isI?'i':'r'];
  if(!did&&!learned){shake(btn);return}
  btn.classList.add('loading');btn.innerHTML='<div class="sp"></div> 提炼中…';
  setTimeout(()=>{
    const note=mkNote({isI,did,learned,block,next,eng});
    showNote(note);
    saveRec({mode:curMode,date:TODAY,note,energy:eng});
    renderHist();upStreak();renderRcal();
    btn.classList.remove('loading');btn.innerHTML='<span>✨</span> AI 提炼今日成长笔记';
  },900);
}
function mkNote({isI,did,learned,block,next,eng}){
  const today=new Date().toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'long'});
  const L=[`📅 ${today}${eng?'  ·  '+EE[eng]+' '+EW[eng]:''}`,``];
  if(did)L.push(isI?'【今天做了】':'【今天推进】',did,'');
  if(learned)L.push(isI?'【学到/观察到】':'【新发现】',learned,'');
  if(block)L.push(isI?'【卡点】':'【还没搞清楚】',block,'');
  if(next)L.push(isI?'【明天要做】':'【下一步】',next,'');
  L.push('💬 今日小结',mkInsight({isI,did,learned,block,next}));
  return L.join('\n');
}
function mkInsight({isI,did,learned,block,next}){
  const s=t=>t?(t.replace(/\n/g,' ').slice(0,24)+(t.length>24?'…':'')):''
  const pool=isI?[
    learned?`今天最大的收获是发现：${s(learned)}。职场里很多道理只有亲身跑过才能明白。`:null,
    block?`"${s(block)}"这件事卡住了，卡点往往是成长的入口——记下来，下次就是经验。`:null,
    next?`明天要搞定${s(next)}，目标清晰了执行就不慌。`:null,
    '扎实推进了今天的工作，每一步都是在为后面的自己铺路。',
  ]:[
    learned?`今天的新发现是：${s(learned)}。科研就是在不确定里寻找一点点确定性。`:null,
    block?`"${s(block)}"还没想清楚，也许明天一杯咖啡就想通了。`:null,
    next?`下一步要验证${s(next)}，带着具体问题做实验才不会白跑。`:null,
    '实验又推进了一步，研究本来就是螺旋上升的过程。',
  ];
  const v=pool.filter(Boolean);return v[Math.floor(Math.random()*v.length)];
}
function showNote(note,prefix){
  const box=document.getElementById('noteBox');
  box.className='notebox';
  box.innerHTML=(prefix?`<div style="font-size:10.5px;color:var(--muted);margin-bottom:7px">${prefix}</div>`:'')+
    `<div class="ncontent">${note.replace(/</g,'&lt;')}</div>
    <div class="nmeta">
      <span class="ntag ${curMode==='intern'?'i':'r'}">${curMode==='intern'?'🏢 实习':'🔬 科研'}</span>
      <button class="cpbtn" onclick="cpNote()">复制</button>
    </div>`;
}
function cpNote(){const t=document.querySelector('.ncontent');if(!t)return;navigator.clipboard.writeText(t.textContent).then(()=>{const b=document.querySelector('.cpbtn');b.textContent='已复制 ✓';setTimeout(()=>b.textContent='复制',1500)})}
function renderHist(){
  const wrap=document.getElementById('histWrap');
  wrap.querySelectorAll('.hi').forEach(el=>el.remove());
  const from=document.getElementById('fFrom').value||null;
  const to=document.getElementById('fTo').value||null;
  let recs=getRec();
  if(from)recs=recs.filter(r=>r.date>=from);
  if(to)recs=recs.filter(r=>r.date<=to);
  document.getElementById('histEmpty').style.display=recs.length?'none':'';
  recs.forEach((r,i)=>{
    const div=document.createElement('div');div.className='hi';
    div.innerHTML=`<div class="hihead"><div class="hdot ${r.mode==='intern'?'i':'r'}"></div>
      <span class="hdate">${r.date} · ${r.mode==='intern'?'实习':'科研'} ${EE[r.energy]||''}</span>
      <button class="hdel" onclick="delRec(${i})">✕</button></div>
      <div class="hpre">${r.note.replace(/</g,'&lt;')}</div>`;
    wrap.appendChild(div);
  });
}
const clearF=()=>{document.getElementById('fFrom').value='';document.getElementById('fTo').value='';renderHist()};
function shake(el){el.style.transform='translateX(-4px)';setTimeout(()=>el.style.transform='translateX(4px)',80);setTimeout(()=>el.style.transform='translateX(-2px)',160);setTimeout(()=>el.style.transform='',240)}
const saveBg=()=>localStorage.setItem('bgInfo',document.getElementById('bgInfo').value);
const loadBg=()=>{const el=document.getElementById('bgInfo');if(el)el.value=localStorage.getItem('bgInfo')||''};

// cal
let rcY=new Date().getFullYear(),rcM=new Date().getMonth(),rcSel=TODAY;
function rcalMove(d){rcM+=d;if(rcM<0){rcM=11;rcY--}if(rcM>11){rcM=0;rcY++}renderRcal()}
function renderRcal(){
  const grid=document.getElementById('rcalG');
  document.getElementById('rcalT').textContent=rcY+'年'+(rcM+1)+'月';
  grid.innerHTML='';
  ['日','一','二','三','四','五','六'].forEach(w=>{const d=document.createElement('div');d.className='cw';d.textContent=w;grid.appendChild(d)});
  const first=new Date(rcY,rcM,1).getDay();
  const dim=new Date(rcY,rcM+1,0).getDate();
  const dprev=new Date(rcY,rcM,0).getDate();
  const recD=new Set(getRec().map(r=>r.date));
  const goals=getGoals();
  const taskD=new Set();
  goals.forEach(g=>g.tasks.forEach((_,i)=>taskD.add(getTL(g.id,i)||addD(g.createdAt,i))));
  for(let i=0;i<first;i++){const d=document.createElement('div');d.className='cd om';d.textContent=dprev-first+1+i;grid.appendChild(d)}
  for(let day=1;day<=dim;day++){
    const s=rcY+'-'+String(rcM+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const ht=taskD.has(s),hr=recD.has(s);
    const d=document.createElement('div');d.className='cd';
    if(s===TODAY)d.classList.add('today');
    if(s===rcSel)d.classList.add('sel');
    if(ht&&hr)d.classList.add('has-b');else if(ht)d.classList.add('has-t');else if(hr)d.classList.add('has-r');
    d.textContent=day;
    d.onclick=(ss=>()=>{rcSel=ss;renderRcal();showRecapForDate(ss)})(s);
    grid.appendChild(d);
  }
  const rem=(first+dim)%7===0?0:7-(first+dim)%7;
  for(let i=1;i<=rem;i++){const d=document.createElement('div');d.className='cd om';d.textContent=i;grid.appendChild(d)}
}
function showRecapForDate(s){
  const recs=getRec().filter(r=>r.date===s);
  const box=document.getElementById('noteBox');
  if(recs.length){const r=recs[0];const old=curMode;curMode=r.mode;showNote(r.note,'📅 '+fmtD(s)+' 的复盘');curMode=old}
  else{box.className='notebox empty';box.innerHTML=`<div class="nph">📝</div><div class="npht">${s===TODAY?'填写左侧，AI 帮你提炼':fmtD(s)+' 还没有复盘记录'}</div>`}
}

// DDL
let pending=null;
function createGoal(){
  const name=document.getElementById('dn').value.trim();
  const desc=document.getElementById('dd').value.trim();
  const deadline=document.getElementById('dl').value;
  const span=document.getElementById('ds').value;
  if(!name||!deadline){shake(document.getElementById('ddlBtn'));return}
  const btn=document.getElementById('ddlBtn');
  btn.classList.add('loading');btn.innerHTML='<div class="sp"></div> 拆分中…';
  setTimeout(()=>{
    const days=span==='auto'?Math.max(1,Math.min(30,diffD(TODAY,deadline))):parseInt(span);
    const tasks=splitTasks(desc||name,days);
    pending={name,desc,deadline,tasks,createdAt:TODAY,id:'g'+Date.now()};
    const de=document.getElementById('sDays');de.innerHTML='';
    tasks.slice(0,4).forEach((t,i)=>{const div=document.createElement('div');div.className='sd';div.innerHTML=`<span class="sdl">Day${i+1}</span><span class="sdt">${t}</span>`;de.appendChild(div)});
    if(tasks.length>4){const m=document.createElement('div');m.style.cssText='font-size:10px;color:var(--muted);margin-top:2px';m.textContent=`…还有${tasks.length-4}天`;de.appendChild(m)}
    document.getElementById('sPreview').style.display='';
    btn.classList.remove('loading');btn.innerHTML='<span>🤖</span> AI 拆分任务';
  },700);
}
function splitTasks(desc,days){
  const kws=desc.split(/[，,、。\n]+/).filter(k=>k.trim()).map(k=>k.trim());
  if(!kws.length)kws.push(desc||'完成目标');
  return Array.from({length:days},(_,i)=>{const r=i/days;return(r<.2?'启动·':r<.5?'推进·':r<.8?'深化·':'收尾·')+kws[i%kws.length]});
}
function confirmGoal(){
  if(!pending)return;
  const goals=getGoals();goals.push(pending);saveGoals(goals);pending=null;
  document.getElementById('sPreview').style.display='none';
  document.getElementById('dn').value='';document.getElementById('dd').value='';document.getElementById('dl').value='';
  renderGoals();renderTodayTasks();renderRcal();
}
function delGoal(id){saveGoals(getGoals().filter(g=>g.id!==id));renderGoals();renderTodayTasks();renderRcal()}
function renderGoals(){
  const list=document.getElementById('gList');list.innerHTML='';
  const goals=getGoals();
  if(!goals.length){list.innerHTML='<div style="font-size:11px;color:var(--muted);text-align:center;padding:8px 0">还没有目标</div>';return}
  goals.forEach(g=>{
    const total=g.tasks.length,done=g.tasks.filter((_,i)=>getTD(g.id,i)).length,pct=total?Math.round(done/total*100):0;
    const left=Math.max(0,diffD(TODAY,g.deadline));
    const c=document.createElement('div');c.className='gc';
    c.innerHTML=`<div class="gcname"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px">🎯 ${g.name}</span>
      <button class="gcdel" onclick="delGoal('${g.id}')">✕</button></div>
      <div class="gcmeta">截止 ${g.deadline} · 剩${left}天</div>
      <div class="pbar"><div class="pbarf" style="width:${pct}%"></div></div>
      <div class="plbl"><span>${done}/${total}</span><span>${pct}%</span></div>`;
    list.appendChild(c);
  });
}
function renderTodayTasks(){
  const wrap=document.getElementById('tWrap');
  wrap.querySelectorAll('.ti').forEach(el=>el.remove());
  const all=[];
  getGoals().forEach(g=>g.tasks.forEach((text,i)=>{
    const date=getTL(g.id,i)||addD(g.createdAt,i);
    if(date===TODAY)all.push({gid:g.id,gname:g.name,idx:i,text,done:getTD(g.id,i)});
  }));
  document.getElementById('noTask').style.display=all.length?'none':'';
  const stat=document.getElementById('ddlStat');
  if(all.length){const done=all.filter(t=>t.done).length;stat.textContent=`${done}/${all.length}`;} else stat.textContent='';
  all.forEach(t=>{
    const div=document.createElement('div');div.className='ti'+(t.done?' done':'');
    div.innerHTML=`<div class="tck${t.done?' on':''}" onclick="toggleT('${t.gid}',${t.idx},${t.done})"></div>
      <div class="tb"><div class="tgtag">${t.gname}</div>
      <div class="ttxt${t.done?' stk':''}">${t.text}</div></div>
      ${!t.done?`<button class="tdly" onclick="reschedule('${t.gid}')">↺</button>`:''}`;
    wrap.appendChild(div);
  });
}
function toggleT(gid,idx,was){setTD(gid,idx,!was);renderGoals();renderTodayTasks();renderRcal()}
function reschedule(gid){
  const g=getGoals().find(x=>x.id===gid);if(!g)return;
  const undone=g.tasks.map((_,i)=>i).filter(i=>!getTD(gid,i));
  if(!undone.length)return;
  const remain=Math.max(1,diffD(TODAY,g.deadline));
  const step=remain/undone.length;
  undone.forEach((idx,n)=>setTL(gid,idx,addD(TODAY,Math.floor(n*step))));
  renderGoals();renderTodayTasks();renderRcal();
}

// init
renderHist();upStreak();renderGoals();renderRcal();renderTodayTasks();loadBg();
const dd2=new Date();dd2.setDate(dd2.getDate()+7);document.getElementById('dl').value=ds(dd2);
document.getElementById('ddlTxt').textContent='DDL ▾';
</script>
</body>
</html>
