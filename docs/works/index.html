<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>08 · AI 工具集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F7F8FA;--white:#fff;
  --blue:#2563EB;--blue-light:#EFF6FF;--blue-ghost:#DBEAFE;
  --text:#111827;--soft:#6B7280;--muted:#9CA3AF;--line:#E5E7EB;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --shadow-h:0 4px 20px rgba(37,99,235,.12),0 1px 4px rgba(0,0,0,.06);
  --r:16px;--rp:100px;--rs:8px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6}
a{text-decoration:none;color:inherit}

/* NAV */
nav{position:fixed;top:0;inset-x:0;height:56px;background:rgba(255,255,255,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);z-index:100;display:flex;align-items:center}
.nw{max-width:1100px;margin:0 auto;padding:0 24px;width:100%;display:flex;align-items:center;gap:12px}
.logo{font-size:15px;font-weight:800;letter-spacing:-.02em;flex-shrink:0;color:var(--text)}
.logo em{font-style:normal;color:var(--blue)}
.nc-wrap{display:flex;gap:3px}
.nc{font-size:13px;font-weight:600;color:var(--soft);padding:5px 14px;border-radius:var(--rp);cursor:pointer;transition:all .2s;border:none;background:transparent;font-family:var(--font)}
.nc:hover{background:rgba(0,0,0,.04);color:var(--text)}
.nc.on{background:var(--blue);color:#fff}
.nav-r{margin-left:auto}
.gh{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--soft);padding:5px 14px;border-radius:var(--rp);border:1px solid var(--line);background:var(--white);transition:all .2s}
.gh:hover{border-color:var(--blue);color:var(--blue)}
.gh svg{width:14px;height:14px;fill:currentColor}

/* HERO — cleaner, left-aligned */
.hero{max-width:1100px;margin:0 auto;padding:84px 24px 40px}
.hero-inner{display:grid;grid-template-columns:1fr auto;gap:48px;align-items:center}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);background:var(--blue-ghost);padding:4px 12px;border-radius:var(--rp);margin-bottom:16px}
.hero-title{font-size:clamp(28px,4vw,44px);font-weight:800;letter-spacing:-.03em;line-height:1.15;color:var(--text);margin-bottom:12px}
.hero-title .hl{color:var(--blue)}
.hero-desc{font-size:15px;color:var(--soft);max-width:420px;line-height:1.75;margin-bottom:24px}
.hero-pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{font-size:12px;font-weight:600;padding:5px 14px;border-radius:var(--rp);border:1px solid var(--line);color:var(--soft);background:var(--white)}
.pill.blue{background:var(--blue);border-color:var(--blue);color:#fff}

/* Stats row */
.stats{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap}
.stat{background:var(--white);border-radius:var(--r);padding:14px 18px;box-shadow:var(--shadow);min-width:110px;flex:1;border:1px solid rgba(0,0,0,.03)}
.stat-n{font-size:24px;font-weight:800;color:var(--blue);line-height:1}
.stat-l{font-size:11px;color:var(--soft);margin-top:3px;font-weight:500}

/* Icon mosaic */
.mosaic{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mc{width:68px;height:68px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 1px 2px rgba(0,0,0,.05);transition:transform .2s}
.mc:hover{transform:scale(1.1)}
.m1{background:linear-gradient(135deg,#DBEAFE,#BFDBFE)}
.m2{background:linear-gradient(135deg,#D1FAE5,#A7F3D0)}
.m3{background:linear-gradient(135deg,#FEF3C7,#FDE68A)}
.m4{background:linear-gradient(135deg,#EDE9FE,#DDD6FE)}
.m5{background:linear-gradient(135deg,#FCE7F3,#FBCFE8)}
.m6{background:linear-gradient(135deg,#E0F2FE,#BAE6FD)}
.m7{background:linear-gradient(135deg,#FEE2E2,#FECACA)}
.m8{background:linear-gradient(135deg,#F0FDF4,#DCFCE7)}
.m9{background:linear-gradient(135deg,#FEF9C3,#FDE68A)}

@media(max-width:860px){.hero-inner{grid-template-columns:1fr}.mosaic{display:none}}

/* TAB BAR */
.tab-wrap{max-width:1100px;margin:0 auto;padding:0 24px}
.tab-bar{display:flex;gap:4px;background:var(--white);border-radius:var(--rp);padding:4px;box-shadow:var(--shadow);width:fit-content;margin-bottom:32px;border:1px solid rgba(0,0,0,.04)}
.tb{font-size:13px;font-weight:600;color:var(--soft);padding:7px 18px;border-radius:22px;cursor:pointer;border:none;background:transparent;font-family:var(--font);transition:all .2s;white-space:nowrap}
.tb:hover{color:var(--text)}
.tb.on{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.tc{display:none}.tc.show{display:block}

/* SECTION HEADER */
.sec{margin-bottom:32px}
.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sec-ico{width:34px;height:34px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-ico svg{width:16px;height:16px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.sec-name{font-size:15px;font-weight:700;color:var(--text)}
.sec-cnt{font-size:11px;font-weight:600;padding:2px 9px;border-radius:var(--rp);background:var(--blue-ghost);color:var(--blue)}
.sec-line{flex:1;height:1px;background:var(--line)}

/* GRID */
.grid{display:grid;gap:14px}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:860px){.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:540px){.g3,.g2{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--white);border-radius:var(--r);padding:20px;cursor:pointer;transition:all .22s;display:flex;flex-direction:column;box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.04)}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-h);border-color:rgba(37,99,235,.1)}
.card-ic{width:40px;height:40px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:14px}
.card-ic svg{width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.card-t{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.35}
.card-d{font-size:12px;color:var(--soft);line-height:1.7;flex:1}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid #F3F4F6}
.card-tag{font-size:10px;font-weight:600;padding:3px 10px;border-radius:var(--rp);background:var(--blue-ghost);color:var(--blue)}
.card-arr{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;transition:transform .2s,background .2s}
.card:hover .card-arr{transform:scale(1.08);background:#1D4ED8}
.card-arr svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* ACTIVITY SECTION */
.act-wrap{display:flex;gap:28px;align-items:flex-start}
.act-col{flex:1;min-width:0}
.act-col-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;margin-bottom:12px}
.act-col-label span:last-child{flex:1;height:1px;background:var(--line)}
@media(max-width:720px){.act-wrap{flex-direction:column}}

/* APP 端手机比例卡 */
.g-app{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.acard{display:flex;flex-direction:column;text-decoration:none;background:var(--white);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);transition:all .22s;border:1px solid rgba(0,0,0,.04);aspect-ratio:9/16}
.acard:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(37,99,235,.12)}
.acard-cover{flex:1;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;flex-shrink:0}
.acard-cover::before{content:'';position:absolute;top:9px;left:50%;transform:translateX(-50%);width:32px;height:4px;background:rgba(0,0,0,.08);border-radius:3px}
.acard-body{padding:12px 12px 14px;display:flex;flex-direction:column;background:var(--white)}
.acard-tag{display:inline-block;font-size:8px;font-weight:700;padding:2px 7px;border-radius:var(--rp);margin-bottom:5px;width:fit-content}
.acard-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;line-height:1.3}
.acard-desc{font-size:10px;color:var(--soft);line-height:1.55;flex:1}
.acard-footer{margin-top:8px;display:flex;align-items:center;justify-content:space-between}
.acard-cta{font-size:10px;font-weight:600;color:var(--text)}
.acard-arr{width:22px;height:22px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center}
.acard-arr svg{width:9px;height:9px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* App cover colours */
.ac-mystic .acard-cover{background:linear-gradient(160deg,#1a1a2e,#2d1b69,#3b0764)}
.ac-mystic .acard-tag{background:rgba(167,139,250,.15);color:#a78bfa}
.ac-mystic .acard-title{color:#1a1a2e}
.ac-mystic .acard-cta{color:#7c3aed}
.ac-mystic .acard-arr{background:linear-gradient(135deg,#7c3aed,#5b21b6)}
.ac-traveler .acard-cover{background:linear-gradient(135deg,#E8F5E9,#C8E6C9)}
.ac-traveler .acard-tag{background:rgba(22,163,74,.1);color:#15803d}
.ac-footprint .acard-cover{background:linear-gradient(135deg,#FFF8E1,#FFECB3)}
.ac-footprint .acard-tag{background:rgba(245,158,11,.1);color:#b45309}

/* Web 端卡 */
.wcard{display:flex;align-items:center;gap:14px;background:var(--white);border-radius:14px;padding:14px 16px;text-decoration:none;box-shadow:var(--shadow);transition:all .22s;border:1px solid rgba(0,0,0,.04)}
.wcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-h);border-color:rgba(37,99,235,.1)}
.wcard-em{font-size:28px;flex-shrink:0;width:44px;text-align:center}
.wcard-body{flex:1;min-width:0}
.wcard-t{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.wcard-d{font-size:11px;color:var(--soft);line-height:1.55}
.wcard-arr{width:26px;height:26px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s}
.wcard:hover .wcard-arr{transform:scale(1.08)}
.wcard-arr svg{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* FOOTER */
footer{border-top:1px solid var(--line);padding:24px;text-align:center;font-size:12px;color:var(--muted);background:var(--white);margin-top:60px}
footer a{color:var(--blue)}
</style>
</head>

/* ─── RENDER ─── */
var ARR_SVG = '<svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>';

function renderCards(data, el) {
  el.innerHTML = data.map(function(t) {
    return '<a href="'+t.h+'" class="card">'
      + '<div class="card-ic" style="background:'+t.ic+'14">'
      +   '<svg viewBox="0 0 24 24" style="stroke:'+t.ic+'">'+t.icon+'</svg>'
      + '</div>'
      + '<div class="card-t">'+t.t+'</div>'
      + '<div class="card-d">'+t.d+'</div>'
      + '<div class="card-foot">'
      +   '<span class="card-tag">'+t.tag+'</span>'
      +   '<span class="card-arr">'+ARR_SVG+'</span>'
      + '</div></a>';
  }).join('');
}

function renderActivity(data, el) {
  el.innerHTML = data.map(function(a) {
    return '<a href="'+a.h+'" class="acard '+a.cls+'">'
      + '<div class="acard-cover">'+a.em+'</div>'
      + '<div class="acard-body">'
      +   '<span class="acard-tag">'+a.tag+'</span>'
      +   '<div class="acard-title">'+a.t+'</div>'
      +   '<div class="acard-desc">'+a.d+'</div>'
      +   '<div class="acard-footer">'
      +     '<span class="acard-cta">'+a.cta+'</span>'
      +     '<span class="acard-arr">'+ARR_SVG+'</span>'
      +   '</div>'
      + '</div></a>';
  }).join('');
}

function renderWeb(data, el) {
  el.innerHTML = data.map(function(w) {
    return '<a href="'+w.h+'" class="wcard">'
      + '<div class="wcard-em">'+w.em+'</div>'
      + '<div class="wcard-body"><div class="wcard-t">'+w.t+'</div><div class="wcard-d">'+w.d+'</div></div>'
      + '<span class="wcard-arr">'+ARR_SVG+'</span>'
      + '</a>';
  }).join('');
}

renderCards(DAILY, document.getElementById('g-daily'));
renderCards(DATA,  document.getElementById('g-data'));
renderActivity(ACTIVITY, document.getElementById('g-activity'));
renderWeb(WEB_DEMO, document.getElementById('g-web'));

/* ─── TAB SWITCH ─── */
var tabs = document.querySelectorAll('.tc');
var ncs  = document.querySelectorAll('.nc');

function switchTab(i, btn) {
  tabs.forEach(function(t,j){ t.classList.toggle('show', j===i); });
  ncs.forEach(function(n){ n.classList.remove('on'); });
  if(btn) btn.classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}
