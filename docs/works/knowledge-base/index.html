<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI 知识库问答 - 产品运营工具集</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--bg2:#fafafa;--blue:#4f46e5;
  --blue-light:rgba(79,70,229,.08);--blue-border:rgba(79,70,229,.2);
  --text:#0f0f23;--soft:#6b7280;--muted:#9ca3af;
  --bd:rgba(0,0,0,.07);--sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --r:14px;--pill:999px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
}
html{font-family:var(--font);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
body{min-height:100vh;padding-top:52px}

/* === NAV === */
.nav{position:fixed;top:0;left:0;right:0;height:52px;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100;backdrop-filter:blur(12px);background:rgba(255,255,255,.92)}
.nav-back{display:flex;align-items:center;gap:6px;text-decoration:none;color:var(--soft);font-size:14px;font-weight:500;transition:color .15s}
.nav-back:hover{color:var(--blue)}
.nav-back svg{width:18px;height:18px}
.nav-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 14px;border-radius:var(--pill);background:var(--blue-light);color:var(--blue);font-size:12px;font-weight:600}
.nav-tag svg{width:14px;height:14px}

/* === HERO === */
.hero{text-align:center;padding:40px 24px 28px;background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%)}
.hero h1{font-size:32px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
.hero h1 span{background:linear-gradient(135deg,var(--blue),#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--soft);font-size:15px;line-height:1.6;max-width:520px;margin:0 auto}

/* === MAIN LAYOUT === */
.main{display:flex;gap:20px;max-width:1400px;margin:0 auto;padding:0 24px 40px;min-height:calc(100vh - 200px)}

/* LEFT COLUMN */
.col-left{width:280px;flex-shrink:0;position:sticky;top:76px;align-self:flex-start;max-height:calc(100vh - 96px);display:flex;flex-direction:column;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.col-header{padding:16px;border-bottom:1px solid var(--bd)}
.col-header h3{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.col-header h3 svg{width:16px;height:16px;color:var(--blue)}
.upload-actions{display:flex;flex-direction:column;gap:8px}
.upload-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 12px;border-radius:10px;border:1.5px dashed var(--blue-border);background:var(--blue-light);color:var(--blue);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.upload-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.upload-btn svg{width:15px;height:15px}
.url-input-row{display:flex;gap:6px}
.url-input-row input{flex:1;padding:8px 10px;border:1.5px solid var(--bd);border-radius:8px;font-size:12px;outline:none;transition:border .15s}
.url-input-row input:focus{border-color:var(--blue-border)}
.url-input-row button{padding:8px 10px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.doc-list{flex:1;overflow-y:auto;padding:8px}
.doc-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:10px;cursor:pointer;transition:background .12s;font-size:13px}
.doc-item:hover{background:var(--bg2)}
.doc-item.active{background:var(--blue-light);border:1px solid var(--blue-border)}
.doc-item:not(.active){border:1px solid transparent}
.doc-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.doc-icon.pdf{background:#fef2f2;color:#ef4444}
.doc-icon.txt{background:#f0fdf4;color:#22c55e}
.doc-icon.md{background:#eff6ff;color:#3b82f6}
.doc-icon.paste{background:#fefce8;color:#eab308}
.doc-icon svg{width:16px;height:16px}
.doc-info{flex:1;min-width:0}
.doc-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}
.doc-meta{font-size:11px;color:var(--muted);margin-top:2px}
.doc-del{opacity:0;width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.doc-item:hover .doc-del{opacity:1}
.doc-del:hover{background:#fef2f2;color:#ef4444}
.doc-del svg{width:14px;height:14px}
.doc-empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:13px;line-height:1.7}
.doc-empty svg{width:36px;height:36px;margin:0 auto 10px;opacity:.4}
.paste-area{padding:12px;border-top:1px solid var(--bd)}
.paste-area textarea{width:100%;height:72px;padding:8px 10px;border:1.5px solid var(--bd);border-radius:8px;font-size:12px;resize:none;outline:none;font-family:var(--font);transition:border .15s}
.paste-area textarea:focus{border-color:var(--blue-border)}
.paste-submit{margin-top:6px;width:100%;padding:8px;border-radius:8px;border:none;background:var(--blue);color:#fff;font-size:12px;font-weight:600;cursor:pointer}
.paste-submit:disabled{opacity:.4;cursor:not-allowed}

/* CENTER COLUMN */
.col-center{flex:1;min-width:0;display:flex;flex-direction:column;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;min-height:calc(100vh - 240px)}
.doc-view-header{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.doc-view-header h3{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
.doc-view-header h3 svg{width:16px;height:16px;color:var(--blue)}
.doc-view-body{flex:1;overflow-y:auto;padding:24px;position:relative}
.doc-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center}
.doc-placeholder svg{width:48px;height:48px;margin-bottom:14px;opacity:.3}
.doc-placeholder p{font-size:14px;line-height:1.7}
.doc-content{font-size:14px;line-height:1.9;color:var(--text)}
.doc-content h1,.doc-content h2,.doc-content h3{margin:18px 0 10px;font-weight:700}
.doc-content h1{font-size:22px}
.doc-content h2{font-size:18px}
.doc-content h3{font-size:15px}
.doc-content p{margin-bottom:10px}
.doc-content code{background:var(--bg2);padding:2px 6px;border-radius:4px;font-size:13px;font-family:"SF Mono",Monaco,monospace}
.doc-content pre{background:var(--bg2);padding:14px;border-radius:10px;overflow-x:auto;margin:12px 0}
.doc-content pre code{background:none;padding:0}
.doc-content blockquote{border-left:3px solid var(--blue);padding-left:14px;color:var(--soft);margin:12px 0}
.doc-content ul,.doc-content ol{padding-left:20px;margin:10px 0}
.doc-content li{margin-bottom:4px}
.doc-content table{border-collapse:collapse;width:100%;margin:12px 0}
.doc-content th,.doc-content td{border:1px solid var(--bd);padding:8px 12px;text-align:left;font-size:13px}
.doc-content th{background:var(--bg2);font-weight:600}
.doc-content hr{border:none;border-top:1px solid var(--bd);margin:16px 0}

/* SELECTION BUBBLE */
#selBubble{display:none;position:absolute;z-index:200;background:#fff;border:1.5px solid rgba(79,70,229,.3);border-radius:12px;padding:12px 14px;box-shadow:0 8px 30px rgba(0,0,0,.12);width:260px;transition:opacity .15s}
#selText{font-size:11px;color:var(--soft);margin-bottom:8px;line-height:1.5;word-break:break-all}
#askSelBtn{width:100%;padding:7px;border-radius:8px;background:linear-gradient(135deg,var(--blue),#6366f1);color:#fff;font-size:12px;font-weight:700;border:none;cursor:pointer;margin-bottom:8px;transition:opacity .15s}
#askSelBtn:hover{opacity:.85}
#askSelBtn:disabled{opacity:.5;cursor:not-allowed}
#bubbleAnswer{font-size:12px;line-height:1.7;color:var(--text)}
#bubbleAnswer .md-mini p{margin-bottom:4px}
.think-mini{text-align:center;color:var(--muted);font-size:11px;padding:8px}
.think-mini::before{content:'';display:inline-block;width:14px;height:14px;border:2px solid var(--blue-border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}

/* RIGHT COLUMN */
.col-right{width:320px;flex-shrink:0;position:sticky;top:76px;align-self:flex-start;max-height:calc(100vh - 96px);display:flex;flex-direction:column;background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.chat-header{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.chat-header svg{width:18px;height:18px;color:var(--blue)}
.chat-header h3{font-size:14px;font-weight:700}
.chat-header .clear-chat{margin-left:auto;width:24px;height:24px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.chat-header .clear-chat:hover{background:var(--bg2);color:var(--text)}
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;min-height:200px}
.msg{max-width:88%;display:flex;flex-direction:column}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.ai{align-self:flex-start;align-items:flex-start}
.msg-bubble{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.7;word-break:break-word}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--blue),#6366f1);color:#fff;border-bottom-right-radius:4px}
.msg.ai .msg-bubble{background:var(--bg2);color:var(--text);border-bottom-left-radius:4px}
.msg.ai .msg-bubble p{margin-bottom:6px}
.msg.ai .msg-bubble p:last-child{margin-bottom:0}
.msg.ai .msg-bubble code{background:rgba(0,0,0,.06);padding:1px 5px;border-radius:3px;font-size:12px}
.msg.ai .msg-bubble pre{background:rgba(0,0,0,.06);padding:10px;border-radius:8px;overflow-x:auto;margin:6px 0}
.msg.ai .msg-bubble pre code{background:none;padding:0}
.msg-time{font-size:10px;color:var(--muted);margin-top:3px;padding:0 4px}
.chat-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;text-align:center;line-height:1.7;padding:20px}
.chat-input-area{padding:12px;border-top:1px solid var(--bd);display:flex;gap:8px;align-items:flex-end}
.chat-input-area textarea{flex:1;padding:10px 12px;border:1.5px solid var(--bd);border-radius:12px;font-size:13px;resize:none;outline:none;font-family:var(--font);max-height:100px;line-height:1.5;transition:border .15s}
.chat-input-area textarea:focus{border-color:var(--blue-border)}
.chat-send{width:36px;height:36px;border-radius:10px;border:none;background:var(--blue);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.chat-send:hover{opacity:.85}
.chat-send:disabled{opacity:.4;cursor:not-allowed}
.chat-send svg{width:16px;height:16px}

/* URL Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);z-index:300;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:var(--r);padding:28px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-box h3{font-size:16px;font-weight:700;margin-bottom:6px}
.modal-box p{font-size:13px;color:var(--soft);line-height:1.6;margin-bottom:16px}
.modal-box textarea{width:100%;height:180px;padding:12px;border:1.5px solid var(--bd);border-radius:10px;font-size:13px;resize:vertical;outline:none;font-family:var(--font);line-height:1.7}
.modal-box textarea:focus{border-color:var(--blue-border)}
.modal-actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
.modal-actions button{padding:9px 20px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .12s}
.modal-actions .btn-cancel{background:var(--bg2);color:var(--soft)}
.modal-actions .btn-cancel:hover{background:#e5e7eb}
.modal-actions .btn-ok{background:var(--blue);color:#fff}
.modal-actions .btn-ok:disabled{opacity:.4;cursor:not-allowed}
.modal-actions .btn-ok:hover:not(:disabled){opacity:.85}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.2)}

/* Responsive */
@media(max-width:1100px){
  .col-left{width:240px}
  .col-right{width:280px}
}
@media(max-width:900px){
  .main{flex-direction:column}
  .col-left,.col-right{width:100%;position:static;max-height:none}
  .col-left{order:1}
  .col-center{order:2;min-height:300px}
  .col-right{order:3;max-height:500px}
}
</style>
</head>

<!-- NAV -->
<nav class="nav">
  <a class="nav-back" href="../index.html">

  </a>
  <span class="nav-tag">

    知识库
  </span>
</nav>

<!-- HERO -->
<section class="hero">
  <h1><span>AI 知识库问答</span></h1>
  <p>上传文档，划词提问，让 AI 成为你的知识助手</p>

<!-- MAIN -->
<div class="main">

  <!-- LEFT: Knowledge Base -->

    <div class="col-header">

          上传文件 (PDF/TXT/MD)
        </label>
        <input type="file" id="fileInput" accept=".pdf,.txt,.md" multiple style="display:none">

          <input type="text" id="urlInput" placeholder="网页 URL（手动粘贴内容）">
          <button id="urlBtn">添加</button>

      </div>
    </div>

      <div class="doc-empty" id="docEmpty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        <p>暂无文档<br>上传文件或粘贴文本开始使用</p>
      </div>
    </div>
    <div class="paste-area">
      <textarea id="pasteInput" placeholder="粘贴文本内容..."></textarea>
      <button class="paste-submit" id="pasteBtn" disabled>添加到知识库</button>
    </div>
  </aside>

  <!-- CENTER: Document Reader -->
  <section class="col-center">
    <div class="doc-view-header">
      <h3 id="docViewTitle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        文档阅读区
      </h3>
    </div>
    <div class="doc-view-body" id="docViewBody">
      <div class="doc-placeholder" id="docPlaceholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <p>从左侧选择一篇文档<br>开始阅读并划词提问</p>
      </div>
      <div class="doc-content" id="docContent" style="display:none"></div>
      <!-- Selection Bubble -->
      <div id="selBubble">
        <div id="selText"></div>
        <button id="askSelBtn">
          <svg style="width:12px;height:12px;vertical-align:middle;margin-right:3px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          问 AI
        </button>
        <div id="bubbleAnswer"></div>
      </div>
    </div>
  </section>

  <!-- RIGHT: AI Chat -->
  <aside class="col-right">
    <div class="chat-header">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <h3>AI 助手</h3>
      <button class="clear-chat" id="clearChat" title="清空对话">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      </button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-empty" id="chatEmpty">
        <p>对知识库内容提问<br>AI 将基于已有文档为你解答</p>
      </div>
    </div>
    <div class="chat-input-area">
      <textarea id="chatInput" rows="1" placeholder="输入你的问题..."></textarea>
      <button class="chat-send" id="chatSend">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </aside>

</div>

<!-- URL Modal -->
<div class="modal-overlay" id="urlModal">
  <div class="modal-box">
    <h3>粘贴网页内容</h3>
    <p>由于浏览器安全限制，无法直接抓取网页内容。请打开目标网页，复制全部内容后粘贴到下方：</p>
    <textarea id="modalTextarea" placeholder="在此粘贴网页内容..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">取消</button>
      <button class="btn-ok" id="modalOk">添加到知识库</button>
    </div>
  </div>
</div>

var docViewTitleEl = document.getElementById('docViewTitle');
var docViewBodyEl = document.getElementById('docViewBody');
var docPlaceholderEl = document.getElementById('docPlaceholder');
var docContentEl = document.getElementById('docContent');
var selBubbleEl = document.getElementById('selBubble');
var selTextEl = document.getElementById('selText');
var askSelBtnEl = document.getElementById('askSelBtn');
var bubbleAnswerEl = document.getElementById('bubbleAnswer');
var chatMessagesEl = document.getElementById('chatMessages');
var chatEmptyEl = document.getElementById('chatEmpty');
var chatInputEl = document.getElementById('chatInput');
var chatSendEl = document.getElementById('chatSend');
var clearChatEl = document.getElementById('clearChat');
var urlModalEl = document.getElementById('urlModal');
var modalTextareaEl = document.getElementById('modalTextarea');
var modalCancelEl = document.getElementById('modalCancel');
var modalOkEl = document.getElementById('modalOk');

// === Marked config ===
if (typeof marked !== 'undefined') {
  marked.setOptions({ breaks: true, gfm: true });
}

// === Utility ===
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function timeStr() {
  var d = new Date();
  return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}

function getKbContext() {
  var all = '';
  for (var i = 0; i < KB_DOCS.length; i++) {
    all += '【文档: ' + KB_DOCS[i].name + '】\n' + KB_DOCS[i].content + '\n\n';
  }
  if (all.length > MAX_KB_CHARS) {
    all = all.slice(0, MAX_KB_CHARS) + '\n...（内容已截断）';
  }
  return all;
}

// === Render doc list ===
function renderDocList() {
  var items = docListEl.querySelectorAll('.doc-item');
  for (var i = 0; i < items.length; i++) items[i].remove();
  docEmptyEl.style.display = KB_DOCS.length === 0 ? 'flex' : 'none';
  for (var i = 0; i < KB_DOCS.length; i++) {
    var doc = KB_DOCS[i];
    var el = document.createElement('div');
    el.className = 'doc-item' + (doc.id === activeDocId ? ' active' : '');
    var iconClass = doc.type === 'pdf' ? 'pdf' : (doc.type === 'md' ? 'md' : (doc.type === 'url' ? 'paste' : 'txt'));
    el.innerHTML = '<div class="doc-icon ' + iconClass + '">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
      (doc.type === 'pdf' ? '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><text x="8" y="17" font-size="7" fill="currentColor" stroke="none" font-weight="700">PDF</text>' :
      '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>') +
      '</svg></div>' +
      '<div class="doc-info"><div class="doc-name">' + escapeHtml(doc.name) + '</div><div class="doc-meta">' + formatSize(doc.size) + ' · ' + doc.type.toUpperCase() + '</div></div>' +
      '<button class="doc-del" data-id="' + doc.id + '" title="删除">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>';
    el.querySelector('.doc-info').addEventListener('click', (function(d) {
      return function() { selectDoc(d.id); };
    })(doc));
    el.querySelector('.doc-del').addEventListener('click', (function(id) {
      return function(e) { e.stopPropagation(); deleteDoc(id); };
    })(doc.id));
    docListEl.appendChild(el);
  }
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}

// === Select doc ===
function selectDoc(id) {
  activeDocId = id;
  var doc = null;
  for (var i = 0; i < KB_DOCS.length; i++) {
    if (KB_DOCS[i].id === id) { doc = KB_DOCS[i]; break; }
  }
  if (!doc) return;
  docPlaceholderEl.style.display = 'none';
  docContentEl.style.display = 'block';
  // Render markdown
  if (typeof marked !== 'undefined') {
    docContentEl.innerHTML = marked.parse(doc.content);
  } else {
    docContentEl.innerHTML = '<pre style="white-space:pre-wrap;word-break:break-all">' + escapeHtml(doc.content) + '</pre>';
  }
  docViewTitleEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> ' + escapeHtml(doc.name);
  renderDocList();
}

// === Delete doc ===
function deleteDoc(id) {
  KB_DOCS = KB_DOCS.filter(function(d) { return d.id !== id; });
  if (activeDocId === id) {
    activeDocId = null;
    docPlaceholderEl.style.display = 'flex';
    docContentEl.style.display = 'none';
    docContentEl.innerHTML = '';
    docViewTitleEl.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> 文档阅读区';
  }
  renderDocList();
}

// === Add doc ===
function addDoc(name, content, type) {
  type = type || (name.endsWith('.md') ? 'md' : (name.endsWith('.pdf') ? 'pdf' : 'txt'));
  var doc = { id: genId(), name: name, content: content, type: type, size: new Blob([content]).size };
  KB_DOCS.push(doc);
  renderDocList();
  selectDoc(doc.id);
}

// === File upload ===
fileInputEl.addEventListener('change', function() {
  var files = fileInputEl.files;
  for (var i = 0; i < files.length; i++) {
    handleFile(files[i]);
  }
  fileInputEl.value = '';
});

function handleFile(file) {
  if (file.name.toLowerCase().endsWith('.pdf')) {
    var reader = new FileReader();
    reader.readAsArrayBuffer(file);
    reader.onload = function(e) {
      extractPdfText(e.target.result, file.name);
    };
    reader.onerror = function() {
      alert('文件读取失败: ' + file.name);
    };
  } else {
    var reader = new FileReader();
    reader.readAsText(file, 'utf-8');
    reader.onload = function(e) {
      addDoc(file.name, e.target.result);
    };
    reader.onerror = function() {
      alert('文件读取失败: ' + file.name);
    };
  }
}

// === PDF text extraction ===
function extractPdfText(arrayBuffer, fileName) {
  if (typeof pdfjsLib === 'undefined') {
    addDoc(fileName, '[PDF.js 未加载，无法解析 PDF 内容。请尝试将 PDF 转为 TXT 后上传。]', 'pdf');
    return;
  }
  pdfjsLib.getDocument({ data: arrayBuffer }).promise.then(function(pdf) {
    var pages = pdf.numPages;
    var fullText = '';
    var promises = [];
    for (var i = 1; i <= pages; i++) {
      (function(pn) {
        promises.push(pdf.getPage(pn).then(function(page) {
          return page.getTextContent().then(function(tc) {
            var lines = tc.items.map(function(item) { return item.str; });
            return lines.join(' ');
          });
        }));
      })(i);
    }
    Promise.all(promises).then(function(results) {
      var text = results.join('\n\n');
      if (!text.trim()) {
        text = '[PDF 文本提取为空，可能是扫描版 PDF]';
      }
      addDoc(fileName, text, 'pdf');
    }).catch(function(err) {
      addDoc(fileName, '[PDF 解析出错: ' + err.message + ']', 'pdf');
    });
  }).catch(function(err) {
    addDoc(fileName, '[PDF 打开失败: ' + err.message + ']', 'pdf');
  });
}

// === URL button ===
urlBtnEl.addEventListener('click', function() {
  var val = urlInputEl.value.trim();
  if (!val) return;
  urlModalEl.classList.add('show');
  modalTextareaEl.focus();
  modalTextareaEl.placeholder = '请粘贴来自 ' + val + ' 的网页内容...';
  modalOkEl.dataset.url = val;
  urlInputEl.value = '';
});

urlInputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') urlBtnEl.click();
});

modalCancelEl.addEventListener('click', function() {
  urlModalEl.classList.remove('show');
  modalTextareaEl.value = '';
});

modalOkEl.addEventListener('click', function() {
  var text = modalTextareaEl.value.trim();
  if (!text) return;
  var url = modalOkEl.dataset.url || '网页';
  addDoc(url, text, 'url');
  urlModalEl.classList.remove('show');
  modalTextareaEl.value = '';
});

urlModalEl.addEventListener('click', function(e) {
  if (e.target === urlModalEl) {
    urlModalEl.classList.remove('show');
    modalTextareaEl.value = '';
  }
});

// === Paste input ===
pasteInputEl.addEventListener('input', function() {
  pasteBtnEl.disabled = !pasteInputEl.value.trim();
});

pasteBtnEl.addEventListener('click', function() {
  var text = pasteInputEl.value.trim();
  if (!text) return;
  var now = new Date();
  var name = '粘贴内容 ' + now.getFullYear() + '/' + (now.getMonth() + 1) + '/' + now.getDate() + ' ' + now.getHours() + ':' + now.getMinutes().toString().padStart(2, '0');
  addDoc(name, text, 'paste');
  pasteInputEl.value = '';
  pasteBtnEl.disabled = true;
});

// === Text selection bubble ===
var currentSelectionText = '';

docContentEl.addEventListener('mouseup', function() {
  setTimeout(function() {
    var sel = window.getSelection();
    var txt = sel.toString().trim();
    if (txt.length < 2) { hideBubble(); return; }
    var range = sel.getRangeAt(0);
    var rect = range.getBoundingClientRect();
    if (rect.width === 0 && rect.height === 0) { hideBubble(); return; }
    currentSelectionText = txt;
    showBubble(txt, rect);
  }, 10);
});

docContentEl.addEventListener('mousedown', function() {
  hideBubble();
});

document.addEventListener('mousedown', function(e) {
  if (selBubbleEl.style.display === 'block' && !selBubbleEl.contains(e.target)) {
    hideBubble();
  }
});

function showBubble(selectedText, rect) {
  selBubbleEl.style.display = 'block';
  var top = rect.top + window.scrollY - 56;
  var left = rect.left + rect.width / 2 - 120;
  // Keep bubble within viewport
  if (left < 10) left = 10;
  if (left + 260 > window.innerWidth) left = window.innerWidth - 270;
  if (top < 60) top = rect.bottom + window.scrollY + 10;
  selBubbleEl.style.top = top + 'px';
  selBubbleEl.style.left = left + 'px';
  selTextEl.textContent = '"' + selectedText.slice(0, 40) + (selectedText.length > 40 ? '...' : '"');
  bubbleAnswerEl.innerHTML = '';
  askSelBtnEl.disabled = false;
  askSelBtnEl.innerHTML = '<svg style="width:12px;height:12px;vertical-align:middle;margin-right:3px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> 问 AI';
}

function hideBubble() {
  selBubbleEl.style.display = 'none';
  currentSelectionText = '';
}

askSelBtnEl.addEventListener('click', function() {
  if (currentSelectionText) {
    askSelBtnEl.disabled = true;
    askSelBtnEl.innerHTML = '思考中...';
    bubbleAnswerEl.innerHTML = '<div class="think-mini">思考中</div>';
    askAboutSelection(currentSelectionText);
  }
});

async function askAboutSelection(selectedText) {
  var kbCtx = getKbContext();
  if (!kbCtx.trim()) {
    bubbleAnswerEl.innerHTML = '<div style="color:#ef4444;font-size:11px">知识库为空，请先添加文档</div>';
    askSelBtnEl.disabled = false;
    askSelBtnEl.innerHTML = '问 AI';
    return;
  }
  var prompt = '请基于以下知识库内容，解释或回答关于这段文字的问题：\n\n【知识库内容摘要】\n' + kbCtx + '\n\n【用户选中的文字】\n' + selectedText + '\n\n请给出简洁清晰的解释（2-4句话）。';
  try {
    var ans = await callAI(prompt, 800);
    if (typeof marked !== 'undefined') {
      bubbleAnswerEl.innerHTML = '<div class="md-mini">' + marked.parse(ans) + '</div>';
    } else {
      bubbleAnswerEl.innerHTML = '<div class="md-mini">' + escapeHtml(ans).replace(/\n/g, '<br>') + '</div>';
    }
  } catch (e) {
    bubbleAnswerEl.innerHTML = '<div style="color:#ef4444;font-size:11px">' + escapeHtml(e.message) + '</div>';
  }
  askSelBtnEl.disabled = false;
  askSelBtnEl.innerHTML = '<svg style="width:12px;height:12px;vertical-align:middle;margin-right:3px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg> 再问一次';
}

// === AI call ===
async function callAI(prompt, maxTok) {
  maxTok = maxTok || 2000;

  // Try Zhipu first
  try {
    var res = await fetch(ZHIPU_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ZHIPU_KEY },
      body: JSON.stringify({ model: 'glm-4-flash', messages: [{ role: 'user', content: prompt }], max_tokens: maxTok })
    });
    if (res.ok) {
      var data = await res.json();
      if (data.choices && data.choices[0] && data.choices[0].message) {
        return data.choices[0].message.content;
      }
    }
  } catch (e) {
    // fall through
  }

  // Try DeepSeek
  try {
    var res2 = await fetch(DS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DS_KEY },
      body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'user', content: prompt }], max_tokens: maxTok })
    });
    if (res2.ok) {
      var data2 = await res2.json();
      if (data2.choices && data2.choices[0] && data2.choices[0].message) {
        return data2.choices[0].message.content;
      }
    }
  } catch (e) {
    // fall through
  }

  // Try Gemini
  try {
    var res3 = await fetch(GM_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: maxTok } })
    });
    if (res3.ok) {
      var data3 = await res3.json();
      if (data3.candidates && data3.candidates[0] && data3.candidates[0].content && data3.candidates[0].content.parts) {
        return data3.candidates[0].content.parts[0].text;
      }
    }
  } catch (e) {
    // fall through
  }

  throw new Error('所有 AI 服务均不可用，请稍后重试');
}

// === Chat ===
function addChatMsg(role, text) {
  chatEmptyEl.style.display = 'none';
  var msgEl = document.createElement('div');
  msgEl.className = 'msg ' + role;
  var bubbleEl = document.createElement('div');
  bubbleEl.className = 'msg-bubble';
  if (role === 'ai' && typeof marked !== 'undefined') {
    bubbleEl.innerHTML = marked.parse(text);
  } else if (role === 'ai') {
    bubbleEl.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
  } else {
    bubbleEl.textContent = text;
  }
  var timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = timeStr();
  msgEl.appendChild(bubbleEl);
  msgEl.appendChild(timeEl);
  chatMessagesEl.appendChild(msgEl);
  chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
}

function addChatLoading() {
  chatEmptyEl.style.display = 'none';
  var msgEl = document.createElement('div');
  msgEl.className = 'msg ai';
  msgEl.id = 'loadingMsg';
  var bubbleEl = document.createElement('div');
  bubbleEl.className = 'msg-bubble';
  bubbleEl.innerHTML = '<div class="think-mini">思考中</div>';
  msgEl.appendChild(bubbleEl);
  chatMessagesEl.appendChild(msgEl);
  chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
}

function removeChatLoading() {
  var el = document.getElementById('loadingMsg');
  if (el) el.remove();
}

async function handleChatSend() {
  var question = chatInputEl.value.trim();
  if (!question || isGenerating) return;
  isGenerating = true;
  chatSendEl.disabled = true;
  chatInputEl.value = '';
  autoResizeTextarea();

  addChatMsg('user', question);
  chatHistory.push({ role: 'user', content: question });
  addChatLoading();

  var kbCtx = getKbContext();
  var systemPrompt = '你是一个基于知识库的 AI 助手。请基于以下知识库内容来回答用户的问题。如果知识库中没有相关信息，请明确告知用户。\n\n【知识库内容】\n' + kbCtx + '\n\n请用简洁清晰的中文回答。';

  var messages = [{ role: 'system', content: systemPrompt }];
  // Include recent chat history (last 10 messages)
  var recentHistory = chatHistory.slice(-10);
  for (var i = 0; i < recentHistory.length; i++) {
    messages.push(recentHistory[i]);
  }

  try {
    var answer = await callAIWithHistory(messages, 2000);
    removeChatLoading();
    addChatMsg('ai', answer);
    chatHistory.push({ role: 'assistant', content: answer });
  } catch (e) {
    removeChatLoading();
    addChatMsg('ai', '抱歉，AI 服务暂时不可用：' + e.message);
  }

  isGenerating = false;
  chatSendEl.disabled = false;
  chatInputEl.focus();
}

async function callAIWithHistory(messages, maxTok) {
  maxTok = maxTok || 2000;

  // Try Zhipu
  try {
    var res = await fetch(ZHIPU_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ZHIPU_KEY },
      body: JSON.stringify({ model: 'glm-4-flash', messages: messages, max_tokens: maxTok })
    });
    if (res.ok) {
      var data = await res.json();
      if (data.choices && data.choices[0] && data.choices[0].message) {
        return data.choices[0].message.content;
      }
    }
  } catch (e) {}

  // Try DeepSeek
  try {
    var res2 = await fetch(DS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + DS_KEY },
      body: JSON.stringify({ model: 'deepseek-chat', messages: messages, max_tokens: maxTok })
    });
    if (res2.ok) {
      var data2 = await res2.json();
      if (data2.choices && data2.choices[0] && data2.choices[0].message) {
        return data2.choices[0].message.content;
      }
    }
  } catch (e) {}

  // Try Gemini (convert messages to Gemini format)
  try {
    var contents = [];
    for (var i = 0; i < messages.length; i++) {
      var m = messages[i];
      if (m.role === 'system') {
        // Gemini doesn't have system role in v1beta, prepend to first user message or use separate
        continue;
      }
      contents.push({ parts: [{ text: m.content }] });
    }
    // Add system prompt as first content if exists
    var sysMsg = messages.find(function(m) { return m.role === 'system'; });
    if (sysMsg) {
      contents.unshift({ parts: [{ text: sysMsg.content }] });
    }
    var res3 = await fetch(GM_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: contents, generationConfig: { maxOutputTokens: maxTok } })
    });
    if (res3.ok) {
      var data3 = await res3.json();
      if (data3.candidates && data3.candidates[0] && data3.candidates[0].content && data3.candidates[0].content.parts) {
        return data3.candidates[0].content.parts[0].text;
      }
    }
  } catch (e) {}

  throw new Error('所有 AI 服务均不可用，请稍后重试');
}

chatSendEl.addEventListener('click', handleChatSend);

chatInputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleChatSend();
  }
});

chatInputEl.addEventListener('input', autoResizeTextarea);

function autoResizeTextarea() {
  chatInputEl.style.height = 'auto';
  chatInputEl.style.height = Math.min(chatInputEl.scrollHeight, 100) + 'px';
}

clearChatEl.addEventListener('click', function() {
  chatHistory = [];
  var msgs = chatMessagesEl.querySelectorAll('.msg');
  for (var i = 0; i < msgs.length; i++) msgs[i].remove();
  chatEmptyEl.style.display = 'flex';
});

// === Init ===
renderDocList();
</script>
