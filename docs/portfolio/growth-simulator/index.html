<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>增长实验模拟器 · AI × 08</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--bg2:#f5f5f7;--blue:#0066cc;--bs:rgba(0,102,204,.08);--bb:rgba(0,102,204,.18);
  --text:#1d1d1f;--soft:#6e6e73;--muted:#aeaeb2;
  --bd:rgba(0,0,0,.07);--sh:0 2px 16px rgba(0,0,0,.06);--sh2:0 8px 32px rgba(0,0,0,.1);
  --r:18px;--pill:999px;--font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
}
body{font-family:var(--font);color:var(--text);background:var(--bg2);-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center}
.nw{max-width:1280px;margin:0 auto;padding:0 32px;width:100%;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:16px;font-weight:800;letter-spacing:-.03em;color:var(--text)}
.logo em{color:var(--blue);font-style:normal}
.back{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--soft);transition:color .2s}
.back:hover{color:var(--blue)}
.back svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2}
.hero{max-width:1280px;margin:0 auto;padding:72px 32px 24px;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
.hero-left{}
.htag{display:inline-flex;align-items:center;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--blue);background:var(--bs);padding:4px 12px;border-radius:var(--pill);margin-bottom:12px;border:1px solid var(--bb)}
.hero h1{font-size:clamp(24px,3vw,36px);font-weight:800;letter-spacing:-.04em;margin-bottom:6px}
.hero p{font-size:14px;color:var(--soft)}

/* INTENT BAR */
.intent-bar{max-width:1280px;margin:0 auto;padding:0 32px 20px}
.intent-box{background:#fff;border:1.5px solid var(--bb);border-radius:14px;padding:14px 18px;position:relative}
.intent-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.intent-label svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2}
.intent-chips{display:flex;gap:8px;flex-wrap:wrap}
.intent-chip{padding:5px 13px;border-radius:var(--pill);border:1.5px solid var(--bd);background:#fff;color:var(--soft);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:var(--font)}
.intent-chip:hover{border-color:var(--bb);color:var(--blue);background:var(--bs)}
.intent-chip.active{background:var(--blue);border-color:var(--blue);color:#fff}
.intent-tip{font-size:11px;color:var(--muted);margin-top:8px}

.ws{max-width:1280px;margin:0 auto;padding:0 32px 80px;display:grid;grid-template-columns:400px 1fr;gap:20px;align-items:start}
.panel{background:#fff;border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh);overflow:hidden}
.inp-p{position:sticky;top:68px}
.ph{padding:15px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.ph-icon{width:30px;height:30px;border-radius:9px;background:var(--bs);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ph-icon svg{width:14px;height:14px;fill:none;stroke:var(--blue);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ph-t{font-size:14px;font-weight:700}
.ph-s{font-size:12px;color:var(--soft)}
.pb{padding:20px}
.f{margin-bottom:14px}
.f label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.fn{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px}
.f input,.f textarea{width:100%;padding:9px 13px;border:1.5px solid var(--bd);border-radius:11px;font-size:14px;font-family:var(--font);background:var(--bg2);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.f input:focus,.f textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--bs);background:#fff}
.f textarea{resize:vertical;min-height:78px;line-height:1.55}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;border-radius:var(--pill);border:1.5px solid var(--bd);background:#fff;color:var(--soft);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:var(--font)}
.chip:hover{border-color:var(--bb);color:var(--blue)}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
.gbtn{width:100%;margin-top:6px;padding:13px;border-radius:var(--pill);background:var(--blue);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(0,102,204,.25);transition:all .2s}
.gbtn:hover:not(:disabled){background:#0055aa;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,102,204,.35)}
.gbtn:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.gbtn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.out-p{min-height:500px;display:flex;flex-direction:column}
.ob{flex:1;padding:22px;overflow-y:auto}
.sk{display:flex;flex-direction:column;gap:11px;opacity:.45}
.sk-t{height:16px;border-radius:5px;background:linear-gradient(90deg,#e8e8ed 25%,#f5f5f7 50%,#e8e8ed 75%);background-size:200% 100%;animation:sh 1.5s infinite}
.sk-l{height:11px;border-radius:5px;background:linear-gradient(90deg,#e8e8ed 25%,#f5f5f7 50%,#e8e8ed 75%);background-size:200% 100%;animation:sh 1.5s infinite}
.sk-b{height:72px;border-radius:9px;background:linear-gradient(90deg,#e8e8ed 25%,#f5f5f7 50%,#e8e8ed 75%);background-size:200% 100%;animation:sh 1.5s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-s{margin-bottom:18px}
.thinking{display:flex;align-items:center;gap:10px;padding:40px 0;color:var(--soft);font-size:14px}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--blue);animation:bo 1.4s infinite ease-in-out;margin-right:4px}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bo{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}
.md{font-size:14px;line-height:1.8;color:var(--text)}
.md h1{font-size:19px;font-weight:800;margin:0 0 14px;padding-bottom:10px;border-bottom:1px solid var(--bd);letter-spacing:-.02em}
.md h2{font-size:15px;font-weight:700;margin:18px 0 7px}
.md h3{font-size:14px;font-weight:700;margin:14px 0 5px}
.md p{margin-bottom:10px}
.md ul,.md ol{margin:7px 0 10px 16px}
.md li{margin-bottom:4px}
.md strong{font-weight:700}
.md blockquote{border-left:3px solid var(--blue);padding:9px 13px;margin:12px 0;background:var(--bs);border-radius:0 9px 9px 0;color:var(--soft);font-size:13px}
.md table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
.md th,.md td{padding:7px 11px;border:1px solid var(--bd);text-align:left;vertical-align:top}
.md th{background:var(--bg2);font-weight:600}
.cursor2{display:inline-block;width:2px;height:14px;background:var(--blue);margin-left:1px;vertical-align:middle;animation:bk .6s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:0}}
.ebar{padding:12px 20px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.ebtn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--pill);border:1.5px solid var(--bd);background:#fff;color:var(--soft);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s}
.ebtn:hover{border-color:var(--bb);color:var(--blue)}
.ebtn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}
.ai-badge{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.ai-badge svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2}
@media(max-width:900px){.ws{grid-template-columns:1fr}.inp-p{position:static}}
@media(max-width:600px){.ws{padding:0 16px 60px}.hero{padding:70px 16px 16px}.intent-bar{padding:0 16px 16px}}
</style>
</head>
<body>
<nav>
  <div class="nw">
    <div class="logo">AI <em>×</em> 08</div>
    <a class="back" href="/08/portfolio/">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>返回
    </a>
  </div>
</nav>

<div class="hero">
  <div class="hero-left">
    <div class="htag">增长产品</div>
    <h1>增长实验模拟器</h1>
    <p>描述你的增长瓶颈，AI 给出 A/B 实验方案与预期收益。</p>
  </div>
</div>

<!-- 意图联想栏 -->
<div class="intent-bar">
  <div class="intent-box">
    <div class="intent-label">
      <svg viewBox="0 0 24 24"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
      你可能想解决
    </div>
    <div class="intent-chips" id="intentChips">
      <span class="intent-chip" onclick="fillIntent('注册流程流失率高，用户在第2步大量流失')">注册转化低</span>
      <span class="intent-chip" onclick="fillIntent('次日留存只有20%，用户激活后第二天就不回来')">次日留存差</span>
      <span class="intent-chip" onclick="fillIntent('免费用户付费转化率不足3%，付费意愿低')">付费转化难</span>
      <span class="intent-chip" onclick="fillIntent('UGC 内容质量差，核心用户贡献内容少')">UGC 内容少</span>
      <span class="intent-chip" onclick="fillIntent('搜索功能使用率低，用户找不到想要的内容')">搜索用不起来</span>
      <span class="intent-chip" onclick="fillIntent('推送通知打开率持续下降，用户已习以为常')">推送失效</span>
    </div>
    <div class="intent-tip">点击快速填入 · 或在下方直接描述</div>
  </div>
</div>

<div class="ws">
  <div class="panel inp-p">
    <div class="ph">
      <div class="ph-icon"><svg viewBox="0 0 24 24"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></div>
      <div><div class="ph-t">描述增长瓶颈</div><div class="ph-s">越具体，方案越精准</div></div>
    </div>
    <div class="pb">
      <div class="f"><label>产品名称</label><input id="pname" placeholder="例如：AI 旅行规划 App" oninput="autoSuggest()"></div>
      <div class="f"><label>当前瓶颈 / 问题</label><textarea id="prob" placeholder="例如：注册流程第 2 步流失率高达 65%，用户在填写手机号时大量流失" oninput="autoSuggest()"></textarea></div>
      <div class="f">
        <label>目标指标 <span class="fn">单选</span></label>
        <div class="chips" id="mchips">
          <button class="chip on" data-v="注册转化率">注册转化率</button>
          <button class="chip" data-v="次日留存">次日留存</button>
          <button class="chip" data-v="7日留存">7日留存</button>
          <button class="chip" data-v="付费转化">付费转化</button>
          <button class="chip" data-v="DAU">DAU</button>
          <button class="chip" data-v="ARPU">ARPU</button>
        </div>
      </div>
      <div class="f"><label>当前数据 <span class="fn">选填</span></label><input id="data" placeholder="例如：注册转化 12%，DAU 5000，次日留存 28%"></div>
      <button class="gbtn" id="gbtn" onclick="generate()">
        <svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        生成实验方案
      </button>
    </div>
  </div>

  <div class="panel out-p">
    <div class="ph">
      <div class="ph-icon" style="background:rgba(52,199,89,.1)"><svg viewBox="0 0 24 24" style="stroke:#34c759"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></div>
      <div><div class="ph-t">A/B 实验方案</div><div class="ph-s" id="osub">填写左侧信息后生成</div></div>
    </div>
    <div class="ob" id="ob">
      <div class="sk">
        <div class="sk-s"><div class="sk-t" style="width:42%"></div><div class="sk-b" style="margin-top:8px"></div></div>
        <div class="sk-s"><div class="sk-t" style="width:35%"></div><div class="sk-b" style="margin-top:8px"></div></div>
        <div class="sk-s"><div class="sk-t" style="width:48%"></div><div class="sk-b" style="margin-top:8px"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// AI 瀑布降级
const PROVIDERS=[
  {name:'智谱',url:'https://open.bigmodel.cn/api/paas/v4/chat/completions',key:'3617e7083fb349e6bcf8dff86e65e967.Ab9BRVWqjsHf9a8P',model:'glm-4-flash',type:'openai'},
  {name:'DeepSeek',url:'https://api.deepseek.com/chat/completions',key:'sk-4f016c9639cb461db37f4f778d2eac4f',model:'deepseek-chat',type:'openai'},
  {name:'Gemini',url:'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent',key:['AQ.Ab8RN6Kwvan','PacRzJIFXe6Yi1Kx35q046','jXDWC8LF0dV3tKJiA'].join(''),type:'gemini'},
];

async function callAI(prompt){
  for(const p of PROVIDERS){
    try{
      let res,text='';
      if(p.type==='openai'){
        res=await fetch(p.url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+p.key},body:JSON.stringify({model:p.model,messages:[{role:'user',content:prompt}],max_tokens:8000,temperature:0.7}),signal:AbortSignal.timeout(20000)});
        if(!res.ok){const e=await res.json();console.warn(p.name,e);continue;}
        const d=await res.json();text=d.choices?.[0]?.message?.content||'';
      } else {
        res=await fetch(p.url+'?key='+p.key,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:8000,temperature:0.7}}),signal:AbortSignal.timeout(20000)});
        if(!res.ok){continue;}
        const d=await res.json();text=d.candidates?.[0]?.content?.parts?.[0]?.text||'';
      }
      if(text){console.log('✓ used',p.name);return text;}
    }catch(e){console.warn(p.name,'failed:',e.message);continue;}
  }
  throw new Error('所有 AI 服务均不可用');
}

let metric='注册转化率';
document.querySelectorAll('#mchips .chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('#mchips .chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');metric=c.dataset.v;
}));

function fillIntent(text){
  document.getElementById('prob').value=text;
  document.querySelectorAll('.intent-chip').forEach(c=>c.classList.remove('active'));
  event.target.classList.add('active');
}

function autoSuggest(){
  const prob=document.getElementById('prob').value;
  const chips=document.querySelectorAll('.intent-chip');
  chips.forEach(c=>c.classList.remove('active'));
  if(prob.includes('留存')) chips[1]?.classList.add('active');
  else if(prob.includes('注册')||prob.includes('转化')) chips[0]?.classList.add('active');
  else if(prob.includes('付费')) chips[2]?.classList.add('active');
}

async function generate(){
  const name=document.getElementById('pname').value.trim();
  const prob=document.getElementById('prob').value.trim();
  const data=document.getElementById('data').value.trim();
  if(!name){document.getElementById('pname').focus();return;}
  if(!prob){document.getElementById('prob').focus();return;}
  const btn=document.getElementById('gbtn');
  const ob=document.getElementById('ob');
  const sub=document.getElementById('osub');
  btn.disabled=true;
  sub.textContent='正在生成…';
  ob.innerHTML='<div class="thinking"><div class="dots"><span></span><span></span><span></span></div><span>AI 正在分析瓶颈并设计实验方案…</span></div>';

  const prompt=`你是资深增长产品经理，擅长设计科学 A/B 实验。为以下产品设计增长实验方案：

产品：${name}
瓶颈：${prob}
目标指标：${metric}${data?'\n当前数据：'+data:''}

请给出 3-4 个具体 A/B 实验方案，Markdown 格式：

# 增长实验方案：${name}

## 核心问题诊断
（2-3 句分析瓶颈根因）

---

## 实验方案一：[实验名称]

**核心假设**：如果我们 [改动]，那么 [${metric}] 将 [提升X%]，因为 [原因]。

| 维度 | 详情 |
|------|------|
| 实验变量 | |
| 控制组 | |
| 实验组 | |
| 流量分配 | 50% / 50% |
| 实验周期 | X 天 |
| 预期提升 | ${metric} +X% |
| 上线优先级 | 高/中/低 |

**实施要点**：关键注意事项

---
（重复输出所有方案）

## 推荐行动计划
（优先级排序 + 落地步骤）`;

  try{
    const text=await callAI(prompt);
    sub.textContent='方案已生成';
    typeRender(text,ob);
  }catch(e){
    ob.innerHTML='<div style="padding:32px;text-align:center;color:var(--soft);font-size:14px"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#aeaeb2" stroke-width="1.5" style="display:block;margin:0 auto 12px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>生成失败：'+e.message+'</div>';
    sub.textContent='生成失败';
  }
  btn.disabled=false;
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="15" height="15"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>重新生成';
}

function typeRender(text,el){
  window._last=text;let i=0;
  const iv=setInterval(()=>{
    i=Math.min(i+5,text.length);
    el.innerHTML='<div class="md">'+marked.parse(text.slice(0,i))+'</div>'+(i<text.length?'<span class="cursor2"></span>':'');
    if(i>=text.length){
      clearInterval(iv);
      el.innerHTML='<div class="md">'+marked.parse(text)+'</div>';
      el.closest('.panel').insertAdjacentHTML('beforeend',`<div class="ebar"><span class="ai-badge"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>AI 生成</span><button class="ebtn" onclick="exportMd()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>导出 Markdown</button></div>`);
    }
  },18);
}
function exportMd(){
  if(!window._last)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([window._last],{type:'text/markdown'}));
  a.download='增长实验方案.md';a.click();
}
</script>
</body>
</html>
