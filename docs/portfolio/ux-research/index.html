<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>用研报告生成器 · AI Product Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d14;--surface:rgba(255,255,255,.05);--surface2:rgba(255,255,255,.08);--primary:#6C5CE7;--text:#e8e8f0;--text-dim:rgba(232,232,240,.55);--border:rgba(255,255,255,.08);--radius:14px}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:var(--primary);text-decoration:none}
/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(13,13,20,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 40px;display:flex;align-items:center;gap:16px}
.back{color:var(--text-dim);font-size:14px;font-weight:500;display:flex;align-items:center;gap:6px;transition:color .2s}
.back:hover{color:var(--text)}
.page-title{font-size:16px;font-weight:700}
.page-badge{margin-left:auto;padding:4px 12px;border-radius:999px;background:rgba(108,92,231,.15);color:#a29bfe;font-size:11px;font-weight:700;border:1px solid rgba(108,92,231,.25)}
/* LAYOUT */
.layout{display:grid;grid-template-columns:400px 1fr;min-height:calc(100vh - 53px)}
@media(max-width:900px){.layout{grid-template-columns:1fr;grid-template-rows:auto 1fr}}
/* FORM PANEL */
.form-panel{border-right:1px solid var(--border);padding:32px;display:flex;flex-direction:column;gap:24px;overflow-y:auto;max-height:calc(100vh - 53px)}
@media(max-width:900px){.form-panel{max-height:none;border-right:none;border-bottom:1px solid var(--border)}}
.panel-heading{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.panel-sub{font-size:13px;color:var(--text-dim)}
.form-group{display:flex;flex-direction:column;gap:8px}
label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim)}
input,textarea,select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
input:focus,textarea:focus,select:focus{border-color:rgba(108,92,231,.5);box-shadow:0 0 0 3px rgba(108,92,231,.12)}
textarea{resize:vertical;min-height:100px}
select option{background:#1a1a2e}
.depth-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.depth-btn{padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.depth-btn.active{background:rgba(108,92,231,.2);border-color:rgba(108,92,231,.5);color:#a29bfe}
.generate-btn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,#6C5CE7,#8b7ff0);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 8px 24px rgba(108,92,231,.3);margin-top:8px}
.generate-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 32px rgba(108,92,231,.45)}
.generate-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
/* OUTPUT PANEL */
.output-panel{padding:40px;overflow-y:auto;max-height:calc(100vh - 53px)}
@media(max-width:900px){.output-panel{max-height:none}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:400px;gap:16px;text-align:center}
.empty-icon{font-size:56px;opacity:.4}
.empty-title{font-size:20px;font-weight:700;color:var(--text-dim)}
.empty-desc{font-size:14px;color:var(--text-dim);max-width:360px;opacity:.7}
/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:24px}
.spinner{width:40px;height:40px;border:3px solid rgba(108,92,231,.2);border-top-color:#6C5CE7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text-dim);font-size:14px;animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.5}50%{opacity:1}}
/* RESULT */
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.result-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--primary)}
.result-actions{display:flex;gap:10px}
.action-btn{padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.action-btn:hover{background:var(--surface2);border-color:rgba(108,92,231,.3)}
.action-btn.primary{background:rgba(108,92,231,.2);border-color:rgba(108,92,231,.4);color:#a29bfe}
/* MARKDOWN */
.markdown-body{font-size:15px;line-height:1.75;color:var(--text)}
.markdown-body h1{font-size:26px;font-weight:800;margin:0 0 24px;letter-spacing:-.03em;background:linear-gradient(135deg,#fff,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.markdown-body h2{font-size:18px;font-weight:700;margin:32px 0 14px;padding:14px 18px;background:rgba(108,92,231,.08);border-left:3px solid #6C5CE7;border-radius:0 10px 10px 0;letter-spacing:-.01em;color:#a29bfe;-webkit-text-fill-color:#a29bfe}
.markdown-body h3{font-size:15px;font-weight:700;margin:20px 0 10px;color:var(--text)}
.markdown-body p{margin:0 0 14px;color:rgba(232,232,240,.85)}
.markdown-body ul,ol{margin:0 0 14px 20px;color:rgba(232,232,240,.85)}
.markdown-body li{margin-bottom:6px}
.markdown-body strong{color:var(--text);font-weight:700}
.markdown-body code{background:rgba(108,92,231,.12);padding:2px 6px;border-radius:5px;font-size:13px;color:#a29bfe}
.markdown-body hr{border:none;border-top:1px solid var(--border);margin:24px 0}
</style>
</head>
<body>
<div class="topbar">
  <a href="/08/portfolio/" class="back">← 返回首页</a>
  <span style="color:var(--border)">|</span>
  <span class="page-title">📋 用研报告生成器</span>
  <span class="page-badge">Gemini AI</span>
</div>

<div class="layout">
  <div class="form-panel">
    <div>
      <div class="panel-heading">生成用研报告</div>
      <div class="panel-sub">填写产品背景，AI 自动生成结构化用研报告</div>
    </div>

    <div class="form-group">
      <label>产品名称 *</label>
      <input id="productName" type="text" placeholder="如：AI 旅行规划 App"/>
    </div>
    <div class="form-group">
      <label>目标用户群 *</label>
      <input id="targetUser" type="text" placeholder="如：25-35岁都市白领，爱好旅行"/>
    </div>
    <div class="form-group">
      <label>核心研究问题 *</label>
      <textarea id="researchQ" placeholder="如：为什么用户在注册后 7 天内流失？他们真正需要什么功能？"></textarea>
    </div>
    <div class="form-group">
      <label>竞品参考（可选）</label>
      <input id="competitors" type="text" placeholder="如：携程、飞猪、Wanderlog"/>
    </div>
    <div class="form-group">
      <label>报告深度</label>
      <div class="depth-row">
        <button class="depth-btn" data-val="quick">快速洞察</button>
        <button class="depth-btn active" data-val="standard">标准报告</button>
        <button class="depth-btn" data-val="deep">深度分析</button>
      </div>
    </div>
    <button class="generate-btn" id="generateBtn" onclick="generate()">✨ 生成用研报告</button>
  </div>

  <div class="output-panel" id="outputPanel">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📋</div>
      <div class="empty-title">等待生成</div>
      <div class="empty-desc">填写左侧表单，点击「生成用研报告」，AI 将在几秒内输出完整的结构化报告</div>
    </div>
  </div>
</div>

<script>
const GEMINI_KEY = ['AQ.Ab8RN6Kwvan', 'PacRzJIFXe6Yi1Kx35q046', 'jXDWC8LF0dV3tKJiA'].join('');
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;

let depth = 'standard';
document.querySelectorAll('.depth-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.depth-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    depth = btn.dataset.val;
  });
});

async function generate() {
  const name = document.getElementById('productName').value.trim();
  const user = document.getElementById('targetUser').value.trim();
  const question = document.getElementById('researchQ').value.trim();
  const comp = document.getElementById('competitors').value.trim();
  if (!name || !user || !question) { alert('请填写产品名称、目标用户群和研究问题'); return; }

  const depthMap = { quick: '简洁版（每个章节2-3句话，总字数800字以内）', standard: '标准版（每个章节4-6句话，总字数1500字左右）', deep: '深度版（详细展开每个章节，总字数2500字以上，包含更多细节和数据推演）' };

  const prompt = `你是一位资深用户研究专家，请为以下产品生成一份专业的用研报告（${depthMap[depth]}）。

产品名称：${name}
目标用户群：${user}
核心研究问题：${question}
${comp ? `竞品参考：${comp}` : ''}

请严格按照以下 Markdown 格式输出，不要添加额外内容：

# 用研报告：${name}

## 执行摘要
（3句话总结核心发现，突出最重要的洞察）

## 用户画像
（描述主要用户群，包含：人口统计特征、行为习惯、核心诉求、使用场景）

## 核心痛点（Top 5）
（列出5个最重要的用户痛点，每个痛点包含：具体描述、严重程度、典型出现场景）

## 机会点分析
（基于痛点，提炼3-5个产品或运营可落地的机会点，说明为什么是机会）

## 竞品对标
（分析竞品如何解决类似问题，找出差距和超越机会）

## 行动建议
（给出优先级排序的可执行建议清单，分短期/中期/长期）

## 研究局限
（说明本报告的数据基础、假设前提和局限性）`;

  const btn = document.getElementById('generateBtn');
  btn.disabled = true; btn.textContent = '生成中...';
  const panel = document.getElementById('outputPanel');
  panel.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">AI 正在生成报告，请稍候...</div></div>';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.7, maxOutputTokens: 4096 } })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || '请求失败');
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    if (!text) throw new Error('返回内容为空');

    panel.innerHTML = `
      <div class="result-header">
        <span class="result-title">📋 用研报告已生成</span>
        <div class="result-actions">
          <button class="action-btn primary" onclick="copyReport()">复制全文</button>
          <button class="action-btn" onclick="location.reload()">重新生成</button>
        </div>
      </div>
      <div class="markdown-body" id="reportContent">${marked.parse(text)}</div>`;
    window._reportText = text;
  } catch(e) {
    panel.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">生成失败</div><div class="empty-desc">${e.message}<br><br><button class="action-btn" onclick="location.reload()">重试</button></div></div>`;
  } finally {
    btn.disabled = false; btn.textContent = '✨ 生成用研报告';
  }
}

function copyReport() {
  navigator.clipboard.writeText(window._reportText || '').then(() => {
    const btn = event.target;
    btn.textContent = '✅ 已复制';
    setTimeout(() => btn.textContent = '复制全文', 2000);
  });
}
</script>
</body>
</html>
