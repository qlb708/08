<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>用研报告生成器 - 08 AI Tools</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--bg-alt:#f5f5f7;--primary:#0066cc;--primary-h:#0055aa;--text:#1d1d1f;--text2:#86868b;--card-r:20px;--el-r:12px;--btn-r:999px;--shadow:0 2px 16px rgba(0,0,0,.06);--shadow-h:0 8px 32px rgba(0,0,0,.1)}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.06);height:52px;display:flex;align-items:center;justify-content:center}
nav .inner{width:100%;max-width:1200px;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
nav .logo{font-weight:700;font-size:17px;color:var(--text);display:flex;align-items:center;gap:8px}
nav .logo span{color:var(--primary)}
nav .logo .sep{color:#d2d2d7}
nav a.back{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:4px}
nav a.back:hover{color:var(--text)}
.page-hero{padding:32px 0 16px;text-align:center}
.page-hero h1{font-size:28px;font-weight:700}
.page-hero p{font-size:15px;color:var(--text2);margin-top:6px}
.workspace{display:flex;gap:24px;max-width:1200px;margin:0 auto;padding:0 24px 64px;align-items:flex-start}
.panel-left{width:420px;flex-shrink:0;position:sticky;top:76px;max-height:calc(100vh - 100px);overflow-y:auto;background:var(--bg);border:1px solid #e8e8ed;border-radius:var(--card-r);padding:24px}
.panel-right{flex:1;min-width:0;background:var(--bg);border:1px solid #e8e8ed;border-radius:var(--card-r);padding:24px;min-height:400px}
.panel-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #f0f0f5}
.panel-header svg{width:20px;height:20px;color:var(--primary)}
.panel-header h2{font-size:16px;font-weight:600}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.form-group input,.form-group textarea{width:100%;padding:10px 14px;border:1.5px solid #d2d2d7;border-radius:var(--el-r);font-size:14px;font-family:inherit;transition:border-color .2s;background:var(--bg);color:var(--text)}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:60px}
.chip-group{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:6px 14px;border-radius:var(--btn-r);font-size:13px;cursor:pointer;border:1.5px solid #d2d2d7;background:var(--bg);color:var(--text2);transition:all .2s;user-select:none}
.chip:hover{border-color:var(--primary);color:var(--primary)}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-generate{width:100%;padding:14px;border:none;border-radius:var(--btn-r);background:var(--primary);color:#fff;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;font-family:inherit}
.btn-generate:hover{background:var(--primary-h);transform:translateY(-1px)}
.btn-generate:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-generate svg{width:18px;height:18px}
.skeleton{display:flex;flex-direction:column;gap:12px;padding:8px 0}
.skeleton-block{border-radius:var(--el-r);background:linear-gradient(90deg,#f0f0f5 25%,#e8e8ed 50%,#f0f0f5 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
.skeleton-block:nth-child(1){height:24px;width:60%}
.skeleton-block:nth-child(2){height:16px;width:100%}
.skeleton-block:nth-child(3){height:16px;width:85%}
.skeleton-block:nth-child(4){height:16px;width:70%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.output-content{font-size:15px;line-height:1.8;color:var(--text)}
.output-content h1{font-size:22px;font-weight:700;margin:24px 0 12px}
.output-content h2{font-size:18px;font-weight:600;margin:20px 0 10px}
.output-content h3{font-size:16px;font-weight:600;margin:16px 0 8px}
.output-content p{margin-bottom:10px;color:var(--text2)}
.output-content ul,.output-content ol{margin:8px 0 8px 20px;color:var(--text2)}
.output-content li{margin-bottom:4px}
.output-content strong{color:var(--text);font-weight:600}
.output-content code{background:var(--bg-alt);padding:2px 6px;border-radius:4px;font-size:13px}
.output-content pre{background:var(--bg-alt);padding:16px;border-radius:var(--el-r);overflow-x:auto;margin:12px 0}
.output-content blockquote{border-left:3px solid var(--primary);padding-left:16px;margin:12px 0;color:var(--text2)}
.output-content table{width:100%;border-collapse:collapse;margin:12px 0}
.output-content th,.output-content td{border:1px solid #e8e8ed;padding:8px 12px;text-align:left;font-size:14px}
.output-content th{background:var(--bg-alt);font-weight:600}
.btn-export{margin-top:20px;padding:10px 20px;border:1.5px solid #d2d2d7;border-radius:var(--btn-r);background:var(--bg);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s;font-family:inherit}
.btn-export:hover{border-color:var(--primary);color:var(--primary)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--bg);border-radius:var(--card-r);padding:32px;max-width:480px;width:90%;box-shadow:var(--shadow-h);transform:translateY(20px);transition:transform .25s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal h3{font-size:18px;font-weight:700;margin-bottom:6px}
.modal p{font-size:14px;color:var(--text2);margin-bottom:20px}
.modal .form-group{margin-bottom:14px}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.modal-btns .btn-generate{flex:1}
.modal-btns .btn-cancel{flex:1;padding:14px;border:1.5px solid #d2d2d7;border-radius:var(--btn-r);background:var(--bg);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.modal-btns .btn-cancel:hover{border-color:var(--text)}
</style>
</head>
<body>
<nav><div class="inner">
  <a class="logo" href="https://qlb708.github.io/08/"><span>08</span><span class="sep">/</span>用研报告生成器</a>
  <a class="back" href="https://qlb708.github.io/08/">

    返回首页
  </a>
</div></nav>
<div class="page-hero"><h1>用研报告生成器</h1><p>输入产品信息，AI 自动生成结构化的用户研究报告</p></div>
<div class="workspace">
  <div class="panel-left">
    <div class="panel-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><h2>填写产品信息</h2></div>
    <div class="form-group"><label>产品名称</label><input id="productName" placeholder="例如：Notion"/></div>
    <div class="form-group"><label>目标用户</label><input id="targetUser" placeholder="例如：25-35岁互联网从业者"/></div>
    <div class="form-group"><label>行业赛道</label><div class="chip-group" id="industryChips"><div class="chip" data-v="电商">电商</div><div class="chip" data-v="社交">社交</div><div class="chip" data-v="SaaS">SaaS</div><div class="chip" data-v="AI/大模型">AI/大模型</div><div class="chip" data-v="教育">教育</div><div class="chip" data-v="健康">健康</div><div class="chip" data-v="金融">金融</div><div class="chip" data-v="内容社区">内容社区</div></div></div>
    <div class="form-group"><label>研究目的（选填）</label><textarea id="researchPurpose" placeholder="例如：了解目标用户的核心痛点和未被满足的需求"></textarea></div>
    <button class="btn-generate" id="generateBtn" onclick="handleGenerate()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>生成报告</button>
  </div>
  <div class="panel-right">
    <div class="panel-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><h2>AI 洞察报告</h2></div>
    <div id="skeleton" class="skeleton"><div class="skeleton-block"></div><div class="skeleton-block"></div><div class="skeleton-block"></div><div class="skeleton-block"></div></div>
    <div id="output" class="output-content" style="display:none"></div>
    <button id="exportBtn" class="btn-export" style="display:none" onclick="exportMarkdown()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>导出 Markdown</button>
  </div>
</div>
<div class="modal-overlay" id="followupModal">
  <div class="modal">
    <h3>补充信息</h3><p>为了让报告更精准，请补充以下信息（选填）</p>
    <div class="form-group"><label>是否有特定的竞品需要关注？</label><input id="followupCompetitors" placeholder="例如：Figma, Miro"/></div>
    <div class="form-group"><label>是否有特定的研究方法偏好？</label><input id="followupMethod" placeholder="例如：定量问卷 + 深度访谈"/></div>
    <div class="modal-btns"><button class="btn-cancel" onclick="skipFollowup()">跳过</button><button class="btn-generate" onclick="submitFollowup()">确认生成</button></div>
  </div>
</div>
<script>
const GK=['AQ.Ab8RN6Kwvan','PacRzJIFXe6Yi1Kx35q046','jXDWC8LF0dV3tKJiA'].join('');
const GU='https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+GK;
let rawMd='';
document.querySelectorAll('#industryChips .chip').forEach(c=>{c.addEventListener('click',()=>{c.classList.toggle('active')})});
let pd=null;
function handleGenerate(){
  var n=document.getElementById('productName').value.trim();
  var u=document.getElementById('targetUser').value.trim();
  var ind=[...document.querySelectorAll('#industryChips .chip.active')].map(c=>c.dataset.v);
  var p=document.getElementById('researchPurpose').value.trim();
  if(!n){alert('请填写产品名称');return}
  if(!u){alert('请填写目标用户');return}
  if(!ind.length){alert('请至少选择一个行业赛道');return}
  pd={n,u,ind:ind.join('、'),p};
  document.getElementById('followupModal').classList.add('show');
}
function skipFollowup(){document.getElementById('followupModal').classList.remove('show');submitFollowup()}
function submitFollowup(){
  document.getElementById('followupModal').classList.remove('show');
  var fc=document.getElementById('followupCompetitors').value.trim();
  var fm=document.getElementById('followupMethod').value.trim();
  var prompt='你是一位资深用户研究员。请为以下产品生成一份专业的用户研究报告。\n\n产品名称：'+pd.n+'\n目标用户：'+pd.u+'\n行业赛道：'+pd.ind+(pd.p?'\n研究目的：'+pd.p:'')+(fc?'\n关注竞品：'+fc:'')+(fm?'\n研究方法偏好：'+fm:'')+'\n\n报告结构要求：\n1. 行业概况与趋势\n2. 目标用户画像（至少3类Persona）\n3. 核心需求与痛点分析\n4. 用户使用场景分析\n5. 竞品用户研究对比\n6. 关键发现与产品建议\n\n请使用 Markdown 格式输出，结构清晰，每个部分要有具体的分析内容。';
  doGenerate(prompt);
}
async function doGenerate(prompt){
  var btn=document.getElementById('generateBtn');
  btn.disabled=true;
  document.getElementById('skeleton').style.display='flex';
  document.getElementById('output').style.display='none';
  document.getElementById('exportBtn').style.display='none';
  try{
    var resp=await fetch(GU,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7,maxOutputTokens:8192}})});
    var data=await resp.json();
    rawMd=data.candidates[0].content.parts[0].text;
    document.getElementById('skeleton').style.display='none';
    document.getElementById('output').style.display='block';
    document.getElementById('exportBtn').style.display='inline-flex';
    typeRender(rawMd);
  }catch(e){
    document.getElementById('skeleton').style.display='none';
    document.getElementById('output').style.display='block';
    document.getElementById('output').innerHTML='<p style="color:#e53e3e">生成失败：'+e.message+'</p>';
  }
  btn.disabled=false;
}
function typeRender(md){
  var el=document.getElementById('output');
  el.innerHTML='';
  var html=mdToHtml(md);
  var plainText=md.replace(/[#*`_|>\-\[\]()]/g,'').replace(/\n/g,' ');
  var idx=0;
  var fullDone=false;
  function tick(){
    if(idx<=plainText.length){
      var partial=plainText.slice(0,idx);
      var words=partial.split(' ');
      var partialHtml=mdToHtml(md.substring(0,Math.min(md.length,idx*2)));
      el.innerHTML=partialHtml;
      idx+=3;
      setTimeout(tick,20);
    }else if(!fullDone){
      fullDone=true;
      el.innerHTML=html;
    }
  }
  tick();
}
function mdToHtml(md){
  var lines=md.split('\n');
  var html='';
  var inList=false;
  var inTable=false;
  var tableRows=[];
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(l.startsWith('|')){
      if(!inTable){inTable=true;tableRows=[]}
      tableRows.push(l);
      continue;
    }else if(inTable){
      html+=renderTable(tableRows);
      inTable=false;tableRows=[];
    }
    if(l.startsWith('### ')){html+='<h3>'+esc(l.slice(4))+'</h3>';continue}
    if(l.startsWith('## ')){html+='<h2>'+esc(l.slice(3))+'</h2>';continue}
    if(l.startsWith('# ')){html+='<h1>'+esc(l.slice(2))+'</h1>';continue}
    if(l.startsWith('- ')||l.startsWith('* ')){
      if(!inList){html+='<ul>';inList=true}
      html+='<li>'+inline(esc(l.slice(2)))+'</li>';continue;
    }
    if(l.match(/^\d+\.\s/)){
      if(!inList){html+='<ol>';inList=true}
      html+='<li>'+inline(esc(l.replace(/^\d+\.\s/,'')))+'</li>';continue;
    }
    if(inList){html+=inList==='ul'?'<ol>':'<ol>';html+='</ol>';inList=false}
    if(l.startsWith('> ')){html+='<blockquote>'+inline(esc(l.slice(2)))+'</blockquote>';continue}
    if(l.trim()===''){continue}
    html+='<p>'+inline(esc(l))+'</p>';
  }
  if(inTable){html+=renderTable(tableRows)}
  if(inList){html+='</ul>'}
  return html;
}
function renderTable(rows){
  if(rows.length<2)return'';
  var h='<table>';
  var headers=rows[0].split('|').filter(c=>c.trim());
  h+='<tr>';headers.forEach(function(c){h+='<th>'+esc(c.trim())+'</th>'});h+='</tr>';
  for(var i=2;i<rows.length;i++){
    var cells=rows[i].split('|').filter(c=>c.trim());
    h+='<tr>';cells.forEach(function(c){h+='<td>'+inline(esc(c.trim()))+'</td>'});h+='</tr>';
  }
  h+='</table>';return h;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function inline(s){return s.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/`(.*?)`/g,'<code>$1</code>')}
function exportMarkdown(){
  var blob=new Blob([rawMd],{type:'text/markdown'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ux-research-report.md';
  a.click();
}
</script>
</body>
</html>
