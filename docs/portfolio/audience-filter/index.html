<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Audience Filter</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF8;--text:#0A1628;--accent:#1a56db;--gold:#C9A84C;
  --card:#FFFFFF;--line:rgba(10,22,40,0.12);--line-light:rgba(10,22,40,0.08);
  --serif:Georgia,"Times New Roman",serif;
  --sans:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;
}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.6}
a{color:var(--accent);text-decoration:none;transition:color .4s ease}
a:hover{color:#0d3a9e}
input[type=checkbox]{appearance:none;width:14px;height:14px;border:1px solid var(--line);border-radius:2px;cursor:pointer;position:relative;flex-shrink:0;transition:all .3s ease;background:#fff}
input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent)}
input[type=checkbox]:checked::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:9px;line-height:1}

/* NAV */
.nav{height:52px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:fixed;top:0;left:0;right:0;z-index:100}
.nav-brand{font-family:var(--serif);font-size:13px;letter-spacing:.15em;color:var(--text)}
.nav-link{font-size:12px;font-family:var(--sans);color:var(--accent);letter-spacing:.05em}

/* LAYOUT */
.layout{display:flex;margin-top:52px;min-height:calc(100vh - 52px)}
.sidebar{width:360px;background:#fff;border-right:1px solid var(--line);height:100vh;position:sticky;top:52px;overflow-y:auto;display:flex;flex-direction:column;padding:32px 24px}
.main{margin-left:360px;min-height:calc(100vh - 52px);padding:48px;flex:1}
@media(max-width:768px){
  .sidebar{width:100%;height:auto;position:static;border-right:none;border-bottom:1px solid var(--line)}
  .main{margin-left:0;padding:32px 20px}
}

/* SIDEBAR SECTIONS */
.sec-title{font-family:var(--serif);font-size:14px;letter-spacing:.1em;margin-bottom:16px;color:var(--text)}
.divider{height:1px;background:var(--line);margin:20px 0}
.sub-title{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#8a96a6;margin-bottom:14px;font-family:var(--sans);font-weight:600}

/* UPLOAD */
.drop-zone{height:140px;border:1px dashed rgba(10,22,40,.2);background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .4s ease;border-radius:4px}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:rgba(26,86,219,.03)}
.drop-zone .dz-main{font-size:13px;color:#8a96a6;font-family:var(--sans)}
.drop-zone .dz-sub{font-size:11px;color:#b0bac6;margin-top:6px;font-family:var(--sans)}
.file-info{display:none;padding:16px;background:#f8faf0;border:1px solid rgba(10,22,40,.08);border-radius:4px}
.file-info.show{display:flex;align-items:center;gap:10px}
.file-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}
.file-name{font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.file-rows{font-size:11px;color:#8a96a6;flex-shrink:0}
.file-remove{font-size:11px;color:#b0bac6;cursor:pointer;margin-left:8px;transition:color .3s}
.file-remove:hover{color:#ef4444}

/* CES SLIDER */
.ces-row{margin-bottom:6px}
.ces-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ces-label{font-size:12px;color:var(--text)}
.ces-val{font-size:12px;color:var(--accent);font-weight:600;font-family:var(--serif)}
input[type=range]{width:100%;-webkit-appearance:none;height:3px;background:var(--line);border-radius:2px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 1px 4px rgba(26,86,219,.3);transition:transform .3s ease}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.2)}
.ces-range{display:flex;justify-content:space-between;font-size:10px;color:#b0bac6;margin-top:6px}

/* RULES */
.rule-item{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line-light);line-height:1.3}
.rule-item:last-child{border-bottom:none}
.rule-text{font-size:12px;color:var(--text);flex:1}
.rule-note{font-size:10px;color:#b0bac6;display:block;margin-top:2px}
.rule-item.locked{opacity:.6}
.rule-item.locked input{pointer-events:none}

/* KEYWORDS */
.kw-container{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.kw-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border:1px solid rgba(10,22,40,.15);border-radius:2px;background:#fff;color:var(--text);transition:all .3s ease}
.kw-tag:hover{border-color:var(--accent)}
.kw-del{cursor:pointer;color:#b0bac6;font-size:12px;line-height:1;margin-left:2px;transition:color .3s}
.kw-del:hover{color:#ef4444}
.kw-add{display:flex;gap:8px;align-items:center}
.kw-input{flex:1;height:32px;border:1px solid var(--line);border-radius:2px;padding:0 10px;font-size:11px;font-family:var(--sans);outline:none;transition:border-color .3s}
.kw-input:focus{border-color:var(--accent)}
.kw-btn{height:32px;padding:0 14px;background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:2px;font-size:11px;cursor:pointer;transition:all .3s;font-family:var(--sans)}
.kw-btn:hover{background:var(--accent);color:#fff}

/* CATEGORY */
.cat-list{display:flex;flex-direction:column;gap:2px}
.cat-item{display:flex;align-items:center;gap:10px;padding:8px 0}
.cat-item span{font-size:12px;color:var(--text)}

/* BUTTONS */
.actions{margin-top:auto;padding-top:24px;display:flex;flex-direction:column;gap:10px}
.btn{width:100%;border:none;cursor:pointer;transition:all .4s ease;font-family:var(--serif);letter-spacing:.2em;display:flex;align-items:center;justify-content:center}
.btn-primary{height:48px;background:var(--accent);color:#fff;font-size:14px;border-radius:2px}
.btn-primary:hover{background:#0d3a9e;box-shadow:0 4px 16px rgba(26,86,219,.25)}
.btn-primary:disabled{background:#b0bac6;cursor:not-allowed;box-shadow:none}
.btn-secondary{height:40px;background:#fff;color:var(--accent);border:1px solid var(--accent);font-size:12px;border-radius:2px}
.btn-secondary:hover{background:rgba(26,86,219,.05)}
.btn-secondary:disabled{border-color:#d4d9e0;color:#b0bac6;cursor:not-allowed;background:#f5f6f8}
.btn-tertiary{height:36px;background:transparent;color:#8a96a6;border:1px solid rgba(10,22,40,.15);font-size:11px;border-radius:2px}
.btn-tertiary:hover{border-color:#8a96a6;color:var(--text)}
.btn-tertiary:disabled{opacity:.4;cursor:not-allowed}

/* EMPTY STATE */
.empty{text-align:center;padding-top:120px}
.empty-line{font-family:var(--serif);font-size:48px;color:var(--line);margin-bottom:24px;font-weight:400}
.empty-main{font-family:var(--serif);font-size:18px;color:var(--text);margin-bottom:10px;letter-spacing:.05em}
.empty-sub{font-size:12px;color:#b0bac6}

/* RESULTS */
.stats{display:flex;align-items:center;gap:24px;padding-bottom:24px;border-bottom:1px solid var(--line);margin-bottom:32px;flex-wrap:wrap}
.stat-total{font-family:var(--serif);font-size:16px;color:var(--text)}
.stat-divider{width:1px;height:20px;background:var(--line)}
.stat-item{display:flex;align-items:center;gap:6px}
.stat-num{font-family:var(--serif);font-size:18px}
.stat-label{font-size:10px;color:#8a96a6;text-transform:uppercase;letter-spacing:.08em}
.stat-s .stat-num{color:var(--gold)}
.stat-a .stat-num{color:var(--accent)}
.stat-b .stat-num{color:#8a96a6}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#8a96a6;font-weight:600;padding:12px 16px;text-align:left;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;user-select:none;transition:color .3s}
thead th:hover{color:var(--accent)}
thead th.sorted{color:var(--accent)}
thead th::after{content:' ↕';opacity:.3;font-size:9px}
thead th.sorted.asc::after{content:' ↑';opacity:1}
thead th.sorted.desc::after{content:' ↓';opacity:1}
tbody tr{transition:background .3s}
tbody tr:hover{background:rgba(26,86,219,.02)}
tbody td{padding:14px 16px;border-bottom:1px solid var(--line-light);font-size:14px;color:var(--text);vertical-align:middle}
tbody td.fans,tbody td.notes,tbody td.ces{text-align:right;font-variant-numeric:tabular-nums}
tbody td.rate{text-align:right;font-variant-numeric:tabular-nums}
tbody td.rate.high{color:var(--accent)}
tbody td.grade-cell{text-align:center}

/* GRADE BADGES */
.badge{display:inline-block;font-family:var(--serif);font-size:13px;padding:3px 14px;border-radius:2px;letter-spacing:.1em;font-weight:600}
.badge-s{border:1px solid var(--gold);color:var(--gold);background:rgba(201,168,76,.06)}
.badge-a{border:1px solid var(--accent);color:var(--accent);background:rgba(26,86,219,.04)}
.badge-b{border:1px solid #d4d9e0;color:#8a96a6;background:transparent}

/* PAGINATION */
.pagination{display:flex;align-items:center;justify-content:flex-end;gap:16px;margin-top:32px;font-family:var(--serif);font-size:13px;color:#8a96a6}
.page-btn{cursor:pointer;padding:4px 8px;border-radius:2px;transition:all .3s;user-select:none}
.page-btn:hover:not(.disabled){color:var(--accent);background:rgba(26,86,219,.05)}
.page-btn.disabled{opacity:.3;cursor:default}
.page-info{letter-spacing:.05em}

/* SCROLLBAR */
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:rgba(10,22,40,.1);border-radius:2px}
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-brand">AUDIENCE · FILTER</div>
  <a class="nav-link" href="/08/portfolio/">← 返回工具集</a>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Upload -->
    <div class="sec-title">上传名单</div>
    <div class="drop-zone" id="dropZone">
      <div class="dz-main">将 .xlsx 拖入此处</div>
      <div class="dz-sub">或点击选择文件</div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none">
    <div class="file-info" id="fileInfo">
      <div class="file-dot"></div>
      <div class="file-name" id="fileName"></div>
      <div class="file-rows" id="fileRows"></div>
      <span class="file-remove" id="fileRemove" title="移除">✕</span>
    </div>

    <div class="divider"></div>
    <div class="sub-title">FILTER PARAMETERS</div>

    <!-- CES Slider -->
    <div class="ces-row">
      <div class="ces-header">
        <span class="ces-label">CES 转化率阈值</span>
        <span class="ces-val" id="cesVal">0%</span>
      </div>
      <input type="range" id="cesSlider" min="0" max="5" step="0.1" value="0">
      <div class="ces-range"><span>0%</span><span>5%</span></div>
    </div>

    <div class="divider"></div>

    <!-- Core Rules -->
    <div class="rule-item">
      <input type="checkbox" id="ruleNeg" checked>
      <span class="rule-text">排除命中负向处置</span>
    </div>
    <div class="rule-item">
      <input type="checkbox" id="ruleStatus" checked>
      <span class="rule-text">排除账号状态异常</span>
    </div>
    <div class="rule-item locked">
      <input type="checkbox" checked disabled>
      <span class="rule-text">CES有效笔记 ≥ 50<span class="rule-note">不可调整</span></span>
    </div>
    <div class="rule-item">
      <input type="checkbox" id="ruleNotes" checked>
      <span class="rule-text">笔记数量 20–500<span class="rule-note">商业化过重将被排除</span></span>
    </div>

    <div class="divider"></div>
    <div class="sub-title">KEYWORDS</div>

    <!-- Keywords -->
    <div class="kw-container" id="kwContainer"></div>
    <div class="kw-add">
      <input class="kw-input" id="kwInput" placeholder="添加关键词…" maxlength="20">
      <button class="kw-btn" id="kwAddBtn">添加</button>
    </div>

    <div class="divider"></div>
    <div class="sub-title">CATEGORY</div>

    <!-- Category -->
    <div class="cat-list" id="catList"></div>

    <div class="divider"></div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" id="btnFilter" disabled>开 始 筛 选</button>
      <button class="btn btn-secondary" id="btnExport" disabled>导出筛选结果</button>
      <button class="btn btn-tertiary" id="btnExclude" disabled>导出排除名单</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="mainArea">
    <div class="empty" id="emptyState">
      <div class="empty-line">—</div>
      <div class="empty-main">上传文件以开始筛选</div>
      <div class="empty-sub">支持小红书后台导出的达人名单 .xlsx 格式</div>
    </div>
    <div id="resultArea" style="display:none">
      <div class="stats" id="statsBar"></div>
      <div class="table-wrap">
        <table>
          <thead id="tblHead"></thead>
          <tbody id="tblBody"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </main>

</div>

<script>
/* ========== DATA ========== */
var ALL_DATA=[],FILTERED=[],EXCLUDED=[];
var PAGE=1,PAGE_SIZE=20,SORT_COL='',SORT_ASC=false;

/* ========== CONFIG ========== */
var KW_LIST=[
  // 旅行社/地接类
  '旅行社','旅游社','旅游局','地接','地接社','定制游','精品定制','旅策','旅程服务','旅游服务','旅游服务中心','服务中心',
  // 包车/拼车/司导
  '包车','包车游','包车服务','拼车','司导','跃行','车轮上',
  // 住宿类
  '民宿','客栈','酒店','公寓','度假村','包栋','别墅','寓','inn','hostel','hotel','resort',
  // 游轮/票务/代理
  '游轮','票务','票务代理','代理','代购','团购',
  // 旅游平台
  'ota','携程','途牛','飞猪','去哪儿','途途','开荒',
  // 商业机构通用
  '官方','官号','官博','机构','店铺','商家','企业','品牌','招商','广告','推广','营销','专营','旗舰','批发','直销',
  // 繁体/多语言
  '旅遊','旅館','民宿','包棟',
  // 景区/门票
  '景区','门票','观光',
  // 英文机构
  'travel agency','tour','tours','guide'
];
var EXCL_VERTS=['商业财经-房产楼市'];
var VERTICALS=['旅游-旅游攻略','旅游-旅游记录','旅游-境外旅游','生活-美食','时尚-穿搭','商业财经-房产楼市'];
var EXCL_VERT_SET={};
for(var vi=0;vi<VERTICALS.length;vi++){EXCL_VERT_SET[VERTICALS[vi]]=EXCL_VERTS.indexOf(VERTICALS[vi])>=0}

/* ========== UTILS ========== */
function parseCes(v){return parseFloat(String(v||'0').replace('%',''))||0}
function getCesT(){return parseFloat(document.getElementById('cesSlider').value)||0}
function fmtN(n){var v=parseInt(n)||0;return v>=10000?(v/10000).toFixed(1)+'w':v>=1000?(v/1000).toFixed(1)+'k':String(v)}
function getKocGrade(r){
  var ces=parseInt(r['CES超100有效笔记数']||0);
  var notes=parseInt(r['笔记发布总数']||0);
  if(ces>=150&&notes>=30&&notes<=300)return 'S';
  if(ces>=80)return 'A';
  return 'B';
}

/* ========== FILTER ========== */
function filterRow(r){
  if(document.getElementById('ruleNeg').checked&&r['命中负向处置']==='是')return '负向处置';
  if(document.getElementById('ruleStatus').checked&&r['账号状态']&&r['账号状态']!=='NORMAL')return '账号异常';
  var nick=String(r['昵称']||'').toLowerCase();
  var xhsId=String(r['小红书号']||'').toLowerCase();
  for(var i=0;i<KW_LIST.length;i++){
    if(nick.indexOf(KW_LIST[i])>=0||xhsId.indexOf(KW_LIST[i])>=0)return '商业机构';
  }
  var cesNum=parseInt(r['CES超100有效笔记数']||0);
  if(cesNum<50)return 'CES不足';
  if(document.getElementById('ruleNotes').checked){
    var notes=parseInt(r['笔记发布总数']||0);
    if(notes<20||notes>500)return '笔记数范围外';
  }
  if(parseCes(r['近7天CES转化率'])<getCesT())return 'CES转化率低';
  var vert=String(r['作者垂类']||'').trim();
  if(EXCL_VERT_SET[vert]===true)return '垂类排除';
  return null;
}

/* ========== FILE HANDLING ========== */
var dropZone=document.getElementById('dropZone');
var fileInput=document.getElementById('fileInput');
var fileInfo=document.getElementById('fileInfo');
var fileNameEl=document.getElementById('fileName');
var fileRowsEl=document.getElementById('fileRows');
var fileRemove=document.getElementById('fileRemove');

dropZone.addEventListener('click',function(){fileInput.click()});
dropZone.addEventListener('dragover',function(e){e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',function(){dropZone.classList.remove('dragover')});
dropZone.addEventListener('drop',function(e){
  e.preventDefault();dropZone.classList.remove('dragover');
  if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change',function(){if(fileInput.files.length)handleFile(fileInput.files[0])});
fileRemove.addEventListener('click',function(){
  ALL_DATA=[];FILTERED=[];EXCLUDED=[];PAGE=1;
  dropZone.style.display='';fileInfo.classList.remove('show');
  document.getElementById('btnFilter').disabled=true;
  document.getElementById('emptyState').style.display='';
  document.getElementById('resultArea').style.display='none';
  fileInput.value='';
});

function handleFile(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var json=XLSX.utils.sheet_to_json(ws,{defval:''});
      ALL_DATA=json;
      fileNameEl.textContent=file.name;
      fileRowsEl.textContent=json.length+' 行';
      dropZone.style.display='none';
      fileInfo.classList.add('show');
      document.getElementById('btnFilter').disabled=false;
      document.getElementById('emptyState').style.display='none';
      document.getElementById('resultArea').style.display='block';
      document.getElementById('emptyState').querySelector('.empty-main').textContent='已加载数据，点击「开始筛选」';
      document.getElementById('emptyState').style.display='';
      document.getElementById('resultArea').style.display='none';
    }catch(err){alert('文件解析失败: '+err.message)}
  };
  reader.readAsArrayBuffer(file);
}

/* ========== CES SLIDER ========== */
var cesSlider=document.getElementById('cesSlider');
var cesVal=document.getElementById('cesVal');
cesSlider.addEventListener('input',function(){cesVal.textContent=parseFloat(this.value).toFixed(1)+'%'})

/* ========== KEYWORDS ========== */
function renderKw(){
  var c=document.getElementById('kwContainer');c.innerHTML='';
  for(var i=0;i<KW_LIST.length;i++){
    var t=document.createElement('span');t.className='kw-tag';
    t.innerHTML=escHtml(KW_LIST[i])+'<span class="kw-del" data-idx="'+i+'">×</span>';
    c.appendChild(t);
  }
  c.querySelectorAll('.kw-del').forEach(function(btn){
    btn.addEventListener('click',function(){
      KW_LIST.splice(parseInt(this.dataset.idx),1);renderKw();
    });
  });
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

document.getElementById('kwAddBtn').addEventListener('click',function(){
  var v=document.getElementById('kwInput').value.trim();
  if(v&&KW_LIST.indexOf(v)<0){KW_LIST.push(v);renderKw();document.getElementById('kwInput').value=''}
});
document.getElementById('kwInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'){document.getElementById('kwAddBtn').click()}
});

/* ========== CATEGORY ========== */
function renderCat(){
  var c=document.getElementById('catList');c.innerHTML='';
  for(var i=0;i<VERTICALS.length;i++){
    var d=document.createElement('div');d.className='cat-item';
    var cb=document.createElement('input');cb.type='checkbox';cb.id='v_'+i;cb.checked=EXCL_VERTS.indexOf(VERTICALS[i])<0;
    cb.dataset.vert=VERTICALS[i];
    var sp=document.createElement('span');sp.textContent=VERTICALS[i];
    d.appendChild(cb);d.appendChild(sp);c.appendChild(d);
  }
}
function getActiveCats(){
  var arr=[];
  document.querySelectorAll('#catList input[type=checkbox]').forEach(function(cb){
    if(!cb.checked)arr.push(cb.dataset.vert);
  });
  EXCL_VERTS=arr;EXCL_VERT_SET={};for(var i=0;i<arr.length;i++)EXCL_VERT_SET[arr[i]]=true;
}

/* ========== FILTER ACTION ========== */
document.getElementById('btnFilter').addEventListener('click',function(){
  if(!ALL_DATA.length)return;
  getActiveCats();
  FILTERED=[];EXCLUDED=[];
  for(var i=0;i<ALL_DATA.length;i++){
    var reason=filterRow(ALL_DATA[i]);
    if(reason){ALL_DATA[i]._exclReason=reason;EXCLUDED.push(ALL_DATA[i])}
    else{FILTERED.push(ALL_DATA[i])}
  }
  PAGE=1;SORT_COL='';SORT_ASC=false;
  renderResult();
});

/* ========== RENDER RESULT ========== */
var COLS=[
  {key:'昵称',label:'NICKNAME',sort:true},
  {key:'粉丝数',label:'FANS',sort:true},
  {key:'笔记发布总数',label:'NOTES',sort:true},
  {key:'CES超100有效笔记数',label:'CES',sort:true},
  {key:'近7天CES转化率',label:'RATE',sort:true},
  {key:'_grade',label:'GRADE',sort:true}
];

function renderResult(){
  var stats=document.getElementById('statsBar');
  var sCount=0,aCount=0,bCount=0;
  for(var i=0;i<FILTERED.length;i++){
    var g=getKocGrade(FILTERED[i]);FILTERED[i]._grade=g;
    if(g==='S')sCount++;else if(g==='A')aCount++;else bCount++;
  }
  stats.innerHTML=
    '<span class="stat-total">共 '+FILTERED.length+' 人</span>'+
    '<span class="stat-divider"></span>'+
    '<span class="stat-item stat-s"><span class="stat-label">S 优质</span><span class="stat-num">'+sCount+'</span></span>'+
    '<span class="stat-divider"></span>'+
    '<span class="stat-item stat-a"><span class="stat-label">A 推荐</span><span class="stat-num">'+aCount+'</span></span>'+
    '<span class="stat-divider"></span>'+
    '<span class="stat-item stat-b"><span class="stat-label">B 备选</span><span class="stat-num">'+bCount+'</span></span>';

  // Table head
  var head=document.getElementById('tblHead');
  var hrow='<tr>';
  for(var c=0;c<COLS.length;c++){
    var cls='';
    if(SORT_COL===COLS[c].key)cls='sorted '+(SORT_ASC?'asc':'desc');
    hrow+='<th data-col="'+COLS[c].key+'" class="'+cls+'"'+(COLS[c].sort?'':'')+'>'+COLS[c].label+'</th>';
  }
  hrow+='</tr>';head.innerHTML=hrow;
  head.querySelectorAll('th').forEach(function(th){
    th.addEventListener('click',function(){
      var col=this.dataset.col;
      if(SORT_COL===col)SORT_ASC=!SORT_ASC;else{SORT_COL=col;SORT_ASC=true}
      PAGE=1;renderResult();
    });
  });

  // Sort
  var sorted=FILTERED.slice();
  if(SORT_COL){
    sorted.sort(function(a,b){
      var va,vb;
      if(SORT_COL==='_grade'){
        va=getKocGrade(a);vb=getKocGrade(b);
      }else{
        va=a[SORT_COL];vb=b[SORT_COL];
      }
      var na=parseFloat(String(va).replace('%',''))||0;
      var nb=parseFloat(String(vb).replace('%',''))||0;
      if(!isNaN(na)&&!isNaN(nb))return SORT_ASC?na-nb:nb-na;
      var sa=String(va),sb=String(vb);
      return SORT_ASC?sa.localeCompare(sb):sb.localeCompare(sa);
    });
  }

  // Body
  var body=document.getElementById('tblBody');
  var start=(PAGE-1)*PAGE_SIZE;
  var pageData=sorted.slice(start,start+PAGE_SIZE);
  var html='';
  for(var j=0;j<pageData.length;j++){
    var r=pageData[j];
    var grade=getKocGrade(r);
    var rate=parseCes(r['近7天CES转化率']);
    var rateCls=rate>2?'rate high':'rate';
    var badgeCls=grade==='S'?'badge-s':grade==='A'?'badge-a':'badge-b';
    html+='<tr>'+
      '<td>'+escHtml(r['昵称']||'')+'</td>'+
      '<td class="fans">'+fmtN(r['粉丝数'])+'</td>'+
      '<td class="notes">'+escHtml(r['笔记发布总数'])+'</td>'+
      '<td class="ces">'+escHtml(r['CES超100有效笔记数'])+'</td>'+
      '<td class="'+rateCls+'">'+(rate?rate.toFixed(1)+'%':'—')+'</td>'+
      '<td class="grade-cell"><span class="badge '+badgeCls+'">'+grade+'</span></td>'+
    '</tr>';
  }
  body.innerHTML=html;

  // Pagination
  var totalPages=Math.ceil(sorted.length/PAGE_SIZE)||1;
  var pag=document.getElementById('pagination');
  pag.innerHTML=
    '<span class="page-btn '+(PAGE<=1?'disabled':'')+'" id="pgPrev">< 上一页</span>'+
    '<span class="page-info">'+PAGE+' / '+totalPages+'</span>'+
    '<span class="page-btn '+(PAGE>=totalPages?'disabled':'')+'" id="pgNext">下一页 ></span>';
  document.getElementById('pgPrev').addEventListener('click',function(){
    if(PAGE>1){PAGE--;renderResult()}
  });
  document.getElementById('pgNext').addEventListener('click',function(){
    if(PAGE<totalPages){PAGE++;renderResult()}
  });

  // Enable export buttons
  document.getElementById('btnExport').disabled=!FILTERED.length;
  document.getElementById('btnExclude').disabled=!EXCLUDED.length;
}

/* ========== EXPORT ========== */
function doExp(excl){
  var data=excl?EXCLUDED:FILTERED;
  if(!data.length)return;
  var rows=[];
  // Add grade column
  var header=null;
  if(data.length){
    header=Object.keys(data[0]);
    if(header.indexOf('_grade')<0)header.push('KOC评级');
  }
  for(var i=0;i<data.length;i++){
    var r=data[i];
    var grade=getKocGrade(r);
    var row={};
    for(var k=0;k<header.length;k++){
      var h=header[k];
      if(h==='_grade')row['KOC评级']=grade;
      else if(h==='作者垂类'&&excl)row[h]=r[h]||'';
      else row[h]=r[h];
    }
    row['KOC评级']=grade;
    rows.push(row);
  }
  // Sort by grade S>A>B
  var gradeOrder={S:0,A:1,B:2};
  rows.sort(function(a,b){return(gradeOrder[a['KOC评级']]||3)-(gradeOrder[b['KOC评级']]||3)});
  var ws=XLSX.utils.json_to_sheet(rows);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'筛选结果');
  var fname=excl?'排除名单':'筛选结果';
  XLSX.writeFile(wb,fname+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
}
document.getElementById('btnExport').addEventListener('click',function(){doExp(false)});
document.getElementById('btnExclude').addEventListener('click',function(){doExp(true)});

/* ========== INIT ========== */
renderKw();
renderCat();
</script>
