<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Audience Filter · 人群筛选</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F0F2F5;--white:#fff;--text:#0A1628;--soft:#64748b;--muted:#94a3b8;
  --accent:#1a56db;--gold:#C9A84C;--green:#16a34a;--red:#dc2626;
  --line:rgba(10,22,40,0.09);
  --serif:Georgia,"Times New Roman",serif;
  --sans:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;
  --radius:14px;
}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px}

/* ── NAV ── */
.nav{height:54px;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;
  padding:0 32px;position:fixed;top:0;left:0;right:0;z-index:300;gap:12px}
.nav-brand{font-family:var(--serif);font-size:13px;letter-spacing:.16em;color:var(--text)}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--muted)}
.nav-sub{font-size:13px;color:var(--soft)}
.nav-back{margin-left:auto;font-size:13px;color:var(--accent);text-decoration:none;opacity:.8;transition:opacity .2s}
.nav-back:hover{opacity:1}

/* ── ACTION BAR (fixed, shows after upload) ── */
.action-bar{
  display:none;
  position:fixed;top:54px;left:0;right:0;z-index:200;
  background:#fff;border-bottom:1px solid var(--line);
  padding:10px 32px;
  flex-wrap:wrap;gap:10px;align-items:center;
}
.action-bar.show{display:flex}
.ab-file{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.ab-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0}
.ab-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.ab-rows{font-size:12px;color:var(--muted)}
.ab-reup{font-size:12px;color:var(--accent);cursor:pointer;margin-left:8px;flex-shrink:0}
.ab-reup:hover{text-decoration:underline}
.ab-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn{font-family:var(--sans);cursor:pointer;border-radius:8px;transition:all .2s;font-weight:600;white-space:nowrap;border:none;font-size:13px}
.btn-primary{background:var(--accent);color:#fff;padding:8px 20px}
.btn-primary:hover{background:#1446b8}
.btn-ghost{background:#fff;color:var(--soft);border:1.5px solid #e2e8f0!important;padding:7px 16px}
.btn-ghost:hover{border-color:#cbd5e1!important;color:var(--text)}
.btn-outline{background:#fff;color:var(--accent);border:1.5px solid var(--accent)!important;padding:7px 16px}
.btn-outline:hover{background:rgba(26,86,219,.05)}
.btn-filter-toggle{background:#F0F2F5;color:var(--text);border:none!important;padding:7px 16px;display:flex;align-items:center;gap:6px}
.btn-filter-toggle .arrow{font-size:10px;transition:transform .2s;display:inline-block}
.btn-filter-toggle.open .arrow{transform:rotate(180deg)}

/* ── FILTER PANEL (collapsible under action bar) ── */
.filter-panel{
  display:none;
  position:fixed;z-index:190;
  left:0;right:0;
  background:#fff;
  border-bottom:2px solid var(--line);
  padding:16px 32px 18px;
}
.filter-panel.show{display:block}
.fp-row{display:flex;align-items:center;flex-wrap:wrap;gap:16px;margin-bottom:14px}
.fp-row:last-child{margin-bottom:0}
.fp-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);width:56px;flex-shrink:0}

/* Sliders */
.sl{display:flex;align-items:center;gap:8px}
.sl-lbl{font-size:12px;color:var(--soft);white-space:nowrap}
.sl input[type=range]{width:90px;-webkit-appearance:none;height:3px;background:#e2e8f0;border-radius:2px;outline:none;cursor:pointer}
.sl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 1px 4px rgba(26,86,219,.3)}
.sl-val{font-size:13px;font-weight:700;color:var(--accent);min-width:36px}

/* Checkboxes */
.ck{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text);cursor:pointer;white-space:nowrap}
.ck input{appearance:none;width:15px;height:15px;border:1.5px solid #cbd5e1;border-radius:4px;cursor:pointer;position:relative;flex-shrink:0;transition:all .2s;background:#fff}
.ck input:checked{background:var(--accent);border-color:var(--accent)}
.ck input:checked::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);color:#fff;font-size:9px;font-weight:700}

/* Keyword groups */
.kw-group{position:relative;flex-shrink:0}
.kw-group-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;
  border:1.5px solid var(--line);background:#fff;font-size:13px;font-weight:500;
  color:var(--text);cursor:pointer;transition:all .2s;white-space:nowrap}
.kw-group-btn:hover,.kw-group-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(26,86,219,.04)}
.kw-cnt{font-size:11px;background:var(--accent);color:#fff;border-radius:10px;padding:0 5px;min-width:18px;text-align:center;line-height:18px;font-weight:700}
.kw-arr{font-size:10px;color:var(--muted);transition:transform .2s}
.kw-group-btn.active .kw-arr{transform:rotate(180deg)}
.kw-drop{display:none;position:absolute;top:calc(100% + 6px);left:0;background:#fff;border-radius:12px;
  box-shadow:0 8px 32px rgba(10,22,40,.14);padding:12px;z-index:600;min-width:240px;max-width:320px}
.kw-drop.show{display:block}
.kw-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.kw-tag{display:inline-flex;align-items:center;gap:3px;font-size:12px;padding:3px 10px;
  border:1px solid var(--line);border-radius:20px;background:#F8FAFC;color:var(--text)}
.kw-del{cursor:pointer;color:var(--muted);font-size:12px}
.kw-del:hover{color:#ef4444}
.kw-add-row{display:flex;gap:6px}
.kw-inp{flex:1;border:1px solid var(--line);border-radius:6px;padding:5px 10px;font-size:13px;font-family:var(--sans);outline:none}
.kw-inp:focus{border-color:var(--accent)}
.kw-add-ok{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:var(--sans)}

.kw-custom-inp{border:1.5px solid var(--line);border-radius:20px;padding:5px 14px;font-size:13px;font-family:var(--sans);outline:none;width:130px;color:var(--text)}
.kw-custom-inp:focus{border-color:var(--accent)}
.kw-custom-btn{background:transparent;border:1.5px solid var(--line);border-radius:20px;padding:5px 14px;font-size:13px;cursor:pointer;color:var(--text);font-family:var(--sans)}
.kw-custom-btn:hover{border-color:var(--accent);color:var(--accent)}

.fp-apply{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}

/* ── MAIN ── */
.main{padding:82px 32px 60px;min-height:100vh;transition:padding-top .2s}

/* ── DROP ZONE ── */
.drop-zone{background:#fff;border-radius:var(--radius);box-shadow:0 2px 16px rgba(10,22,40,.06);
  padding:120px 40px;text-align:center;border:2px dashed #d1d9e6;
  transition:border-color .25s,background .25s;user-select:none}
.drop-zone.drag-over{border-color:var(--accent);background:rgba(26,86,219,.04)}
.dz-icon{font-size:52px;display:block;margin-bottom:20px;transition:transform .3s}
.drop-zone.drag-over .dz-icon{transform:scale(1.15) translateY(-4px)}
.dz-main{font-family:var(--serif);font-size:24px;color:var(--soft);margin-bottom:10px;font-weight:400;transition:color .25s}
.drop-zone.drag-over .dz-main{color:var(--accent)}
.dz-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.dz-or{font-size:12px;color:var(--muted);margin-bottom:10px}
.dz-btn{display:inline-block;padding:10px 28px;background:var(--accent);color:#fff;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.dz-btn:hover{background:#1446b8}
.dz-btn input{position:absolute;left:-9999px;opacity:0;width:1px;height:1px}

/* ── SUMMARY ── */
.summary-card{background:#fff;border-radius:var(--radius);box-shadow:0 2px 16px rgba(10,22,40,.06);
  padding:24px 32px;margin-bottom:14px}
.sum-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--line);
  border-radius:10px;overflow:hidden;margin-top:0}
.sum-cell{background:#fff;padding:16px 18px}
.sum-lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
.sum-num{font-family:var(--serif);font-size:28px;font-weight:400}
.sum-sub{font-size:11px;color:var(--muted);margin-top:2px}
.c-pass .sum-num{color:var(--accent)}
.c-excl .sum-num{color:var(--red)}
.c-s .sum-num{color:var(--gold)}
.c-a .sum-num{color:var(--accent)}
.c-b .sum-num{color:var(--muted)}
.c-rate .sum-num{color:var(--green)}

/* ── TABLE CARD ── */
.table-card{background:#fff;border-radius:var(--radius);box-shadow:0 2px 16px rgba(10,22,40,.06);
  overflow:hidden;margin-bottom:14px}
.tc-head{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--line)}
.tc-title{font-size:13px;font-weight:600;color:var(--soft);letter-spacing:.08em;text-transform:uppercase}
.tc-hint{font-size:12px;color:var(--muted)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  padding:11px 20px;text-align:left;border-bottom:1px solid var(--line);
  cursor:pointer;white-space:nowrap;user-select:none;font-weight:600;transition:color .2s}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--accent)}
thead th.sorted.asc::after{content:' ↑'}
thead th.sorted.desc::after{content:' ↓'}
tbody tr{border-bottom:1px solid rgba(10,22,40,.04);transition:background .15s}
tbody tr:hover{background:rgba(26,86,219,.025)}
tbody td{padding:12px 20px;font-size:14px;color:var(--text);vertical-align:middle}
.td-soft{font-size:13px;color:var(--soft)}
.td-hi{color:var(--accent);font-weight:700}
.badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:20px;font-size:11px;font-weight:700;border-radius:4px}
.badge-s{border:1.5px solid var(--gold);color:var(--gold)}
.badge-a{border:1.5px solid var(--accent);color:var(--accent)}
.badge-b{border:1.5px solid #cbd5e1;color:var(--muted)}

/* ── PAGINATION ── */
.pag{display:flex;align-items:center;justify-content:flex-end;gap:16px;
  padding:13px 28px;font-size:13px;color:var(--soft);border-top:1px solid var(--line)}
.pag-btn{cursor:pointer;transition:color .2s;user-select:none;font-weight:500}
.pag-btn:hover:not(.dis){color:var(--accent)}
.pag-btn.dis{opacity:.3;cursor:default}
.pag-info{font-family:var(--serif);font-size:14px;color:var(--text)}

/* ── EXPORT BAR ── */
.export-bar{display:flex;gap:10px}
.btn-exp-main{flex:1;background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:13px 0;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);letter-spacing:.04em}
.btn-exp-main:hover{background:#1446b8}
.btn-exp-sec{background:#fff;color:var(--soft);border:1.5px solid #e2e8f0;border-radius:10px;
  padding:12px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);white-space:nowrap}
.btn-exp-sec:hover{border-color:#cbd5e1;color:var(--text)}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <span class="nav-brand">AUDIENCE · FILTER</span>
  <span class="nav-dot"></span>
  <span class="nav-sub">人群质量筛选</span>
  <a href="/08/portfolio/" class="nav-back">← 返回工具集</a>
</nav>

<!-- ACTION BAR (fixed, appears after upload) -->
<div class="action-bar" id="actionBar">
  <div class="ab-file">
    <span class="ab-dot"></span>
    <span class="ab-name" id="abName"></span>
    <span class="ab-rows" id="abRows"></span>
    <span class="ab-reup" id="abReup">↺ 重新上传</span>
  </div>
  <div class="ab-right">
    <button class="btn btn-filter-toggle" id="btnFilterToggle">调整筛选 <span class="arrow">▾</span></button>
    <button class="btn btn-ghost" id="btnExclude2">导出排除名单</button>
    <button class="btn btn-primary" id="btnExport2">⬇ 导出结果</button>
  </div>
</div>

<!-- FILTER PANEL (collapsible) -->
<div class="filter-panel" id="filterPanel">
  <!-- Row 1: Sliders + Checkboxes -->
  <div class="fp-row">
    <span class="fp-label">参数</span>
    <div class="sl"><span class="sl-lbl">CES有效 ≥</span><input type="range" id="cesMinSlider" min="0" max="200" step="5" value="0"><span class="sl-val" id="cesMinVal">0</span></div>
    <div class="sl"><span class="sl-lbl">转化率 ≥</span><input type="range" id="cesSlider" min="0" max="5" step="0.1" value="0"><span class="sl-val" id="cesVal">0%</span></div>
    <div class="sl"><span class="sl-lbl">笔记最少</span><input type="range" id="notesMinSlider" min="0" max="200" step="5" value="0"><span class="sl-val" id="notesMinVal">0</span></div>
    <div class="sl"><span class="sl-lbl">笔记最多</span><input type="range" id="notesMaxSlider" min="100" max="2000" step="50" value="2000"><span class="sl-val" id="notesMaxVal">不限</span></div>
    <label class="ck"><input type="checkbox" id="ruleNeg" checked>排除负向处置</label>
    <label class="ck"><input type="checkbox" id="ruleStatus" checked>排除异常账号</label>
    <label class="ck"><input type="checkbox" id="ruleZeroCes" checked>排除CES为0</label>
  </div>
  <!-- Row 2: Keywords -->
  <div class="fp-row">
    <span class="fp-label">商业词</span>
    <div class="kw-group" id="grp0"><div class="kw-group-btn" onclick="toggleGroup(0)">旅行社/地接 <span class="kw-cnt" id="gc0">0</span><span class="kw-arr">▾</span></div><div class="kw-drop" id="gd0"></div></div>
    <div class="kw-group" id="grp1"><div class="kw-group-btn" onclick="toggleGroup(1)">住宿类 <span class="kw-cnt" id="gc1">0</span><span class="kw-arr">▾</span></div><div class="kw-drop" id="gd1"></div></div>
    <div class="kw-group" id="grp2"><div class="kw-group-btn" onclick="toggleGroup(2)">票务/平台 <span class="kw-cnt" id="gc2">0</span><span class="kw-arr">▾</span></div><div class="kw-drop" id="gd2"></div></div>
    <div class="kw-group" id="grp3"><div class="kw-group-btn" onclick="toggleGroup(3)">商业通用 <span class="kw-cnt" id="gc3">0</span><span class="kw-arr">▾</span></div><div class="kw-drop" id="gd3"></div></div>
    <div class="kw-group" id="grp4"><div class="kw-group-btn" onclick="toggleGroup(4)">英文 <span class="kw-cnt" id="gc4">0</span><span class="kw-arr">▾</span></div><div class="kw-drop" id="gd4"></div></div>
    <input class="kw-custom-inp" id="kwInput" placeholder="自定义关键词…" maxlength="20">
    <button class="kw-custom-btn" id="kwAddBtn">添加</button>
  </div>
  <div class="fp-apply">
    <button class="btn btn-primary" id="btnRefilter">立即刷新</button>
    <span style="font-size:12px;color:var(--muted)">滑块/勾选框调整后自动实时更新</span>
  </div>
</div>

<!-- MAIN -->
<main class="main" id="mainArea">

  <!-- DROP ZONE -->
  <div class="drop-zone" id="dropZone">
    <span class="dz-icon">📂</span>
    <div class="dz-main">将达人名单拖入此处</div>
    <div class="dz-sub">自动解析并筛选 · 支持 .xlsx .xls .csv</div>
    <div class="dz-or">或</div>
    <label class="dz-btn">
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
      点击选择文件
    </label>
  </div>

  <!-- RESULTS -->
  <div id="resultArea" style="display:none">

    <!-- Summary -->
    <div class="summary-card">
      <div class="sum-grid">
        <div class="sum-cell c-pass"><div class="sum-lbl">通过人数</div><div class="sum-num" id="numPass">—</div><div class="sum-sub">进入备选池</div></div>
        <div class="sum-cell c-excl"><div class="sum-lbl">排除人数</div><div class="sum-num" id="numExcl">—</div><div class="sum-sub">商业/异常/违规</div></div>
        <div class="sum-cell c-s"><div class="sum-lbl">S 优质</div><div class="sum-num" id="numS">—</div><div class="sum-sub">CES≥150，笔记30-300</div></div>
        <div class="sum-cell c-a"><div class="sum-lbl">A 推荐</div><div class="sum-num" id="numA">—</div><div class="sum-sub">CES≥80</div></div>
        <div class="sum-cell c-b"><div class="sum-lbl">B 备选</div><div class="sum-num" id="numB">—</div><div class="sum-sub">其余通过者</div></div>
        <div class="sum-cell c-rate"><div class="sum-lbl">通过率</div><div class="sum-num" id="numRate">—</div><div class="sum-sub">占原始名单比例</div></div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="tc-head">
        <span class="tc-title">通过名单</span>
        <span class="tc-hint">点击列标题排序</span>
      </div>
      <div class="tbl-wrap">
        <table><thead id="tblHead"></thead><tbody id="tblBody"></tbody></table>
      </div>
      <div class="pag" id="pagination"></div>
    </div>

    <!-- Export bar (bottom) -->
    <div class="export-bar">
      <button class="btn-exp-main" id="btnExport">⬇ 导出筛选结果（.xlsx）</button>
      <button class="btn-exp-sec" id="btnExclude">导出排除名单</button>
    </div>

  </div>
</main>

<script>
/* ── STATE ── */
var ALL_DATA=[],FILTERED=[],EXCLUDED=[];
var PAGE=1,PAGE_SIZE=20,SORT_COL='',SORT_ASC=false;

/* ── KEYWORD GROUPS ── */
var KW_GROUPS=[
  {name:'旅行社/地接',words:['旅行社','旅游社','旅游局','地接','地接社','定制游','精品定制','旅策','旅游服务','服务中心','包车','包车游','包车服务','拼车','司导','跃行','车轮上','包团']},
  {name:'住宿类',words:['民宿','客栈','酒店','公寓','度假村','包栋','别墅','寓','旅馆','旅館']},
  {name:'票务/平台',words:['游轮','票务','票务代理','代理','代购','团购','ota','携程','途牛','飞猪','去哪儿','途途','开荒','景区','门票','观光']},
  {name:'商业通用',words:['官方','官号','官博','机构','店铺','商家','企业','品牌','招商','广告','推广','营销','专营','旗舰','批发','直销','旅游']},
  {name:'英文',words:['inn','hostel','hotel','resort','travel agency','tour','tours','guide']}
];
function allKw(){var a=[];KW_GROUPS.forEach(function(g){g.words.forEach(function(w){a.push(w);});});return a;}

/* ── HELPERS ── */
function parseCes(v){return parseFloat(String(v||'0').replace('%',''))||0}
function getCesT(){return parseFloat(document.getElementById('cesSlider').value)||0}
function getCesMin(){return parseInt(document.getElementById('cesMinSlider').value)||0}
function getNotesMin(){return parseInt(document.getElementById('notesMinSlider').value)||0}
function getNotesMax(){var v=parseInt(document.getElementById('notesMaxSlider').value);return v>=2000?999999:v}
function fmtN(n){var v=parseInt(n)||0;return v>=10000?(v/10000).toFixed(1)+'w':v>=1000?(v/1000).toFixed(1)+'k':String(v)}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getGrade(r){var ces=parseInt(r['CES超100有效笔记数']||0),notes=parseInt(r['笔记发布总数']||0);if(ces>=150&&notes>=30&&notes<=300)return 'S';if(ces>=80)return 'A';return 'B';}

/* ── FILTER ── */
var EXCL_VERT_SET={};
function filterRow(r){
  if(document.getElementById('ruleNeg').checked&&r['命中负向处置']==='是')return '负向处置';
  if(document.getElementById('ruleStatus').checked&&r['账号状态']&&r['账号状态']!=='NORMAL')return '账号异常';
  var nick=String(r['昵称']||'').toLowerCase(),xid=String(r['小红书号']||'').toLowerCase();
  var kws=allKw();
  for(var i=0;i<kws.length;i++){if(nick.indexOf(kws[i])>=0||xid.indexOf(kws[i])>=0)return '商业机构';}
  var ces=parseInt(r['CES超100有效笔记数']||0);
  if(document.getElementById('ruleZeroCes').checked&&ces===0)return 'CES为0';
  var cesMin=getCesMin();if(cesMin>0&&ces<cesMin)return 'CES<'+cesMin;
  var notes=parseInt(r['笔记发布总数']||0),nMin=getNotesMin(),nMax=getNotesMax();
  if(nMin>0&&notes<nMin)return '笔记<'+nMin;
  if(nMax<999999&&notes>nMax)return '笔记>'+nMax;
  if(parseCes(r['近7天CES转化率'])<getCesT())return '转化率低';
  if(EXCL_VERT_SET[String(r['作者垂类']||'').trim()])return '垂类排除';
  return null;
}

function runFilter(){
  FILTERED=[];EXCLUDED=[];
  ALL_DATA.forEach(function(r){
    var reason=filterRow(r);
    if(reason){r._exclReason=reason;EXCLUDED.push(r);}else FILTERED.push(r);
  });
  PAGE=1;SORT_COL='';SORT_ASC=false;

  var s=0,a=0,b=0;
  FILTERED.forEach(function(r){var g=getGrade(r);r._grade=g;if(g==='S')s++;else if(g==='A')a++;else b++;});
  document.getElementById('numPass').textContent=FILTERED.length;
  document.getElementById('numExcl').textContent=EXCLUDED.length;
  document.getElementById('numS').textContent=s;
  document.getElementById('numA').textContent=a;
  document.getElementById('numB').textContent=b;
  document.getElementById('numRate').textContent=ALL_DATA.length>0?Math.round(FILTERED.length/ALL_DATA.length*100)+'%':'—';

  document.getElementById('dropZone').style.display='none';
  document.getElementById('resultArea').style.display='block';
  document.getElementById('actionBar').classList.add('show');
  adjustMain();
  renderTable();
}

/* ── FILE HANDLING ── */
function handleFile(file){
  if(!file)return;
  var ext=(file.name||'').split('.').pop().toLowerCase();
  if(['xlsx','xls','csv'].indexOf(ext)<0){alert('请上传 .xlsx .xls 或 .csv 文件');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      ALL_DATA=XLSX.utils.sheet_to_json(ws,{defval:''});
      document.getElementById('abName').textContent=file.name;
      document.getElementById('abRows').textContent=ALL_DATA.length+' 条';
      runFilter();
    }catch(err){alert('解析失败: '+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

/* ── DRAG & DROP ── */
var dz=document.getElementById('dropZone');
dz.addEventListener('dragover',function(e){e.preventDefault();e.stopPropagation();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',function(e){e.stopPropagation();dz.classList.remove('drag-over');});
dz.addEventListener('drop',function(e){e.preventDefault();e.stopPropagation();dz.classList.remove('drag-over');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0]);});
var bN=0;
document.body.addEventListener('dragenter',function(e){e.preventDefault();bN++;if(ALL_DATA.length===0)dz.classList.add('drag-over');});
document.body.addEventListener('dragleave',function(){bN--;if(bN<=0){bN=0;dz.classList.remove('drag-over');}});
document.body.addEventListener('dragover',function(e){e.preventDefault();});
document.body.addEventListener('drop',function(e){e.preventDefault();bN=0;dz.classList.remove('drag-over');if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0]);});
document.getElementById('fileInput').addEventListener('change',function(){if(this.files&&this.files.length){handleFile(this.files[0]);this.value='';}});

/* ── REUPLOAD ── */
document.getElementById('abReup').addEventListener('click',function(){
  ALL_DATA=[];FILTERED=[];EXCLUDED=[];PAGE=1;
  document.getElementById('dropZone').style.display='';
  document.getElementById('resultArea').style.display='none';
  document.getElementById('actionBar').classList.remove('show');
  closeFilterPanel();adjustMain();
});

/* ── FILTER PANEL TOGGLE ── */
var filterOpen=false;
function closeFilterPanel(){filterOpen=false;document.getElementById('filterPanel').classList.remove('show');document.getElementById('btnFilterToggle').classList.remove('open');adjustMain();}
document.getElementById('btnFilterToggle').addEventListener('click',function(){
  filterOpen=!filterOpen;
  document.getElementById('filterPanel').classList.toggle('show',filterOpen);
  this.classList.toggle('open',filterOpen);
  adjustMain();
});
document.getElementById('btnRefilter').addEventListener('click',function(){runFilter();});
document.addEventListener('click',function(e){
  if(filterOpen&&!e.target.closest('#filterPanel')&&!e.target.closest('#btnFilterToggle')&&!e.target.closest('.kw-drop'))
    closeFilterPanel();
});

/* ── SLIDERS (实时筛选) ── */
var refilterTimer=null;
function scheduleRefilter(){if(!ALL_DATA.length)return;clearTimeout(refilterTimer);refilterTimer=setTimeout(function(){runFilter();},300);}
document.getElementById('cesSlider').addEventListener('input',function(){document.getElementById('cesVal').textContent=parseFloat(this.value).toFixed(1)+'%';scheduleRefilter();});
document.getElementById('cesMinSlider').addEventListener('input',function(){document.getElementById('cesMinVal').textContent=this.value;scheduleRefilter();});
document.getElementById('notesMinSlider').addEventListener('input',function(){document.getElementById('notesMinVal').textContent=this.value;scheduleRefilter();});
document.getElementById('notesMaxSlider').addEventListener('input',function(){document.getElementById('notesMaxVal').textContent=parseInt(this.value)>=2000?'不限':this.value;scheduleRefilter();});
['ruleNeg','ruleStatus','ruleZeroCes'].forEach(function(id){document.getElementById(id).addEventListener('change',function(){scheduleRefilter();});});

/* ── KEYWORD GROUPS ── */
var openGroup=-1;
function toggleGroup(idx){if(openGroup===idx){closeAllGroups();return;}closeAllGroups();openGroup=idx;document.getElementById('gd'+idx).classList.add('show');document.querySelector('#grp'+idx+' .kw-group-btn').classList.add('active');}
function closeAllGroups(){for(var i=0;i<KW_GROUPS.length;i++){document.getElementById('gd'+i).classList.remove('show');document.querySelector('#grp'+i+' .kw-group-btn').classList.remove('active');}openGroup=-1;}
document.addEventListener('click',function(e){if(!e.target.closest('.kw-group'))closeAllGroups();});

function renderGroups(){
  KW_GROUPS.forEach(function(g,idx){
    document.getElementById('gc'+idx).textContent=g.words.length;
    var dd=document.getElementById('gd'+idx);
    var tags=g.words.map(function(w,wi){return '<span class="kw-tag">'+escHtml(w)+'<span class="kw-del" data-gi="'+idx+'" data-wi="'+wi+'">×</span></span>';}).join('');
    dd.innerHTML='<div class="kw-tags">'+tags+'</div><div class="kw-add-row"><input class="kw-inp" placeholder="添加…" maxlength="20" data-gi="'+idx+'"><button class="kw-add-ok" data-gi="'+idx+'">添加</button></div>';
    dd.querySelectorAll('.kw-del').forEach(function(el){el.addEventListener('click',function(){KW_GROUPS[parseInt(this.dataset.gi)].words.splice(parseInt(this.dataset.wi),1);renderGroups();});});
    dd.querySelectorAll('.kw-add-ok').forEach(function(el){el.addEventListener('click',function(){var gi=parseInt(this.dataset.gi),inp=dd.querySelector('.kw-inp'),v=inp.value.trim();if(v&&KW_GROUPS[gi].words.indexOf(v)<0){KW_GROUPS[gi].words.push(v);renderGroups();inp.value='';}});});
    dd.querySelectorAll('.kw-inp').forEach(function(inp){inp.addEventListener('keydown',function(e){if(e.key==='Enter')dd.querySelector('.kw-add-ok').click();});});
  });
}
document.getElementById('kwAddBtn').addEventListener('click',function(){var v=document.getElementById('kwInput').value.trim();if(v){var found=false;KW_GROUPS.forEach(function(g){if(g.words.indexOf(v)>=0)found=true;});if(!found){KW_GROUPS[3].words.push(v);renderGroups();}document.getElementById('kwInput').value='';}});
document.getElementById('kwInput').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('kwAddBtn').click();});

/* ── TABLE ── */
var COLS=[{key:'昵称',label:'NICKNAME'},{key:'粉丝数',label:'FANS'},{key:'笔记发布总数',label:'NOTES'},{key:'CES超100有效笔记数',label:'CES'},{key:'近7天CES转化率',label:'RATE'},{key:'_grade',label:'GRADE'}];
function renderTable(){
  var hrow='<tr>';
  COLS.forEach(function(c){var cls=SORT_COL===c.key?('sorted '+(SORT_ASC?'asc':'desc')):'';hrow+='<th data-col="'+c.key+'" class="'+cls+'">'+c.label+'</th>';});
  document.getElementById('tblHead').innerHTML=hrow+'</tr>';
  document.getElementById('tblHead').querySelectorAll('th').forEach(function(th){th.addEventListener('click',function(){var col=this.dataset.col;if(SORT_COL===col)SORT_ASC=!SORT_ASC;else{SORT_COL=col;SORT_ASC=true;}PAGE=1;renderTable();});});
  var sorted=FILTERED.slice();
  if(SORT_COL){sorted.sort(function(a,b){var va=SORT_COL==='_grade'?getGrade(a):a[SORT_COL];var vb=SORT_COL==='_grade'?getGrade(b):b[SORT_COL];var na=parseFloat(String(va).replace('%',''))||0,nb=parseFloat(String(vb).replace('%',''))||0;if(!isNaN(na)&&!isNaN(nb))return SORT_ASC?na-nb:nb-na;return SORT_ASC?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));});}
  var start=(PAGE-1)*PAGE_SIZE,pd=sorted.slice(start,start+PAGE_SIZE);
  var html='';
  pd.forEach(function(r){var g=getGrade(r),rate=parseCes(r['近7天CES转化率']);html+='<tr><td>'+escHtml(r['昵称']||'')+'</td><td class="td-soft">'+fmtN(r['粉丝数'])+'</td><td class="td-soft">'+escHtml(r['笔记发布总数'])+'</td><td class="td-soft">'+escHtml(r['CES超100有效笔记数'])+'</td><td class="td-soft'+(rate>2?' td-hi':'')+'">'+( rate?rate.toFixed(1)+'%':'—')+'</td><td><span class="badge badge-'+g.toLowerCase()+'">'+g+'</span></td></tr>';});
  document.getElementById('tblBody').innerHTML=html;
  var totalPages=Math.ceil(sorted.length/PAGE_SIZE)||1;
  document.getElementById('pagination').innerHTML='<span class="pag-btn'+(PAGE<=1?' dis':'')+'" id="pgPrev">← 上一页</span><span class="pag-info">'+PAGE+' / '+totalPages+'</span><span class="pag-btn'+(PAGE>=totalPages?' dis':'')+'" id="pgNext">下一页 →</span>';
  document.getElementById('pgPrev').onclick=function(){if(PAGE>1){PAGE--;renderTable();}};
  document.getElementById('pgNext').onclick=function(){if(PAGE<totalPages){PAGE++;renderTable();}};
}

/* ── EXPORT ── */
function doExp(excl){
  var data=excl?EXCLUDED:FILTERED;if(!data.length)return;
  var rows=data.map(function(r){var obj={};Object.keys(r).forEach(function(k){if(k!=='_grade'&&k!=='_exclReason')obj[k]=r[k];});obj['KOC评级']=getGrade(r)+'级';if(excl)obj['排除原因']=r._exclReason||'';return obj;});
  if(!excl){var go={'S级':0,'A级':1,'B级':2};rows.sort(function(a,b){return(go[a['KOC评级']]||9)-(go[b['KOC评级']]||9);});}
  var ws=XLSX.utils.json_to_sheet(rows),wb2=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb2,ws,excl?'排除名单':'KOC筛选结果');
  XLSX.writeFile(wb2,(excl?'排除名单_':'KOC筛选结果_')+new Date().toISOString().slice(0,10)+'.xlsx');
}
['btnExport','btnExport2'].forEach(function(id){document.getElementById(id).addEventListener('click',function(){doExp(false);});});
['btnExclude','btnExclude2'].forEach(function(id){document.getElementById(id).addEventListener('click',function(){doExp(true);});});

/* ── LAYOUT ── */
function adjustMain(){
  var ab=document.getElementById('actionBar');
  var fp=document.getElementById('filterPanel');
  var navH=54;
  var abH=ab.classList.contains('show')?ab.getBoundingClientRect().height:0;
  var fpH=fp.classList.contains('show')?fp.scrollHeight:0;
  var top=navH+abH+fpH+16;
  document.getElementById('mainArea').style.paddingTop=top+'px';
  if(fp.classList.contains('show'))fp.style.top=(navH+abH)+'px';
}
adjustMain();
window.addEventListener('resize',adjustMain);

/* ── INIT ── */
renderGroups();
</script>
