<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>人群质量筛选器</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--bg2:#f9f9fb;--blue:#4f46e5;--bl:rgba(79,70,229,.07);--blb:rgba(79,70,229,.18);--text:#0f0f23;--soft:#6b7280;--muted:#9ca3af;--bd:rgba(0,0,0,.08);--sh:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);--r:12px;--pill:999px;--font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif}
body{font-family:var(--font);background:var(--bg2);color:var(--text);-webkit-font-smoothing:antialiased}
/* nav */
.nav{height:48px;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:100}
.nav .back{font-size:14px;color:var(--soft);font-weight:600;text-decoration:none;transition:color .15s}
.nav .back:hover{color:var(--text)}
.nav .ntag{margin-left:auto;font-size:10px;letter-spacing:.06em;color:var(--blue);background:var(--bl);border:1px solid var(--blb);padding:3px 10px;border-radius:var(--pill)}
/* hero */
.hero{padding:72px 32px 20px;max-width:1100px;margin:0 auto}
.hero-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em;margin-bottom:8px}
.hero h1{font-size:28px;font-weight:800;letter-spacing:-.04em;color:var(--text);margin-bottom:6px}
.hero p{font-size:14px;color:var(--soft);line-height:1.6}
/* main */
.main{max-width:1100px;margin:0 auto;padding:8px 32px 80px;display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}
/* left panel */
.lpanel{background:#fff;border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;position:sticky;top:56px}
.sec{border-top:1px solid var(--bd)}
.sec:first-child{border-top:none}
.sec-hd{padding:11px 16px;display:flex;align-items:center;cursor:pointer;user-select:none}
.sec-hd:hover{background:var(--bg2)}
.sec-title{font-size:12px;font-weight:700;color:var(--text)}
.sec-badge{margin-left:auto;font-size:10px;color:var(--soft)}
.sec-chevron{margin-left:8px;color:var(--muted);transition:transform .2s}
.sec.collapsed .sec-chevron{transform:rotate(-90deg)}
.sec.collapsed .sec-body{display:none}
.sec-body{padding:0 16px 14px}
/* dropzone */
#dz{border:1.5px dashed rgba(0,0,0,.12);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .15s}
#dz:hover,#dz.over{border-color:var(--blue)}
.dz-icon{width:36px;height:36px;background:var(--bl);border-radius:9px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;color:var(--blue)}
.dz-text{font-size:13px;color:var(--soft)}
.dz-text b{color:var(--text)}
.dz-hint{font-size:11px;color:var(--muted);margin-top:4px}
#fi{display:none}
/* progress */
#pgWrap{display:none;margin-top:12px}
.pg-label{display:flex;justify-content:space-between;font-size:11px;color:var(--soft);margin-bottom:4px}
.pg-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.pg-fill{height:100%;background:var(--blue);border-radius:2px;transition:width .15s}
/* file info */
#fileInfo{display:none;background:var(--bl);border:1px solid var(--blb);border-radius:8px;padding:8px 10px;font-size:12px;margin-top:12px;color:var(--text)}
#fileInfo b{font-weight:600}
/* range slider */
.slider-row{display:flex;align-items:center;gap:12px;margin-top:6px}
.slider-row input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:var(--bg2);border-radius:2px;outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--blue);border-radius:50%;cursor:pointer;box-shadow:0 1px 4px rgba(79,70,229,.3)}
#cesVal{font-size:13px;font-weight:700;color:var(--blue);min-width:36px;text-align:right}
.slider-desc{font-size:11px;color:var(--muted);margin-top:6px}
/* checkbox */
.ck{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;color:var(--text);cursor:pointer}
.ck input{display:none}
.ck-box{width:16px;height:16px;border:1.5px solid rgba(0,0,0,.15);border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.ck input:checked+.ck-box{background:var(--blue);border-color:var(--blue)}
.ck input:checked+.ck-box svg{opacity:1}
.ck-box svg{width:10px;height:10px;opacity:0;transition:opacity .15s}
/* number input */
.num-row{display:flex;align-items:center;gap:8px;margin-top:6px}
.num-row input[type=number]{width:60px;padding:4px 8px;border:1px solid var(--bd);border-radius:6px;font-size:13px;font-family:var(--font);outline:none;background:var(--bg2)}
.num-row input[type=number]:focus{border-color:var(--blue)}
.num-row span{font-size:13px;color:var(--soft)}
/* kw tags */
#kwTags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.kw-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--pill);font-size:11px;color:var(--text)}
.kw-tag .kw-x{cursor:pointer;color:var(--muted);font-size:14px;line-height:1}
.kw-tag .kw-x:hover{color:var(--text)}
.kw-add{display:flex;gap:6px}
.kw-add input{flex:1;padding:6px 10px;border:1px solid var(--bd);border-radius:6px;font-size:12px;font-family:var(--font);outline:none}
.kw-add input:focus{border-color:var(--blue)}
.kw-add button{padding:6px 12px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}
.kw-add button:hover{opacity:.9}
/* vertical list */
.vert-ctrl{display:flex;gap:8px;margin-bottom:8px}
.vert-ctrl button{padding:3px 10px;border:1px solid var(--bd);border-radius:var(--pill);font-size:11px;background:var(--bg2);cursor:pointer;color:var(--soft);font-family:var(--font)}
.vert-ctrl button:hover{border-color:var(--blue);color:var(--blue)}
#vertList{max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
/* est card */
#estCard{display:none;padding:14px 16px;border-top:1px solid var(--bd)}
.est-row{display:flex;gap:8px;margin-bottom:10px}
.est-mini{flex:1;padding:10px;background:var(--bg2);border-radius:8px;text-align:center}
.est-mini .est-n{font-size:22px;font-weight:800;color:var(--text)}
.est-mini .est-l{font-size:10px;color:var(--muted);margin-top:2px}
.est-mini.keep .est-n{color:#10b981}
.est-mini.drop .est-n{color:#ef4444}
#estDetail{margin-bottom:12px}
.est-line{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--soft);padding:2px 0}
.est-bar{flex:1;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.est-bar-fill{height:100%;background:var(--blue);border-radius:2px}
.est-cnt{min-width:24px;text-align:right;font-weight:600}
#btnFilter{width:100%;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .15s}
#btnFilter:hover{opacity:.9}
#btnFilter:disabled{opacity:.4;cursor:not-allowed}
/* right panel */
.rpanel{min-height:400px}
/* skeleton */
.skel{background:#f0f0f5;border-radius:12px;height:180px}
.skel+.skel{margin-top:12px}
.skel+.skel+.skel{margin-top:12px}
/* result */
.summary-row{display:flex;gap:10px;margin-bottom:14px}
.sum-card{flex:1;padding:16px;background:#fff;border:1px solid var(--bd);border-radius:var(--r)}
.sum-card .sum-n{font-size:26px;font-weight:800;color:var(--text)}
.sum-card .sum-l{font-size:11px;color:var(--muted);margin-top:2px}
.sum-card.green .sum-n{color:#10b981}
.sum-card.red .sum-n{color:#ef4444}
.analysis-card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:14px}
.analysis-card h3{font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px}
.analysis-line{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--soft);padding:3px 0}
.analysis-bar{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden}
.analysis-bar-fill{height:100%;background:var(--blue);border-radius:3px}
.analysis-cnt{min-width:28px;text-align:right;font-weight:700;color:var(--text)}
/* table */
.tbl-wrap{background:#fff;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:8px 12px;background:var(--bg2);border-bottom:1.5px solid var(--bd);font-size:11px;font-weight:700;color:var(--soft);cursor:pointer;text-align:left;white-space:nowrap;user-select:none}
.tbl th:hover{color:var(--text)}
.tbl th .sort-arrow{margin-left:4px;font-size:10px;opacity:.5}
.tbl th.sorted .sort-arrow{opacity:1;color:var(--blue)}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--bd)}
.tbl tr:hover td{background:var(--bl)}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;font-size:12px;color:var(--soft)}
.pagination button{padding:5px 12px;border:1px solid var(--bd);border-radius:6px;background:#fff;cursor:pointer;font-family:var(--font);font-size:12px;color:var(--text)}
.pagination button:hover{border-color:var(--blue);color:var(--blue)}
.pagination button:disabled{opacity:.3;cursor:not-allowed}
/* export */
.export-row{display:flex;gap:10px}
.export-btn{flex:1;padding:10px;background:#fff;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--text);color:var(--text);transition:border-color .15s}
.export-btn:hover{border-color:var(--blue);color:var(--blue)}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .empty-icon{font-size:40px;margin-bottom:12px}
.empty-state p{font-size:13px}
</style>
</head>
<body>

<!-- nav -->
<nav class="nav">
  <a href="/08/portfolio/" class="back">← 产品运营工具集</a>
  <span class="ntag">日常提效</span>
</nav>

<!-- hero -->
<div class="hero">
  <div class="hero-label">日常提效 · 工具 D1</div>
  <h1>人群质量筛选器</h1>
  <p>上传后台导出的达人名单，智能过滤低活跃、商业账号、负向处置用户，导出精准人群。</p>
</div>

<!-- main -->
<div class="main">
  <!-- left panel -->
  <div class="lpanel" id="lPanel">

    <!-- 文件上传 -->
    <div class="sec" id="secFile">
      <div class="sec-hd" onclick="toggleSec('secFile')">
        <span class="sec-title">文件上传</span>
        <span class="sec-badge" id="secFileBadge"></span>
        <svg class="sec-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="sec-body">
        <div id="dz" onclick="fi.click()">
          <div class="dz-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <div class="dz-text"><b>点击或拖拽上传</b></div>
          <div class="dz-hint">.xlsx 格式</div>
        </div>
        <input type="file" id="fi" accept=".xlsx,.xls" onchange="if(this.files.length)handleFile(this.files[0])">
        <div id="pgWrap">
          <div class="pg-label"><span>解析中</span><span id="pgPct">0%</span></div>
          <div class="pg-bar"><div class="pg-fill" id="pgFill" style="width:0%"></div></div>
        </div>
        <div id="fileInfo"></div>
      </div>
    </div>

    <!-- 活跃度过滤 -->
    <div class="sec" id="secActivity" style="opacity:.45;pointer-events:none">
      <div class="sec-hd" onclick="toggleSec('secActivity')">
        <span class="sec-title">活跃度过滤</span>
        <span class="sec-badge" id="secActivityBadge"></span>
        <svg class="sec-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="sec-body">
        <div class="slider-row">
          <input type="range" id="cesSlider" min="0" max="5" step="0.1" value="1.0" oninput="onSlider()">
          <span id="cesVal">1.0%</span>
        </div>
        <div class="slider-desc">「近7天CES转化率」低于此值将排除</div>
      </div>
    </div>

    <!-- 账号过滤 -->
    <div class="sec" id="secAccount" style="opacity:.45;pointer-events:none">
      <div class="sec-hd" onclick="toggleSec('secAccount')">
        <span class="sec-title">账号过滤</span>
        <span class="sec-badge" id="secAccountBadge"></span>
        <svg class="sec-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="sec-body">
        <label class="ck"><input type="checkbox" id="ckNormal" checked onchange="updateEst()"><span class="ck-box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>仅保留NORMAL状态账号</label>
        <label class="ck"><input type="checkbox" id="ckNeg" checked onchange="updateEst()"><span class="ck-box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>排除命中负向处置用户</label>
      </div>
    </div>

    <!-- 内容质量 -->
    <div class="sec" id="secQuality" style="opacity:.45;pointer-events:none">
      <div class="sec-hd" onclick="toggleSec('secQuality')">
        <span class="sec-title">内容质量</span>
        <span class="sec-badge" id="secQualityBadge"></span>
        <svg class="sec-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="sec-body">
        <div class="num-row">
          <span>笔记发布总数 ≥</span>
          <input type="number" id="minNotes" value="5" min="0" onchange="updateEst()">
        </div>
        <label class="ck" style="margin-top:8px"><input type="checkbox" id="ckZeroCes" checked onchange="updateEst()"><span class="ck-box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>排除CES超100有效笔记数=0的用户</label>
      </div>
    </div>

    <!-- 商业关键词 -->
    <div class="sec" id="secKeyword" style="opacity:.45;pointer-events:none">
      <div class="sec-hd" onclick="toggleSec('secKeyword')">
        <span class="sec-title">商业关键词</span>
        <span class="sec-badge" id="secKeywordBadge"></span>
        <svg class="sec-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="sec-body">
        <div id="kwTags"></div>
        <div class="kw-add">
          <input type="text" id="kwInput" placeholder="输入关键词…" onkeydown="if(event.key==='Enter')addKw()">
          <button onclick="addKw()">添加</button>
        </div>
      </div>
    </div>

    <!-- 垂类过滤 -->
    <div class="sec" id="secVertical" style="opacity:.45;pointer-events:none">
      <div class="sec-hd" onclick="toggleSec('secVertical')">
        <span class="sec-title">垂类过滤</span>
        <span class="sec-badge" id="secVerticalBadge"></span>
        <svg class="sec-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="sec-body">
        <div class="vert-ctrl">
          <button onclick="toggleAllVerts(true)">全选</button>
          <button onclick="toggleAllVerts(false)">取消</button>
        </div>
        <div id="vertList"></div>
      </div>
    </div>

    <!-- 估算卡片 -->
    <div id="estCard">
      <div class="est-row">
        <div class="est-mini keep"><div class="est-n" id="keepN">0</div><div class="est-l">预计保留</div></div>
        <div class="est-mini drop"><div class="est-n" id="dropN">0</div><div class="est-l">预计排除</div></div>
      </div>
      <div id="estDetail"></div>
      <button id="btnFilter" onclick="doFilter()" disabled>开始筛选</button>
    </div>
  </div>

  <!-- right panel -->
  <div class="rpanel" id="rPanel">
    <div class="skel"></div>
    <div class="skel"></div>
    <div class="skel"></div>
  </div>
</div>

<script>
var ALL_DATA=[];
var FILTERED=[];
var EXCLUDED=[];
var PAGE=1;
var PAGE_SIZE=20;
var SORT_COL='';
var SORT_ASC=true;
var KW_LIST=['旅行社','旅游社','团购','代购','广告','招商','官方','机构','店铺','商家','企业','品牌','合作','推广','营销','专营','旗舰','批发','直销','景区','门票','定制游'];
var vertExcluded={};

function toggleSec(id){
  document.getElementById(id).classList.toggle('collapsed');
}

function onSlider(){
  document.getElementById('cesVal').textContent=parseFloat(document.getElementById('cesSlider').value).toFixed(1)+'%';
  updateEst();
}

function enableAll(){
  var ids=['secActivity','secAccount','secQuality','secKeyword','secVertical'];
  for(var i=0;i<ids.length;i++){
    var el=document.getElementById(ids[i]);
    el.style.opacity='1';
    el.style.pointerEvents='auto';
  }
  document.getElementById('btnFilter').disabled=false;
  document.getElementById('secFileBadge').textContent=ALL_DATA.length+' 条记录';
}

function extractVerticals(){
  var vertSet={};
  for(var i=0;i<ALL_DATA.length;i++){
    var v=ALL_DATA[i]['垂直领域']||ALL_DATA[i]['垂直类']||ALL_DATA[i]['category']||ALL_DATA[i]['vertical']||ALL_DATA[i]['垂类']||'未分类';
    if(v)vertSet[v]=true;
  }
  var keys=Object.keys(vertSet).sort();
  var html='';
  for(var i=0;i<keys.length;i++){
    html+='<label class="ck"><input type="checkbox" class="vert-ck" data-v="'+keys[i]+'" checked onchange="updateEst()"><span class="ck-box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>'+esc(keys[i])+'</label>';
  }
  document.getElementById('vertList').innerHTML=html;
  updateEst();
}

function toggleAllVerts(on){
  var cks=document.querySelectorAll('.vert-ck');
  for(var i=0;i<cks.length;i++)cks[i].checked=on;
  updateEst();
}

function renderKw(){
  var html='';
  for(var i=0;i<KW_LIST.length;i++){
    html+='<span class="kw-tag">'+esc(KW_LIST[i])+'<span class="kw-x" onclick="rmKw('+i+')">&times;</span></span>';
  }
  document.getElementById('kwTags').innerHTML=html;
}

function addKw(){
  var input=document.getElementById('kwInput');
  var v=input.value.trim();
  if(v&&KW_LIST.indexOf(v)===-1){
    KW_LIST.push(v);
    input.value='';
    renderKw();
    updateEst();
  }
}

function rmKw(idx){
  KW_LIST.splice(idx,1);
  renderKw();
  updateEst();
}

function esc(s){
  var d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function handleFile(file){
  var pgWrap=document.getElementById('pgWrap');
  var pgPct=document.getElementById('pgPct');
  var pgFill=document.getElementById('pgFill');
  var fileInfo=document.getElementById('fileInfo');
  pgWrap.style.display='block';
  fileInfo.style.display='none';
  var pct=0;
  var iv=setInterval(function(){
    pct+=Math.floor(Math.random()*12)+8;
    if(pct>90)pct=90;
    pgPct.textContent=pct+'%';
    pgFill.style.width=pct+'%';
  },120);
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      clearInterval(iv);
      pct=100;
      pgPct.textContent='100%';
      pgFill.style.width='100%';
      ALL_DATA=rows;
      setTimeout(function(){
        pgWrap.style.display='none';
        fileInfo.style.display='block';
        fileInfo.innerHTML='<b>文件: '+esc(file.name)+'</b> · 共 '+rows.length+' 条记录';
        enableAll();
        extractVerticals();
        updateEst();
      },300);
    }catch(err){
      clearInterval(iv);
      pgWrap.style.display='none';
      alert('解析失败: '+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

// drag & drop
var dz=document.getElementById('dz');
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('over')});
dz.addEventListener('dragleave',function(){dz.classList.remove('over')});
dz.addEventListener('drop',function(e){
  e.preventDefault();
  dz.classList.remove('over');
  if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0]);
});

function filterRow(r){
  var threshold=parseFloat(document.getElementById('cesSlider').value);
  var isNormalOnly=document.getElementById('ckNormal').checked;
  var isExcludeNeg=document.getElementById('ckNeg').checked;
  var minNotes=parseInt(document.getElementById('minNotes').value)||0;
  var zeroCes=document.getElementById('ckZeroCes').checked;
  // CES低活跃
  var ces=parseFloat(r['CES转化率']||r['ces']||r['ces_rate']||0);
  if(ces<threshold)return 'CES低活跃';
  // 非NORMAL状态
  if(isNormalOnly){
    var status=r['账号状态']||r['status']||r['状态']||'';
    if(status&&status!=='NORMAL')return '非NORMAL状态';
  }
  // 命中负向处置
  if(isExcludeNeg){
    var neg=r['命中负向处置']||r['负向处置']||r['neg']||'';
    if(neg&&String(neg)!=='否'&&String(neg)!=='0')return '命中负向处置';
  }
  // 商业关键词
  var nick=String(r['昵称']||r['nickname']||r['达人昵称']||'');
  for(var i=0;i<KW_LIST.length;i++){
    if(nick.indexOf(KW_LIST[i])!==-1)return '商业/广告账号';
  }
  // 笔记数
  var notes=parseInt(r['笔记发布总数']||r['笔记数']||r['notes_count']||0);
  if(notes<minNotes)return '笔记数不足';
  // 零有效CES
  if(zeroCes){
    var ces100=parseInt(r['CES超100有效笔记数']||r['ces_effective_notes']||r['ces_notes']||0);
    if(ces100===0)return '零有效CES笔记';
  }
  // 垂类过滤
  var vert=r['垂直领域']||r['垂直类']||r['category']||r['vertical']||r['垂类']||'未分类';
  if(vertExcluded[vert])return '垂类过滤';
  return null;
}

function updateEst(){
  if(!ALL_DATA.length)return;
  // rebuild excluded verticals
  vertExcluded={};
  var vcks=document.querySelectorAll('.vert-ck');
  for(var i=0;i<vcks.length;i++){
    if(!vcks[i].checked){
      vertExcluded[vcks[i].getAttribute('data-v')]=true;
    }
  }
  var keep=0,drop=0;
  var reasons={};
  for(var i=0;i<ALL_DATA.length;i++){
    var reason=filterRow(ALL_DATA[i]);
    if(reason===null){keep++}
    else{drop++;reasons[reason]=(reasons[reason]||0)+1}
  }
  document.getElementById('keepN').textContent=keep;
  document.getElementById('dropN').textContent=drop;
  var detail=document.getElementById('estDetail');
  var maxV=0;
  var reasonKeys=Object.keys(reasons);
  for(var i=0;i<reasonKeys.length;i++){if(reasons[reasonKeys[i]]>maxV)maxV=reasons[reasonKeys[i]]}
  var dhtml='';
  for(var i=0;i<reasonKeys.length;i++){
    var k=reasonKeys[i],v=reasons[k];
    var pct=maxV>0?Math.round(v/maxV*100):0;
    dhtml+='<div class="est-line"><span>'+esc(k)+'</span><div class="est-bar"><div class="est-bar-fill" style="width:'+pct+'%"></div></div><span class="est-cnt">'+v+'</span></div>';
  }
  detail.innerHTML=dhtml;
  document.getElementById('estCard').style.display='block';
  // update badges
  var threshold=parseFloat(document.getElementById('cesSlider').value);
  document.getElementById('secActivityBadge').textContent=threshold.toFixed(1)+'%';
  var activeReasons=0;
  if(document.getElementById('ckNormal').checked)activeReasons++;
  if(document.getElementById('ckNeg').checked)activeReasons++;
  document.getElementById('secAccountBadge').textContent=activeReasons+' 项';
  var minNotes=parseInt(document.getElementById('minNotes').value)||0;
  var zc=document.getElementById('ckZeroCes').checked;
  document.getElementById('secQualityBadge').textContent='≥'+minNotes+(zc?', 零CES':'');
  document.getElementById('secKeywordBadge').textContent=KW_LIST.length+' 词';
  var exclVerts=0;
  for(var i=0;i<vcks.length;i++){if(!vcks[i].checked)exclVerts++}
  document.getElementById('secVerticalBadge').textContent=exclVerts>0?'排除'+exclVerts+' 类':'';
}

function doFilter(){
  if(!ALL_DATA.length)return;
  FILTERED=[];
  EXCLUDED=[];
  for(var i=0;i<ALL_DATA.length;i++){
    var reason=filterRow(ALL_DATA[i]);
    if(reason===null)FILTERED.push(ALL_DATA[i]);
    else EXCLUDED.push({row:ALL_DATA[i],reason:reason});
  }
  PAGE=1;
  SORT_COL='';
  SORT_ASC=true;
  renderResult();
}

function renderResult(){
  var panel=document.getElementById('rPanel');
  var html='';
  // summary cards
  html+='<div class="summary-row">';
  html+='<div class="sum-card"><div class="sum-n">'+ALL_DATA.length+'</div><div class="sum-l">原始总数</div></div>';
  html+='<div class="sum-card green"><div class="sum-n">'+FILTERED.length+'</div><div class="sum-l">保留人数</div></div>';
  html+='<div class="sum-card red"><div class="sum-n">'+EXCLUDED.length+'</div><div class="sum-l">排除人数</div></div>';
  html+='</div>';
  // analysis
  if(EXCLUDED.length){
    var reasons={};
    for(var i=0;i<EXCLUDED.length;i++){
      var r=EXCLUDED[i].reason;
      reasons[r]=(reasons[r]||0)+1;
    }
    var reasonKeys=Object.keys(reasons);
    var maxV=0;
    for(var i=0;i<reasonKeys.length;i++){if(reasons[reasonKeys[i]]>maxV)maxV=reasons[reasonKeys[i]]}
    html+='<div class="analysis-card"><h3>排除原因分析</h3>';
    for(var i=0;i<reasonKeys.length;i++){
      var k=reasonKeys[i],v=reasons[k];
      var pct=maxV>0?Math.round(v/maxV*100):0;
      html+='<div class="analysis-line"><span>'+esc(k)+'</span><div class="analysis-bar"><div class="analysis-bar-fill" style="width:'+pct+'%"></div></div><span class="analysis-cnt">'+v+'</span></div>';
    }
    html+='</div>';
  }
  // table
  var start=(PAGE-1)*PAGE_SIZE;
  var end=Math.min(start+PAGE_SIZE,FILTERED.length);
  var pageRows=FILTERED.slice(start,end);
  html+='<div class="tbl-wrap">';
  html+='<table class="tbl"><thead><tr>';
  var cols=[{key:'nickname',label:'昵称'},{key:'vertical',label:'垂类'},{key:'fans',label:'粉丝数'},{key:'ces',label:'CES转化率'},{key:'cesNotes',label:'CES有效笔记'}];
  for(var i=0;i<cols.length;i++){
    var sorted=SORT_COL===cols[i].key;
    var arrow=sorted?(SORT_ASC?'↑':'↓'):'↕';
    html+='<th class="'+(sorted?'sorted':'')+'" onclick="sortBy(\''+cols[i].key+'\')">'+cols[i].label+'<span class="sort-arrow">'+arrow+'</span></th>';
  }
  html+='</tr></thead><tbody>';
  if(!pageRows.length){
    html+='<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--muted)">暂无数据</td></tr>';
  }else{
    for(var i=0;i<pageRows.length;i++){
      var row=pageRows[i];
      var nick=esc(String(row['昵称']||row['nickname']||row['达人昵称']||''));
      var vert=esc(String(row['垂直领域']||row['垂直类']||row['category']||row['vertical']||row['垂类']||''));
      var fans=esc(String(row['粉丝数']||row['fans']||''));
      var cesVal=parseFloat(row['CES转化率']||row['ces']||row['ces_rate']||0).toFixed(1)+'%';
      var cesN=parseInt(row['CES超100有效笔记数']||row['ces_effective_notes']||row['ces_notes']||0);
      html+='<tr><td>'+nick+'</td><td>'+vert+'</td><td>'+fans+'</td><td>'+cesVal+'</td><td>'+cesN+'</td></tr>';
    }
  }
  html+='</tbody></table>';
  var totalPages=Math.max(1,Math.ceil(FILTERED.length/PAGE_SIZE));
  html+='<div class="pagination"><span>第 '+PAGE+'/'+totalPages+' 页，共 '+FILTERED.length+' 条</span><span>';
  html+='<button onclick="goPage('+(PAGE-1)+')"'+(PAGE<=1?' disabled':'')+'>上一页</button> ';
  html+='<button onclick="goPage('+(PAGE+1)+')"'+(PAGE>=totalPages?' disabled':'')+'>下一页</button>';
  html+='</span></div>';
  html+='</div>';
  // export
  html+='<div class="export-row">';
  html+='<button class="export-btn" onclick="exportFiltered()">导出筛选结果.xlsx</button>';
  html+='<button class="export-btn" onclick="exportExcluded()">导出排除名单（含原因）</button>';
  html+='</div>';
  panel.innerHTML=html;
}

function sortBy(col){
  if(SORT_COL===col)SORT_ASC=!SORT_ASC;
  else{SORT_COL=col;SORT_ASC=true}
  var keyMap={
    'nickname':['昵称','nickname','达人昵称'],
    'vertical':['垂直领域','垂直类','category','vertical','垂类'],
    'fans':['粉丝数','fans'],
    'ces':['CES转化率','ces','ces_rate'],
    'cesNotes':['CES超100有效笔记数','ces_effective_notes','ces_notes']
  };
  var keys=keyMap[col]||[col];
  FILTERED.sort(function(a,b){
    var va,vb;
    for(var i=0;i<keys.length;i++){
      if(a[keys[i]]!==undefined){va=a[keys[i]];break}
    }
    for(var i=0;i<keys.length;i++){
      if(b[keys[i]]!==undefined){vb=b[keys[i]];break}
    }
    va=va!==undefined?va:'';
    vb=vb!==undefined?vb:'';
    var na=parseFloat(va),nb=parseFloat(vb);
    if(!isNaN(na)&&!isNaN(nb)){
      return SORT_ASC?na-nb:nb-na;
    }
    va=String(va);vb=String(vb);
    if(SORT_ASC)return va.localeCompare(vb,'zh');
    return vb.localeCompare(va,'zh');
  });
  PAGE=1;
  renderResult();
}

function goPage(p){
  var totalPages=Math.max(1,Math.ceil(FILTERED.length/PAGE_SIZE));
  if(p<1||p>totalPages)return;
  PAGE=p;
  renderResult();
}

function exportFiltered(){
  if(!FILTERED.length)return;
  var ws=XLSX.utils.json_to_sheet(FILTERED);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'筛选结果');
  XLSX.writeFile(wb,'人群筛选结果.xlsx');
}

function exportExcluded(){
  if(!EXCLUDED.length)return;
  var rows=EXCLUDED.map(function(e){
    var obj=Object.assign({},e.row);
    obj['排除原因']=e.reason;
    return obj;
  });
  var ws=XLSX.utils.json_to_sheet(rows);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'排除名单');
  XLSX.writeFile(wb,'排除名单.xlsx');
}

renderKw();
