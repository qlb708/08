<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Audience Filter · 人群筛选</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F0F2F5;--white:#fff;--text:#0A1628;--soft:#64748b;--muted:#94a3b8;
  --accent:#1a56db;--gold:#C9A84C;--green:#16a34a;--red:#dc2626;
  --line:rgba(10,22,40,0.09);
  --serif:Georgia,"Times New Roman",serif;
  --sans:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;
  --radius:14px;
}
html{-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;font-size:14px}

/* NAV */
.nav{height:54px;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;padding:0 36px;position:fixed;top:0;left:0;right:0;z-index:200;gap:12px}
.nav-brand{font-family:var(--serif);font-size:13px;letter-spacing:.16em;color:var(--text);font-weight:400}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--muted)}
.nav-sub{font-size:13px;color:var(--soft)}
.nav-back{margin-left:auto;font-size:13px;color:var(--accent);text-decoration:none;opacity:.8;transition:opacity .2s}
.nav-back:hover{opacity:1}

/* MAIN */
.main{padding:82px 36px 60px;min-height:100vh}

/* DROP ZONE */
.drop-zone{
  background:#fff;border-radius:var(--radius);
  box-shadow:0 2px 16px rgba(10,22,40,.06);
  padding:100px 40px;text-align:center;
  border:2px dashed #d1d9e6;
  transition:border-color .25s,background .25s;
  cursor:default;user-select:none;
}
.drop-zone.drag-over{border-color:var(--accent);background:rgba(26,86,219,.04)}
.dz-icon{font-size:52px;display:block;margin-bottom:20px;transition:transform .3s}
.drop-zone.drag-over .dz-icon{transform:scale(1.15) translateY(-4px)}
.dz-main{font-family:var(--serif);font-size:24px;color:var(--soft);margin-bottom:10px;font-weight:400;transition:color .25s}
.drop-zone.drag-over .dz-main{color:var(--accent)}
.dz-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.dz-or{font-size:12px;color:var(--muted);margin:0 0 12px}
.dz-btn{display:inline-block;padding:10px 28px;background:var(--accent);color:#fff;border-radius:8px;
  font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.dz-btn:hover{background:#1446b8}
.dz-btn input{position:absolute;left:-9999px;opacity:0;width:1px;height:1px}

/* RESULT AREA */
.result-wrap{display:none}

/* SUMMARY CARD */
.summary-card{background:#fff;border-radius:var(--radius);box-shadow:0 2px 16px rgba(10,22,40,.06);
  padding:28px 36px 24px;margin-bottom:16px}
.sum-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px}
.sum-title{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--text);margin-bottom:4px}
.sum-file{font-size:12px;color:var(--muted)}
.sum-reup{font-size:12px;color:var(--accent);cursor:pointer;margin-top:6px;display:inline-block}
.sum-reup:hover{text-decoration:underline}

.sum-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:1px;background:var(--line);
  border-radius:10px;overflow:hidden}
.sum-cell{background:#fff;padding:16px 18px}
.sum-cell-lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
.sum-cell-num{font-family:var(--serif);font-size:28px;font-weight:400}
.sum-cell-sub{font-size:11px;color:var(--muted);margin-top:2px}
.c-pass .sum-cell-num{color:var(--accent)}
.c-excl .sum-cell-num{color:var(--red)}
.c-s .sum-cell-num{color:var(--gold)}
.c-a .sum-cell-num{color:var(--accent)}
.c-b .sum-cell-num{color:var(--muted)}
.c-rate .sum-cell-num{color:var(--green)}

/* TABLE CARD */
.table-card{background:#fff;border-radius:var(--radius);box-shadow:0 2px 16px rgba(10,22,40,.06);overflow:hidden;margin-bottom:16px}
.tbl-header{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;border-bottom:1px solid var(--line)}
.tbl-title{font-size:13px;font-weight:600;color:var(--soft);letter-spacing:.08em;text-transform:uppercase}
.tbl-hint{font-size:12px;color:var(--muted)}
.tbl-wrap{overflow-x:auto;padding:0 0 4px}
table{width:100%;border-collapse:collapse}
thead th{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  padding:12px 20px;text-align:left;border-bottom:1px solid var(--line);
  cursor:pointer;white-space:nowrap;user-select:none;font-weight:600;transition:color .2s}
thead th:hover{color:var(--text)}
thead th.sorted{color:var(--accent)}
thead th.sorted.asc::after{content:' ↑'}
thead th.sorted.desc::after{content:' ↓'}
tbody tr{border-bottom:1px solid rgba(10,22,40,.04);transition:background .15s}
tbody tr:hover{background:rgba(26,86,219,.025)}
tbody td{padding:13px 20px;font-size:14px;color:var(--text);vertical-align:middle}
.td-soft{font-size:13px;color:var(--soft)}
.td-hi{color:var(--accent);font-weight:700}
.badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:20px;font-size:11px;font-weight:700;border-radius:4px}
.badge-s{border:1.5px solid var(--gold);color:var(--gold)}
.badge-a{border:1.5px solid var(--accent);color:var(--accent)}
.badge-b{border:1.5px solid #cbd5e1;color:var(--muted)}

/* PAGINATION */
.pag{display:flex;align-items:center;justify-content:flex-end;gap:16px;
  padding:14px 32px;font-size:13px;color:var(--soft);border-top:1px solid var(--line)}
.pag-btn{cursor:pointer;transition:color .2s;user-select:none;font-weight:500}
.pag-btn:hover:not(.dis){color:var(--accent)}
.pag-btn.dis{opacity:.3;cursor:default}
.pag-info{font-family:var(--serif);font-size:14px;color:var(--text)}

/* EXPORT BAR */
.export-bar{display:flex;align-items:center;gap:12px;padding:24px 0 0}
.btn-export-main{flex:1;background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:14px 0;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);
  letter-spacing:.06em;transition:background .2s}
.btn-export-main:hover{background:#1446b8}
.btn-export-sec{background:#fff;color:var(--soft);border:1.5px solid #e2e8f0;border-radius:10px;
  padding:13px 24px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);
  white-space:nowrap;transition:all .2s}
.btn-export-sec:hover{border-color:#cbd5e1;color:var(--text)}
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-brand">AUDIENCE · FILTER</span>
  <span class="nav-dot"></span>
  <span class="nav-sub">人群质量筛选</span>
  <a href="/08/portfolio/" class="nav-back">← 返回工具集</a>
</nav>

<main class="main" id="mainArea">

  <!-- DROP ZONE -->
  <div class="drop-zone" id="dropZone">
    <span class="dz-icon">📂</span>
    <div class="dz-main">将达人名单拖入此处</div>
    <div class="dz-sub">自动解析并筛选 · 支持 .xlsx .xls .csv</div>
    <div class="dz-or">或</div>
    <label class="dz-btn">
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
      点击选择文件
    </label>
  </div>

  <!-- RESULT -->
  <div class="result-wrap" id="resultWrap">

    <!-- Summary Card -->
    <div class="summary-card">
      <div class="sum-top">
        <div>
          <div class="sum-title" id="sumTitle">筛选完成</div>
          <div class="sum-file" id="sumFile"></div>
          <span class="sum-reup" id="sumReup">↺ 重新上传</span>
        </div>
      </div>
      <div class="sum-grid">
        <div class="sum-cell c-pass">
          <div class="sum-cell-lbl">通过人数</div>
          <div class="sum-cell-num" id="numPass">—</div>
          <div class="sum-cell-sub">进入备选池</div>
        </div>
        <div class="sum-cell c-excl">
          <div class="sum-cell-lbl">排除人数</div>
          <div class="sum-cell-num" id="numExcl">—</div>
          <div class="sum-cell-sub">商业/异常/违规</div>
        </div>
        <div class="sum-cell c-s">
          <div class="sum-cell-lbl">S 优质</div>
          <div class="sum-cell-num" id="numS">—</div>
          <div class="sum-cell-sub">CES≥150，笔记30-300</div>
        </div>
        <div class="sum-cell c-a">
          <div class="sum-cell-lbl">A 推荐</div>
          <div class="sum-cell-num" id="numA">—</div>
          <div class="sum-cell-sub">CES≥80</div>
        </div>
        <div class="sum-cell c-b">
          <div class="sum-cell-lbl">B 备选</div>
          <div class="sum-cell-num" id="numB">—</div>
          <div class="sum-cell-sub">其余通过者</div>
        </div>
        <div class="sum-cell c-rate">
          <div class="sum-cell-lbl">通过率</div>
          <div class="sum-cell-num" id="numRate">—</div>
          <div class="sum-cell-sub">占原始名单比例</div>
        </div>
      </div>
    </div>

    <!-- Table Card -->
    <div class="table-card">
      <div class="tbl-header">
        <span class="tbl-title">通过名单</span>
        <span class="tbl-hint">点击列标题排序</span>
      </div>
      <div class="tbl-wrap">
        <table><thead id="tblHead"></thead><tbody id="tblBody"></tbody></table>
      </div>
      <div class="pag" id="pagination"></div>
    </div>

    <!-- Export Bar -->
    <div class="export-bar">
      <button class="btn-export-main" id="btnExport">⬇ 导出筛选结果（.xlsx）</button>
      <button class="btn-export-sec" id="btnExclude">导出排除名单</button>
    </div>

  </div>

</main>

<script>
/* ─── STATE ─── */
var ALL_DATA=[], FILTERED=[], EXCLUDED=[];
var PAGE=1, PAGE_SIZE=20, SORT_COL='', SORT_ASC=false;

/* ─── KEYWORD GROUPS ─── */
var KW_LIST=[
  '旅行社','旅游社','旅游局','地接','地接社','定制游','精品定制','旅策','旅游服务','服务中心',
  '包车','包车游','包车服务','拼车','司导','跃行','车轮上','包团',
  '民宿','客栈','酒店','公寓','度假村','包栋','别墅','寓','旅馆','旅館',
  '游轮','票务','票务代理','代理','代购','团购','ota','携程','途牛','飞猪','去哪儿',
  '途途','开荒','景区','门票','观光',
  '官方','官号','官博','机构','店铺','商家','企业','品牌','招商','广告','推广',
  '营销','专营','旗舰','批发','直销','旅游',
  'inn','hostel','hotel','resort','travel agency','tour','tours','guide'
];

/* ─── HELPERS ─── */
function parseCes(v){return parseFloat(String(v||'0').replace('%',''))||0}
function fmtN(n){var v=parseInt(n)||0;return v>=10000?(v/10000).toFixed(1)+'w':v>=1000?(v/1000).toFixed(1)+'k':String(v)}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function getKocGrade(r){
  var ces=parseInt(r['CES超100有效笔记数']||0),notes=parseInt(r['笔记发布总数']||0);
  if(ces>=150&&notes>=30&&notes<=300)return 'S';
  if(ces>=80)return 'A';
  return 'B';
}

/* ─── FILTER ─── */
function filterRow(r){
  if(r['命中负向处置']==='是')return '负向处置';
  if(r['账号状态']&&r['账号状态']!=='NORMAL')return '账号异常';
  var nick=String(r['昵称']||'').toLowerCase(), xid=String(r['小红书号']||'').toLowerCase();
  for(var i=0;i<KW_LIST.length;i++){if(nick.indexOf(KW_LIST[i])>=0||xid.indexOf(KW_LIST[i])>=0)return '商业机构';}
  if(parseInt(r['CES超100有效笔记数']||0)===0)return 'CES为0';
  return null;
}

function runFilter(total){
  FILTERED=[]; EXCLUDED=[];
  ALL_DATA.forEach(function(r){
    var reason=filterRow(r);
    if(reason){r._exclReason=reason;EXCLUDED.push(r);}else FILTERED.push(r);
  });
  PAGE=1; SORT_COL=''; SORT_ASC=false;

  // update summary
  var s=0,a=0,b=0;
  FILTERED.forEach(function(r){var g=getKocGrade(r);r._grade=g;if(g==='S')s++;else if(g==='A')a++;else b++;});
  document.getElementById('numPass').textContent=FILTERED.length;
  document.getElementById('numExcl').textContent=EXCLUDED.length;
  document.getElementById('numS').textContent=s;
  document.getElementById('numA').textContent=a;
  document.getElementById('numB').textContent=b;
  document.getElementById('numRate').textContent=total>0?Math.round(FILTERED.length/total*100)+'%':'—';

  document.getElementById('dropZone').style.display='none';
  document.getElementById('resultWrap').style.display='block';
  renderTable();
}

/* ─── FILE PARSE ─── */
var currentFileName='';
function handleFile(file){
  if(!file)return;
  var ext=(file.name||'').split('.').pop().toLowerCase();
  if(['xlsx','xls','csv'].indexOf(ext)<0){alert('请上传 .xlsx .xls 或 .csv 文件');return;}
  currentFileName=file.name;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      ALL_DATA=XLSX.utils.sheet_to_json(ws,{defval:''});
      document.getElementById('sumTitle').textContent='筛选完成 · '+ALL_DATA.length+' 条原始数据';
      document.getElementById('sumFile').textContent=file.name;
      runFilter(ALL_DATA.length);
    }catch(err){alert('解析失败，请确认文件格式正确。错误：'+err.message);}
  };
  reader.readAsArrayBuffer(file);
}

/* ─── DRAG & DROP ─── */
var dz=document.getElementById('dropZone');
dz.addEventListener('dragover',function(e){e.preventDefault();e.stopPropagation();dz.classList.add('drag-over');});
dz.addEventListener('dragleave',function(e){e.stopPropagation();dz.classList.remove('drag-over');});
dz.addEventListener('drop',function(e){
  e.preventDefault();e.stopPropagation();dz.classList.remove('drag-over');
  if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0]);
});
var bodyN=0;
document.body.addEventListener('dragenter',function(e){e.preventDefault();bodyN++;if(ALL_DATA.length===0)dz.classList.add('drag-over');});
document.body.addEventListener('dragleave',function(){bodyN--;if(bodyN<=0){bodyN=0;dz.classList.remove('drag-over');}});
document.body.addEventListener('dragover',function(e){e.preventDefault();});
document.body.addEventListener('drop',function(e){
  e.preventDefault();bodyN=0;dz.classList.remove('drag-over');
  if(e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0]);
});

/* ─── FILE INPUT ─── */
document.getElementById('fileInput').addEventListener('change',function(){
  if(this.files&&this.files.length){handleFile(this.files[0]);this.value='';}
});

/* ─── REUPLOAD ─── */
document.getElementById('sumReup').addEventListener('click',function(){
  ALL_DATA=[];FILTERED=[];EXCLUDED=[];PAGE=1;
  document.getElementById('dropZone').style.display='';
  document.getElementById('resultWrap').style.display='none';
});

/* ─── RENDER TABLE ─── */
var COLS=[
  {key:'昵称',label:'NICKNAME'},{key:'粉丝数',label:'FANS'},
  {key:'笔记发布总数',label:'NOTES'},{key:'CES超100有效笔记数',label:'CES'},
  {key:'近7天CES转化率',label:'RATE'},{key:'_grade',label:'GRADE'}
];
function renderTable(){
  var hrow='<tr>';
  COLS.forEach(function(c){
    var cls=SORT_COL===c.key?('sorted '+(SORT_ASC?'asc':'desc')):'';
    hrow+='<th data-col="'+c.key+'" class="'+cls+'">'+c.label+'</th>';
  });
  document.getElementById('tblHead').innerHTML=hrow+'</tr>';
  document.getElementById('tblHead').querySelectorAll('th').forEach(function(th){
    th.addEventListener('click',function(){
      var col=this.dataset.col;
      if(SORT_COL===col)SORT_ASC=!SORT_ASC;else{SORT_COL=col;SORT_ASC=true;}
      PAGE=1;renderTable();
    });
  });

  var sorted=FILTERED.slice();
  if(SORT_COL){
    sorted.sort(function(a,b){
      var va=SORT_COL==='_grade'?getKocGrade(a):a[SORT_COL];
      var vb=SORT_COL==='_grade'?getKocGrade(b):b[SORT_COL];
      var na=parseFloat(String(va).replace('%',''))||0,nb=parseFloat(String(vb).replace('%',''))||0;
      if(!isNaN(na)&&!isNaN(nb))return SORT_ASC?na-nb:nb-na;
      return SORT_ASC?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
    });
  }
  var start=(PAGE-1)*PAGE_SIZE,pd=sorted.slice(start,start+PAGE_SIZE);
  var html='';
  pd.forEach(function(r){
    var grade=getKocGrade(r),rate=parseCes(r['近7天CES转化率']);
    html+='<tr>'+
      '<td>'+escHtml(r['昵称']||'')+'</td>'+
      '<td class="td-soft">'+fmtN(r['粉丝数'])+'</td>'+
      '<td class="td-soft">'+escHtml(r['笔记发布总数'])+'</td>'+
      '<td class="td-soft">'+escHtml(r['CES超100有效笔记数'])+'</td>'+
      '<td class="td-soft'+(rate>2?' td-hi':'')+'">'+( rate?rate.toFixed(1)+'%':'—')+'</td>'+
      '<td><span class="badge badge-'+grade.toLowerCase()+'">'+grade+'</span></td>'+
    '</tr>';
  });
  document.getElementById('tblBody').innerHTML=html;

  var totalPages=Math.ceil(sorted.length/PAGE_SIZE)||1;
  document.getElementById('pagination').innerHTML=
    '<span class="pag-btn'+(PAGE<=1?' dis':'')+'" id="pgPrev">← 上一页</span>'+
    '<span class="pag-info">'+PAGE+' / '+totalPages+'</span>'+
    '<span class="pag-btn'+(PAGE>=totalPages?' dis':'')+'" id="pgNext">下一页 →</span>';
  document.getElementById('pgPrev').onclick=function(){if(PAGE>1){PAGE--;renderTable();}};
  document.getElementById('pgNext').onclick=function(){if(PAGE<totalPages){PAGE++;renderTable();}};
}

/* ─── EXPORT ─── */
function doExp(excl){
  var data=excl?EXCLUDED:FILTERED;if(!data.length)return;
  var rows=data.map(function(r){
    var obj={};Object.keys(r).forEach(function(k){if(k!=='_grade'&&k!=='_exclReason')obj[k]=r[k];});
    obj['KOC评级']=getKocGrade(r)+'级';
    if(excl)obj['排除原因']=r._exclReason||'';
    return obj;
  });
  if(!excl){var go={'S级':0,'A级':1,'B级':2};rows.sort(function(a,b){return(go[a['KOC评级']]||9)-(go[b['KOC评级']]||9);});}
  var ws=XLSX.utils.json_to_sheet(rows),wb2=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb2,ws,excl?'排除名单':'KOC筛选结果');
  XLSX.writeFile(wb2,(excl?'排除名单_':'KOC筛选结果_')+new Date().toISOString().slice(0,10)+'.xlsx');
}
document.getElementById('btnExport').addEventListener('click',function(){doExp(false);});
document.getElementById('btnExclude').addEventListener('click',function(){doExp(true);});
</script>
</body>
</html>
