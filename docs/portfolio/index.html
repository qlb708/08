<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI × 08</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafafa;--white:#fff;--blue:#0066cc;--blue-s:rgba(0,102,204,.07);--blue-b:rgba(0,102,204,.18);
  --text:#111;--sub:#555;--muted:#999;--bd:rgba(0,0,0,.06);--bd2:rgba(0,0,0,.1);
  --sh:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06);
  --sh2:0 2px 8px rgba(0,0,0,.06),0 12px 40px rgba(0,0,0,.1);
  --r:14px;--pill:999px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

/* ── NAV ── */
nav{position:fixed;top:0;inset-x:0;height:56px;background:rgba(250,250,250,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);z-index:200;display:flex;align-items:center}
.nav-w{max-width:1100px;margin:0 auto;padding:0 32px;width:100%;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:17px;font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:6px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);display:inline-block}
.nav-r{display:flex;align-items:center;gap:8px}
.nav-link{font-size:14px;color:var(--sub);padding:6px 12px;border-radius:8px;transition:all .15s;cursor:pointer}
.nav-link:hover{background:var(--bd);color:var(--text)}
.nav-cta{font-size:14px;font-weight:600;color:#fff;background:var(--text);padding:7px 16px;border-radius:var(--pill);transition:all .15s}
.nav-cta:hover{background:#333}

/* ── HERO ── */
.hero{padding:120px 32px 80px;text-align:center;max-width:760px;margin:0 auto}
.hero-badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);background:var(--blue-s);border:1px solid var(--blue-b);padding:5px 14px;border-radius:var(--pill);margin-bottom:28px}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.hero h1{font-size:clamp(36px,6vw,72px);font-weight:800;letter-spacing:-.04em;line-height:1.05;margin-bottom:20px;color:var(--text)}
.hero p{font-size:18px;color:var(--sub);line-height:1.6;margin-bottom:36px;max-width:480px;margin-left:auto;margin-right:auto}
.hero-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-p{display:inline-flex;align-items:center;gap:7px;padding:13px 28px;border-radius:var(--pill);font-size:15px;font-weight:700;background:var(--text);color:#fff;transition:all .2s;border:none;cursor:pointer;font-family:var(--font)}
.btn-p:hover{background:#222;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.btn-g{display:inline-flex;align-items:center;gap:7px;padding:12px 24px;border-radius:var(--pill);font-size:15px;font-weight:600;background:var(--white);color:var(--text);border:1.5px solid var(--bd2);transition:all .2s;cursor:pointer;font-family:var(--font)}
.btn-g:hover{border-color:#999;transform:translateY(-1px)}
.btn-p svg,.btn-g svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* ── TICKER ── */
.ticker{margin-top:48px;padding:18px 24px;background:var(--white);border:1px solid var(--bd);border-radius:12px;text-align:left;display:flex;align-items:flex-start;gap:12px;max-width:580px;margin-left:auto;margin-right:auto}
.ticker-icon{width:28px;height:28px;border-radius:8px;background:var(--blue-s);border:1px solid var(--blue-b);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ticker-icon svg{width:14px;height:14px;fill:none;stroke:var(--blue);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ticker-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--blue);margin-bottom:4px}
.ticker-text{font-size:14px;color:var(--sub);line-height:1.6;min-height:44px}
.cursor-blink{display:inline-block;width:2px;height:14px;background:var(--blue);margin-left:2px;vertical-align:middle;animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── TOOLS GRID ── */
.tools{max-width:1100px;margin:0 auto;padding:0 32px 100px}
.tools-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.tools-title{font-size:22px;font-weight:800;letter-spacing:-.03em}
.tools-count{font-size:13px;color:var(--muted);font-weight:500}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* tool card */
.card{background:var(--white);border:1px solid var(--bd);border-radius:var(--r);padding:24px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:0}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%),rgba(0,102,204,.04),transparent 60%);opacity:0;transition:opacity .3s}
.card:hover::before{opacity:1}
.card:hover{border-color:var(--bd2);transform:translateY(-3px);box-shadow:var(--sh2)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.card-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-icon svg{width:20px;height:20px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.card-badge{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:var(--pill);color:var(--blue);background:var(--blue-s);border:1px solid var(--blue-b)}
.card-name{font-size:15px;font-weight:700;letter-spacing:-.02em;color:var(--text);margin-bottom:6px}
.card-desc{font-size:13px;color:var(--sub);line-height:1.6;flex:1}
.card-foot{margin-top:18px;padding-top:14px;border-top:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.card-tag{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.card-arr{width:28px;height:28px;border-radius:50%;border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;transition:all .2s}
.card-arr svg{width:13px;height:13px;fill:none;stroke:var(--sub);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s}
.card:hover .card-arr{background:var(--text);border-color:var(--text)}
.card:hover .card-arr svg{stroke:#fff}

/* ── FAQ ── */
.faq{max-width:680px;margin:0 auto;padding:0 32px 100px}
.faq-hd{font-size:22px;font-weight:800;letter-spacing:-.03em;margin-bottom:24px}
.faq-item{border-top:1px solid var(--bd)}
.faq-item:last-child{border-bottom:1px solid var(--bd)}
.faq-q{width:100%;text-align:left;padding:18px 0;font-size:15px;font-weight:600;color:var(--text);background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:16px;font-family:var(--font)}
.faq-icon{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s}
.faq-icon svg{width:11px;height:11px;fill:none;stroke:var(--sub);stroke-width:2.5;transition:transform .25s}
.faq-item.open .faq-icon{background:var(--text);border-color:var(--text)}
.faq-item.open .faq-icon svg{stroke:#fff;transform:rotate(45deg)}
.faq-a{overflow:hidden;max-height:0;transition:max-height .3s ease,padding .3s ease}
.faq-a-inner{padding-bottom:18px;font-size:14px;color:var(--sub);line-height:1.75}

/* ── FOOTER ── */
footer{border-top:1px solid var(--bd);padding:28px 32px;text-align:center}
footer p{font-size:13px;color:var(--muted)}
footer a{color:var(--sub);font-weight:600}
footer a:hover{color:var(--text)}

@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.grid{grid-template-columns:1fr}.hero{padding:88px 20px 60px}.tools{padding:0 20px 80px}.faq{padding:0 20px 80px}.nav-w{padding:0 20px}}
</style>
</head>
<body>

<nav>
  <div class="nav-w">
    <div class="logo"><span class="logo-dot"></span>AI × 08</div>
    <div class="nav-r">
      <a class="nav-link" href="#tools">工具</a>
      <a class="nav-link" href="#faq">FAQ</a>
      <a class="nav-cta" href="https://github.com/qlb708/08" target="_blank">GitHub ↗</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-badge"><span class="hero-badge-dot"></span>10 个 AI 工具，持续更新</div>
  <h1>Hi，这是 08 构建的 AI 提效工具。</h1>
  <p>一些真实在用的 AI 工具。</p>
  <div class="hero-btns">
    <button class="btn-p" onclick="document.getElementById('tools').scrollIntoView({behavior:'smooth'})">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>探索工具
    </button>
    <a class="btn-g" href="https://github.com/qlb708/08" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>GitHub
    </a>
  </div>
  <div class="ticker">
    <div class="ticker-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
    </div>
    <div>
      <div class="ticker-label">AI 正在运行</div>
      <div class="ticker-text" id="ticker">
        <span id="ticker-content"></span><span class="cursor-blink"></span>
      </div>
    </div>
  </div>
</section>

<!-- TOOLS -->
<section class="tools" id="tools">
  <div class="tools-hd">
    <div class="tools-title">全部工具</div>
    <div class="tools-count">10 个可体验</div>
  </div>
  <div class="grid" id="grid"></div>
</section>

<!-- FAQ -->
<section class="faq" id="faq">
  <div class="faq-hd">常见问题</div>
  <div id="faq-list"></div>
</section>

<footer>
  <p>Hi，这是 08 构建的 AI 提效工具。&nbsp;·&nbsp;<a href="https://github.com/qlb708/08" target="_blank">GitHub ↗</a></p>
</footer>

<script>
// ── Ticker ──
var ticks=[
  '正在分析旅行 App 7 日留存下滑原因，识别到付费用户与免费用户路径差异…',
  '生成小红书 Q3 内容选题方案：户外露营 × AI 推荐，差异化角度 5 个…',
  '会议纪要处理完毕：提取 7 项待办、3 个核心决策、2 个风险项…',
  '周报已生成：本周核心亮点 — 用户留存提升 8%，完成需求评审 3 轮…'
];
var ti=0,ci=0,iv=null;
function nextTick(){
  clearInterval(iv);
  ci=0;
  var el=document.getElementById('ticker-content');
  var t=ticks[ti%ticks.length];ti++;
  iv=setInterval(function(){
    ci=Math.min(ci+3,t.length);
    el.textContent=t.slice(0,ci);
    if(ci>=t.length){clearInterval(iv);setTimeout(nextTick,3200);}
  },30);
}
nextTick();

// ── Tools ──
var tools=[
  {name:'竞品动态追踪',desc:'实时监控竞品社交热点，AI 生成每日雷达报告',tag:'增长',color:'#0066cc',bg:'rgba(0,102,204,.08)',icon:'<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',href:'/08/'},
  {name:'用户研究助手',desc:'描述研究背景，AI 生成结构化用研报告，含追问机制',tag:'用研',color:'#5856d6',bg:'rgba(88,86,214,.08)',icon:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',href:'/08/portfolio/ux-research/'},
  {name:'内容创作助手',desc:'多平台 chip 选择，AI 生成差异化选题与正文框架',tag:'内容',color:'#ff9500',bg:'rgba(255,149,0,.08)',icon:'<path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>',href:'/08/portfolio/content-radar/'},
  {name:'文档速写台',desc:'7 种文档类型，竖向导航切换，支持文件上传注入',tag:'文档',color:'#34c759',bg:'rgba(52,199,89,.08)',icon:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',href:'/08/portfolio/doc-writer/'},
  {name:'增长实验模拟器',desc:'描述增长瓶颈，AI 给出 3-4 个 A/B 实验方案',tag:'增长',color:'#ff3b30',bg:'rgba(255,59,48,.08)',icon:'<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>',href:'/08/portfolio/growth-simulator/'},
  {name:'用户旅程地图',desc:'描述核心场景，AI 按阶段生成行为/情绪/触点/机会',tag:'体验',color:'#af52de',bg:'rgba(175,82,222,.08)',icon:'<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',href:'/08/portfolio/journey-map/'},
  {name:'智能打印助手',desc:'上传 PDF，自动分析每页彩印/黑白，输出费用对比',tag:'效率',color:'#00c7be',bg:'rgba(0,199,190,.08)',icon:'<polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>',href:'/08/portfolio/print-helper/'},
  {name:'会议纪要拆解',desc:'粘贴会议记录，AI 提取待办/决策/风险，结构化输出',tag:'效率',color:'#0066cc',bg:'rgba(0,102,204,.08)',icon:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',href:'/08/portfolio/meeting-parser/'},
  {name:'邮件消息润色',desc:'口语化想法 → 专业职场表达，4 种语气，附备选版本',tag:'职场',color:'#ff3b30',bg:'rgba(255,59,48,.08)',icon:'<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>',href:'/08/portfolio/email-polisher/'},
  {name:'周报生成器',desc:'碎片工作记录 → 专业周报，支持飞书格式和中英双语',tag:'职场',color:'#ff9500',bg:'rgba(255,149,0,.08)',icon:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',href:'/08/portfolio/weekly-report/'}
];

var grid=document.getElementById('grid');
tools.forEach(function(t){
  var el=document.createElement('a');
  el.href=t.href;
  el.className='card';
  el.innerHTML=
    '<div class="card-top">'
    +'<div class="card-icon" style="background:'+t.bg+'"><svg viewBox="0 0 24 24" fill="none" stroke="'+t.color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">'+t.icon+'</svg></div>'
    +'<span class="card-badge">可体验</span>'
    +'</div>'
    +'<div class="card-name">'+t.name+'</div>'
    +'<div class="card-desc">'+t.desc+'</div>'
    +'<div class="card-foot">'
    +'<span class="card-tag">'+t.tag+'</span>'
    +'<div class="card-arr"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></div>'
    +'</div>';
  el.addEventListener('mousemove',function(e){
    var r=el.getBoundingClientRect();
    el.style.setProperty('--mx',(e.clientX-r.left)+'px');
    el.style.setProperty('--my',(e.clientY-r.top)+'px');
  });
  grid.appendChild(el);
});

// ── FAQ ──
var faqs=[
  {q:'和 ChatGPT、Kimi 等通用 AI 相比，这些工具有什么优势？',a:'通用 AI 需要用户自己构建 Prompt，输出格式不固定，每次都要重新调教。这里的工具针对产品运营具体场景做了深度 Prompt 工程——比如增长实验模拟器会强制输出「假设→变量→实验组→预期提升→优先级」的标准化结构，会议纪要工具直接提取待办表格和决策清单。输出即可用，不需要再调整格式。'},
  {q:'这些工具是真实在用的吗？',a:'是的。用研报告生成器、文档速写台、会议纪要拆解等工具在实习期间实际使用，减少了 60-70% 的重复性工作。周报生成器和邮件润色器是从真实工作痛点出发设计的。'},
  {q:'能体现什么产品能力？',a:'需求洞察（从自身工作痛点发现产品机会）、AI Prompt 设计（如何让 AI 输出结构化、可用的内容）、快速 MVP 验证（从构思到上线，全程 Vibe coding，专注产品设计而非技术实现）。'}
];
var faqEl=document.getElementById('faq-list');
faqs.forEach(function(f,i){
  var item=document.createElement('div');
  item.className='faq-item';
  item.innerHTML=
    '<button class="faq-q" onclick="toggleFaq(this)">'
    +f.q
    +'<div class="faq-icon"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>'
    +'</button>'
    +'<div class="faq-a"><div class="faq-a-inner">'+f.a+'</div></div>';
  faqEl.appendChild(item);
});
function toggleFaq(btn){
  var item=btn.closest('.faq-item');
  var a=item.querySelector('.faq-a');
  var isOpen=item.classList.contains('open');
  document.querySelectorAll('.faq-item.open').forEach(function(x){
    x.classList.remove('open');
    x.querySelector('.faq-a').style.maxHeight='0';
  });
  if(!isOpen){
    item.classList.add('open');
    a.style.maxHeight=a.scrollHeight+'px';
  }
}
</script>
</body>
</html>
