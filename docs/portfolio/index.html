<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI × 08 — 提效工具集</title>
<meta name="description" content="08 构建的 AI 提效工具集，真实在用的 AI 工具。">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg-alt:#f5f5f7;--primary:#0066cc;--primary-hover:#0052a3;--text:#1d1d1f;--text-secondary:#86868b;--radius-card:16px;--radius-btn:999px;--font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;--nav-h:52px}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
a{color:var(--primary);text-decoration:none}
a:hover{text-decoration:underline}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:100}
.nav-logo{font-size:18px;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.nav-logo span{color:var(--primary)}
.nav-github{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--text-secondary);padding:6px 14px;border-radius:var(--radius-btn);transition:background .2s}
.nav-github:hover{background:var(--bg-alt);text-decoration:none}
.nav-github svg{width:18px;height:18px}

/* Hero */
.hero{text-align:center;padding:120px 40px 80px;max-width:720px;margin:0 auto}
.hero h1{font-size:clamp(32px,5vw,52px);font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:16px}
.hero h1 span{background:linear-gradient(135deg,#0066cc,#00c7be);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:20px;color:var(--text-secondary);margin-bottom:32px}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;border-radius:var(--radius-btn);font-size:16px;font-weight:500;transition:all .2s;cursor:pointer;border:none;font-family:var(--font)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover);text-decoration:none}
.btn-secondary{background:var(--bg-alt);color:var(--text)}
.btn-secondary:hover{background:#e8e8ed;text-decoration:none}
.btn svg{width:16px;height:16px}

/* Ticker */
.ticker{max-width:560px;margin:0 auto 80px;padding:0 40px;position:relative;height:40px;overflow:hidden}
.ticker-text{font-size:17px;color:var(--text-secondary);text-align:center;position:absolute;left:0;right:0;opacity:0;transform:translateY(12px);transition:all .5s ease}
.ticker-text.active{opacity:1;transform:translateY(0)}
.ticker-text .cursor{display:inline-block;width:2px;height:18px;background:var(--primary);margin-left:2px;animation:blink .8s infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Tools Section */
#tools{max-width:800px;margin:0 auto;padding:0 24px 80px}
.tools-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:0 16px}
.tools-header h2{font-size:28px;font-weight:600;letter-spacing:-.02em}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;padding:0 8px;border-radius:999px;background:var(--bg-alt);font-size:13px;font-weight:500;color:var(--text-secondary)}

/* Tool List */
.tool-list{list-style:none}
.tool-item{display:flex;align-items:center;padding:16px;border-radius:var(--radius-card);transition:all .25s ease;cursor:pointer;gap:16px}
.tool-item:hover{background:var(--bg-alt);transform:translateX(4px)}
.tool-item+.tool-item{border-top:1px solid rgba(0,0,0,.06)}
.tool-icon{width:40px;height:40px;border-radius:12px;background:var(--bg-alt);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tool-icon svg{width:22px;height:22px;color:var(--primary)}
.tool-info{flex:1;min-width:0}
.tool-info h3{font-size:17px;font-weight:600;margin-bottom:2px}
.tool-info p{font-size:14px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tool-arrow{color:var(--text-secondary);transition:transform .2s,color .2s;flex-shrink:0}
.tool-item:hover .tool-arrow{color:var(--primary);transform:translateX(2px)}
.tool-arrow svg{width:20px;height:20px}
.tool-tag{font-size:12px;padding:2px 8px;border-radius:999px;background:#e8f0fe;color:#1a73e8;margin-left:8px;flex-shrink:0}

/* FAQ */
.faq{max-width:800px;margin:0 auto;padding:0 24px 80px}
.faq h2{font-size:28px;font-weight:600;letter-spacing:-.02em;margin-bottom:24px;padding:0 16px}
.faq-item{border-bottom:1px solid rgba(0,0,0,.08)}
.faq-q{display:flex;align-items:center;justify-content:space-between;padding:18px 16px;cursor:pointer;font-size:17px;font-weight:500;user-select:none;transition:color .2s}
.faq-q:hover{color:var(--primary)}
.faq-q svg{width:20px;height:20px;transition:transform .3s;flex-shrink:0;color:var(--text-secondary)}
.faq-item.open .faq-q svg{transform:rotate(180deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;font-size:15px;color:var(--text-secondary);padding:0 16px}
.faq-item.open .faq-a{max-height:200px;padding:0 16px 18px}

/* Footer */
footer{text-align:center;padding:32px 24px;font-size:13px;color:var(--text-secondary);border-top:1px solid rgba(0,0,0,.06)}
footer a{color:var(--text-secondary)}

/* Responsive */
@media(max-width:600px){
.hero{padding:100px 24px 60px}
.hero h1{font-size:30px}
.hero p{font-size:17px}
.tool-item{padding:14px 12px}
.tool-info h3{font-size:15px}
.tool-info p{font-size:13px}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">AI <span>×</span> 08</div>
  <a class="nav-github" href="https://github.com/qlb708/08" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.009-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 1.746.655A6.038 6.038 0 0 1 12 5.803c.57.002 1.145.077 1.693.227.906-.924 1.746-.655 1.746-.655.545 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
    GitHub
  </a>
</nav>

<section class="hero">
  <h1>Hi，这是 08 构建的<br><span>AI 提效工具。</span></h1>
  <p>一些真实在用的 AI 工具。</p>
  <div class="hero-btns">
    <a class="btn btn-primary" href="#tools">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      探索工具
    </a>
    <a class="btn btn-secondary" href="https://github.com/qlb708/08" target="_blank" rel="noopener">
      GitHub
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7"/><path d="M7 7h10v10"/></svg>
    </a>
  </div>
</section>

<div class="ticker" id="ticker"></div>

<section id="tools">
  <div class="tools-header">
    <h2>全部工具</h2>
    <span class="badge">8</span>
  </div>
  <ul class="tool-list" id="toolList"></ul>
</section>

<section class="faq">
  <h2>常见问题</h2>
  <div id="faqList"></div>
</section>

<footer>
  <p>Built by 08 with ❤️ &middot; <a href="https://github.com/qlb708/08" target="_blank" rel="noopener">GitHub</a></p>
</footer>

<script>
(function(){
  // Tools data
  const tools = [
    { name: '竞品动态追踪', desc: '自动监控竞品动态，生成每日热点雷达', icon: 'radar', href: './radar/', tag: '增长' },
    { name: '用户研究助手', desc: '快速生成用研报告，洞察用户真实需求', icon: 'user', href: './user-research/', tag: '用研' },
    { name: '内容创作助手', desc: 'AI 辅助内容创作，从标题到正文一气呵成', icon: 'pen', href: './content/', tag: '内容' },
    { name: '文档摘要生成', desc: '长文档秒读，自动提取关键信息和摘要', icon: 'doc', href: './doc/', tag: '文档' },
    { name: '增长策略引擎', desc: '数据驱动的增长策略，AARRR 全链路分析', icon: 'growth', href: './growth/', tag: '增长' },
    { name: '用户旅程地图', desc: '可视化用户旅程，发现体验断点', icon: 'journey', href: './journey/', tag: '体验' },
    { name: '智能打印助手', desc: 'PDF 智能分析，自动推荐彩印/黑白方案', icon: 'print', href: './print-helper/' },
    { name: '会议纪要拆解', desc: '会议记录一键拆解，自动生成待办与决策', icon: 'meeting', href: './meeting-parser/' },
  ];

  const icons = {
    radar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><path d="M12 3a9 9 0 0 1 0 18" opacity=".4"/></svg>',
    user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>',
    pen: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 3a2.83 2.83 0 0 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>',
    doc: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
    growth: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22,7 13.5,15.5 8.5,10.5 2,17"/><polyline points="16,7 22,7 22,13"/></svg>',
    journey: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="6" r="2"/><circle cx="19" cy="12" r="2"/><circle cx="12" cy="18" r="2"/><path d="M7 11l3-4M14 7l3 4M14 17l3-4M7 13l3 4"/></svg>',
    print: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>',
    meeting: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="14" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01"/></svg>',
  };

  const arrowSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>';

  // Render tool list
  const toolList = document.getElementById('toolList');
  tools.forEach(t => {
    const li = document.createElement('li');
    li.className = 'tool-item';
    li.onclick = () => window.location.href = t.href;
    li.innerHTML = `
      <div class="tool-icon">${icons[t.icon] || icons.doc}</div>
      <div class="tool-info">
        <h3>${t.name}${t.tag ? '<span class="tool-tag">' + t.tag + '</span>' : ''}</h3>
        <p>${t.desc}</p>
      </div>
      <div class="tool-arrow">${arrowSvg}</div>
    `;
    toolList.appendChild(li);
  });

  // Ticker
  const tickerEl = document.getElementById('ticker');
  const tickerTexts = [
    '「竞品雷达帮我盯了 3 个竞品，每天省 1 小时」',
    '「会议纪要一键拆解，待办自动分配到人」',
    '「打印前自动分析，立省 40% 彩印费用」',
    '「数据粘贴进去，10 秒出诊断报告」',
  ];
  let tickerIdx = 0;
  function renderTicker() {
    tickerEl.innerHTML = '';
    tickerTexts.forEach((txt, i) => {
      const span = document.createElement('span');
      span.className = 'ticker-text' + (i === tickerIdx ? ' active' : '');
      span.textContent = txt;
      tickerEl.appendChild(span);
    });
  }
  renderTicker();
  setInterval(() => {
    tickerIdx = (tickerIdx + 1) % tickerTexts.length;
    renderTicker();
  }, 4000);

  // FAQ
  const faqs = [
    { q: '这些工具免费吗？', a: '全部免费开源，代码托管在 GitHub 上。每个工具都内嵌 AI 能力，无需额外配置。' },
    { q: 'AI 功能需要什么条件？', a: '每个工具内置了多模型降级策略（智谱 → DeepSeek → Gemini），开箱即用，不需要你准备 API Key。' },
    { q: '如何反馈问题或贡献代码？', a: '欢迎在 GitHub 提 Issue 或 PR，所有工具都是开源的。' },
  ];
  const faqList = document.getElementById('faqList');
  faqs.forEach(f => {
    const div = document.createElement('div');
    div.className = 'faq-item';
    div.innerHTML = `<div class="faq-q" onclick="this.parentElement.classList.toggle('open')"><span>${f.q}</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></div><div class="faq-a">${f.a}</div>`;
    faqList.appendChild(div);
  });
})();
</script>
</body>
</html>
