<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>产品文档速写台 - 08 AI Tools</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--bg-alt:#f5f5f7;--primary:#0066cc;--primary-h:#0055aa;--text:#1d1d1f;--text2:#86868b;--card-r:20px;--el-r:12px;--btn-r:999px;--shadow:0 2px 16px rgba(0,0,0,.06);--shadow-h:0 8px 32px rgba(0,0,0,.1)}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--primary);text-decoration:none}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.06);height:52px;display:flex;align-items:center;justify-content:center}
nav .inner{width:100%;max-width:1400px;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
nav .logo{font-weight:700;font-size:17px;color:var(--text);display:flex;align-items:center;gap:8px}
nav .logo span{color:var(--primary)}
nav .logo .sep{color:#d2d2d7}
nav a.back{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:4px}
nav a.back:hover{color:var(--text)}
.page-hero{padding:32px 0 16px;text-align:center}
.page-hero h1{font-size:28px;font-weight:700}
.page-hero p{font-size:15px;color:var(--text2);margin-top:6px}
.workspace{display:flex;gap:0;max-width:1400px;margin:0 auto;padding:0 24px 64px;align-items:flex-start;min-height:500px}
.sidebar{width:160px;flex-shrink:0;background:var(--bg);border:1px solid #e8e8ed;border-radius:var(--card-r) 0 0 var(--card-r);padding:12px 0;position:sticky;top:76px;max-height:calc(100vh - 100px);overflow-y:auto}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;font-size:14px;color:var(--text2);transition:all .2s;border-left:3px solid transparent;position:relative}
.sidebar-item:hover{background:var(--bg-alt);color:var(--text)}
.sidebar-item.active{color:var(--primary);background:rgba(0,102,204,.04);border-left-color:var(--primary);font-weight:600}
.sidebar-item svg{width:18px;height:18px;flex-shrink:0}
.panel-input{width:360px;flex-shrink:0;background:var(--bg);border:1px solid #e8e8ed;border-left:none;padding:24px;position:sticky;top:76px;max-height:calc(100vh - 100px);overflow-y:auto}
.panel-output{flex:1;min-width:0;background:var(--bg);border:1px solid #e8e8ed;border-left:none;border-radius:0 var(--card-r) var(--card-r) 0;padding:24px;min-height:400px}
.panel-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #f0f0f5}
.panel-header svg{width:20px;height:20px;color:var(--primary)}
.panel-header h2{font-size:16px;font-weight:600}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px}
.form-group input,.form-group textarea{width:100%;padding:10px 14px;border:1.5px solid #d2d2d7;border-radius:var(--el-r);font-size:14px;font-family:inherit;transition:border-color .2s;background:var(--bg);color:var(--text)}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:60px}
.btn-generate{width:100%;padding:14px;border:none;border-radius:var(--btn-r);background:var(--primary);color:#fff;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;font-family:inherit}
.btn-generate:hover{background:var(--primary-h);transform:translateY(-1px)}
.btn-generate:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-generate svg{width:18px;height:18px}
.skeleton{display:flex;flex-direction:column;gap:12px;padding:8px 0}
.skeleton-block{border-radius:var(--el-r);background:linear-gradient(90deg,#f0f0f5 25%,#e8e8ed 50%,#f0f0f5 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
.skeleton-block:nth-child(1){height:24px;width:60%}
.skeleton-block:nth-child(2){height:16px;width:100%}
.skeleton-block:nth-child(3){height:16px;width:85%}
.skeleton-block:nth-child(4){height:16px;width:70%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.output-content{font-size:15px;line-height:1.8;color:var(--text)}
.output-content h1{font-size:22px;font-weight:700;margin:24px 0 12px}
.output-content h2{font-size:18px;font-weight:600;margin:20px 0 10px}
.output-content h3{font-size:16px;font-weight:600;margin:16px 0 8px}
.output-content p{margin-bottom:10px;color:var(--text2)}
.output-content ul,.output-content ol{margin:8px 0 8px 20px;color:var(--text2)}
.output-content li{margin-bottom:4px}
.output-content strong{color:var(--text);font-weight:600}
.output-content code{background:var(--bg-alt);padding:2px 6px;border-radius:4px;font-size:13px}
.output-content pre{background:var(--bg-alt);padding:16px;border-radius:var(--el-r);overflow-x:auto;margin:12px 0}
.output-content blockquote{border-left:3px solid var(--primary);padding-left:16px;margin:12px 0;color:var(--text2)}
.output-content table{width:100%;border-collapse:collapse;margin:12px 0}
.output-content th,.output-content td{border:1px solid #e8e8ed;padding:8px 12px;text-align:left;font-size:14px}
.output-content th{background:var(--bg-alt);font-weight:600}
.btn-export{margin-top:20px;padding:10px 20px;border:1.5px solid #d2d2d7;border-radius:var(--btn-r);background:var(--bg);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s;font-family:inherit}
.btn-export:hover{border-color:var(--primary);color:var(--primary)}
.doc-label{font-size:12px;color:var(--text2);padding:4px 16px 8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

.upload-zone{border:1.5px dashed rgba(0,102,204,.3);border-radius:11px;padding:11px 13px;background:rgba(0,102,204,.03);cursor:pointer;transition:all .2s;text-align:center;margin-bottom:12px}
.upload-zone:hover{border-color:#0066cc;background:rgba(0,102,204,.06)}
.upload-zone input{display:none}
.upload-zone label{cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-size:12px;color:#0066cc;font-weight:600}
.upload-zone label svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}
.upload-zone .fname{font-size:11px;color:#6e6e73;margin-top:3px}
.kb-mini{margin-top:16px;border-top:1px solid rgba(0,0,0,.07);padding-top:14px}
.kb-mini-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#aeaeb2;margin-bottom:8px}
.kb-mini-grid{display:flex;flex-direction:column;gap:6px}
.kb-mini-item{padding:9px 11px;border-radius:9px;border:1px solid rgba(0,0,0,.07);cursor:pointer;transition:border-color .2s}
.kb-mini-item:hover{border-color:rgba(0,102,204,.3)}
.kb-mini-item.open{border-color:rgba(0,102,204,.3);background:rgba(0,102,204,.03)}
.km-hd{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600}
.km-hd svg{width:12px;height:12px;fill:none;stroke:#aeaeb2;stroke-width:2;transition:transform .25s}
.kb-mini-item.open .km-hd svg{transform:rotate(90deg)}
.km-body{font-size:11px;color:#6e6e73;line-height:1.6;max-height:0;overflow:hidden;transition:max-height .3s}
.kb-mini-item.open .km-body{max-height:150px;margin-top:6px}
</style>
</head>

<div class="page-hero"><h1>产品文档速写台</h1><p>一键生成 BRD/PRD/MRD 等 7 种标准产品文档</p></div>
<div class="workspace">
  <div class="sidebar">
    <div class="doc-label">文档类型</div>
    <div class="sidebar-item active" data-doc="brd" onclick="selectDoc(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      BRD
    </div>
    <div class="sidebar-item" data-doc="mrd" onclick="selectDoc(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      MRD
    </div>
    <div class="sidebar-item" data-doc="prd" onclick="selectDoc(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      PRD
    </div>
    <div class="sidebar-item" data-doc="okr" onclick="selectDoc(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      OKR
    </div>
    <div class="sidebar-item" data-doc="competitor" onclick="selectDoc(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      竞品分析
    </div>
    <div class="sidebar-item" data-doc="userstory" onclick="selectDoc(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      用户故事
    </div>
    <div class="sidebar-item" data-doc="release" onclick="selectDoc(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      发版说明
    </div>
  </div>
  <div class="panel-input">
    <div class="panel-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><h2>产品信息</h2></div>
    <div class="form-group"><label>产品名称</label><input id="prodName" placeholder="例如：飞书"/></div>
    <div class="form-group"><label>产品简述</label><textarea id="prodDesc" placeholder="一句话描述产品的核心价值和功能"></textarea></div>
    <div class="form-group"><label>目标用户</label><input id="prodUser" placeholder="例如：中大型企业的协作团队"/></div>
    <div class="form-group"><label>补充说明（选填）</label><textarea id="prodExtra" placeholder="任何额外的背景信息或要求"></textarea></div>
    <button class="btn-generate" id="generateBtn" onclick="handleGenerate()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>生成文档</button>
  </div>
  <div class="panel-output">
    <div class="panel-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg><h2 id="outputTitle">文档预览</h2></div>
    <div id="skeleton" class="skeleton"><div class="skeleton-block"></div><div class="skeleton-block"></div><div class="skeleton-block"></div><div class="skeleton-block"></div></div>
    <div id="output" class="output-content" style="display:none"></div>
    <button id="exportBtn" class="btn-export" style="display:none" onclick="exportMarkdown()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>导出 Markdown</button>
  </div>
</div>
<script>
const PROVIDERS=[
  {name:"智谱",url:"https://open.bigmodel.cn/api/paas/v4/chat/completions",key:"3617e7083fb349e6bcf8dff86e65e967.Ab9BRVWqjsHf9a8P",model:"glm-4-flash",type:"openai"},
  {name:"DeepSeek",url:"https://api.deepseek.com/chat/completions",key:"sk-4f016c9639cb461db37f4f778d2eac4f",model:"deepseek-chat",type:"openai"},
  {name:"Gemini",url:"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent",key:["AQ.Ab8RN6Kwvan","PacRzJIFXe6Yi1Kx35q046","jXDWC8LF0dV3tKJiA"].join(""),type:"gemini"},
];
async function callAI(prompt){
  for(const p of PROVIDERS){
    try{
      let text="";
      if(p.type==="openai"){
        const res=await fetch(p.url,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+p.key},body:JSON.stringify({model:p.model,messages:[{role:"user",content:prompt}],max_tokens:8000,temperature:0.7}),signal:AbortSignal.timeout(25000)});
        if(!res.ok){const e=await res.json();console.warn(p.name,e);continue;}
        const d=await res.json();text=d.choices?.[0]?.message?.content||"";
      } else {
        const res=await fetch(p.url+"?key="+p.key,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:8000,temperature:0.7}}),signal:AbortSignal.timeout(20000)});
        if(!res.ok){continue;}
        const d=await res.json();text=d.candidates?.[0]?.content?.parts?.[0]?.text||"";
      }
      if(text){console.log("✓ used",p.name);return text;}
    }catch(e){console.warn(p.name,"failed:",e.message);continue;}
  }
  throw new Error("所有 AI 服务均不可用，请检查网络");
}
var GK=['AQ.Ab8RN6Kwvan','PacRzJIFXe6Yi1Kx35q046','jXDWC8LF0dV3tKJiA'].join('');
var GU='https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+GK;
var rawMd='';
var activeDoc='brd';
var docNames={brd:'BRD 商业需求文档',mrd:'MRD 市场需求文档',prd:'PRD 产品需求文档',okr:'OKR 目标与关键结果',competitor:'竞品分析报告',userstory:'用户故事地图',release:'发版说明'};
function selectDoc(el){
  document.querySelectorAll('.sidebar-item').forEach(function(e){e.classList.remove('active')});
  el.classList.add('active');activeDoc=el.dataset.doc;
}
var prompts={
brd:'你是一位资深产品经理。请为以下产品生成一份 BRD（Business Requirements Document）商业需求文档。\n\n产品名称：{name}\n产品简述：{desc}\n目标用户：{user}\n{extra}\n\nBRD 应包含：\n1. 产品概述与愿景\n2. 市场机会与商业价值\n3. 目标用户与市场规模\n4. 核心功能与商业目标\n5. 收入模式与成本预估\n6. 风险评估与应对策略\n7. 里程碑与资源需求\n\n使用 Markdown 格式，内容详实。',
mrd:'你是一位资深市场分析师。请为以下产品生成一份 MRD（Market Requirements Document）市场需求文档。\n\n产品名称：{name}\n产品简述：{desc}\n目标用户：{user}\n{extra}\n\nMRD 应包含：\n1. 市场概述与趋势分析\n2. 目标市场细分与规模\n3. 用户需求分析\n4. 竞品市场定位分析\n5. 产品市场机会\n6. 功能优先级建议\n7. 市场进入策略\n\n使用 Markdown 格式。',
prd:'你是一位资深产品经理。请为以下产品生成一份 PRD（Product Requirements Document）产品需求文档。\n\n产品名称：{name}\n产品简述：{desc}\n目标用户：{user}\n{extra}\n\nPRD 应包含：\n1. 产品概述\n2. 用户画像\n3. 功能需求清单（含优先级）\n4. 功能详细描述（用户故事格式）\n5. 非功能需求（性能/安全/兼容性）\n6. 交互设计要点\n7. 数据埋点需求\n8. 版本规划与里程碑\n\n使用 Markdown 格式。',
okr:'你是一位资深 OKR 教练。请为以下产品制定一套 OKR（Objectives and Key Results）。\n\n产品名称：{name}\n产品简述：{desc}\n目标用户：{user}\n{extra}\n\nOKR 应包含：\n1. 产品整体目标陈述\n2. 3-4 个 Objective\n3. 每个 Objective 对应 3-4 个 Key Result（可量化）\n4. 每个 KR 的衡量方法和数据来源\n5. 风险与依赖项\n\n使用 Markdown 格式。',
competitor:'你是一位资深战略分析师。请为以下产品生成一份竞品分析报告。\n\n产品名称：{name}\n产品简述：{desc}\n目标用户：{user}\n{extra}\n\n竞品分析应包含：\n1. 行业竞争格局概述\n2. 主要竞品选择（至少3个）\n3. 功能对比矩阵（表格）\n4. 用户群体对比\n5. 商业模式对比\n6. 优劣势 SWOT 分析\n7. 差异化策略建议\n\n使用 Markdown 格式。',
userstory:'你是一位资深用户体验设计师。请为以下产品生成一份用户故事地图（User Story Map）。\n\n产品名称：{name}\n产品简述：{desc}\n目标用户：{user}\n{extra}\n\n用户故事地图应包含：\n1. 用户旅程主干（Activity 层级）\n2. 每个 Activity 下的 Task 拆分\n3. 每个 Task 下的 User Story（As a... I want to... So that...）\n4. MVP 范围标注\n5. 优先级排序（P0/P1/P2）\n6. 验收标准（Given/When/Then）\n\n使用 Markdown 格式，用表格呈现主干结构。',
release:'你是一位资深技术文档工程师。请为以下产品生成一份发版说明（Release Notes）。\n\n产品名称：{name}\n产品简述：{desc}\n目标用户：{user}\n{extra}\n\n发版说明应包含：\n1. 版本号与发布日期\n2. 版本亮点概述\n3. 新增功能列表（含详细描述）\n4. 功能优化与改进\n5. 已知问题与限制\n6. 升级注意事项\n7. 已知 Bug 修复列表\n\n使用 Markdown 格式。'
};
function handleGenerate(){
  var name=document.getElementById('prodName').value.trim();
  var desc=document.getElementById('prodDesc').value.trim();
  var user=document.getElementById('prodUser').value.trim();
  if(!name){alert('请填写产品名称');return}
  if(!desc){alert('请填写产品简述');return}
  var extra=document.getElementById('prodExtra').value.trim();
  var tpl=prompts[activeDoc];
  var prompt=tpl.replace('{name}',name).replace('{desc}',desc).replace('{user}',user).replace('{extra}',extra?'补充说明：'+extra:'');
  doGenerate(prompt);
}
async function doGenerate(prompt){
  var btn=document.getElementById('generateBtn');
  btn.disabled=true;
  document.getElementById('skeleton').style.display='flex';
  document.getElementById('output').style.display='none';
  document.getElementById('exportBtn').style.display='none';
  document.getElementById('outputTitle').textContent=docNames[activeDoc]||'文档预览';
  try{
    var resp=await fetch(GU,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.7,maxOutputTokens:8192}}));
    var data=await resp.json();
    rawMd=data.candidates[0].content.parts[0].text;
    document.getElementById('skeleton').style.display='none';
    document.getElementById('output').style.display='block';
    document.getElementById('exportBtn').style.display='inline-flex';
    typeRender(rawMd);
  }catch(e){
    document.getElementById('skeleton').style.display='none';
    document.getElementById('output').style.display='block';
    document.getElementById('output').innerHTML='<p style="color:#e53e3e">生成失败：'+e.message+'</p>';
  }
  btn.disabled=false;
}
function typeRender(md){
  var el=document.getElementById('output');
  var plain=md.replace(/[#*`_|>\-\[\]()]/g,'').replace(/\n/g,' ');
  var idx=0;var done=false;var html=mdToHtml(md);
  function tick(){
    if(idx<=plain.length){
      el.innerHTML=mdToHtml(md.substring(0,Math.min(md.length,idx*2)));
      idx+=3;setTimeout(tick,20);
    }else if(!done){done=true;el.innerHTML=html}
  }
  tick();
}
function mdToHtml(md){
  var lines=md.split('\n');var html='';var inList=false;var inTable=false;var rows=[];
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(l.startsWith('|')){if(!inTable){inTable=true;rows=[]}rows.push(l);continue}
    else if(inTable){html+=renderTable(rows);inTable=false;rows=[]}
    if(l.startsWith('### ')){html+='<h3>'+esc(l.slice(4))+'</h3>';continue}
    if(l.startsWith('## ')){html+='<h2>'+esc(l.slice(3))+'</h2>';continue}
    if(l.startsWith('# ')){html+='<h1>'+esc(l.slice(2))+'</h1>';continue}
    if(l.startsWith('- ')||l.startsWith('* ')){if(!inList){html+='<ul>';inList=true}html+='<li>'+inline(esc(l.slice(2)))+'</li>';continue}
    if(l.match(/^\d+\.\s/)){if(!inList){html+='<ol>';inList=true}html+='<li>'+inline(esc(l.replace(/^\d+\.\s/,'')))+'</li>';continue}
    if(inList){html+='</ul>';inList=false}
    if(l.startsWith('> ')){html+='<blockquote>'+inline(esc(l.slice(2)))+'</blockquote>';continue}
    if(l.trim()===''){continue}
    html+='<p>'+inline(esc(l))+'</p>';
  }
  if(inTable)html+=renderTable(rows);
  if(inList)html+='</ul>';
  return html;
}
function renderTable(rows){
  if(rows.length<2)return'';var h='<table>';
  var hdrs=rows[0].split('|').filter(function(c){return c.trim()});
  h+='<tr>';hdrs.forEach(function(c){h+='<th>'+esc(c.trim())+'</th>'});h+='</tr>';
  for(var i=2;i<rows.length;i++){var cells=rows[i].split('|').filter(function(c){return c.trim()});h+='<tr>';cells.forEach(function(c){h+='<td>'+inline(esc(c.trim()))+'</td>'});h+='</tr>'}
  h+='</table>';return h;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function inline(s){return s.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>').replace(/`(.*?)`/g,'<code>$1</code>')}
function exportMarkdown(){var b=new Blob([rawMd],{type:'text/markdown'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=activeDoc+'-document.md';a.click()}

var docFileContent = '';
function handleDocFile(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('docFileName').textContent = '已选择：' + file.name;
  const reader = new FileReader();
  reader.onload = e => { docFileContent = e.target.result.slice(0, 3000); };
  reader.readAsText(file, 'utf-8');
}
