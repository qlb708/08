<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d14;--surface:rgba(255,255,255,.05);--surface2:rgba(255,255,255,.08);--primary:#6C5CE7;--text:#e8e8f0;--text-dim:rgba(232,232,240,.55);--border:rgba(255,255,255,.08);--radius:14px}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:var(--primary);text-decoration:none}
.topbar{position:sticky;top:0;z-index:50;background:rgba(13,13,20,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 40px;display:flex;align-items:center;gap:16px}
.back{color:var(--text-dim);font-size:14px;font-weight:500;transition:color .2s}
.back:hover{color:var(--text)}
.page-title{font-size:16px;font-weight:700}
.page-badge{margin-left:auto;padding:4px 12px;border-radius:999px;background:rgba(108,92,231,.15);color:#a29bfe;font-size:11px;font-weight:700;border:1px solid rgba(108,92,231,.25)}
/* DOC TYPE TABS */
.doc-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 40px;overflow-x:auto}
.doc-tab{padding:14px 20px;font-size:13px;font-weight:600;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;margin-bottom:-1px}
.doc-tab.active{color:#a29bfe;border-bottom-color:#6C5CE7}
.doc-tab:hover:not(.active){color:var(--text)}
.layout{display:grid;grid-template-columns:400px 1fr;min-height:calc(100vh - 100px)}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.form-panel{border-right:1px solid var(--border);padding:28px;display:flex;flex-direction:column;gap:18px;overflow-y:auto;max-height:calc(100vh - 100px)}
@media(max-width:900px){.form-panel{max-height:none;border-right:none;border-bottom:1px solid var(--border)}}
.panel-heading{font-size:18px;font-weight:800;letter-spacing:-.02em;margin-bottom:2px}
.panel-sub{font-size:13px;color:var(--text-dim);line-height:1.5}
.form-group{display:flex;flex-direction:column;gap:7px}
label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim)}
input,textarea,select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 14px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
input:focus,textarea:focus,select:focus{border-color:rgba(108,92,231,.5);box-shadow:0 0 0 3px rgba(108,92,231,.12)}
textarea{resize:vertical;min-height:80px}
select option{background:#1a1a2e}
.generate-btn{width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#6C5CE7,#8b7ff0);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 8px 24px rgba(108,92,231,.3);margin-top:6px}
.generate-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 32px rgba(108,92,231,.45)}
.generate-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.output-panel{padding:36px;overflow-y:auto;max-height:calc(100vh - 100px)}
@media(max-width:900px){.output-panel{max-height:none}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:400px;gap:16px;text-align:center}
.empty-icon{font-size:56px;opacity:.4}
.empty-title{font-size:20px;font-weight:700;color:var(--text-dim)}
.empty-desc{font-size:14px;color:var(--text-dim);max-width:360px;opacity:.7}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:24px}
.spinner{width:40px;height:40px;border:3px solid rgba(108,92,231,.2);border-top-color:#6C5CE7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text-dim);font-size:14px;animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.5}50%{opacity:1}}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.result-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--primary)}
.result-actions{display:flex;gap:10px}

.markdown-body h1{font-size:24px;font-weight:800;margin:0 0 20px;letter-spacing:-.03em;background:linear-gradient(135deg,#fff,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.markdown-body h2{font-size:16px;font-weight:700;margin:28px 0 12px;padding:12px 16px;background:rgba(108,92,231,.08);border-left:3px solid #6C5CE7;border-radius:0 10px 10px 0;color:#a29bfe;-webkit-text-fill-color:#a29bfe}

.markdown-body p{margin:0 0 12px;color:rgba(232,232,240,.85)}
.markdown-body ul,ol{margin:0 0 12px 18px;color:rgba(232,232,240,.85)}

.markdown-body strong{color:var(--text);font-weight:700}

.markdown-body td{padding:9px 14px;border:1px solid var(--border);color:rgba(232,232,240,.85)}
.markdown-body tr:hover td{background:rgba(255,255,255,.03)}
.markdown-body hr{border:none;border-top:1px solid var(--border);margin:20px 0}

let currentType = 'brd';

function switchTab(type) {
  currentType = type;
  document.querySelectorAll('.doc-tab').forEach(t => t.classList.toggle('active', t.dataset.type === type));
  renderForm(type);
  document.getElementById('outputPanel').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">📄</div>
      <div class="empty-title">${docConfigs[type].name}</div>
      <div class="empty-desc">${docConfigs[type].desc}<br><br>填写左侧信息，AI 将生成完整文档</div>
    </div>`;
}

function renderForm(type) {
  const config = docConfigs[type];
  const panel = document.getElementById('formPanel');
  let html = `<div><div class="panel-heading">${config.name}</div><div class="panel-sub">${config.desc}</div></div>`;
  config.fields.forEach(f => {
    html += `<div class="form-group"><label>${f.label}</label>`;
    if (f.type === 'textarea') {
      html += `<textarea id="${f.id}" placeholder="${f.placeholder}"></textarea>`;
    } else {
      html += `<input id="${f.id}" type="text" placeholder="${f.placeholder}"/>`;
    }
    html += `</div>`;
  });
  html += `<button class="generate-btn" id="generateBtn" onclick="generate()">✨ 生成 ${config.name}</button>`;
  panel.innerHTML = html;
}

async function generate() {
  const config = docConfigs[currentType];
  const fieldValues = {};
  let missing = false;
  config.fields.forEach(f => {
    const el = document.getElementById(f.id);
    if (el) {
      fieldValues[f.id] = el.value.trim();
      if (f.label.includes('*') && !fieldValues[f.id]) missing = true;
    }
  });
  if (missing) { alert('请填写所有必填项（带 * 的字段）'); return; }

  const prompt = config.prompt(fieldValues);
  const btn = document.getElementById('generateBtn');
  btn.disabled = true; btn.textContent = '生成中...';
  const panel = document.getElementById('outputPanel');
  panel.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">AI 正在撰写文档，请稍候...</div></div>';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.7, maxOutputTokens: 4096 } })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || '请求失败');
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    if (!text) throw new Error('返回内容为空');

    panel.innerHTML = `
      <div class="result-header">
        <span class="result-title">📄 ${config.name} 已生成</span>
        <div class="result-actions">
          <button class="action-btn primary" onclick="copyDoc()">复制全文</button>
          <button class="action-btn" onclick="downloadDoc()">下载 .md</button>
          <button class="action-btn" onclick="switchTab('${currentType}')">重新生成</button>
        </div>
      </div>
      <div class="markdown-body" id="docContent">${marked.parse(text)}</div>`;
    window._docText = text;
    window._docName = config.name;
  } catch(e) {
    panel.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">生成失败</div><div class="empty-desc">${e.message}</div></div>`;
  } finally {
    btn.disabled = false; btn.textContent = `✨ 生成 ${config.name}`;
  }
}

function copyDoc() {
  navigator.clipboard.writeText(window._docText || '').then(() => {
    const btn = event.target;
    btn.textContent = '✅ 已复制';
    setTimeout(() => btn.textContent = '复制全文', 2000);
  });
}

function downloadDoc() {
  const blob = new Blob([window._docText || ''], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${window._docName || 'document'}-${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.md`;
  a.click();
}

// Init tabs
document.querySelectorAll('.doc-tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.type));
});
renderForm('brd');
</script>
</body>
</html>
