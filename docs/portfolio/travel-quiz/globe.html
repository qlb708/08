<!DOCTYPE html>
<!-- Author: qlb | Created: 2026-07-03 | Interactive 3D Globe City Picker -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>选择目的地</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #06061a;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  overflow: hidden;
  color: #fff;
}

#stars-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}

.page-wrap {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center; gap: 28px;
}

.title {
  text-align: center;
}
.title-eyebrow {
  font-size: 12px; letter-spacing: 4px; text-transform: uppercase;
  color: rgba(255,255,255,0.35); margin-bottom: 10px;
}
.title-main {
  font-size: clamp(28px, 4vw, 44px); font-weight: 800;
  background: linear-gradient(135deg, #fff 0%, #a8c0ff 60%, #7986fb 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1.2;
}
.title-sub {
  font-size: 14px; color: rgba(255,255,255,0.4); margin-top: 8px;
}

#globe-wrap {
  position: relative;
  width: 420px; height: 420px;
  cursor: grab;
  user-select: none;
}
#globe-wrap:active { cursor: grabbing; }
#globe-canvas { display: block; border-radius: 50%; }

/* city tooltip */
#city-tooltip {
  position: fixed; z-index: 100;
  background: rgba(255,255,255,0.1); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
  padding: 7px 14px; font-size: 13px; font-weight: 600; color: #fff;
  pointer-events: none; display: none;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* selected badge */
#selected-badge {
  display: none; align-items: center; gap: 10px;
  background: rgba(29,111,235,0.15); border: 1.5px solid rgba(29,111,235,0.4);
  border-radius: 50px; padding: 10px 24px;
  animation: badgePop 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
#selected-badge.show { display: flex; }
@keyframes badgePop { from{transform:scale(0.7);opacity:0} to{transform:scale(1);opacity:1} }
.badge-label { font-size: 13px; color: rgba(255,255,255,0.6); }
.badge-city { font-size: 16px; font-weight: 800; color: #fff; }
.badge-btn {
  padding: 8px 22px; background: #1D6FEB; border: none; border-radius: 50px;
  color: #fff; font-size: 14px; font-weight: 700; cursor: pointer;
  box-shadow: 0 0 20px rgba(29,111,235,0.5); transition: all 0.2s;
  font-family: inherit;
}
.badge-btn:hover { box-shadow: 0 0 35px rgba(29,111,235,0.7); transform: translateY(-1px); }

.hint {
  font-size: 12px; color: rgba(255,255,255,0.25); letter-spacing: 1px;
}
</style>
</head>
<body>

<canvas id="stars-bg"></canvas>

<div class="page-wrap">
  <div class="title">
    <div class="title-eyebrow">✦ AI 旅行规划</div>
    <div class="title-main">去哪儿旅行？</div>
    <div class="title-sub">拖动地球，点亮你的目的地</div>
  </div>

  <div id="globe-wrap">
    <canvas id="globe-canvas" width="420" height="420"></canvas>
  </div>

  <div id="selected-badge">
    <div class="badge-label">已选目的地</div>
    <div class="badge-city" id="badge-city-name">—</div>
    <button class="badge-btn" onclick="goNext()">开始规划 →</button>
  </div>

  <div class="hint">拖动旋转 · 点击选择城市</div>
</div>

<div id="city-tooltip"></div>

<script>
// ===== STARS =====
(function(){
  var c = document.getElementById('stars-bg');
  c.width = window.innerWidth; c.height = window.innerHeight;
  var ctx = c.getContext('2d');
  for(var i=0;i<200;i++){
    var x=Math.random()*c.width, y=Math.random()*c.height;
    var r=Math.random()*1.2+0.2;
    var a=Math.random()*0.7+0.1;
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,'+a+')'; ctx.fill();
  }
})();

// ===== CITIES =====
var CITIES = [
  {name:'北京', lon:116.4, lat:39.9, emoji:'🏯'},
  {name:'上海', lon:121.5, lat:31.2, emoji:'🌆'},
  {name:'成都', lon:104.1, lat:30.7, emoji:'🐼'},
  {name:'西安', lon:108.9, lat:34.3, emoji:'🏺'},
  {name:'杭州', lon:120.2, lat:30.3, emoji:'🌸'},
  {name:'重庆', lon:106.5, lat:29.6, emoji:'🌃'},
  {name:'三亚', lon:109.5, lat:18.3, emoji:'🏖️'},
  {name:'东京', lon:139.7, lat:35.7, emoji:'🗼'},
  {name:'大阪', lon:135.5, lat:34.7, emoji:'🏯'},
  {name:'首尔', lon:127.0, lat:37.6, emoji:'🎎'},
  {name:'新加坡', lon:103.8, lat:1.3, emoji:'🌴'},
  {name:'曼谷', lon:100.5, lat:13.8, emoji:'🛕'},
  {name:'巴厘岛', lon:115.2, lat:-8.4, emoji:'🌺'},
  {name:'香港', lon:114.2, lat:22.3, emoji:'🌃'},
  {name:'台北', lon:121.6, lat:25.0, emoji:'🧋'},
  {name:'巴黎', lon:2.3, lat:48.9, emoji:'🗺️'},
  {name:'伦敦', lon:-0.1, lat:51.5, emoji:'🎡'},
  {name:'罗马', lon:12.5, lat:41.9, emoji:'🏛️'},
  {name:'巴塞罗那', lon:2.2, lat:41.4, emoji:'🎨'},
  {name:'纽约', lon:-74.0, lat:40.7, emoji:'🗽'},
  {name:'洛杉矶', lon:-118.2, lat:34.1, emoji:'🎬'},
  {name:'迪拜', lon:55.3, lat:25.2, emoji:'🏙️'},
  {name:'悉尼', lon:151.2, lat:-33.9, emoji:'🦘'},
  {name:'伊斯坦布尔', lon:29.0, lat:41.0, emoji:'🕌'},
];

// ===== GLOBE =====
var canvas = document.getElementById('globe-canvas');
var ctx = canvas.getContext('2d');
var W = canvas.width, H = canvas.height;
var R = W / 2 - 10;
var CX = W / 2, CY = H / 2;

var rotY = 1.8; // lon offset (radians)
var rotX = -0.2; // tilt

var isDragging = false;
var lastX, lastY;
var velX = 0.003, velY = 0;
var selectedCity = null;
var hoveredCity = null;

// simplified continents as lat/lon polygons
var CONTINENTS = [
  // Eurasia (simplified)
  [[35,-10],[35,180],[75,180],[75,40],[50,30],[40,25],[35,25],[30,20],[25,55],[15,45],[10,44],[5,38],[35,-10]],
  // Africa
  [[35,-5],[35,55],[10,55],[-10,45],[-35,20],[-35,-20],[0,-20],[15,-20],[35,-5]],
  // North America
  [[70,-170],[70,-50],[50,-55],[30,-80],[25,-80],[15,-90],[20,-105],[30,-117],[50,-120],[70,-140],[70,-170]],
  // South America
  [[-5,-80],[-5,-35],[-55,-65],[-55,-70],[-5,-80]],
  // Australia
  [[-10,130],[-10,155],[-40,150],[-40,115],[-10,130]],
];

function toRad(d){ return d * Math.PI / 180; }

function latlonTo3D(lat, lon) {
  var la = toRad(lat), lo = toRad(lon);
  return {
    x: Math.cos(la) * Math.cos(lo),
    y: Math.sin(la),
    z: Math.cos(la) * Math.sin(lo)
  };
}

function rotate3D(p) {
  // rotate around Y axis (rotY)
  var x1 = p.x * Math.cos(rotY) - p.z * Math.sin(rotY);
  var z1 = p.x * Math.sin(rotY) + p.z * Math.cos(rotY);
  var y1 = p.y;
  // rotate around X axis (rotX)
  var y2 = y1 * Math.cos(rotX) - z1 * Math.sin(rotX);
  var z2 = y1 * Math.sin(rotX) + z1 * Math.cos(rotX);
  return { x: x1, y: y2, z: z2 };
}

function project(p) {
  return {
    sx: CX + p.x * R,
    sy: CY - p.y * R,
    z: p.z
  };
}

function drawGlobe() {
  ctx.clearRect(0, 0, W, H);

  // --- globe base ---
  var grad = ctx.createRadialGradient(CX - R*0.3, CY - R*0.3, R*0.1, CX, CY, R);
  grad.addColorStop(0, '#1a2a6c');
  grad.addColorStop(0.5, '#0d1b4b');
  grad.addColorStop(1, '#060d2a');
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // --- atmosphere glow ---
  var atm = ctx.createRadialGradient(CX, CY, R*0.85, CX, CY, R*1.05);
  atm.addColorStop(0, 'rgba(29,111,235,0)');
  atm.addColorStop(1, 'rgba(29,111,235,0.35)');
  ctx.beginPath();
  ctx.arc(CX, CY, R*1.05, 0, Math.PI*2);
  ctx.fillStyle = atm;
  ctx.fill();

  // clip to sphere
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, Math.PI*2);
  ctx.clip();

  // --- lat/lon grid (subtle) ---
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for(var lat = -80; lat <= 80; lat += 20) {
    ctx.beginPath();
    var first = true;
    for(var lo = -180; lo <= 180; lo += 3) {
      var p3 = latlonTo3D(lat, lo);
      var rp = rotate3D(p3);
      if(rp.z < 0) { first = true; continue; }
      var pp = project(rp);
      if(first){ ctx.moveTo(pp.sx, pp.sy); first=false; }
      else ctx.lineTo(pp.sx, pp.sy);
    }
    ctx.stroke();
  }
  for(var lon2 = -180; lon2 < 180; lon2 += 30) {
    ctx.beginPath();
    var first2 = true;
    for(var la2 = -90; la2 <= 90; la2 += 2) {
      var p3b = latlonTo3D(la2, lon2);
      var rpb = rotate3D(p3b);
      if(rpb.z < 0) { first2 = true; continue; }
      var ppb = project(rpb);
      if(first2){ ctx.moveTo(ppb.sx, ppb.sy); first2=false; }
      else ctx.lineTo(ppb.sx, ppb.sy);
    }
    ctx.stroke();
  }

  // --- continents ---
  CONTINENTS.forEach(function(poly) {
    ctx.beginPath();
    var started = false;
    poly.forEach(function(pt) {
      var p3c = latlonTo3D(pt[0], pt[1]);
      var rpc = rotate3D(p3c);
      var ppc = project(rpc);
      if(!started){ ctx.moveTo(ppc.sx, ppc.sy); started=true; }
      else ctx.lineTo(ppc.sx, ppc.sy);
    });
    ctx.closePath();
    ctx.fillStyle = 'rgba(100,160,255,0.18)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(120,180,255,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });

  ctx.restore();

  // --- sphere highlight ---
  var hl = ctx.createRadialGradient(CX - R*0.35, CY - R*0.35, 0, CX - R*0.35, CY - R*0.35, R*0.8);
  hl.addColorStop(0, 'rgba(255,255,255,0.12)');
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.save();
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI*2); ctx.clip();
  ctx.fillStyle = hl; ctx.fillRect(0,0,W,H);
  ctx.restore();

  // --- cities ---
  var sorted = CITIES.map(function(city) {
    var p3 = latlonTo3D(city.lat, city.lon);
    var rp = rotate3D(p3);
    var pp = project(rp);
    return { city: city, rp: rp, pp: pp };
  }).filter(function(d){ return d.rp.z > -0.1; })
    .sort(function(a,b){ return a.rp.z - b.rp.z; });

  sorted.forEach(function(d) {
    var city = d.city;
    var sx = d.pp.sx, sy = d.pp.sy;
    var z = d.rp.z;
    var isSel = selectedCity && selectedCity.name === city.name;
    var isHov = hoveredCity && hoveredCity.name === city.name;
    var alpha = Math.max(0.2, z);

    if(isSel) {
      // outer glow ring
      var grd = ctx.createRadialGradient(sx, sy, 3, sx, sy, 22);
      grd.addColorStop(0, 'rgba(29,111,235,0.7)');
      grd.addColorStop(1, 'rgba(29,111,235,0)');
      ctx.beginPath(); ctx.arc(sx, sy, 22, 0, Math.PI*2);
      ctx.fillStyle = grd; ctx.fill();
      // pulse ring
      ctx.beginPath(); ctx.arc(sx, sy, 14, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(29,111,235,0.8)'; ctx.lineWidth = 2; ctx.stroke();
      // dot
      ctx.beginPath(); ctx.arc(sx, sy, 6, 0, Math.PI*2);
      ctx.fillStyle = '#1D6FEB'; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    } else if(isHov) {
      var grd2 = ctx.createRadialGradient(sx, sy, 2, sx, sy, 16);
      grd2.addColorStop(0, 'rgba(255,255,255,0.6)');
      grd2.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(sx, sy, 16, 0, Math.PI*2);
      ctx.fillStyle = grd2; ctx.fill();
      ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,'+alpha+')'; ctx.fill();
    } else {
      // normal dot
      var grd3 = ctx.createRadialGradient(sx, sy, 1, sx, sy, 10);
      grd3.addColorStop(0, 'rgba(255,255,255,'+(alpha*0.5)+')');
      grd3.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.arc(sx, sy, 10, 0, Math.PI*2);
      ctx.fillStyle = grd3; ctx.fill();
      ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,'+(alpha*0.9)+')'; ctx.fill();
    }

    // label for hovered/selected
    if(isHov || isSel) {
      ctx.font = 'bold 12px -apple-system, sans-serif';
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.textAlign = 'center';
      ctx.fillText(city.name, sx, sy - 16);
    }
  });

  // store for hit test
  canvas._cityDrawList = sorted;
}

// hit test
function hitTest(mx, my) {
  if(!canvas._cityDrawList) return null;
  for(var i = canvas._cityDrawList.length-1; i>=0; i--) {
    var d = canvas._cityDrawList[i];
    var dx = mx - d.pp.sx, dy = my - d.pp.sy;
    if(Math.sqrt(dx*dx+dy*dy) < 14) return d.city;
  }
  return null;
}

// animation loop
var _raf;
function loop() {
  if(!isDragging) {
    rotY += velX;
    rotX += velY;
    velX *= 0.97;
    velY *= 0.97;
    rotX = Math.max(-0.7, Math.min(0.7, rotX));
  }
  drawGlobe();
  _raf = requestAnimationFrame(loop);
}
loop();

// drag
var globeWrap = document.getElementById('globe-wrap');

globeWrap.addEventListener('mousedown', function(e) {
  isDragging = true;
  lastX = e.clientX; lastY = e.clientY;
  velX = 0; velY = 0;
});

window.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var hit = hitTest(mx, my);
  var tooltip = document.getElementById('city-tooltip');

  if(isDragging) {
    var dx = e.clientX - lastX;
    var dy = e.clientY - lastY;
    rotY += dx * 0.006;
    rotX += dy * 0.006;
    rotX = Math.max(-0.7, Math.min(0.7, rotX));
    velX = dx * 0.006;
    velY = dy * 0.006;
    lastX = e.clientX; lastY = e.clientY;
    hoveredCity = null;
    tooltip.style.display = 'none';
  } else {
    hoveredCity = hit;
    if(hit) {
      globeWrap.style.cursor = 'pointer';
      tooltip.style.display = 'block';
      tooltip.textContent = hit.emoji + ' ' + hit.name;
      tooltip.style.left = (e.clientX + 14) + 'px';
      tooltip.style.top = (e.clientY - 12) + 'px';
    } else {
      globeWrap.style.cursor = 'grab';
      tooltip.style.display = 'none';
    }
  }
});

window.addEventListener('mouseup', function(e) {
  if(!isDragging) return;
  var rect = canvas.getBoundingClientRect();
  var mx = e.clientX - rect.left;
  var my = e.clientY - rect.top;
  var moved = Math.abs(e.clientX - lastX) + Math.abs(e.clientY - lastY);
  if(moved < 5) {
    var hit = hitTest(mx, my);
    if(hit) selectCity(hit);
  }
  isDragging = false;
});

function selectCity(city) {
  selectedCity = city;
  var badge = document.getElementById('selected-badge');
  var name = document.getElementById('badge-city-name');
  name.textContent = city.emoji + ' ' + city.name;
  badge.classList.add('show');
}

function goNext() {
  if(!selectedCity) return;
  alert('已选择：' + selectedCity.name + '\n下一步：测旅行偏好');
}
</script>
</body>
</html>
