<!DOCTYPE html>
<!-- Author: qlb | Created: 2026-07-03 | Travel Personality Quiz -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是哪种旅行者？</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --blue: #1D6FEB;
    --blue-light: #EEF4FF;
    --ink: #111827;
    --gray: #6B7280;
    --gray-light: #F3F4F6;
    --border: #E5E7EB;
    --radius: 20px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: #0A0A0F;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== STARS BG ===== */
  #stars-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at 20% 20%, #1a1a3e 0%, #0A0A0F 60%);
  }
  .star {
    position: absolute; border-radius: 50%; background: #fff;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    opacity: var(--o, 0.6);
  }
  @keyframes twinkle {
    0%,100% { opacity: var(--o, 0.6); transform: scale(1); }
    50% { opacity: 0.1; transform: scale(0.5); }
  }

  /* ===== SCREEN SYSTEM ===== */
  .screen { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .screen.hidden { display: none; }

  /* ===== INTRO SCREEN ===== */
  #screen-intro {
    text-align: center;
    gap: 32px;
  }
  .intro-eyebrow {
    font-size: 13px; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(255,255,255,0.4); font-weight: 500;
  }
  .intro-title {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 800; line-height: 1.15;
    background: linear-gradient(135deg, #fff 0%, #a8c0ff 50%, #7986fb 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .intro-sub {
    font-size: 16px; color: rgba(255,255,255,0.5); line-height: 1.7;
    max-width: 420px; margin: 0 auto;
  }
  .intro-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--blue); color: #fff;
    padding: 16px 40px; border-radius: 50px;
    font-size: 17px; font-weight: 700; border: none; cursor: pointer;
    box-shadow: 0 0 40px rgba(29,111,235,0.5);
    transition: all 0.2s; margin-top: 8px;
  }
  .intro-btn:hover { transform: translateY(-2px); box-shadow: 0 0 60px rgba(29,111,235,0.7); }
  .intro-btn .arrow { font-size: 20px; transition: transform 0.2s; }
  .intro-btn:hover .arrow { transform: translateX(4px); }
  .intro-dots {
    display: flex; gap: 6px; justify-content: center; margin-top: 8px;
  }
  .intro-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); }

  /* ===== QUIZ SCREEN ===== */
  #screen-quiz { padding: 0; }

  .quiz-wrap {
    width: 100%; max-width: 880px;
    padding: 48px 32px;
    display: flex; flex-direction: column; gap: 40px;
    align-items: center;
  }

  /* progress */
  .quiz-progress-wrap { width: 100%; display: flex; align-items: center; gap: 16px; }
  .quiz-progress-bar {
    flex: 1; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
  }
  .quiz-progress-fill {
    height: 100%; background: var(--blue); border-radius: 2px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .quiz-progress-label { font-size: 12px; color: rgba(255,255,255,0.35); white-space: nowrap; }

  /* question */
  .quiz-q-wrap { text-align: center; min-height: 80px; }
  .quiz-q-emoji { font-size: 36px; margin-bottom: 12px; display: block; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .quiz-q-text {
    font-size: clamp(20px, 3vw, 28px); font-weight: 700; line-height: 1.4;
    color: #fff; animation: fadeUp 0.4s ease;
  }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes fadeUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* choices */
  .quiz-choices {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px; width: 100%;
  }
  .quiz-choice {
    position: relative; border-radius: 20px; overflow: hidden;
    cursor: pointer; border: 2px solid transparent;
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    background: rgba(255,255,255,0.05);
    aspect-ratio: 4/3;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .quiz-choice:hover { transform: scale(1.02); border-color: rgba(255,255,255,0.3); }
  .quiz-choice.selecting { animation: selectPulse 0.4s ease; }
  .quiz-choice.dismissed { animation: dismissFade 0.4s ease forwards; }
  @keyframes selectPulse {
    0% { transform: scale(1); } 30% { transform: scale(1.05); box-shadow: 0 0 40px rgba(29,111,235,0.6); }
    100% { transform: scale(1); }
  }
  @keyframes dismissFade {
    to { transform: scale(0.9); opacity: 0.2; filter: grayscale(1); }
  }

  .choice-bg {
    position: absolute; inset: 0; background-size: cover; background-position: center;
    transition: transform 0.4s ease;
  }
  .quiz-choice:hover .choice-bg { transform: scale(1.05); }
  .choice-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
  }
  .choice-content {
    position: relative; z-index: 2; padding: 20px;
  }
  .choice-tag {
    display: inline-block; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 4px 10px; border-radius: 20px; font-size: 11px; color: rgba(255,255,255,0.8);
    margin-bottom: 8px; font-weight: 500;
  }
  .choice-label {
    font-size: 18px; font-weight: 700; color: #fff; line-height: 1.3;
  }
  .choice-desc {
    font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 4px; line-height: 1.5;
  }

  /* vs divider */
  .quiz-vs {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    z-index: 20; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.15);
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.5);
    letter-spacing: 1px; backdrop-filter: blur(8px);
    pointer-events: none;
  }

  /* ===== LOADING SCREEN ===== */
  #screen-loading { gap: 32px; text-align: center; }
  .loading-orb {
    width: 120px; height: 120px; border-radius: 50%;
    background: conic-gradient(from 0deg, #7986fb, #1D6FEB, #a8c0ff, #7986fb);
    animation: orbSpin 2s linear infinite;
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .loading-orb::after {
    content: ''; position: absolute; inset: 6px; border-radius: 50%; background: #0A0A0F;
  }
  .loading-orb-inner {
    position: relative; z-index: 1; font-size: 32px; animation: orbSpin 2s linear infinite reverse;
  }
  @keyframes orbSpin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 18px; color: rgba(255,255,255,0.6); }
  .loading-steps { display: flex; flex-direction: column; gap: 12px; min-width: 280px; }
  .loading-step {
    display: flex; align-items: center; gap: 12px;
    font-size: 14px; color: rgba(255,255,255,0.3);
    transition: color 0.5s;
  }
  .loading-step.active { color: #fff; }
  .loading-step.done { color: rgba(255,255,255,0.5); }
  .loading-step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.1); flex-shrink: 0;
    transition: background 0.5s, box-shadow 0.5s;
  }
  .loading-step.active .loading-step-dot {
    background: var(--blue); box-shadow: 0 0 10px rgba(29,111,235,0.8);
    animation: dotPulse 1s ease-in-out infinite;
  }
  .loading-step.done .loading-step-dot { background: #4CAF50; }
  @keyframes dotPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4)} }

  /* ===== RESULT SCREEN ===== */
  #screen-result {
    padding: 0; overflow-y: auto; justify-content: flex-start;
    background: linear-gradient(180deg, #0A0A0F 0%, #0d0d1a 100%);
  }
  .result-wrap { width: 100%; max-width: 900px; padding: 48px 32px 80px; margin: 0 auto; }

  /* persona reveal */
  .result-persona {
    text-align: center; margin-bottom: 48px;
    animation: fadeUp 0.6s ease;
  }
  .persona-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    padding: 6px 16px; border-radius: 50px; font-size: 13px;
    color: rgba(255,255,255,0.5); margin-bottom: 24px;
  }
  .persona-emoji {
    font-size: 72px; margin-bottom: 16px; display: block;
    animation: bounceIn 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
  }
  @keyframes bounceIn { from{transform:scale(0) rotate(-10deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
  .persona-name {
    font-size: clamp(32px,5vw,52px); font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, #a8c0ff 60%, #7986fb 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 12px;
  }
  .persona-desc {
    font-size: 16px; color: rgba(255,255,255,0.55); max-width: 440px; margin: 0 auto; line-height: 1.7;
  }

  /* traits */
  .result-traits {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 48px; animation: fadeUp 0.6s ease 0.2s both;
  }
  .trait-chip {
    padding: 8px 18px; border-radius: 50px; font-size: 13px; font-weight: 600;
    border: 1px solid; backdrop-filter: blur(4px);
  }

  /* route */
  .result-section-title {
    font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
    color: rgba(255,255,255,0.3); margin-bottom: 20px; font-weight: 600;
    animation: fadeUp 0.6s ease 0.3s both;
  }
  .route-timeline { position: relative; }
  .route-timeline::before {
    content: ''; position: absolute; left: 28px; top: 16px; bottom: 16px;
    width: 2px; background: linear-gradient(to bottom, var(--blue), rgba(29,111,235,0.1));
  }
  .route-day {
    display: flex; gap: 20px; margin-bottom: 32px;
    animation: fadeUp 0.5s ease both;
  }
  .route-day-num {
    width: 56px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; padding-top: 4px;
  }
  .day-circle {
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--blue); border: 3px solid #0A0A0F;
    box-shadow: 0 0 12px rgba(29,111,235,0.6);
    position: relative; z-index: 1;
  }
  .day-label { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 6px; }
  .route-day-content { flex: 1; }
  .day-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 12px; }
  .day-spots {
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .spot-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 12px 16px; cursor: pointer;
    transition: all 0.2s; min-width: 140px;
  }
  .spot-card:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.18); transform: translateY(-2px); }
  .spot-card.expanded { border-color: rgba(29,111,235,0.5); background: rgba(29,111,235,0.08); }
  .spot-name { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .spot-meta { font-size: 11px; color: rgba(255,255,255,0.4); display: flex; gap: 8px; align-items: center; }
  .spot-expand {
    margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.55); line-height: 1.6;
    border-top: 1px solid rgba(255,255,255,0.08); padding-top: 10px;
    display: none;
  }
  .spot-card.expanded .spot-expand { display: block; }

  /* stats */
  .result-stats {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 12px;
    margin-bottom: 40px; animation: fadeUp 0.6s ease 0.4s both;
  }
  .stat-card {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px; padding: 20px 16px; text-align: center;
  }
  .stat-val { font-size: 28px; font-weight: 800; color: #fff; }
  .stat-unit { font-size: 12px; color: rgba(255,255,255,0.4); }
  .stat-label { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 4px; }

  /* radar */
  .result-radar-wrap {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px; padding: 28px; margin-bottom: 40px;
    display: flex; align-items: center; gap: 40px;
    animation: fadeUp 0.6s ease 0.5s both;
  }
  .radar-labels { flex: 1; display: flex; flex-direction: column; gap: 12px; }
  .radar-label-row { display: flex; align-items: center; gap: 10px; }
  .radar-label-bar-wrap { flex:1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow:hidden; }
  .radar-label-bar { height: 100%; border-radius: 2px; background: var(--blue); transition: width 1.5s cubic-bezier(0.4,0,0.2,1) 0.8s; }
  .radar-label-name { font-size: 12px; color: rgba(255,255,255,0.5); width: 48px; flex-shrink:0; }
  .radar-label-val { font-size: 12px; color: #fff; font-weight: 700; width: 24px; text-align: right; flex-shrink:0; }

  /* cta */
  .result-cta {
    text-align: center; margin-top: 48px; animation: fadeUp 0.6s ease 0.6s both;
  }
  .cta-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--blue); color: #fff;
    padding: 14px 36px; border-radius: 50px;
    font-size: 16px; font-weight: 700; border: none; cursor: pointer;
    box-shadow: 0 0 40px rgba(29,111,235,0.4);
    transition: all 0.2s; margin: 0 8px;
  }
  .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 0 60px rgba(29,111,235,0.6); }
  .cta-btn.secondary {
    background: rgba(255,255,255,0.07); box-shadow: none;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .cta-btn.secondary:hover { background: rgba(255,255,255,0.12); box-shadow: none; }

  /* ===== TRANSITIONS ===== */
  .screen { transition: opacity 0.4s ease, transform 0.4s ease; }
  .screen.exit { opacity: 0; transform: scale(0.97); pointer-events: none; }
  .screen.enter { animation: screenEnter 0.5s cubic-bezier(0.4,0,0.2,1) both; }
  @keyframes screenEnter { from{opacity:0;transform:scale(1.02)} to{opacity:1;transform:scale(1)} }
</style>
</head>
<body>

<div id="stars-bg"></div>

<!-- ===== INTRO ===== -->
<div id="screen-intro" class="screen">
  <div style="display:flex;flex-direction:column;align-items:center;gap:28px;max-width:600px;padding:32px">
    <div class="intro-eyebrow">✦ 旅行人格测试 ✦</div>
    <div class="intro-title">你是哪种<br>旅行者？</div>
    <div class="intro-sub">5个选择，2分钟<br>解锁你的旅行人格 + AI定制北京5日行程</div>
    <button class="intro-btn" onclick="startQuiz()">
      开始测试 <span class="arrow">→</span>
    </button>
    <div class="intro-dots">
      <div class="intro-dot"></div>
      <div class="intro-dot"></div>
      <div class="intro-dot"></div>
      <div class="intro-dot"></div>
      <div class="intro-dot"></div>
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,0.2)">共5题 · 每题选一张图</div>
  </div>
</div>

<!-- ===== QUIZ ===== -->
<div id="screen-quiz" class="screen hidden">
  <div class="quiz-wrap">
    <div class="quiz-progress-wrap">
      <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="quiz-progress-label" id="progress-label">1 / 5</div>
    </div>
    <div class="quiz-q-wrap">
      <span class="quiz-q-emoji" id="q-emoji">✈️</span>
      <div class="quiz-q-text" id="q-text"></div>
    </div>
    <div style="position:relative;width:100%">
      <div class="quiz-choices" id="quiz-choices"></div>
      <div class="quiz-vs">VS</div>
    </div>
  </div>
</div>

<!-- ===== LOADING ===== -->
<div id="screen-loading" class="screen hidden">
  <div class="loading-orb"><div class="loading-orb-inner">🧠</div></div>
  <div class="loading-text">AI 正在解析你的旅行基因…</div>
  <div class="loading-steps" id="loading-steps">
    <div class="loading-step" id="lstep-0"><div class="loading-step-dot"></div>分析选择偏好</div>
    <div class="loading-step" id="lstep-1"><div class="loading-step-dot"></div>匹配旅行人格</div>
    <div class="loading-step" id="lstep-2"><div class="loading-step-dot"></div>规划个性化路线</div>
    <div class="loading-step" id="lstep-3"><div class="loading-step-dot"></div>计算最优时间分配</div>
    <div class="loading-step" id="lstep-4"><div class="loading-step-dot"></div>生成专属行程</div>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="screen-result" class="screen hidden">
  <div class="result-wrap" id="result-wrap"></div>
</div>

<script>
// ===== STARS =====
(function(){
  var bg = document.getElementById('stars-bg');
  for(var i=0;i<120;i++){
    var s = document.createElement('div');
    s.className = 'star';
    var size = Math.random()*2+0.5;
    s.style.cssText = [
      'width:'+size+'px','height:'+size+'px',
      'left:'+(Math.random()*100)+'%','top:'+(Math.random()*100)+'%',
      '--d:'+(Math.random()*4+2)+'s','--o:'+(Math.random()*0.6+0.1)
    ].join(';');
    bg.appendChild(s);
  }
})();

// ===== QUIZ DATA =====
var QUESTIONS = [
  {
    emoji: '🌅',
    text: '早上醒来，你最想做的第一件事是？',
    choices: [
      {
        tag: '效率派', label: '已经在路上了', desc: '7点出门，第一个到景点，绝不排队',
        bg: 'linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)',
        emoji: '🏃',
        value: 'rush'
      },
      {
        tag: '慢活派', label: '先喝杯咖啡再说', desc: '找家好看的早餐店，在巷子里发会呆',
        bg: 'linear-gradient(135deg,#2d1b69 0%,#11998e 100%)',
        emoji: '☕',
        value: 'slow'
      }
    ]
  },
  {
    emoji: '🗺️',
    text: '你的旅行行程表长什么样？',
    choices: [
      {
        tag: '精密计划', label: '分钟级精确规划', desc: '每个景点几点到、停多久，全部列好',
        bg: 'linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%)',
        emoji: '📋',
        value: 'plan'
      },
      {
        tag: '随心走', label: '地图都不带一张', desc: '走到哪算哪，迷路才是乐趣',
        bg: 'linear-gradient(135deg,#f093fb 0%,#f5576c 100%)',
        emoji: '🌀',
        value: 'wander'
      }
    ]
  },
  {
    emoji: '📸',
    text: '拍照对你来说是？',
    choices: [
      {
        tag: '记录狂', label: '每个角度都要拍', desc: '回家有1000张照片，每张都有用',
        bg: 'linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)',
        emoji: '📷',
        value: 'photo'
      },
      {
        tag: '活在当下', label: '手机留在口袋里', desc: '眼睛看到的比相册重要',
        bg: 'linear-gradient(135deg,#43e97b 0%,#38f9d7 100%)',
        emoji: '👁️',
        value: 'live'
      }
    ]
  },
  {
    emoji: '🍜',
    text: '说到吃，你更倾向于？',
    choices: [
      {
        tag: '探店达人', label: '提前研究好必吃清单', desc: '大众点评收藏夹里有50家等着打卡',
        bg: 'linear-gradient(135deg,#fa709a 0%,#fee140 100%)',
        emoji: '🔖',
        value: 'foodie'
      },
      {
        tag: '随缘觅食', label: '路边摊才是真滋味', desc: '看到队伍就排，不知道吃什么才好吃',
        bg: 'linear-gradient(135deg,#a18cd1 0%,#fbc2eb 100%)',
        emoji: '🥢',
        value: 'street'
      }
    ]
  },
  {
    emoji: '🌙',
    text: '旅行最后一天，你会？',

// ===== STATE =====
var answers = [];
var currentQ = 0;
var persona = null;

// ===== SCREENS =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.add('hidden'); s.classList.remove('enter'); });
  var el = document.getElementById('screen-'+id);
  el.classList.remove('hidden');
  el.classList.add('enter');
}

// ===== INTRO =====
function startQuiz() {
  answers = []; currentQ = 0;
  showScreen('quiz');
  renderQuestion(0);
}

// ===== QUIZ =====
function renderQuestion(idx) {
  var q = QUESTIONS[idx];
  var pct = (idx / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = (idx+1) + ' / ' + QUESTIONS.length;

  var emojiEl = document.getElementById('q-emoji');
  emojiEl.style.animation = 'none'; void emojiEl.offsetWidth; emojiEl.style.animation = '';
  emojiEl.textContent = q.emoji;

  var textEl = document.getElementById('q-text');
  textEl.style.animation = 'none'; void textEl.offsetWidth; textEl.style.animation = '';
  textEl.textContent = q.text;

  var container = document.getElementById('quiz-choices');
  container.innerHTML = '';
  q.choices.forEach(function(c, ci) {
    var div = document.createElement('div');
    div.className = 'quiz-choice';
    div.style.animationDelay = (ci*0.1)+'s';
    div.innerHTML =
      '<div class="choice-bg" style="background:'+c.bg+'"></div>' +
      '<div class="choice-overlay"></div>' +
      '<div class="choice-content">' +
        '<div class="choice-tag">'+c.tag+'</div>' +
        '<div style="font-size:32px;margin-bottom:8px">'+c.emoji+'</div>' +
        '<div class="choice-label">'+c.label+'</div>' +
        '<div class="choice-desc">'+c.desc+'</div>' +
      '</div>';
    div.onclick = function(){ selectChoice(ci, c.value); };
    container.appendChild(div);
  });
}

function selectChoice(chosen, value) {
  answers.push(value);
  var cards = document.querySelectorAll('.quiz-choice');
  cards[chosen].classList.add('selecting');
  cards[1-chosen].classList.add('dismissed');

  setTimeout(function(){
    currentQ++;
    if(currentQ < QUESTIONS.length) {
      renderQuestion(currentQ);
    } else {
      showLoading();
    }
  }, 500);
}

// ===== LOADING =====
function showLoading() {
  showScreen('loading');
  var steps = ['lstep-0','lstep-1','lstep-2','lstep-3','lstep-4'];
  var delays = [0, 700, 1400, 2100, 2800];
  steps.forEach(function(id, i){
    setTimeout(function(){
      steps.forEach(function(sid){ document.getElementById(sid).classList.remove('active'); });
      document.getElementById(id).classList.add('active');
      if(i > 0) document.getElementById(steps[i-1]).classList.add('done');
    }, delays[i]);
  });
  setTimeout(function(){
    document.getElementById('lstep-4').classList.add('done');
    showResult();
  }, 3600);
}

function computePersona() {
  var rushScore = 0, slowScore = 0;
  var rushVals = ['rush','plan','photo','foodie','max'];
  var slowVals = ['slow','wander','live','street','chill'];
  answers.forEach(function(a){
    if(rushVals.indexOf(a) >= 0) rushScore++;
    else slowScore++;
  });
  if(rushScore >= 4) return PERSONAS.rush_plan_photo_foodie_max;
  if(slowScore >= 4) return PERSONAS.slow_wander_live_street_chill;
  return PERSONAS.default;
}

// ===== RADAR SVG (result) =====
function buildResultRadar(vals, color) {
  var size = 140; var cx = size/2; var cy = size/2; var r = size*0.38;
  var keys = Object.keys(vals); var n = keys.length;
  function pt(i, pct) {
    var angle = (Math.PI*2/n)*i - Math.PI/2;
    var rv = r * (pct/100);
    return [cx + rv*Math.cos(angle), cy + rv*Math.sin(angle)];
  }
  // grid
  var svg = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">';
  [0.25,0.5,0.75,1].forEach(function(scale){
    var pts = keys.map(function(_,i){ var p=pt(i,100*scale); return p[0]+','+p[1]; }).join(' ');
    svg += '<polygon points="'+pts+'" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>';
  });
  keys.forEach(function(_,i){
    var p = pt(i,100);
    svg += '<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0]+'" y2="'+p[1]+'" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>';
  });
  // fill
  var pts = keys.map(function(k,i){ var p=pt(i,vals[k]); return p[0]+','+p[1]; }).join(' ');
  svg += '<polygon points="'+pts+'" fill="'+color+'" fill-opacity="0.25" stroke="'+color+'" stroke-width="2"/>';
  // dots
  keys.forEach(function(k,i){
    var p = pt(i, vals[k]);
    svg += '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3" fill="'+color+'"/>';
  });
  // labels
  keys.forEach(function(k,i){
    var p = pt(i, 118);
    svg += '<text x="'+p[0]+'" y="'+p[1]+'" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,0.45)" font-size="9">'+k+'</text>';
  });
  svg += '</svg>';
  return svg;
}
