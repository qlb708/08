<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>内容选题雷达 · AI Product Portfolio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--bg-alt:#f5f5f7;--primary:#0066cc;--text:#1d1d1f;--text-secondary:#6e6e73;--card-bg:#fff;--card-border:rgba(0,0,0,.06);--card-shadow:0 2px 20px rgba(0,0,0,.08);--radius:18px;--radius-pill:999px;--font:-apple-system,BlinkMacSystemFont,"PingFang SC","SF Pro Display","Helvetica Neue",sans-serif}
html{scroll-behavior:smooth}
body{font-family:var(--font);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.6;min-height:100vh}
a{color:var(--primary);text-decoration:none}

nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 0;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--card-border)}
.nav-inner{max-width:1080px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center}
.nav-logo{font-size:17px;font-weight:700;color:var(--text)}
.nav-logo a{color:var(--text)}
.nav-logo span{color:var(--primary)}
.nav-link{font-size:14px;color:var(--text-secondary);transition:color .2s}
.nav-link:hover{color:var(--primary)}

.tool-header{padding:140px 0 60px;text-align:center;background:var(--bg-alt)}
.tool-tag{display:inline-block;font-size:13px;font-weight:600;color:var(--primary);background:rgba(0,102,204,.08);padding:5px 14px;border-radius:var(--radius-pill);margin-bottom:16px}
.tool-header h1{font-size:clamp(32px,4vw,52px);font-weight:800;letter-spacing:-.03em;color:var(--text);margin-bottom:16px}
.tool-header p{font-size:17px;color:var(--text-secondary);max-width:520px;margin:0 auto;line-height:1.6}

.workspace{padding:60px 0 100px}
.workspace-inner{max-width:720px;margin:0 auto}

.panel{background:var(--card-bg);border-radius:var(--radius);border:1px solid var(--card-border);box-shadow:var(--card-shadow);overflow:hidden;margin-bottom:32px}
.panel-header{padding:20px 24px;border-bottom:1px solid var(--card-border);font-size:15px;font-weight:600;color:var(--text)}
.panel-body{padding:24px}

.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px 16px;border:1px solid var(--card-border);border-radius:12px;font-size:15px;font-family:var(--font);background:var(--bg-alt);color:var(--text);transition:border-color .2s;outline:none}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:80px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 28px;border-radius:var(--radius-pill);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s ease;border:none;font-family:var(--font);width:100%}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#0055aa;transform:scale(1.01)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* TOPIC CARDS */
.topic-list{display:flex;flex-direction:column;gap:16px}
.topic-card{background:var(--bg-alt);border-radius:16px;padding:20px 24px;border:1px solid transparent;transition:all .2s ease}
.topic-card:hover{border-color:var(--primary);background:rgba(0,102,204,.03)}
.topic-num{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:8px}
.topic-card h4{font-size:17px;font-weight:700;margin-bottom:8px;color:var(--text);line-height:1.4}
.topic-card p{font-size:14px;color:var(--text-secondary);line-height:1.6}
.topic-card .tags{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.topic-card .tags span{font-size:12px;font-weight:500;padding:3px 10px;border-radius:var(--radius-pill);background:var(--card-bg);color:var(--text-secondary);border:1px solid var(--card-border)}

/* THINKING */
.thinking{display:flex;align-items:center;gap:12px;padding:32px 24px;font-size:15px;color:var(--text-secondary)}
.thinking-dots{display:flex;gap:4px}
.thinking-dots span{width:8px;height:8px;border-radius:50%;background:var(--primary);animation:dot-bounce 1.4s infinite ease-in-out}
.thinking-dots span:nth-child(2){animation-delay:.2s}
.thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot-bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cursor{animation:blink .6s infinite;color:var(--primary)}

/* OUTPUT */
.output-area{padding:24px;font-size:15px;line-height:1.8;color:var(--text)}
.output-area h1,.output-area h2,.output-area h3{margin:20px 0 12px;font-weight:700}
.output-area h1{font-size:22px;border-bottom:1px solid var(--card-border);padding-bottom:10px}
.output-area h2{font-size:18px}
.output-area h3{font-size:16px}
.output-area p{margin-bottom:12px}
.output-area ul,.output-area ol{margin:10px 0 12px 20px}
.output-area li{margin-bottom:6px}
.output-area strong{font-weight:600}

.output-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;color:var(--text-secondary)}
.output-empty .icon{font-size:48px;margin-bottom:16px;opacity:.4}
.output-empty p{font-size:15px}

/* HISTORY */
.history-section{margin-top:40px}
.history-section h3{font-size:18px;font-weight:700;margin-bottom:16px}
.history-item{background:var(--bg-alt);border-radius:12px;padding:14px 20px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:background .2s}
.history-item:hover{background:rgba(0,102,204,.05)}
.history-item .title{font-size:14px;font-weight:600}
.history-item .time{font-size:12px;color:var(--text-secondary)}

/* EXPORT BTN */
.btn-export{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);transition:all .2s;font-family:var(--font)}
.btn-export:hover{border-color:var(--primary);color:var(--primary)}
.actions-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-top:1px solid var(--card-border)}

@media(max-width:768px){
  .workspace-inner{padding:0 16px}
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-logo"><a href="/08/portfolio/">AI <span>×</span> Product</a></div>
    <a style="display:flex;align-items:center;gap:6px;font-size:14px;color:#6e6e73;text-decoration:none;font-family:inherit;font-weight:500;transition:color .2s" href="/08/portfolio/">← 返回 Portfolio</a>
  </div>
</nav>

<div class="tool-header">
  <div class="container">
    <span class="tool-tag">内容运营</span>
    <h1>内容选题雷达</h1>
    <p>输入你的账号定位，AI 结合热点趋势生成本周 10 个高质量选题。</p>
  </div>
</div>

<div class="workspace">
  <div class="workspace-inner">
    <!-- INPUT -->
    <div class="panel">
      <div class="panel-header">定义你的内容方向</div>
      <div class="panel-body">
        <div class="form-group">
          <label>账号定位 / 领域</label>
          <input type="text" id="accountType" placeholder="例如：AI 工具测评博主">
        </div>
        <div class="form-group">
          <label>目标受众</label>
          <input type="text" id="audience" placeholder="例如：职场新人、大学生">
        </div>
        <div class="form-group">
          <label>平台</label>
          <select id="platform">
            <option>小红书</option><option>微信公众号</option><option>抖音</option><option>B站</option><option>知乎</option><option>微博</option><option>全平台</option>
          </select>
        </div>
        <div class="form-group">
          <label>额外要求（选填）</label>
          <textarea id="extraReq" placeholder="例如：偏实用教程类，避免太理论的内容"></textarea>
        </div>
        <button class="btn btn-primary" id="genBtn" onclick="generate()">生成本周选题</button>
      </div>
    </div>

    <!-- OUTPUT -->
    <div class="panel" id="outputPanel">
      <div class="panel-header">AI 选题推荐</div>
      <div id="outputBody">
        <div class="output-empty"><div class="icon">📡</div><p>填写上方信息后<br>AI 将为你生成 10 个选题</p></div>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="history-section" id="historySection" style="display:none">
      <h3>📌 历史选题</h3>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const API_KEY=['AQ.Ab8RN6Kwvan','PacRzJIFXe6Yi1Kx35q046','jXDWC8LF0dV3tKJiA'].join('');
const API_URL='https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+API_KEY;

function formatDate(d){const m=String(d.getMonth()+1).padStart(2,'0');return `${d.getFullYear()}-${m}-${String(d.getDate()).padStart(2,'0')}`}

async function generate(){
  const type=document.getElementById('accountType').value.trim();
  const audience=document.getElementById('audience').value.trim();
  const platform=document.getElementById('platform').value;
  const extra=document.getElementById('extraReq').value.trim();
  if(!type){alert('请填写账号定位');return}
  if(!audience){alert('请填写目标受众');return}

  const btn=document.getElementById('genBtn');
  btn.disabled=true;btn.textContent='AI 正在扫描热点...';

  const out=document.getElementById('outputBody');
  out.innerHTML='<div class="thinking"><div class="thinking-dots"><span></span><span></span><span></span></div><span>AI 正在分析热点并生成选题...</span></div>';

  const weekStart=new Date();weekStart.setDate(weekStart.getDate()-weekStart.getDay()+1);
  const weekEnd=new Date(weekStart);weekEnd.setDate(weekEnd.getDate()+6);
  const weekRange=`${formatDate(weekStart)} ~ ${formatDate(weekEnd)}`;

  const prompt=`你是一位资深内容运营专家。请为以下账号生成本周（${weekRange}）的 10 个内容选题。

账号信息：
- 账号定位：${type}
- 目标受众：${audience}
- 发布平台：${platform}${extra?'\n- 额外要求：'+extra:''}

请按以下格式输出（使用 Markdown）：

# 📡 本周选题推荐

> 账号定位：${type} | 目标受众：${audience} | 平台：${platform}
> 周期：${weekRange}

（然后依次输出 10 个选题，每个选题包含：）

### 选题 N：[标题]
- **选题方向**：xxx
- **核心角度**：xxx（说明为什么这个选题值得关注）
- **内容形式建议**：xxx（如图文教程/短视频/清单/对比测评等）
- **预计热度**：⭐️⭐️⭐️⭐️（1-5星）
- **标签**：#xxx #xxx #xxx

请确保选题新颖、实用、贴合目标受众，避免泛泛而谈的大话题。`;

  try{
    const resp=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:8000,temperature:0.8}})});
    const data=await resp.json();
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'抱歉，生成失败，请重试。';
    typewriterRender(text,out);
    saveToHistory(type,text);
  }catch(e){
    out.innerHTML='<div class="output-empty"><div class="icon">⚠️</div><p>请求失败，请检查网络后重试</p></div>';
  }
  btn.disabled=false;btn.textContent='重新生成';
}

function typewriterRender(fullText,container){
  let i=0;
  container.innerHTML='';
  const interval=setInterval(()=>{
    i+=3;
    const current=fullText.slice(0,i);
    container.innerHTML='<div class="output-area">'+marked.parse(current)+'</div><span class="cursor">|</span>';
    if(i>=fullText.length){
      clearInterval(interval);
      container.innerHTML='<div class="output-area">'+marked.parse(fullText)+'</div><div class="actions-bar"><div></div><button class="btn-export" onclick="exportResult()">📥 导出 Markdown</button></div>';
      // Store result for export
      window._lastResult=fullText;
    }
  },18);
}

function saveToHistory(type,text){
  let history=JSON.parse(localStorage.getItem('content_radar_history')||'[]');
  history.unshift({title:type,time:new Date().toLocaleString('zh-CN'),content:text});
  if(history.length>10)history=history.slice(0,10);
  localStorage.setItem('content_radar_history',JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  const history=JSON.parse(localStorage.getItem('content_radar_history')||'[]');
  if(!history.length)return;
  const sec=document.getElementById('historySection');
  sec.style.display='block';
  const list=document.getElementById('historyList');
  list.innerHTML=history.map((h,i)=>`<div class="history-item" onclick="showHistory(${i})"><span class="title">${h.title}</span><span class="time">${h.time}</span></div>`).join('');
}

function showHistory(i){
  const history=JSON.parse(localStorage.getItem('content_radar_history')||'[]');
  const out=document.getElementById('outputBody');
  out.innerHTML='<div class="output-area">'+marked.parse(history[i].content)+'</div>';
}

function exportResult(){
  if(!window._lastResult)return;
  const blob=new Blob([window._lastResult],{type:'text/markdown'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`选题推荐_${formatDate(new Date())}.md`;a.click();
}

// Load history on page load
renderHistory();
</script>
</body>
</html>
