<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>内容选题雷达 · AI Product Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d14;--surface:rgba(255,255,255,.05);--surface2:rgba(255,255,255,.08);--primary:#6C5CE7;--text:#e8e8f0;--text-dim:rgba(232,232,240,.55);--border:rgba(255,255,255,.08);--radius:14px}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:var(--primary);text-decoration:none}
.topbar{position:sticky;top:0;z-index:50;background:rgba(13,13,20,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 40px;display:flex;align-items:center;gap:16px}
.back{color:var(--text-dim);font-size:14px;font-weight:500;transition:color .2s}
.back:hover{color:var(--text)}
.page-title{font-size:16px;font-weight:700}
.page-badge{margin-left:auto;padding:4px 12px;border-radius:999px;background:rgba(108,92,231,.15);color:#a29bfe;font-size:11px;font-weight:700;border:1px solid rgba(108,92,231,.25)}
.layout{display:grid;grid-template-columns:400px 1fr;min-height:calc(100vh - 53px)}
@media(max-width:900px){.layout{grid-template-columns:1fr}}
.form-panel{border-right:1px solid var(--border);padding:32px;display:flex;flex-direction:column;gap:22px;overflow-y:auto;max-height:calc(100vh - 53px)}
@media(max-width:900px){.form-panel{max-height:none;border-right:none;border-bottom:1px solid var(--border)}}
.panel-heading{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.panel-sub{font-size:13px;color:var(--text-dim)}
.form-group{display:flex;flex-direction:column;gap:8px}
label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim)}
input,textarea{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
input:focus,textarea:focus{border-color:rgba(108,92,231,.5);box-shadow:0 0 0 3px rgba(108,92,231,.12)}
.multi-select{display:flex;flex-wrap:wrap;gap:8px}
.ms-btn{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.ms-btn.active{background:rgba(108,92,231,.2);border-color:rgba(108,92,231,.5);color:#a29bfe}
.style-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.generate-btn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,#6C5CE7,#8b7ff0);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 8px 24px rgba(108,92,231,.3);margin-top:8px}
.generate-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 32px rgba(108,92,231,.45)}
.generate-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.output-panel{padding:40px;overflow-y:auto;max-height:calc(100vh - 53px)}
@media(max-width:900px){.output-panel{max-height:none}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:400px;gap:16px;text-align:center}
.empty-icon{font-size:56px;opacity:.4}
.empty-title{font-size:20px;font-weight:700;color:var(--text-dim)}
.empty-desc{font-size:14px;color:var(--text-dim);max-width:360px;opacity:.7}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;gap:24px}
.spinner{width:40px;height:40px;border:3px solid rgba(108,92,231,.2);border-top-color:#6C5CE7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:var(--text-dim);font-size:14px;animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.5}50%{opacity:1}}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.result-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--primary)}
.result-actions{display:flex;gap:10px}
.action-btn{padding:8px 18px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.action-btn:hover{background:var(--surface2);border-color:rgba(108,92,231,.3)}
.action-btn.primary{background:rgba(108,92,231,.2);border-color:rgba(108,92,231,.4);color:#a29bfe}
.markdown-body{font-size:15px;line-height:1.75;color:var(--text)}
.markdown-body h1{font-size:26px;font-weight:800;margin:0 0 24px;letter-spacing:-.03em;background:linear-gradient(135deg,#fff,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.markdown-body h2{font-size:18px;font-weight:700;margin:32px 0 14px;padding:14px 18px;background:rgba(108,92,231,.08);border-left:3px solid #6C5CE7;border-radius:0 10px 10px 0;letter-spacing:-.01em;color:#a29bfe;-webkit-text-fill-color:#a29bfe}
.markdown-body h3{font-size:15px;font-weight:700;margin:20px 0 10px;color:var(--text)}
.markdown-body p{margin:0 0 14px;color:rgba(232,232,240,.85)}
.markdown-body ul,ol{margin:0 0 14px 20px;color:rgba(232,232,240,.85)}
.markdown-body li{margin-bottom:6px}
.markdown-body strong{color:var(--text);font-weight:700}
.markdown-body hr{border:none;border-top:1px solid var(--border);margin:24px 0}
</style>
</head>
<body>
<div class="topbar">
  <a href="/08/portfolio/" class="back">← 返回首页</a>
  <span style="color:var(--border)">|</span>
  <span class="page-title">📡 内容选题雷达</span>
  <span class="page-badge">Gemini AI</span>
</div>

<div class="layout">
  <div class="form-panel">
    <div>
      <div class="panel-heading">内容选题雷达</div>
      <div class="panel-sub">输入账号定位，AI 生成本周 10 个推荐选题</div>
    </div>

    <div class="form-group">
      <label>账号定位 *</label>
      <input id="accountPos" type="text" placeholder="如：AI 产品经理，25-35岁都市白领"/>
    </div>

    <div class="form-group">
      <label>目标平台（可多选）</label>
      <div class="multi-select" id="platforms">
        <button class="ms-btn active" data-val="小红书">小红书</button>
        <button class="ms-btn" data-val="抖音">抖音</button>
        <button class="ms-btn" data-val="微博">微博</button>
        <button class="ms-btn" data-val="公众号">公众号</button>
        <button class="ms-btn" data-val="B站">B站</button>
      </div>
    </div>

    <div class="form-group">
      <label>内容风格</label>
      <div class="style-row" id="styles">
        <button class="ms-btn active" data-val="干货教程">干货教程</button>
        <button class="ms-btn" data-val="观点输出">观点输出</button>
        <button class="ms-btn" data-val="故事分享">故事分享</button>
        <button class="ms-btn" data-val="测评种草">测评种草</button>
      </div>
    </div>

    <div class="form-group">
      <label>本周热点关键词（可选）</label>
      <input id="hotwords" type="text" placeholder="如：世界杯、AI助手、暑期旅行"/>
    </div>

    <div class="form-group">
      <label>核心受众描述（可选）</label>
      <textarea id="audience" placeholder="如：对AI工具感兴趣，想提升工作效率的职场人" style="min-height:70px"></textarea>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generate()">✨ 生成选题方案</button>
  </div>

  <div class="output-panel" id="outputPanel">
    <div class="empty-state">
      <div class="empty-icon">📡</div>
      <div class="empty-title">等待生成</div>
      <div class="empty-desc">填写账号定位，选择目标平台，AI 将生成 10 个高质量选题方案</div>
    </div>
  </div>
</div>

<script>
const GEMINI_KEY = ['AQ.Ab8RN6Kwvan', 'PacRzJIFXe6Yi1Kx35q046', 'jXDWC8LF0dV3tKJiA'].join('');
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_KEY}`;

// Multi-select logic
function initMultiSelect(containerId, single = false) {
  document.getElementById(containerId).querySelectorAll('.ms-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (single) {
        document.getElementById(containerId).querySelectorAll('.ms-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      } else {
        btn.classList.toggle('active');
      }
    });
  });
}
initMultiSelect('platforms');
initMultiSelect('styles', true);

function getSelected(containerId) {
  return Array.from(document.getElementById(containerId).querySelectorAll('.ms-btn.active')).map(b => b.dataset.val);
}

async function generate() {
  const account = document.getElementById('accountPos').value.trim();
  if (!account) { alert('请填写账号定位'); return; }
  const platforms = getSelected('platforms');
  const style = getSelected('styles')[0] || '干货教程';
  const hotwords = document.getElementById('hotwords').value.trim();
  const audience = document.getElementById('audience').value.trim();

  const prompt = `你是一位顶级内容运营专家，请为以下账号生成本周内容选题方案。

账号定位：${account}
目标平台：${platforms.join('、')}
内容风格：${style}
${hotwords ? `本周热点关键词：${hotwords}` : ''}
${audience ? `核心受众：${audience}` : ''}

请按以下 Markdown 格式输出 10 个选题（不要少于10个），每个选题都要具体、有吸引力：

# 本周内容选题方案

## 🔥 爆款潜力选题（3个）
适合追求高流量、快速涨粉的内容

**选题1：[具体标题]**
- 核心钩子：（为什么用户会点击/停留）
- 内容方向：（大概写什么）
- 竞争程度：低/中/高
- 最佳发布时间：（哪个时间段）

**选题2：[具体标题]**
...

**选题3：[具体标题]**
...

## 💡 差异化选题（4个）
适合建立专业人设、提升账号质量

**选题4：[具体标题]**
- 核心钩子：
- 内容方向：
- 竞争程度：
- 最佳发布时间：

（共4个）

## 🌊 借势热点选题（3个）
结合当前热点，提升内容时效性

**选题8：[具体标题]**
- 核心钩子：
- 内容方向：
- 竞争程度：
- 最佳发布时间：

（共3个）

## 📅 本周发布策略
- 推荐发布顺序：
- 各平台最佳发布时间：
- 互动引导建议：
- 内容形式建议：`;

  const btn = document.getElementById('generateBtn');
  btn.disabled = true; btn.textContent = '生成中...';
  const panel = document.getElementById('outputPanel');
  panel.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">AI 正在分析选题方向，请稍候...</div></div>';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.8, maxOutputTokens: 4096 } })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || '请求失败');
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    if (!text) throw new Error('返回内容为空');

    panel.innerHTML = `
      <div class="result-header">
        <span class="result-title">📡 选题方案已生成</span>
        <div class="result-actions">
          <button class="action-btn primary" onclick="copyResult()">复制全文</button>
          <button class="action-btn" onclick="location.reload()">重新生成</button>
        </div>
      </div>
      <div class="markdown-body">${marked.parse(text)}</div>`;
    window._resultText = text;
  } catch(e) {
    panel.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">生成失败</div><div class="empty-desc">${e.message}</div></div>`;
  } finally {
    btn.disabled = false; btn.textContent = '✨ 生成选题方案';
  }
}

function copyResult() {
  navigator.clipboard.writeText(window._resultText || '').then(() => {
    const btn = event.target;
    btn.textContent = '✅ 已复制';
    setTimeout(() => btn.textContent = '复制全文', 2000);
  });
}
</script>
</body>
</html>
