<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>用户旅程地图 · AI × 08</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--bg2:#f5f5f7;--blue:#0066cc;--bs:rgba(0,102,204,.08);--bb:rgba(0,102,204,.18);
  --text:#1d1d1f;--soft:#6e6e73;--muted:#aeaeb2;
  --bd:rgba(0,0,0,.07);--sh:0 2px 16px rgba(0,0,0,.06);--sh2:0 8px 32px rgba(0,0,0,.1);
  --r:18px;--pill:999px;--font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
}
body{font-family:var(--font);color:var(--text);background:var(--bg2);-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center}
.nw{max-width:1280px;margin:0 auto;padding:0 32px;width:100%;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:16px;font-weight:800;letter-spacing:-.03em}.logo em{color:var(--blue);font-style:normal}
.back{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--soft);transition:color .2s}.back:hover{color:var(--blue)}.back svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2}
.hero{max-width:1280px;margin:0 auto;padding:72px 32px 24px}
.htag{display:inline-flex;align-items:center;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--blue);background:var(--bs);padding:4px 12px;border-radius:var(--pill);margin-bottom:12px;border:1px solid var(--bb)}
.hero h1{font-size:clamp(24px,3vw,36px);font-weight:800;letter-spacing:-.04em;margin-bottom:6px}
.hero p{font-size:14px;color:var(--soft)}
.intent-bar{max-width:1280px;margin:0 auto;padding:0 32px 20px}
.intent-box{background:#fff;border:1.5px solid var(--bb);border-radius:14px;padding:14px 18px}
.intent-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.intent-label svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2}
.intent-chips{display:flex;gap:8px;flex-wrap:wrap}
.intent-chip{padding:5px 13px;border-radius:var(--pill);border:1.5px solid var(--bd);background:#fff;color:var(--soft);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:var(--font)}
.intent-chip:hover{border-color:var(--bb);color:var(--blue);background:var(--bs)}
.intent-tip{font-size:11px;color:var(--muted);margin-top:8px}
.ws{max-width:1280px;margin:0 auto;padding:0 32px 80px;display:grid;grid-template-columns:400px 1fr;gap:20px;align-items:start}
.panel{background:#fff;border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh);overflow:hidden}
.inp-p{position:sticky;top:68px}
.ph{padding:15px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.ph-icon{width:30px;height:30px;border-radius:9px;background:var(--bs);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ph-icon svg{width:14px;height:14px;fill:none;stroke:var(--blue);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ph-t{font-size:14px;font-weight:700}.ph-s{font-size:12px;color:var(--soft)}
.pb{padding:20px}
.f{margin-bottom:14px}
.f label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.fn{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px}
.f input,.f textarea{width:100%;padding:9px 13px;border:1.5px solid var(--bd);border-radius:11px;font-size:14px;font-family:var(--font);background:var(--bg2);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.f input:focus,.f textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--bs);background:#fff}
.f textarea{resize:vertical;min-height:90px;line-height:1.55}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 12px;border-radius:var(--pill);border:1.5px solid var(--bd);background:#fff;color:var(--soft);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;font-family:var(--font)}
.chip:hover{border-color:var(--bb);color:var(--blue)}.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
.gbtn{width:100%;margin-top:6px;padding:13px;border-radius:var(--pill);background:var(--blue);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(0,102,204,.25);transition:all .2s}
.gbtn:hover:not(:disabled){background:#0055aa;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,102,204,.35)}
.gbtn:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.gbtn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.out-p{min-height:500px;display:flex;flex-direction:column}
.ob{flex:1;padding:22px;overflow-y:auto}
.sk{display:flex;flex-direction:column;gap:11px;opacity:.45}
.sk-t{height:16px;border-radius:5px;background:linear-gradient(90deg,#e8e8ed 25%,#f5f5f7 50%,#e8e8ed 75%);background-size:200% 100%;animation:sh 1.5s infinite}
.sk-b{height:100px;border-radius:9px;background:linear-gradient(90deg,#e8e8ed 25%,#f5f5f7 50%,#e8e8ed 75%);background-size:200% 100%;animation:sh 1.5s infinite}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-s{margin-bottom:18px}
.thinking{display:flex;align-items:center;gap:10px;padding:40px 0;color:var(--soft);font-size:14px}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--blue);animation:bo 1.4s infinite ease-in-out;margin-right:4px}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bo{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}
.md{font-size:14px;line-height:1.8;color:var(--text)}
.md h1{font-size:19px;font-weight:800;margin:0 0 14px;padding-bottom:10px;border-bottom:1px solid var(--bd);letter-spacing:-.02em}
.md h2{font-size:15px;font-weight:700;margin:18px 0 7px}.md h3{font-size:14px;font-weight:700;margin:14px 0 5px}
.md p{margin-bottom:10px}.md ul,.md ol{margin:7px 0 10px 16px}.md li{margin-bottom:4px}.md strong{font-weight:700}
.md blockquote{border-left:3px solid var(--blue);padding:9px 13px;margin:12px 0;background:var(--bs);border-radius:0 9px 9px 0;color:var(--soft);font-size:13px}
.md table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
.md th,.md td{padding:7px 10px;border:1px solid var(--bd);text-align:left;vertical-align:top}
.md th{background:var(--bg2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.cursor2{display:inline-block;width:2px;height:14px;background:var(--blue);margin-left:1px;vertical-align:middle;animation:bk .6s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:0}}
.ebar{padding:12px 20px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.ebtn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--pill);border:1.5px solid var(--bd);background:#fff;color:var(--soft);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s}
.ebtn:hover{border-color:var(--bb);color:var(--blue)}.ebtn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}
.ai-badge{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.ai-badge svg{width:11px;height:11px;fill:none;stroke:currentColor;stroke-width:2}
@media(max-width:900px){.ws{grid-template-columns:1fr}.inp-p{position:static}}
@media(max-width:600px){.ws{padding:0 16px 60px}.hero{padding:70px 16px 16px}.intent-bar{padding:0 16px 16px}}
</style>
</head>
<body>
<nav>
  <div class="nw">
    <div class="logo">AI <em>×</em> 08</div>
    <a class="back" href="/08/portfolio/"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>返回</a>
  </div>
</nav>

<div class="hero">
  <div class="htag">UX 设计</div>
  <h1>用户旅程地图</h1>
  <p>描述核心场景，AI 按阶段生成行为 / 情绪 / 触点 / 痛点 / 机会点完整分析。</p>
</div>

<div class="intent-bar">
  <div class="intent-box">
    <div class="intent-label">
      <svg viewBox="0 0 24 24"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
      常见场景快速填入
    </div>
    <div class="intent-chips">
      <span class="intent-chip" onclick="fillScene('用户第一次使用 AI 旅行规划功能，从打开 App 到生成第一份完整行程')">AI 旅行规划首次使用</span>
      <span class="intent-chip" onclick="fillScene('免费用户决策是否升级付费会员，从看到付费弹窗到完成购买（或放弃）')">免费→付费转化</span>
      <span class="intent-chip" onclick="fillScene('用户发现 App 崩溃后联系客服，从遇到 bug 到问题解决的完整流程')">售后投诉处理</span>
      <span class="intent-chip" onclick="fillScene('新用户注册后完成新手引导，从下载 App 到完成第一个核心操作')">新用户 Onboarding</span>
      <span class="intent-chip" onclick="fillScene('用户搜索内容但找不到想要结果，从发起搜索到最终放弃或找到替代方案')">搜索失败场景</span>
    </div>
    <div class="intent-tip">点击快速填入 · 或在下方直接描述你的场景</div>
  </div>
</div>

<div class="ws">
  <div class="panel inp-p">
    <div class="ph">
      <div class="ph-icon"><svg viewBox="0 0 24 24"><path d="M3 3h18v18H3z" fill="none"/><path d="M3 9h18M9 21V9"/></svg></div>
      <div><div class="ph-t">描述场景</div><div class="ph-s">越具体，地图越准确</div></div>
    </div>
    <div class="pb">
      <div class="f"><label>产品 / 功能名称</label><input id="pname" placeholder="例如：AI 旅行规划 App"></div>
      <div class="f"><label>目标用户</label><input id="tuser" placeholder="例如：25-35 岁独旅白领"></div>
      <div class="f"><label>核心场景</label><textarea id="scene" placeholder="例如：用户第一次使用 AI 旅行规划功能，从打开 App 到生成第一份完整行程"></textarea></div>
      <div class="f">
        <label>旅程阶段数 <span class="fn">单选</span></label>
        <div class="chips" id="stagechips">
          <button class="chip" data-v="3">3 阶段</button>
          <button class="chip on" data-v="5">5 阶段</button>
          <button class="chip" data-v="7">7 阶段</button>
        </div>
      </div>
      <button class="gbtn" id="gbtn" onclick="generate()">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        生成旅程地图
      </button>
    </div>
  </div>

  <div class="panel out-p">
    <div class="ph">
      <div class="ph-icon" style="background:rgba(52,199,89,.1)"><svg viewBox="0 0 24 24" style="stroke:#34c759"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
      <div><div class="ph-t">用户旅程地图</div><div class="ph-s" id="osub">填写左侧信息后生成</div></div>
    </div>
    <div class="ob" id="ob">
      <div class="sk">
        <div class="sk-s"><div class="sk-t" style="width:38%"></div><div class="sk-b" style="margin-top:8px"></div></div>
        <div class="sk-s"><div class="sk-t" style="width:32%"></div><div class="sk-b" style="margin-top:8px"></div></div>
        <div class="sk-s"><div class="sk-t" style="width:44%"></div><div class="sk-b" style="margin-top:8px"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const PROVIDERS=[
  {name:'智谱',url:'https://open.bigmodel.cn/api/paas/v4/chat/completions',key:'3617e7083fb349e6bcf8dff86e65e967.Ab9BRVWqjsHf9a8P',model:'glm-4-flash',type:'openai'},
  {name:'DeepSeek',url:'https://api.deepseek.com/chat/completions',key:'sk-4f016c9639cb461db37f4f778d2eac4f',model:'deepseek-chat',type:'openai'},
  {name:'Gemini',url:'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent',key:['AQ.Ab8RN6Kwvan','PacRzJIFXe6Yi1Kx35q046','jXDWC8LF0dV3tKJiA'].join(''),type:'gemini'},
];
async function callAI(prompt){
  for(const p of PROVIDERS){
    try{
      let text='';
      if(p.type==='openai'){
        const res=await fetch(p.url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+p.key},body:JSON.stringify({model:p.model,messages:[{role:'user',content:prompt}],max_tokens:8000,temperature:0.7}),signal:AbortSignal.timeout(25000)});
        if(!res.ok){console.warn(p.name,res.status);continue;}
        const d=await res.json();text=d.choices?.[0]?.message?.content||'';
      } else {
        const res=await fetch(p.url+'?key='+p.key,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:8000,temperature:0.7}}),signal:AbortSignal.timeout(20000)});
        if(!res.ok){continue;}
        const d=await res.json();text=d.candidates?.[0]?.content?.parts?.[0]?.text||'';
      }
      if(text){console.log('✓',p.name);return text;}
    }catch(e){console.warn(p.name,e.message);continue;}
  }
  throw new Error('所有 AI 服务均不可用');
}
let stages='5';
document.querySelectorAll('#stagechips .chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('#stagechips .chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');stages=c.dataset.v;
}));
function fillScene(text){document.getElementById('scene').value=text;}
async function generate(){
  const name=document.getElementById('pname').value.trim();
  const user=document.getElementById('tuser').value.trim();
  const scene=document.getElementById('scene').value.trim();
  if(!name){document.getElementById('pname').focus();return;}
  if(!scene){document.getElementById('scene').focus();return;}
  const btn=document.getElementById('gbtn');
  const ob=document.getElementById('ob');
  const sub=document.getElementById('osub');
  btn.disabled=true;sub.textContent='正在生成…';
  ob.innerHTML='<div class="thinking"><div class="dots"><span></span><span></span><span></span></div><span>AI 正在分析用户行为与情绪路径…</span></div>';
  const prompt=`你是资深 UX 研究员，擅长绘制用户旅程地图。请生成详细分析：

产品：${name}
目标用户：${user||'未指定'}
核心场景：${scene}
阶段数：${stages} 个

输出格式（Markdown）：

# 用户旅程地图：${name}

## 场景概述
（2-3 句描述背景与范围）

## 用户画像
（目标用户背景、目标、当前心理状态）

---

## 旅程地图（共 ${stages} 阶段）

> 情绪图例：😊 积极 | 😐 中性 | 😟 困惑 | 😤 沮丧

对每个阶段输出：

### 阶段 N：[名称]

| 维度 | 详情 |
|------|------|
| 用户目标 | |
| 用户行为 | • 行为1<br>• 行为2<br>• 行为3 |
| 情绪状态 | [图例] [描述] |
| 关键触点 | |
| 核心痛点 | |
| 产品机会点 | |

---

## 情绪曲线总结
（描述整体情绪走势，最高点和最低点）

## 优先机会点
（从所有阶段提炼 3 个最值得解决的，按优先级排序）

## 设计建议
（3-4 条具体产品/设计改进建议）`;
  try{
    const text=await callAI(prompt);
    sub.textContent='旅程地图已生成';
    typeRender(text,ob);
  }catch(e){
    ob.innerHTML='<div style="padding:32px;text-align:center;color:var(--soft);font-size:14px">生成失败：'+e.message+'</div>';
    sub.textContent='生成失败';
  }
  btn.disabled=false;
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" width="15" height="15"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>重新生成';
}
function typeRender(text,el){
  window._last=text;let i=0;
  const iv=setInterval(()=>{
    i=Math.min(i+5,text.length);
    el.innerHTML='<div class="md">'+marked.parse(text.slice(0,i))+'</div>'+(i<text.length?'<span class="cursor2"></span>':'');
    if(i>=text.length){
      clearInterval(iv);
      el.innerHTML='<div class="md">'+marked.parse(text)+'</div>';
      el.closest('.panel').insertAdjacentHTML('beforeend',`<div class="ebar"><span class="ai-badge"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>AI 生成</span><button class="ebtn" onclick="exportMd()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>导出 Markdown</button></div>`);
    }
  },18);
}
function exportMd(){
  if(!window._last)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([window._last],{type:'text/markdown'}));
  a.download='用户旅程地图.md';a.click();
}
</script>
</body>
</html>
