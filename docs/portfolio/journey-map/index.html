<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>用户旅程地图 · AI × 08</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--bg-alt:#f5f5f7;--primary:#0066cc;--primary-soft:rgba(0,102,204,.08);--primary-border:rgba(0,102,204,.2);
  --text:#1d1d1f;--text-soft:#6e6e73;--text-muted:#aeaeb2;
  --border:rgba(0,0,0,.07);--shadow:0 2px 16px rgba(0,0,0,.06);--shadow-hover:0 8px 32px rgba(0,0,0,.1);
  --radius:20px;--pill:999px;
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;
}
body{font-family:var(--font);color:var(--text);background:var(--bg-alt);-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:var(--primary)}

nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 32px;width:100%;display:flex;justify-content:space-between;align-items:center}
.nav-logo{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.nav-logo em{color:var(--primary);font-style:normal}
.nav-logo a{color:inherit}
.back-link{display:flex;align-items:center;gap:5px;font-size:14px;color:var(--text-soft);transition:color .2s}
.back-link:hover{color:var(--text)}
.back-link svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2}

.hero{padding:76px 32px 28px;max-width:1280px;margin:0 auto}
.hero-tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--primary);background:var(--primary-soft);padding:5px 14px;border-radius:var(--pill);margin-bottom:14px;border:1px solid var(--primary-border)}
.hero h1{font-size:clamp(26px,3.5vw,40px);font-weight:800;letter-spacing:-.04em;margin-bottom:8px}
.hero p{font-size:15px;color:var(--text-soft);max-width:480px}

.workspace{max-width:1280px;margin:0 auto;padding:0 32px 80px;display:grid;grid-template-columns:400px 1fr;gap:20px;align-items:start}

.panel{background:#fff;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.input-panel{position:sticky;top:68px}
.panel-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.panel-icon{width:30px;height:30px;border-radius:9px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.panel-icon svg{width:15px;height:15px;fill:none;stroke:var(--primary);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.panel-hd-text{font-size:14px;font-weight:700}
.panel-hd-sub{font-size:12px;color:var(--text-soft)}
.panel-body{padding:20px}

.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text)}
.field-note{font-size:11px;color:var(--text-muted);font-weight:400;margin-left:4px}
.field input,.field textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:var(--font);background:var(--bg-alt);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus,.field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft);background:#fff}
.field textarea{resize:vertical;min-height:90px;line-height:1.55}

.chip-row{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:6px 13px;border-radius:var(--pill);border:1.5px solid var(--border);background:#fff;color:var(--text-soft);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap;font-family:var(--font)}
.chip:hover{border-color:var(--primary-border);color:var(--primary)}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}

.gen-btn{width:100%;margin-top:4px;padding:13px;border-radius:var(--pill);background:var(--primary);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(0,102,204,.25);transition:all .2s}
.gen-btn:hover:not(:disabled){background:#0055aa;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,102,204,.35)}
.gen-btn:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.gen-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

.output-panel{min-height:520px;display:flex;flex-direction:column}
.output-body{flex:1;padding:24px;overflow-y:auto}

.skeleton{display:flex;flex-direction:column;gap:12px;opacity:.5}
.skel-title{height:18px;width:40%;background:linear-gradient(90deg,#e8e8ed 25%,#f5f5f7 50%,#e8e8ed 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
.skel-line{height:12px;background:linear-gradient(90deg,#e8e8ed 25%,#f5f5f7 50%,#e8e8ed 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
.skel-line.w90{width:90%}.skel-line.w75{width:75%}.skel-line.w60{width:60%}.skel-line.w80{width:80%}
.skel-table{height:120px;background:linear-gradient(90deg,#e8e8ed 25%,#f5f5f7 50%,#e8e8ed 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px;margin-top:4px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-section{margin-bottom:20px}

.thinking{display:flex;align-items:center;gap:10px;padding:32px 0;color:var(--text-soft);font-size:14px}
.dots span{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--primary);animation:bounce 1.4s infinite ease-in-out;margin-right:4px}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}

.md-out{font-size:14px;line-height:1.8;color:var(--text)}
.md-out h1{font-size:20px;font-weight:800;margin:0 0 16px;padding-bottom:12px;border-bottom:1px solid var(--border);letter-spacing:-.02em}
.md-out h2{font-size:16px;font-weight:700;margin:20px 0 8px}
.md-out h3{font-size:14px;font-weight:700;margin:16px 0 6px}
.md-out p{margin-bottom:12px}
.md-out ul,.md-out ol{margin:8px 0 12px 18px}
.md-out li{margin-bottom:5px}
.md-out strong{font-weight:700}
.md-out blockquote{border-left:3px solid var(--primary);padding:10px 14px;margin:14px 0;background:var(--primary-soft);border-radius:0 10px 10px 0;color:var(--text-soft);font-size:13px}
.md-out table{width:100%;border-collapse:collapse;margin:14px 0;font-size:12px}
.md-out th,.md-out td{padding:8px 10px;border:1px solid var(--border);text-align:left;vertical-align:top}
.md-out th{background:var(--bg-alt);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.md-out code{background:var(--bg-alt);padding:1px 6px;border-radius:4px;font-size:12px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cursor{animation:blink .6s infinite;color:var(--primary);font-weight:300}

.export-bar{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
.export-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--pill);border:1.5px solid var(--border);background:#fff;color:var(--text-soft);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s}
.export-btn:hover{border-color:var(--primary-border);color:var(--primary)}
.export-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2}

@media(max-width:900px){.workspace{grid-template-columns:1fr}.input-panel{position:static}}
@media(max-width:600px){.workspace{padding:0 16px 60px}.hero{padding:72px 16px 20px}}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-logo"><a href="/08/portfolio/">AI <em>×</em> 08</a></div>
    <a class="back-link" href="/08/portfolio/">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>返回
    </a>
  </div>
</nav>

<div class="hero">
  <div class="hero-tag">UX 设计</div>
  <h1>用户旅程地图</h1>
  <p>描述核心场景，AI 生成完整用户旅程分析，包含情绪曲线、触点与机会点。</p>
</div>

<div class="workspace">
  <!-- INPUT -->
  <div class="panel input-panel">
    <div class="panel-hd">
      <div class="panel-icon">
        <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3z" fill="none"/><path d="M3 9h18M9 21V9"/></svg>
      </div>
      <div><div class="panel-hd-text">描述场景</div><div class="panel-hd-sub">越具体，地图越准确</div></div>
    </div>
    <div class="panel-body">
      <div class="field">
        <label>产品 / 功能名称</label>
        <input id="productName" type="text" placeholder="例如：AI 旅行规划 App">
      </div>
      <div class="field">
        <label>目标用户</label>
        <input id="targetUser" type="text" placeholder="例如：25-35 岁独旅白领">
      </div>
      <div class="field">
        <label>核心场景</label>
        <textarea id="scenario" placeholder="例如：用户第一次使用 AI 旅行规划功能，从下载 App 到完成第一次完整行程规划的全流程"></textarea>
      </div>
      <div class="field">
        <label>旅程阶段数 <span class="field-note">单选</span></label>
        <div class="chip-row" id="stageChips">
          <button class="chip" data-v="3">3 阶段</button>
          <button class="chip active" data-v="5">5 阶段</button>
          <button class="chip" data-v="7">7 阶段</button>
        </div>
      </div>
      <button class="gen-btn" id="genBtn" onclick="generate()">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        生成旅程地图
      </button>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="panel output-panel">
    <div class="panel-hd">
      <div class="panel-icon" style="background:rgba(52,199,89,.1)">
        <svg viewBox="0 0 24 24" style="stroke:#34c759"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div><div class="panel-hd-text">用户旅程地图</div><div class="panel-hd-sub" id="outputSub">填写左侧信息后生成</div></div>
    </div>
    <div class="output-body" id="outputBody">
      <div class="skeleton">
        <div class="skel-section"><div class="skel-title"></div><div class="skel-table"></div></div>
        <div class="skel-section"><div class="skel-title" style="width:30%"></div><div class="skel-line w90"></div><div class="skel-line w75" style="margin-top:6px"></div></div>
        <div class="skel-section"><div class="skel-title" style="width:38%"></div><div class="skel-table"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const KEY=['AQ.Ab8RN6Kwvan','PacRzJIFXe6Yi1Kx35q046','jXDWC8LF0dV3tKJiA'].join('');
const URL_='https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+KEY;
let selectedStages='5';

document.querySelectorAll('#stageChips .chip').forEach(c=>{
  c.addEventListener('click',()=>{
    document.querySelectorAll('#stageChips .chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    selectedStages=c.dataset.v;
  });
});

async function generate(){
  const name=document.getElementById('productName').value.trim();
  const user=document.getElementById('targetUser').value.trim();
  const scenario=document.getElementById('scenario').value.trim();
  if(!name){document.getElementById('productName').focus();return;}
  if(!scenario){document.getElementById('scenario').focus();return;}

  const btn=document.getElementById('genBtn');
  const body=document.getElementById('outputBody');
  const sub=document.getElementById('outputSub');
  btn.disabled=true;
  sub.textContent='正在生成旅程地图...';
  body.innerHTML='<div class="thinking"><div class="dots"><span></span><span></span><span></span></div><span>AI 正在分析用户行为与情绪路径…</span></div>';

  const prompt=`你是一位资深 UX 研究员，擅长绘制用户旅程地图。请为以下产品生成详细的用户旅程地图。

产品信息：
- 产品/功能名称：${name}
- 目标用户：${user||'未指定'}
- 核心场景：${scenario}
- 旅程阶段数：${selectedStages} 个阶段

请按以下结构输出（Markdown 格式）：

# 用户旅程地图：${name}

## 场景概述
（用 2-3 句话描述这个旅程的背景和范围）

## 用户画像
（简要描述目标用户的背景、目标、心理状态）

---

## 旅程地图（共 ${selectedStages} 个阶段）

> 情绪图例：😊 积极愉悦 | 😐 中性平静 | 😟 困惑沮丧 | 😤 挫败愤怒

对于每个阶段，请输出以下 Markdown 表格：

### 阶段 N：[阶段名称]

| 维度 | 详情 |
|------|------|
| 用户目标 | [这个阶段用户想达成什么] |
| 用户行为 | • 行为1<br>• 行为2<br>• 行为3 |
| 情绪状态 | [情绪图例] [情绪描述] |
| 关键触点 | [与产品的接触点，如：App首页/推送通知/客服] |
| 核心痛点 | [用户在这个阶段遇到的主要问题] |
| 产品机会点 | [可以优化或创新的具体方向] |

---

（重复输出所有 ${selectedStages} 个阶段）

---

## 情绪曲线总结
（用文字描述整体情绪走势，指出情绪最高点和最低点）

## 关键机会点汇总
（从所有阶段提炼出最值得优先解决的 3 个机会点，按优先级排序）

## 设计建议
（基于旅程分析，给出 3-4 条具体的产品/设计改进建议）`;

  try{
    const res=await fetch(URL_,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:8000,temperature:0.7}})});
    const d=await res.json();
    const text=d.candidates?.[0]?.content?.parts?.[0]?.text||'生成失败，请重试';
    sub.textContent='旅程地图已生成';
    typeRender(text,body);
  }catch(e){
    body.innerHTML='<div style="padding:40px 0;text-align:center;color:var(--text-soft);font-size:14px">网络请求失败，请检查网络后重试</div>';
    sub.textContent='生成失败';
  }
  btn.disabled=false;
  btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>重新生成';
}

function typeRender(text,el){
  let i=0;window._last=text;
  const iv=setInterval(()=>{
    i=Math.min(i+4,text.length);
    el.innerHTML='<div class="md-out">'+marked.parse(text.slice(0,i))+'</div>'+(i<text.length?'<span class="cursor">|</span>':'');
    if(i>=text.length){
      clearInterval(iv);
      el.innerHTML='<div class="md-out">'+marked.parse(text)+'</div>';
      el.closest('.panel').insertAdjacentHTML('beforeend','<div class="export-bar"><button class="export-btn" onclick="exportMd()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>导出 Markdown</button></div>');
    }
  },16);
}
function exportMd(){
  if(!window._last)return;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([window._last],{type:'text/markdown'}));
  a.download='用户旅程地图.md';a.click();
}
</script>
</body>
</html>
