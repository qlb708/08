<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>需求评审检查器 - 产品运营工具集</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--bg2:#f8f8fc;--blue:#4f46e5;--blue-dark:#3730a3;--blue-light:rgba(79,70,229,.08);--blue-border:rgba(79,70,229,.2);--text:#0f0f23;--soft:#6b7280;--muted:#9ca3af;--bd:rgba(0,0,0,.07);--sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);--r:16px;--pill:999px;--font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif}
body{font-family:var(--font);background:var(--bg2);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
nav{position:fixed;top:0;inset-x:0;height:52px;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);z-index:100;display:flex;align-items:center}
.nw{max-width:1200px;margin:0 auto;padding:0 32px;width:100%;display:flex;align-items:center;justify-content:space-between}
.back{display:flex;align-items:center;gap:6px;font-size:13.5px;font-weight:600;color:var(--soft);transition:color .2s}.back:hover{color:var(--blue)}
.back svg{width:16px;height:16px;flex-shrink:0}
.nav-tag{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);background:var(--blue-light);border:1px solid var(--blue-border);padding:4px 12px;border-radius:var(--pill)}
.hero{padding:80px 32px 20px;max-width:1200px;margin:0 auto}
.hero-meta{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.tag{display:inline-flex;align-items:center;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);background:var(--blue-light);border:1px solid var(--blue-border);padding:5px 14px;border-radius:var(--pill)}
.tool-num{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em}
.hero h1{font-size:clamp(24px,3vw,36px);font-weight:800;letter-spacing:-.04em;margin-bottom:6px;color:var(--text)}
.hero p{font-size:14px;color:var(--soft);max-width:500px;line-height:1.6}
.ws{max-width:1200px;margin:0 auto;padding:8px 32px 80px;display:grid;grid-template-columns:400px 1fr;gap:20px;align-items:start}
.panel{background:#fff;border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh);overflow:hidden}
.ip{position:sticky;top:64px}
.ph{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.pi{width:30px;height:30px;border-radius:9px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pi svg{width:14px;height:14px;fill:none;stroke:var(--blue);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.pt{font-size:13.5px;font-weight:700;color:var(--text)}.ps{font-size:11px;color:var(--soft)}
.pb{padding:20px}
.f{margin-bottom:14px}.f label{display:block;font-size:12px;font-weight:600;color:var(--text);margin-bottom:5px}
.fn{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px}
.f input,.f textarea{width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:10px;font-size:13.5px;font-family:var(--font);background:var(--bg2);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.f input:focus,.f textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-light);background:#fff}
.f textarea{resize:vertical;line-height:1.65}
.quick-fill{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.qf-label{font-size:11px;color:var(--muted);flex-shrink:0}
.qf-btn{padding:3px 10px;border-radius:var(--pill);border:1px solid var(--bd);background:#fff;color:var(--soft);font-size:11px;cursor:pointer;font-family:var(--font);transition:all .15s}
.qf-btn:hover{border-color:var(--blue-border);color:var(--blue)}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:5px 13px;border-radius:var(--pill);border:1.5px solid var(--bd);background:#fff;color:var(--soft);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font);user-select:none}
.chip:hover{border-color:var(--blue-border);color:var(--blue)}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
.chip.act{background:var(--blue-light);border-color:var(--blue-border);color:var(--blue)}
.gbtn{width:100%;margin-top:8px;padding:13px;border-radius:var(--pill);background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(79,70,229,.3);transition:all .2s}
.gbtn:hover:not(:disabled){background:linear-gradient(135deg,#3730a3,#4f46e5);transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,70,229,.35)}
.gbtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.gbtn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.op{min-height:520px;display:flex;flex-direction:column}
.op-header{padding:16px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.op-icon{width:30px;height:30px;border-radius:9px;background:rgba(34,197,94,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.op-icon svg{width:14px;height:14px;fill:none;stroke:#22c55e;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.op-title{font-size:13.5px;font-weight:700;color:var(--text)}.op-sub{font-size:11px;color:var(--soft)}
.op-status{margin-left:auto;flex-shrink:0}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--muted)}
.status-dot.loading{background:var(--blue);animation:pulse 1s infinite}
.status-dot.done{background:#22c55e}
.status-dot.error{background:#ef4444}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.ob{flex:1;padding:24px;overflow-y:auto;max-height:72vh}
.skel{display:flex;flex-direction:column;gap:10px;opacity:.5}
.sl{height:12px;background:linear-gradient(90deg,#ebebf5 25%,#f8f8fc 50%,#ebebf5 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:5px}
.sb{height:72px;background:linear-gradient(90deg,#ebebf5 25%,#f8f8fc 50%,#ebebf5 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:8px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.think{display:flex;align-items:center;gap:10px;padding:32px 0;color:var(--soft);font-size:13px}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);animation:bou 1.4s infinite ease-in-out;margin:0 2px}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bou{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}
.md{font-size:13.5px;line-height:1.8;color:var(--text)}
.md h1{font-size:18px;font-weight:800;margin:0 0 16px;padding-bottom:10px;border-bottom:1px solid var(--bd)}
.md h2{font-size:15px;font-weight:700;margin:18px 0 8px;color:var(--blue)}
.md h3{font-size:13.5px;font-weight:700;margin:14px 0 6px}
.md p{margin-bottom:10px}.md ul,.md ol{margin:6px 0 10px 18px}.md li{margin-bottom:5px}.md strong{font-weight:700}
.md blockquote{border-left:3px solid var(--blue);padding:8px 14px;margin:12px 0;background:var(--blue-light);border-radius:0 10px 10px 0;color:var(--soft);font-size:12.5px}
.md table{width:100%;border-collapse:collapse;margin:14px 0;font-size:12.5px}
.md th,.md td{padding:8px 12px;border:1px solid var(--bd);text-align:left;vertical-align:top}
.md th{background:var(--bg2);font-weight:600;color:var(--text)}
.md code{background:var(--bg2);padding:2px 6px;border-radius:5px;font-size:12px}
.ebar{padding:12px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px}
.ebtn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--pill);border:1.5px solid var(--bd);background:#fff;color:var(--soft);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s}
.ebtn:hover{border-color:var(--blue-border);color:var(--blue)}
.ebtn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}
#toast{position:fixed;bottom:24px;right:24px;background:#0f0f23;color:#fff;padding:10px 18px;border-radius:var(--pill);font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
@media(max-width:900px){.ws{grid-template-columns:1fr}.ip{position:static}}
@media(max-width:600px){.ws{padding:8px 16px 60px}.hero{padding:68px 16px 16px}}
</style>
<!-- v9.1 1781755983 -->
</head>
<body>
<nav><div class="nw">
  <a href="/08/portfolio/" class="back"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>产品运营工具集</a>
  <span class="nav-tag">产品工具</span>
</div></nav>

<div class="hero">
  <div class="hero-meta">
    <span class="tag">AI驱动</span>
    <span class="tool-num">#02</span>
  </div>
  <h1>需求评审检查器</h1>
  <p>粘贴需求文档，AI找漏洞缺失冲突，给完整度评分。</p>
</div>

<div class="ws">
  <div class="panel ip">
    <div class="ph">
      <div class="pi"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
      <div><div class="pt">输入参数</div><div class="ps">填写需求文档信息</div></div>
    </div>
    <div class="pb">
      <div class="f">
        <label>产品名称<span class="fn">（可选）</span></label>
        <input type="text" id="pname" placeholder="例如：小红书电商App">
      </div>
      <div class="f">
        <label>需求内容</label>
        <div class="quick-fill">
          <span class="qf-label">快速填入：</span>
          <button class="qf-btn" onclick="quickFill(1)">登录注册</button>
          <button class="qf-btn" onclick="quickFill(2)">支付流程</button>
          <button class="qf-btn" onclick="quickFill(3)">消息通知</button>
        </div>
        <textarea id="req" rows="8" placeholder="粘贴你的需求文档内容"></textarea>
      </div>
      <div class="f">
        <label>文档类型</label>
        <div class="chips">
          <span class="chip type-chip on" data-v="PRD" onclick="typeSelect(this)">PRD</span>
          <span class="chip type-chip" data-v="需求说明" onclick="typeSelect(this)">需求说明</span>
          <span class="chip type-chip" data-v="用户故事" onclick="typeSelect(this)">用户故事</span>
          <span class="chip type-chip" data-v="功能清单" onclick="typeSelect(this)">功能清单</span>
        </div>
      </div>
      <div class="f">
        <label>检查维度<span class="fn">（可多选）</span></label>
        <div class="chips">
          <span class="chip dim-chip act" data-v="用户故事" onclick="dimToggle(this)">用户故事</span>
          <span class="chip dim-chip act" data-v="成功指标" onclick="dimToggle(this)">成功指标</span>
          <span class="chip dim-chip act" data-v="边界条件" onclick="dimToggle(this)">边界条件</span>
          <span class="chip dim-chip act" data-v="非功能需求" onclick="dimToggle(this)">非功能需求</span>
          <span class="chip dim-chip act" data-v="依赖关系" onclick="dimToggle(this)">依赖关系</span>
          <span class="chip dim-chip act" data-v="逻辑冲突" onclick="dimToggle(this)">逻辑冲突</span>
        </div>
      </div>
      <button class="gbtn" id="gbtn" onclick="gen()">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span id="btnText">开始评审</span>
      </button>
    </div>
  </div>

  <div class="panel op">
    <div class="op-header">
      <div class="op-icon"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
      <div><div class="op-title">评审结果</div><div class="op-sub" id="opSub">等待输入需求…</div></div>
      <div class="op-status"><span class="status-dot" id="statusDot"></span></div>
    </div>
    <div class="ob" id="ob">
      <div class="skel">
        <div class="sl" style="width:60%"></div>
        <div class="sl" style="width:85%"></div>
        <div class="sl" style="width:45%"></div>
        <div class="sb"></div>
        <div class="sl" style="width:72%"></div>
        <div class="sl" style="width:55%"></div>
        <div class="sb"></div>
        <div class="sl" style="width:68%"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast">已复制到剪贴板</div>

<script>
var ZHIPU_URL='https://open.bigmodel.cn/api/paas/v4/chat/completions';
var ZHIPU_KEY='3617e7083fb349e6bcf8dff86e65e967.Ab9BRVWqjsHf9a8P';
var DS_URL='https://api.deepseek.com/chat/completions';
var DS_KEY='sk-4f016c9639cb461db37f4f778d2eac4f';
var GM_KEY=['AQ.Ab8RN6Kwvan','PacRzJIFXe6Yi1Kx35q046','jXDWC8LF0dV3tKJiA'].join('');
var GM_URL='https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key='+GM_KEY;

async function callAI(prompt){
  try{
    var r1=await fetch(ZHIPU_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+ZHIPU_KEY},body:JSON.stringify({model:'glm-4-flash',messages:[{role:'user',content:prompt}],max_tokens:4000,temperature:0.7}),signal:AbortSignal.timeout(25000)});
    if(r1.ok){var j1=await r1.json();var t1=j1.choices&&j1.choices[0]&&j1.choices[0].message&&j1.choices[0].message.content;if(t1)return t1;}
  }catch(e1){console.warn('智谱',e1.message);}
  try{
    var r2=await fetch(DS_URL,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+DS_KEY},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:4000}),signal:AbortSignal.timeout(20000)});
    if(r2.ok){var j2=await r2.json();var t2=j2.choices&&j2.choices[0]&&j2.choices[0].message&&j2.choices[0].message.content;if(t2)return t2;}
  }catch(e2){console.warn('DS',e2.message);}
  try{
    var r3=await fetch(GM_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:4000}}),signal:AbortSignal.timeout(20000)});
    if(r3.ok){var j3=await r3.json();var t3=j3.candidates&&j3.candidates[0]&&j3.candidates[0].content&&j3.candidates[0].content.parts&&j3.candidates[0].content.parts[0]&&j3.candidates[0].content.parts[0].text;if(t3)return t3;}
  }catch(e3){console.warn('Gemini',e3.message);}
  throw new Error('AI服务暂时不可用，请稍后重试');
}

var _last='';
function typeOut(text,el,done){
  _last=text;var i=0;
  el.innerHTML='<div class="md"></div>';
  var md=el.querySelector('.md');
  var iv=setInterval(function(){
    i=Math.min(i+12,text.length);
    md.innerHTML=marked.parse(text.slice(0,i));
    el.scrollTop=el.scrollHeight;
    if(i>=text.length){clearInterval(iv);if(done)done();}
  },16);
}
function copyOut(){
  if(!_last)return;
  navigator.clipboard.writeText(_last).then(function(){
    var t=document.getElementById('toast');
    if(t){t.style.opacity='1';setTimeout(function(){t.style.opacity='0';},2000);}
  });
}
function doExport(){
  if(!_last)return;
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([_last],{type:'text/markdown'}));
  a.download='output.md';a.click();
}

function quickFill(n){
  var r=document.getElementById('req');
  if(n===1)r.value='用户可以通过手机号+验证码注册登录，支持微信一键登录';
  if(n===2)r.value='用户选择商品加入购物车后，点击结算跳转支付页，支持微信支付和支付宝';
  if(n===3)r.value='系统在用户下单成功、发货、签收时分别发送推送通知';
}

function typeSelect(el){
  document.querySelectorAll('.type-chip').forEach(function(c){c.classList.remove('on');});
  el.classList.add('on');
}
function dimToggle(el){
  el.classList.toggle('act');
}
function setStatus(s){
  var dot=document.getElementById('statusDot');
  dot.className='status-dot '+s;
}

async function gen(){
  var req=document.getElementById('req').value.trim();
  if(!req)return;
  var pname=document.getElementById('pname').value.trim()||'产品';
  var type=document.querySelector('.type-chip.on')&&document.querySelector('.type-chip.on').dataset.v||'PRD';
  var dims=[...document.querySelectorAll('.dim-chip.act')].map(function(x){return x.dataset.v;}).join('、')||'全维度';
  var btn=document.getElementById('gbtn');
  var ob=document.getElementById('ob');
  btn.disabled=true;
  document.getElementById('btnText').textContent='评审中...';
  setStatus('loading');
  ob.innerHTML='<div class="think"><div class="dots"><span></span><span></span><span></span></div><span>AI正在评审需求…</span></div>';
  try{
    var prompt='你是资深产品经理，正在做需求评审。\n文档类型：'+type+'\n产品：'+pname+'\n检查维度：'+dims+'\n\n需求内容：\n'+req+'\n\n请输出：\n## 完整度评分\n（0-100分，各维度得分表格）\n\n## 问题清单\n（P0/P1/P2分级，含位置+问题+建议）\n\n## 遗漏项\n（关键缺失信息）\n\n## 逻辑冲突\n\n## 修改建议';
    var text=await callAI(prompt);
    setStatus('done');
    document.getElementById('opSub').textContent='评审完成';
    typeOut(text,ob,function(){
      ob.insertAdjacentHTML('afterend','<div class="ebar"><button class="ebtn" onclick="copyOut()"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>复制</button><button class="ebtn" onclick="doExport()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>导出</button></div>');
    });
  }catch(e){
    ob.innerHTML='<div style="padding:40px;text-align:center;color:var(--soft);font-size:13px">'+e.message+'</div>';
    setStatus('error');
    document.getElementById('opSub').textContent='评审失败';
  }
  btn.disabled=false;
  document.getElementById('btnText').textContent='重新评审';
}
</script>
</body>
</html>
