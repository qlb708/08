<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>智能打印助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--bg2:#f5f5f7;--blue:#0066cc;--bs:rgba(0,102,204,.08);--bb:rgba(0,102,204,.2);--text:#1d1d1f;--soft:#6e6e73;--muted:#aeaeb2;--bd:rgba(0,0,0,.08);--sh:0 2px 16px rgba(0,0,0,.06);--r:14px;--pill:999px;--font:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;}
body{font-family:var(--font);background:var(--bg2);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}
a{text-decoration:none;color:inherit}
nav{position:fixed;top:0;inset-x:0;height:52px;background:rgba(255,255,255,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);z-index:100;display:flex;align-items:center}
.nw{max-width:1200px;margin:0 auto;padding:0 32px;width:100%;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:16px;font-weight:800;letter-spacing:-.02em;color:var(--text)}
.logo em{color:var(--blue);font-style:normal}
.back{display:flex;align-items:center;gap:5px;font-size:14px;color:var(--soft);transition:color .2s}
.back:hover{color:var(--text)}
.back svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.hero{padding:70px 32px 20px;max-width:1200px;margin:0 auto}
.tag{display:inline-flex;align-items:center;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--blue);background:var(--bs);border:1px solid var(--bb);padding:4px 12px;border-radius:var(--pill);margin-bottom:10px}
.hero h1{font-size:clamp(22px,3vw,34px);font-weight:800;letter-spacing:-.04em;margin-bottom:6px}
.hero p{font-size:14px;color:var(--soft)}
.ws{max-width:1200px;margin:0 auto;padding:8px 32px 80px;display:grid;grid-template-columns:400px 1fr;gap:16px;align-items:start}
.panel{background:#fff;border-radius:var(--r);border:1px solid var(--bd);box-shadow:var(--sh);overflow:hidden}
.ip{position:sticky;top:60px}
.ph{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.pi{width:28px;height:28px;border-radius:8px;background:var(--bs);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pi svg{width:14px;height:14px;fill:none;stroke:var(--blue);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.pt{font-size:13px;font-weight:700}
.ps{font-size:11px;color:var(--soft)}
.pb{padding:16px}
.f{margin-bottom:13px}
.f label{display:block;font-size:12px;font-weight:600;margin-bottom:5px}
.fn{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px}
.f input,.f textarea{width:100%;padding:8px 11px;border:1.5px solid var(--bd);border-radius:10px;font-size:13px;font-family:var(--font);background:var(--bg2);color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
.f input:focus,.f textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--bs);background:#fff}
.drop{height:140px;border:2px dashed var(--bd);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .2s;background:var(--bg2)}
.drop:hover{border-color:var(--bb);background:var(--bs)}
.drop svg{width:28px;height:28px;fill:none;stroke:var(--blue);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.drop-txt{font-size:13px;color:var(--soft)}
.gbtn{width:100%;margin-top:6px;padding:12px;border-radius:var(--pill);background:var(--blue);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 12px rgba(0,102,204,.2);transition:all .2s}
.gbtn:hover:not(:disabled){background:#0055aa;transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,102,204,.28)}
.gbtn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.gbtn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.op{min-height:480px;display:flex;flex-direction:column}
.ob{flex:1;padding:20px;overflow-y:auto;max-height:70vh}
.skel{display:flex;flex-direction:column;gap:10px;opacity:.4}
.sl{height:12px;background:linear-gradient(90deg,#e8e8ed 25%,#f5f5f7 50%,#e8e8ed 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:5px}
.sb{background:linear-gradient(90deg,#e8e8ed 25%,#f5f5f7 50%,#e8e8ed 75%);background-size:200% 100%;animation:sh 1.5s infinite;border-radius:8px}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
.think{display:flex;align-items:center;gap:10px;padding:28px 0;color:var(--soft);font-size:13px}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);animation:bou 1.4s infinite ease-in-out;margin:0 2px}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bou{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}
.md{font-size:13px;line-height:1.8;color:var(--text)}
.md table{width:100%;border-collapse:collapse;margin:12px 0;font-size:12px}
.md th,.md td{padding:7px 10px;border:1px solid var(--bd);text-align:left;vertical-align:top}
.md th{background:var(--bg2);font-weight:600}
.ebar{padding:12px 16px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px}
.ebtn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--pill);border:1.5px solid var(--bd);background:#fff;color:var(--soft);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s}
.ebtn:hover{border-color:var(--bb);color:var(--blue)}
.ebtn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2}
#toast{position:fixed;bottom:24px;right:24px;background:#1d1d1f;color:#fff;padding:9px 16px;border-radius:var(--pill);font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
@media(max-width:900px){.ws{grid-template-columns:1fr}.ip{position:static}}
@media(max-width:600px){.ws{padding:8px 16px 60px}.hero{padding:68px 16px 16px}}
</style>
</head>
<body>
<nav>
  <div class="nw">
    <a href="/08/portfolio/" class="logo">AI <em>&times;</em> 08</a>
    <a href="/08/portfolio/" class="back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      返回
    </a>
  </div>
</nav>

<div class="hero">
  <div class="tag">实用工具</div>
  <h1>智能打印助手</h1>
  <p>上传 PDF，自动识别彩印与黑白页，预估最优打印费用。</p>
</div>

<div class="ws">
  <div class="panel ip">
    <div class="ph">
      <div class="pi">
        <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      </div>
      <div>
        <div class="pt">上传配置</div>
        <div class="ps">选择 PDF 并设置单价</div>
      </div>
    </div>
    <div class="pb">
      <div class="f">
        <label>PDF 文件</label>
        <div class="drop" id="dropZone">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <div class="drop-txt">拖拽 PDF 到此处 / 点击选择</div>
        </div>
        <input type="file" id="fileInput" accept=".pdf" style="display:none">
      </div>
      <div class="f">
        <label>彩印单价 <span class="fn">元/页</span></label>
        <input type="number" id="colorPrice" value="1.5" step="0.1" min="0">
      </div>
      <div class="f">
        <label>黑白单价 <span class="fn">元/页</span></label>
        <input type="number" id="bwPrice" value="0.1" step="0.1" min="0">
      </div>
      <button class="gbtn" id="gbtn" onclick="analyze()" disabled>
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        开始分析
      </button>
    </div>
  </div>

  <div class="panel op">
    <div class="ph">
      <div class="pi">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
      <div>
        <div class="pt">打印分析</div>
        <div class="ps" id="outSub">等待上传</div>
      </div>
    </div>
    <div class="ob" id="ob">
      <div class="skel">
        <div class="sb" style="height:120px"></div>
        <div class="sl" style="width:70%;margin-top:8px"></div>
        <div class="sl" style="width:50%"></div>
        <div class="sb" style="height:160px;margin-top:4px"></div>
        <div class="sl" style="width:45%;margin-top:8px"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast">已复制</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
var PROVIDERS=[
  {name:'智谱',url:'https://open.bigmodel.cn/api/paas/v4/chat/completions',key:'3617e7083fb349e6bcf8dff86e65e967.Ab9BRVWqjsHf9a8P',model:'glm-4-flash',type:'openai'},
  {name:'DeepSeek',url:'https://api.deepseek.com/chat/completions',key:'sk-4f016c9639cb461db37f4f778d2eac4f',model:'deepseek-chat',type:'openai'},
  {name:'Gemini',url:'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent',key:['AQ.Ab8RN6Kwvan','PacRzJIFXe6Yi1Kx35q046','jXDWC8LF0dV3tKJiA'].join(''),type:'gemini'}
];
async function callAI(prompt){
  for(var i=0;i<PROVIDERS.length;i++){
    var p=PROVIDERS[i];
    try{
      var res,text='';
      if(p.type==='openai'){
        res=await fetch(p.url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+p.key},body:JSON.stringify({model:p.model,messages:[{role:'user',content:prompt}],max_tokens:5000,temperature:0.7}),signal:AbortSignal.timeout(25000)});
        if(!res.ok){var e=await res.json();console.warn(p.name,e);continue;}
        var d=await res.json();
        text=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'';
      }else{
        res=await fetch(p.url+'?key='+p.key,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:5000,temperature:0.7}}),signal:AbortSignal.timeout(20000)});
        if(!res.ok)continue;
        var d2=await res.json();
        text=(d2.candidates&&d2.candidates[0]&&d2.candidates[0].content&&d2.candidates[0].content.parts&&d2.candidates[0].content.parts[0]&&d2.candidates[0].content.parts[0].text)||'';
      }
      if(text){console.log('\u2713',p.name);return text;}
    }catch(err){console.warn(p.name,err.message);}
  }
  throw new Error('\u6240\u6709AI\u670d\u52a1\u5747\u4e0d\u53ef\u7528');
}
var _lastResult='';
function typeWrite(text,el,onDone){
  _lastResult=text;
  var i=0;
  el.innerHTML='<div class="md"></div>';
  var md=el.querySelector('.md');
  var iv=setInterval(function(){
    i=Math.min(i+8,text.length);
    md.innerHTML=marked.parse(text.slice(0,i));
    el.scrollTop=el.scrollHeight;
    if(i>=text.length){clearInterval(iv);if(onDone)onDone();}
  },20);
}
function doExport(filename){
  if(!_lastResult)return;
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([_lastResult],{type:'text/markdown'}));
  a.download=filename||'output.md';a.click();
}
function copyText(){
  if(!_lastResult)return;
  navigator.clipboard.writeText(_lastResult).then(function(){
    var t=document.getElementById('toast');
    if(t){t.style.opacity='1';setTimeout(function(){t.style.opacity='0';},2000);}
  });
}

pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

var pdfFile=null;

document.getElementById('fileInput').addEventListener('change',function(e){
  pdfFile=e.target.files[0];
  if(pdfFile){
    document.getElementById('gbtn').disabled=false;
    document.getElementById('dropZone').innerHTML='<div style="text-align:center;padding:20px 0"><strong>'+pdfFile.name+'</strong><br><span style="font-size:12px;color:var(--soft)">\u70b9\u51fb\u91cd\u65b0\u9009\u62e9</span></div>';
  }
});

document.getElementById('dropZone').addEventListener('click',function(){document.getElementById('fileInput').click();});

document.getElementById('dropZone').addEventListener('dragover',function(e){e.preventDefault();this.style.borderColor='var(--blue)';});
document.getElementById('dropZone').addEventListener('dragleave',function(){this.style.borderColor='var(--bd)';});
document.getElementById('dropZone').addEventListener('drop',function(e){
  e.preventDefault();
  this.style.borderColor='var(--bd)';
  pdfFile=e.dataTransfer.files[0];
  if(pdfFile&&pdfFile.type==='application/pdf'){
    document.getElementById('gbtn').disabled=false;
    this.innerHTML='<div style="text-align:center;padding:20px 0"><strong>'+pdfFile.name+'</strong><br><span style="font-size:12px;color:var(--soft)">\u62d6\u62fd\u91cd\u65b0\u9009\u62e9</span></div>';
  }
});

async function analyze(){
  if(!pdfFile)return;
  var btn=document.getElementById('gbtn');
  var ob=document.getElementById('ob');
  var sub=document.getElementById('outSub');
  btn.disabled=true;
  if(sub)sub.textContent='\u5206\u6790\u4e2d\u2026';
  ob.innerHTML='<div class="think"><div class="dots"><span></span><span></span><span></span></div><span>\u6b63\u5728\u5206\u6790 PDF \u9875\u9762\u5185\u5bb9\u2026</span></div>';
  var colorPrice=parseFloat(document.getElementById('colorPrice').value)||1.5;
  var bwPrice=parseFloat(document.getElementById('bwPrice').value)||0.1;
  try{
    var arrayBuffer=await pdfFile.arrayBuffer();
    var pdf=await pdfjsLib.getDocument({data:arrayBuffer}).promise;
    var totalPages=pdf.numPages;
    var results=[];
    for(var i=1;i<=totalPages;i++){
      var page=await pdf.getPage(i);
      var ops=await page.getOperatorList();
      var hasImage=ops.fnArray.some(function(fn){
        return fn===pdfjsLib.OPS.paintImageXObject||fn===pdfjsLib.OPS.paintJpegXObject||fn===pdfjsLib.OPS.paintImageMaskXObject;
      });
      results.push({page:i,hasImage:hasImage,rec:hasImage?'\u5f69\u5370':'\u9ed1\u767d'});
    }
    var colorPages=results.filter(function(r){return r.hasImage;});
    var bwPages=results.filter(function(r){return !r.hasImage;});
    var colorCost=colorPages.length*colorPrice;
    var bwCost=bwPages.length*bwPrice;
    var totalCost=colorCost+bwCost;
    var savedCost=totalPages*colorPrice-totalCost;
    var summaryHtml='<div style="background:var(--bg2);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px">'
      +'<div><div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">\u603b\u9875\u6570</div><div style="font-size:24px;font-weight:800">'+totalPages+'</div></div>'
      +'<div><div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">\u5f69\u5370\u9875</div><div style="font-size:24px;font-weight:800;color:#ff3b30">'+colorPages.length+'</div></div>'
      +'<div><div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">\u9ed1\u767d\u9875</div><div style="font-size:24px;font-weight:800;color:var(--soft)">'+bwPages.length+'</div></div>'
      +'<div><div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">\u9884\u4f30\u603b\u8d39\u7528</div><div style="font-size:24px;font-weight:800;color:var(--blue)">\uffe5'+totalCost.toFixed(2)+'</div></div>'
      +'</div>'
      +'<div style="background:rgba(52,199,89,.08);border:1px solid rgba(52,199,89,.2);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#1d1d1f">'
      +'\u76f8\u6bd4\u5168\u5f69\u5370\u8282\u7701 <strong style="color:#34c759">\uffe5'+savedCost.toFixed(2)+'</strong>\uff08\u7701 '+(totalPages>0&&colorPrice>0?(savedCost/(totalPages*colorPrice)*100).toFixed(0):0)+'%\uff09'
      +'</div>';
    var tableHtml='<table><thead><tr><th>\u9875\u7801</th><th>\u5efa\u8bae</th><th>\u5224\u65ad\u4f9d\u636e</th></tr></thead><tbody>';
    results.forEach(function(r){
      tableHtml+='<tr><td>\u7b2c '+r.page+' \u9875</td>'
        +'<td><span style="font-weight:600;color:'+(r.hasImage?'#ff3b30':'var(--soft)')+'">'+r.rec+'</span></td>'
        +'<td style="color:var(--soft)">'+(r.hasImage?'\u68c0\u6d4b\u5230\u56fe\u7247/\u56fe\u8868\u5143\u7d20':'\u7eaf\u6587\u5b57\u5185\u5bb9')+'</td></tr>';
    });
    tableHtml+='</tbody></table>';
    ob.innerHTML='<div class="md">'+summaryHtml+tableHtml+'</div>';
    if(sub)sub.textContent='\u5206\u6790\u5b8c\u6210';
    var prompt='\u8bf7\u6839\u636e\u4ee5\u4e0bPDF\u6253\u5370\u5206\u6790\u7ed3\u679c\uff0c\u75283-4\u53e5\u8bdd\u7ed9\u51fa\u4e13\u4e1a\u7684\u6253\u5370\u5efa\u8bae\uff1a\n\n\u6587\u4ef6\uff1a'+pdfFile.name+'\n\u603b\u9875\u6570\uff1a'+totalPages+'\n\u5f69\u5370\u9875\u6570\uff1a'+colorPages.length+'\n\u9ed1\u767d\u9875\u6570\uff1a'+bwPages.length+'\n\u5f69\u5370\u5355\u4ef7\uff1a\uffe5'+colorPrice+'/\u9875\uff0c\u9ed1\u767d\u5355\u4ef7\uff1a\uffe5'+bwPrice+'/\u9875\n\u9884\u4f30\u603b\u8d39\u7528\uff1a\uffe5'+totalCost.toFixed(2)+'\uff0c\u76f8\u6bd4\u5168\u5f69\u5370\u8282\u7701\uff1a\uffe5'+savedCost.toFixed(2)+'\n\n\u8bf7\u7ed9\u51fa\u7b80\u6d01\u7684\u6253\u5370\u5efa\u8bae\uff08\u4e0d\u8d85\u8fc7100\u5b57\uff09\u3002';
    callAI(prompt).then(function(tip){
      var tipEl=document.createElement('div');
      tipEl.style.cssText='background:var(--bs);border:1px solid var(--bb);border-radius:10px;padding:12px 16px;margin-top:16px;font-size:13px;color:var(--text);line-height:1.7';
      tipEl.innerHTML='<strong style="color:var(--blue)">AI \u5efa\u8bae\uff1a</strong>'+tip;
      ob.appendChild(tipEl);
    }).catch(function(){});
    document.querySelector('.op').insertAdjacentHTML('beforeend','<div class="ebar"><button class="ebtn" onclick="window.print()"><svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>\u6253\u5370\u6b64\u9875</button></div>');
  }catch(e){
    ob.innerHTML='<div style="padding:32px 0;text-align:center;color:var(--soft);font-size:13px">\u5206\u6790\u5931\u8d25\uff1a'+e.message+'</div>';
    if(sub)sub.textContent='\u5931\u8d25';
  }
  btn.disabled=false;
  btn.innerHTML='<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>\u91cd\u65b0\u5206\u6790';
}
</script>
</body>
</html>
