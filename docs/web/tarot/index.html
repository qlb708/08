  position: absolute;
  inset: 0;

  height: 100%;
  pointer-events: none;

<style id="parchment-override">
/* 强制覆盖：粉橙暖日落色调 */
.theme-btn {
  background: rgba(240, 190, 160, 0.15) !important;
  border: 1px solid rgba(210, 150, 120, 0.40) !important;
  color: #8a4030 !important;
}
.theme-btn:hover {
  background: rgba(230, 170, 140, 0.28) !important;
  border-color: rgba(200, 140, 110, 0.75) !important;
  color: #6a2818 !important;
}
.theme-btn.active {
  background: linear-gradient(135deg, #d4907a, #b87060) !important;
  border-color: #e8a888 !important;
  color: #fff8f5 !important;
  box-shadow: 0 0 14px rgba(210, 140, 110, 0.50) !important;
}
.question-theme-label {
  color: #9a5040 !important;
}
.nav-dot {
  background: rgba(200, 130, 100, 0.28) !important;
}
.nav-dot.active {
  background: #c8845a !important;
  box-shadow: 0 0 8px rgba(200, 132, 90, 0.45) !important;
}
#card-selected-view {
  background: rgba(253, 242, 236, 0.94) !important;
}
#question-panel, .question-panel {
  background: rgba(253, 246, 242, 0.95) !important;
  border-color: rgba(210, 150, 120, 0.22) !important;
}
.question-panel-title, #question-panel h2, #question-panel .panel-title {
  color: #3a2418 !important;
}
.welcome-start-btn {
  border-color: rgba(210, 140, 110, 0.65) !important;
}
.mode-btn-gesture, .mode-btn-mouse {
  border-color: rgba(210, 140, 110, 0.55) !important;
  color: #6a3020 !important;
}
</style>
<script>
// 花瓣漂浮动画
(function initPetals() {
  function spawn() {
    var c = document.getElementById('petals-container');
    if (!c) return;
    var emojis = ['🌸','🌺','✿','❀','🌼','✦','✧'];
    var el = document.createElement('span');
    el.className = 'petal';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (Math.random() * 100) + '%';
    el.style.fontSize = (12 + Math.random() * 14) + 'px';
    var dur = 6 + Math.random() * 8;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = (Math.random() * 4) + 's';
    el.style.opacity = '0';
    c.appendChild(el);
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, (dur + 4) * 1000);
  }
  function start() {
    // 初始批量生成
    for (var i = 0; i < 12; i++) setTimeout(spawn, i * 400);
    // 持续生成
    setInterval(spawn, 800);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>

<body>
  <!-- ✦ 开场欢迎页 — 魔法球/灵珠风格 ✦ -->
  <div id="welcome-screen">
    <div class="welcome-stars"></div>
    <!-- 花瓣漂浮层 -->
    <div class="petals-container" id="petals-container"></div>

    <!-- 核心：卷轴 + 符文光盘组合 -->
    <div class="scroll-rune-wrapper">
      <!-- 外层光晕 -->
      <div class="rune-outer-glow"></div>
      <!-- 符文旋转圆盘 -->
      <div class="rune-disk">
        <div class="rune-ring ring-1"></div>
        <div class="rune-ring ring-2"></div>
        <div class="rune-ring ring-3"></div>
        <div class="rune-center">
          <span class="rune-symbol">☽</span>
          <div class="rune-sparkles">
            <span class="rs s1">✦</span>
            <span class="rs s2">✧</span>
            <span class="rs s3">✦</span>
            <span class="rs s4">✧</span>
          </div>
        </div>
      </div>
      <!-- 卷轴展开 -->
      <div class="scroll-reveal">
        <div class="scroll-top-roll"></div>
        <div class="scroll-body">
          <div class="scroll-text-inner">
            <span class="scroll-line l1">每张牌，藏着一段未走的路</span>
          </div>
        </div>
        <div class="scroll-bottom-roll"></div>
      </div>
    </div>

    <h1 class="welcome-title">命运旅途</h1>
    <p class="welcome-subtitle">世界很大，答案在牌里<br/>翻开它，出发</p>
    <div class="mode-btns">
      <button type="button" id="btn-start-ritual" class="welcome-start-btn mode-btn-gesture">
        <span class="btn-glow"></span>
        <span class="btn-text">🤚 手势体验版</span>
      </button>
      <button type="button" id="btn-start-mouse" class="welcome-start-btn mode-btn-mouse">
        <span class="btn-glow"></span>
        <span class="btn-text">🖱️ 鼠标点击版</span>
      </button>
    </div>
    <p class="welcome-hint"></p>
  </div>

  <!-- 加载画面 -->
  <div id="loading-screen" class="hidden">
    <div class="magic-circle-loader">
      <div class="circle outer"></div>
      <div class="circle inner"></div>
      <div class="star">✦</div>
    </div>
    <p class="loading-text">正在唤醒塔罗牌灵…</p>
    <p class="loading-sub" id="loading-status">初始化中</p>
  </div>

  <!-- 占卜提问面板 -->
  <div id="question-panel" class="hidden">
    <div class="question-title">✦ 你想探寻什么 ✦</div>
    <div class="question-desc">每一次出发，都藏着命运的答案</div>
    <div class="question-theme-label">―― 选择你的旅途意图 ――</div>
    <div class="question-themes" id="question-themes">
      <button class="theme-btn active" data-theme="今日运势">🔮 今日去哪</button>
      <button class="theme-btn" data-theme="爱情缘分">❤️ 邂逅爱情</button>
      <button class="theme-btn" data-theme="事业财运">✨ 旺我事业</button>
    </div>
    <button id="btn-silent-start" class="question-silent-btn">🗺️ 翻开牌，出发</button>
  </div>

  <!-- 主界面 -->
  <div id="app" class="hidden">
    <canvas id="starfield-canvas"></canvas>
    <video id="camera" autoplay="" playsinline="" muted=""></video>
    <canvas id="camera-overlay"></canvas>
    <!-- 摄像头预览小窗 -->
    <div id="cam-preview-wrap">
      <canvas id="cam-preview"></canvas>
      <div id="cam-preview-hint">把手放在框内</div>
    </div>

    <div id="gesture-hint" class="hidden">
      <div class="hint-icon">✊</div>
      <div class="hint-text">握拳开始仪式</div>
    </div>

    <div id="state-badge" class="hidden">塔罗占卜</div>

    <div id="tarot-collection" class="hidden">
      <div class="collection-slot" id="slot-0">

        <div class="slot-content"></div>
      </div>
      <div class="collection-slot" id="slot-1">
        <div class="slot-label">现在</div>
        <div class="slot-content"></div>
      </div>
      <div class="collection-slot" id="slot-2">
        <div class="slot-label">未来</div>
        <div class="slot-content"></div>
      </div>
    </div>

    <!-- 3D 立体底盘 -->
    <div id="platform-3d" class="hidden">
      <div class="platform-layers">
        <div class="platform-glow-surface"></div>
        <div class="platform-sakura-circle">
          <div class="sakura-ring sakura-ring-outer"></div>
          <div class="sakura-ring sakura-ring-mid"></div>
          <div class="sakura-ring sakura-ring-inner"></div>
          <div class="sakura-star-12-platform"></div>
          <div class="sakura-inner-ring-platform"></div>
          <div class="sakura-symbols-platform">
            <span class="sakura-sun">☀</span>
            <span class="sakura-moon">☽</span>
            <span class="sakura-star-sym">★</span>
            <span class="sakura-star-sym s2">★</span>
          </div>
          <div class="sakura-cross-platform">
            <div class="cross-h"></div>
            <div class="cross-v"></div>
            <div class="cross-d1"></div>
            <div class="cross-d2"></div>
          </div>
          <div class="platform-runes" id="platform-runes"></div>
        </div>
      </div>
    </div>

    <!-- 3D 环形旋转木马 -->
    <div id="carousel-stage" class="hidden">
      <div id="carousel-wrapper">
        <div id="carousel"></div>
      </div>
    </div>

    <!-- 选定卡牌特效展示 -->
    <div id="card-selected-view" class="hidden">
      <div class="selected-magic-circle"></div>
      <div class="selected-glow" id="selected-glow"></div>
      <div class="selected-card-wrapper">
        <div class="flip-burst" id="flip-burst"></div>
        <div class="flip-ring" id="flip-ring"></div>
        <div class="selected-card-flipper" id="selected-card-flipper">

          </div>

        </div>
      </div>
      <div class="selected-card-name" id="selected-card-name"></div>
      <div class="release-hint" id="release-hint"></div>
    </div>

    <!-- 占卜结果展示 -->
    <div id="tarot-result-view" class="hidden">
      <div class="tarot-result-inner" role="dialog" aria-modal="true" aria-label="命运揭示结果">
        <div class="tr-header">
          <div class="tr-title">✦ 命运揭示 ✦</div>
        </div>
        <div class="tr-cards-wrap">
          <div class="result-showcase" id="result-showcase"></div>
        </div>
        <div class="tr-quote" id="result-doc-quote"></div>
        <div class="tr-destiny-card">
          <div class="tr-destiny-body tr-insight-short" id="result-doc-insight-short"></div>
          <div class="tr-insight-expand-wrap">
            <button class="tr-insight-expand-btn" id="btn-insight-expand">查看完整解读 ↓</button>
          </div>
          <div class="tr-destiny-body tr-insight-full hidden" id="result-doc-insight-full"></div>
        </div>
        <!-- 命运旅途推荐（主角） -->
        <div id="travel-recommend-section"></div>
        <div class="tr-actions">
          <button type="button" class="tr-btn tr-btn-retry" id="btn-restart-reading">重新占卜</button>

    </div>

    <!-- 魔法特效层 -->
    <canvas id="fx-canvas"></canvas>
    <canvas id="particle-canvas"></canvas>

    <!-- 调试面板 -->
    <div id="debug-panel" class="hidden">
      <div class="debug-header">
        <span>🔍 调试面板</span>

      </div>

      <div id="debug-info">
