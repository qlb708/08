<script>
// 花瓣漂浮动画
(function initPetals() {
  function spawn() {
    var c = document.getElementById('petals-container');
    if (!c) return;
    var emojis = ['✿','✦','✧','❋','✼','❊','✽','✾','✩','✫'];
    var el = document.createElement('span');
    el.className = 'petal';
    var colors = ['rgba(210,140,110,0.7)','rgba(230,160,120,0.6)','rgba(200,130,100,0.65)','rgba(240,180,150,0.55)','rgba(180,120,90,0.6)'];
    el.style.color = colors[Math.floor(Math.random() * colors.length)];
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = (Math.random() * 100) + '%';
    el.style.fontSize = (12 + Math.random() * 14) + 'px';
    var dur = 6 + Math.random() * 8;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = (Math.random() * 4) + 's';
    el.style.opacity = '0';
    c.appendChild(el);
    setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, (dur + 4) * 1000);
  }
  function start() {
    // 初始批量生成
    for (var i = 0; i < 12; i++) setTimeout(spawn, i * 400);
    // 持续生成
    setInterval(spawn, 800);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>
