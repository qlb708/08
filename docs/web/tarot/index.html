<!DOCTYPE html><html lang="zh-CN"><head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <script>(function(){var u=navigator.userAgent||'';if(/Mobi|Android|iPhone|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(u))document.documentElement.classList.add('perf-flip-lite');if(/VivoBrowser|\b(iqoo|vivo)\b|HeyTapBrowser|HeyTap|OppoBrowser|HuaweiBrowser|HONOR|\bMiuiBrowser|\bMQQBrowser\/|\bUCBrowser\/|\bQuark\//i.test(u))document.documentElement.classList.add('perf-tarot-vivo');})();</script>
  <title>命运旅途 · 塔罗指引</title>
  <!-- v1.0.5-20260706 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&display=swap');
  </style>
  <link rel="stylesheet" href="style.css"/>
<style>
/* 奶油牌背 SVG 纹样覆盖层 */
.card-back-svg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
</style>
<style id="parchment-override">
/* 强制覆盖：羊皮纸暖色调 */
.theme-btn {
  background: rgba(200, 160, 80, 0.12) !important;
  border: 1px solid rgba(180, 130, 60, 0.4) !important;
  color: #7a5520 !important;
}
.theme-btn:hover {
  background: rgba(200, 160, 80, 0.25) !important;
  border-color: rgba(180, 130, 60, 0.7) !important;
  color: #5a3a10 !important;
}
.theme-btn.active {
  background: linear-gradient(135deg, #c8973a, #9a6f2a) !important;
  border-color: #e0b860 !important;
  color: #fff8ee !important;
  box-shadow: 0 0 14px rgba(200, 150, 60, 0.45) !important;
}
.question-theme-label {
  color: #8a6030 !important;
}
.nav-dot {
  background: rgba(154, 111, 42, 0.3) !important;
}
.nav-dot.active {
  background: #c8973a !important;
  box-shadow: 0 0 8px rgba(200, 151, 58, 0.5) !important;
}
/* 翻牌展示背景 */
#card-selected-view {
  background: rgba(250, 242, 220, 0.94) !important;
}
/* question panel */
#question-panel, .question-panel {
  background: rgba(253, 246, 232, 0.95) !important;
  border-color: rgba(200, 160, 80, 0.25) !important;
}
.question-panel-title, #question-panel h2, #question-panel .panel-title {
  color: #3d2b1a !important;
}
/* 底部导航点 */
</style>
</head>
<body>
  <!-- ✦ 开场欢迎页 — 魔法球/灵珠风格 ✦ -->
  <div id="welcome-screen">
    <div class="welcome-stars"></div>
    <div class="crystal-ball-wrapper">
      <div class="crystal-base">
        <div class="base-rune">✦</div>
      </div>
      <div class="crystal-ball">
        <div class="crystal-glow"></div>
        <div class="crystal-mist"></div>
        <div class="crystal-mist mist-2"></div>
        <div class="crystal-sparkle s1">✧</div>
        <div class="crystal-sparkle s2">✦</div>
        <div class="crystal-sparkle s3">☽</div>
        <div class="crystal-sparkle s4">✧</div>
        <div class="crystal-highlight"></div>
      </div>
      <div class="crystal-ring"></div>
    </div>
    <h1 class="welcome-title">命运旅途</h1>
    <p class="welcome-subtitle">想一万次，不如出发一次<br/>翻开塔罗，奔赴属于你的远方</p>
    <div class="mode-btns">
      <button type="button" id="btn-start-ritual" class="welcome-start-btn mode-btn-gesture">
        <span class="btn-glow"></span>
        <span class="btn-text">🤚 手势体验版</span>
      </button>
      <button type="button" id="btn-start-mouse" class="welcome-start-btn mode-btn-mouse">
        <span class="btn-glow"></span>
        <span class="btn-text">🖱️ 鼠标点击版</span>
      </button>
    </div>
    <p class="welcome-hint"></p>
  </div>

  <!-- 加载画面 -->
  <div id="loading-screen" class="hidden">
    <div class="magic-circle-loader">
      <div class="circle outer"></div>
      <div class="circle inner"></div>
      <div class="star">✦</div>
    </div>
    <p class="loading-text">正在唤醒塔罗牌灵…</p>
    <p class="loading-sub" id="loading-status">初始化中</p>
  </div>

  <!-- 占卜提问面板 -->
  <div id="question-panel" class="hidden">
    <div class="question-title">✦ 你想探寻什么 ✦</div>
    <div class="question-desc">每一次出发，都藏着命运的答案</div>
    <div class="question-theme-label">―― 选择你的旅途意图 ――</div>
    <div class="question-themes" id="question-themes">
      <button class="theme-btn active" data-theme="今日运势">🔮 今日去哪</button>
      <button class="theme-btn" data-theme="爱情缘分">❤️ 邂逅爱情</button>
      <button class="theme-btn" data-theme="事业财运">✨ 旺我事业</button>
    </div>
    <button id="btn-silent-start" class="question-silent-btn">🗺️ 翻开牌，出发</button>
  </div>

  <!-- 主界面 -->
  <div id="app" class="hidden">
    <canvas id="starfield-canvas"></canvas>
    <video id="camera" autoplay="" playsinline="" muted=""></video>
    <canvas id="camera-overlay"></canvas>
    <!-- 摄像头预览小窗 -->
    <div id="cam-preview-wrap">
      <canvas id="cam-preview"></canvas>
      <div id="cam-preview-hint">把手放在框内</div>
    </div>

    <div id="gesture-hint" class="hidden">
      <div class="hint-icon">✊</div>
      <div class="hint-text">握拳开始仪式</div>
    </div>

    <div id="state-badge" class="hidden">塔罗占卜</div>

    <div id="tarot-collection" class="hidden">
      <div class="collection-slot" id="slot-0">
        <div class="slot-label">过去</div>
        <div class="slot-content"></div>
      </div>
      <div class="collection-slot" id="slot-1">
        <div class="slot-label">现在</div>
        <div class="slot-content"></div>
      </div>
      <div class="collection-slot" id="slot-2">
        <div class="slot-label">未来</div>
        <div class="slot-content"></div>
      </div>
    </div>

    <!-- 3D 立体底盘 -->
    <div id="platform-3d" class="hidden">
      <div class="platform-layers">
        <div class="platform-glow-surface"></div>
        <div class="platform-sakura-circle">
          <div class="sakura-ring sakura-ring-outer"></div>
          <div class="sakura-ring sakura-ring-mid"></div>
          <div class="sakura-ring sakura-ring-inner"></div>
          <div class="sakura-star-12-platform"></div>
          <div class="sakura-inner-ring-platform"></div>
          <div class="sakura-symbols-platform">
            <span class="sakura-sun">☀</span>
            <span class="sakura-moon">☽</span>
            <span class="sakura-star-sym">★</span>
            <span class="sakura-star-sym s2">★</span>
          </div>
          <div class="sakura-cross-platform">
            <div class="cross-h"></div>
            <div class="cross-v"></div>
            <div class="cross-d1"></div>
            <div class="cross-d2"></div>
          </div>
          <div class="platform-runes" id="platform-runes"></div>
        </div>
      </div>
    </div>

    <!-- 3D 环形旋转木马 -->
    <div id="carousel-stage" class="hidden">
      <div id="carousel-wrapper">
        <div id="carousel"></div>
      </div>
    </div>

    <!-- 选定卡牌特效展示 -->
    <div id="card-selected-view" class="hidden">
      <div class="selected-magic-circle"></div>
      <div class="selected-glow" id="selected-glow"></div>
      <div class="selected-card-wrapper">
        <div class="flip-burst" id="flip-burst"></div>
        <div class="flip-ring" id="flip-ring"></div>
        <div class="selected-card-flipper" id="selected-card-flipper">
          <div class="selected-card-back" id="selected-card-back">
            <img class="selected-back-img" src="cards/back/back1.jpg" alt="牌背"/>
          </div>
          <div class="selected-card-front" id="selected-card-front"></div>
        </div>
      </div>
      <div class="selected-card-name" id="selected-card-name"></div>
      <div class="release-hint" id="release-hint"></div>
    </div>

    <!-- 占卜结果展示 -->
    <div id="tarot-result-view" class="hidden">
      <div class="tarot-result-inner" role="dialog" aria-modal="true" aria-label="命运揭示结果">
        <div class="tr-header">
          <div class="tr-title">✦ 命运揭示 ✦</div>
        </div>
        <div class="tr-cards-wrap">
          <div class="result-showcase" id="result-showcase"></div>
        </div>
        <div class="tr-quote" id="result-doc-quote"></div>
        <div class="tr-destiny-card">
          <div class="tr-destiny-body tr-insight-short" id="result-doc-insight-short"></div>
          <div class="tr-insight-expand-wrap">
            <button class="tr-insight-expand-btn" id="btn-insight-expand">查看完整解读 ↓</button>
          </div>
          <div class="tr-destiny-body tr-insight-full hidden" id="result-doc-insight-full"></div>
        </div>
        <!-- 命运旅途推荐（主角） -->
        <div id="travel-recommend-section"></div>
        <div class="tr-actions">
          <button type="button" class="tr-btn tr-btn-retry" id="btn-restart-reading">重新占卜</button>
          <button type="button" class="tr-btn tr-btn-save" id="btn-tarot-save-share">保存分享</button>
        </div>
      </div>
    </div>

    <!-- 魔法特效层 -->
    <canvas id="fx-canvas"></canvas>
    <canvas id="particle-canvas"></canvas>

    <!-- 调试面板 -->
    <div id="debug-panel" class="hidden">
      <div class="debug-header">
        <span>🔍 调试面板</span>
        <button id="debug-close">✕</button>
      </div>
      <canvas id="debug-canvas" width="320" height="240"></canvas>
      <div id="debug-info">
        <div>手势: <span id="dbg-gesture">无</span></div>
        <div>状态: <span id="dbg-state">idle</span></div>
        <div>手数: <span id="dbg-hands">0</span></div>
        <div>FPS: <span id="dbg-fps">0</span></div>
        <div>置信度: <span id="dbg-confidence">0</span></div>
      </div>
    </div>

    <!-- 底部工具栏 -->
    <div id="toolbar">
      <button id="btn-debug" title="调试面板">🔍</button>
      <button id="btn-mirror" title="镜像翻转">🪞</button>
    </div>
  </div>

  <!-- 分享导出用 DOM -->
  <div id="tarot-share-root" class="tarot-share-root" aria-hidden="true">
    <div class="share-card" id="share-card">
      <div class="sc-header">
        <div class="sc-title">✦ 命运揭示 ✦</div>
        <div class="sc-sub">命运旅途 · RIDER-WAITE TAROT</div>
      </div>
      <div class="sc-cards-row" id="tarot-share-cards-row"></div>
      <div class="sc-quote" id="tarot-share-sc-quote"></div>
      <div class="sc-destiny-card">
        <div class="sc-destiny-body" id="tarot-share-sc-body"></div>
      </div>
      <div class="sc-footer-block">
        <div class="sc-divider"></div>
        <div class="sc-cta">隔空手势 · 三张牌阵占卜 →</div>
      </div>
    </div>
  </div>

  <!-- 脚本（去掉版本号后缀） -->
  <script src="cards.js"></script>
  <script src="readings.js"></script>
  <script src="tarot-card-energy-map.js"></script>
  <script src="tarot-readings-doc.js"></script>
  <script src="readings-v2.js"></script>
  <script src="tarot-tag-engine.js?v=0708h"></script>
  <script src="tarot-copy-engine.js?v=0708h"></script>
  <script src="tarot-minor-arcana.js?v=0708h"></script>
  <script src="gestures.js"></script>
  <script src="effects.js"></script>
  <script src="sakura/share-capture.js"></script>
  <script src="libs/html2canvas.min.js"></script>
  <script src="libs/html-to-image.min.js"></script>
  <script src="sakura/share-export.js"></script>
  <script src="travel-v2.js"></script>
  <script src="main-v3.js"></script>
  <script type="module" src="bootstrap.js"></script>



</body></html>
