<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 行程规划</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;background:#F7F8FA;color:#1A1A2E;line-height:1.5;min-height:100vh}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ===== STATE MANAGEMENT ===== */
.state-page{display:none;width:100%}
.state-page.active{display:flex}

/* ===== STATE0: ENTRY PAGE ===== */
#state0{flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px 16px;background:linear-gradient(180deg,#F7F8FA 0%,#F0F2F5 100%)}
.entry-card{background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.06);max-width:560px;width:100%;padding:32px 28px;animation:slideUp .4s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.entry-title{font-size:24px;font-weight:700;text-align:center;margin-bottom:6px}
.entry-subtitle{font-size:14px;color:#9CA3AF;text-align:center;margin-bottom:28px}

/* Form Sections */
.form-section{margin-bottom:20px}
.form-label{font-size:14px;font-weight:600;margin-bottom:8px;display:block}
.form-label .required{color:#FF6B6B;margin-right:2px}

/* Destination Input */
.dest-input{width:100%;padding:12px 16px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:15px;outline:none;transition:border-color .15s,box-shadow .15s}
.dest-input:focus{border-color:#00C48C;box-shadow:0 0 0 3px rgba(0,196,140,.12)}
.dest-input::placeholder{color:#C4C4C4}
.dest-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.dest-pill{padding:6px 14px;border-radius:20px;font-size:12px;color:#6B7280;background:#F3F4F6;cursor:pointer;transition:all .15s;user-select:none}
.dest-pill:hover{background:#00C48C;color:#fff}
.dest-pill.selected{background:#00C48C;color:#fff}

/* Date Row */
.date-row{display:flex;gap:12px}
.date-input{flex:1;padding:10px 14px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:14px;outline:none;transition:border-color .15s;color:#1A1A2E;background:#fff}
.date-input:focus{border-color:#00C48C;box-shadow:0 0 0 3px rgba(0,196,140,.12)}
.day-pills{display:flex;gap:8px;margin-top:10px}
.day-pill{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;background:#F3F4F6;color:#6B7280;cursor:pointer;transition:all .15s;user-select:none;border:1.5px solid transparent}
.day-pill:hover{border-color:#00C48C;color:#00C48C}
.day-pill.selected{background:#00C48C;color:#fff;border-color:#00C48C}

/* People Stepper */
.stepper{display:flex;align-items:center;gap:0;background:#F3F4F6;border-radius:12px;overflow:hidden;width:fit-content}
.stepper-btn{width:44px;height:44px;font-size:20px;font-weight:600;color:#6B7280;display:flex;align-items:center;justify-content:center;transition:all .15s}
.stepper-btn:hover{background:#E5E7EB;color:#1A1A2E}
.stepper-btn:active{background:#D1D5DB}
.stepper-val{width:48px;text-align:center;font-size:18px;font-weight:700;color:#1A1A2E}

/* Preference Pills */
.pref-pills{display:flex;gap:8px;flex-wrap:wrap}
.pref-pill{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;background:#F3F4F6;color:#6B7280;cursor:pointer;transition:all .15s;user-select:none;border:1.5px solid transparent}
.pref-pill:hover{border-color:#00C48C}
.pref-pill.selected{background:#00C48C;color:#fff;border-color:#00C48C}

/* Plan Count */
.count-pills{display:flex;gap:8px}
.count-pill{flex:1;padding:10px;text-align:center;border-radius:10px;font-size:14px;font-weight:600;background:#F3F4F6;color:#6B7280;cursor:pointer;transition:all .15s;border:1.5px solid transparent}
.count-pill:hover{border-color:#00C48C;color:#00C48C}
.count-pill.selected{background:#00C48C;color:#fff;border-color:#00C48C}

/* Generate Button */
.generate-btn{width:100%;padding:14px;background:#00C48C;color:#fff;border-radius:12px;font-size:16px;font-weight:600;transition:all .15s;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px;letter-spacing:.5px}
.generate-btn:hover{background:#00b07e;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,196,140,.3)}
.generate-btn:active{transform:translateY(0)}
.generate-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

/* ===== STATE1: LOADING ===== */
#state1{flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(180deg,#F7F8FA 0%,#F0F2F5 100%)}
.loader-card{background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.06);max-width:400px;width:90%;padding:48px 32px;text-align:center;animation:slideUp .4s ease}
.spinner{width:56px;height:56px;margin:0 auto 24px;position:relative}
.spinner-ring{width:56px;height:56px;border-radius:50%;border:3.5px solid #E5E7EB;border-top-color:#00C48C;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-dot{position:absolute;width:8px;height:8px;background:#00C48C;border-radius:50%;top:-4px;left:50%;transform:translateX(-50%);animation:dotPulse .9s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:1;transform:translateX(-50%) scale(1)}50%{opacity:.4;transform:translateX(-50%) scale(.6)}}
.loader-title{font-size:16px;font-weight:600;margin-bottom:6px}
.loader-sub{font-size:13px;color:#9CA3AF}

/* ===== HEADER ===== */
.header{position:fixed;top:0;left:0;right:0;height:52px;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;padding:0 20px;z-index:100;gap:12px}
.header-back{font-size:14px;color:#6B7280;white-space:nowrap;display:flex;align-items:center;gap:4px}
.header-back:hover{color:#1A1A2E}
.header-title{flex:1;text-align:center;font-size:16px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px}
.header-title svg{width:16px;height:16px;fill:#6B7280;flex-shrink:0}
.header-actions{display:flex;gap:8px;align-items:center}
.btn-outline{padding:6px 14px;border:1.5px solid #00C48C;color:#00C48C;border-radius:8px;font-size:13px;font-weight:500;transition:all .15s}
.btn-outline:hover{background:#00C48C;color:#fff}
.btn-solid{padding:6px 14px;background:#00C48C;color:#fff;border-radius:8px;font-size:13px;font-weight:500;transition:all .15s}
.btn-solid:hover{background:#00b07e}

/* ===== MAIN LAYOUT ===== */
.main{display:flex;margin-top:52px;margin-bottom:64px;min-height:calc(100vh - 52px - 64px)}
.main-left{flex:1;padding:16px 20px;overflow-y:auto;min-width:0}
.main-right{width:320px;flex-shrink:0;padding:16px 16px 16px 0;overflow-y:auto}

/* ===== PLAN TABS ===== */
.plan-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.plan-tab{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;background:#fff;color:#6B7280;border:1.5px solid #E5E7EB;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.plan-tab.active{background:#00C48C;color:#fff;border-color:#00C48C}
.plan-tab:hover:not(.active){border-color:#00C48C;color:#00C48C}
.plan-tab.add-plan{border-style:dashed;color:#9CA3AF}
.plan-tab.add-plan:hover{border-color:#00C48C;color:#00C48C}
.plan-tab .check{display:inline-block;width:14px;height:14px;border-radius:50%;border:1.5px solid #ccc;margin-right:4px;vertical-align:middle;position:relative;top:-1px}
.plan-tab.active .check{border-color:#fff;background:rgba(255,255,255,.3)}
.plan-tab.active .check::after{content:'✓';font-size:10px;color:#fff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.plan-hint{font-size:11px;color:#9CA3AF;margin-left:auto;white-space:nowrap}

/* ===== PLAN GRID ===== */
.plan-grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.plan-grid.cols-1{grid-template-columns:1fr}
.plan-grid.cols-2{grid-template-columns:1fr 1fr}
.plan-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.plan-grid.cols-4{grid-template-columns:1fr 1fr 1fr 1fr}

/* ===== PLAN CARD ===== */
.plan-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;transition:transform .15s,box-shadow .15s}
.plan-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.plan-card.accent-green .plan-header-top{background:#00C48C}
.plan-card.accent-orange .plan-header-top{background:#FF9F43}
.plan-card.accent-blue .plan-header-top{background:#5B8DEF}
.plan-card.accent-red .plan-header-top{background:#FF6B6B}
.plan-header-top{height:4px}
.plan-body{padding:16px}
.plan-name{font-size:16px;font-weight:700;margin-bottom:2px}
.plan-desc{font-size:12px;color:#6B7280;margin-bottom:12px}
.plan-metrics{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.plan-metric{display:flex;align-items:center;gap:4px;font-size:12px;color:#6B7280}
.plan-metric .val{font-weight:600;color:#1A1A2E}
.plan-metric.price .val{color:#FF6B6B}

/* ===== DAY SECTION ===== */
.day-section{margin-bottom:14px}
.day-label{display:inline-flex;align-items:center;gap:4px;background:#00C48C;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;margin-bottom:8px}
.day-spot-list{position:relative;padding-left:16px}
.day-spot-list::before{content:'';position:absolute;left:5px;top:8px;bottom:8px;width:1px;background:#E5E7EB}
.spot-item{position:relative;display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:6px;transition:background .1s;cursor:default}
.spot-item:hover{background:#F9FAFB}
.spot-dot{width:8px;height:8px;border-radius:50%;background:#00C48C;flex-shrink:0;position:relative;z-index:1}
.spot-dot.accent-orange{background:#FF9F43}
.spot-dot.accent-blue{background:#5B8DEF}
.spot-dot.accent-red{background:#FF6B6B}
.spot-info{flex:1;min-width:0}
.spot-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spot-time{font-size:10px;color:#9CA3AF;margin-top:1px}
.spot-tag{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500;white-space:nowrap;flex-shrink:0}
.spot-tag.play{background:#E8F5E9;color:#2E7D32}
.spot-tag.food{background:#FFF3E0;color:#E65100}
.spot-tag.shop{background:#E3F2FD;color:#1565C0}
.spot-tag.culture{background:#F3E5F5;color:#7B1FA2}
.spot-tag.transport{background:#ECEFF1;color:#546E7A}
.spot-add{font-size:14px;color:#9CA3AF;padding:4px 6px;border-radius:4px;transition:all .1s;flex-shrink:0}
.spot-add:hover{color:#00C48C;background:#F0FFF9}

/* ===== RIGHT PANEL ===== */
.right-map{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;margin-bottom:14px}
.right-map-header{padding:12px 14px;font-size:14px;font-weight:600;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;gap:6px}
.right-map-header svg{width:16px;height:16px;fill:#6B7280}
.map-svg{width:100%;height:220px;background:#F0F2F5}
.map-legend{padding:8px 14px;display:flex;gap:12px;font-size:11px;color:#6B7280}
.map-legend span{display:flex;align-items:center;gap:4px}
.map-legend i{width:12px;height:3px;border-radius:2px}
.map-legend i.l-green{background:#00C48C}
.map-legend i.l-orange{background:#FF9F43}
.map-legend i.l-blue{background:#5B8DEF}

/* ===== RECOMMEND SECTION ===== */
.recommend{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden}
.recommend-tabs{display:flex;border-bottom:1px solid #E5E7EB}
.recommend-tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:500;color:#6B7280;border-bottom:2px solid transparent;transition:all .15s}
.recommend-tab.active{color:#00C48C;border-bottom-color:#00C48C}
.recommend-tab:hover:not(.active){color:#1A1A2E}
.recommend-scroll{display:flex;gap:10px;padding:12px 14px;overflow-x:auto;scrollbar-width:none}
.recommend-scroll::-webkit-scrollbar{display:none}
.rec-card{flex-shrink:0;width:130px;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:transform .1s}
.rec-card:hover{transform:translateY(-1px)}
.rec-img{height:72px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff}
.rec-info{padding:6px 8px}
.rec-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-type{font-size:10px;color:#9CA3AF;margin-top:2px}

/* ===== BOTTOM BAR ===== */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-top:1px solid #E5E7EB;z-index:100;padding:10px 20px}
.bottom-inner{display:flex;align-items:center;gap:12px;max-width:1200px;margin:0 auto;overflow-x:auto}
.bottom-label{font-size:12px;font-weight:600;color:#6B7280;white-space:nowrap;flex-shrink:0}
.bottom-divider{width:1px;height:28px;background:#E5E7EB;flex-shrink:0}
.bottom-plans{display:flex;gap:16px;flex:1;min-width:0}
.bottom-plan{flex:1;min-width:0}
.bottom-plan-name{font-size:11px;font-weight:600;color:#1A1A2E;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bottom-metrics{display:flex;gap:10px;flex-wrap:wrap}
.bottom-metric{font-size:11px;color:#6B7280;display:flex;align-items:center;gap:2px}
.bottom-metric .bm-val{font-weight:600}
.bottom-metric.best .bm-val{color:#00C48C}
.bottom-metric.best .bm-val::after{content:' ✓';font-weight:400}
.bottom-metric.worst .bm-val{color:#9CA3AF}

/* ===== RESPONSIVE ===== */
@media(max-width:1024px){
  .main-right{display:none}
  .plan-grid.cols-4{grid-template-columns:1fr 1fr}
}
@media(max-width:768px){
  .plan-grid.cols-2,.plan-grid.cols-3,.plan-grid.cols-4{grid-template-columns:1fr}
  .header-title{font-size:14px}
  .main-left{padding:12px}
  .plan-tabs{gap:6px}
  .plan-tab{padding:6px 12px;font-size:12px}
  .plan-hint{display:none}
  .bottom-bar{padding:8px 12px}
  .entry-card{padding:24px 18px}
  .date-row{flex-direction:column;gap:8px}
  .generate-btn{font-size:15px}
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.plan-card{animation:fadeIn .3s ease}
</style>
</head>
<body>

<!-- ===== STATE0: ENTRY PAGE ===== -->
<div id="state0" class="state-page active">
  <div class="entry-card">
    <h1 class="entry-title">✦ AI 行程规划</h1>
    <p class="entry-subtitle">输入偏好，一次生成多套方案，横向对比选最优</p>

    <!-- Destination -->
    <div class="form-section">
      <label class="form-label"><span class="required">*</span>目的地</label>
      <input class="dest-input" id="destInput" type="text" placeholder="去哪儿？如：马德里、东京、巴黎" autocomplete="off">
      <div class="dest-pills" id="destPills">
        <span class="dest-pill" data-val="马德里">马德里</span>
        <span class="dest-pill" data-val="东京">东京</span>
        <span class="dest-pill" data-val="巴黎">巴黎</span>
        <span class="dest-pill" data-val="京都">京都</span>
        <span class="dest-pill" data-val="首尔">首尔</span>
      </div>
    </div>

    <!-- Duration -->
    <div class="form-section">
      <label class="form-label">出行天数</label>
      <div class="day-pills" id="dayPills">
        <span class="day-pill" data-val="3">3天</span>
        <span class="day-pill" data-val="5">5天</span>
        <span class="day-pill selected" data-val="7">7天</span>
        <span class="day-pill" data-val="10">10天</span>
      </div>
    </div>

    <!-- People -->
    <div class="form-section">
      <label class="form-label">出行人数</label>
      <div class="stepper">
        <button class="stepper-btn" id="peopleMinus" type="button">−</button>
        <span class="stepper-val" id="peopleVal">2</span>
        <button class="stepper-btn" id="peoplePlus" type="button">+</button>
      </div>
    </div>

    <!-- Preferences -->
    <div class="form-section">
      <label class="form-label">旅行偏好（可多选）</label>
      <div class="pref-pills" id="prefPills">
        <span class="pref-pill" data-val="文化历史">文化历史</span>
        <span class="pref-pill" data-val="自然风光">自然风光</span>
        <span class="pref-pill selected" data-val="美食探索">美食探索</span>
        <span class="pref-pill" data-val="购物娱乐">购物娱乐</span>
        <span class="pref-pill" data-val="轻松休闲">轻松休闲</span>
      </div>
    </div>

    <!-- Plan Count -->
    <div class="form-section">
      <label class="form-label">生成几套方案？</label>
      <div class="count-pills" id="countPills">
        <span class="count-pill" data-val="2">2套</span>
        <span class="count-pill selected" data-val="3">3套</span>
        <span class="count-pill" data-val="4">4套</span>
      </div>
    </div>

    <!-- Generate Button -->
    <button class="generate-btn" id="generateBtn" type="button">
      <span>✦</span> AI 生成方案
    </button>
  </div>
</div>

<!-- ===== STATE1: LOADING ===== -->
<div id="state1" class="state-page">
  <div class="loader-card">
    <div class="spinner">
      <div class="spinner-ring"></div>
      <div class="spinner-dot"></div>
    </div>
    <div class="loader-title" id="loaderTitle">AI 正在为您生成3套马德里行程方案…</div>
    <div class="loader-sub">通常需要 3-5 秒</div>
  </div>
</div>

<!-- ===== STATE2: RESULT PAGE ===== -->
<div id="state2" class="state-page" style="flex-direction:column;">

<!-- ===== HEADER ===== -->
<header class="header">
  <a class="header-back" href="/08/portfolio/">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    返回
  </a>
  <div class="header-title">
    <svg viewBox="0 0 16 16"><path d="M3 2h10a1 1 0 011 1v10a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1zm0 2v2h10V4H3zm0 4v5h10V8H3z"/></svg>
    <span id="headerTitleText">马德里旅游 · 5天</span>
  </div>
  <div class="header-actions">
    <button class="btn-outline" onclick="addNewPlan()">+ 添加方案</button>
    <button class="btn-solid" onclick="exportPlans()">导出</button>
  </div>
</header>

<!-- ===== MAIN ===== -->
<div class="main">
  <!-- LEFT: Plan Comparison -->
  <div class="main-left">
    <!-- Plan Tabs -->
    <div class="plan-tabs" id="planTabs">
      <button class="plan-tab active" data-plan="A" onclick="togglePlan(this,'A')">
        <span class="check"></span>方案A 预算优先
      </button>
      <button class="plan-tab active" data-plan="B" onclick="togglePlan(this,'B')">
        <span class="check"></span>方案B 效率优先
      </button>
      <button class="plan-tab active" data-plan="C" onclick="togglePlan(this,'C')">
        <span class="check"></span>方案C 体验优先
      </button>
      <button class="plan-tab add-plan" data-plan="D" onclick="togglePlan(this,'D')">
        <span class="check"></span>+ 新方案
      </button>
      <span class="plan-hint">Ctrl + 点击可多选</span>
    </div>

    <!-- Plan Grid -->
    <div class="plan-grid cols-3" id="planGrid">
      <!-- Plans will be rendered by JS -->
    </div>
  </div>

  <!-- RIGHT: Map + Recommendations -->
  <div class="main-right">
    <!-- Map -->
    <div class="right-map">
      <div class="right-map-header">
        <svg viewBox="0 0 16 16"><path d="M14 2L8 4.5 2 2v11l6 2.5L14 13V2z"/></svg>
        地图
      </div>
      <svg class="map-svg" viewBox="0 0 320 220" id="mapSvg">
        <!-- Background city grid -->
        <rect x="0" y="0" width="320" height="220" fill="#F0F2F5"/>
        <!-- Roads -->

// ===== STATE0: FORM INTERACTIONS =====
// Destination pills
document.querySelectorAll('.dest-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.dest-pill').forEach(p => p.classList.remove('selected'));
    pill.classList.add('selected');
    document.getElementById('destInput').value = pill.getAttribute('data-val');
    formData.destination = pill.getAttribute('data-val');
  });
});

document.getElementById('destInput').addEventListener('input', (e) => {
  formData.destination = e.target.value.trim();
  document.querySelectorAll('.dest-pill').forEach(p => p.classList.remove('selected'));
});

// Day pills
document.querySelectorAll('.day-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.day-pill').forEach(p => p.classList.remove('selected'));
    pill.classList.add('selected');
    formData.days = parseInt(pill.getAttribute('data-val'));
  });
});

// People stepper
document.getElementById('peopleMinus').addEventListener('click', () => {
  if (formData.people > 1) {
    formData.people--;
    document.getElementById('peopleVal').textContent = formData.people;
  }
});
document.getElementById('peoplePlus').addEventListener('click', () => {
  if (formData.people < 8) {
    formData.people++;
    document.getElementById('peopleVal').textContent = formData.people;
  }
});

// Preference pills
document.querySelectorAll('.pref-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    pill.classList.toggle('selected');
    formData.preferences = [];
    document.querySelectorAll('.pref-pill.selected').forEach(p => {
      formData.preferences.push(p.getAttribute('data-val'));
    });
  });
});

// Plan count pills
document.querySelectorAll('.count-pill').forEach(pill => {

});

// ===== STATE TRANSITIONS =====
function goToState(state) {
  document.querySelectorAll('.state-page').forEach(el => el.classList.remove('active'));
  document.getElementById('state' + state).classList.add('active');
}

document.getElementById('generateBtn').addEventListener('click', () => {
  const dest = document.getElementById('destInput').value.trim();
  if (!dest) {
    document.getElementById('destInput').style.borderColor = '#FF6B6B';
    document.getElementById('destInput').focus();
    setTimeout(() => { document.getElementById('destInput').style.borderColor = ''; }, 2000);
    return;
  }

  formData.destination = dest;
  const count = formData.planCount;
  document.getElementById('loaderTitle').textContent = `AI 正在为您生成${count}套${dest}行程方案…`;

  // Go to loading state
  goToState(1);

  // Auto transition to result after 1.5s
  setTimeout(() => {
    updateResultPage();
    goToState(2);
  }, 1500);
});

function updateResultPage() {
  const dest = formData.destination || '马德里';
  const days = formData.days;
  document.getElementById('headerTitleText').textContent = `${dest}旅游 · ${days}天`;
  document.title = `AI 多方案对比 — ${dest}旅游`;

  // Update plan count visibility
  const tabs = document.querySelectorAll('.plan-tab[data-plan]');
  const count = formData.planCount;
  tabs.forEach(tab => {
    const plan = tab.getAttribute('data-plan');
    if (plan === 'D' && count >= 4) {
      tab.style.display = '';
    } else if (plan === 'D') {
      tab.style.display = 'none';
    }
  });

  render();
}

    const card = document.createElement('div');
    card.className = 'plan-card accent-' + p.accent;
    card.setAttribute('data-plan', key);

    let itineraryHtml = '';
    p.itinerary.forEach(d => {
      let spotsHtml = '';
      d.spots.forEach(s => {
        spotsHtml += `
          <div class="spot-item">
            <div class="spot-dot ${getDotClass(p.accent)}"></div>
            <div class="spot-info">
              <div class="spot-name">${s.name}</div>
              <div class="spot-time">${s.time}</div>
            </div>
            <span class="spot-tag ${getTagClass(s.type)}">${s.tag}</span>
            <button class="spot-add" title="添加到行程">+</button>
          </div>`;
      });
      itineraryHtml += `
        <div class="day-section">
          <div class="day-label">DAY ${d.day}</div>
          <div class="day-spot-list">${spotsHtml}</div>
        </div>`;
    });

    card.innerHTML = `
      <div class="plan-header-top"></div>
      <div class="plan-body">
        <div class="plan-name">${p.name} ${p.label}</div>
        <div class="plan-desc">${p.desc}</div>
        <div class="plan-metrics">
          <div class="plan-metric price">💰 <span class="val">¥${p.budget.toLocaleString()}</span></div>
          <div class="plan-metric">📍 <span class="val">${p.spots}个景点</span></div>
          <div class="plan-metric">⏱️ <span class="val">${p.days}天</span></div>
          <div class="plan-metric">🚶 <span class="val">${p.walking}km/天</span></div>
        </div>
        ${itineraryHtml}
      </div>`;
    grid.appendChild(card);
  });
}

function renderBottomBar() {
  const bar = document.getElementById('bottomBar');
  if (activePlans.length === 0) {
    bar.querySelector('.bottom-inner').innerHTML = '<span style="font-size:13px;color:#9CA3AF">请至少选择一个方案进行对比</span>';
    return;
  }

  // Find best (min budget) and worst (max budget)
  const budgets = activePlans.map(k => plans[k].budget);
  const minBudget = Math.min(...budgets);
  const maxBudget = Math.max(...budgets);

  let html = '<div class="bottom-label">方案对比</div><div class="bottom-divider"></div><div class="bottom-plans">';

  activePlans.forEach(key => {
    const p = plans[key];
    const isBest = p.budget === minBudget && activePlans.length > 1;
    const isWorst = p.budget === maxBudget && activePlans.length > 1 && minBudget !== maxBudget;
    let cls = '';
    if (isBest) cls = 'best';
    else if (isWorst) cls = 'worst';

    html += `
      <div class="bottom-plan">
        <div class="bottom-plan-name" style="color:${p.color}">${p.name} ${p.label}</div>
        <div class="bottom-metrics">
          <div class="bottom-metric ${cls}">💰 <span class="bm-val">¥${p.budget.toLocaleString()}</span></div>
          <div class="bottom-metric">📍 <span class="bm-val">${p.spots}</span></div>
          <div class="bottom-metric">🚶 <span class="bm-val">${p.walking}km</span></div>
        </div>
      </div>`;
  });

  html += '</div>';
  bar.querySelector('.bottom-inner').innerHTML = html;
}

function renderRecs() {
  const scroll = document.getElementById('recScroll');
  const activeTab = document.querySelector('.recommend-tab.active');
  const type = activeTab && activeTab.textContent === '推荐景点' ? 'rec' : 'pending';
  const spots = recSpots[type];
  scroll.innerHTML = spots.map(s => `
    <div class="rec-card">
      <div class="rec-img" style="background:${s.bg}">${s.emoji}</div>
      <div class="rec-info">
        <div class="rec-name">${s.name}</div>
        <div class="rec-type">${s.type}</div>
      </div>
    </div>`).join('');
}

function renderMap() {
  // Highlight routes based on active plans
  ['A','B','C'].forEach(key => {
    const el = document.getElementById('route' + key);
    if (el) {
      el.setAttribute('opacity', activePlans.includes(key) ? '0.8' : '0.15');
    }
  });
}

// ===== INTERACTION =====
function togglePlan(btn, key) {
  if (key === 'D' && !planDVisible) {
    planDVisible = true;
    btn.classList.add('active');
    if (!activePlans.includes('D')) activePlans.push('D');
    render();
    return;
  }

  if (key === 'D' && planDVisible) {
    // Toggle D off
    if (activePlans.includes('D')) {
      activePlans = activePlans.filter(k => k !== 'D');
      btn.classList.remove('active');
    } else {
      activePlans.push('D');
      btn.classList.add('active');
    }
    render();
    return;
  }

  if (event && (event.ctrlKey || event.metaKey)) {
    // Multi-select
    if (activePlans.includes(key)) {
      if (activePlans.length > 1) {
        activePlans = activePlans.filter(k => k !== key);
        btn.classList.remove('active');
      }
    } else {
      activePlans.push(key);
      btn.classList.add('active');
    }
  } else {
    // Single select: toggle if already the only one, otherwise select only this one
    if (activePlans.length === 1 && activePlans[0] === key) {
      // Already only this one selected, keep it
    } else if (activePlans.includes(key) && activePlans.length === 1) {
      return;
    } else {
      // Deactivate all tabs and set only this one
      document.querySelectorAll('.plan-tab[data-plan]').forEach(t => {
        t.classList.remove('active');
      });
      btn.classList.add('active');
      activePlans = [key];
    }
  }

  render();
}

function addNewPlan() {
  if (!planDVisible) {
    planDVisible = true;
    const tabD = document.querySelector('.plan-tab[data-plan="D"]');
    if (tabD) {
      tabD.classList.add('active');
      if (!activePlans.includes('D')) activePlans.push('D');
    }
    render();
  } else {
    alert('已存在方案D，当前最多支持4个方案对比');
  }
}

function exportPlans() {
  alert('导出功能开发中...\n当前选中方案: ' + activePlans.map(k => plans[k].name + ' ' + plans[k].label).join(', '));
}

function switchRecTab(btn, type) {
  document.querySelectorAll('.recommend-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderRecs();
}

function render() {
  renderPlanCards();
  renderBottomBar();
  renderMap();
  renderRecs();
}

// ===== INIT =====
render();
</script>
</body>
</html>
