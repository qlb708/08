<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品命理局 — AI产品诊断 × 东方命理</title>
<style>
:root{
--bg-primary:#F6F0E7;--bg-secondary:#EFE5D8;
--surface-primary:#FFFCF7;--surface-secondary:#F7EEE3;
--text-primary:#3F372F;--text-secondary:#74695E;--text-muted:#A09387;
--accent-primary:#C86458;--accent-gold:#B79038;--accent-green:#6F9C8B;
--accent-blue:#7895AD;--accent-purple:#8E82AD;--accent-yellow:#D3AA4A;
--border-soft:rgba(75,61,48,0.12);--border-medium:rgba(75,61,48,0.22);
--shadow-soft:0 18px 50px rgba(78,61,45,0.08);--shadow-medium:0 12px 36px rgba(78,61,45,0.12);
--shadow-lifted:0 24px 60px rgba(78,61,45,0.16);
--ease-micro:cubic-bezier(0.4,0,0.2,1);--ease-card:cubic-bezier(0.25,0.46,0.45,0.94);
--ease-enter:cubic-bezier(0.16,1,0.3,1);
--dur-micro:150ms;--dur-card:280ms;--dur-content:420ms;
--font-title:Georgia,'Noto Serif SC',serif;
--font-body:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;
--font-data:'SF Mono','Cascadia Code','Consolas',monospace;
--font-seal:'KaiTi','STKaiti',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{margin:0}
body{font-family:var(--font-body);color:var(--text-primary);background:var(--bg-primary);-webkit-font-smoothing:antialiased;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(circle at 12% 18%,rgba(200,100,88,0.04),transparent 40%),radial-gradient(circle at 88% 72%,rgba(111,156,139,0.05),transparent 35%)}
.serif{font-family:var(--font-title)}.seal-font{font-family:var(--font-seal)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:clamp(40px,5vh,48px);padding:clamp(10px,1.5vh,12px) clamp(24px,3vw,32px);border-radius:12px;border:none;font-size:clamp(14px,1.6vw,15px);font-weight:600;cursor:pointer;transition:all var(--dur-micro) var(--ease-micro)}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent-primary);color:#FFF;box-shadow:0 4px 12px rgba(200,100,88,0.25)}
.btn-primary:hover{background:#B85A4F;transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,var(--accent-gold),#9A7A30);color:#FFF}
.btn-secondary{background:transparent;border:1px solid var(--border-medium);color:var(--text-secondary)}
.btn-secondary:hover{border-color:var(--accent-gold);color:var(--accent-gold)}
.btn-small{min-height:clamp(32px,4vh,38px);padding:6px 16px;font-size:clamp(12px,1.4vw,13px);border-radius:8px}
.card{background:var(--surface-primary);border:1px solid var(--border-soft);border-radius:16px;padding:clamp(16px,2vw,24px);box-shadow:var(--shadow-soft)}
.back-btn{position:fixed;top:16px;left:16px;z-index:999;display:flex;align-items:center;gap:6px;padding:7px 14px 7px 10px;background:rgba(255,252,247,0.85);backdrop-filter:blur(8px);border:1px solid var(--border-soft);border-radius:20px;color:var(--text-secondary);font-size:13px;text-decoration:none;transition:all .2s}
.back-btn:hover{background:rgba(183,144,56,0.08);color:var(--accent-gold);transform:translateX(-2px)}
.back-btn svg{width:14px;height:14px}
.tag{display:inline-flex;font-size:11px;padding:3px 10px;border-radius:12px;white-space:nowrap}
.tag-gold{background:rgba(183,144,56,0.1);border:1px solid rgba(183,144,56,0.25);color:var(--accent-gold)}
.tag-green{background:rgba(111,156,139,0.1);border:1px solid rgba(111,156,139,0.25);color:var(--accent-green)}
.tag-red{background:rgba(200,100,88,0.08);border:1px solid rgba(200,100,88,0.2);color:var(--accent-primary)}
.tag-purple{background:rgba(142,130,173,0.1);border:1px solid rgba(142,130,173,0.2);color:var(--accent-purple)}

/* ═══ PHASE MANAGER ═══ */
.phase{display:none}
.phase.active{display:block}
#phaseHero:not(.active),#phaseInfer:not(.active),#phaseResult:not(.active){display:none!important}

/* ═══ PHASE 0: HERO / INPUT ═══ */
#phaseHero.active{min-height:100vh;display:flex;flex-direction:row;align-items:center}
.hero-bagua-wrap{width:44%;min-width:280px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:20px}
.hero-bagua-wrap svg{width:min(360px,90%);height:auto;transition:all .6s var(--ease-enter)}
.hero-bagua-wrap svg.has-product{filter:drop-shadow(0 0 20px rgba(183,144,56,0.15))}
.bagua-sector{transition:all .4s var(--ease-card);opacity:.5}.bagua-sector.lit{opacity:1}
.bagua-center-text{font-family:var(--font-title);font-size:12px;fill:var(--text-muted);text-anchor:middle;dominant-baseline:middle}
.bagua-center-text.active{fill:var(--accent-gold);font-size:14px;font-weight:700}
.hero-content{position:relative;z-index:3;flex:1;padding:0 clamp(24px,5vw,60px);display:flex;flex-direction:column;justify-content:center}
.hero-content h1{font-family:var(--font-title);font-size:clamp(26px,3.2vw,44px);line-height:1.3;margin-bottom:12px;color:var(--text-primary)}
.hero-content h1 span{background:linear-gradient(135deg,var(--accent-gold),var(--accent-primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-subtitle{color:var(--text-secondary);font-size:clamp(13px,1.5vw,16px);margin-bottom:clamp(20px,3vh,32px);line-height:1.6}
.hero-subtitle b{color:var(--accent-gold);font-weight:700}
.hero-input-group{display:flex;flex-direction:column;gap:12px;max-width:440px}
.hero-input{width:100%;height:clamp(46px,5.5vh,54px);border-radius:12px;border:1.5px solid var(--border-medium);background:var(--surface-primary);color:var(--text-primary);padding:0 16px;font-size:clamp(14px,1.6vw,16px);outline:none;transition:all var(--dur-micro)}
.hero-input:focus{border-color:var(--accent-gold);box-shadow:0 0 0 3px rgba(183,144,56,0.1)}
.hero-input::placeholder{color:var(--text-muted)}
.product-recognition{display:none;padding:9px 14px;background:rgba(111,156,139,0.08);border:1px solid rgba(111,156,139,0.25);border-radius:10px;font-size:13px;color:var(--accent-green)}
.product-recognition.show{display:flex;align-items:center;gap:8px}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.example-products{margin-top:clamp(14px,2vh,20px);display:flex;flex-wrap:wrap;gap:8px;max-width:440px}
.example-products .example-label{font-size:11px;color:var(--text-muted);width:100%;margin-bottom:2px}
.example-product-tag{font-size:12px;padding:4px 12px;border-radius:16px;background:var(--surface-secondary);border:1px solid var(--border-soft);color:var(--text-secondary);cursor:pointer;transition:all var(--dur-micro)}
.example-product-tag:hover{border-color:var(--accent-gold);color:var(--accent-gold)}
.today-qian{margin-top:clamp(12px,2vh,18px);padding:9px 16px;background:var(--surface-secondary);border:1px solid var(--border-soft);border-radius:10px;font-size:13px;display:flex;align-items:center;gap:8px;max-width:440px;cursor:pointer}
.today-qian .qian-text{flex:1;font-style:italic;color:var(--accent-gold)}
.today-qian .qian-refresh{font-size:11px;color:var(--text-muted)}

/* ═══ PHASE 1: AUTO-INFERENCE ANIMATION ═══ */
#phaseInfer.active{position:fixed;inset:0;z-index:200;background:var(--bg-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow:hidden}
.infer-stage{position:relative;width:min(560px,94vw);display:flex;flex-direction:column;align-items:center;text-align:center}
.infer-bagua{width:min(300px,72vw);height:min(300px,72vw);margin-bottom:16px}
.infer-bagua .infer-sector{opacity:.25;transition:opacity .5s var(--ease-enter),fill .5s var(--ease-enter)}
.infer-bagua .infer-sector.on{opacity:1}
.infer-status{min-height:26px;font-size:13px;color:var(--text-muted);letter-spacing:1px;display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:8px}
.infer-status .pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-green);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.infer-productcard{opacity:0;transform:translateY(12px);transition:all .5s var(--ease-enter);width:100%;max-width:420px;background:var(--surface-primary);border:1px solid var(--border-soft);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow-soft);margin-bottom:12px}
.infer-productcard.show{opacity:1;transform:translateY(0)}
.ipc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ipc-logo{width:38px;height:38px;border-radius:10px;background:var(--surface-secondary);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.ipc-name{font-family:var(--font-title);font-size:17px;font-weight:700;color:var(--accent-gold)}
.ipc-type{font-size:11px;color:var(--text-muted)}
.ipc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ipc-cell{background:var(--surface-secondary);border-radius:8px;padding:7px 10px}
.ipc-cell .k{font-size:10px;color:var(--text-muted);letter-spacing:.5px}
.ipc-cell .v{font-size:12px;color:var(--text-primary);font-weight:600;margin-top:2px}
.infer-wuxing-line{display:flex;gap:14px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.iw-item{display:flex;flex-direction:column;align-items:center;gap:3px;opacity:.25;transform:scale(.85);transition:all .45s var(--ease-enter)}
.iw-item.on{opacity:1;transform:scale(1)}
.iw-item .iw-sym{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#FFF}
.iw-item .iw-label{font-size:10px;color:var(--text-secondary)}
.infer-dayzhu{opacity:0;transform:scale(.6);transition:all .5s cubic-bezier(0.34,1.56,0.64,1);font-family:var(--font-seal);font-size:clamp(24px,5vw,34px);color:var(--accent-primary);border:3px solid var(--accent-primary);border-radius:8px;padding:8px 24px;letter-spacing:4px;margin-bottom:14px}
.infer-dayzhu.show{opacity:1;transform:scale(1)}
.infer-verdict{opacity:0;transform:translateY(10px);transition:all .5s var(--ease-enter);max-width:460px;font-size:clamp(15px,2vw,19px);font-family:var(--font-title);line-height:1.6;color:var(--text-primary);padding:14px 18px;background:var(--surface-secondary);border-left:3px solid var(--accent-gold);border-radius:0 10px 10px 0}
.infer-verdict.show{opacity:1;transform:translateY(0)}
.infer-skip{position:fixed;bottom:24px;right:24px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:8px 16px;border:1px solid var(--border-soft);border-radius:20px;background:rgba(255,252,247,0.7);transition:all .2s}
.infer-skip:hover{border-color:var(--accent-gold);color:var(--accent-gold)}

/* ═══ PHASE 2: RESULT (scroll long-scroll) ═══ */
#phaseResult.active{display:block;position:relative;z-index:1;animation:fadeIn .6s var(--ease-enter)}
.result-layout{max-width:1180px;margin:0 auto;padding:clamp(56px,8vh,72px) clamp(14px,3vw,28px) 80px;display:flex;gap:clamp(16px,2.4vw,32px);align-items:flex-start}
.result-rail{position:sticky;top:20px;width:clamp(220px,26%,300px);flex-shrink:0;display:flex;flex-direction:column;gap:12px;align-self:flex-start}
.rail-bagua{background:var(--surface-primary);border:1px solid var(--border-soft);border-radius:16px;padding:14px;box-shadow:var(--shadow-soft);display:flex;flex-direction:column;align-items:center}
.rail-bagua svg{width:100%;max-width:240px;height:auto}
.rail-bagua .rb-name{margin-top:6px;font-family:var(--font-title);font-size:15px;color:var(--accent-gold);text-align:center}
.rail-bagua .rb-dz{font-size:11px;color:var(--text-muted);text-align:center;margin-top:2px}
.rail-nav{background:var(--surface-primary);border:1px solid var(--border-soft);border-radius:14px;padding:8px;display:flex;flex-direction:column;gap:2px}
.rail-nav a{font-size:12px;color:var(--text-secondary);padding:7px 12px;border-radius:8px;text-decoration:none;transition:all .2s;display:flex;align-items:center;gap:8px;cursor:pointer}
.rail-nav a:hover{background:var(--surface-secondary);color:var(--accent-gold)}
.rail-nav a.on{background:rgba(183,144,56,0.08);color:var(--accent-gold);font-weight:600}
.rail-nav a .rn-num{font-size:10px;width:18px;height:18px;border-radius:6px;background:var(--surface-secondary);display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.rail-nav a.on .rn-num{background:var(--accent-gold);color:#FFF}
.result-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:clamp(16px,2.4vh,26px)}
.result-mobile-bagua{display:none}

.chapter{background:var(--surface-primary);border:1px solid var(--border-soft);border-radius:16px;padding:clamp(16px,2.2vw,26px);box-shadow:var(--shadow-soft);opacity:0;transform:translateY(26px);transition:opacity .6s var(--ease-enter),transform .6s var(--ease-enter)}
.chapter.reveal{opacity:1;transform:translateY(0)}
.chapter-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border-soft)}
.chapter-header .ch-num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#FFF;background:var(--accent-gold);flex-shrink:0}
.chapter-header h3{font-family:var(--font-title);font-size:clamp(15px,1.9vw,19px)}
.chapter-header .ch-subtitle{font-size:12px;color:var(--text-muted);margin-left:auto}

/* Ch: verdict/hero-result */
.rv-top{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.rv-product{font-family:var(--font-title);font-size:clamp(24px,3.4vw,38px);color:var(--accent-gold)}
.rv-mingge{font-size:clamp(14px,1.8vw,17px);color:var(--accent-green)}
.rv-verdict-line{font-family:var(--font-title);font-size:clamp(16px,2.2vw,22px);line-height:1.5;color:var(--text-primary);margin-bottom:10px}
.rv-verdict-explain{font-size:clamp(13px,1.5vw,15px);color:var(--text-secondary);line-height:1.7;margin-bottom:18px;padding:12px 16px;background:var(--surface-secondary);border-radius:10px;border-left:3px solid var(--accent-gold)}
.insight-card{position:relative;margin:0 0 16px;padding:14px 16px 13px;background:linear-gradient(135deg,rgba(200,100,88,0.07),rgba(183,144,56,0.05));border:1px solid rgba(200,100,88,0.22);border-radius:12px}
.insight-card .ic-badge{display:inline-block;font-size:11px;letter-spacing:.5px;color:#fff;background:var(--accent-primary);padding:2px 9px;border-radius:20px;margin-bottom:8px;font-weight:600}
.insight-card .ic-text{font-size:clamp(13px,1.5vw,14.5px);color:var(--text-primary);line-height:1.7;font-weight:500}
.method-details{background:var(--surface-primary);border:1px solid rgba(183,144,56,0.28);border-radius:12px;padding:4px 16px 14px;margin-top:4px}
.method-details>summary{cursor:pointer;font-size:14px;font-weight:600;color:var(--accent-primary);padding:12px 0;list-style:none;outline:none}
.method-details>summary::-webkit-details-marker{display:none}
.method-details>summary::before{content:'▸ ';color:var(--accent-gold)}
.method-details[open]>summary::before{content:'▾ '}
.method-intro{font-size:13.5px;color:var(--text-secondary);line-height:1.75;margin-bottom:12px}
.method-intro b{color:var(--text-primary)}
.method-note{font-size:12px;color:var(--text-muted);margin-bottom:8px}
.method-table{border:1px solid rgba(183,144,56,0.22);border-radius:10px;overflow:hidden}
.mt-head,.mt-row{display:grid;grid-template-columns:1.1fr 1.5fr 1.1fr 2fr;gap:8px;padding:9px 12px;font-size:12.5px;align-items:center}
.mt-head{background:var(--surface-secondary);font-weight:600;color:var(--text-secondary);font-size:11.5px}
.mt-row{border-top:1px solid rgba(183,144,56,0.14)}
.mt-row:nth-child(even){background:rgba(247,238,227,0.4)}
.mt-el{font-weight:700;display:flex;align-items:center;gap:6px}
.mt-dot{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.mt-dims{color:var(--text-primary)}
.mt-formula{color:var(--text-muted);font-family:Georgia,serif;font-size:11.5px}
.mt-why{color:var(--text-secondary)}
.method-foot{font-size:12px;color:var(--text-muted);line-height:1.7;margin-top:12px;padding-top:10px;border-top:1px dashed rgba(183,144,56,0.3)}
@media(max-width:680px){.mt-head{display:none}.mt-row{grid-template-columns:1fr;gap:3px;padding:11px 12px}.mt-formula{font-size:11px}}
.rv-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.rv-card{padding:14px;background:var(--surface-secondary);border-radius:12px;text-align:center}
.rv-card .rc-label{font-size:10px;color:var(--text-muted);letter-spacing:1px;margin-bottom:6px}
.rv-card .rc-value{font-size:clamp(14px,1.7vw,16px);font-weight:700}
.rv-card.strength .rc-value{color:var(--accent-green)}
.rv-card.weakness .rc-value{color:var(--accent-primary)}
.rv-card.mission .rc-value{color:var(--accent-gold)}
.rv-card.status .rc-value{color:var(--accent-purple)}

/* dual-layer 命理 + 人话 */
.dual-toggle{display:inline-flex;gap:0;border:1px solid var(--border-soft);border-radius:10px;overflow:hidden;margin-bottom:14px}
.dual-toggle button{font-size:12px;padding:6px 14px;background:var(--surface-secondary);border:none;color:var(--text-muted);cursor:pointer;transition:all .2s}
.dual-toggle button.active{background:var(--accent-gold);color:#FFF}
.dual-layer{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dual-layer.stack{grid-template-columns:1fr}
.dual-box{padding:14px 16px;border-radius:12px;line-height:1.8;font-size:13px}
.dual-box.mystic{background:var(--surface-secondary);border:1px solid var(--border-soft);color:var(--text-primary)}
.dual-box.mystic .db-tag{color:var(--accent-purple)}
.dual-box.plain{background:rgba(183,144,56,0.05);border:1px solid rgba(183,144,56,0.18);color:var(--text-primary)}
.dual-box.plain .db-tag{color:var(--accent-gold)}
.dual-box .db-tag{font-size:10px;letter-spacing:1px;display:block;margin-bottom:6px;font-weight:600}
.dual-box.hide{display:none}
.ming-risk{font-size:12px;color:var(--accent-primary);margin-top:12px;padding:8px 12px;background:rgba(200,100,88,0.05);border-radius:8px}
.ming-advice{font-size:12px;color:var(--accent-green);margin-top:8px;padding:8px 12px;background:rgba(111,156,139,0.05);border-radius:8px}

/* wuxing bars */
.wuxing-bars{display:flex;flex-direction:column;gap:8px;margin:8px 0}
.wuxing-bar{display:flex;align-items:center;gap:10px}
.wuxing-bar .label{width:64px;font-size:12px;color:var(--text-secondary)}
.wuxing-bar .bar{flex:1;height:8px;background:var(--surface-secondary);border-radius:4px;overflow:hidden}
.wuxing-bar .bar-fill{height:100%;border-radius:4px;transition:width .8s var(--ease-enter)}
.wuxing-bar .val{width:36px;text-align:right;font-size:11px;color:var(--text-muted);font-family:var(--font-data)}
.bar-wood{background:var(--accent-green)}.bar-fire{background:var(--accent-primary)}.bar-earth{background:var(--accent-gold)}.bar-metal{background:var(--accent-blue)}.bar-water{background:var(--accent-purple)}
.meter-row{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:12px}
.meter-label{width:52px;color:var(--text-secondary)}
.meter-bar{flex:1;height:6px;background:var(--surface-secondary);border-radius:3px;overflow:hidden}
.meter-fill{height:100%;border-radius:3px;transition:width .8s var(--ease-enter)}
.meter-pct{width:34px;text-align:right;color:var(--accent-gold);font-size:11px;font-family:var(--font-data)}
.yi-ji{margin-top:14px;display:flex;flex-direction:column;gap:4px}.yi{color:var(--accent-green);font-size:12px}.ji{color:var(--accent-primary);font-size:12px}

/* eight-dim list */
.dim-list{display:flex;flex-direction:column;gap:8px}
.dim-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-secondary);border-radius:10px;transition:all .3s var(--ease-card);border:1px solid transparent}
.dim-item.hl{border-color:rgba(183,144,56,0.4);background:rgba(183,144,56,0.06)}
.dim-item .di-name{width:76px;font-size:12px;color:var(--text-primary);flex-shrink:0}
.dim-item .di-bar{flex:1;height:6px;background:rgba(75,61,48,0.08);border-radius:3px;overflow:hidden}
.dim-item .di-fill{height:100%;border-radius:3px}

.gm-dir.selected{border-color:var(--accent-primary);background:rgba(200,100,88,0.04)}

.gm-dir .gd-name{font-size:13px;font-weight:600;color:var(--text-primary)}

.gm-sim-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.gm-sim-metric{flex:1;min-width:120px;background:var(--surface-secondary);border-radius:10px;padding:12px;text-align:center}

.gm-sim-metric .gsm-val.down{color:var(--accent-primary)}

.gaiming-task .gt-time{font-size:11px;color:var(--accent-gold);font-weight:600;margin-bottom:2px}

/* poster */

.poster{width:min(360px,90%);background:linear-gradient(170deg,#FFFCF7,#F4E9D9);border:1px solid rgba(183,144,56,0.3);border-radius:16px;padding:24px 22px;box-shadow:var(--shadow-medium);position:relative;overflow:hidden}

.poster .po-brand{font-size:11px;color:var(--text-muted);letter-spacing:2px;margin-bottom:16px}
.poster .po-product{font-family:var(--font-title);font-size:26px;color:var(--accent-gold);margin-bottom:4px}
.poster .po-mingge{font-size:14px;color:var(--accent-green);margin-bottom:18px}
.poster .po-line{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--border-soft);font-size:12px}

.poster .po-footer{margin-top:18px;text-align:center;font-family:var(--font-seal);font-size:14px;color:var(--accent-primary)}
.poster .po-seal{position:absolute;bottom:16px;right:16px;font-family:var(--font-seal);font-size:14px;color:var(--accent-primary);border:2px solid var(--accent-primary);border-radius:4px;padding:3px 8px;transform:rotate(-6deg)}

.result-footer-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

'Gemini':{trend:'厚积待发',years:[{y:'2026',k:'全家桶灌溉',t:'分发无敌，就把AI塞进每一个安卓与搜索框'},{y:'2027',k:'心智反攻',t:'能力追平后，比的是谁先让用户改口叫“Gemini”'},{y:'2028',k:'入口收割',t:'把搜索广告的现金牛平滑过渡到AI答案'}],nextCurve:'Gemini的命脉是“把AI原生进搜索与安卓”——它不需要用户主动打开App，而是让几十亿设备默认内置，用分发换心智。',doom:'大凶在“创新者窘境”：搜索广告是印钞机，也是枷锁，AI答案越好用、传统搜索广告越受冲击，Google很可能自己舍不得革自己的命。',window:'2026必须完成心智反攻——分发能带来使用，但带不来“想到AI就想到Gemini”的心智，晚一年，ChatGPT的品牌护城河就更难撬。'},
'DeepSeek':{trend:'二次腾飞',years:[{y:'2026',k:'开源封神',t:'用工程效率把成本打到地板，全球开发者用脚投票'},{y:'2027',k:'商业化破题',t:'免费打出来的名声，终要回答“钱从哪来”'},{y:'2028',k:'生态或被吃',t:'开源是最大的势，也是最大的坑'}],nextCurve:'DeepSeek的下一战场是“开源生态+API规模变现”——把极致性价比做成开发者默认调用的底层模型，靠调用量而非订阅赚钱，走AWS式的基础设施路线。',doom:'命劫最凶：开源意味着你的领先随时被大厂白嫖反超，商业化路径至今未明——技术满分、时机满分，唯独“怎么持续赚钱”是没答案的大凶之兆。',window:'转运之机就在2026-2027——趁热度与人才红利，要么建起商业闭环，要么绑定一个有分发有算力的大靠山，否则会成为“为行业做嫁衣”的悲情英雄。'},
'豆包':{trend:'流量狂飙',years:[{y:'2026',k:'国民级渗透',t:'字节流量灌进去，DAU好看到不像AI产品'},{y:'2027',k:'场景变现',t:'用户是抖音带来的，留存要靠自己挣'},{y:'2028',k:'模型补课',t:'流量红利吃完，终究要回答“模型强不强”'}],nextCurve:'豆包的第二曲线是“AI+硬件+场景闭环”——靠字节的流量与场景（教育、办公、智能设备）把AI包进具体任务，而不是拼裸模型能力。',doom:'大凶之兆是“流量幻觉”：DAU是抖音输血来的，一旦停止投放，真实留存会现原形——用户是冲着免费和便利来的，不是冲着豆包本身。',window:'2026-2027是转运窗口——必须在流量红利期把模型能力和用户心智补上，否则会像很多字节产品一样“来得快、去得也快”。'},
'Kimi':{trend:'高开待稳',years:[{y:'2026',k:'长文本守擂',t:'单点建立的心智，正被全行业追平'},{y:'2027',k:'找第二锚点',t:'营销拉来的用户，得有新理由留下'},{y:'2028',k:'定位再造',t:'不再是“长文本”，要成为某类人的必需品'}],nextCurve:'Kimi的命脉在“垂直深耕”——长文本已成红海，下一步要押注某个高价值场景（如专业研究、法律金融文档），把通用助手做成某类人群的专用大脑。',doom:'命劫是“单点失守+烧钱拉新”：长文本护城河正被填平，靠投放买来的增长留存偏弱，一旦停止烧钱，用户流失会很快。',window:'窗口在2026——必须趁品牌声量还在，找到第二个不可替代的锚点，晚了就会陷入“样样通、样样松”的中间地带。'},
'Perplexity':{trend:'上升承压',years:[{y:'2026',k:'AI搜索定义者',t:'带引用的答案体验超前，用户口碑好'},{y:'2027',k:'分发生死战',t:'体验再好，绕不开Google的默认入口'},{y:'2028',k:'差异化或被抄',t:'ChatGPT也能搜、Google也上AI，独特性收窄'}],nextCurve:'Perplexity的第二曲线是“垂直/企业级AI搜索”——放弃和Google正面硬刚通用搜索，转攻科研、金融、企业知识库这类高价值、重准确性的场景。',doom:'大凶在“三明治困境”：上有ChatGPT加搜索、下有Google上AI答案，Perplexity夹在中间，最大的问题是没有自己的分发入口，体验优势撑不过巨头的默认设置。',window:'2026-2027必须完成入口卡位或垂直突围——通用AI搜索的窗口正在关闭，再不建立不可替代的场景壁垒，就会被两头巨头的免费方案吞掉。'},
'Cursor':{trend:'高速上升',years:[{y:'2026',k:'开发者默认',t:'AI编程PMF极强，程序员已经离不开'},{y:'2027',k:'巨头贴身战',t:'微软VS Code+Copilot随时能抄近路'},{y:'2028',k:'Agent化编程',t:'从补全代码到自主写完整个功能'}],nextCurve:'Cursor的下一战场是“Agent式自主编程”——从“帮你写下一行”进化到“给需求、它写完整个模块”，把IDE变成能独立干活的AI工程师。',doom:'命劫最真实：微软坐拥VS Code+GitHub+Copilot全家桶，随时能把Cursor的创新平价复刻——一个套壳在巨头亲儿子面前，分发与成本都是硬伤。',window:'转运之机在2026——必须趁领先窗口把“Agent编程”做深、把团队/企业版护城河扎牢，否则等大厂反应过来，先发优势会被生态优势碾碎。'},
'Copilot':{trend:'稳健上升',years:[{y:'2026',k:'规模化收割',t:'背靠GitHub与微软分发，AI编程的量最大'},{y:'2027',k:'创新被追赶',t:'份额最大，锐度不如新锐产品'},{y:'2028',k:'全家桶捆绑',t:'和VS Code、Azure越绑越深'}],nextCurve:'Copilot的第二曲线是“企业级研发全流程Agent”——从代码补全延伸到测试、部署、代码审查，把微软的开发者全家桶变成企业研发的默认操作系统。',doom:'大凶在“大公司病”：份额最大但创新最钝，被Cursor这类灵活对手在体验上反复教育——规模是护城河，也是让它跑不快的包袱。',window:'2026要靠捆绑与生态守住基本盘——单点体验拼不过新锐，必须把优势坐实在“企业采购与合规”这类新锐够不着的地方。'},
'小红书':{trend:'上升转平台期',years:[{y:'2026',k:'商业化攻坚',t:'流量到顶，买手电商与本地生活是变现主战场'},{y:'2027',k:'生态闭环',t:'把种草到拔草的链路自己吃下，别再为别人做嫁衣'},{y:'2028',k:'超级社区',t:'从内容社区走向生活方式操作系统'}],nextCurve:'小红书的下一战场是“闭环电商+本地生活”——它握着全网最强的“种草”心智，却长期把成交拱手让给淘宝抖音，未来最大增量是把买手电商和到店消费做成自己的闭环。',doom:'大凶之兆是“种草在我、拔草在别人”：社区调性与商业化的永恒矛盾——广告塞太多伤社区、塞太少不赚钱，且用户习惯了在小红书看、去别处买，闭环迟迟建不牢。',window:'转运之机就在2026-2027——趁内容心智仍是稀缺资产，必须把电商闭环与商业化跑通，错过这波流量红利尾巴，就会永远停在“最好的导购、最差的生意”。'},
'抖音':{trend:'见顶维稳',years:[{y:'2026',k:'时长守擂',t:'完播率飞轮见顶，用户时长争夺进入零和'},{y:'2027',k:'电商深化',t:'货架+直播两条腿，抢淘宝的基本盘'},{y:'2028',k:'本地生活',t:'把线上流量灌进线下门店的生意'}],nextCurve:'抖音的第二曲线是“抖音电商+本地生活”——短视频时长已见顶，未来增长要靠把注意力变成交易，货架电商和到店团购是它虎口夺食美团淘宝的主战场。',doom:'命劫是“内容通胀与用户疲劳”：算法把人喂得越来越麻木，短视频审美疲劳+监管收紧时长，一旦用户开始“逃离信息茧房”，飞轮就会反转。',window:'2026-2027是转运窗口——必须在用户注意力还高时把电商与本地生活的商业闭环坐实，否则时长见顶后，广告天花板会很快压到头。'},
'B站':{trend:'转折挣扎',years:[{y:'2026',k:'盈利生死线',t:'社区调性与赚钱的十年矛盾，到了必须解的时候'},{y:'2027',k:'商业化破冰',t:'游戏之外，广告与带货能不能撑起利润'},{y:'2028',k:'中视频护城河',t:'守住PUGV生态，就守住了不可替代'}],nextCurve:'B站的下一战场是“基于社区信任的品牌广告与UP主带货”——它有全网最深的社区粘性和最长的用户时长，第二曲线不是抢短视频，而是把“信任”变成品效合一的商业价值。',doom:'大凶之兆是“商业化与社区调性的永恒矛盾”：用户反感恰饭、资本要求盈利，B站被夹在中间十年——一步走急伤社区、走慢伤财报，这是刻在命里的两难。',window:'转运之机在2026——必须找到既不激怒老用户、又能规模化赚钱的商业模式，错过这个耐心窗口，资本市场不会再等一个“永远长不大”的社区。'},
'快手':{trend:'稳守下沉',years:[{y:'2026',k:'老铁经济',t:'私域信任撑起下沉电商，差异化于抖音'},{y:'2027',k:'本地生活',t:'把老铁关系延伸到县域线下消费'},{y:'2028',k:'商业化提效',t:'流量不如抖音，就把每个流量的价值榨得更透'}],nextCurve:'快手的第二曲线是“下沉市场本地生活+私域电商”——它的护城河是“老铁信任关系”而非流量规模，未来最大增量在把这份信任变现到县域的团购、到店与复购。',doom:'命劫是“老二困境”：内容、流量、品牌全面被抖音压制，最怕的是下沉红利见顶后，既上不去一二线、又守不住基本盘，被抖音用降维打击蚕食。',window:'2026要把“信任电商”做成抖音抄不走的差异化——流量战打不赢，就必须在关系与私域这条抖音的短板上建深护城河。'},
'微博':{trend:'缓慢衰退',years:[{y:'2026',k:'热点续命',t:'公共舆论广场稀缺，但活跃全靠明星与热搜'},{y:'2027',k:'创新停滞',t:'产品十年没变，年轻人正在离开'},{y:'2028',k:'工具化生存',t:'从社交产品退化为“看热搜的工具”'}],nextCurve:'微博的第二曲线其实很窄——最现实的是“把公共事件与明星生态的稀缺性做成媒体级广告与会员生意”，它很难再造增长，只能把existing的舆论场价值榨得更透。',doom:'大凶之兆是“温水煮青蛙”：没有致命一击，但产品创新停滞、年轻用户持续流失、活跃全靠热搜和明星八卦续命——最怕哪天连热点都留不住人了。',window:'转运窗口其实已经很紧——微博需要在2026找到一个新的内容形态或年轻人抓手，否则会像人人网一样，在“还活着”的状态里慢慢失去存在感。'},
'知乎':{trend:'瓶颈徘徊',years:[{y:'2026',k:'商业化撕扯',t:'专业心智独一份，但氛围与赚钱互搏'},{y:'2027',k:'AI搜索冲击',t:'“问答”正被AI原生吃掉，护城河松动'},{y:'2028',k:'知识付费深耕',t:'守住专业内容的付费天花板'}],nextCurve:'知乎的第二曲线是“AI+专业知识付费”——它坐拥全网最优质的问答语料，最该做的是把内容变成AI训练与知识服务的高价值资产，而不是继续在广告里内耗。',doom:'大凶之兆是“被AI原生颠覆”：知乎的核心场景“提问-获取答案”正是ChatGPT们最擅长的，一旦用户习惯直接问AI，知乎“专业问答”的心智会被结构性掏空。',window:'转运之机在2026——必须趁语料价值还在，把AI搜索与知识付费的护城河扎深，否则“有问题上知乎”会被“有问题问AI”彻底替代。'},
'微信读书':{trend:'稳中微升',years:[{y:'2026',k:'社交阅读',t:'用免费时长与好友排行把阅读做上瘾'},{y:'2027',k:'内容瓶颈',t:'留存很好，但正版书供给是天花板'},{y:'2028',k:'AI伴读',t:'用AI解读、笔记、问答提升阅读价值'}],nextCurve:'微信读书的第二曲线是“AI伴读+知识服务”——把海量书籍变成可以问答、总结、串联的知识库，让读书从“读完”升级为“真正吸收”，这是纸质书永远给不了的价值。',doom:'命劫在“供给天花板”：模式很健康，但受限于正版书版权与出版节奏，好书就那么多、更新慢，重度用户读完存量后会陷入“无书可读”的留存瓶颈。',window:'2026-2027要把AI伴读做成杀手锏——阅读产品的护城河正从“书多”转向“读得更深”，谁先用AI重构阅读体验，谁就拿到下一个十年。'},
'网易云音乐':{trend:'夹缝求生',years:[{y:'2026',k:'社区差异化',t:'评论区与歌单UGC是灵魂，也是唯一的护城河'},{y:'2027',k:'版权困局',t:'版权受制于人，是结构性的软肋'},{y:'2028',k:'情感社区',t:'从听歌工具走向音乐情感社区'}],nextCurve:'网易云的第二曲线是“音乐+情感社区+独立音乐人生态”——版权拼不过腾讯，就把“评论区文化”和扶持原创音乐人做成腾讯复制不了的社区资产。',doom:'大凶之兆是“版权命门”：核心内容（热门歌曲版权）握在别人手里，一场版权战就能让用户流失——护城河是社区，命门却是版权，这是最危险的错配。',window:'转运之机在2026——必须把社区与原创音乐生态的壁垒扎到腾讯抄不动的深度，否则版权每失守一次，就离“情怀还在、人已走光”更近一步。'},

'Netflix':{trend:'稳健成熟',years:[{y:'2026',k:'广告与游戏',t:'订阅见顶，靠广告档与打击共享账号提ARPU'},{y:'2027',k:'内容工业',t:'自制飞轮全球化，把内容做成规模壁垒'},{y:'2028',k:'娱乐平台',t:'从长视频走向游戏+直播的娱乐帝国'}],nextCurve:'Netflix的第二曲线是“广告业务+游戏+现场娱乐”——会员增长见顶后，未来增量来自广告档位、云游戏和体育直播，把订阅用户群变现出更多花样。',doom:'大凶之兆是“内容军备竞赛失控”：迪士尼、亚马逊、苹果都在烧钱做自制，内容成本无止境攀升——一旦爆款乏力，高会员费就撑不住用户流失。',window:'2026要把广告与游戏这两条第二曲线跑通——纯订阅的天花板已经清晰可见，不找到新的变现杠杆，增长故事就讲到头了。'},
'微信':{trend:'见顶守成',years:[{y:'2026',k:'生态收割',t:'增长早已见顶，靠视频号与小程序找存量增量'},{y:'2027',k:'AI重构',t:'把AI塞进对话与搜索，守住超级入口'},{y:'2028',k:'操作系统',t:'不是App，是中国人的数字生活底座'}],nextCurve:'微信的第二曲线是“视频号+微信AI+小程序生态深化”——用户数与时长已到顶，未来增量在把existing的12亿用户在电商、本地生活、AI助手上榨出更高ARPU。',doom:'命劫是“大到不敢变”：微信是中国互联网最强护城河，也因此最保守——任何激进改动都可能动摇根基，最怕在AI这样的范式变革中“因为太重要而不敢革命”，被更轻的产品偷袭心智。',window:'转运之机在2026——AI是重构入口的一次机会，微信必须在“克制”与“进取”间找到平衡，把AI原生进对话与搜索，否则会把下一代入口拱手让给字节。'},

'淘宝':{trend:'守成防御',years:[{y:'2026',k:'内容电商反击',t:'被抖音种草分流，用逛逛与直播补内容短板'},{y:'2027',k:'AI导购',t:'用AI重构“逛街”体验，守住综合电商基本盘'},{y:'2028',k:'生态再进化',t:'把最完整的商家生态做成别人抄不走的壁垒'}],nextCurve:'淘宝的第二曲线是“内容化+AI购物助手”——它有最全的商品和商家，缺的是抖音式的“逛”和小红书式的“种草”，未来要靠AI导购和内容场把“搜索式购物”升级为“发现式购物”。',doom:'大凶之兆是“心智被两头分食”：种草在小红书、冲动消费在抖音、极致低价在拼多多——淘宝最全但最没“记忆点”，最怕沦为大家比完价最后成交的“货架”，利润被稀释。',window:'转运之机在2026——必须靠内容与AI重建“逛淘宝”的心智，错过这轮内容电商反击，用户的购物起点会永久迁移到别的App。'},
'京东':{trend:'稳守承压',years:[{y:'2026',k:'品质心智守擂',t:'自营+物流的重资产壁垒仍在，但增长乏力'},{y:'2027',k:'品类破圈',t:'3C家电见顶，得在商超、服饰上撕开口子'},{y:'2028',k:'即时零售',t:'用物流优势打小时达，抢本地生活的蛋糕'}],nextCurve:'京东的第二曲线是“即时零售+供应链服务”——它最强的资产是物流与履约能力，未来增长在把“次日达”升级为“小时达”，并把供应链能力对外输出成B端生意。',doom:'命劫是“品类天花板+低价失守”：3C家电基本盘增长见顶，往服饰美妆等高毛利品类扩张始终乏力，同时低价被拼多多压制——重资产模式在增长放缓时会变成沉重的成本包袱。',window:'2026-2027要把即时零售与供应链输出做成第二引擎——单靠自营电商的增长故事已经讲不动，必须让重资产在新场景里产生新价值。'},
'美团':{trend:'稳健上升',years:[{y:'2026',k:'即时零售',t:'外卖飞轮外，闪购把万物送到家'},{y:'2027',k:'出海与新业务',t:'把本地生活的能力复制到海外'},{y:'2028',k:'超级平台',t:'吃喝玩乐行的本地生活操作系统'}],nextCurve:'美团的第二曲线是“即时零售（美团闪购）+出海”——外卖到店的规模壁垒已成，未来增量在把“30分钟送万物”做成新习惯，以及把本地生活的运力网络复制到海外市场。',doom:'大凶之兆是“抖音本地生活的降维打击”：抖音用内容流量低价切入到店团购，美团的高频交易护城河正被“兴趣电商”从上游截流——同时新业务持续烧钱考验利润。',window:'2026是转运之机——必须在抖音站稳本地生活前，把即时零售的心智和履约壁垒扎牢，同时让出海跑出第二增长曲线，否则会陷入守土消耗战。'},
'滴滴':{trend:'稳守修复',years:[{y:'2026',k:'合规重建',t:'监管风波后回归，双边网络效应仍在'},{y:'2027',k:'出海与货运',t:'国内见顶，拉美/货运是新增量'},{y:'2028',k:'自动驾驶',t:'Robotaxi是终局，也是最大的赌注'}],nextCurve:'滴滴的第二曲线是“国际化+自动驾驶Robotaxi”——国内网约车渗透见顶且强监管，未来想象力在海外市场扩张，以及用自动驾驶从根本上重构成本结构。',doom:'命劫是“政策与运力的双重命门”：合规与监管是悬顶之剑、司机运力成本刚性、聚合平台又在抢流量——滴滴的规模很大，但对政策和劳资关系的脆弱性也最大。',window:'转运之机在2027前后——必须在Robotaxi技术成熟窗口卡位，谁先把自动驾驶跑通，谁就能甩掉司机成本这个最大包袱，否则永远赚辛苦钱。'},
'王者荣耀':{trend:'高位维稳',years:[{y:'2026',k:'长青运营',t:'社交关系链+赛事生态撑起超强留存'},{y:'2027',k:'IP宇宙',t:'把英雄IP做成动画、衍生游戏与文创'},{y:'2028',k:'世代交替',t:'守住Z世代的同时，能不能抓住下一代'}],nextCurve:'王者荣耀的第二曲线是“IP宇宙化+电竞生态深耕”——单款游戏流水见顶，未来价值在把英雄IP延伸到动画、单机、衍生手游和线下赛事，做成腾讯的一个内容宇宙。',doom:'大凶之兆是“世代审美迁移”：MOBA的核心用户在变老，Z世代与更年轻的玩家被开放世界、二次元和短平快的新品类分流——最怕的是“老玩家还在、但没有新血”。',window:'2026-2027要把IP衍生和新世代抓手做起来——一款国民游戏的生命周期终会衰减，必须在流水还高时把用户资产沉淀成更持久的IP价值。'},
'原神':{trend:'见顶转型',years:[{y:'2026',k:'工业化守擂',t:'开放世界+抽卡把品质流水双拉满'},{y:'2027',k:'长线运营考验',t:'内容消耗速度快过产出，玩家审美疲劳'},{y:'2028',k:'IP与新作接棒',t:'靠星铁、绝区零等矩阵分摊单款风险'}],nextCurve:'原神的第二曲线是“米哈游IP矩阵+全球二次元生态”——单款游戏终会进入生命周期后段，米哈游真正的护城河是“工业化研发能力”，未来靠多款产品矩阵和IP衍生（动画、乐园）延续。',doom:'命劫是“内容永动机的诅咒”：开放世界的内容消耗速度远快于产出，长线运营下玩家审美疲劳与流水下滑是必然——最怕新作接不上、老作留不住的青黄不接。',window:'转运之机在2026-2027——必须让新作（绝区零等）成功接棒、把IP做成超越单款游戏的资产，否则再强的工业化能力也扛不住单一爆款的自然衰减。'},
'Steam':{trend:'垄断稳固',years:[{y:'2026',k:'绝对垄断',t:'玩家库存+社区构筑近乎无解的壁垒'},{y:'2027',k:'掌机延伸',t:'Steam Deck把PC游戏带向移动'},{y:'2028',k:'生态护城河',t:'分发即标准，几乎无可替代'}],nextCurve:'Steam的第二曲线是“硬件（Steam Deck）+云游戏”——PC分发已经垄断，未来增量在把庞大的游戏库延伸到掌机和串流，让玩家在任何设备上都离不开Steam账号。',doom:'大凶之兆其实很远，但隐忧是“反垄断与30%抽成”：Epic等对手一直攻击其高抽成，一旦监管强制开放或分成下调，印钞机的利润率会受冲击。',window:'Steam几乎没有紧迫的转运压力——它是行业级基础设施，唯一要做的是在云游戏与硬件上持续加固，防止范式转移时被主机或云原生绕过。'},
'Duolingo':{trend:'持续上升',years:[{y:'2026',k:'游戏化封神',t:'连胜机制把学习做上瘾，留存冠军级'},{y:'2027',k:'AI家教',t:'用GPT做个性化对话教学，提客单价'},{y:'2028',k:'品类扩张',t:'从语言扩到数学、音乐等更多学习场景'}],nextCurve:'Duolingo的第二曲线是“AI个性化家教+多学科扩张”——语言学习的天花板有限，未来靠AI对话教学提升付费转化，并把成瘾的游戏化引擎复制到数学、音乐、编程等新学科。',doom:'大凶之兆是“成瘾≠有效”的质疑：用户连胜打卡很开心，但真能学会一门语言吗？——一旦“学了两年还不会说”的口碑发酵，游戏化的护城河会被“效果焦虑”反噬。',window:'2026-2027是转运窗口——必须靠AI把“学习效果”坐实、把品类扩出去，否则单一语言学习+游戏化的故事，增长天花板会比想象中来得早。'},
'Keep':{trend:'震荡承压',years:[{y:'2026',k:'商业化闭环',t:'工具+内容+消费三件套，但健身天生低频'},{y:'2027',k:'硬件与会员',t:'靠智能硬件与奖牌经济提ARPU'},{y:'2028',k:'重新定位',t:'从“健身App”走向“运动生活方式”'}],nextCurve:'Keep的第二曲线是“运动消费品+线下+奖牌经济”——纯线上健身内容留存差，未来要靠卖器械、服饰、食品和“跑步拿奖牌”这类情绪消费把低频用户的价值榨高。',doom:'命劫是“健身反人性”的本质：用户办卡时热血、三天后放弃——Keep最大的敌人不是竞品，是用户自己的惰性，留存与付费始终被“健身低频”这个天花板压制。',window:'2026要把“消费+情绪价值”做成第二引擎——靠内容变现的故事已被证明天花板低，必须把用户对“更好的自己”的向往，转化成实实在在的复购。'},
'Notion':{trend:'稳中上升',years:[{y:'2026',k:'AI原生重构',t:'积木式all-in-one叠加AI，重塑效率工具'},{y:'2027',k:'企业级渗透',t:'从个人玩具走向团队协作标准'},{y:'2028',k:'工作操作系统',t:'成为知识工作者的默认工作台'}],nextCurve:'Notion的第二曲线是“Notion AI+企业协作”——个人笔记天花板有限，未来靠AI把文档、数据库、项目管理串成能自动干活的“工作操作系统”，并向企业市场规模化收费。',doom:'大凶之兆是“大而全的陷阱”：功能无所不包但上手曲线陡、性能被诟病——最怕被更垂直、更快的专用工具（Linear、Craft等）在各个单点上蚕食，样样能做、样样不精。',window:'2026-2027要靠AI和企业版突围——效率工具的AI原生窗口正在打开，谁先把AI变成“帮你把工作做完”而非“更好的编辑器”，谁就赢得下一程。'},

'GitHub':{trend:'稳固上升',years:[{y:'2026',k:'代码即网络',t:'全球开发者的默认家园，网络效应满格'},{y:'2027',k:'Copilot深化',t:'把AI编程做成平台级能力'},{y:'2028',k:'开发操作系统',t:'从代码托管走向研发全生命周期'}],nextCurve:'GitHub的第二曲线是“AI原生的研发全流程平台”——代码托管已是基础设施，未来靠Copilot把issue、PR、测试、部署全流程AI化，成为开发者从想法到上线的操作系统。',doom:'大凶之兆是“被Cursor们从体验端偷袭”：GitHub是基础设施但不是最好用的编辑器，AI编程的创新前沿在新锐产品手里——最怕“大家还在用GitHub存代码，但AI都在别处写”。',window:'2026-2027要靠微软全家桶把AI编程的战场收敛回来——网络效应保底盘，但必须在AI体验上追平新锐，否则会失去“开发者心智前沿”的定义权。'},
'飞书':{trend:'承压突围',years:[{y:'2026',k:'产品力领先',t:'一体化协作+文档体验，产品口碑最好'},{y:'2027',k:'市占攻坚',t:'被钉钉微信夹击，靠差异化啃硬骨头'},{y:'2028',k:'AI办公',t:'把AI原生进协作，重新定义企业效率'}],nextCurve:'飞书的第二曲线是“AI原生办公+出海（Lark）”——国内被钉钉的规模和企业微信的生态夹击，产品力最强却市占难上，未来突破口在AI办公的代际优势和海外市场。',doom:'命劫是“最好的产品、最难的生意”：飞书体验公认第一，但企业软件拼的是关系、生态与迁移成本，不是产品体验——最怕陷入“叫好不叫座、烧钱换市占”的持久战。',window:'转运之机在2026-2027——必须用AI办公打出代际差、或在出海找到增量，否则在国内正面拼分发与生态，很难撬动钉钉和企微的存量盘。'},
'钉钉':{trend:'稳守转型',years:[{y:'2026',k:'组织在线',t:'低价渗透打下中小企业基本盘'},{y:'2027',k:'商业化补课',t:'装机量大但付费弱，得把免费用户变成钱'},{y:'2028',k:'AI+SaaS生态',t:'靠开放生态与AI把管理场景做深'}],nextCurve:'钉钉的第二曲线是“付费SaaS生态+AI管理助手”——它有最大的组织装机量却长期不赚钱，未来要靠把免费流量导入付费应用生态和AI管理工具，完成从“规模”到“收入”的转身。',doom:'大凶之兆是“规模大而不赚钱”：靠低价和阿里资源装机无数，但企业付费意愿低、和阿里云的定位反复摇摆——最怕成为“用户很多、商业模式没跑通”的战略消耗品。',window:'2026-2027是商业化转运窗口——必须把庞大的免费装机量转化成SaaS付费与AI订阅，否则规模越大、亏损越重的模式无法长期持续。'},
'支付宝':{trend:'稳守成熟',years:[{y:'2026',k:'超级入口',t:'支付+金融+生活服务，留存壁垒极强'},{y:'2027',k:'AI生活助手',t:'把入口从支付升级为智能生活管家'},{y:'2028',k:'场景外延',t:'靠碎片场景与出海找新增量'}],nextCurve:'支付宝的第二曲线是“AI生活助手+出海支付”——国内支付渗透见顶，未来增量在把它从“付钱工具”升级为管理生活缴费、政务、理财的AI入口，以及Alipay+的全球化。',doom:'命劫是“金融监管的紧箍咒”：蚂蚁上市折戟后，金融业务被强监管、想象空间被砍——支付宝的支付基本盘稳固，但最赚钱的金融故事被政策封了顶。',window:'转运之机在2026——必须在监管框架内把AI生活服务与出海支付做成新引擎，纯支付无利润、金融被限制，不找到第三条路增长会停滞。'},
'微信支付':{trend:'高位稳固',years:[{y:'2026',k:'双雄格局',t:'依附社交链的高频支付，壁垒近乎满格'},{y:'2027',k:'商业闭环',t:'把支付流量导向视频号电商与小程序'},{y:'2028',k:'金融克制',t:'守住支付、审慎做金融，稳字当头'}],nextCurve:'微信支付的第二曲线是“支付+商业交易闭环”——它本身不需要增长，价值在于把支付这个高频动作反哺给视频号电商、小程序生意，成为微信商业生态的血液。',doom:'大凶之兆是“监管平衡与断直连”：作为国民级支付基础设施，任何费率、备付金、反垄断政策都能牵一发动全身——它的命运更多取决于政策而非竞争。',window:'微信支付没有紧迫转运压力——它是微信生态的水电煤，只需在合规前提下把支付与交易闭环做深，稳定即胜利。'},
'Discord':{trend:'稳中求变',years:[{y:'2026',k:'社群黏性',t:'兴趣社群+语音，游戏与开发者生态极黏'},{y:'2027',k:'商业化破题',t:'黏性极高但变现克制，钱是最大问号'},{y:'2028',k:'平台化',t:'从聊天工具走向社区经济平台'}],nextCurve:'Discord的第二曲线是“社区经济+订阅生态”——它有全网最黏的兴趣社群，却一直不赚钱，未来靠Nitro订阅、社区付费、创作者打赏把“黏性”变成“收入”。',doom:'大凶之兆是“高人气、低营收”：用户爱到离不开、但公司持续亏损——变现太克制怕伤社区、太激进又违背极客文化，Discord被夹在“情怀”和“财报”之间。',window:'2026-2027是商业化生死窗口——如果IPO前不能证明规模化盈利路径，再高的DAU也撑不起估值，最怕成为“大家都爱、但赚不到钱”的经典案例。'},
'领英':{trend:'稳健上升',years:[{y:'2026',k:'双边壁垒',t:'职场身份+招聘网络效应形成深护城河'},{y:'2027',k:'AI招聘',t:'用AI重构简历匹配与人才搜索'},{y:'2028',k:'职业操作系统',t:'从招聘走向终身职业发展平台'}],nextCurve:'领英的第二曲线是“AI招聘+职业技能学习”——招聘网络已成，未来靠AI做智能人岗匹配、并把LinkedIn Learning做成职场人的终身技能升级平台，客单价与频次双升。',doom:'大凶之兆是“低频与AI冲击”：找工作是低频行为、日常打开率低，且AI能直接生成简历与匹配候选人——最怕核心的“人找工作、公司找人”场景被AI Agent绕过。',window:'2026-2027要靠AI把低频招聘变成高频职业服务——招聘的护城河虽深，但用户粘性弱，必须用AI和学习把领英做成“天天要用”而非“换工作才想起”。'},
'Airbnb':{trend:'稳健上升',years:[{y:'2026',k:'房东即壁垒',t:'双边平台，独特房源供给是护城河'},{y:'2027',k:'体验扩张',t:'从住宿走向“体验”与旅行全链路'},{y:'2028',k:'旅行超级App',t:'AI行程规划+住宿+体验一站式'}],nextCurve:'Airbnb的第二曲线是“旅行体验+AI行程管家”——住宿平台已成，未来增量在重启并做大“Experiences体验”业务，用AI把它从订房工具升级为旅行全程规划的入口。',doom:'大凶之兆是“监管与酒店化”：各国对短租的监管收紧、房源被职业房东垄断后体验酒店化——Airbnb最珍贵的“住进当地人生活”的独特性正在被规模稀释。',window:'2026-2027要把体验业务和AI规划做成第二曲线——纯住宿增长见顶，若不能重建“独特体验”的心智，就会和OTA们同质化，沦为又一个订房网站。'},
'得物':{trend:'上升承压',years:[{y:'2026',k:'潮流心智',t:'球鞋鉴定切入，内容+信任是差异化'},{y:'2027',k:'品类扩张',t:'从潮鞋扩到美妆、数码、奢品的考验'},{y:'2028',k:'年轻人电商',t:'守住Z世代的潮流消费入口'}],nextCurve:'得物的第二曲线是“全品类正品鉴别电商+潮流社区”——潮鞋盘子有限，未来靠把“先鉴别后发货”的信任机制复制到美妆、数码、奢品，做年轻人的“正品保障”电商。',doom:'大凶之兆是“品类天花板+真假信任危机”：潮鞋市场有限、往新品类扩张时鉴别能力和心智都要重建，且一旦出现“得物也卖到假货”的舆情，赖以立身的信任会崩塌。',window:'2026-2027是转运窗口——必须在潮鞋红利见顶前把品类扩出去、把“正品信任”这块招牌守死，信任一旦破防，得物的护城河就荡然无存。'},
'闲鱼':{trend:'稳中求变',years:[{y:'2026',k:'网络效应深',t:'二手交易的供需网络护城河深'},{y:'2027',k:'信用与履约',t:'把非标二手的信任与履约做重'},{y:'2028',k:'循环经济',t:'从二手集市走向闲置经济平台'}],nextCurve:'闲鱼的第二曲线是“官方验货/回收+服务交易”——纯C2C的信任成本高，未来靠平台介入验货、以旧换新回收、以及知识技能等虚拟服务交易，把“闲置”做成更大的循环经济。',doom:'大凶之兆是“劣币驱逐良币”：低门槛带来海量交易，也带来骗子、广告和货不对板——闲鱼最大的敌人是自己的“集市气质”，治理不好会让用户信任慢慢流失。',window:'2026-2027要把信任与履约做重——二手交易的网络效应是护城河，但体验的下限决定天花板，必须在规模和治理间找到平衡。'},
'携程':{trend:'稳健复苏',years:[{y:'2026',k:'出行大盘回暖',t:'OTA供应链与会员壁垒稳固'},{y:'2027',k:'内容化反击',t:'被小红书/抖音种草分流，补内容短板'},{y:'2028',k:'AI旅行管家',t:'用AI把“订票工具”升级为行程规划入口'}],nextCurve:'携程的第二曲线是“内容种草+AI旅行管家+出海（Trip.com）”——用户越来越多在小红书决定去哪玩，携程要靠内容和AI把决策入口抢回来，并靠国际化找增量。',doom:'大凶之兆是“决策前置被截胡”：旅行决策正在从“携程搜索比价”前移到“小红书/抖音看攻略种草”——携程最怕沦为大家看完攻略最后来下单的“比价工具”，利润被挤压。',window:'2026-2027要靠内容与AI把旅行决策入口抢回来——供应链壁垒还在，但用户心智入口正在迁移，守不住“去哪玩”的决策环节，就只能赚最薄的履约钱。'},
'高德':{trend:'稳健上升',years:[{y:'2026',k:'地图基本盘',t:'导航精度与免费策略守住入口'},{y:'2027',k:'本地生活',t:'从地图走向出行+到店+团购的入口'},{y:'2028',k:'超级出行入口',t:'把“去哪”变成“怎么去+去了干啥”'}],nextCurve:'高德的第二曲线是“地图入口+本地生活/打车聚合”——导航是高频刚需入口，未来靠把打车聚合、到店团购、门票预订挂在地图上，从“工具”升级为阿里本地生活的流量入口。',doom:'大凶之兆是“工具的宿命”：地图是极高频但极难变现的工具，用户用完即走——高德最大的挑战是如何在不伤导航体验的前提下，把流量变成美团式的交易，否则永远是“别人的入口”。',window:'2026-2027是转运窗口——必须把本地生活的交易闭环挂载成功，纯地图工具的商业价值有限，聚合打车已验证路径，到店团购是下一个战场。'},
'大众点评':{trend:'守成承压',years:[{y:'2026',k:'决策心智',t:'到店评价的稀缺心智仍在'},{y:'2027',k:'内容化守擂',t:'被小红书/抖音的探店内容正面冲击'},{y:'2028',k:'重做社区',t:'把UGC点评升级为本地生活内容社区'}],nextCurve:'大众点评的第二曲线是“本地生活内容社区+榜单权威”——它的核心资产是海量真实点评，未来要靠“必吃榜/必玩榜”这类权威内容和社区化，抵御短视频探店的分流。',doom:'大凶之兆是“被内容平台架空”：用户探店决策正在迁移到小红书和抖音——大众点评最怕的是“评价数据我最全，但年轻人都不来看了”，沦为美团体系里的一个评分接口。',window:'转运之机在2026——必须把点评内容做出短视频给不了的“决策权威性”，错过这轮内容化改造，Z世代的本地生活入口会彻底旁落。'},
'豆瓣':{trend:'缓慢衰退',years:[{y:'2026',k:'文青孤岛',t:'评分权威与兴趣小组是稀缺资产'},{y:'2027',k:'商业化两难',t:'一商业化就被骂，不商业化就没钱'},{y:'2028',k:'情怀续命',t:'守住评分心智，做小而美的文化坐标'}],nextCurve:'豆瓣的第二曲线其实很窄——最现实的是“把电影/书/音乐评分的权威性做成版权与数据服务”，它很难规模化增长，商业价值在于不可替代的文化坐标地位。',doom:'大凶之兆是“情怀无法变现”：豆瓣是中国互联网的文化良心，却因过度克制商业化而长期缺钱、产品陈旧——最怕在“保持纯粹”和“活下去”之间，慢慢耗尽用户耐心。',window:'转运窗口非常紧——豆瓣需要找到一种“不伤调性又能赚钱”的模式，否则会像一座漂亮但年久失修的老宅，在怀念声中慢慢衰败。'},
'Canva':{trend:'高速上升',years:[{y:'2026',k:'设计平民化',t:'模板+订阅跑出巨大商业规模'},{y:'2027',k:'AI创作套件',t:'把AI生成图文视频全塞进来'},{y:'2028',k:'全民创意平台',t:'从设计工具走向内容生产操作系统'}],nextCurve:'Canva的第二曲线是“AI一站式内容创作+企业协作”——它把设计平民化后，未来靠AI把图、文、视频、PPT的生成全打通，成为非专业用户的“创意操作系统”，并向企业规模化收费。',doom:'大凶之兆是“AI抹平门槛后的同质化”：当AI人人能生成设计，Canva的“模板优势”会被削弱——最怕沦为众多AI生成工具中的一个，被上游模型和下游专业工具两头挤压。',window:'2026-2027要把AI创作套件做成新护城河——设计平民化的红利已收，必须让Canva成为“AI时代最好用的创作台”，而不是被AI原生工具颠覆的模板库。'},
'Midjourney':{trend:'稳中承压',years:[{y:'2026',k:'审美即壁垒',t:'社区+付费墙跑通罕见的健康商业模型'},{y:'2027',k:'易用性补课',t:'Discord门槛高，独立App与网页是必修课'},{y:'2028',k:'创作生态',t:'从出图工具走向视觉创作平台'}],nextCurve:'Midjourney的第二曲线是“独立平台+视频/3D生成”——它靠审美和社区建立了图像生成的心智，未来要降低使用门槛（脱离Discord）、并把能力延伸到视频、3D，守住“最好看的AI”这个定位。',doom:'大凶之兆是“审美会被追平”：一旦开源模型和大厂在画质上追近，Midjourney“付费才能用+Discord门槛高”的模式会显得笨重——最怕被更易用、更便宜的对手用体验降维打击。',window:'2026-2027是转运窗口——必须靠独立产品和视频能力把领先转成新护城河，纯图像审美的领先会随模型平权而收窄，体验和生态才是长久之计。'},
'Character.AI':{trend:'转折承压',years:[{y:'2026',k:'留存惊人',t:'情感陪伴的日均时长冠绝行业'},{y:'2027',k:'商业与合规',t:'变现难、未成年保护是两道生死坎'},{y:'2028',k:'定位再造',t:'从“聊天”走向更深的情感/娱乐服务'}],nextCurve:'Character.AI的第二曲线是“情感陪伴+娱乐化订阅/IP”——用户黏性极高但难变现，未来靠订阅、虚拟角色IP、以及和影视游戏结合的沉浸式娱乐，把时长变成收入。',doom:'大凶之兆是“合规与伦理的达摩克利斯之剑”：情感陪伴涉及未成年保护、心理健康、擦边内容——一起恶性舆情就可能招致监管重锤，商业化又长期缺钱，创始团队已被谷歌“回收”。',window:'转运之机在2026——必须在合规红线内跑通商业化，情感陪伴是留存金矿也是伦理雷区，处理不好，再高的时长也换不来一个安全的未来。'},

function seedFromName(name){var h=0;for(var i=0;i<name.length;i++){h=(h*31+name.charCodeAt(i))>>>0}return h}
function computeChart(){
state.dayzhu=state.dayzhu||state.recognizedDayzhu||recommendDayzhu();
var canonical=findProductMatch(state.productName)||state.productName;
state.canonical=canonical;
var own=PRODUCT_SCORES[canonical];
if(own){
/* 优先用产品自己的命盘：以产品名做种子，做微小±1抖动——主体稳定，同产品每次基本一致，只保留一点“每次略有不同”的神秘感 */
state.aiScores=own.slice();
var seed=seedFromName(canonical);
state.scores=clampScore(own.map(function(s,i){var j=((seed>>(i*2))&3);var delta=(j===0?-1:j===3?1:0);return s+delta}));
}else{
/* 冷门/自由输入产品：回退到按日主的基础命盘 */
var aiBase=AI_SCORES[state.dayzhu]||[5,5,5,5,5,5,5,5];
state.aiScores=aiBase.slice();
state.scores=clampScore(aiBase.map(function(s){return s+Math.round((Math.random()-0.5)*2)}));
}
state.mingge=determineMingge(state.scores);
state.seal=SEAL_TEXTS[Math.floor(Math.random()*SEAL_TEXTS.length)];
}

/* ═══════════════════════ 大运自动播放 ═══════════════════════ */
var dayunTimer=null,dayunIdx=0,dayunPlaying=true;
function renderDayunDetail(i){
var d=DAYUN_DETAIL[i]||DAYUN_DETAIL[DAYUN_DETAIL.length-1];
var el=document.getElementById('dayunDetail');if(!el)return;
el.innerHTML='<div class="dd-title">'+DAYUN_NODES[i]+'</div><p>'+DAYUN_DESC[i]+'</p><div class="dd-grid"><div class="dd-item"><strong>适合做：</strong>'+d.do+'</div><div class="dd-item"><strong>不适合：</strong>'+d.notDo+'</div><div class="dd-item"><strong>关键指标：</strong>'+d.metric+'</div><div class="dd-item"><strong>风险：</strong>'+d.risk+'</div></div>';
document.querySelectorAll('#dayunTimeline .dayun-node').forEach(function(n,idx){n.classList.toggle('playing',idx===i)});
var node=document.querySelectorAll('#dayunTimeline .dayun-node')[i];
if(node&&node.scrollIntoView){var tl=document.getElementById('dayunTimeline');if(tl)tl.scrollLeft=node.offsetLeft-tl.clientWidth/2+node.clientWidth/2}
}
function stepDayun(){renderDayunDetail(dayunIdx);dayunIdx=(dayunIdx+1)%DAYUN_NODES.length}
function setupDayun(){
dayunIdx=0;dayunPlaying=true;stepDayun();
if(dayunTimer)clearInterval(dayunTimer);
dayunTimer=setInterval(function(){if(dayunPlaying)stepDayun()},2000);
var btn=document.getElementById('dayunPlayBtn');
btn.addEventListener('click',function(){dayunPlaying=!dayunPlaying;btn.textContent=dayunPlaying?'⏸ 暂停自动播放':'▶ 继续自动播放'});
document.querySelectorAll('#dayunTimeline .dayun-node').forEach(function(n){n.addEventListener('click',function(){dayunPlaying=false;btn.textContent='▶ 继续自动播放';var i=parseInt(n.getAttribute('data-dayun'));dayunIdx=(i+1)%DAYUN_NODES.length;renderDayunDetail(i)})});
}

/* ═══════════════════════ 改命模拟器（复用 GAIMING_MAP 建议 + 命盘实时变化） ═══════════════════════ */
function selectRemedy(key,el){
var r=null;REMEDY_DIRS.forEach(function(x){if(x.key===key)r=x});if(!r)return;
state.remedyDir=key;
document.querySelectorAll('#gmDirs .gm-dir').forEach(function(d){d.classList.remove('selected')});el.classList.add('selected');
/* 命盘实时变化：对应维度升，被牺牲维度降 */
var ns=state.scores.slice();
ns[r.dimUp]=Math.min(10,ns[r.dimUp]+2);ns[r.dimDown]=Math.max(1,ns[r.dimDown]-1);
state.scores=ns;
drawRailBagua();var mb=document.getElementById('mobileBagua');if(mb)mb.innerHTML=baguaSVG(140,140,120,80,50,state.scores,{symSize:14,showDim:true});
/* 更新八维列表条 */
document.querySelectorAll('#dimList .dim-item').forEach(function(item){var di=parseInt(item.getAttribute('data-dim'));var s=state.scores[di];var col=s>=8?'var(--accent-green)':s>=5?'var(--accent-gold)':'var(--accent-primary)';var f=item.querySelector('.di-fill');if(f){f.style.width=s*10+'%';f.style.background=col}item.querySelector('.di-val').textContent=s;var tg=item.querySelector('.di-tag');if(tg)tg.textContent=getDimTag(di,s);var fb=item.querySelector('.di-feedback');if(fb)fb.textContent=getFeedback(di,s);item.classList.toggle('hl',di===r.dimUp)});
/* 生成 3 条策略（复用改命签 GAIMING_MAP，取对应维度） */
var g=GAIMING_MAP[r.dimForGaiming]||GAIMING_MAP[0];
var out=document.getElementById('gmOutput');
var simHtml=r.sim.map(function(m){return '<div class="gm-sim-metric"><div class="gsm-label">'+m.label+'</div><div class="gsm-val '+(m.dir==='up'?'up':'down')+'">'+(m.dir==='up'?'↑ ':'↓ ')+m.val+'</div></div>'}).join('');
out.innerHTML='<div style="font-size:13px;color:var(--accent-gold);font-weight:600;margin-bottom:10px">选择方向：'+r.icon+' '+r.name+' → 模拟推演结果</div>'+
'<div class="gm-sim-row">'+simHtml+'</div>'+
'<div class="gaiming-task"><div class="gt-time">🎯 今日可做</div>'+g.today+'</div>'+
'<div class="gaiming-task"><div class="gt-time">📅 七日之内</div>'+g.week+'</div>'+
'<div class="gaiming-task"><div class="gt-time">📅 30天内</div>'+g.m30+'</div>'+
'<div class="gaiming-task"><div class="gt-time">🚀 下阶段</div>'+g.next+'</div>';
out.classList.add('show');
trackEvent('select_remedy',{dir:key});
}

/* ═══════════════════════ 滚动揭示 + 五行高亮 ═══════════════════════ */
function revealOnScroll(){
document.querySelectorAll('#phaseResult .chapter').forEach(function(c){var r=c.getBoundingClientRect();if(r.top<window.innerHeight*0.88){c.classList.add('reveal')}})}
var dimByChapter={'ch-wuxing':null};
function onResultScroll(){
revealOnScroll();
/* nav active + 命盘维度高亮 */
var chs=document.querySelectorAll('#phaseResult .chapter');var activeId=null;
chs.forEach(function(c){var r=c.getBoundingClientRect();if(r.top<window.innerHeight*0.4&&r.bottom>window.innerHeight*0.3){activeId=c.id}});
if(activeId){document.querySelectorAll('#railNav a').forEach(function(a){a.classList.toggle('on',a.getAttribute('data-target')===activeId)})}
/* 当命盘章节可见时，高亮当前视窗内的维度 */
var wx=document.getElementById('ch-wuxing');

if(wr.top<window.innerHeight&&wr.bottom>0){
var items=document.querySelectorAll('#dimList .dim-item');var hlIdx=null;
items.forEach(function(it){var ir=it.getBoundingClientRect();if(ir.top<window.innerHeight*0.6&&ir.bottom>window.innerHeight*0.3){hlIdx=parseInt(it.getAttribute('data-dim'))}});
items.forEach(function(it){it.classList.toggle('hl',parseInt(it.getAttribute('data-dim'))===hlIdx)});
if(hlIdx!=null){drawRailBagua(hlIdx)}
}}
}
