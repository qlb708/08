<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🔮 Product Destiny｜产品命理局</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#17121F;--card:#241C2E;--red:#E35D6A;--teal:#65C2B6;--gold:#F2C879;--text:#F5F0E8;--text2:#b8afc8;--border:rgba(255,255,255,0.1);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow-x:hidden}
canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ─── 幕切换 ─── */
.scene{display:none;position:relative;z-index:1;min-height:100vh;padding:40px 20px}
.scene.active{display:flex;flex-direction:column;align-items:center;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ─── 首页 ─── */
#s0{justify-content:center;text-align:center;gap:28px}
.logo{font-size:48px;line-height:1}
h1{font-size:clamp(22px,4vw,36px);font-family:Georgia,'Songti SC',serif;letter-spacing:.04em}
h1 span{color:var(--gold)}
.sub{color:var(--text2);font-size:14px;letter-spacing:.08em}

/* 命盘 */
.destiny-ring{position:relative;width:280px;height:280px;margin:0 auto}
.ring-svg{width:100%;height:100%;animation:spinRing 30s linear infinite}
@keyframes spinRing{to{transform:rotate(360deg)}}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;pointer-events:none}
.ring-center p{font-size:13px;color:var(--text2)}

/* 输入区 */
.input-row{display:flex;gap:10px;width:100%;max-width:480px}
.input-row input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 18px;color:var(--text);font-size:15px;outline:none;transition:.2s}
.input-row input:focus{border-color:var(--red)}
.btn{background:var(--red);color:#fff;border:none;border-radius:14px;padding:12px 22px;font-size:14px;cursor:pointer;transition:.2s;white-space:nowrap;font-weight:600}
.btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:14px;padding:10px 18px;font-size:13px;cursor:pointer;transition:.2s}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal)}
.btn-teal{background:var(--teal);color:#17121F;border:none;border-radius:14px;padding:12px 22px;font-size:14px;cursor:pointer;font-weight:600;transition:.2s}
.btn-teal:hover{filter:brightness(1.1);transform:translateY(-1px)}

/* 今日签浮层 */
.sign-fab{position:fixed;bottom:28px;right:28px;background:var(--gold);color:#17121F;border:none;border-radius:50px;padding:10px 18px;font-size:13px;cursor:pointer;z-index:100;font-weight:700;box-shadow:0 4px 20px rgba(242,200,121,.4)}
.sign-fab:hover{filter:brightness(1.1)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--gold);border-radius:24px;padding:36px;max-width:340px;width:90%;text-align:center;position:relative}
.modal h3{font-family:Georgia,serif;font-size:20px;color:var(--gold);margin-bottom:8px}
.modal .sign-grade{font-size:13px;color:var(--text2);margin-bottom:16px}
.modal .sign-text{font-size:16px;line-height:1.7;color:var(--text);margin-bottom:24px}
.modal-close{position:absolute;top:14px;right:18px;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer}

/* ─── 幕1：定日主 ─── */
#s1{gap:24px}
.scene-title{font-family:Georgia,'Songti SC',serif;font-size:clamp(18px,3vw,26px);text-align:center;color:var(--gold)}
.scene-sub{color:var(--text2);font-size:14px;text-align:center}
.daymaster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;width:100%;max-width:760px}
.dm-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:20px 18px;cursor:pointer;transition:.25s;position:relative;overflow:hidden}
.dm-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--red),transparent);opacity:0;transition:.25s}
.dm-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(227,93,106,.25);border-color:var(--red)}
.dm-card.selected{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)}
.dm-card.selected::before{opacity:.08}
.dm-emoji{font-size:30px;margin-bottom:8px}
.dm-title{font-size:15px;font-weight:700;margin-bottom:4px;color:var(--gold)}
.dm-type{font-size:12px;color:var(--teal);margin-bottom:8px}
.dm-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.dm-tag{background:rgba(101,194,182,.12);color:var(--teal);border-radius:6px;padding:2px 7px;font-size:11px}
.dm-feel{font-size:12px;color:var(--text2);font-style:italic}
.dm-selected-bar{background:rgba(242,200,121,.1);border:1px solid rgba(242,200,121,.3);border-radius:14px;padding:14px 20px;text-align:center;font-size:15px;width:100%;max-width:480px;display:none}
.dm-selected-bar b{color:var(--gold)}
.s1-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

/* ─── 幕2：八维打分 ─── */
#s2{gap:20px}
.mode-tabs{display:flex;gap:8px;background:var(--card);border-radius:14px;padding:6px}
.mode-tab{padding:8px 16px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--text2);border:none;background:none;transition:.2s}
.mode-tab.active{background:var(--red);color:#fff;font-weight:600}
.radar-sliders{display:flex;gap:24px;width:100%;max-width:900px;align-items:flex-start;flex-wrap:wrap}
.radar-wrap{flex:0 0 320px;position:relative}
.radar-wrap canvas{display:block}
.sliders-wrap{flex:1;min-width:280px;display:flex;flex-direction:column;gap:12px}
.slider-row{display:flex;flex-direction:column;gap:4px}
.slider-label{display:flex;justify-content:space-between;align-items:center}
.slider-name{font-size:13px;font-weight:600;color:var(--text)}
.slider-badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
.badge-normal{background:rgba(101,194,182,.15);color:var(--teal)}
.badge-warn{background:rgba(227,93,106,.15);color:var(--red)}
.slider-comment{font-size:11px;color:var(--text2);min-height:16px}
input[type=range]{width:100%;-webkit-appearance:none;height:5px;border-radius:3px;background:rgba(255,255,255,.1);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--red);cursor:pointer;box-shadow:0 0 6px rgba(227,93,106,.5)}
.diff-notice{font-size:12px;color:var(--gold);text-align:center;min-height:18px}
.s2-footer{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}

/* ─── 命书动画 ─── */
#book-overlay{display:none;position:fixed;inset:0;z-index:300;background:#000;align-items:center;justify-content:center;flex-direction:column;gap:20px}
#book-overlay.show{display:flex}
#book-line{stroke-dasharray:2000;stroke-dashoffset:2000;transition:stroke-dashoffset 1.2s ease}
.stamp{font-size:72px;transform:scale(0);opacity:0;transition:transform .4s cubic-bezier(.2,1.5,.4,1),opacity .3s;line-height:1}
.stamp.pop{transform:scale(1);opacity:1}
.stamp-text{font-family:Georgia,serif;font-size:14px;color:var(--red);margin-top:8px;text-align:center;opacity:0;transition:opacity .4s .3s}
.stamp-text.show{opacity:1}

/* ─── 幕3：命书 ─── */
#s3{gap:28px;padding-bottom:60px}
.book-cols{display:grid;grid-template-columns:260px 1fr 240px;gap:20px;width:100%;max-width:980px;align-items:start}
@media(max-width:800px){.book-cols{grid-template-columns:1fr}}

/* 左列 */
.id-card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:24px;text-align:center;display:flex;flex-direction:column;gap:12px}
.id-product{font-size:26px;font-family:Georgia,serif;font-weight:700;color:var(--gold)}
.id-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:left}
.id-item label{font-size:10px;color:var(--text2);display:block;margin-bottom:2px}
.id-item span{font-size:13px;font-weight:600;color:var(--text)}
.stars{color:var(--gold);font-size:18px;letter-spacing:2px}
.yi-ji{background:rgba(242,200,121,.08);border:1px solid rgba(242,200,121,.2);border-radius:12px;padding:12px 14px;text-align:left}
.yi-ji div{font-size:12px;margin-bottom:4px}
.yi-ji span.yi{color:var(--teal)}
.yi-ji span.ji{color:var(--red)}

/* 中列 */
.book-section{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:22px;margin-bottom:16px}
.book-section h4{font-family:Georgia,serif;font-size:15px;color:var(--gold);margin-bottom:14px}
.flip-card{perspective:800px;height:160px}
.flip-inner{position:relative;width:100%;height:100%;transition:.6s;transform-style:preserve-3d}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;padding:14px;font-size:13px;line-height:1.8;color:var(--text);background:rgba(255,255,255,.04);border:1px solid var(--border)}
.flip-back{transform:rotateY(180deg);background:rgba(101,194,182,.06);border-color:rgba(101,194,182,.3)}
.flip-btn{background:rgba(101,194,182,.15);color:var(--teal);border:none;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;margin-top:10px;transition:.2s}
.flip-btn:hover{background:rgba(101,194,182,.3)}

/* 时间轴 */
.timeline{display:flex;gap:0;margin-top:8px;position:relative}
.timeline::before{content:'';position:absolute;top:22px;left:16px;right:16px;height:2px;background:rgba(255,255,255,.1)}
.tl-node{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1}
.tl-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.2);transition:.3s}
.tl-node.current .tl-dot{background:var(--gold);border-color:var(--gold);box-shadow:0 0 10px var(--gold);animation:breathe 2s ease-in-out infinite}
@keyframes breathe{0%,100%{box-shadow:0 0 6px var(--gold)}50%{box-shadow:0 0 16px var(--gold)}}
.tl-label{font-size:10px;color:var(--text2);text-align:center}
.tl-node.current .tl-label{color:var(--gold);font-weight:600}
.tl-year{font-size:9px;color:rgba(255,255,255,.3)}

/* 流年 */
.liunnian-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.ln-item{background:rgba(255,255,255,.04);border-radius:12px;padding:10px;text-align:center}
.ln-name{font-size:11px;color:var(--text2);margin-bottom:4px}
.ln-val{font-size:16px;font-weight:700}
.ln-val.wang{color:var(--gold)}
.ln-val.zhong{color:var(--teal)}
.ln-val.ruo{color:var(--red)}
.ln-verdict{font-size:12px;color:var(--text2);font-style:italic;text-align:center;line-height:1.6}

/* 右列 */
.side-section{display:flex;flex-direction:column;gap:14px}
.side-block h5{font-size:12px;font-weight:700;letter-spacing:.06em;margin-bottom:8px;color:var(--text2)}
.tags-wrap{display:flex;flex-wrap:wrap;gap:6px}
.tag-gui{background:rgba(101,194,182,.15);border:1px solid rgba(101,194,182,.3);color:var(--teal);border-radius:8px;padding:4px 10px;font-size:12px}
.tag-xiao{background:rgba(227,93,106,.12);border:1px solid rgba(227,93,106,.3);color:var(--red);border-radius:8px;padding:4px 10px;font-size:12px}
.qian-result{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:14px;display:none;margin-top:10px}
.qian-result.show{display:block}
.qian-grade{font-size:13px;font-weight:700;margin-bottom:6px}
.qian-text{font-size:12px;color:var(--text2);line-height:1.7}
.qian-translate{font-size:11px;color:var(--teal);margin-top:8px;line-height:1.6}
@keyframes shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-5deg)}80%{transform:rotate(5deg)}}
.shaking{animation:shake .5s ease}

footer{text-align:center;color:rgba(255,255,255,.25);font-size:11px;padding:24px;position:relative;z-index:1}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- ══ 幕0：首页 ══ -->
<div class="scene active" id="s0">
  <div class="logo">🔮</div>
  <div>
    <h1>Product Destiny｜<span>产品命理局</span></h1>
    <p class="sub" style="margin-top:6px">用八字的方式，看产品的命</p>
  </div>

  <div class="destiny-ring">
    <svg class="ring-svg" viewBox="0 0 280 280" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- 外圈 -->
      <circle cx="140" cy="140" r="130" stroke="rgba(242,200,121,0.15)" stroke-width="1"/>
      <circle cx="140" cy="140" r="110" stroke="rgba(101,194,182,0.12)" stroke-width="1" stroke-dasharray="4 8"/>
      <circle cx="140" cy="140" r="88" stroke="rgba(227,93,106,0.1)" stroke-width="1"/>
      <!-- 8个维度节点 -->
      <g id="nodes" fill="rgba(242,200,121,0.6)" font-family="PingFang SC,sans-serif" font-size="10" text-anchor="middle" dominant-baseline="middle">
        <circle cx="140" cy="12" r="3"/><text x="140" y="28" fill="rgba(242,200,121,0.8)">用户</text>
        <circle cx="232" cy="48" r="3"/><text x="240" y="55" fill="rgba(242,200,121,0.8)">技术</text>
        <circle cx="268" cy="140" r="3"/><text x="262" y="155" fill="rgba(242,200,121,0.8)">内容</text>
        <circle cx="232" cy="232" r="3"/><text x="240" y="245" fill="rgba(242,200,121,0.8)">增长</text>
        <circle cx="140" cy="268" r="3"/><text x="140" y="256" fill="rgba(242,200,121,0.8)">商业</text>
        <circle cx="48" cy="232" r="3"/><text x="40" y="245" fill="rgba(242,200,121,0.8)">竞争</text>
        <circle cx="12" cy="140" r="3"/><text x="18" y="155" fill="rgba(242,200,121,0.8)">时机</text>
        <circle cx="48" cy="48" r="3"/><text x="40" y="55" fill="rgba(242,200,121,0.8)">生态</text>
      </g>
      <!-- 连线 -->
      <polygon points="140,12 232,48 268,140 232,232 140,268 48,232 12,140 48,48" stroke="rgba(242,200,121,0.1)" stroke-width="1" fill="none"/>
    </svg>
    <div class="ring-center">
      <p style="font-size:11px">今日想给谁算一卦？</p>
    </div>
  </div>

  <div class="input-row">
    <input id="productInput" type="text" placeholder="输入产品名称，例如：豆包、Perplexity、微信读书" autocomplete="off"/>
    <button class="btn" onclick="startReading()">开始排盘</button>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button class="btn-ghost" onclick="randomProduct()">🎲 随机一个</button>
  </div>
</div>

<!-- ══ 幕1：定日主 ══ -->
<div class="scene" id="s1">
  <div>
    <p class="scene-title">产品没有出生时辰，但它有自己的核心命格</p>
    <p class="scene-sub" style="margin-top:8px">先告诉我：你觉得 <b id="productName1" style="color:var(--gold)"></b> 靠什么活着？</p>
  </div>
  <div class="daymaster-grid" id="dmGrid"></div>
  <div class="dm-selected-bar" id="dmSelectedBar">已定日主：<b id="dmSelectedText"></b></div>
  <div class="s1-actions">
    <button class="btn-ghost" onclick="randomDaymaster()">不确定，让系统替我判断</button>
    <button class="btn" id="s1Next" onclick="goScene(2)" disabled style="opacity:.4">下一步 →</button>
  </div>
  <button class="btn-ghost" onclick="goScene(0)" style="margin-top:4px;font-size:12px">← 重新输入</button>
</div>

<!-- ══ 幕2：八维打分 ══ -->
<div class="scene" id="s2">
  <div>
    <p class="scene-title" style="margin-bottom:8px">为 <b id="productName2" style="color:var(--gold)"></b> 排八维命盘</p>
    <p class="scene-sub">拨动命珠，观察命格变化</p>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab" onclick="setMode(0)" id="tab0">✋ 我自己看</button>
    <button class="mode-tab" onclick="setMode(1)" id="tab1">🤖 AI 帮我排</button>
    <button class="mode-tab active" onclick="setMode(2)" id="tab2">⚖️ 人机合盘</button>
  </div>
  <div class="radar-sliders">
    <div class="radar-wrap">
      <canvas id="radarCanvas" width="300" height="300"></canvas>
    </div>
    <div class="sliders-wrap" id="slidersWrap"></div>
  </div>
  <div class="diff-notice" id="diffNotice"></div>
  <div class="s2-footer">
    <button class="btn-ghost" onclick="goScene(1)">← 重选日主</button>
    <button class="btn" onclick="openBook()">开命书 →</button>
  </div>
</div>

<!-- ══ 命书展开动画 ══ -->
<div id="book-overlay">
  <svg width="300" height="4" viewBox="0 0 300 4">
    <line id="book-line" x1="0" y1="2" x2="300" y2="2" stroke="var(--gold)" stroke-width="3" stroke-linecap="round"/>
  </svg>
  <div class="stamp" id="bookStamp">🔮</div>
  <div class="stamp-text" id="bookStampText"></div>
</div>

<!-- ══ 幕3：命书 ══ -->
<div class="scene" id="s3">
  <div>
    <p class="scene-title">📜 产品命书</p>
    <p class="scene-sub" id="bookSubtitle"></p>
  </div>
  <div class="book-cols">
    <!-- 左列 -->
    <div class="id-card">
      <div class="id-product" id="bookProduct"></div>
      <div class="id-grid">
        <div class="id-item"><label>日主</label><span id="bookDaymaster"></span></div>
        <div class="id-item"><label>命格</label><span id="bookGe"></span></div>
        <div class="id-item"><label>当前阶段</label><span id="bookStage"></span></div>
        <div class="id-item"><label>综合运势</label><span class="stars" id="bookStars"></span></div>
      </div>
      <div class="yi-ji">
        <div>宜：<span class="yi" id="bookYi"></span></div>
        <div style="margin-top:4px">忌：<span class="ji" id="bookJi"></span></div>
      </div>
    </div>

    <!-- 中列 -->
    <div>
      <!-- 先天命格 -->
      <div class="book-section">
        <h4>先天命格</h4>
        <div class="flip-card" id="flipCard">
          <div class="flip-inner">
            <div class="flip-face" id="bookFate"></div>
            <div class="flip-face flip-back" id="bookFatePlain"></div>
          </div>
        </div>
        <button class="flip-btn" onclick="document.getElementById('flipCard').classList.toggle('flipped');this.textContent=this.textContent.includes('翻译')? '查看命理原文':'翻译成人话'">翻译成人话</button>
      </div>
      <!-- 大运 -->
      <div class="book-section">
        <h4>大运时间轴</h4>
        <div class="timeline" id="timeline"></div>
      </div>
      <!-- 流年 -->
      <div class="book-section">
        <h4>2026 丙午流年</h4>
        <div class="liunnian-grid" id="liunnianGrid"></div>
        <div class="ln-verdict" id="lnVerdict"></div>
      </div>
    </div>

    <!-- 右列 -->
    <div class="side-section">
      <div class="book-section">
        <h4>贵人签</h4>
        <div class="tags-wrap" id="guirenTags"></div>
      </div>
      <div class="book-section">
        <h4>小人签</h4>
        <div class="tags-wrap" id="xiaorenTags"></div>
      </div>
      <div class="book-section">
        <h4>改命三策</h4>
        <button class="btn-teal" id="qianBtn" onclick="drawQian()" style="width:100%">🎋 抽一支改命签</button>
        <div class="qian-result" id="qianResult">
          <div class="qian-grade" id="qianGrade"></div>
          <div class="qian-text" id="qianText"></div>
          <div class="qian-translate" id="qianTranslate"></div>
        </div>
      </div>
      <button class="btn-ghost" onclick="goScene(0)" style="width:100%">重新排盘</button>
    </div>
  </div>
</div>

<!-- 今日签弹窗 -->
<div class="modal-overlay" id="signModal" onclick="if(event.target===this)closeSign()">
  <div class="modal">
    <button class="modal-close" onclick="closeSign()">✕</button>
    <h3>今日产品签</h3>
    <div class="sign-grade" id="signGrade"></div>
    <div class="sign-text" id="signText"></div>

// ── 幕1：日主 ────────────────────────────────────────────────
function buildDaymasters(){
  const grid=document.getElementById('dmGrid');
  grid.innerHTML='';
  DAYMASTERS.forEach((dm,i)=>{
    const d=document.createElement('div');

    d.innerHTML=`<div class="dm-emoji">${dm.emoji}</div>

    grid.appendChild(d);

function selectDaymaster(i){
  selectedDM=i;
  document.querySelectorAll('.dm-card').forEach((c,j)=>c.classList.toggle('selected',j===i));
  const dm=DAYMASTERS[i];
  document.getElementById('dmSelectedText').textContent=`${dm.char} · ${dm.type}`;
  document.getElementById('dmSelectedBar').style.display='block';
  const btn=document.getElementById('s1Next');
  btn.disabled=false; btn.style.opacity='1';
  // 根据日主预设 AI 分微调
  if(i===4){AI_SCORES[3]=8;AI_SCORES[2]=7;} // 壬水：传播强
  if(i===5){AI_SCORES[5]=8;AI_SCORES[3]=7;} // 癸水：留存强
}

// ── 幕2：滑杆 + 雷达 ─────────────────────────────────────────
function setMode(m){
  mode=m;
  ['tab0','tab1','tab2'].forEach((id,j)=>document.getElementById(id).classList.toggle('active',j===m));
  if(m===1){// AI 自动
    userScores=[...AI_SCORES];
    document.querySelectorAll('.dim-slider').forEach((s,i)=>{s.value=AI_SCORES[i];updateSlider(i);});
  }
  updateDiffNotice();
  drawRadar();
}

function buildSliders(){
  const wrap=document.getElementById('slidersWrap');
  wrap.innerHTML='';
  DIMS.forEach((dim,i)=>{
    const row=document.createElement('div');
    row.className='slider-row';
    const lvl=scoreLvl(userScores[i]);
    row.innerHTML=`
      <div class="slider-label">
        <span class="slider-name">${dim.name}</span>
        <span class="slider-badge ${userScores[i]>=7?'badge-warn':'badge-normal'} dim-badge" id="badge${i}">${dim.labels[lvl]}</span>
      </div>
      <input type="range" class="dim-slider" id="slider${i}" min="1" max="10" value="${userScores[i]}" oninput="onSlider(${i},this.value)">
      <div class="slider-comment" id="comment${i}">${dim.comments[lvl]}</div>`;
    wrap.appendChild(row);
  });
}
function scoreLvl(v){return v<=3?0:v<=7?1:2;}
function onSlider(i,v){
  userScores[i]=+v;
  updateSlider(i);
  updateDiffNotice();
  drawRadar();
}
function updateSlider(i){
  const lvl=scoreLvl(userScores[i]);
  const badge=document.getElementById('badge'+i);
  if(badge){badge.textContent=DIMS[i].labels[lvl];badge.className='slider-badge '+(userScores[i]>=8?'badge-warn':'badge-normal')+' dim-badge';}
  const comment=document.getElementById('comment'+i);
  if(comment) comment.textContent=DIMS[i].comments[lvl];
}
function updateDiffNotice(){
  if(mode!==2){document.getElementById('diffNotice').textContent='';return;}
  let maxDiff=0,maxIdx=0;
  userScores.forEach((v,i)=>{const d=Math.abs(v-AI_SCORES[i]);if(d>maxDiff){maxDiff=d;maxIdx=i;}});
  document.getElementById('diffNotice').textContent=maxDiff>=2?`你与AI在「${DIMS[maxIdx].name}」上的判断差异最大`:'';
}

function drawRadar(){
  const canvas=document.getElementById('radarCanvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const cx=150,cy=150,r=110,n=8;
  ctx.clearRect(0,0,300,300);
  // 背景蜘蛛网
  for(let ring=1;ring<=5;ring++){
    ctx.beginPath();
    for(let i=0;i<n;i++){
      const a=Math.PI/2+2*Math.PI*i/n;
      const rr=r*ring/5;
      i===0?ctx.moveTo(cx+rr*Math.cos(a),cy-rr*Math.sin(a)):ctx.lineTo(cx+rr*Math.cos(a),cy-rr*Math.sin(a));
    }
    ctx.closePath();
    ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.stroke();
  }
  // 轴线
  for(let i=0;i<n;i++){
    const a=Math.PI/2+2*Math.PI*i/n;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a),cy-r*Math.sin(a));
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.stroke();
    // 标签
    ctx.fillStyle='rgba(242,200,121,0.7)';ctx.font='11px PingFang SC,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    const la=Math.PI/2+2*Math.PI*i/n;
    ctx.fillText(DIMS[i].name,(cx+(r+18)*Math.cos(la)),(cy-(r+18)*Math.sin(la)));
  }
  // 用户数据
  const drawPolygon=(scores,color,fill)=>{
    ctx.beginPath();
    scores.forEach((v,i)=>{
      const a=Math.PI/2+2*Math.PI*i/n;
      const rv=r*(v/10);
      i===0?ctx.moveTo(cx+rv*Math.cos(a),cy-rv*Math.sin(a)):ctx.lineTo(cx+rv*Math.cos(a),cy-rv*Math.sin(a));
    });
    ctx.closePath();
    if(fill){ctx.fillStyle=fill;ctx.fill();}
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.stroke();
  };
  if(mode===2) drawPolygon(AI_SCORES,'rgba(180,160,220,0.5)','rgba(180,160,220,0.08)');
  drawPolygon(userScores,'rgba(227,93,106,0.9)','rgba(227,93,106,0.15)');
}

function openBook(){
  const overlay=document.getElementById('book-overlay');
  overlay.classList.add('show');
  // 金线动画
  const line=document.getElementById('book-line');
  setTimeout(()=>{line.style.strokeDashoffset='0';},100);
  // 印章
  const stamps=STAMP_TEXTS;
  const stampText=stamps[Math.floor(Math.random()*stamps.length)];
  setTimeout(()=>{
    document.getElementById('bookStamp').classList.add('pop');
    document.getElementById('bookStampText').textContent=stampText;
    document.getElementById('bookStampText').classList.add('show');
  },1300);
  setTimeout(()=>{
    overlay.classList.remove('show');
    line.style.strokeDashoffset='2000';
    document.getElementById('bookStamp').classList.remove('pop');
    document.getElementById('bookStampText').classList.remove('show');
    buildBook();
    goScene(3);
  },2600);
}

// ── 构建命书 ─────────────────────────────────────────────────
function buildBook(){
  const dm=DAYMASTERS[selectedDM||0];
  const scores=userScores;
  const total=scores.reduce((a,b)=>a+b,0);
  // 命格
  let ge='中和稳命格';
  for(const r of GE_RULES){if(r.check(scores)){ge=r.name;break;}}
  // 当前阶段
  const stageIdx=total>=70?3:total>=55?2:total>=40?1:0;
  // 星数
  const stars=Math.round(total/80*5);
  const starStr='★'.repeat(stars)+'☆'.repeat(5-stars);
  // 宜忌
  let maxI=0,minI=0;
  scores.forEach((v,i)=>{if(v>scores[maxI])maxI=i;if(v<scores[minI])minI=i;});
  // 流年
  const tiandi=scores[7]>=7?'旺':scores[7]>=4?'中':'弱';
  const dili=scores[4]>=6?'旺':scores[4]>=3?'中':'弱';
  const renhe=scores[0]>=7?'旺':scores[0]>=4?'中':'弱';

  document.getElementById('bookProduct').textContent=productName;
  document.getElementById('bookSubtitle').textContent=`${dm.char}型 · ${ge}`;
  document.getElementById('bookDaymaster').textContent=dm.char;
  document.getElementById('bookGe').textContent=ge;
  document.getElementById('bookStage').textContent=STAGES[stageIdx];
  document.getElementById('bookStars').textContent=starStr;
  document.getElementById('bookYi').textContent=YI_MAP[maxI];
  document.getElementById('bookJi').textContent=JI_MAP[minI];

  // 命格文字
  const fateText=genFate(dm,ge,scores,maxI,minI);
  document.getElementById('bookFate').textContent=fateText.classical;
  document.getElementById('bookFatePlain').textContent=fateText.plain;

  // 时间轴
  const tl=document.getElementById('timeline');
  tl.innerHTML=TIMELINE_NODES.map(n=>`<div class="tl-node${n.current?' current':''}">
    <div class="tl-dot"></div>
    <div class="tl-label">${n.label}</div>
    <div class="tl-year">${n.years}</div>
  </div>`).join('');

  // 流年
  document.getElementById('liunnianGrid').innerHTML=`
    <div class="ln-item"><div class="ln-name">天时</div><div class="ln-val ${tiandi==='旺'?'wang':tiandi==='中'?'zhong':'ruo'}">${tiandi}</div></div>
    <div class="ln-item"><div class="ln-name">地利</div><div class="ln-val ${dili==='旺'?'wang':dili==='中'?'zhong':'ruo'}">${dili}</div></div>
    <div class="ln-item"><div class="ln-name">人和</div><div class="ln-val ${renhe==='旺'?'wang':renhe==='中'?'zhong':'ruo'}">${renhe}</div></div>`;
  document.getElementById('lnVerdict').textContent=genVerdict(tiandi,dili,renhe);

  // 贵人小人
  document.getElementById('guirenTags').innerHTML=dm.guiren.map(t=>`<span class="tag-gui">${t}</span>`).join('');
  const xiaorenExtra=scores[6]>=8?['同类竞品激烈','免费替代品']:scores[4]<=4?['商业模式不稳','付费意愿低']:[' 用户迁移成本低'];
  document.getElementById('xiaorenTags').innerHTML=[...dm.xiaorenBase,...xiaorenExtra].map(t=>`<span class="tag-xiao">${t}</span>`).join('');
}

function genFate(dm,ge,scores,maxI,minI){
  const advDim=DIMS[maxI].name, weakDim=DIMS[minI].name;
  const classical=`此产品${dm.char}为体，以${dm.type}为命。${ge}，得${advDim}相助，颇具${scores[maxI]>=8?'旺势':'稳势'}。然${weakDim}不显，${scores[minI]<=3?'根基尚浅，需谨慎布局':'仍有精进空间'}。${scores[6]>=8?'比劫临身，强敌环伺，若不能形成独占入口，恐有声量大于壁垒之象。':''}当前正值出圈运，若能借势而为，则可转危为机。`;
  const plain=`这个产品的核心优势在${advDim}，做得不错。但${weakDim}还有提升空间，${scores[minI]<=3?'目前是明显短板，需要重点投入。':'可以作为下一阶段的重点方向。'}${scores[6]>=8?'竞品很多，关键是建立用户无法轻易迁移的习惯或壁垒。':''}整体来看，现在是比较好的窗口期，要抓住时机快速建立优势。`;
  return {classical,plain};
}

function genVerdict(tiandi,dili,renhe){
  if(tiandi==='旺'&&renhe==='旺') return '天时人和皆备，宜乘势扩张，快速建立心智认知。';
  if(tiandi==='旺'&&dili!=='旺') return '有天时，无绝对地利；宜借合作入局，不宜孤军争渠道。';
  if(dili==='旺') return '渠道资源充沛，宜深化运营转化，而非盲目扩张。';
  if(renhe==='弱') return '用户口碑待建立，宜先做深度服务少数核心用户，再图规模。';
  return '当前形势平稳，宜稳扎稳打，积累核心用户壁垒。';
}

function drawQian(){
  const btn=document.getElementById('qianBtn');
  btn.classList.add('shaking');
  setTimeout(()=>{btn.classList.remove('shaking');},500);
  const minI=userScores.indexOf(Math.min(...userScores));
  const q=QIAN_DATA[minI]||QIAN_DATA[0];
  const result=document.getElementById('qianResult');
  document.getElementById('qianGrade').textContent=q.grade;
  document.getElementById('qianGrade').style.color=q.grade.includes('上')? 'var(--teal)':'var(--red)';
  document.getElementById('qianText').textContent=q.text;
  document.getElementById('qianTranslate').textContent='白话版：'+q.translate;
  result.classList.add('show');
  setTimeout(()=>result.classList.remove('show'),8000);
}

// ── 背景粒子 ─────────────────────────────────────────────────
(function(){
  const canvas=document.getElementById('bg');
  const ctx=canvas.getContext('2d');
  let W,H,mx=0,my=0;
  const pts=Array.from({length:60},()=>({
    x:Math.random(),y:Math.random(),
    vx:(Math.random()-.5)*.0003,vy:(Math.random()-.5)*.0003,
    r:Math.random()*1.5+.5,o:Math.random()*.5+.1
  }));
  function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
  window.addEventListener('resize',resize);resize();
  window.addEventListener('mousemove',e=>{mx=e.clientX/W;my=e.clientY/H;});
  function draw(){
    ctx.clearRect(0,0,W,H);
    // 网格
    ctx.strokeStyle='rgba(101,194,182,0.03)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    pts.forEach(p=>{
      p.x+=p.vx+(mx-.5)*.0001;p.y+=p.vy+(my-.5)*.0001;
      if(p.x<0)p.x=1;if(p.x>1)p.x=0;if(p.y<0)p.y=1;if(p.y>1)p.y=0;
      ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(242,200,121,${p.o})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── 初始化 ────────────────────────────────────────────────────
userScores=[...AI_SCORES];
buildSliders();
</script>
