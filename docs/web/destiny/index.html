<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品命理局 — AI产品诊断 × 东方命理</title>
<style>
:root{
--bg-primary:#F6F0E7;--bg-secondary:#EFE5D8;
--surface-primary:#FFFCF7;--surface-secondary:#F7EEE3;
--text-primary:#3F372F;--text-secondary:#74695E;--text-muted:#A09387;
--accent-primary:#C86458;--accent-gold:#B79038;--accent-green:#6F9C8B;
--accent-blue:#7895AD;--accent-purple:#8E82AD;--accent-yellow:#D3AA4A;
--border-soft:rgba(75,61,48,0.12);--border-medium:rgba(75,61,48,0.22);
--shadow-soft:0 18px 50px rgba(78,61,45,0.08);--shadow-medium:0 12px 36px rgba(78,61,45,0.12);
--shadow-lifted:0 24px 60px rgba(78,61,45,0.16);
--ease-micro:cubic-bezier(0.4,0,0.2,1);--ease-card:cubic-bezier(0.25,0.46,0.45,0.94);
--ease-enter:cubic-bezier(0.16,1,0.3,1);
--dur-micro:150ms;--dur-card:280ms;--dur-content:420ms;
--font-title:Georgia,'Noto Serif SC',serif;
--font-body:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;
--font-data:'SF Mono','Cascadia Code','Consolas',monospace;
--font-seal:'KaiTi','STKaiti',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{margin:0}
body{font-family:var(--font-body);color:var(--text-primary);background:var(--bg-primary);-webkit-font-smoothing:antialiased;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(circle at 12% 18%,rgba(200,100,88,0.04),transparent 40%),radial-gradient(circle at 88% 72%,rgba(111,156,139,0.05),transparent 35%)}
.serif{font-family:var(--font-title)}.seal-font{font-family:var(--font-seal)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:clamp(40px,5vh,48px);padding:clamp(10px,1.5vh,12px) clamp(24px,3vw,32px);border-radius:12px;border:none;font-size:clamp(14px,1.6vw,15px);font-weight:600;cursor:pointer;transition:all var(--dur-micro) var(--ease-micro)}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent-primary);color:#FFF;box-shadow:0 4px 12px rgba(200,100,88,0.25)}
.btn-primary:hover{background:#B85A4F;transform:translateY(-1px)}
.btn-gold{background:linear-gradient(135deg,var(--accent-gold),#9A7A30);color:#FFF}
.btn-secondary{background:transparent;border:1px solid var(--border-medium);color:var(--text-secondary)}
.btn-secondary:hover{border-color:var(--accent-gold);color:var(--accent-gold)}
.btn-small{min-height:clamp(32px,4vh,38px);padding:6px 16px;font-size:clamp(12px,1.4vw,13px);border-radius:8px}
.card{background:var(--surface-primary);border:1px solid var(--border-soft);border-radius:16px;padding:clamp(16px,2vw,24px);box-shadow:var(--shadow-soft)}
.back-btn{position:fixed;top:16px;left:16px;z-index:999;display:flex;align-items:center;gap:6px;padding:7px 14px 7px 10px;background:rgba(255,252,247,0.85);backdrop-filter:blur(8px);border:1px solid var(--border-soft);border-radius:20px;color:var(--text-secondary);font-size:13px;text-decoration:none;transition:all .2s}
.back-btn:hover{background:rgba(183,144,56,0.08);color:var(--accent-gold);transform:translateX(-2px)}
.back-btn svg{width:14px;height:14px}
.tag{display:inline-flex;font-size:11px;padding:3px 10px;border-radius:12px;white-space:nowrap}
.tag-gold{background:rgba(183,144,56,0.1);border:1px solid rgba(183,144,56,0.25);color:var(--accent-gold)}
.tag-green{background:rgba(111,156,139,0.1);border:1px solid rgba(111,156,139,0.25);color:var(--accent-green)}
.tag-red{background:rgba(200,100,88,0.08);border:1px solid rgba(200,100,88,0.2);color:var(--accent-primary)}
.tag-purple{background:rgba(142,130,173,0.1);border:1px solid rgba(142,130,173,0.2);color:var(--accent-purple)}

/* ═══ PHASE MANAGER ═══ */
.phase{display:none}
.phase.active{display:block}
#phaseHero:not(.active),#phaseInfer:not(.active),#phaseResult:not(.active){display:none!important}

/* ═══ PHASE 0: HERO / INPUT ═══ */
#phaseHero.active{min-height:100vh;display:flex;flex-direction:row;align-items:center}
.hero-bagua-wrap{width:44%;min-width:280px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:20px}
.hero-bagua-wrap svg{width:min(360px,90%);height:auto;transition:all .6s var(--ease-enter)}
.hero-bagua-wrap svg.has-product{filter:drop-shadow(0 0 20px rgba(183,144,56,0.15))}
.bagua-sector{transition:all .4s var(--ease-card);opacity:.5}.bagua-sector.lit{opacity:1}
.bagua-center-text{font-family:var(--font-title);font-size:12px;fill:var(--text-muted);text-anchor:middle;dominant-baseline:middle}
.bagua-center-text.active{fill:var(--accent-gold);font-size:14px;font-weight:700}
.hero-content{position:relative;z-index:3;flex:1;padding:0 clamp(24px,5vw,60px);display:flex;flex-direction:column;justify-content:center}
.hero-content h1{font-family:var(--font-title);font-size:clamp(26px,3.2vw,44px);line-height:1.3;margin-bottom:12px;color:var(--text-primary)}
.hero-content h1 span{background:linear-gradient(135deg,var(--accent-gold),var(--accent-primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-subtitle{color:var(--text-secondary);font-size:clamp(13px,1.5vw,16px);margin-bottom:clamp(20px,3vh,32px);line-height:1.6}
.hero-subtitle b{color:var(--accent-gold);font-weight:700}
.hero-input-group{display:flex;flex-direction:column;gap:12px;max-width:440px}
.hero-input{width:100%;height:clamp(46px,5.5vh,54px);border-radius:12px;border:1.5px solid var(--border-medium);background:var(--surface-primary);color:var(--text-primary);padding:0 16px;font-size:clamp(14px,1.6vw,16px);outline:none;transition:all var(--dur-micro)}
.hero-input:focus{border-color:var(--accent-gold);box-shadow:0 0 0 3px rgba(183,144,56,0.1)}
.hero-input::placeholder{color:var(--text-muted)}
.product-recognition{display:none;padding:9px 14px;background:rgba(111,156,139,0.08);border:1px solid rgba(111,156,139,0.25);border-radius:10px;font-size:13px;color:var(--accent-green)}
.product-recognition.show{display:flex;align-items:center;gap:8px}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.example-products{margin-top:clamp(14px,2vh,20px);display:flex;flex-wrap:wrap;gap:8px;max-width:440px}
.example-products .example-label{font-size:11px;color:var(--text-muted);width:100%;margin-bottom:2px}
.example-product-tag{font-size:12px;padding:4px 12px;border-radius:16px;background:var(--surface-secondary);border:1px solid var(--border-soft);color:var(--text-secondary);cursor:pointer;transition:all var(--dur-micro)}
.example-product-tag:hover{border-color:var(--accent-gold);color:var(--accent-gold)}
.today-qian{margin-top:clamp(12px,2vh,18px);padding:9px 16px;background:var(--surface-secondary);border:1px solid var(--border-soft);border-radius:10px;font-size:13px;display:flex;align-items:center;gap:8px;max-width:440px;cursor:pointer}
.today-qian .qian-text{flex:1;font-style:italic;color:var(--accent-gold)}
.today-qian .qian-refresh{font-size:11px;color:var(--text-muted)}

/* ═══ PHASE 1: AUTO-INFERENCE ANIMATION ═══ */
#phaseInfer.active{position:fixed;inset:0;z-index:200;background:var(--bg-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow:hidden}
.infer-stage{position:relative;width:min(560px,94vw);display:flex;flex-direction:column;align-items:center;text-align:center}
.infer-bagua{width:min(300px,72vw);height:min(300px,72vw);margin-bottom:16px}
.infer-bagua .infer-sector{opacity:.25;transition:opacity .5s var(--ease-enter),fill .5s var(--ease-enter)}
.infer-bagua .infer-sector.on{opacity:1}
.infer-status{min-height:26px;font-size:13px;color:var(--text-muted);letter-spacing:1px;display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:8px}
.infer-status .pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-green);animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.infer-productcard{opacity:0;transform:translateY(12px);transition:all .5s var(--ease-enter);width:100%;max-width:420px;background:var(--surface-primary);border:1px solid var(--border-soft);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow-soft);margin-bottom:12px}
.infer-productcard.show{opacity:1;transform:translateY(0)}
.ipc-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ipc-logo{width:38px;height:38px;border-radius:10px;background:var(--surface-secondary);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.ipc-name{font-family:var(--font-title);font-size:17px;font-weight:700;color:var(--accent-gold)}
.ipc-type{font-size:11px;color:var(--text-muted)}
.ipc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ipc-cell{background:var(--surface-secondary);border-radius:8px;padding:7px 10px}
.ipc-cell .k{font-size:10px;color:var(--text-muted);letter-spacing:.5px}
.ipc-cell .v{font-size:12px;color:var(--text-primary);font-weight:600;margin-top:2px}
.infer-wuxing-line{display:flex;gap:14px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.iw-item{display:flex;flex-direction:column;align-items:center;gap:3px;opacity:.25;transform:scale(.85);transition:all .45s var(--ease-enter)}
.iw-item.on{opacity:1;transform:scale(1)}
.iw-item .iw-sym{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#FFF}
.iw-item .iw-label{font-size:10px;color:var(--text-secondary)}
.infer-dayzhu{opacity:0;transform:scale(.6);transition:all .5s cubic-bezier(0.34,1.56,0.64,1);font-family:var(--font-seal);font-size:clamp(24px,5vw,34px);color:var(--accent-primary);border:3px solid var(--accent-primary);border-radius:8px;padding:8px 24px;letter-spacing:4px;margin-bottom:14px}
.infer-dayzhu.show{opacity:1;transform:scale(1)}
.infer-verdict{opacity:0;transform:translateY(10px);transition:all .5s var(--ease-enter);max-width:460px;font-size:clamp(15px,2vw,19px);font-family:var(--font-title);line-height:1.6;color:var(--text-primary);padding:14px 18px;background:var(--surface-secondary);border-left:3px solid var(--accent-gold);border-radius:0 10px 10px 0}
.infer-verdict.show{opacity:1;transform:translateY(0)}
.infer-skip{position:fixed;bottom:24px;right:24px;font-size:12px;color:var(--text-muted);cursor:pointer;padding:8px 16px;border:1px solid var(--border-soft);border-radius:20px;background:rgba(255,252,247,0.7);transition:all .2s}
.infer-skip:hover{border-color:var(--accent-gold);color:var(--accent-gold)}

/* ═══ PHASE 2: RESULT (scroll long-scroll) ═══ */
#phaseResult.active{display:block;position:relative;z-index:1;animation:fadeIn .6s var(--ease-enter)}
.result-layout{max-width:1180px;margin:0 auto;padding:clamp(56px,8vh,72px) clamp(14px,3vw,28px) 80px;display:flex;gap:clamp(16px,2.4vw,32px);align-items:flex-start}
.result-rail{position:sticky;top:20px;width:clamp(220px,26%,300px);flex-shrink:0;display:flex;flex-direction:column;gap:12px;align-self:flex-start}
.rail-bagua{background:var(--surface-primary);border:1px solid var(--border-soft);border-radius:16px;padding:14px;box-shadow:var(--shadow-soft);display:flex;flex-direction:column;align-items:center}
.rail-bagua svg{width:100%;max-width:240px;height:auto}
.rail-bagua .rb-name{margin-top:6px;font-family:var(--font-title);font-size:15px;color:var(--accent-gold);text-align:center}
.rail-bagua .rb-dz{font-size:11px;color:var(--text-muted);text-align:center;margin-top:2px}
.rail-nav{background:var(--surface-primary);border:1px solid var(--border-soft);border-radius:14px;padding:8px;display:flex;flex-direction:column;gap:2px}
.rail-nav a{font-size:12px;color:var(--text-secondary);padding:7px 12px;border-radius:8px;text-decoration:none;transition:all .2s;display:flex;align-items:center;gap:8px;cursor:pointer}
.rail-nav a:hover{background:var(--surface-secondary);color:var(--accent-gold)}
.rail-nav a.on{background:rgba(183,144,56,0.08);color:var(--accent-gold);font-weight:600}
.rail-nav a .rn-num{font-size:10px;width:18px;height:18px;border-radius:6px;background:var(--surface-secondary);display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.rail-nav a.on .rn-num{background:var(--accent-gold);color:#FFF}
.result-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:clamp(16px,2.4vh,26px)}
.result-mobile-bagua{display:none}

.chapter{background:var(--surface-primary);border:1px solid var(--border-soft);border-radius:16px;padding:clamp(16px,2.2vw,26px);box-shadow:var(--shadow-soft);opacity:0;transform:translateY(26px);transition:opacity .6s var(--ease-enter),transform .6s var(--ease-enter)}
.chapter.reveal{opacity:1;transform:translateY(0)}
.chapter-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border-soft)}
.chapter-header .ch-num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#FFF;background:var(--accent-gold);flex-shrink:0}
.chapter-header h3{font-family:var(--font-title);font-size:clamp(15px,1.9vw,19px)}
.chapter-header .ch-subtitle{font-size:12px;color:var(--text-muted);margin-left:auto}

/* Ch: verdict/hero-result */
.rv-top{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.rv-product{font-family:var(--font-title);font-size:clamp(24px,3.4vw,38px);color:var(--accent-gold)}
.rv-mingge{font-size:clamp(14px,1.8vw,17px);color:var(--accent-green)}
.rv-verdict-line{font-family:var(--font-title);font-size:clamp(16px,2.2vw,22px);line-height:1.5;color:var(--text-primary);margin-bottom:10px}
.rv-verdict-explain{font-size:clamp(13px,1.5vw,15px);color:var(--text-secondary);line-height:1.7;margin-bottom:18px;padding:12px 16px;background:var(--surface-secondary);border-radius:10px;border-left:3px solid var(--accent-gold)}
.rv-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.rv-card{padding:14px;background:var(--surface-secondary);border-radius:12px;text-align:center}
.rv-card .rc-label{font-size:10px;color:var(--text-muted);letter-spacing:1px;margin-bottom:6px}
.rv-card .rc-value{font-size:clamp(14px,1.7vw,16px);font-weight:700}
.rv-card.strength .rc-value{color:var(--accent-green)}
.rv-card.weakness .rc-value{color:var(--accent-primary)}
.rv-card.mission .rc-value{color:var(--accent-gold)}
.rv-card.status .rc-value{color:var(--accent-purple)}

/* dual-layer 命理 + 人话 */
.dual-toggle{display:inline-flex;gap:0;border:1px solid var(--border-soft);border-radius:10px;overflow:hidden;margin-bottom:14px}
.dual-toggle button{font-size:12px;padding:6px 14px;background:var(--surface-secondary);border:none;color:var(--text-muted);cursor:pointer;transition:all .2s}
.dual-toggle button.active{background:var(--accent-gold);color:#FFF}
.dual-layer{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dual-layer.stack{grid-template-columns:1fr}
.dual-box{padding:14px 16px;border-radius:12px;line-height:1.8;font-size:13px}
.dual-box.mystic{background:var(--surface-secondary);border:1px solid var(--border-soft);color:var(--text-primary)}
.dual-box.mystic .db-tag{color:var(--accent-purple)}
.dual-box.plain{background:rgba(183,144,56,0.05);border:1px solid rgba(183,144,56,0.18);color:var(--text-primary)}
.dual-box.plain .db-tag{color:var(--accent-gold)}
.dual-box .db-tag{font-size:10px;letter-spacing:1px;display:block;margin-bottom:6px;font-weight:600}
.dual-box.hide{display:none}
.ming-risk{font-size:12px;color:var(--accent-primary);margin-top:12px;padding:8px 12px;background:rgba(200,100,88,0.05);border-radius:8px}
.ming-advice{font-size:12px;color:var(--accent-green);margin-top:8px;padding:8px 12px;background:rgba(111,156,139,0.05);border-radius:8px}

/* wuxing bars */
.wuxing-bars{display:flex;flex-direction:column;gap:8px;margin:8px 0}
.wuxing-bar{display:flex;align-items:center;gap:10px}
.wuxing-bar .label{width:64px;font-size:12px;color:var(--text-secondary)}
.wuxing-bar .bar{flex:1;height:8px;background:var(--surface-secondary);border-radius:4px;overflow:hidden}
.wuxing-bar .bar-fill{height:100%;border-radius:4px;transition:width .8s var(--ease-enter)}
.wuxing-bar .val{width:36px;text-align:right;font-size:11px;color:var(--text-muted);font-family:var(--font-data)}
.bar-wood{background:var(--accent-green)}.bar-fire{background:var(--accent-primary)}.bar-earth{background:var(--accent-gold)}.bar-metal{background:var(--accent-blue)}.bar-water{background:var(--accent-purple)}
.meter-row{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:12px}
.meter-label{width:52px;color:var(--text-secondary)}
.meter-bar{flex:1;height:6px;background:var(--surface-secondary);border-radius:3px;overflow:hidden}
.meter-fill{height:100%;border-radius:3px;transition:width .8s var(--ease-enter)}
.meter-pct{width:34px;text-align:right;color:var(--accent-gold);font-size:11px;font-family:var(--font-data)}
.yi-ji{margin-top:14px;display:flex;flex-direction:column;gap:4px}.yi{color:var(--accent-green);font-size:12px}.ji{color:var(--accent-primary);font-size:12px}

/* eight-dim list */
.dim-list{display:flex;flex-direction:column;gap:8px}
.dim-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface-secondary);border-radius:10px;transition:all .3s var(--ease-card);border:1px solid transparent}
.dim-item.hl{border-color:rgba(183,144,56,0.4);background:rgba(183,144,56,0.06)}
.dim-item .di-name{width:76px;font-size:12px;color:var(--text-primary);flex-shrink:0}
.dim-item .di-bar{flex:1;height:6px;background:rgba(75,61,48,0.08);border-radius:3px;overflow:hidden}
.dim-item .di-fill{height:100%;border-radius:3px}
.dim-item .di-val{width:26px;text-align:right;font-size:12px;font-weight:700;font-family:var(--font-data);color:var(--accent-gold)}
.dim-item .di-tag{font-size:10px;color:var(--accent-purple);width:64px;text-align:right;flex-shrink:0}
.dim-item .di-feedback{font-size:11px;color:var(--text-muted);flex-basis:100%;margin-left:86px;margin-top:2px;line-height:1.4}

/* dayun timeline auto-play */
.dayun-timeline{display:flex;gap:0;overflow-x:auto;padding:16px 4px 8px;margin:4px 0;scroll-behavior:smooth}
.dayun-node{flex:0 0 auto;text-align:center;padding:8px 16px;cursor:pointer;position:relative;transition:all .3s}
.dayun-node::after{content:'';position:absolute;top:26px;right:0;width:20px;height:1px;background:var(--border-soft)}
.dayun-node:last-child::after{display:none}
.dayun-dot{width:12px;height:12px;border-radius:50%;background:var(--surface-secondary);border:2px solid var(--text-muted);margin:0 auto 6px;transition:all .3s}
.dayun-node.playing .dayun-dot{background:var(--accent-purple);border-color:var(--accent-purple)}
.dayun-node.current .dayun-dot{background:var(--accent-gold);border-color:var(--accent-gold);animation:breathe 2s ease-in-out infinite}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(183,144,56,0.4)}50%{box-shadow:0 0 0 6px rgba(183,144,56,0)}}
.dayun-name{font-size:11px;color:var(--text-muted);white-space:nowrap}
.dayun-node.current .dayun-name{color:var(--accent-gold);font-weight:600}
.dayun-node.playing .dayun-name{color:var(--accent-purple);font-weight:600}
.dayun-controls{display:flex;align-items:center;gap:10px;margin:8px 0}
.dayun-controls button{font-size:12px;padding:5px 14px;border-radius:8px;border:1px solid var(--border-soft);background:var(--surface-primary);color:var(--text-secondary);cursor:pointer;transition:all .2s}
.dayun-controls button:hover{border-color:var(--accent-gold);color:var(--accent-gold)}
.dayun-detail{margin-top:8px;padding:14px;background:var(--surface-secondary);border-radius:10px;font-size:12px;color:var(--text-secondary);line-height:1.7;min-height:80px}
.dayun-detail .dd-title{font-family:var(--font-title);font-size:14px;color:var(--accent-gold);margin-bottom:6px}
.dayun-detail .dd-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.dayun-detail .dd-item{font-size:11px}.dayun-detail .dd-item strong{color:var(--text-primary)}

/* liunian */

.result-footer-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px}

/* ═══════════════════════ RESULT 事件绑定 ═══════════════════════ */
function bindResultEvents(){
document.getElementById('reloadBtn2').addEventListener('click',function(){location.reload()});
document.getElementById('shareBtn').addEventListener('click',shareFortune);
/* rail nav */
document.querySelectorAll('#railNav a').forEach(function(a){a.addEventListener('click',function(){var el=document.getElementById(a.getAttribute('data-target'));if(el)el.scrollIntoView({behavior:'smooth',block:'start'})})});
/* dual toggle */
document.querySelectorAll('#dualToggle button').forEach(function(b){b.addEventListener('click',function(){
document.querySelectorAll('#dualToggle button').forEach(function(x){x.classList.remove('active')});b.classList.add('active');
var mode=b.getAttribute('data-mode');var layer=document.getElementById('dualLayer');
var mystic=layer.querySelector('.mystic'),plain=layer.querySelector('.plain');
layer.classList.toggle('stack',mode!=='both');
mystic.classList.toggle('hide',mode==='plain');plain.classList.toggle('hide',mode==='mystic');
trackEvent('dual_toggle',{mode:mode})})});
/* guiren/xiaoren tags */
document.querySelectorAll('.gx-tag').forEach(function(t){t.addEventListener('click',function(){t.classList.toggle('expanded')})});
/* dayun */
setupDayun();
/* remedy simulator */
document.querySelectorAll('#gmDirs .gm-dir').forEach(function(d){d.addEventListener('click',function(){selectRemedy(d.getAttribute('data-remedy'),d)})});
/* scroll reveal + highlight */
window.addEventListener('scroll',onResultScroll,{passive:true});
}

/* ═══════════════════════ 大运自动播放 ═══════════════════════ */
var dayunTimer=null,dayunIdx=0,dayunPlaying=true;
function renderDayunDetail(i){
var d=DAYUN_DETAIL[i]||DAYUN_DETAIL[DAYUN_DETAIL.length-1];
var el=document.getElementById('dayunDetail');if(!el)return;
el.innerHTML='<div class="dd-title">'+DAYUN_NODES[i]+'</div><p>'+DAYUN_DESC[i]+'</p><div class="dd-grid"><div class="dd-item"><strong>适合做：</strong>'+d.do+'</div><div class="dd-item"><strong>不适合：</strong>'+d.notDo+'</div><div class="dd-item"><strong>关键指标：</strong>'+d.metric+'</div><div class="dd-item"><strong>风险：</strong>'+d.risk+'</div></div>';
document.querySelectorAll('#dayunTimeline .dayun-node').forEach(function(n,idx){n.classList.toggle('playing',idx===i)});
var node=document.querySelectorAll('#dayunTimeline .dayun-node')[i];
if(node&&node.scrollIntoView){var tl=document.getElementById('dayunTimeline');if(tl)tl.scrollLeft=node.offsetLeft-tl.clientWidth/2+node.clientWidth/2}
}
function stepDayun(){renderDayunDetail(dayunIdx);dayunIdx=(dayunIdx+1)%DAYUN_NODES.length}
function setupDayun(){
dayunIdx=0;dayunPlaying=true;stepDayun();
if(dayunTimer)clearInterval(dayunTimer);
dayunTimer=setInterval(function(){if(dayunPlaying)stepDayun()},2000);
var btn=document.getElementById('dayunPlayBtn');
btn.addEventListener('click',function(){dayunPlaying=!dayunPlaying;btn.textContent=dayunPlaying?'⏸ 暂停自动播放':'▶ 继续自动播放'});
document.querySelectorAll('#dayunTimeline .dayun-node').forEach(function(n){n.addEventListener('click',function(){dayunPlaying=false;btn.textContent='▶ 继续自动播放';var i=parseInt(n.getAttribute('data-dayun'));dayunIdx=(i+1)%DAYUN_NODES.length;renderDayunDetail(i)})});
}

/* ═══════════════════════ 改命模拟器（复用 GAIMING_MAP 建议 + 命盘实时变化） ═══════════════════════ */
function selectRemedy(key,el){
var r=null;REMEDY_DIRS.forEach(function(x){if(x.key===key)r=x});if(!r)return;
state.remedyDir=key;
document.querySelectorAll('#gmDirs .gm-dir').forEach(function(d){d.classList.remove('selected')});el.classList.add('selected');
/* 命盘实时变化：对应维度升，被牺牲维度降 */
var ns=state.scores.slice();
ns[r.dimUp]=Math.min(10,ns[r.dimUp]+2);ns[r.dimDown]=Math.max(1,ns[r.dimDown]-1);
state.scores=ns;
drawRailBagua();var mb=document.getElementById('mobileBagua');if(mb)mb.innerHTML=baguaSVG(140,140,120,80,50,state.scores,{symSize:14,showDim:true});
/* 更新八维列表条 */
document.querySelectorAll('#dimList .dim-item').forEach(function(item){var di=parseInt(item.getAttribute('data-dim'));var s=state.scores[di];var col=s>=8?'var(--accent-green)':s>=5?'var(--accent-gold)':'var(--accent-primary)';var f=item.querySelector('.di-fill');if(f){f.style.width=s*10+'%';f.style.background=col}item.querySelector('.di-val').textContent=s;var tg=item.querySelector('.di-tag');if(tg)tg.textContent=getDimTag(di,s);var fb=item.querySelector('.di-feedback');if(fb)fb.textContent=getFeedback(di,s);item.classList.toggle('hl',di===r.dimUp)});
/* 生成 3 条策略（复用改命签 GAIMING_MAP，取对应维度） */
var g=GAIMING_MAP[r.dimForGaiming]||GAIMING_MAP[0];
var out=document.getElementById('gmOutput');
var simHtml=r.sim.map(function(m){return '<div class="gm-sim-metric"><div class="gsm-label">'+m.label+'</div><div class="gsm-val '+(m.dir==='up'?'up':'down')+'">'+(m.dir==='up'?'↑ ':'↓ ')+m.val+'</div></div>'}).join('');
out.innerHTML='<div style="font-size:13px;color:var(--accent-gold);font-weight:600;margin-bottom:10px">选择方向：'+r.icon+' '+r.name+' → 模拟推演结果</div>'+
'<div class="gm-sim-row">'+simHtml+'</div>'+
'<div class="gaiming-task"><div class="gt-time">🎯 今日可做</div>'+g.today+'</div>'+
'<div class="gaiming-task"><div class="gt-time">📅 七日之内</div>'+g.week+'</div>'+
'<div class="gaiming-task"><div class="gt-time">📅 30天内</div>'+g.m30+'</div>'+
'<div class="gaiming-task"><div class="gt-time">🚀 下阶段</div>'+g.next+'</div>';
out.classList.add('show');
trackEvent('select_remedy',{dir:key});
}

/* ═══════════════════════ 滚动揭示 + 五行高亮 ═══════════════════════ */
function revealOnScroll(){
document.querySelectorAll('#phaseResult .chapter').forEach(function(c){var r=c.getBoundingClientRect();if(r.top<window.innerHeight*0.88){c.classList.add('reveal')}})}
var dimByChapter={'ch-wuxing':null};
function onResultScroll(){
revealOnScroll();
/* nav active + 命盘维度高亮 */
var chs=document.querySelectorAll('#phaseResult .chapter');var activeId=null;
chs.forEach(function(c){var r=c.getBoundingClientRect();if(r.top<window.innerHeight*0.4&&r.bottom>window.innerHeight*0.3){activeId=c.id}});
if(activeId){document.querySelectorAll('#railNav a').forEach(function(a){a.classList.toggle('on',a.getAttribute('data-target')===activeId)})}
/* 当命盘章节可见时，高亮当前视窗内的维度 */
var wx=document.getElementById('ch-wuxing');
if(wx){var wr=wx.getBoundingClientRect();
if(wr.top<window.innerHeight&&wr.bottom>0){
var items=document.querySelectorAll('#dimList .dim-item');var hlIdx=null;
items.forEach(function(it){var ir=it.getBoundingClientRect();if(ir.top<window.innerHeight*0.6&&ir.bottom>window.innerHeight*0.3){hlIdx=parseInt(it.getAttribute('data-dim'))}});
items.forEach(function(it){it.classList.toggle('hl',parseInt(it.getAttribute('data-dim'))===hlIdx)});
if(hlIdx!=null){drawRailBagua(hlIdx)}
}}
}
