<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品命理局 - 你的产品命里缺什么？</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg-deep:#15111B;--bg-card:#1E1A28;--bg-card2:#241C2E;
--red:#DD5A67;--gold:#E7BE74;--teal:#65B9AE;--purple:#9A8FC8;
--text:#F4EFE7;--text2:#B8B2C0;--border:rgba(244,239,231,0.08);
--border-gold:rgba(231,190,116,0.25);
}
html,body{height:100%;overflow:hidden;margin:0}
body{
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;
background:var(--bg-deep);color:var(--text);
position:relative;
}
.serif{font-family:Georgia,'Noto Serif SC','SimSun',serif}

/* 背景光点 */
body::before{
content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
background:
radial-gradient(1px 1px at 10% 20%,rgba(231,190,116,0.15),transparent),
radial-gradient(1px 1px at 30% 70%,rgba(154,143,200,0.12),transparent),
radial-gradient(1px 1px at 50% 40%,rgba(101,185,174,0.1),transparent),
radial-gradient(1px 1px at 70% 80%,rgba(221,90,103,0.08),transparent),
radial-gradient(1px 1px at 90% 30%,rgba(231,190,116,0.1),transparent);
animation:twinkle 8s ease-in-out infinite alternate;
}
@keyframes twinkle{0%{opacity:0.6}50%{opacity:1}100%{opacity:0.7}}

/* Scene system - fullscreen, no scroll */
.scene{
position:absolute;inset:0;
display:flex;flex-direction:column;align-items:center;justify-content:center;
opacity:0;pointer-events:none;transition:opacity 0.4s;
}
.scene.active{opacity:1;pointer-events:all}

/* 卡片 */
.card{
background:rgba(30,26,40,0.8);backdrop-filter:blur(12px);
border:1px solid var(--border);border-radius:clamp(16px,2vw,24px);
padding:clamp(16px,2vw,24px);transition:all 0.3s ease;
}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(154,143,200,0.08)}

/* 按钮 */
.btn{
display:inline-flex;align-items:center;justify-content:center;
min-height:clamp(40px,5vh,48px);padding:clamp(10px,1.5vh,12px) clamp(24px,3vw,32px);
border-radius:clamp(12px,1.5vw,16px);border:none;
font-size:clamp(14px,1.8vw,16px);font-weight:600;cursor:pointer;transition:all 0.3s ease;
}
.btn-primary{background:linear-gradient(135deg,var(--gold),#c9a355);color:#1a1a2e}
.btn-primary:hover{transform:scale(1.03);box-shadow:0 4px 20px rgba(231,190,116,0.3)}
.btn-secondary{background:transparent;border:1px solid var(--border-gold);color:var(--gold)}
.btn-secondary:hover{background:rgba(231,190,116,0.08)}
.btn-small{min-height:clamp(36px,4vh,40px);padding:clamp(8px,1vh,8px) clamp(16px,2vw,20px);font-size:clamp(12px,1.6vw,14px)}

/* === 幕0 首页 === */
#scene0{flex-direction:row;gap:0;padding:0}
.mingpan-bg{
width:40%;height:100%;display:flex;align-items:center;justify-content:center;
opacity:1;z-index:0;flex-shrink:0;
}
.mingpan-bg svg{width:min(360px,90%);height:min(360px,90%);animation:rotateSlow 30s linear infinite;opacity:0.65}
@keyframes rotateSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.hero-content{position:relative;z-index:1;text-align:left;width:50%;padding:0 5%;box-sizing:border-box}
.hero-content h1{
font-family:Georgia,serif;
font-size:clamp(28px,3.2vw,46px);
white-space:nowrap;
margin-bottom:clamp(12px,2vh,16px);letter-spacing:1px;
background:linear-gradient(135deg,var(--text),var(--gold));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.hero-content .subtitle{
color:var(--text2);font-size:clamp(13px,1.5vw,16px);margin-bottom:clamp(20px,3vh,32px);line-height:1.5
}
.hero-input{display:flex;flex-direction:column;align-items:flex-start;gap:clamp(12px,2vh,16px)}
.hero-input input{
width:100%;height:clamp(44px,5vh,52px);
border-radius:clamp(12px,1.5vw,16px);border:1px solid var(--border-gold);
background:var(--bg-card);color:var(--text);padding:0 clamp(16px,2vw,20px);
font-size:clamp(14px,1.8vw,16px);outline:none;transition:border-color 0.3s;
}
.hero-input input:focus{border-color:var(--gold)}
.hero-input input::placeholder{color:var(--text2)}
.hero-btns{display:flex;gap:clamp(8px,1vw,12px);flex-wrap:wrap;justify-content:flex-start}

/* 产品识别标签 */
.product-recognition{
margin-top:clamp(8px,1vh,12px);padding:clamp(8px,1vh,12px) clamp(12px,1.5vw,16px);
background:rgba(101,185,174,0.1);border:1px solid rgba(101,185,174,0.3);
border-radius:clamp(8px,1vw,12px);font-size:clamp(12px,1.6vw,14px);color:var(--teal);
display:none;animation:fadeIn 0.3s;
}
.product-recognition.show{display:block}
.product-recognition button{
margin-left:12px;background:var(--teal);color:var(--bg-deep);
border:none;border-radius:8px;padding:4px 12px;cursor:pointer;font-size:12px;
}

/* 今日产品签 */
.qian-btn{
position:fixed;bottom:clamp(20px,3vh,30px);right:clamp(20px,3vw,30px);z-index:100;
background:var(--bg-card);border:1px solid var(--border-gold);
border-radius:clamp(16px,2vw,20px);padding:clamp(10px,1.5vh,12px) clamp(16px,2vw,20px);
cursor:pointer;color:var(--gold);font-size:clamp(12px,1.6vw,14px);transition:all 0.3s;
box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.qian-btn:hover{transform:scale(1.05);background:var(--bg-card2)}
.qian-modal{
position:fixed;inset:0;z-index:200;display:none;
align-items:center;justify-content:center;
background:rgba(21,17,27,0.9);backdrop-filter:blur(8px);
}
.qian-modal.show{display:flex}
.qian-content{
background:var(--bg-card);border:1px solid var(--border-gold);
border-radius:clamp(16px,2vw,24px);padding:clamp(24px,3vw,40px);
max-width:min(400px,90vw);text-align:center;animation:fadeIn 0.4s;
}
.qian-content p{font-family:Georgia,serif;font-size:clamp(14px,2vw,18px);color:var(--gold);line-height:1.8;margin:clamp(12px,2vh,20px) 0}

/* === 幕1 模式选择 === */
.mode-section{text-align:center;width:min(900px,95vw)}
.mode-section h2{font-family:Georgia,serif;font-size:clamp(20px,3vw,28px);margin-bottom:clamp(24px,4vh,40px)}
.mode-cards{display:flex;gap:clamp(16px,2vw,24px);justify-content:center;flex-wrap:wrap}
.mode-card{
cursor:pointer;padding:clamp(20px,3vw,32px);text-align:center;flex:1;min-width:200px;max-width:280px;
border:2px solid transparent;position:relative;overflow:hidden;
}
.mode-card::before{
content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(231,190,116,0.05),transparent 70%);
opacity:0;transition:opacity 0.3s;
}
.mode-card:hover::before{opacity:1}
.mode-card:hover{border-color:var(--border-gold)}
.mode-card.selected{border-color:var(--red);box-shadow:0 0 24px rgba(221,90,103,0.15)}
.mode-card .icon{font-size:clamp(32px,5vw,48px);margin-bottom:clamp(8px,1vh,16px)}
.mode-card h3{font-size:clamp(16px,2.5vw,20px);margin-bottom:clamp(6px,1vh,8px);color:var(--gold)}
.mode-card p{color:var(--text2);font-size:clamp(12px,1.6vw,14px);line-height:1.6}

/* === 幕2 产品登记（左右分栏） === */
#scene-register{flex-direction:row;align-items:stretch;padding:clamp(16px,2vh,24px);gap:clamp(16px,2vw,24px)}
.register-left{flex:0.6;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.register-right{flex:0.4;display:flex;align-items:center;justify-content:center}
.progress-bar{
width:100%;height:4px;background:var(--bg-card2);border-radius:4px;margin-bottom:clamp(16px,2vh,24px);overflow:hidden;
}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--teal));border-radius:4px;transition:width 0.5s ease}
.qa-question{font-family:Georgia,serif;font-size:clamp(16px,2.5vw,22px);margin-bottom:clamp(16px,2vh,24px);color:var(--gold)}

/* 产品类型Tab选择器 */
.type-tabs{
display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;
}
.type-tab{
padding:6px 16px;border-radius:12px;border:1px solid var(--border);
background:var(--bg-card);color:var(--text2);cursor:pointer;font-size:13px;
white-space:nowrap;transition:all 0.3s;
}
.type-tab.active{border-color:var(--gold);color:var(--gold);background:rgba(231,190,116,0.08)}
.type-options{
display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
max-height:calc(6 * 40px);overflow:hidden;
}
.type-option{
background:var(--bg-card2);border:1px solid var(--border);border-radius:12px;
padding:8px;text-align:center;cursor:pointer;font-size:13px;transition:all 0.3s;
}
.type-option:hover{border-color:var(--purple);background:rgba(154,143,200,0.08)}
.type-option.selected{border-color:var(--gold);background:rgba(231,190,116,0.1);color:var(--gold)}

/* 普通选项 */
.qa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.qa-option{
background:var(--bg-card2);border:1px solid var(--border);border-radius:12px;
padding:12px;text-align:center;cursor:pointer;font-size:14px;transition:all 0.3s;
}
.qa-option:hover{border-color:var(--purple);background:rgba(154,143,200,0.08)}
.qa-option.selected{border-color:var(--gold);background:rgba(231,190,116,0.1);color:var(--gold)}

/* 右侧雷达图 */
.mini-mingpan{width:clamp(150px,20vw,280px);height:clamp(150px,20vw,280px)}

/* === 幕3 定日主 === */
.dayzhu-section{text-align:center;width:min(1000px,95vw)}
.dayzhu-section h2{font-family:Georgia,serif;font-size:clamp(20px,3vw,28px);margin-bottom:clamp(8px,1vh,12px)}
.dayzhu-recommend{color:var(--teal);font-size:clamp(12px,1.6vw,14px);margin-bottom:clamp(20px,3vh,30px)}
.dayzhu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(12px,2vw,20px)}
.dayzhu-card{
cursor:pointer;padding:clamp(16px,2vw,28px);text-align:left;border:2px solid transparent;
transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
}
.dayzhu-card:hover{border-color:var(--border-gold);transform:translateY(-6px);box-shadow:0 12px 40px rgba(231,190,116,0.1)}
.dayzhu-card.selected{border-color:var(--red);box-shadow:0 0 24px rgba(221,90,103,0.2)}
.dayzhu-card .dz-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dayzhu-card .dz-icon{font-size:clamp(24px,3vw,32px)}
.dayzhu-card .dz-name{font-family:Georgia,serif;font-size:clamp(16px,2vw,20px);color:var(--gold)}
.dayzhu-card .dz-type{font-size:clamp(11px,1.4vw,13px);color:var(--teal)}
.dayzhu-card .dz-keywords{display:flex;gap:6px;margin:8px 0}
.dayzhu-card .dz-keywords span{font-size:clamp(10px,1.2vw,11px);padding:3px 8px;background:rgba(154,143,200,0.15);border-radius:8px;color:var(--purple)}
.dayzhu-card .dz-desc{font-size:clamp(11px,1.4vw,13px);color:var(--text2);line-height:1.6}
.dayzhu-card .dz-reps{font-size:clamp(10px,1.3vw,12px);color:var(--teal);margin-top:6px}
.dayzhu-stamp{
position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;
background:rgba(21,17,27,0.85);
}
.dayzhu-stamp.show{display:flex}
.stamp-text{
font-family:Georgia,serif;font-size:clamp(32px,5vw,48px);color:var(--red);
border:4px solid var(--red);padding:clamp(12px,2vh,20px) clamp(24px,4vw,40px);border-radius:8px;
transform:scale(0.3);animation:stampDrop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
box-shadow:0 0 40px rgba(221,90,103,0.3);letter-spacing:8px;
}
@keyframes stampDrop{
0%{transform:scale(0.3) rotate(-10deg);opacity:0}
60%{transform:scale(1.1) rotate(2deg);opacity:1}
100%{transform:scale(1) rotate(0deg);opacity:1}
}

/* === 幕4 打分 === */
.score-section{width:min(1100px,95vw)}
.score-section h2{font-family:Georgia,serif;font-size:clamp(18px,2.5vw,24px);text-align:center;margin-bottom:clamp(16px,2vh,24px)}
.score-modes{display:flex;gap:12px;justify-content:center;margin-bottom:clamp(16px,2vh,30px);flex-wrap:wrap}
.score-mode-btn{
padding:clamp(8px,1vh,10px) clamp(16px,2vw,20px);border-radius:12px;border:1px solid var(--border);
background:var(--bg-card);color:var(--text2);cursor:pointer;font-size:clamp(12px,1.6vw,14px);transition:all 0.3s;
}
.score-mode-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(231,190,116,0.08)}
.score-layout{display:flex;gap:clamp(20px,3vw,30px);align-items:center}
.score-radar{flex:1;display:flex;justify-content:center}
.score-radar canvas{width:clamp(200px,25vw,300px);height:clamp(200px,25vw,300px)}
.score-sliders{flex:1;display:flex;flex-direction:column;gap:clamp(8px,1vh,12px)}
.slider-group{
background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:12px;
}
.slider-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.slider-label{font-size:clamp(12px,1.5vw,14px);color:var(--text)}
.slider-value{font-size:clamp(12px,1.5vw,14px);color:var(--gold);font-weight:600}
.slider-tag{font-size:clamp(10px,1.2vw,11px);color:var(--purple);margin-left:8px}
.slider-input{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:var(--bg-card2);border-radius:3px;outline:none}
.slider-input::-webkit-slider-thumb{
-webkit-appearance:none;width:16px;height:16px;border-radius:50%;
background:var(--gold);cursor:pointer;box-shadow:0 0 8px rgba(231,190,116,0.4);
}
.slider-feedback{font-size:clamp(11px,1.3vw,12px);color:var(--teal);margin-top:4px;min-height:14px}
.score-alert{
text-align:center;margin-top:16px;padding:10px;border-radius:12px;
background:rgba(221,90,103,0.1);border:1px solid rgba(221,90,103,0.2);
color:var(--red);font-size:clamp(12px,1.5vw,14px);display:none;
}
.score-alert.show{display:block}
.score-submit{text-align:center;margin-top:clamp(16px,2vh,20px)}

/* === 幕5 命书 === */
.fortune-overlay{
position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;
background:rgba(21,17,27,0.95);
}
.fortune-overlay.show{display:flex}
.fortune-anim{text-align:center}
.fortune-line{
width:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--teal),var(--gold),transparent);
animation:expandLine 1.5s ease forwards;box-shadow:0 0 20px rgba(231,190,116,0.3);
}
@keyframes expandLine{from{width:0}to{width:80vw}}
.fortune-seal{
font-family:Georgia,serif;font-size:clamp(40px,6vw,56px);color:var(--red);
border:5px solid var(--red);border-radius:12px;padding:clamp(12px,2vh,16px) clamp(24px,4vw,32px);
margin-top:clamp(24px,4vh,40px);transform:scale(0.3);opacity:0;
animation:sealDrop 0.8s 1.2s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes sealDrop{
0%{transform:scale(0.3);opacity:0}
70%{transform:scale(1.1);opacity:1}
100%{transform:scale(1);opacity:1}
}

.fortune-result{
display:none;padding:clamp(20px,3vh,40px) clamp(16px,2vw,20px);width:100%;height:100%;overflow:hidden;
}
.fortune-result.show{display:flex;animation:fadeIn 0.8s ease;flex-direction:column}
.fortune-grid{display:flex;gap:clamp(16px,2vw,24px);flex:1;overflow:hidden}
.fortune-col{flex:1;display:flex;flex-direction:column;gap:clamp(12px,1.5vh,16px);overflow-y:auto}
.fortune-col::-webkit-scrollbar{width:4px}
.fortune-col::-webkit-scrollbar-track{background:transparent}
.fortune-col::-webkit-scrollbar-thumb{background:var(--border-gold);border-radius:2px}
.fortune-col h3{font-family:Georgia,serif;font-size:clamp(14px,2vw,18px);color:var(--gold);margin-bottom:8px}

/* 身份卡 */
.identity-card{padding:clamp(16px,2vw,24px);flex-shrink:0}
.id-name{font-family:Georgia,serif;font-size:clamp(20px,3vw,28px);color:var(--gold);margin-bottom:6px;animation:slideUp 0.6s ease}
.id-mingge{font-size:clamp(14px,1.8vw,16px);color:var(--teal);margin-bottom:12px;animation:slideUp 0.6s 0.2s ease both}
.wuxing-bars{display:flex;flex-direction:column;gap:6px;margin:12px 0}
.wuxing-bar{display:flex;align-items:center;gap:8px}
.wuxing-bar .label{width:30px;font-size:clamp(10px,1.3vw,12px);color:var(--text2)}
.wuxing-bar .bar{flex:1;height:8px;background:var(--bg-card2);border-radius:4px;overflow:hidden}
.wuxing-bar .bar-fill{height:100%;border-radius:4px;transition:width 0.5s}
.bar-wood{background:var(--teal)}
.bar-fire{background:var(--red)}
.bar-earth{background:var(--gold)}
.bar-metal{background:#ccc}
.bar-water{background:var(--purple)}
.id-strength{font-size:clamp(12px,1.5vw,14px);margin:8px 0}
.id-dayun{font-size:clamp(11px,1.4vw,13px);color:var(--purple);margin:6px 0}
.meter-row{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:clamp(11px,1.4vw,13px)}
.meter-label{width:50px;color:var(--text2)}
.meter-bar{flex:1;height:6px;background:var(--bg-card2);border-radius:3px;overflow:hidden}
.meter-fill{height:100%;border-radius:3px}
.meter-pct{width:36px;text-align:right;color:var(--gold);font-size:clamp(10px,1.3vw,12px)}
.yi-ji{margin-top:12px}
.yi{color:var(--teal);font-size:clamp(11px,1.4vw,13px);margin:3px 0}
.ji{color:var(--red);font-size:clamp(11px,1.4vw,13px);margin:3px 0}

/* 命理解读 */
.ming-card{position:relative;perspective:800px;cursor:pointer;flex-shrink:0}
.ming-card-inner{position:relative;width:100%;transition:transform 0.6s;transform-style:preserve-3d}
.ming-card.flipped .ming-card-inner{transform:rotateY(180deg)}
.ming-card-front,.ming-card-back{
backface-visibility:hidden;border-radius:16px;padding:clamp(14px,2vw,20px);
}
.ming-card-front{background:var(--bg-card);border:1px solid var(--border)}
.ming-card-back{
background:var(--bg-card2);border:1px solid var(--border-gold);
position:absolute;top:0;left:0;width:100%;height:100%;
transform:rotateY(180deg);
}
.ming-card-front p{font-family:Georgia,serif;font-size:clamp(12px,1.5vw,14px);line-height:1.8;color:var(--text)}
.ming-card-back p{font-size:clamp(12px,1.5vw,14px);line-height:1.8;color:var(--text2)}
.flip-btn{display:inline-block;margin-top:8px;font-size:clamp(10px,1.3vw,12px);color:var(--purple);cursor:pointer}

/* 大运时间轴 */
.dayun-timeline{display:flex;gap:0;overflow-x:auto;padding:12px 0;margin:12px 0;flex-shrink:0}
.dayun-node{
flex:0 0 auto;text-align:center;padding:6px 12px;cursor:pointer;position:relative;
}
.dayun-node::after{
content:'';position:absolute;top:50%;right:-6px;width:12px;height:1px;background:var(--border-gold);
}
.dayun-node:last-child::after{display:none}
.dayun-dot{
width:10px;height:10px;border-radius:50%;background:var(--bg-card2);
border:2px solid var(--text2);margin:0 auto 4px;transition:all 0.3s;
}
.dayun-node.current .dayun-dot{
background:var(--gold);border-color:var(--gold);
animation:breathe 2s ease-in-out infinite;
}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(231,190,116,0.4)}50%{box-shadow:0 0 0 8px rgba(231,190,116,0)}}
.dayun-name{font-size:clamp(9px,1.2vw,11px);color:var(--text2)}
.dayun-node.current .dayun-name{color:var(--gold)}
.dayun-tooltip{
display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
background:var(--bg-card);border:1px solid var(--border-gold);border-radius:12px;
padding:10px;width:160px;font-size:clamp(10px,1.3vw,12px);color:var(--text2);z-index:10;
}
.dayun-node:hover .dayun-tooltip{display:block}

/* 流年 */
.liunian{flex-shrink:0}
.liunian-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.liunian-label{font-size:clamp(11px,1.4vw,13px);color:var(--text2);width:80px}
.liunian-val{font-size:clamp(11px,1.4vw,13px);font-weight:600}
.liunian-val.dj{color:var(--gold)}
.liunian-val.xj{color:var(--teal)}
.liunian-val.p{color:var(--text2)}
.liunian-val.pr{color:var(--text2)}
.liunian-val.dx{color:var(--red)}
.liunian-duanyu{font-family:Georgia,serif;font-size:clamp(11px,1.4vw,13px);color:var(--purple);margin-top:8px;font-style:italic}

/* 神煞 */
.guiren-tags,.xiaoren-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.guiren-tag{
font-size:clamp(10px,1.3vw,12px);padding:3px 10px;border-radius:12px;
background:rgba(101,185,174,0.12);color:var(--teal);border:1px solid rgba(101,185,174,0.2);
}
.xiaoren-tag{
font-size:clamp(10px,1.3vw,12px);padding:3px 10px;border-radius:12px;
background:rgba(221,90,103,0.1);color:var(--red);border:1px solid rgba(221,90,103,0.2);
}
.gaiming-btn{width:100%;margin-top:12px}
.gaiming-result{margin-top:12px}
.gaiming-task{
background:var(--bg-card2);border-radius:12px;padding:12px;margin-bottom:8px;
font-size:clamp(11px,1.4vw,13px);color:var(--text2);line-height:1.7;border-left:3px solid var(--gold);
animation:slideUp 0.4s ease;
}
.gaiming-task strong{color:var(--gold)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* shake animation */
@keyframes shake{
0%,100%{transform:translateX(0)}
10%,30%,50%,70%,90%{transform:translateX(-4px)}
20%,40%,60%,80%{transform:translateX(4px)}
}
.shaking{animation:shake 0.6s ease}

@media(max-width:768px){
#scene-register{flex-direction:column}
.register-left,.register-right{flex:none;width:100%}
.register-right{height:200px}
.score-layout{flex-direction:column}
.fortune-grid{flex-direction:column}
.mode-cards{flex-direction:column;align-items:center}
.mode-card{width:100%;max-width:none}
.dayzhu-grid{grid-template-columns:repeat(2,1fr)}
}

function drawMingpan(){
const svg=document.getElementById('mingpanSvg');
const cx=160,cy=160,r=130,ri=95;
let pts=[];
for(let i=0;i<8;i++){
const a=Math.PI*2*i/8-Math.PI/2;
pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);
}
let pathD='M'+pts.map(p=>p.join(',')).join('L')+'Z';
let html=`<path d="${pathD}" fill="none" stroke="rgba(231,190,116,0.3)" stroke-width="1.5"/>`;
let ptsI=[];
for(let i=0;i<8;i++){
const a=Math.PI*2*i/8-Math.PI/2;
ptsI.push([cx+ri*Math.cos(a),cy+ri*Math.sin(a)]);
}
let pathI='M'+ptsI.map(p=>p.join(',')).join('L')+'Z';
html+=`<path d="${pathI}" fill="none" stroke="rgba(154,143,200,0.2)" stroke-width="1"/>`;
for(let i=0;i<8;i++){
const a=Math.PI*2*i/8-Math.PI/2;
const lx=cx+(r+20)*Math.cos(a);
const ly=cy+(r+20)*Math.sin(a);
const anchor=Math.abs(Math.cos(a))<0.3?'middle':(Math.cos(a)>0?'start':'end');
html+=`<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" style="font-size:10px;fill:rgba(184,178,192,0.8)">${DIMENSIONS[i]}</text>`;
}
svg.innerHTML=html;
}

function setupProductRecognition(){
const input=document.getElementById('productInput');
const recDiv=document.getElementById('productRecognition');
const recText=document.getElementById('recognitionText');

input.addEventListener('input',(e)=>{
const val=e.target.value.trim();
if(!val){
recDiv.classList.remove('show');
state.recognized=false;
return;
}

// 模糊匹配
const matched=findProductMatch(val);
if(matched){
const info=PRODUCT_RECOGNITION[matched];
const dzItem=DAYZHU_DATA.find(d=>d.key===info.dayzhu);
recText.textContent=`已识别：${matched} → ${info.type} · ${dzItem.name}型产品`;
recDiv.classList.add('show');
state.recognized=true;
state.recognizedType=info.type;
state.recognizedDayzhu=info.dayzhu;
state.productCat=info.category;
state.productType=info.type;
}else{
recText.textContent='新产品？选择最接近的类型 ↓';
recDiv.classList.add('show');
state.recognized=false;
}
});
}

function findProductMatch(input){
const inputLower=input.toLowerCase();
// 精确匹配
for(const name of Object.keys(PRODUCT_RECOGNITION)){
if(name.toLowerCase()===inputLower)return name;
}
// 模糊匹配
for(const name of Object.keys(PRODUCT_RECOGNITION)){
if(name.toLowerCase().includes(inputLower)||inputLower.includes(name.toLowerCase())){
return name;
}
}
return null;
}

}

function renderQA(){

document.getElementById('qaProgress').style.width=((qaStep_current+1)/total*100)+'%';

const main=document.getElementById('qaMain');
let html=`<div class="qa-question">${step.q}</div>`;

if(step.type==='product_type'){
html+=renderTypeSelector();
}else{
html+=`<div class="qa-grid">`;
step.options.forEach((opt)=>{
const sel=state.answers[step.type]===opt?'selected':'';
html+=`<div class="qa-option ${sel}" onclick="selectQAOption('${step.type}','${opt}',this)">${opt}</div>`;
});
html+=`</div>`;
}
main.innerHTML=html;
drawMiniMingpan();

// 自动跳转逻辑

setTimeout(()=>{
if(state.answers[step.type]){
if(qaStep_current>=steps.length-1){
showScene(3);initDayzhu();
}else{
qaStep_current++;
renderQA();
}
}
},300);
}
}

function drawRadar(){
const canvas=document.getElementById('radarCanvas');
const ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const cx=W/2,cy=H/2,R=150;
ctx.clearRect(0,0,W,H);

for(let ring=1;ring<=5;ring++){
ctx.beginPath();
const r=R*ring/5;
for(let i=0;i<8;i++){
const a=Math.PI*2*i/8-Math.PI/2;
const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);
i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
}
ctx.closePath();
ctx.strokeStyle='rgba(244,239,231,0.08)';
ctx.stroke();
}

for(let i=0;i<8;i++){
const a=Math.PI*2*i/8-Math.PI/2;
ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));
ctx.strokeStyle='rgba(244,239,231,0.06)';
ctx.stroke();
}

ctx.font='11px sans-serif';ctx.fillStyle='#B8B2C0';ctx.textAlign='center';ctx.textBaseline='middle';
for(let i=0;i<8;i++){
const a=Math.PI*2*i/8-Math.PI/2;
const lx=cx+(R+24)*Math.cos(a),ly=cy+(R+24)*Math.sin(a);
ctx.fillText(DIMENSIONS[i],lx,ly);
}

if(state.scoreMode==='hybrid'){
const aiBase=AI_SCORES[state.dayzhu]||[5,5,5,5,5,5,5,5];
ctx.beginPath();
for(let i=0;i<8;i++){
const a=Math.PI*2*i/8-Math.PI/2;
const r=R*aiBase[i]/10;
const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);
i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
}
ctx.closePath();
ctx.fillStyle='rgba(154,143,200,0.1)';ctx.fill();
ctx.strokeStyle='rgba(154,143,200,0.5)';ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
}

ctx.beginPath();
for(let i=0;i<8;i++){
const a=Math.PI*2*i/8-Math.PI/2;
const r=R*state.scores[i]/10;
const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);
i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
}
ctx.closePath();
ctx.fillStyle='rgba(221,90,103,0.15)';ctx.fill();
ctx.strokeStyle='#DD5A67';ctx.lineWidth=2;ctx.stroke();

for(let i=0;i<8;i++){
const a=Math.PI*2*i/8-Math.PI/2;
const r=R*state.scores[i]/10;
ctx.beginPath();
ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),4,0,Math.PI*2);
ctx.fillStyle='#DD5A67';ctx.fill();
}
}

function checkDivergence(){
if(state.scoreMode!=='hybrid')return;
const aiBase=AI_SCORES[state.dayzhu]||[5,5,5,5,5,5,5,5];
let maxDiff=0,maxIdx=0;
for(let i=0;i<8;i++){
const diff=Math.abs(state.scores[i]-aiBase[i]);
if(diff>maxDiff){maxDiff=diff;maxIdx=i}
}
const alert=document.getElementById('scoreAlert');
if(maxDiff>3){
alert.textContent=`你与AI在「${DIMENSIONS[maxIdx]}」上的判断差异最大（差${maxDiff}分）`;
alert.classList.add('show');
}else{
alert.classList.remove('show');
}
}

function determineMingge(scores){
const[t,d,g,c,l,m,b,s]=scores;
if(d>=8&&c>=7)return'伤官配印格';
if(c>=8&&l>=8)return'食神生财格';
if(m>=8&&l>=7)return'财官双美格';
if(g>=8&&l<=4)return'火旺土虚格';
if(d>=8&&t<=5)return'印旺身弱格';
if(b>=8&&m<=4)return'身强财弱格';
if(s>=8&&m<=5)return'木火通明格';
const avg=scores.reduce((a,b)=>a+b,0)/8;
const std=Math.sqrt(scores.reduce((a,v)=>a+(v-avg)**2,0)/8);
if(std<1.5)return'中和稳命格';
return'比劫夺财格';
}

function calcWuxing(scores){
const wood=Math.min(100,((scores[2]+scores[3])/2)*10);
const fire=Math.min(100,(scores[3]*10));
const earth=Math.min(100,(scores[4]*10));
const metal=Math.min(100,(scores[1]*10));
const water=Math.min(100,((scores[0]+scores[5])/2)*10);
return[Math.round(wood),Math.round(fire),Math.round(earth),Math.round(metal),Math.round(water)];
}

function getStageIndex(){
const stage=state.answers.stage;
if(!stage)return 0;
const stageMap={'刚出生':0,'小范围有人用':1,'开始出圈':2,'快速增长':3,'增长放缓':4,'商业化关键期':5,'平台化':5,'转型期':6};
return stageMap[stage]||0;
}
